PAR_PATH: "£KR_game_rule_flag_PAR   Der letzte Überlebende"
RULE_OPTION_PAR_PATH_RANDOM: "Standard"
RULE_OPTION_PAR_PATH_RANDOM_DESC: "Als Sieger des Chaco-Krieges wurde Paraguay immer wieder ausgeblutet und ging dennoch als Sieger hervor. Wieder einmal wird die Nation dem Schicksal überlassen."
RULE_OPTION_PAR_PATH_AUTDEM: "£KR_game_rule_flag_PAR   Estigarribistas"
RULE_OPTION_PAR_PATH_AUTDEM_DESC: "Die Herrschaft von José Félix Estigarribia Insaurralde und seiner Partei §aPartido Nacional Liberal Estigarribista§!, oder Nationale Liberale Estigarribista-Partei, dauert auf unbestimmte Zeit an."
