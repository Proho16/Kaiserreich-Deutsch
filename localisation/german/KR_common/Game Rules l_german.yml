BRA_PATH: "£KR_game_rule_flag_BRA   Föderale Wahlen von 1936"
RULE_OPTION_BRA_PATH_RANDOM: "Standard"
RULE_OPTION_BRA_PATH_RANDOM_DESC: "Die Spannungen nehmen zu, während sich sehr unterschiedliche Fraktionen auf die wahrscheinlich gewalttätigsten und umstrittensten Wahlen in der Geschichte Brasiliens vorbereiten. Politisches Gerede ist fast gleichbedeutend mit hitzigen Auseinandersetzungen, und ein Hauch von ideologischem Extremismus liegt über der Bevölkerung des Landes.  Vier sehr unterschiedliche Visionen für das Land treffen aufeinander, an manchen Orten sogar physisch. Wie werden sich die Menschen in Brasilien entscheiden?"
RULE_OPTION_BRA_PATH_SOCCON: "£KR_game_rule_flag_BRA   Republicanos"
RULE_OPTION_BRA_PATH_SOCCON_DESC: "Getulio Vargas und die §cPartido Republicano§!, die Republikanische Partei, gewinnen die Wahlen von 1936. Während Vargas versucht, seine persönliche Macht zu festigen, werden seine Pläne durchkreuzt und die Demokratie setzt sich durch."
RULE_OPTION_BRA_PATH_PATAUT: "£KR_game_rule_flag_BRA   Republicanos (Centralista)"
RULE_OPTION_BRA_PATH_PATAUT_DESC: "Getulio Vargas und die Republikaner gewinnen die Wahlen von 1936. Vargas festigt langsam seine persönliche Macht und schließlich setzt der zentralistische Flügel der §PPartido Republicano§!, oder Republikanische Partei, seine Vision für das Land um. Mit seinen erweiterten Befugnissen wird Brasilien zu einem neuen Staat reformiert."
RULE_OPTION_BRA_PATH_SOCLIB: "£KR_game_rule_flag_BRA   Liberais"
RULE_OPTION_BRA_PATH_SOCLIB_DESC: "Júlio Prestes und die §lLiberale Partei§!, oder Liberale Partei, gewinnen die Wahlen von 1936."
RULE_OPTION_BRA_PATH_SOCDEM: "£KR_game_rule_flag_BRA   Esquerda Democrática"
RULE_OPTION_BRA_PATH_SOCDEM_DESC: "João Mangabeira und die §SDemokratische Linke§!, oder Demokratische Linke, gewinnen die Wahlen von 1936. Die demokratische Regierung bleibt trotz der Folgen des Treffens von Präsident Mangabeira mit einem chilenischen Politiker bestehen."
 RULE_OPTION_BRA_PATH_MARLIB: "£KR_game_rule_flag_BRA  Liberais Democratas"
 RULE_OPTION_BRA_PATH_MARLIB_DESC: "Júlio Prestes und die Liberale Partei gewinnen die Wahlen von 1936. Im Jahr 1940 wird eine Splittergruppe namens §mLiberale Demokratische Partei§!, oder Liberaldemokratische Partei, bekannt und gewinnt die Wahlen."
 RULE_OPTION_BRA_PATH_SOC_DESC: "João Mangabeira und die Esquerda Democrática gewinnen die Wahlen von 1936. Die Armee führt einen Staatsstreich durch, nachdem die Regierung sich geweigert hatte, einen chilenischen Politiker zu verhaften, der sich mit Präsident Mangabeira getroffen hatte.\nDieser Putsch wird durch einen erfolgreichen Gegenputsch vereitelt, und in Brasilien wird ein sozialistischer Staat gegründet.\nAuf seinem ersten Gewerkschaftskongress hat der"
 RULE_OPTION_BRA_PATH_RADSOC: "£KR_game_rule_flag_BRA_radsoc  Socialistas - Anarquistas"
RULE_OPTION_BRA_PATH_RADSOC_DESC: "$$RULE_OPTION_BRA_PATH_SOC_DESC$ Autonomist §RConfederação Geral do Trabalho - Federação Anarquista Brasileira§!, oder Allgemeiner Gewerkschaftsbund – Brasilianische Anarchistische Föderation, werden gewählt."
RULE_OPTION_BRA_PATH_SYNDIE: "£KR_game_rule_flag_BRA_syndie   Socialistas - Sindicalistas"
RULE_OPTION_BRA_PATH_SYNDIE_DESC: "$RULE_OPTION_BRA_PATH_SOC_DESC$ orthodox §rPartido Sindicalista Brasileiro§!, oder Brasilianische Syndikalistische Partei, werden gewählt."
RULE_OPTION_BRA_PATH_TOTALIST: "£KR_game_rule_flag_BRA_syndie   Socialistas - Maximalistas"
RULE_OPTION_BRA_PATH_TOTALIST_DESC: "$RULE_OPTION_BRA_PATH_SOC_DESC$ §oMovimento Maximalista Nacional§!, oder Nationale Maximalistenbewegung, werden gewählt."
RULE_OPTION_BRA_PATH_NATPOP: "£KR_game_rule_flag_BRA_natpop   Integralistas"
RULE_OPTION_BRA_PATH_NATPOP_DESC: "Gustavo Dodt Barroso und §nAção Integralista Brasileira§!, oder Brasilianische Integralistische Aktion, gewinnen die Wahlen von 1936. Die Regierung setzt später die Monarchie wieder ein und krönt Dom Pedro III. de Orléans e Bragança zum Kaiser."

