### Game Rules ###
RULE_GROUP_KAISERREICH_RULES: "Allgemein"

RULE_WK2_BEGIN_OPTIONS: "Anfang des Zweiten Weltkriegs"
RULE_OPTION_RESTRICTED: "Eingeschränkt"
RULE_WK2_BEGIN_OPTIONS_RESTRICTED_DESC: "Fast alle Wege, die vor 1939 zum Ausbruch eines Krieges zwischen dem Reichspakt und der Dritten Internationale führen könnten, sind blockiert, auch wenn dies bedeutet, dass frühe Konfrontationen zwischen den beiden immer zum Rückzug einer Partei führen."
RULE_OPTION_RARE: "Selten"
RULE_WK2_BEGIN_OPTIONS_RARE_DESC: "Wege, die vor 1939 zum Ausbruch eines Krieges zwischen dem Reichspakt und der Dritten Internationale führen könnten, sind nicht blockiert, aber die Chancen, dass sie zum Krieg führen, sind sehr gering."
RULE_OPTION_UNRESTRICTED: "Uneingeschränkt"
RULE_WK2_BEGIN_OPTIONS_UNRESTRICTED_DESC: "Jede frühe Konfrontation zwischen dem Reichspakt und der Dritten Internationale könnte einen Ausbruch des Zweiten Weltkriegs bedeuten, basierend auf den Chancen, die jede Ereigniskette mit sich bringt. Das bedeutet, dass frühe Kriege häufig vorkommen."

RULE_UNIT_LIMIT_OPTIONS: "Divisions-Limits"
RULE_OPTION_STANDARD: "Gilt für alle"
RULE_UNIT_LIMIT_OPTIONS_STANDARD_DESC: "Es wurden Beschränkungen hinsichtlich der Anzahl der Divisionen festgelegt, die die KI aufbauen kann, basierend auf ihrer Fabrikanzahl und ihrem Wirtschaftsgesetz-Level. Sobald die KI diese Grenze erreicht hat, stellt sie den Aufbau neuer Divisionen einfach ein. Dieses Limit gilt auch für einen Spieler, obwohl es für ihn ein Soft Cap ist und er einen Malus erhält, der davon abhängt, wie weit er das Limit überschreitet.\n\n§RBeachten Sie, dass dies ein System ist, das eingeführt wurde, um die unvermeidliche Verlangsamung zu reduzieren, die im Laufe eines Spiels auftritt, da die schiere Anzahl der Divisionen im Einsatz die Hauptursache für die Systemverzögerung ist.§!"
 RULE_UNIT_LIMIT_OPTIONS_AI_ONLY: "Gilt nur für die KI"
RULE_UNIT_LIMIT_OPTIONS_AI_ONLY_DESC: "Es wurden Grenzen dafür gesetzt, wie viele Divisionen die KI auf der Grundlage der Anzahl ihrer Fabriken und des Niveaus der Wirtschaftsgesetze aufbauen kann. Sobald die KI diese Grenze erreicht hat, hört sie einfach auf, neue Divisionen aufzubauen. Bei dieser Einstellung gibt es keine Begrenzung für die Anzahl der Divisionen, die ein Spieler aufbauen kann, außer seiner Fähigkeit, Personal und Ausrüstung bereitzustellen.\n\n§RBeachten Sie, dass dies dem Spieler einen erheblichen Vorteil gegenüber KI-Ländern verschafft, die ansonsten eine vergleichbare Stärke hätten.§!"
RULE_OPTION_TURN_OFF: "Abschalten"
RULE_UNIT_LIMIT_OPTIONS_TURN_OFF_DESC: "Dadurch wird das System der Divisionsbegrenzung vollständig abgeschaltet.\n\n§REs wird empfohlen, dies nur dann zu tun, wenn Sie entweder nichts dagegen haben, dass die Spielgeschwindigkeit im Laufe des Spiels viel langsamer wird, oder wenn Sie einen SEHR robusten Computer haben, auf dem das Spiel läuft.§!"

RULE_DEMOB_OPTIONS: "Demobilisierung in Friedenszeiten"
RULE_OPTION_DEMOB_EXISTS: "Standard"
RULE_OPTION_DEMOB_EXISTS_DESC: "In Friedenszeiten wird der Spieler aufgefordert, seine Wirtschafts- und/oder Wehrpflichtgesetze innerhalb von vier Monaten auf das in Friedenszeiten zulässige Niveau und entsprechend seinem $MODIFIER_WAR_SUPPORT_FACTOR$ zu reduzieren. Die KI tut dasselbe, allerdings schneller und tendenziell auf ein niedrigeres Niveau als vom Spieler verlangt. Wenn für die KI Einheitenbeschränkungen gelten, führt dies aus Leistungsgründen ebenfalls dazu, dass sie die Anzahl ihrer aktiven Einheiten reduziert."
RULE_OPTION_DEMOB_AI_ONLY: "Gilt nur für die KI"
RULE_OPTION_DEMOB_AI_ONLY_DESC: "In Friedenszeiten reduziert die KI ihre Wirtschaft und/oder Wehrpflichtgesetze. Wenn für die KI Einheitenbeschränkungen gelten, veranlasst dies sie aus Leistungsgründen ebenfalls dazu, die Anzahl ihrer aktiven Einheiten zu reduzieren. Der Spieler wird jedoch niemals aufgefordert, seine Gesetze zu reduzieren."
RULE_OPTION_DEMOB_OFF: "Ausschalten"
RULE_OPTION_DEMOB_OFF_DESC: "Weder der Spieler noch die KI werden jemals aufgefordert, ihre Wirtschaft und/oder Wehrpflichtgesetze in Friedenszeiten zu reduzieren.\n\n§REs wird empfohlen, dies nur dann zu tun, wenn Sie entweder nichts dagegen haben, dass die Spielgeschwindigkeit im Laufe des Spiels viel langsamer wird, oder wenn Sie einen SEHR robusten Computer haben, auf dem das Spiel läuft.§!"

 RULE_CONFERENCE_OPTIONS: "Friedens-Konferenzen"
 RULE_OPTION_CONFERENCE_STANDARD: "Standard"
 RULE_OPTION_CONFERENCE_STANDARD_DESC: "Die KI nimmt an einer Friedenskonferenz teil, basierend auf ihren Kerninteressen, Ansprüchen, Ambitionen und der Frage, ob sie diese erreichen kann."
 RULE_OPTION_CONFERENCE_PLAYER_PRIMACY: "Spieler Vorrang"
 RULE_OPTION_CONFERENCE_PLAYER_PRIMACY_DESC: "Die KI lehnt es ab, bei Friedensverhandlungen Stellung zu beziehen, wenn ein Spieler der siegreichen Seite beteiligt ist. Beachten Sie, dass nach Aktivierung dieser Spielregel eine Debug-Entscheidung angezeigt wird, mit der der Spieler diesen Effekt während des Spiels aus- und wieder einschalten kann."

 KR_STATE_TRANSFER_TOOL_OPTIONS: "Staat & Land Transfer Tool"
 RULE_OPTION_STATE_TRANSFER_TOOL_STANDARD: "Inaktiv"
 RULE_OPTION_STATE_TRANSFER_TOOL_STANDARD_DESC: "Das State & Country Transfer Tool ist deaktiviert, und es ist keine Benutzeroberfläche dafür sichtbar. Beachten Sie, dass dies keine Auswirkung hat, wenn die Debug-Option im HoI4-Startprogramm eingestellt ist - wenn dies der Fall ist, kann das Staat-Transfer-Tool immer durch die Debug-Entscheidung aktiviert werden."
 RULE_OPTION_STATE_TRANSFER_TOOL_ACTIVE: "Aktiv"
 RULE_OPTION_STATE_TRANSFER_TOOL_ACTIVE_DESC: "Die Einzelspielerversion des State & Country Transfer Tools ist standardmäßig aktiv sein und seine benutzerdefinierte GUI sichtbar, wenn ein beliebiger Staat angeklickt wird (es sei denn, sie wird mit Ctrl-S aus der Ansicht entfernt oder durch die Debug-Entscheidung deaktiviert). Dadurch können Staaten zwischen allen bestehenden Ländern übertragen und alle Kerne hinzugefügt oder entfernt werden.\n\n§RBenutzung auf eigene Gefahr!§!"
 RULE_OPTION_STATE_TRANSFER_TOOL_MULTIPLAYER: "Multiplayer - Standard"
 RULE_OPTION_STATE_TRANSFER_TOOL_MULTIPLAYER_DESC: "Diese Mehrspieler-Version des Tools für die Übertragung von Staaten und Ländern ist standardmäßig aktiv. Sie funktioniert wie die Einzelspielerversion, mit der Ausnahme, dass nur Zustände markiert werden können, die dem Spieler oder einer seiner Marionetten gehören (wobei einige Marionetten in Situationen, in denen sie sich später im Spiel gegen den Spieler auflehnen könnten, nicht in Frage kommen), und keine Kerne hinzugefügt oder entfernt werden können.\n\n§RBenutzung auf eigene Gefahr!§!"
 RULE_OPTION_STATE_TRANSFER_TOOL_MP_NO_SUBJECT: "Multiplayer - Keine Untertanen übertragung"
 RULE_OPTION_STATE_TRANSFER_TOOL_MP_NO_SUBJECT_DESC: "Funktioniert genauso wie die Multiplayer-Version, nur dass keine Untertanenstaaten markiert werden können.\n\n§Benutzung auf eigene Gefahr!§!"
 
 # El Daddys allgemeine Grundsätze für Spielregeln / Länderpfade
 # Pfadregeln
 # Jede Änderung der Ideologie sollte durch TAG_PATH-Regeln und Optionen zugänglich sein.
 # Diese Regeln sollten immer _PATH heißen, wobei jede Option nach der jeweiligen Ideologie benannt ist.
 # Wenn es mehr als einen Führer pro Ideologie gibt und diese einen eindeutigen Inhalt haben, rufen Sie die Option TAG_PATH_SURNAME_IDEOLOGY auf, wenn der Nachname unterschiedlich ist und es angemessen ist, ihn zu verwenden.
 #        Die Namen der Pfadregeloptionen sollten eher informelle Namen der Partei sein als formelle Namen, sofern vorhanden, oder eher poetische/erzählerische Namen, solange diese nicht an anderer Stelle verwendet werden.
 #        Vermeiden Sie es, Pfadregeloptionen "Liberale Partei gewinnt" oder ähnlich zu benennen, eine solche Option wäre "Liberale". Vermeiden Sie es auch, die Pfadregeloptionen nach Nationalgeistern, nationalen Schwerpunkten oder Ereignissen zu benennen.
 # Versuchen Sie in der Optionsbeschreibung, die politische Partei mit ihrem vollständigen Namen in ihrer Landessprache als ideologisch gefärbten Teil des Textes zu bezeichnen.
 # Im Text folgt dann die englische Übersetzung des vollständigen Namens in weißer Schrift.
 #        Versuchen Sie, die Namen der politischen Parteien selbst für den farbigen Text zu priorisieren, sofern möglich.
 #        Der Text für die Optionsbeschreibungen sollte immer im Präsens und immer in der dritten Person geschrieben werden.
 #        Vermeiden Sie Formulierungen wie "Der Vorsitzende wird xyz tun", "versucht", "beschließt" oder "war", wenn dies möglich ist, da sie nur Platz verschwenden.
 # Optionen für den Wechsel des Länderchefs, die keinen eindeutigen Inhalt und keine Änderung der Ideologie haben, sollten im Allgemeinen vermieden werden, mit Ausnahme einiger weniger Fälle.
 #        Wenn es Regeln für eine Partei gibt, die verschiedene Anführer haben kann (z. B. "Republikaner – William Borah"), oder wenn ein Pfad verschiedene Unterpfade mit Regeln hat (z. B. "Wiedervereinigung – Schattenpräsident"), verwenden Sie Bindestriche.
 #        Wenn es Regeln für eine Partei gibt, die verschiedene interne Fraktionen oder Gruppierungen hat, verwenden Sie Klammern (z. B. "Konservative (autoritär)").
 # Forpol-Regeln
 # Alle Fraktions-/Ausrichtungsoptionen sollten unter allen Umständen eine TAG_FORPOL-Regel haben, wobei die Regel im Code so heißen und im Text „Demonym Foreign Policy“ stehen sollte.
 # Die Namen dieser Optionen sollten einfach nach der jeweiligen Fraktion benannt werden, z.B. „Reichspakt“, nicht „Align with Germany“. Dies sollten niemals narrative Namen sein.
 # Entsprechend sollte der Code der Regel TAG_FORPOL_INT, TAG_FORPOL_GER, TAG_FORPOL_ENT, etc. lauten.
 #        Der Text für die Optionsbeschreibungen sollte ebenfalls in der dritten Person und im Präsens verfasst sein.on and present tense.
 # Regel-Einschränkungen
 # Generell sollten die Regeln einem Land erlauben, den Zufall zu umgehen, so dass die Spieler bestimmen können, welche Option ein KI-geführtes Land wählen wird.
 # Eine Spielregel-Option sollte jedoch nur dann existieren, wenn die KI in der Lage ist, diese bestimmte Option unter Standardbedingungen ohne aktivierte Regeln zu wählen.
 # Wenn zum Beispiel ein bestimmter Pfad für ein Land niemals einer bestimmten Fraktion beitritt, dann sollte die Spielregel TAG_FORPOL dies nicht zulassen.
 # Dies gilt für alle Variablen, die bereits berücksichtigt werden und ihre eigenen Regeln haben. Bei anderen Bedingungen, für die es keine Spielregeln gibt, kann es eine gewisse Nachsicht geben.
 # Ohne Spielregeln kann ein Land zum Beispiel nicht einer anderen Fraktion beitreten, wenn der Anführer dieser Fraktion einen bestimmten Prozentsatz an Kapitulationsfortschritt hat. Durch die Spielregeln der Fraktionen kann dies umgangen werden, da es keine Regel für Kapitulationsanforderungen gibt.
 # Einige Ausnahmen werden für die „Boosted“-Regeln gemacht, da die anderen Länder, die zu diesen Fraktionen eingeladen werden können, immer einer anderen Fraktion beigetreten sein können, wenn diese Regel gewählt wird.
 # Da der Inhalt, um diese Länder in die Fraktion einzuladen, diese Länder berücksichtigt, aber der Inhalt der Länder selbst dies nicht berücksichtigt, kann das Verhalten der KI unter diesen Umständen anders geändert werden.
 # Wenn nicht ausdrücklich anders angegeben, sollten Spielregeln nicht auf das Land wirken, als das man spielt, oder auf teilnehmende Länder in Mehr-Länder-Inhalten. Damit soll verhindert werden, dass Minispiele gecheest werden.
 # Es sollte auch keine Spielregeln für interne Inhalte geben, die keinen Einfluss auf den Anführer, die Ideologie oder die Außenpolitik haben.
 # Es besteht also kein Bedarf an Spielregeln für sich gegenseitig ausschließende Unterzweige von z.B. Wirtschafts- oder Militärbäumen.
 # Regelanforderungen
 # Im Abschnitt „Anforderungen“ sollten sie im Allgemeinen durch doppelte Zeilenumbrüche/Leerzeilen in drei Kategorien unterteilt werden, sofern zutreffend.
 # Die erste Kategorie sind Anforderungen an die Erzählung/Ereignisse, die zweite die Anforderungen, dass andere Spielregeln aktiv sind, und die dritte die Anforderungen, dass andere Spielregeln nicht aktiv sind.
 # In Fällen, in denen Ereignisse und Optionen einer bestimmten zeitlichen Abfolge folgen, gibt es hier einen gewissen Spielraum.
 # Alle potenziellen Regeloptionen, die für das Funktionieren einer anderen Regeloption erforderlich sind, sollten einzeln aufgeführt werden, es sei denn, eine solche Regeloption wird bereits in den Anforderungen einer anderen erwähnten Regel erwähnt.

### Länderpfade - Nordamerika ###
RULE_GROUP_KAISERREICH_RULES_NORTH_AMERICA: "Länderpfade - Nordamerika"

CAN_PATH: "£KR_game_rule_flag_CAN   Erste Tochter des Kaiserreichs"
RULE_OPTION_CAN_PATH_RANDOM: "Standard"
 RULE_OPTION_CAN_PATH_RANDOM_DESC: "Seit der britischen Revolution durchlebt Kanada turbulente Zeiten, und seine politische Zukunft ist ungewiss.\nWährend sich die Liberalen und Konservativen auf die bevorstehenden Wahlen konzentrieren, agitieren die Unionisten und die britische Exilregierung für mehr Maßnahmen gegen das Londoner Regime, und die Spannungen in Québec erreichen ihren Siedepunkt."
RULE_OPTION_CAN_PATH_MARLIB: "£KR_game_rule_flag_CAN   Liberale"
RULE_OPTION_CAN_PATH_MARLIB_DESC: "Die §mLiberale Partei Kanadas§! unter der Führung von Mackenzie King gewinnt die kanadischen Wahlen 1936, verabschiedet den Gesetzentwurf 7 und behält ihre Machtposition.\nNach dem Weltkrieg tritt King zurück, und die progressivere Strömung innerhalb der §Liberalen Partei Kanadas§! gewinnt an Bedeutung und behält bei den Nachkriegswahlen die Macht."
RULE_OPTION_CAN_PATH_SOCCON: "£KR_game_rule_flag_CAN   Konservative"
RULE_OPTION_CAN_PATH_SOCCON_DESC: "Die §cKonservative Partei Kanadas§! unter der Führung von Robert Manion gewinnt die kanadischen Wahlen von 1936 und sichert damit die Dominanz der gemäßigten Tories innerhalb der Partei sowie die Beibehaltung einer geschickten Handhabung der eskalierenden Spannungen in Québec."
RULE_OPTION_CAN_PATH_AUTDEM: "£KR_game_rule_flag_CAN   Unionisten"
 RULE_OPTION_CAN_PATH_AUTDEM_DESC: "$RULE_OPTION_CAN_PATH_AUT_DESC$ stellt die §aUnionistische Partei von Kanada§ wieder her und bildet schließlich eine breite Koalition zwischen Hardlinern, Gemäßigten und liberalen Unionisten innerhalb der Partei.\n$RULE_OPTION_CAN_PATH_AUT_END_DESC$"
 RULE_OPTION_CAN_PATH_AUT_DESC: "In einer großen parlamentarischen Überraschung wird Gesetzentwurf 7 nicht verabschiedet, was zum Zusammenbruch der Regierung und zu Neuwahlen führt. Die Konservativen unter ihrem neuen Vorsitzenden RB Bennet gehen als Sieger hervor. Als Reaktion auf die Krise in Québec wird Bennet als Premierminister abgesetzt. Sein Nachfolger"
 RULE_OPTION_CAN_PATH_AUT_END_DESC: "Nach dem Krieg wird unter den Konservativen wieder eine zivile Regierung eingesetzt."
 RULE_OPTION_CAN_PATH_PATAUT: "£KR_game_rule_flag_CAN  Exilanten"
 RULE_OPTION_CAN_PATH_PATAUT_DESC: "$RULE_OPTION_CAN_PATH_AUT_DESC$ stellt die Unionistische Partei wieder her, was letztendlich zur Stärkung der §Britischen Exilregierung§ führt!\n$RULE_OPTION_CAN_PATH_AUT_END_DESC$"
 RULE_OPTION_CAN_PATH_SOCDEM: "£KR_game_rule_flag_CAN  CCF"
 RULE_OPTION_CAN_PATH_SOCDEM_DESC: "Die Liberalen gewinnen die kanadischen Wahlen von 1936, verabschieden das Gesetz Nr. 7 und behalten ihre Machtposition.\nNach dem Weltkrieg und dem Rücktritt des Parteivorsitzenden JS Woodsworth kommt die §SKo-Operative Commonwealth Federation§! an die Macht. Der Farmer-Labour-Flügel der Partei führt eine Koalition zwischen der CCF und den Liberalen an.$GBR_PATH_REQUIREMENTS$"
 RULE_OPTION_CAN_PATH_NATPOP: "£KR_game_rule_flag_CAN_rep  Sozialkredit"
 RULE_OPTION_CAN_PATH_NATPOP_DESC: "Die Maßnahmen von $RULE_OPTION_CAN_PATH_AUT_DESC$ führten letztendlich zur Stärkung der britischen Exilregierung und entfremdeten die Bevölkerung von ihren vermeintlichen Verbündeten.\nNach dem Krieg und der Ausrufung der Republik kommt die §Sozialkreditpartei Kanadas§! an die Macht und bildet eine Koalition mit den Konservativen.\n\n§RBenötigt:§!\n§CTrennung von der Monarchie§! in §Y$CAN_REFERENDUM$§!"

CAN_KING: "£KR_game_rule_flag_CAN   Die Britische Monarchie"
RULE_OPTION_CAN_KING_RANDOM: "Standard"
RULE_OPTION_CAN_KING_RANDOM_DESC: "Die Britische Krone fällt wie immer an Prinz Edward, und ob sie bei ihm bleibt, hängt von seiner Beliebtheit und der Stärke seiner Anhänger ab."
RULE_OPTION_CAN_KING_EDWARD: "£KR_game_rule_flag_CAN   König Edward VIII"
RULE_OPTION_CAN_KING_EDWARD_DESC: "Die Britische Krone fällt an Prinz Edward und bleibt bei ihm. Er dankt nie vom Thron ab."
RULE_OPTION_CAN_KING_ABDICATES: "£KR_game_rule_flag_CAN   König Edward VIII. dankt ab"
RULE_OPTION_CAN_KING_ABDICATES_DESC: "Die Britische Krone fällt an Prinz Edward, aber er dankt schließlich ab (vorausgesetzt, es liegen Bedingungen vor, unter denen eine Abdankung möglich ist). An welchen seiner Brüder die Krone dann weitergegeben wird, hängt vom Schicksal ab."
 RULE_OPTION_CAN_KING_NOT_EDWARD_START_DESC: "Sobald König Edward den Thron abdankt, vorausgesetzt, dass die Voraussetzungen für eine Abdankung gegeben sind, fällt die Krone an"
RULE_OPTION_CAN_KING_ALBERT: "£KR_game_rule_flag_CAN   König Albert I"
RULE_OPTION_CAN_KING_ALBERT_DESC: "$RULE_OPTION_CAN_KING_NOT_EDWARD_START_DESC$ Prinz Albert, seinen ältesten Bruder und den mutmaßlichen Erben."
RULE_OPTION_CAN_KING_HENRY: "£KR_game_rule_flag_CAN   König Henry IX"
RULE_OPTION_CAN_HENRY_DESC: "$RULE_OPTION_CAN_KING_NOT_EDWARD_START_DESC$ Prinz Henry, seinen zweitältesten Bruder und einen Mann mit beträchtlicher militärischer Erfahrung."
RULE_OPTION_CAN_KING_GEORGE: "£KR_game_rule_flag_CAN   König Georg VI"
RULE_OPTION_CAN_KING_GEORGE_DESC: "$RULE_OPTION_CAN_KING_NOT_EDWARD_START_DESC$ Prinz George, sein jüngster Bruder, der bereits selbst einen Sohn hat. Prinz George stirbt niemals bei einem Flugzeugabsturz."

CAN_ACW_NEW_ENGLAND: "£KR_game_rule_flag_CAN   £KR_game_rule_flag_NEE   Die Neuengland-Frage"
 CAN_ACW_NEW_ENGLAND_START_DESC: "Bei Ausbruch des Zweiten Amerikanischen Bürgerkriegs, wird Kanada"
 RULE_OPTION_CAN_ACW_NEW_ENGLAND_RANDOM: "Standard"
 RULE_OPTION_CAN_ACW_NEW_ENGLAND_RANDOM_DESC: "$CAN_ACW_NEW_ENGLAND_START_DESC$ entscheiden, ob es in Neuengland intervenieren und dort eine verbündete Regierung bilden will oder nicht."
 RULE_OPTION_CAN_ACW_NEW_ENGLAND_FORM: "£KR_game_rule_flag_NEE   £KR_game_rule_flag_CAN   Bildung Neu England"
 RULE_OPTION_CAN_ACW_NEW_ENGLAND_FORM_DESC: "$CAN_ACW_NEW_ENGLAND_START_DESC$ definitiv in Neuengland intervenieren und eine verbündete Regierung bilden."
 RULE_OPTION_CAN_ACW_NEW_ENGLAND_NOT_FORM: "Neuengland besetzen"
 RULE_OPTION_CAN_ACW_NEW_ENGLAND_NOT_FORM_DESC: "$CAN_ACW_NEW_ENGLAND_START_DESC$ definitiv in Neuengland intervenieren, aber es wird sich dafür entscheiden, das Gebiet zu besetzen, anstatt eine verbündete Regierung zu bilden."
 RULE_OPTION_CAN_ACW_NEW_ENGLAND_NOT_TAKE: "£KR_game_rule_flag_CAN   Neuengland meiden"
 RULE_OPTION_CAN_ACW_NEW_ENGLAND_NOT_TAKE_DESC: "$CAN_ACW_NEW_ENGLAND_START_DESC$ sich weigern, in Neuengland überhaupt zu intervenieren."

 CAN_ACW_ALASKA: "£KR_game_rule_flag_CAN  Die Alaska Frage"
 RULE_OPTION_CAN_ACW_ALASKA_RANDOM: "Standard"
 RULE_OPTION_CAN_ACW_ALASKA_RANDOM_DESC: "Alaska, die letzte Grenze Amerikas, repräsentiert die ungestörte Schönheit einer Nation, die jetzt tief gestört ist. Gouverneur Troy wendet sich im Namen seiner mageren Bevölkerung an Kanada, ein Leuchtfeuer des Friedens, das seinen Staat bewahren und den Krieg abwenden könnte. Zumindest für eine gewisse Zeit..."
 RULE_OPTION_CAN_ACW_ALASKA_INTERVENE: "£KR_game_rule_flag_CAN  Intervention"
 RULE_OPTION_CAN_ACW_ALASKA_INTERVENE_DESC: "Kanada akzeptiert die Schutzgesuche seines Nachbarn und sieht sich als Beschützer der nordamerikanischen Länder vor dem Chaos auf der Erde.\n\n§RBenötigt:§!\n§RNicht§! §CNew England meiden§! in §Y$CAN_ACW_NEW_ENGLAND$§!"
 RULE_OPTION_CAN_ACW_ALASKA_NO_INTERVENE: "£KR_game_rule_flag_USA  £KR_game_rule_flag_ACC  Keine Intervention"
 RULE_OPTION_CAN_ACW_ALASKA_NO_INTERVENE_DESC: "Obwohl die Versuchung groß ist, einzugreifen, ist das Risiko, den Zorn der Vereinigten Staaten zu erregen, keinen weiteren fruchtlosen arktischen Wald wert. Alaska muss sich selbst schützen."

CAN_ACW_SUPPORT: "£KR_game_rule_flag_CAN   Die Interventionsdebatte"
RULE_OPTION_CAN_ACW_SUPPORT_RANDOM: "Standard"
RULE_OPTION_CAN_ACW_SUPPORT_RANDOM_DESC: "$CAN_ACW_NEW_ENGLAND_START_DESC$, wird Kanada entscheiden, welchen Teilnehmer es, wenn überhaupt, zu unterstützen bereit ist."
RULE_OPTION_CAN_ACW_SUPPORT_USA: "£KR_game_rule_flag_CAN  £KR_game_rule_flag_USA   Unterstützung der Föderalregierung"
RULE_OPTION_CAN_ACW_SUPPORT_USA_DESC: "$CAN_ACW_NEW_ENGLAND_START_DESC$ sich immer für die Unterstützung der Föderalregierung entscheiden."
RULE_OPTION_CAN_ACW_SUPPORT_ACC: "£KR_game_rule_flag_CAN  £KR_game_rule_flag_ACC   Unterstützen Sie die Konstitutionelle Koalition"
RULE_OPTION_CAN_ACW_SUPPORT_ACC_DESC: "$CAN_ACW_NEW_ENGLAND_START_DESC$ entscheidet sich immer dafür, die Amerikanische Konstitutionelle Koalition zu unterstützen, sofern diese existiert. Wenn es keine Konstitutionelle Regierung gibt, entscheidet sich Kanada dafür, niemanden zu unterstützen.$USA_MARCARTHUR_WAR_PLAN_REQUIREMENTS$"
 RULE_OPTION_CAN_ACW_SUPPORT_NEE: "£KR_game_rule_flag_CAN  £KR_game_rule_flag_NEE  Unterstützen Sie Neu England"
 RULE_OPTION_CAN_ACW_SUPPORT_NEE_DESC: "$CAN_ACW_NEW_ENGLAND_START_DESC$ entscheidet sich immer dafür, New England zu unterstützen, sofern es existiert. Wenn New England nicht existiert, entscheidet sich Kanada dafür, niemanden zu unterstützen.\n\n§RBenötigt:§!\n§CBildung Neu England§! in §Y$CAN_ACW_NEW_ENGLAND$§!"
RULE_OPTION_CAN_ACW_SUPPORT_APG: "£KR_game_rule_flag_CAN  £KR_game_rule_flag_APG   Unterstützen Sie die Longistische Regierung"
RULE_OPTION_CAN_ACW_SUPPORT_APG_DESC: "$CAN_ACW_NEW_ENGLAND_START_DESC$ entscheidet sich immer dafür, die Amerikanische Volksregierung zu unterstützen, sofern diese existiert. Wenn es keine Longisten-Regierung gibt, entscheidet sich Kanada dafür, niemanden zu unterstützen.\n\n§RBenötigt:§!\n§RKeinen§! §CKompromiss mit Long erreicht§! in §Y$USA_CIVIL_WAR$§!"
RULE_OPTION_CAN_ACW_SUPPORT_NONE: "£KR_game_rule_flag_CAN   Unterstütze niemanden"
RULE_OPTION_CAN_ACW_SUPPORT_NONE_DESC: "$CAN_ACW_NEW_ENGLAND_START_DESC$ beschließen, keinen Teilnehmer zu unterstützen."

 CAN_ACW_INTERVENE: "£KR_game_rule_flag_CAN  Augen auf den Süden"
 RULE_OPTION_CAN_ACW_INTERVENE_RANDOM: "Standard"
 RULE_OPTION_CAN_ACW_INTERVENE_RANDOM_DESC: "Kanada kann allein dem Arbeiter-Kongress von Amerika den Krieg erklären oder militärisch zugunsten eines von ihm ausgewählten Teilnehmers intervenieren, falls es einen solchen unterstützt."
 RULE_OPTION_CAN_ACW_INTERVENE_DIRECT: "£KR_game_rule_flag_CAN  £KR_game_rule_flag_USA  £KR_game_rule_flag_ACC  £KR_game_rule_flag_NEE  £KR_game_rule_flag_APG  Direkte Intervention"
 RULE_OPTION_CAN_ACW_INTERVENE_DIRECT_DESC: "Kanada versucht nur dann, in den Zweiten Amerikanischen Bürgerkrieg zugunsten seines bevorzugten Teilnehmers einzugreifen, wenn die Bedingungen dafür günstig sind.\n\n§RBenötigt:§!\n§RNicht§! §CUnterstütze niemanden§! in §Y$CAN_ACW_SUPPORT$§!"
 RULE_OPTION_CAN_ACW_INTERVENE_DECLARE_WCA: "£KR_game_rule_flag_CAN  £KR_game_rule_flag_WCA  Krieg mit dem Arbeiter-Kongress"
 RULE_OPTION_CAN_ACW_INTERVENE_DECLARE_WCA_DESC: "Kanada erklärt nur dann dem Arbeiterkongress von Amerika den Krieg, wenn dieser existiert und die Bedingungen dafür günstig sind.\n\n§RBenötigt:§!\n§RNicht§! §CBildung Neu-England§! in §Y$CAN_ACW_NEW_ENGLAND$§!"
 RULE_OPTION_CAN_ACW_INTERVENE_NO: "£KR_game_rule_flag_CAN  Nicht intervenieren"
 RULE_OPTION_CAN_ACW_INTERVENE_NO_DESC: "Kanada erklärt keinem Teilnehmer des Zweiten Amerikanischen Bürgerkriegs jemals den Krieg."

CAN_HALIFAX: "£KR_game_rule_flag_CAN  £KR_game_rule_flag_GER   Die Konferenz von Halifax"
 RULE_OPTION_CAN_HALIFAX_START_DESC: "Wenn sowohl die Entente als auch der Reichspakt mit der Dritten Internationale im Krieg stehen, treffen sie sich und prüfen, ob sie sich auf eine Zusammenarbeit einigen können – und die"
RULE_OPTION_CAN_HALIFAX_RANDOM: "Standard"
RULE_OPTION_CAN_HALIFAX_RANDOM_DESC: "$RULE_OPTION_CAN_HALIFAX_START_DESC$ Die Ergebnisse werden durch den Zufall und die verschiedenen Anforderungen bestimmt."
RULE_OPTION_CAN_HALIFAX_ENT: "£KR_game_rule_flag_CAN   Die Entente begünstigen"
RULE_OPTION_CAN_HALIFAX_ENT_DESC: "$RULE_OPTION_CAN_HALIFAX_START_DESC$ Der Reichspakt gibt jedem Widerstand der Entente nach, um eine Einigung zu erzielen."
RULE_OPTION_CAN_HALIFAX_GER: "£KR_game_rule_flag_GER   Den Reichspakt begünstigen"
RULE_OPTION_CAN_HALIFAX_GER_DESC: "$RULE_OPTION_CAN_HALIFAX_START_DESC$ Die Entente gibt jedem Widerstand des Reichspakts nach, um eine Einigung zu erzielen."
 RULE_OPTION_CAN_HALIFAX_FAIL: "£KR_game_rule_flag_CAN  £KR_game_rule_flag_GER  Die Konferenz scheitert"
 RULE_OPTION_CAN_HALIFAX_FAIL_DESC: "Wenn sowohl die Entente als auch der Reichspakt sich im Krieg mit der Dritten Internationale befinden, lehnt Deutschland das Angebot der Entente ab, sich zu treffen und Bedingungen zu besprechen."

 CAN_REFERENDUM: "£KR_game_rule_flag_CAN   Das Kanadisches Referendum"
 RULE_OPTION_CAN_REFERENDUM_RANDOM: "Standard"
 RULE_OPTION_CAN_REFERENDUM_RANDOM_DESC: "Der König ist zwar auf die Heimatinseln zurückgekehrt, doch aufgrund der Strapazen des jüngsten Krieges ist die kanadische Gesellschaft stark gespalten. Immer mehr Menschen sprechen davon, das Empire zu verlassen und Kanada solle selbst über sein Schicksal entscheiden."
 RULE_OPTION_CAN_REFERENDUM_EMPIRE: "£KR_game_rule_flag_CAN   Bleiben Sie im Empire"
 RULE_OPTION_CAN_REFERENDUM_EMPIRE_DESC: "Canada remains in the Empire, considering it to be its duty.$GBR_PATH_REQUIREMENTS$"
 RULE_OPTION_CAN_REFERENDUM_REP: "£KR_game_rule_flag_CAN_rep   Beziehungen zur Monarchie abbrechen"
 RULE_OPTION_CAN_REFERENDUM_REP_DESC: "Kanada bricht mit Großbritannien und erklärt sich zur Republik.$GBR_PATH_REQUIREMENTS$"

 USA_ELECTION: "£KR_game_rule_flag_USA  1936 Wahlen in den Vereinigten Staaten"
 RULE_OPTION_USA_ELECTION_RANDOM: "Standard"
 RULE_OPTION_USA_ELECTION_RANDOM: "Nach acht Jahren unruhiger Malaise unter Al Smith schien es für viele so, als würde sich die Wirtschaft der Vereinigten Staaten nach dem Wall Street Crash von 1925 endlich erholen. Der Schwarze Montag hat diesen Hoffnungen ein Ende gesetzt und die Totenglocke für eine bereits angeschlagene Wirtschaft geläutet.\n\nWährend die Demokraten ins Straucheln geraten, versprechen beide Republikanischen Kandidaten, die Lage wieder in Ordnung zu bringen, doch das Vertrauen der Öffentlichkeit in das System schwindet rapide. Sowohl Farm-Arbeiter als auch Long wettern heftig gegen die korrupten Bank- und Politikkreise, denen sie die Schuld für den Crash geben. Da kein Kandidat die bevorstehende Wahl direkt gewinnen kann, wird der zweiunddreißigste Präsident in einer Stichwahl im Repräsentantenhaus gewählt."
 RULE_OPTION_USA_ELECTION_BORAH: "£KR_game_rule_flag_USA  Republikaner - William Borah"
 RULE_OPTION_USA_ELECTION_BORAH_DESC: "Der Kandidat der §mRepublikanischen Partei§!, William Borah, gewinnt die Kontingentwahlen"
 RULE_OPTION_USA_ELECTION_LANDON: "£KR_game_rule_flag_USA  Republikaner - Alf Landon"
 RULE_OPTION_USA_ELECTION_LANDON_DESC: "Der Kandidat der §mRepublikanischen Partei§!, Alf Landon, gewinnt die Kontingentwahlen."
 RULE_OPTION_USA_ELECTION_OLSON: "£KR_game_rule_flag_USA  Farm-Arbeiter - Floyd Olson"
 RULE_OPTION_USA_ELECTION_OLSON_DESC: "Der Kandidat der §SFarm-Arbeiter Partei§, Floyd Olson, gewinnt die Wahl."
 RULE_OPTION_USA_ELECTION_LONG: "£KR_game_rule_flag_USA  Unionspartei - Huey Long"
 RULE_OPTION_USA_ELECTION_LONG_DESC: "Der Kandidat der §nUnionspartei§!, Huey Long, gewinnt die Kontingentwahlen."
 RULE_OPTION_USA_ELECTION_HULL: "£KR_game_rule_flag_USA  Demokraten - Cordell Hull"
 RULE_OPTION_USA_ELECTION_HULL_DESC: "Da kein Kandidat die Wahl gewinnen kann, wird Außenminister Cordell Hull von der §IDemokratischen Partei§! zum amtierenden Präsidenten ernannt."
 
 USA_CIVIL_WAR: "£KR_game_rule_flag_USA   Zweiter Amerikanischer Bürgerkrieg"
RULE_OPTION_USA_CIVIL_WAR_RANDOM: "Standard"
RULE_OPTION_USA_CIVIL_WAR_RANDOM_DESC: "Der Präsidentschaftswahlkampf war von Spaltungen geprägt, und nur eines ist sicher: Für Amerika zeichnet sich erneut ein Krieg ab."
RULE_OPTION_USA_CIVIL_WAR_FOUR_SIDES: "£KR_game_rule_flag_USA  £KR_game_rule_flag_WCA  £KR_game_rule_flag_APG  £KR_game_rule_flag_ACC   Bürgerkrieg mit MacArthur"
RULE_OPTION_USA_CIVIL_WAR_FOUR_SIDES_DESC: "Der Präsident verliert an Unterstützung, und General Douglas MacArthur übernimmt die Verantwortung dafür, \"das Land vor extremistischen Kräften zu schützen, bevor es zu spät ist\", als er in Washington, D.C. einmarschiert.\n\nAls Reaktion auf diesen Akt des \"Verrats\" greifen die Sozialistische Partei, Huey Long und die American Constitutional Coalition einzeln zu den Waffen gegen die Bundesregierung und weigern sich, die Autorität einer der konkurrierenden Regierungen anzuerkennen.\n\nIn der Folge verfallen die Vereinigten Staaten in einen Bürgerkrieg."
RULE_OPTION_USA_CIVIL_WAR_THREE_SIDES: "£KR_game_rule_flag_USA  £KR_game_rule_flag_WCA  £KR_game_rule_flag_APG   Bürgerkrieg ohne MacArthur"
RULE_OPTION_USA_CIVIL_WAR_THREE_SIDES_DESC: "Obwohl es Alf Landon gelingt, das Establishment zur Verabschiedung seines Gesetzesvorhabens zu bewegen, bleiben die Radikalen unzufrieden, da sowohl die Sozialistische Partei als auch Huey Long gegen die Bundesregierung zu den Waffen greifen und sich weigern, die Autorität einer der konkurrierenden Regierungen anzuerkennen.\n\nDie Folge ist, dass die Vereinigten Staaten in einen Bürgerkrieg verfallen.\n\n§RBenötigt:§!\n§CRepublikaner - Alf Landon§! in §Y$USA_ELECTION$§!"
RULE_OPTION_USA_CIVIL_WAR_TWO_SIDES: "£KR_game_rule_flag_USA  £KR_game_rule_flag_WCA   Bürgerkrieg ohne MacArthur und Long"
RULE_OPTION_USA_CIVIL_WAR_TWO_SIDES_DESC: "William Borah, der sich seinen Ruf als politischer Außenseiter zunutze macht, schafft es, ein Abkommen durchzusetzen, das den Süden im Lager der Bundesregierung hält. Obwohl sein \"Fair Deal\" einige Radikale zufrieden stellt, erhebt sich die Arbeiterbewegung dagegen, und John Reed und die SPA greifen zu den Waffen gegen die Bundesregierung.\n\nDie Vereinigten Staaten versinken in einem Bürgerkrieg.\n\n§RBenötigt:§!\n§CRepublikaner – William Borah§! in §Y$USA_ELECTION$§!"

 USA_MARCARTHUR_WAR_PLAN: "£KR_game_rule_flag_USA   Kriegsplan Weiß"
 USA_MARCARTHUR_WAR_PLAN_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CBürgerkrieg mit MacArthur§! in §Y$USA_CIVIL_WAR$§!"
RULE_OPTION_USA_MARCARTHUR_WAR_PLAN_RANDOM: "Standard"
RULE_OPTION_USA_MARCARTHUR_WAR_PLAN_RANDOM_DESC: "Sollte er an die Macht kommen, wählt General MacArthur einen der verfügbaren Kriegspläne aus."
RULE_OPTION_USA_MARCARTHUR_WAR_PLAN_YORKTOWN: "£KR_game_rule_flag_USA   Kriegsplan Weiß: Yorktown"
RULE_OPTION_USA_MARCARTHUR_WAR_PLAN_YORKTOWN_DESC: "General MacArthur evakuiert den Westen und verschanzt sich in Washington, D.C.$USA_MARCARTHUR_WAR_PLAN_REQUIREMENTS$"
RULE_OPTION_USA_MARCARTHUR_WAR_PLAN_SAN_JACINTO: "£KR_game_rule_flag_USA   £KR_game_rule_flag_USA   Kriegsplan Weiß: San Jacinto"
RULE_OPTION_USA_MARCARTHUR_WAR_PLAN_SAN_JACINTO_DESC: "General MacArthur evakuiert den Osten und setzt auf einen Enthauptungsschlag gegen die pazifischen Staaten von Amerika, bevor er nach Osten zurückkehrt.$USA_MARCARTHUR_WAR_PLAN_REQUIREMENTS$"
RULE_OPTION_USA_MARCARTHUR_WAR_PLAN: "£KR_game_rule_flag_USA   Kriegsplan Weiß"
RULE_OPTION_USA_MARCARTHUR_WAR_PLAN_DESC: "General MacArthur evakuiert keines der Bundesgebiete und schwört, keinen weiteren Zentimeter Land an die Rebellen abzutreten.$USA_MARCARTHUR_WAR_PLAN_REQUIREMENTS$"

 USA_CEASEFIRE: "£KR_game_rule_flag_USA  £KR_game_rule_flag_WCA  £KR_game_rule_flag_APG  £KR_game_rule_flag_ACC  Zweiter Amerikanischer Bürgerkrieg Waffenstillstand"
 USA_CEASEFIRE_REQUIREMENTS: "$USA_MARCARTHUR_WAR_PLAN_REQUIREMENTS$\n\n§CDie Amerikanische Konstitutionelle Koalition kontrolliert weder Maryland, Georgia noch Philadelphia und befindet sich im Krieg mit einem einzigen Teilnehmer des Zweiten Amerikanischen Bürgerkriegs, der Missouri kontrolliert, wobei beide Seiten weniger als 40 % Übergabefortschritt haben.§!\n\n§CWeder Kanada noch Mexiko greifen direkt in den Zweiten Amerikanischen Bürgerkrieg ein.§!"
 RULE_OPTION_USA_CEASEFIRE_RANDOM: "Standard"
 RULE_OPTION_USA_CEASEFIRE_RANDOM_DESC: "Wenn die Amerikanische Konstitutionelle Koalition weiterhin die westliche Hälfte Amerikas hält und sich nur mit einem weiteren Teilnehmer des Zweiten Amerikanischen Bürgerkriegs im Krieg befindet, können in Denver Verhandlungen über einen vorübergehenden Waffenstillstand geführt werden.\n\nDieser Waffenstillstand, der je nach dem von den einzelnen Fraktionen kontrollierten Gebiet entweder Rocky Mountain, Great Plains oder Mississippi genannt wird, kann als Katalysator für politische Entwicklungen in beiden beteiligten Fraktionen dienen und möglicherweise zu einer friedlichen Lösung des Konflikts führen."
 RULE_OPTION_USA_CEASEFIRE_YES: "£KR_game_rule_flag_USA  £KR_game_rule_flag_WCA  £KR_game_rule_flag_APG  £KR_game_rule_flag_ACC  Erfolgreiche Verhandlungen"
 RULE_OPTION_USA_CEASEFIRE_YES_DESC: "Sollten die Kriegsbedingungen Waffenstillstandsverhandlungen zulassen, sind diese erfolgreich und führen zu einer vorübergehenden Einstellung der Feindseligkeiten.$USA_CEASEFIRE_REQUIREMENTS$"
 RULE_OPTION_USA_CEASEFIRE_NO: "£KR_game_rule_flag_USA  £KR_game_rule_flag_WCA  £KR_game_rule_flag_APG  £KR_game_rule_flag_ACC  Verhandlungen scheitern"
 RULE_OPTION_USA_CEASEFIRE_NO_DESC: "Sollten die Kriegsbedingungen Waffenstillstandsverhandlungen zulassen, scheitern diese und der Krieg geht weiter.$USA_CEASEFIRE_REQUIREMENTS$"

 USA_MACARTHUR_PATH: "£KR_game_rule_flag_USA  Cäsar oder Cincinnatus"
 USA_MACARTHUR_PATH_REQUIREMENTS: "$USA_MARCARTHUR_WAR_PLAN_REQUIREMENTS$\n\n§CDie Militärverwaltung der Vereinigten Staaten gewinnt den Zweiten Amerikanischen Bürgerkrieg§! oder\n\n§CDie Amerikanische Konstitutionelle Koalition ist im Frieden mit der Militärregierung der Vereinigten Staaten§! und §CVerhandlungserfolg§! in §Y$USA_CEASEFIRE$§!"
 USA_MACARTHUR_PATH_ACC_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CDie Amerikanische Konstitutionelle Koalition ist im Frieden mit der Militärregierung der Vereinigten Staaten§!\n\n§CErfolgreiche Verhandlungen§! in §Y$USA_CEASEFIRE$§!"
 RULE_OPTION_USA_MACARTHUR_PATH_RANDOM: "Standard"
 RULE_OPTION_USA_MACARTHUR_PATH_RANDOM_DESC: "Sollte er den Bürgerkrieg gewinnen oder einen Waffenstillstand schließen, steht Douglas MacArthur vor einer schwierigen Entscheidung: Soll er als Präsident zurücktreten und für einen friedlichen Machtwechsel sorgen oder auf unbestimmte Zeit im Amt bleiben, um Amerika zu schützen."
 RULE_OPTION_USA_MACARTHUR_PATH_CAESAR: "£KR_game_rule_flag_USA   MacArthur bleibt im Amt"
 RULE_OPTION_USA_MACARTHUR_PATH_CAESAR_DESC: "Präsident MacArthur, der schwört, die Vereinigten Staaten nicht erneut dem bösartigen Einfluss derjenigen auszusetzen, die den Bürgerkrieg verursacht haben, nutzt seinen Einfluss beim §PU.S. Militär§!, um im Amt zu bleiben.$USA_MACARTHUR_PATH_REQUIREMENTS$"
 RULE_OPTION_USA_MACARTHUR_PATH_RESIGN_DESC: "Nachdem die Verräter besiegt sind, tritt MacArthur zugunsten eines Triumvirats zurück, das das Land bis zur nächsten Wahl führt."
 RULE_OPTION_USA_MACARTHUR_PATH_CINCINNATUS: "£KR_game_rule_flag_USA   MacArthur setzt einen Schattenpräsidenten ein"
 RULE_OPTION_USA_MACARTHUR_PATH_CINCINNATUS_DESC: "$RULE_OPTION_USA_MACARTHUR_PATH_RESIGN_DESC$\n\nEs ist von Anfang an klar, dass beide potenziellen Präsidenten, Arthur Vandenberg und John Nance Garner, MacArthurs Wünschen verpflichtet sind, der selbst mit der §mRepublikanischen Partei§ für das Präsidentenamt kandidiert! In folgenden Worten.$USA_MACARTHUR_PATH_REQUIREMENTS$"
 RULE_OPTION_USA_MACARTHUR_PATH_CINCINNATUS_PEACE: "£KR_game_rule_flag_USA  £KR_game_rule_flag_ACC  Wiedervereinigung - Schattenpräsident"
 RULE_OPTION_USA_MACARTHUR_PATH_CINCINNATUS_PEACE_DESC: "$RULE_OPTION_USA_MACARTHUR_PATH_RESIGN_DESC$\n\nDiese scheinbare Rückkehr zur Demokratie reicht aus, um die Amerikanische Konstitutionelle Koalition dazu zu bewegen, sich wieder mit der Bundesregierung zu vereinen, aber MacArthur bleibt die Macht hinter dem Präsidenten, egal ob Arthur Vandenberg oder John Nance Garner ins Amt kommt, bevor er später selbst für das Amt kandidiert.$USA_MACARTHUR_PATH_ACC_REQUIREMENTS$"
 RULE_OPTION_USA_MACARTHUR_PATH_CINCINNATUS_PEACE_PRISON: "£KR_game_rule_flag_USA  £KR_game_rule_flag_ACC  Wiedervereinigung - MacArthur in Gefangenschaft"
 RULE_OPTION_USA_MACARTHUR_PATH_CINCINNATUS_PEACE_PRISON_DESC: "$RULE_OPTION_USA_MACARTHUR_PATH_RESIGN_DESC$\n\nDie Amerikanische Konstitutionelle Koalition strebt daraufhin eine Wiedervereinigung mit der Bundesregierung auf dem Verhandlungswege an, unter der Bedingung, dass MacArthur wegen Hochverrats verhaftet wird. Diesem Antrag wird stattgegeben und die beiden Fraktionen vereinigen sich wieder.$USA_MACARTHUR_PATH_ACC_REQUIREMENTS$"
 RULE_OPTION_USA_MACARTHUR_PATH_CINCINNATUS_WAR: "£KR_game_rule_flag_USA  £KR_game_rule_flag_ACC  Fortsetzung des Krieges"
 RULE_OPTION_USA_MACARTHUR_PATH_CINCINNATUS_WAR_DESC: "$RULE_OPTION_USA_MACARTHUR_PATH_RESIGN_DESC$\n\nEs wird versucht, eine friedliche Wiedervereinigung zwischen der Bundesregierung und der Amerikanischen Konstitutionellen Koalition herbeizuführen, aber die Gespräche scheitern und der Krieg zwischen den beiden demokratischen Fraktionen wird wieder aufgenommen.$USA_MACARTHUR_PATH_ACC_REQUIREMENTS$"

 USA_PATH: "£KR_game_rule_flag_USA  Bundeswahlen"
 USA_PATH_REQUIREMENTS: "\n\n§RBenötigt:§!\nEinen §CCBürgerkrieg ohne MacArthur§! in §Y$USA_CIVIL_WAR$§! oder\n\n§CMacArthur installiert einen Schattenpräsidenten§! oder §CFortgesetzter Krieg§! oder eine §CWiedervereinigung§! in §Y$USA_MACARTHUR_PATH$§!"
 RULE_OPTION_USA_PATH_RANDOM: "Standart"
 RULE_OPTION_USA_PATH_RANDOM_DESC: "Die Wahlen von 1936 führten zum Ausbruch des Zweiten Amerikanischen Bürgerkriegs, aber für jede föderalistische Regierung gehen die Wahlen weiter, ebenso wie die Vorherrschaft der Republikaner und Demokraten.\n\nDie geplanten Wahlen können während des Krieges stattfinden, wenn MacArthur nicht die Kontrolle über Washington übernimmt, oder danach, wenn er dies tut und später zurücktritt."
 RULE_OPTION_USA_PATH_MARLIB: "£KR_game_rule_flag_USA  Republikaner"
 RULE_OPTION_USA_PATH_MARLIB_DESC: "Die §mRepublikanische Partei§! siegt bei den Wahlen von 1940 und danach.$USA_PATH_REQUIREMENTS$"
 RULE_OPTION_USA_PATH_SOCLIB: "£KR_game_rule_flag_USA  Demokraten (Liberale)"
 RULE_OPTION_USA_PATH_SOCLIB_DESC: "Die liberale Fraktion der §lDemokratische Partei§! ist bei jeder Wahl, an der sie teilnimmt, siegreich. Sollte Alf Landon der Amtsinhaber sein, können sie 1940 an die Macht kommen. Andernfalls werden sie in den späteren Wahlen gewählt, in denen sie einen Kandidaten aufstellen, und nicht erst bei den Wahlen von 1952, wenn ein Schattenpräsident an der Macht war.$USA_PATH_REQUIREMENTS$"
 RULE_OPTION_USA_PATH_SOCCON: "£KR_game_rule_flag_USA  Demokraten (Konservative)"
 RULE_OPTION_USA_PATH_SOCCON_DESC: "Die konservative Fraktion der §cDemokratische Partei§! ist bei jeder Wahl, an der sie teilnimmt, siegreich. Sollte jemand anderes als Alf Landon der Amtsinhaber sein, können sie 1940 an die Macht kommen. Andernfalls werden sie in den späteren Wahlen gewählt, bei denen sie einen Kandidaten aufstellen.$USA_PATH_REQUIREMENTS$"
 RULE_OPTION_USA_PATH_AUTDEM: "£KR_game_rule_flag_USA  Demokraten (Longisten)"
 RULE_OPTION_USA_PATH_AUTDEM_DESC: "Die autoritäre Fraktion der §aDemokratische Partei§! von Huey Long siegt bei den Wahlen von 1940 und danach.\n\n§RBenötigt:§!\n§CBürgerkrieg ohne MacArthur und Long§! in §Y$USA_CIVIL_WAR$§!"

 USA_FORPOL: "£KR_game_rule_flag_USA   Föderalistische Außenpolitik"
 USA_FORPOL_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CDie Bundesregierung der Vereinigten Staaten gewinnt den Zweiten Amerikanischen Bürgerkrieg§!"
 RULE_OPTION_USA_FORPOL_RANDOM: "Standard"
 RULE_OPTION_USA_FORPOL_RANDOM_DESC: "Nach dem Ende des Bürgerkriegs müssen die Amerikaner über ihre Zukunft auf der Weltbühne entscheiden."
 RULE_OPTION_USA_FORPOL_NEUT_END_DESC: "sieht ihr Land als Festung, die sie zu verteidigen versuchen."
 RULE_OPTION_USA_FORPOL_NEUT: "£KR_game_rule_flag_USA   Festung Amerika"
 RULE_OPTION_USA_FORPOL_NEUT_DESC: "Die Bundesregierung $RULE_OPTION_USA_FORPOL_NEUT_END_DESC$$USA_FORPOL_REQUIREMENTS$\n\n§RNicht§! §CMacArthur bleibt an der Macht§! in §Y$USA_MACARTHUR_PATH$§!\n§RKeine§! §CDemokraten (Longisten)§! in §Y$USA_PATH$§!\n§RKeine§! §CSUnterstützung der Bundesregierung§! in §Y$CAN_ACW_SUPPORT$§!"
 RULE_OPTION_USA_FORPOL_USA: "£KR_game_rule_flag_USA  Liga Amerikanischer Staaten"
 RULE_OPTION_USA_FORPOL_USA_DESC: "Die Vereinigten Staaten von Amerika $RULE_OPTION_USA_FORPOL_USA_END_DESC$$USA_FORPOL_REQUIREMENTS$\n\n§RKeine§! §CSUnterstützung der Bundesregierung§! in §Y$CAN_ACW_SUPPORT$§!"
 RULE_OPTION_USA_FORPOL_USA_END_DESC: "stellt die Monroe-Doktrin wieder her und gründet die Liga der amerikanischen Staaten."
 RULE_OPTION_USA_FORPOL_BOOSTED_USA: "£KR_game_rule_flag_USA  Liga Amerikanischer Staaten - Gestärkt"
 RULE_OPTION_USA_FORPOL_BOOSTED_USA_DESC: "$RULE_OPTION_USA_FORPOL_USA_DESC$\n\n§CHinweis: Diese Regeloption bewirkt auch, dass jedes nicht-sozialistische und nicht-nationalpopulistische Land in Amerika die Einladung der Vereinigten Staaten von Amerika in diese neue Fraktion annimmt und den Beitritt zu einer anderen Fraktion vermeidet. Dies geschieht nur, wenn das Land in seiner eigenen außenpolitischen Spielregel nicht festgelegt ist, einer anderen Fraktion beizutreten, und die Vereinigten Staaten von Amerika unabhängig bleiben.\nDies gilt auch, wenn die Vereinigten Staaten von Amerika von einem Spieler kontrolliert werden.§!"
 RULE_OPTION_USA_FORPOL_ENT_END_DESC: "belohnt seine nördlichen Nachbarn für ihre Unterstützung während des Zweiten Amerikanischen Bürgerkriegs und tritt der Entente bei."
 RULE_OPTION_USA_FORPOL_ENT: "£KR_game_rule_flag_USA  £KR_game_rule_flag_CAN   Entente"
 RULE_OPTION_USA_FORPOL_ENT_DESC: "Die Bundesregierung $RULE_OPTION_USA_FORPOL_ENT_END_DESC$$USA_FORPOL_REQUIREMENTS$\n\n§CUnterstützung der Bundesregierung§! in §Y$CAN_ACW_SUPPORT$§!\n\n§RKeine§! §CDemokraten (Longisten)§! in §Y$USA_PATH$§!"
 RULE_OPTION_USA_FORPOL_GER_END_DESC: "schließt sich dem größten antisyndikalistischen Block der Welt an und tritt dem Reichspakt bei"
 RULE_OPTION_USA_FORPOL_GER: "£KR_game_rule_flag_USA  £KR_game_rule_flag_GER  Reichspakt"
 RULE_OPTION_USA_FORPOL_GER_DESC: "Die Bundesregierung $RULE_OPTION_USA_FORPOL_GER_END_DESC$.$USA_FORPOL_REQUIREMENTS$\n\n§RKeine§! §CDemokraten (Longisten)§! in §Y$USA_PATH$§!\n§RKeine§! §CUnterstützung der Bundesregierung§! in §Y$CAN_ACW_SUPPORT$§!"

 WCA_PATH_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CDer Arbeiter-Kongress von Amerika gewinnt den Zweiten Amerikanischen Bürgerkrieg§! oder\n\n§CDie Amerikanische Konstitutionelle Koalition ist im Frieden mit der Arbeitergemeinschaft Amerikas (Arbeitergemeinschaft von Amerika (Workers' Commonwealth of America))§! und\n§CNegotiations Succeed§! in §Y$USA_CEASEFIRE$§!"
WCA_PATH: "£KR_game_rule_flag_WCA   Zweiter Verfassungskonvent"
RULE_OPTION_WCA_PATH_RANDOM: "Standard"
RULE_OPTION_WCA_PATH_RANDOM_DESC: "Die Zeit ist gekommen, den nächsten großen Schritt im revolutionären Kampf zu tun. Die Arbeiter müssen hinter einer einzigen Sache und Ideologie vereint werden. Es muss ein Konsens über die Zukunft der sozialistischen Regierung in Amerika erreicht werden."
RULE_OPTION_WCA_PATH_SYNDIE: "£KR_game_rule_flag_WCA  Elizabeth Gurley Flynn"
 RULE_OPTION_WCA_PATH_SYNDIE_DESC: "Elizabeth Gurley Flynn wird Interimspräsidentin und gründet zusammen mit der §rSozialistischen Partei von Amerika§! das Arbeiter-Commonwealth von Amerika.$WCA_PATH_REQUIREMENTS$"
 RULE_OPTION_WCA_PATH_RADSOC: "£KR_game_rule_flag_WCA  Norman Mattoon Thomas"
 RULE_OPTION_WCA_PATH_RADSOC_DESC: "Norman Thomas wird Interimspräsident und gründet zusammen mit der §RAmerikanischen Commonwealth-Partei§! das Arbeiter-Commonwealth von Amerika.$WCA_PATH_REQUIREMENTS$"
 RULE_OPTION_WCA_PATH_BROWDER_TOTALIST: "£KR_game_rule_flag_WCA_ussa  Earl Russell Browder"
 RULE_OPTION_WCA_PATH_BROWDER_TOTALIST_DESC: "Earl Browder wird Interimspräsident und gründet zusammen mit dem §oKongress der Industrieorganisationen§! die Vereinigten Sozialistischen Staaten von Amerika.$WCA_PATH_REQUIREMENTS$"
 RULE_OPTION_WCA_PATH_FOSTER_TOTALIST: "£KR_game_rule_flag_WCA_ussa  William Edward Foster"
 RULE_OPTION_WCA_PATH_FOSTER_TOTALIST_DESC: "William Foster wird Interimspräsident und gründet zusammen mit dem §oKongress der Industrieorganisationen§! die Vereinigten Sozialistischen Staaten von Amerika.$WCA_PATH_REQUIREMENTS$"

 WCA_FLAG: "£KR_game_rule_flag_WCA  Eine neue Flagge für ein neues Amerika"
 WCA_FLAG_REQUIREMENTS: "\n\n§RBenötigt:§!\n§RKein§! §CEarl Russell Browder§! oder §CWilliam Edward Foster§! in\n§Y$WCA_PATH$§!"
 RULE_OPTION_WCA_FLAG_RANDOM: "Standard"
 RULE_OPTION_WCA_FLAG_RANDOM_DESC: "Nach Abschluss des Konstituierenden Kongresses entscheidet die neu gegründete Arbeiterrepublik Amerika, ob sie ihre Kriegsflagge beibehält oder eine neue Flagge wählt.$WCA_FLAG_REQUIREMENTS$"
 RULE_OPTION_WCA_FLAG_WARTIME: "£KR_game_rule_flag_WCA  Blau und Rot"
 RULE_OPTION_WCA_FLAG_WARTIME_DESC: "Die Kriegsflagge des Arbeiter-Kongresses von Amerika wird beibehalten.$WCA_FLAG_REQUIREMENTS$"
 RULE_OPTION_WCA_FLAG_RED: "£KR_game_rule_flag_WCA_red  Weiß und Rot"
 RULE_OPTION_WCA_FLAG_RED_DESC: "Die Arbeitergemeinschaft von Amerika wählt eine weiß-rote Flagge.$WCA_FLAG_REQUIREMENTS$"
 RULE_OPTION_WCA_FLAG_IWW: "£KR_game_rule_flag_WCA_iww  Schwarz und Rot"
 RULE_OPTION_WCA_FLAG_IWW_DESC: "Die Arbeitergemeinschaft von Amerika wählt eine schwarz-rote Flagge.$WCA_FLAG_REQUIREMENTS$"

 WCA_FORPOL: "£KR_game_rule_flag_WCA  Rote Amerikanische Außenpolitik"
 WCA_FORPOL_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CDer Arbeiter-Kongress von Amerika gewinnt den Zweiten Amerikanischen Bürgerkrieg§!"
 RULE_OPTION_WCA_FORPOL_RANDOM: "Standard"
 RULE_OPTION_WCA_FORPOL_RANDOM_DESC: "Nach dem Ende des Bürgerkriegs müssen die Amerikaner über ihre Zukunft auf der Weltbühne entscheiden."
 RULE_OPTION_WCA_FORPOL_WCA: "£KR_game_rule_flag_WCA  Sozialistische Liga von Amerika"
 RULE_OPTION_WCA_FORPOL_WCA_DESC: "Der Arbeiter-Kongress von Amerika beschließt, dass sein Platz nicht in der Alten, sondern in der Neuen Welt ist, und gründet die Socialist League von Amerika.$WCA_FORPOL_REQUIREMENTS$"
 RULE_OPTION_WCA_FORPOL_BOOSTED_WCA: "£KR_game_rule_flag_WCA  Sozialistische Liga von Amerika - Gestärkt"
 RULE_OPTION_WCA_FORPOL_BOOSTED_WCA_DESC: "$RULE_OPTION_WCA_FORPOL_WCA_DESC$\n\n§CHinweis: Diese Regeloption bewirkt auch, dass jedes sozialistische Land in Amerika die Einladung des Arbeiterkongresses von Amerika in diese neue Fraktion annimmt und den Beitritt zu einer anderen Fraktion vermeidet. Dies geschieht nur, wenn das Land in seiner eigenen außenpolitischen Spielregel nicht auf den Beitritt zu einer anderen Fraktion festgelegt ist und der Arbeiterkongress von Amerika unabhängig bleibt.\nDies gilt auch, wenn der Arbeiter-Kongress von Amerika von einem Spieler kontrolliert wird.§!"
 RULE_OPTION_WCA_FORPOL_INT: "£KR_game_rule_flag_WCA  £KR_game_rule_flag_FRA  Internationale"
 RULE_OPTION_WCA_FORPOL_INT_DESC: "Der Arbeiter-Kongress von Amerika spielt die Rolle des guten syndikalistischen Soldaten und schließt sich der Dritten Internationale an, um weltweit für den Syndikalismus zu kämpfen.$WCA_FORPOL_REQUIREMENTS$"

APG_PATH: "£KR_game_rule_flag_APG   Die Zukunft der Union Staaten"
 APG_PATH_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CDie Amerikanische Volksregierung gewinnt den Zweiten Amerikanischen Bürgerkrieg§!\n\n§RKein§! §CCBürgerkrieg ohne MacArthur oder Long§! in\n§Y$USA_CIVIL_WAR$§!"
RULE_OPTION_APG_PATH_RANDOM: "Standard"
RULE_OPTION_APG_PATH_RANDOM_DESC: "Das alte Regime wird im Zweiten Amerikanischen Bürgerkrieg besiegt, und der konservative und reaktionäre amerikanische Unionsstaat hisst seine Flagge über Washington. Wie sieht die Zukunft für das neue Regime aus? Das wird die Zeit zeigen."
 RULE_OPTION_APG_PATH_LONG_DESC: "Huey Long gelingt es, sich an der Macht zu halten und gleichzeitig die Intrigen seiner ehemaligen \"Verbündeten\" zu unterbinden."
 RULE_OPTION_APG_PATH_NATPOP: "£KR_game_rule_flag_APG  Für den armen Mann"
 RULE_OPTION_APG_PATH_NATPOP_DESC: "$RULE_OPTION_APG_PATH_LONG_DESC$ Er verfolgt seinen §nradikalen§! Plan, \"jeden Menschen zu einem König\" zu machen.$APG_PATH_REQUIREMENTS$"
RULE_OPTION_APG_PATH_LONG_AUTDEM: "£KR_game_rule_flag_APG  Die Capitol Hill Konferenz"
RULE_OPTION_APG_PATH_LONG_AUTDEM_DESC: "$RULE_OPTION_APG_PATH_LONG_DESC$ Jetzt ist er der unangefochtene Führer der Nation, nimmt einige seiner hochtrabenden Versprechen zurück und arbeitet mit den etablierten Parteien zusammen, um einen §agemäßigteren§! Kurs zu verfolgen.$APG_PATH_REQUIREMENTS$"
RULE_OPTION_APG_PATH_PATAUT: "£KR_game_rule_flag_APG  Der Geschäfts-Plan"
RULE_OPTION_APG_PATH_PATAUT_DESC: "Der nationale Kommandeur der amerikanischen Legion, §PGeorge Van Horn Moseley§! kündigt an, dass er das Land führen wird, bis nach dem plötzlichen \"Verschwinden\" von Präsident Long ein richtiger Führer gefunden wird.$APG_PATH_REQUIREMENTS$"
RULE_OPTION_APG_PATH_DIES_AUTDEM: "£KR_game_rule_flag_APG  Ein Wächter der Republik"
RULE_OPTION_APG_PATH_DIES_AUTDEM_DESC: "Die extremen Maßnahmen, die Präsident Long zur Finanzierung seiner populistischen Wohlfahrtsreformen ergreift, darunter die Kürzung der Löhne und Leistungen der Soldaten, während die seiner eigenen Anhänger unangetastet bleiben, verärgern das konservative politische Establishment. Er wird als Präsident abgesetzt und durch den erklärten Anti-Radikalen §aMartin Dies Jr§! ersetzt.$APG_PATH_REQUIREMENTS$"

 APG_FORPOL: "£KR_game_rule_flag_APG   Longist Foreign Policy"
 APG_FORPOL_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CDie Amerikanische Volksregierung gewinnt den Zweiten Amerikanischen Bürgerkrieg§!"
 RULE_OPTION_APG_FORPOL_RANDOM: "Standard"
 RULE_OPTION_APG_FORPOL_RANDOM_DESC: "Nach dem Ende des Bürgerkriegs müssen die Amerikaner über ihre Zukunft auf der Weltbühne entscheiden."
 RULE_OPTION_APG_FORPOL_NEUT: "£KR_game_rule_flag_APG   Festung Amerika"
 RULE_OPTION_APG_FORPOL_NEUT_DESC: "Die Amerikanischen Volksregierungen $RULE_OPTION_USA_FORPOL_NEUT_END_DESC$$APG_FORPOL_REQUIREMENTS$\n\n§CDie Capitol-Hill-Konferenz§! oder §CEin Wächter der Republik§! in §Y$APG_PATH$§!\n\nAny §CDemokraten (Reaktionäre)§! in §Y$CAN_ACW_SUPPORT$§!"
 RULE_OPTION_APG_FORPOL_APG: "£KR_game_rule_flag_APG  Liga der Amerikanischen Staaten"
 RULE_OPTION_APG_FORPOL_APG_DESC: "Die Amerikanische Volksregierung $RULE_OPTION_USA_FORPOL_USA_END_DESC$$APG_FORPOL_REQUIREMENTS$\n\n§RKeine§! §CUnterstützung der Longistischen Regierung§! in §Y$CAN_ACW_SUPPORT$§!"
 RULE_OPTION_APG_FORPOL_BOOSTED_APG: "£KR_game_rule_flag_APG  Liga der Amerikanischer Staaten - Gestärkt"
 RULE_OPTION_APG_FORPOL_BOOSTED_APG_DESC: "$RULE_OPTION_APG_FORPOL_APG_DESC$\n\n§CHinweis: Diese Regeloption bewirkt auch, dass jedes nicht-sozialistische und nicht-nationalpopulistische Land in Amerika die Einladung der amerikanischen Volksregierung in diese neue Fraktion annimmt und den Beitritt zu einer anderen Fraktion vermeidet. Dies geschieht nur, wenn dieses Land in seiner eigenen außenpolitischen Spielregel nicht festgelegt ist, einer anderen Fraktion beizutreten, und die amerikanische Volksregierung unabhängig bleibt.\nDies gilt auch, wenn die Amerikanische Volksregierung von einem Spieler kontrolliert wird.§!"
 RULE_OPTION_APG_FORPOL_ENT: "£KR_game_rule_flag_APG  £KR_game_rule_flag_CAN   Entente"
 RULE_OPTION_APG_FORPOL_ENT_DESC: "Die Amerikanische Volksregierung $RULE_OPTION_USA_FORPOL_ENT_END_DESC$$APG_FORPOL_REQUIREMENTS$\n\n§CUnterstützen Sie die Longistische Regierung§! in §Y$CAN_ACW_SUPPORT$§!\n\n§RKein§! §CLong§! in §Y$APG_PATH$§!"
 RULE_OPTION_APG_FORPOL_GER: "£KR_game_rule_flag_APG  £KR_game_rule_flag_GER   Reichspakt"
 RULE_OPTION_APG_FORPOL_GER_DESC: "Die Amerikanische Volksregierung $RULE_OPTION_USA_FORPOL_GER_END_DESC$$APG_FORPOL_REQUIREMENTS$\n\n§RNicht§! §CLong ermordet§! oder §CKompromiss mit Long erzielt§! in §Y$USA_CIVIL_WAR$§!\n§RNicht§! §CUnterstützung der Longistische Regierung§! in §Y$CAN_ACW_SUPPORT$§!\n§RKein§! §CLong§! in §Y$APG_PATH$§!"

 ACC_PATH: "£KR_game_rule_flag_ACC  Konstitutionelle Wahlen"
 ACC_PATH_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CDie Amerikanische Konstitutionelle Koalition gewinnt den Zweiten Amerikanischen Bürgerkrieg§!\n\n§CBürgerkrieg mit MacArthur§! in §Y$USA_CIVIL_WAR$§!"
 RULE_OPTION_ACC_PATH_RANDOM: "Standard"
 RULE_OPTION_ACC_PATH_RANDOM_DESC: "Die Amerikanische Konstitutionelle Koalition wird ihrem demokratischen Anspruch auch nach dem Ausbruch des Krieges gerecht und führt die Wahlen wie geplant durch."
 RULE_OPTION_ACC_PATH_MARLIB: "£KR_game_rule_flag_ACC  Republikaner"
 RULE_OPTION_ACC_PATH_MARLIB_DESC: "Die §mRepublikanische Partei§! siegen bei den Wahlen von 1940 und danach.$ACC_PATH_REQUIREMENTS$"
 RULE_OPTION_ACC_PATH_SOCLIB: "£KR_game_rule_flag_ACC  Demokraten (Liberale)"
 RULE_OPTION_ACC_PATH_SOCLIB_DESC: "Die liberale Fraktion der §lDemokratische Partei§! geht als Sieger aus den Wahlen hervor.$ACC_PATH_REQUIREMENTS$"
 RULE_OPTION_ACC_PATH_SOCCON: "£KR_game_rule_flag_ACC  Demokraten (konservative)"
 RULE_OPTION_ACC_PATH_SOCCON_DESC: "Die konservative Fraktion der §cDemokratische Partei§! siegt bei späteren Wahlen, nachdem der liberale demokratische Kandidat die Wahl 1940 verloren hat.$ACC_PATH_REQUIREMENTS$"
 RULE_OPTION_ACC_PATH_SOCDEM: "£KR_game_rule_flag_ACC  Farm-Arbeiter"
 RULE_OPTION_ACC_PATH_SOCDEM_DESC: "Die §SFarm-Arbeiter Partei§! geht als Sieger aus den Wahlen hervor.$ACC_PATH_REQUIREMENTS$\n\n§CDie Amerikanische Konstitutionelle Koalition ist nicht in einer Fraktion mit New England§!"

 ACC_WCA_PEACE: "£KR_game_rule_flag_ACC  £KR_game_rule_flag_WCA  Eine Steinige Versöhnung"
 ACC_WCA_PEACE_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CDie Amerikanische Konstitutionelle Koalition ist mit dem Arbeiterkommunismus von Amerika im Reinen.§!\n\n§CVerhandlungen erfolgreich§! in §Y$USA_CEASEFIRE$§!\n§CFarm-Arbeiter§! in §Y$ACC_PATH$§!\n\n§RKein§! §CEarl Russell Browder§! oder §CWilliam Edward Foster§! in\n§Y$WCA_PATH$§!"
 RULE_OPTION_ACC_WCA_PEACE_RANDOM: "Standard"
 RULE_OPTION_ACC_WCA_PEACE_RANDOM_DESC: "Sobald ein Waffenstillstand zwischen der Amerikanischen Konstitutionellen Koalition und dem Arbeiterkongress von Amerika vereinbart ist, nutzen beide Seiten die Gelegenheit, um ihr politisches Umfeld weiterzuentwickeln.\n\nEs wird schnell klar, dass die Gemäßigten beider Fraktionen vielleicht weniger trennt als sie verbindet, und es gibt Hinweise auf ein mögliches endgültiges Ende des Krieges und eine friedliche Wiedervereinigung."
 RULE_OPTION_ACC_WCA_PEACE_YES: "£KR_game_rule_flag_ACC  £KR_game_rule_flag_WCA  Wiedervereinigung"
 RULE_OPTION_ACC_WCA_PEACE_YES_DESC: "Eine friedliche Wiedervereinigung wird als günstiger angesehen als weitere Verluste an Menschenleben, und die Amerikanische Konstitutionelle Koalition schließt sich mit dem Arbeiter Commonwealth von Amerika zusammen.$ACC_WCA_PEACE_REQUIREMENTS$"
 RULE_OPTION_ACC_WCA_PEACE_NO: "£KR_game_rule_flag_ACC  Fortgesetzter Krieg"
 RULE_OPTION_ACC_WCA_PEACE_NO_DESC: "Die Amerikanische Konstitutionelle Koalition beschließt, sich als das wahre Amerika zu beweisen, und alle Gedanken an eine friedliche Beendigung des Krieges sind vergessen.$ACC_WCA_PEACE_REQUIREMENTS$"

 ACC_FORPOL: "£KR_game_rule_flag_ACC  Verfassungsmäßige Außenpolitik"
 ACC_FORPOL_NOT_ENT_REQUIREMENTS: "$ACC_PATH_REQUIREMENTS$\n\n§RKeine§! §CUnterstützung der Konstitutionellen Koalition§! in §Y$CAN_ACW_SUPPORT$§!"
 RULE_OPTION_ACC_FORPOL_RANDOM: "Standard"
 RULE_OPTION_ACC_FORPOL_RANDOM_DESC: "Nach dem Ende des Bürgerkriegs müssen die Amerikaner über ihre Zukunft auf der Weltbühne entscheiden."
 RULE_OPTION_ACC_FORPOL_NEUT: "£KR_game_rule_flag_ACC   Festung Amerika"
 RULE_OPTION_ACC_FORPOL_NEUT_DESC: "Die Amerikanische Konstitutionelle Koalition $RULE_OPTION_USA_FORPOL_NEUT_END_DESC$$ACC_FORPOL_NOT_ENT_REQUIREMENTS$"
 RULE_OPTION_ACC_FORPOL_ACC: "£KR_game_rule_flag_ACC  Liga der Amerikanischen Staaten"
 RULE_OPTION_ACC_FORPOL_ACC_DESC: "Die Amerikanische Konstitutionelle Koalition $RULE_OPTION_USA_FORPOL_USA_END_DESC$$ACC_FORPOL_NOT_ENT_REQUIREMENTS$"
 RULE_OPTION_ACC_FORPOL_BOOSTED_ACC: "£KR_game_rule_flag_ACC  Liga der Amerikanischen Staaten - Verstärkt"
 RULE_OPTION_ACC_FORPOL_BOOSTED_ACC_DESC: "$RULE_OPTION_ACC_FORPOL_ACC_DESC$\n\n§CHinweis: Diese Regeloption bewirkt auch, dass jedes nicht-sozialistische und nicht-nationalpopulistische Land in Amerika die Einladung der Amerikanischen Konstitutionellen Koalition in diese neue Fraktion annimmt und den Beitritt zu einer anderen Fraktion vermeidet. Dies geschieht nur, wenn dieses Land in seiner eigenen außenpolitischen Spielregel nicht festgelegt ist, einer anderen Fraktion beizutreten, und die Amerikanische Konstitutionelle Koalition unabhängig bleibt.\nDies gilt auch, wenn die Amerikanische Konstitutionelle Koalition von einem Spieler kontrolliert wird.§!"
 RULE_OPTION_ACC_FORPOL_ENT: "£KR_game_rule_flag_ACC  £KR_game_rule_flag_CAN   Entente"
 RULE_OPTION_ACC_FORPOL_ENT_DESC: "Die Amerikanische Konstitutionelle Koalition $RULE_OPTION_USA_FORPOL_ENT_END_DESC$$ACC_PATH_REQUIREMENTS$\n§CSupport the Constitutional Coalition§! in §Y$CAN_ACW_SUPPORT$§!\n\n§RKeine§! §Autoritäre Konservative§! in §Y$CAN_PATH$§!"
 RULE_OPTION_ACC_FORPOL_GER: "£KR_game_rule_flag_ACC  £KR_game_rule_flag_GER  Reichspakt"
 RULE_OPTION_ACC_FORPOL_GER_DESC: "Die Amerikanische Konstitutionelle Koalition $RULE_OPTION_USA_FORPOL_GER_END_DESC$$ACC_PATH_REQUIREMENTS$\n§CKabinett Goerdeler§! oder eine §CDemokratische Union§! in §Y$GER_PATH$§!\n\n§RKeine§! §CUnterstützung der Konstitutionellen Koalition§! in §Y$CAN_ACW_SUPPORT$§!"

HAW_STRIKE: "£KR_game_rule_flag_HAW   Ausgang des Generalstreiks"
 RULE_OPTION_HAW_STRIKE_RANDOM: "Standard"
 RULE_OPTION_HAW_STRIKE_RANDOM_DESC: "In dem Chaos nach der Abspaltung von den Vereinigten Staaten von Amerika wird ein Generalstreik aller Arbeiter Hawaiis ausgerufen, der außer Kontrolle zu geraten droht. Das Schicksal des ehemaligen Territoriums liegt in den Händen des Notstandsdirektoriums – wie soll es mit den Arbeitern umgehen??"
 RULE_OPTION_HAW_STRIKE_MON: "£KR_game_rule_flag_HAW_mon  Monarchie"
 RULE_OPTION_HAW_STRIKE_MON_DESC: "Die Notstandsregierung erklärt, dass die konstitutionelle Monarchie, die 1893 durch einen Staatsstreich einer Koalition aus europäischen und amerikanischen Geschäftsleuten gestürzt worden war, wiederhergestellt werden soll. Eine Versammlung hawaiianischer Adliger tritt zusammen, bis ein Nachfolger für den letzten Thronfolger gewählt ist."
 RULE_OPTION_HAW_STRIKE_REP: "£KR_game_rule_flag_HAW  Republik"
 RULE_OPTION_HAW_STRIKE_REP_DESC: "Die Notstandsbehörde ruft eine Republik aus. Die Rolle des Interimspräsidenten übernimmt Alexander Baldwin, bis ordnungsgemäße Wahlen durchgeführt werden können."
 RULE_OPTION_HAW_STRIKE_SYNDIE: "£KR_game_rule_flag_HAW_soc  Revolution"
 RULE_OPTION_HAW_STRIKE_SYNDIE_DESC: "Die gewaltsame Unterdrückung der Arbeiter versetzt die Bevölkerung des ehemaligen Territoriums in Wut, wodurch die Streiks außer Kontrolle geraten. Den Streikenden gelingt es, die Polizei und die Nationalgarde zu besiegen und die Kontrolle über Honolulu zu übernehmen. Die Kommune von Hawaii wird ausgerufen!"
 RULE_OPTION_HAW_STRIKE_ANNEXATION_DESC: "The General Strike is defeated. Der Notfallausschuss in Hawaii beschließt, dass sie Teil Amerikas bleiben sollen, und erkennt die"

