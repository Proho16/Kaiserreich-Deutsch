 MOR_FORPOL: "£KR_game_rule_flag_MOR  Marokkanische Außenpolitik"
 MOR_FORPOL_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CDer Reichspakt verliert den Weltkrieg§!"
 RULE_OPTION_MOR_FORPOL_RANDOM: "Standard"
 RULE_OPTION_MOR_FORPOL_RANDOM_DESC: "Als der Reichspakt zu bröckeln beginnt, erlangt Marokko endlich die vollständige Unabhängigkeit. Doch kann es auf sich allein gestellt überleben?"
 RULE_OPTION_MOR_FORPOL_ENT: "£KR_game_rule_flag_MOR  £KR_game_rule_flag_CAN  Entente"
 RULE_OPTION_MOR_FORPOL_ENT_DESC: "Nachdem Marokko sich von den Deutschen losgesagt hat, geht es ein unerwartetes Bündnis mit der Entente ein.$MOR_FORPOL_REQUIREMENTS$"
 RULE_OPTION_MOR_FORPOL_EGY: "£KR_game_rule_flag_MOR  £KR_game_rule_flag_EGY  Kairoer Pakt"
 RULE_OPTION_MOR_FORPOL_EGY_DESC: "Marokko, das sich von den französischen Exilanten bedroht fühlt, tritt dem Kairoer Pakt bei, in der Hoffnung, seine Unabhängigkeit bewahren zu können.$MOR_FORPOL_REQUIREMENTS$\n§CDie Kairoer Allianz errang einen Sieg über die Osmanen§!"
 RULE_OPTION_MOR_FORPOL_OTT: "£KR_game_rule_flag_MOR  £KR_game_rule_flag_TUR  Istanbuler Pakt"
 RULE_OPTION_MOR_FORPOL_OTT_DESC: "Marokko schließt sich dem Osmanischen Reich und dem Rest der muslimischen Welt zu einer gemeinsamen Front gegen den Imperialismus an.$MOR_FORPOL_REQUIREMENTS$\n§CIstanbuler Pakt§! in §Y$OTT_FORPOL$§!"
 RULE_OPTION_MOR_FORPOL_VICTOR: "£KR_game_rule_flag_MOR  £KR_game_rule_flag_TUR  £KR_game_rule_flag_EGY  Sieger der Levante-Krise"
 RULE_OPTION_MOR_FORPOL_VICTOR_DESC: "Marokko schließt sich entweder dem Osmanischen Reich oder dem Kairoer Pakt an, je nachdem, welche Seite in der Levante-Krise siegreich ist.$MOR_FORPOL_REQUIREMENTS$\n\n§CDer Kairoer Pakt triumphiert über die Osmanen§!\noder §CIstanbuler Pakt§! in §Y$OTT_FORPOL$§!"

 MAF_PATH: "£KR_game_rule_flag_MAF  Ins Herz der Finsternis"
 RULE_OPTION_MAF_PATH_RANDOM: "Standard"
 RULE_OPTION_MAF_PATH_RANDOM_DESC: "Zentralafrika, Deutschlands großer Gewinn aus dem Weltkrieg, ist eine Kolonie, die sich aus den bestehenden deutschen Siedlungen in Afrika sowie den ehemals von Franzosen, Belgiern und Briten gehaltenen Gebieten zusammensetzt. Ihr Gouverneur wird von Berlin ernannt, wenngleich seine Zuverlässigkeit nicht als selbstverständlich angesehen werden kann."
 RULE_OPTION_MAF_PATH_RITTER_PATAUT: "£KR_game_rule_flag_MAF  RKA (Hardliner) - Karl Ritter"
 RULE_OPTION_MAF_PATH_RITTER_PATAUT_DESC: "Der berüchtigte amtierende Gouverneur Karl Ritter, ein Hardliner des §PReichskolonialamts§, bleibt an der Macht und ernennt sich selbst zum souveränen Gouverneur – ein Zeichen, das für die Kolonie sicherlich nichts Gutes verheißt...\n\n§CHinweis: Sollte Deutschland im Krieg zu große Teile seines Kerngebiets verlieren, nutzt Ritter die Gelegenheit und erklärt Mittelafrika zu einem souveränen Staat, was zu weitreichenden Unruhen führt, die, wenn sie nicht rasch unterbunden werden, die Auflösung Mittelafrikas zur Folge haben.§!"
 RULE_OPTION_MAF_PATH_NOT_RITTER_DESC: "Karl Ritters Machenschaften werden aufgedeckt, und er wird seines Amtes enthoben, wodurch die Stabilität in Zentralafrika gewahrt bleibt.\nSein designierter Nachfolger ist"
 RULE_OPTION_MAF_PATH_KRAUT_PATAUT: "£KR_game_rule_flag_MAF  RKA (Hardliner) - Georg von Kraut"
 RULE_OPTION_MAF_PATH_KRAUT_PATAUT_DESC: "$RULE_OPTION_MAF_PATH_NOT_RITTER_DESC$ Generaloberst Georg von Kraut, ein Hardliner des §Reichskolonialamts§, Kriegsheld und einflussreicher Anführer der Schutztruppe."
 RULE_OPTION_MAF_PATH_JUENGER_PATAUT: "£KR_game_rule_flag_MAF  RKA (Hardliner) - Ernst Jünger"
 RULE_OPTION_MAF_PATH_JUENGER_PATAUT_DESC: "$RULE_OPTION_MAF_PATH_NOT_RITTER_DESC$ Generalmajor Ernst Jünger, ein Hardliner des §Reichskolonialamts§, Universalgelehrter und ehemaliger Soldat sowie neuer Anführer der Schutztruppe nach Krauts Entlassung."
 RULE_OPTION_MAF_PATH_KOLBE_AUTDEM: "£KR_game_rule_flag_MAF  RKA (Reformist) - Fritz Kolbe"
 RULE_OPTION_MAF_PATH_KOLBE_AUTDEM_DESC: "$RULE_OPTION_MAF_PATH_NOT_RITTER_DESC$ Fritz Kolbe, ein Reformer im Reichskolonialamt und erfahrener Verwaltungsbeamter."
 RULE_OPTION_MAF_PATH_ASMIS_AUTDEM: "£KR_game_rule_flag_MAF  RKA (Reformist) - Rudolf Asmis"
 RULE_OPTION_MAF_PATH_ASMIS_AUTDEM_DESC: "$RULE_OPTION_MAF_PATH_NOT_RITTER_DESC$ Dr. Rudolf Asmis, ein Reformer des §aReichskolonialamts§, ein versierter Jurist und Diplomat."

 MAF_BUSH_WAR: "£KR_game_rule_flag_MAF  £KR_game_rule_flag_POR  Der Buschkrieg"
 RULE_OPTION_MAF_BUSH_WAR_RANDOM: "Standard"
 RULE_OPTION_MAF_BUSH_WAR_RANDOM_DESC: "Der Buschkrieg findet fast immer statt."
 RULE_OPTION_MAF_BUSH_WAR_WAR: "£KR_game_rule_flag_MAF  £KR_game_rule_flag_POR  Buschkrieg garantiert"
 RULE_OPTION_MAF_BUSH_WAR_WAR_DESC: "Portugal gibt nicht nach, und Deutschland überlässt es Mittelafrika, das Problem Mosambik zu lösen."
 RULE_OPTION_MAF_BUSH_WAR_NEGOTIATIONS: "£KR_game_rule_flag_MAF  £KR_game_rule_flag_POR  Portugal zieht sich zurück"
 RULE_OPTION_MAF_BUSH_WAR_NEGOTIATIONS_DESC: "Das Eingreifen Deutschlands zwingt Portugal, seine Übergriffe einzustellen."
 RULE_OPTION_MAF_BUSH_WAR_N_MOZAMBIQUE: "£KR_game_rule_flag_MAF  £KR_game_rule_flag_POR  Portugal übergibt Mosambik"
 RULE_OPTION_MAF_BUSH_WAR_N_MOZAMBIQUE_DESC: "Deutschland gestattet Mittelafrika, sich um das Mosambik-Problem zu kümmern. Portugal beschließt in letzter Minute, sich zurückzuziehen, und ist gezwungen, Mosambik an Mittelafrika abzutreten."

 MAF_BUSH_WAR_OUTCOME: "£KR_game_rule_flag_MAF  £KR_game_rule_flag_POR  Friedenabkommen im Buschkrieg"
 MAF_BUSH_WAR_OUTCOME_STALEMATE_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CMittelafrika erzielt im Buschkrieg einen Sieg oder ein Patt mit Vorteil§!"
 MAF_BUSH_WAR_OUTCOME_VICTORY_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CMittelafrika erringt den Sieg im Buschkrieg§!"
 RULE_OPTION_MAF_BUSH_WAR_OUTCOME_RANDOM: "Standard"
 RULE_OPTION_MAF_BUSH_WAR_OUTCOME_RANDOM_DESC: "Die Aussichten auf ein Friedensabkommen bleiben unverändert."
 RULE_OPTION_MAF_BUSH_WAR_OUTCOME_N_MOZAMBIQUE: "£KR_game_rule_flag_MAF  £KR_game_rule_flag_POR  Mosambik"
 RULE_OPTION_MAF_BUSH_WAR_OUTCOME_N_MOZAMBIQUE_DESC: "Mittelafrika only seizes Mosambik.$MAF_BUSH_WAR_OUTCOME_STALEMATE_REQUIREMENTS$"
 RULE_OPTION_MAF_BUSH_WAR_OUTCOME_SAFETY_ZONES: "£KR_game_rule_flag_MAF  £KR_game_rule_flag_POR  Mosambik und Sicherheitszonen"
 RULE_OPTION_MAF_BUSH_WAR_OUTCOME_SAFETY_ZONES_DESC: "Mittelafrika erobert Mosambik und richtet Sicherheitszonen im Norden Angolas ein.$MAF_BUSH_WAR_OUTCOME_STALEMATE_REQUIREMENTS$"
