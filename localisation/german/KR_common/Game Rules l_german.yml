 URG_PATH: "£KR_game_rule_flag_URG  Die Bastion der Demokratie"
 RULE_OPTION_URG_PATH_RANDOM: "Standard"
 RULE_OPTION_URG_PATH_RANDOM_DESC: "Das Schicksal der Republik Östlich des Uruguay  könnte von den Handlungen seiner größeren Nachbarn abhängen, obwohl es viele Möglichkeiten gibt, die der regierende Rat dieser kleinen Nation ergreifen kann."
 RULE_OPTION_URG_PATH_SOCLIB: "£KR_game_rule_flag_URG  Rat – Centristas"
 RULE_OPTION_URG_PATH_SOCLIB_DESC: "Keine Partei erreicht eine Mehrheit im Rat, und eine Kompromissregierung unter Führung der §lFacción Centrista del Partido Colorado§!, oder Zentristische Fraktion der Colorado-Partei, regiert das Land. Der nationale Verwaltungsrat bleibt bestehen."
