 RULE_OPTION_DEN_PATH_REP_SOCDEM_DESC: "$RULE_OPTION_DEN_PATH_ABDICATION_DESC$\n$RULE_OPTION_DEN_PATH_REP_DESC$ §SSocialdemokratiet§! Regierung.\n$RULE_OPTION_DEN_PATH_NEUT_DESC$"
 RULE_OPTION_DEN_PATH_REP_SOCLIB: "£KR_game_rule_flag_DEN  Republik - Radikale Venstre (Linke)"
