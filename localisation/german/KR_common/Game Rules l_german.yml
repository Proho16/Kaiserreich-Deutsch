AUS_ELECTION: "£KR_game_rule_flag_AUS   Österreichische Wahl 1936"
RULE_OPTION_AUS_ELECTION_RANDOM: "Standard"
RULE_OPTION_AUS_ELECTION_RANDOM_DESC: "Die österreichischen Wahlen von 1936 sind hart umkämpft, wobei die beiden Kontrahenten, die Sozialdemokratische Arbeiterpartei und die Christlichsoziale Partei, drastisch unterschiedliche politische und wirtschaftliche Standpunkte vertreten"
RULE_OPTION_AUS_ELECTION_SOCCON: "£KR_game_rule_flag_AUS   Christliche Sozialisten"
