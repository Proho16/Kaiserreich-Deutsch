 RULE_OPTION_BOL_PRU_CONFED_RANDOM_DESC: "Die kurzlebige Konföderation wurde durch Nachbarn und Instabilität zerstört. Aber das ist schon lange her, und vielleicht sollte man ihr eine zweite Chance geben?"
 RULE_OPTION_BOL_PRU_CONFED_ALWAYS: "£KR_game_rule_flag_PBC   Wiederherstellung"
