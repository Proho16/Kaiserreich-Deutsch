RULE_OPTION_AUS_AUSGLEICH_RANDOM_DESC: "Der Ausgleich von 1937 wird beibehalten. Die Themen Steuern, Minderheitenrechte und Föderalisierung könnten das Reich spalten, oder vielleicht entsteht eine stärkere Nation..."
RULE_OPTION_AUS_AUSGLEICH_STATUS_QUO: "£KR_game_rule_flag_AUS  £KR_game_rule_flag_HUN_habsburg   Status Quo"
