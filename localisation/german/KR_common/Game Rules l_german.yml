ECU_PATH: "£KR_game_rule_flag_ECU   Ekuador, jetzt oder für immer"
RULE_OPTION_ECU_PATH_RANDOM: "Standard"
RULE_OPTION_ECU_PATH_RANDOM_DESC: "Durch den Schwarzen Montag katalysiert, führt die März-Krise fast zum Zusammenbruch des ecuadorianischen Staates. Ob General Gallo in der Folgezeit an der Macht bleibt, wird über das Schicksal der Nation entscheiden."
RULE_OPTION_ECU_PATH_MARLIB: "£KR_game_rule_flag_ECU   Liberales Radicales"
RULE_OPTION_ECU_PATH_MARLIB_DESC: "Nach der Märzkrise übergibt Gallo die Macht an die §mPartido Liberal Radical Ecuatoriano§!, oder Radikale Liberale Partei Ecuadors."
 RULE_OPTION_ECU_PATH_SOCCON: "£KR_game_rule_flag_ECU  Conservadores"
 RULE_OPTION_ECU_PATH_SOCCON_DESC: "Nach der Märzkrise übergibt Gallo die Macht an die §cPartido Conservador Ecuatoriano§!, oder Ecuadorianische Konservative Partei."
RULE_OPTION_ECU_PATH_AUTDEM: "£KR_game_rule_flag_ECU   Junta Militar"
RULE_OPTION_ECU_PATH_AUTDEM_DESC: "Nach der Märzkrise behält Gallo die Kontrolle und bildet eine §aJunta Militar§!, oder Militärjunta, wodurch die Wahlen auf unbestimmte Zeit verschoben werden."

COL_PATH: "£KR_game_rule_flag_COL   Ein großes Erbe"
RULE_OPTION_COL_PATH_RANDOM: "Standard"
 RULE_OPTION_COL_PATH_RANDOM_DESC: "Kolumbien steht vor einer großen politischen Krise, deren Ausgang nicht vorhersehbar ist."
 RULE_OPTION_COL_PATH_SOCDEM: "£KR_game_rule_flag_COL  Liberales"
 RULE_OPTION_COL_PATH_SOCDEM_DESC: "Die Demokratie bleibt erhalten, und die §SPartido Liberal§!, die Liberale Partei, gewinnt die Wahlen von 1938.\nBei späteren Wahlen rückt die Partei mehr in Richtung §IMitte§!."
 RULE_OPTION_COL_PATH_SOCCON: "£KR_game_rule_flag_COL  Conservadores"
 RULE_OPTION_COL_PATH_SOCCON_DESC: "Die Demokratie bleibt erhalten, und die §cLinea dura del Partido Conservador§!, die harte Linie der Konservativen Partei, sichert sich den Sieg bei den Wahlen von 1938."
 RULE_OPTION_COL_PATH_RADSOC: "£KR_game_rule_flag_COL_soc  UNIR"
 RULE_OPTION_COL_PATH_RADSOC_DESC: "Die Demokratie bleibt erhalten, und die §RUnión Nacional Izquierdista Revolucionaria§!, oder Nationalrevolutionäre Linke Union, sichert sich den Sieg bei den Wahlen von 1938."
 RULE_OPTION_COL_PATH_PATAUT_START_DESC: "Der Ausnahmezustand wird ausgerufen und eine Diktatur durch Gustavo Rojas Pinillas §PMovimiento de Acción Nacional§!, oder Nationale Aktionsbewegung errichtet."
 RULE_OPTION_COL_PATH_PATAUT: "£KR_game_rule_flag_COL  Acción Nacional"
 RULE_OPTION_COL_PATH_PATAUT_DESC: "$RULE_OPTION_COL_PATH_PATAUT_START_DESC$\nKolumbien startet eine diplomatische Offensive mit dem Ziel, den Andenpakt mit Ecuador und Venezuela zu gründen, sofern diese Länder nicht von Sozialisten regiert werden."
 RULE_OPTION_COL_PATH_PATAUT_GRAN_COLOMBIA: "£KR_game_rule_flag_COL  Acción Nacional - Großkolumbien"
 RULE_OPTION_COL_PATH_PATAUT_GRAN_COLOMBIA_DESC: "$RULE_OPTION_COL_PATH_PATAUT_START_DESC$\nAnstelle des Versuchs, den Andenpakt zu gründen, strebt General Pinilla die Rückeroberung der Gebiete von Großkolumbien an."

VEN_PATH: "£KR_game_rule_flag_VEN   Die Wahl von 1939"
RULE_OPTION_VEN_PATH_RANDOM: "Standard"
RULE_OPTION_VEN_PATH_RANDOM_DESC: "Die Wahlen von 1939 sind für die Zukunft Venezuelas von entscheidender Bedeutung. Möge die Hand des Schicksals gnädig sein."
 RULE_OPTION_VEN_PATH_DEM_DESC: "Die venezolanische Demokratie bleibt mit dem Sieg der"
RULE_OPTION_VEN_PATH_SOCDEM: "£KR_game_rule_flag_VEN   Acción Democrática"
 RULE_OPTION_VEN_PATH_SOCDEM_DESC: "$RULE_OPTION_VEN_PATH_DEM_DESC$ §SAcción Democrática§!, oder Demokratische Aktion, bei den Wahlen von 1939."
 RULE_OPTION_VEN_PATH_SOCLIB: "£KR_game_rule_flag_VEN  Unión Republicana Democrática"
RULE_OPTION_VEN_PATH_SOCLIB_DESC: "$RULE_OPTION_VEN_PATH_DEM_DESC$ die §lUnión Republicana Democrática§!, oder Demokratische Republikanische Union, bei den Wahlen von 1939."
RULE_OPTION_VEN_PATH_SYNDIE: "£KR_game_rule_flag_VEN   Socialistas"
RULE_OPTION_VEN_PATH_SYNDIE_DESC: "Die §rPartido Socialista de Venezuela§!, die Sozialistische Partei Venezuelas, gewinnt die Wahlen in Venezuela 1939 und führt Venezuela in die Dritte Internationale."
 RULE_OPTION_VEN_PATH_PATAUT: "£KR_game_rule_flag_VEN  £KR_game_rule_flag_USA  Junta Nacional"
 RULE_OPTION_VEN_PATH_PATAUT_DESC: "Venezuela wählt weiterhin demokratische Regierungen, bis die Amerikaner ihren Bürgerkrieg beendet haben und wieder auf die Weltbühne zurückkehren. Dann werden die Sozialisten gewählt, und die Amerikaner inszenieren einen Staatsstreich und setzen eine §PJunta Nacional Venezuelana§!, oder venezolanische Nationaljunta ein.\n\n§RBenötigt:§!\n§CDie Bundesregierung, die Volksregierung oder die Pazifikstaaten siegen im Zweiten Amerikanischen Bürgerkrieg§!\n\n§RNicht§! §Festung Amerika§! in jeder £KR_game_rule_flag_USA  £KR_game_rule_flag_APG  £KR_game_rule_flag_ACC §YAmerikanische Außenpolitik§!"

 ### Country Paths - Western / Southern Europe ###
 RULE_GROUP_KAISERREICH_RULES_WS_EUROPE: "Country Paths - Western / Southern Europe"
 
FRA_PATH: "£KR_game_rule_flag_FRA   Monatte unter Feuer"
RULE_OPTION_FRA_PATH_RANDOM: "Standard"
 RULE_OPTION_FRA_PATH_RANDOM_DESC: "Die Opposition in der Bourse Générale du Travail stellt Marceau Pivert, einem wichtigen Mitglied der Regierung von Pierre Monatte, das Misstrauen aus.\nAls Reaktion darauf werden Neuwahlen sowohl für die BGT als auch für das Comité angesetzt."
 RULE_OPTION_FRA_PATH_SYNDIE_DESC: "Die §rComités Syndicalistes Révolutionnaires§!, oder Revolutionäre Syndikalistenkomitees, auch bekannt als die Orthodoxen, sichern sich 1936 und in den folgenden Wahlen die Mehrheit."
RULE_OPTION_FRA_PATH_FRACHON_SYNDIE: "£KR_game_rule_flag_FRA_alternate Orthodoxe - Frachon"
 RULE_OPTION_FRA_PATH_FRACHON_SYNDIE_DESC: "$RULE_OPTION_FRA_PATH_SYNDIE_DESC$\nDer Bürgerkriegsveteran Benoit Frachon wird Vorsitzender der Allgemeine Arbeitsbörse."
 RULE_OPTION_FRA_PATH_JOUHAUX_SYNDIE: "£KR_game_rule_flag_FRA  Orthodoxe - Jouhaux"
 RULE_OPTION_FRA_PATH_JOUHAUX_SYNDIE_DESC: "$RULE_OPTION_FRA_PATH_SYNDIE_DESC$\nDer Gewerkschafter Léon Jouhaux wird Vorsitzender der Allgemeine Arbeitsbörse."
 RULE_OPTION_FRA_PATH_RADSOC: "£KR_game_rule_flag_FRA_red  Anarchisten"
 RULE_OPTION_FRA_PATH_RADSOC_DESC: "Die §RAssociation des Fédéralistes Anarchistes§!, oder Vereinigung anarchistischer Föderalisten, angeführt vom Conseil de Défense Fédéral, oder Rat der föderalen Verteidigung, sichert sich 1936 und in den folgenden Wahlen die Mehrheit."
  RULE_OPTION_FRA_PATH_VALOIS_TOTALIST: "£KR_game_rule_flag_FRA  Sorelianer"
 RULE_OPTION_FRA_PATH_VALOIS_TOTALIST_DESC: "Die §oConfédération Nationale-Syndicaliste§!, oder Nationale Syndikalistische Konföderation, von George Valois, auch bekannt als die Sorelianer, erringen bei den Wahlen von 1936 und den folgenden Wahlen die Mehrheit."
 RULE_OPTION_FRA_PATH_WAR_VALOIS_TOTALIST: "£KR_game_rule_flag_FRA_sorelian  Krieg Sorelianer"
 RULE_OPTION_FRA_PATH_WAR_VALOIS_TOTALIST_DESC: "Nach dem Sieg bei den Wahlen von 1936 erklären die §oSorelianer§! von George Valois während des Krieges mit Deutschland den Ausnahmezustand und setzen weitere Wahlen aus."
 RULE_OPTION_FRA_PATH_JACOBIN_DESC: "Die §oParti Socialiste de France§!, oder Sozialistische Partei Frankreichs, auch bekannt als die Jakobiner, erringen bei den Wahlen von 1936 die Mehrheit und ebnen damit den Weg für ihre Vision eines technokratischen Staates nach den Prinzipien der Konstruktiven Revolution."
 RULE_OPTION_FRA_PATH_JACOBIN_RADICAL_DESC: "Das alte System wird hinweggefegt, als sich die Jakobiner in die §oUnion Socialiste Républicaine§!, die Republikanische Sozialistische Union, verwandeln, weitere Wahlen absagen und Staatsverräter hinrichten."
 RULE_OPTION_FRA_PATH_JACOBIN_GRADUAL_DESC: "Den Jakobinern gelingt es, das System von innen heraus friedlich zu reformieren, und sie sind bei späteren Wahlen erfolgreich."
 RULE_OPTION_FRA_PATH_DEAT_DESC: "unter der Leitung von Marcel Déat."
 RULE_OPTION_FRA_PATH_MARQUET_DESC: "unter der Leitung von Adrien Marquet."
 RULE_OPTION_FRA_PATH_DEAT_RADICAL_TOTALIST: "£KR_game_rule_flag_FRA_PATH_neosocialist  Jakobiner - Déats radikale Reform"
 RULE_OPTION_FRA_PATH_DEAT_RADICAL_TOTALIST_DESC: "$RULE_OPTION_FRA_PATH_JACOBIN_DESC$, $RULE_OPTION_FRA_PATH_DEAT_DESC$\n\n$RULE_OPTION_FRA_PATH_JACOBIN_RADICAL_DESC$"
 RULE_OPTION_FRA_PATH_MARQUET_RADICAL_TOTALIST: "£KR_game_rule_flag_FRA_PATH_neosocialist  Jakobiner - Marquets radikale Reform"
 RULE_OPTION_FRA_PATH_MARQUET_RADICAL_TOTALIST_DESC: "$RULE_OPTION_FRA_PATH_JACOBIN_DESC$, $RULE_OPTION_FRA_PATH_MARQUET_DESC$\n\n$RULE_OPTION_FRA_PATH_JACOBIN_RADICAL_DESC$"
 RULE_OPTION_FRA_PATH_DEAT_GRADUAL_TOTALIST: "£KR_game_rule_flag_FRA  Jakobiner - Déats schrittweise Reform"
 RULE_OPTION_FRA_PATH_DEAT_GRADUAL_TOTALIST_DESC: "$RULE_OPTION_FRA_PATH_JACOBIN_DESC$, $RULE_OPTION_FRA_PATH_DEAT_DESC$\n\n$RULE_OPTION_FRA_PATH_JACOBIN_GRADUAL_DESC$"
 RULE_OPTION_FRA_PATH_MARQUET_GRADUAL_TOTALIST: "£KR_game_rule_flag_FRA  Jakobiner - Marquets schrittweise Reform"
 RULE_OPTION_FRA_PATH_MARQUET_GRADUAL_TOTALIST_DESC: "$RULE_OPTION_FRA_PATH_JACOBIN_DESC$, $RULE_OPTION_FRA_PATH_MARQUET_DESC$\n\n$RULE_OPTION_FRA_PATH_JACOBIN_GRADUAL_DESC$"
 RULE_OPTION_FRA_PATH_GAMELIN_SYNDIE: "£KR_game_rule_flag_FRA  Volksfront"
 RULE_OPTION_FRA_PATH_GAMELIN_SYNDIE_DESC: "Bei den Wahlen von 1936 erlangen die Jakobiner die Mehrheit. Die jakobinischen Hardliner fordern daraufhin die Abschaffung der syndikalistischen Gesellschaftsstrukturen und den Wiederaufbau der Nation.\n\nDie Reformen der Jakobiner verärgerten viele in der französischen Gesellschaft, was schließlich dazu führte, dass der Bürgerkriegsgeneral Maurice Gamelin Léon Blums Volksfront der §rComités Syndicalistes Révolutionnaires§! unterstützte. Sie entfernten die Jakobiner aus ihren Ämtern, stellten den syndikalistischen Status quo wieder her und sicherten sich damit den Erfolg bei späteren Wahlen."
 RULE_OPTION_FRA_PATH_NO_MAJORITY_SYNDIE: "£KR_game_rule_flag_FRA_red  Keine Mehrheit"
 RULE_OPTION_FRA_PATH_NO_MAJORITY_SYNDIE_DESC: "Bei den Wahlen von 1936 kommt es zu keiner Mehrheit, und der amtierende Vorsitzende Pierre Monatte führt eine Kompromissregierung der §rComités Syndicalistes Révolutionnaires§! an. Jacques Doriot übernimmt 1941 die Regierung."

 FRA_FLAG: "£KR_game_rule_flag_FRA  Die Gemeinschaftsnorm"
 FRA_FLAG_REQUIREMENTS: "\n\n§RBenötigt:§!\n§RNot§! §CWar Sorelians§! or any §CRadical Reform§! in\n§Y$FRA_PATH$§!"
 RULE_OPTION_FRA_FLAG_RANDOM: "Standard"
 RULE_OPTION_FRA_FLAG_RANDOM_DESC: "Es stellt sich die Frage nach dem Status der Flagge der Kommune von Frankreich. Können Aspekte des Erbes der Trikolore rehabilitiert werden, sollte die rote Flagge zu Ehren des Proletariats gehisst werden, oder muss ein Kompromiss zwischen beiden gefunden werden?"
 RULE_OPTION_FRA_FLAG_TRICOLOUR: "£KR_game_rule_flag_FRA  Die Trikolore"
 RULE_OPTION_FRA_FLAG_TRICOLOUR_DESC: "Die Trikolore wird als Flagge der französischen Kommune beibehalten.$FRA_FLAG_REQUIREMENTS$"
 RULE_OPTION_FRA_FLAG_RED: "£KR_game_rule_flag_FRA_red  Die rote Flagge"
 RULE_OPTION_FRA_FLAG_RED_DESC: "Die rote Flagge wird zur einzigen Flagge der Französischen Kommune.$FRA_FLAG_REQUIREMENTS$"
 RULE_OPTION_FRA_FLAG_ALT: "£KR_game_rule_flag_FRA_alternate  Le compromis"
 RULE_OPTION_FRA_FLAG_ALT_DESC: "Die Trikolore und die rote Flagge werden in einer syndikalistischen Synthese zusammengeführt.$FRA_FLAG_REQUIREMENTS$"

 NFA_ELECTION: "£KR_game_rule_flag_NFA_mainland  Le Rêve de Paris (Der Traum von Paris)"
 NFA_ELECTION_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CThe Commune of France falls and the French Republic is restored§!"
 RULE_OPTION_NFA_ELECTION_RANDOM: "Standard"
 RULE_OPTION_NFA_ELECTION_RANDOM_DESC: "Entgegen aller Widrigkeiten kehren die Überreste der Dritten Französischen Republik triumphierend auf das französische Festland zurück. Als sich der Staub gelegt hat, werden die ersten Wahlen des neuen Regimes ausgerufen, und es kann nur einen Gewinner geben..."
 RULE_OPTION_NFA_ELECTION_SOCCON: "£KR_game_rule_flag_NFA_mainland  Bloc National"
 RULE_OPTION_NFA_ELECTION_SOCCON_DESC: "Eine breite Koalition aus rechten Parteien, der §cBloc National§!, oder Nationaler Block, gewinnt die ersten Wahlen.$NFA_ELECTION_REQUIREMENTS$\n\n§CZweite Heilige Union - Koalition§! oder §CZweite Heilige Union - PRD§! oder §CKomitee der Nationalen Rettung§! in\n§Y$NFA_PATH$§!"
 RULE_OPTION_NFA_ELECTION_SOCLIB: "£KR_game_rule_flag_NFA_mainland  Radicals"
 RULE_OPTION_NFA_ELECTION_SOCLIB_DESC: "Nach der Aussöhnung mit ihrem linken Flügel, der die Revolution unterstützt hatte, gewann die §lParti Radical§!, oder Radikale Partei, die ersten Wahlen.$NFA_ELECTION_REQUIREMENTS$\n\n§CZweite Heilige Union - Koalition§! oder §CZweite Heilige Union - PRD§! oder §CKomitee der Nationalen Rettung§! in\n§Y$NFA_PATH$§!"
 RULE_OPTION_NFA_ELECTION_MARLIB: "£KR_game_rule_flag_NFA_mainland  Concentration"
 RULE_OPTION_NFA_ELECTION_MARLIB_DESC: "Mit dem Ziel der Einheit über alles wird die §mConcentration Républicaine§!, oder Republikanische Konzentration, unter der Führung der Parti Républicain Démocrate, oder Demokratischen Republikanischen Partei, aufrechterhalten und gewinnt die ersten Wahlen. $NFA_ELECTION_REQUIREMENTS$\n\n§CZweite Heilige Union - Koalition§! oder §CZweite Heilige Union - PRD§! in §Y$NFA_PATH$§!"
 RULE_OPTION_NFA_ELECTION_AUTDEM: "£KR_game_rule_flag_NFA_mainland  PSF (Dirigiste)"
 RULE_OPTION_NFA_ELECTION_AUTDEM_DESC: "François de La Rocque inszeniert einen Militärputsch und setzt sich selbst und den dirigistischen Flügel seiner §aParti Social Français§!, oder Französischen Sozialpartei, an die Spitze einer Republik, die den Anschein einer Demokratie erweckt.$NFA_ELECTION_REQUIREMENTS$\n\n§CZweite Heilige Union - Koalition§! oder §CZweite Heilige Union - PSF§! in §Y$NFA_PATH$§!"
 RULE_OPTION_NFA_ELECTION_PATAUT: "£KR_game_rule_flag_NFA_mainland  PSF (Technocrate)"
 RULE_OPTION_NFA_ELECTION_PATAUT_DESC: "François de La Rocque inszeniert einen Militärputsch und regiert Frankreich als Präsidialdiktator mit dem technokratischen Flügel seiner §PParti Social Français§!, der französischen Sozialpartei.$NFA_ELECTION_REQUIREMENTS$\n\n§CZweite Heilige Union - Koalition§! oder §CZweite Heilige Union - PSF§! in §Y$NFA_PATH$§!"

ENG_PATH: "£KR_game_rule_flag_ENG   Gewerkschaftskongress von 1936"
RULE_OPTION_ENG_PATH_RANDOM: "Standard"
 RULE_OPTION_ENG_PATH_RANDOM_DESC: "Die Arbeiterpartei, die einzige Regierungspartei in Großbritannien seit der Revolution, hat sich längst in mehrere konkurrierende Fraktionen aufgespalten. Föderalisten, Autonomisten und Maximisten wetteifern auf dem Gewerkschaftskongress von 1936 um Einfluss."
 RULE_OPTION_ENG_PATH_SYNDIE_DESC: "Die §rFederationist§!-Fraktion der Labour Party sichert sich 1936 die Mehrheit im Gewerkschaftskongress."
 RULE_OPTION_ENG_PATH_HORNER_SYNDIE: "£KR_game_rule_flag_ENG  Föderalisten - Horner"
 RULE_OPTION_ENG_PATH_HORNER_SYNDIE_DESC: "$RULE_OPTION_ENG_PATH_SYNDIE_DESC$\nDie Horneristische Tendenz innerhalb der Fraktion tritt in den Vordergrund, als Arthur Horner Vorsitzender wird und George Hardy sein Stellvertreter, der nach dem Zweiten Weltkrieg durch G.D.H. Cole ersetzt wird."
 RULE_OPTION_ENG_PATH_ATTLEE_SYNDIE: "£KR_game_rule_flag_ENG  Föderalisten - - Attlee"
 RULE_OPTION_ENG_PATH_ATTLEE_SYNDIE_DESC: "$RULE_OPTION_ENG_PATH_SYNDIE_DESC$\nDie horneristische Tendenz innerhalb der Fraktion tritt in den Vordergrund, als Clement Attlee nach dem Zweiten Weltkrieg die Nachfolge von Arthur Horner antritt."
 RULE_OPTION_ENG_PATH_PANKHURST_SYNDIE: "£KR_game_rule_flag_ENG  Föderalisten - - Pankhurst"
 RULE_OPTION_ENG_PATH_PANKHURST_SYNDIE_DESC: "$RULE_OPTION_ENG_PATH_SYNDIE_DESC$\nSylvia Pankhurst wird Vorsitzende der Föderation, Ellen Wilkinson wird ihre Stellvertreterin."
 RULE_OPTION_ENG_PATH_WILKINSON_SYNDIE: "£KR_game_rule_flag_ENG  Föderalisten - - Wilkinson"
 RULE_OPTION_ENG_PATH_WILKINSON_SYNDIE_DESC: "$RULE_OPTION_ENG_PATH_SYNDIE_DESC$\nDie Pankurstites haben innerhalb der Föderalisten den Vorrang, und Ellen Wilkinson, mit Eric Blair als ihrem Stellvertreter, übernimmt nach dem Zweiten Weltkrieg den Vorsitz von Sylvia Pankhurst."
 RULE_OPTION_ENG_PATH_AUTONOMIST_DESC: "Die Fraktion §RAutonomist§! der Labour Party sichert sich 1936 die Mehrheit im Gewerkschaftskongress. Niclas y Glais verspricht eine stärkere Dezentralisierung für die Menschen in Großbritannien und richtet Gewerkschaftskongresse in Edinburgh und Cardiff ein."
 RULE_OPTION_ENG_PATH_RADSOC: "£KR_game_rule_flag_ENG  £KR_game_rule_flag_SCO  £KR_game_rule_flag_WLS_soc  Autonomisten - Eine neue Hauptstadt"
 RULE_OPTION_ENG_PATH_RADSOC_DESC: "$RULE_OPTION_ENG_PATH_AUTONOMIST_DESC$\nUm sich von den zentralistischen Tendenzen Londons zu lösen, wird Birmingham nach dem Zweiten Weltkrieg zur neuen Hauptstadt Großbritanniens ernannt, wobei Schottland und Wales ein hohes Maß an Autonomie eingeräumt wird."
 RULE_OPTION_ENG_PATH_EDWARDS_SYNDIE: "£KR_game_rule_flag_ENG_england  £KR_game_rule_flag_SCO  £KR_game_rule_flag_WLS_soc  Autonomisten - Unabhängigkeit"
 RULE_OPTION_ENG_PATH_EDWARDS_SYNDIE_DESC: "$RULE_OPTION_ENG_PATH_AUTONOMIST_DESC$\nNach dem Zweiten Weltkrieg löst y Glais den Nationalen Gewerkschaftskongress der Union of Britain vollständig auf und gründet einen neuen englischen TUC, wobei er den neuen schottischen und walisischen TUCs volle Unabhängigkeit gewährt. Ebenezer Edwards übernimmt den Vorsitz der Union of England."
 RULE_OPTION_ENG_PATH_MAXIMIST_DESC: "Die §oMaximisten§!-Fraktion der Labour Party sichert sich 1936 die Mehrheit im Gewerkschaftskongress, und Oswald Mosley übernimmt den Vorsitz mit John Strachey als seinem Stellvertreter."
 RULE_OPTION_ENG_PATH_MOSLEY_TOTALIST: "£KR_game_rule_flag_ENG  Maximisten - Mosley"
 RULE_OPTION_ENG_PATH_MOSLEY_TOTALIST_DESC: "$RULE_OPTION_ENG_PATH_MAXIMIST_DESC$\nOswald Mosley festigt erfolgreich seine Herrschaft und verwandelt die Union von Britannien in einen maximistischen Staat."
 RULE_OPTION_ENG_PATH_MOSLEY_FAILURE_DESC: "Oswald Mosleys Versuche, nach dem Zweiten Weltkrieg die Kontrolle über die Nation zu erlangen, scheitern," 
 RULE_OPTION_ENG_PATH_STRACHEY_TOTALIST: "£KR_game_rule_flag_ENG  Maximisten - Strachey"
 RULE_OPTION_ENG_PATH_STRACHEY_TOTALIST_DESC: "$RULE_OPTION_ENG_PATH_MAXIMIST_DESC$\nOswald Mosleys Versuche, nach dem Zweiten Weltkrieg die Kontrolle über die Nation zu erlangen, scheitern, da er von John Strachey und Eric Blair verdrängt wird."
 RULE_OPTION_ENG_PATH_BLAIR_RADSOC: "£KR_game_rule_flag_ENG  Aktionisten"
 RULE_OPTION_ENG_PATH_BLAIR_RADSOC_DESC: "Die Maximisten sichern sich eine Mehrheit im Gewerkschaftskongress von 1936.\nOswald Mosleys Versuche, die Kontrolle über die Nation zu übernehmen, scheitern spektakulär. Er wird von Eric Blairs §RCouncil of Action§!, auch bekannt als Actionist, einer Strömung innerhalb der Maximist-Fraktion der Labour Party, verdrängt, wobei Blair den Vorsitz übernimmt und Fenner Brockway sein Stellvertreter wird."
 RULE_OPTION_ENG_PATH_NO_MAJORITY_SYNDIE: "£KR_game_rule_flag_ENG  Keine Mehrheit"
 RULE_OPTION_ENG_PATH_NO_MAJORITY_SYNDIE_DESC: "Im Gewerkschaftskongress von 1936 wird keine Mehrheit gefunden, und das bisherige Bündnis zwischen den §rFöderalisten§! und den Maximisten innerhalb der Labour Party wird auch in Zukunft aufrechterhalten."

 GBR_PATH: "£KR_game_rule_flag_GBR   Die Rückkehr des Königs"
 GBR_PATH_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CDie Union von Britannien zerfällt und das Vereinigte Königreich wird wiederhergestellt.§!"
 RULE_OPTION_GBR_PATH_RANDOM: "Standard"
 RULE_OPTION_GBR_PATH_RANDOM_DESC: "Nach vielen Jahren des Exils kann der König endlich in sein Land zurückkehren. Aber Großbritannien hat immer noch die Wunden des Synd
 RULE_OPTION_GBR_PATH_DEM_DESC: "Trotz der Schwierigkeiten gelingt es der Regierung, die Unterstützung der Bevölkerung zu gewinnen und freie Wahlen abzuhalten, die von"
 RULE_OPTION_GBR_PATH_ELECTED_AUTDEM: "£KR_game_rule_flag_GBR   Konservative (Hardliner)"
 RULE_OPTION_GBR_PATH_ELECTED_AUTDEM_DESC: "$RULE_OPTION_GBR_PATH_DEM_DESC$ Henry Page Crofts Hardlinerflügel der §aKonservativen Partei§!.$GBR_PATH_REQUIREMENTS$"
 RULE_OPTION_GBR_PATH_SOCCON: "£KR_game_rule_flag_GBR   Konservative"
 RULE_OPTION_GBR_PATH_SOCCON_DESC: "$RULE_OPTION_GBR_PATH_DEM_DESC$ der §cKonservativen Partei§! gewonnen werden.$GBR_PATH_REQUIREMENTS$"
 RULE_OPTION_GBR_PATH_MARLIB: "£KR_game_rule_flag_GBR   Liberale"
 RULE_OPTION_GBR_RETURN_OF_THE_KING_DEMOCRACY_MARLIB_DESC: "$RULE_OPTION_GBR_PATH_DEM_DESC$ der §mLiberalen Partei§! gewonnen werden.$GBR_PATH_REQUIREMENTS$"
 RULE_OPTION_GBR_PATH_GAITSKELL_SOCDEM: "£KR_game_rule_flag_GBR   Arbeiter - Gaitskell"
 RULE_OPTION_GBR_PATH_GAITSKELL_SOCDEM_DESC: "$RULE_OPTION_GBR_PATH_DEM_DESC$ der §SArbeiterpartei§! gewonnen werden, wobei Hugh Gaitskell Premierminister wird.$GBR_PATH_REQUIREMENTS$"
 RULE_OPTION_GBR_PATH_CROSSMAN_SOCDEM: "£KR_game_rule_flag_GBR  Arbeiter - Crossman"
 RULE_OPTION_GBR_PATH_CROSSMAN_SOCDEM_DESC: "$RULE_OPTION_GBR_PATH_DEM_DESC$ der §SArbeiterpartei§! gewonnen werden, mit Richard Crossman als Premierminister.$GBR_PATH_REQUIREMENTS$"
 RULE_OPTION_GBR_PATH_GUIDED_AUTDEM: "£KR_game_rule_flag_GBR   Nationale Regierung"
 RULE_OPTION_GBR_PATH_GUIDED_AUTDEM_DESC: "Aufgrund der zunehmenden Ablehnung der Regierung durch die Bevölkerung werden die Wahlen abgesagt und eine §aNationale Regierung§! gebildet.$GBR_PATH_REQUIREMENTS$"

 IRE_ELECTION: "£KR_game_rule_flag_IRE  Die Wahlen am Valentinstag"
 RULE_OPTION_IRE_ELECTION_RANDOM: "Standard"
 RULE_OPTION_IRE_ELECTION_RANDOM_DESC: "Sinn Féin führte Irland durch den Beitritt zu Mitteleuropa zu Stabilität und Wohlstand, aber mit dem Schwarzen Montag wurde dieser Status quo durcheinandergebracht, und wer die Wahlen von 1937 gewinnen wird, ist völlig offen."
 RULE_OPTION_IRE_ELECTION_COLLINS_AUTDEM: "£KR_game_rule_flag_IRE  Der große Kerl bleibt"
 RULE_OPTION_IRE_ELECTION_COLLINS_AUTDEM_DESC: "Unmittelbar nach dem Schwarzen Montag gelingt es Präsident Michael Collins, die Forderungen seiner Verbündeten im Norden mit denen der Wählerschaft insgesamt in Einklang zu bringen. Collins bleibt Vorsitzender von §aSinn Féin§! und führt die Partei zum Sieg bei den Wahlen 1937."
 RULE_OPTION_IRE_ELECTION_MULCAHY_AUTDEM: "£KR_game_rule_flag_IRE  Mulcahy übernimmt das Ruder"
 RULE_OPTION_IRE_ELECTION_MULCAHY_AUTDEM_DESC: "Nach dem Schwarzen Montag gibt Präsident Collins die Führung der Sinn Féin an seinen langjährigen Verbündeten Richard Mulcahy ab. Mulcahy führt §aSinn Féin§! bei den Wahlen 1937 zum Sieg und nutzt seine neue Führung, um die Partei auf den Weg der Reform zu bringen."
 RULE_OPTION_IRE_ELECTION_SF_LOSE_DESC: "Sinn Féin verliert bei den Wahlen von 1937 die Macht"
 RULE_OPTION_IRE_ELECTION_CENTRIST_SOCCON: "£KR_game_rule_flag_IRE  Die Koalition der Mitte"
 RULE_OPTION_IRE_ELECTION_CENTRIST_SOCCON_DESC: "$RULE_OPTION_IRE_ELECTION_SF_LOSE_DESC$ zu einer liberal-konservativen Koalition unter der Führung von Éamon de Valeras §cEin Christliche Freistaat§!, oder Christliche Republik, unterstützt von der liberalen Nationale Entwicklungspartei (Nationale Entwicklungspartei)."
 RULE_OPTION_IRE_ELECTION_CURSED_SOCCON: "£KR_game_rule_flag_IRE  Die Konservative Koalition"
 RULE_OPTION_IRE_ELECTION_CURSED_SOCCON_DESC: "$RULE_OPTION_IRE_ELECTION_SF_LOSE_DESC$ zu einer traditionalistischen Koalition unter der Führung von Éamon de Valeras \n§cEin Christlicher Freistaat§!, oder Christliche Republik, unterstützt von der nationalistischen Aontas Náisiúnta, oder Nationale Union, die nach Collins' desaströsem Umgang mit dem Schwarzen Montag zu neuer Bekanntheit gelangt ist."
 RULE_OPTION_IRE_ELECTION_COMPROMISE_SOCDEM: "£KR_game_rule_flag_IRE  Die Kompromiss-Koalition"
 RULE_OPTION_IRE_ELECTION_COMPROMISE_SOCDEM_DESC: "$RULE_OPTION_IRE_ELECTION_SF_LOSE_DESC$ to eine vielfältige Mehrparteienkoalition unter der Führung von William O'Briens §SArbeiterpartei§!, unterstützt von der liberalen Nationalen Entwicklungspartei und der Agrarpartei Clann na Talmhan, oder Kinder der Erde."
 RULE_OPTION_IRE_ELECTION_RADICAL_SOCDEM: "£KR_game_rule_flag_IRE  Die Radikale Koalition"
 RULE_OPTION_IRE_ELECTION_RADICAL_SOCDEM_DESC: "$RULE_OPTION_IRE_ELECTION_SF_LOSE_DESC$ zu einer breiten Linkskoalition unter der Führung von William O'Briens §SArbeiterpartei§!, die von der agrarischen Clann na Talmhan, oder Kinder der Erde, und der pazifistischen sozialistischen Progressiven Arbeiterpartei unterstützt wurde."
 RULE_OPTION_IRE_ELECTION_PATAUT: "£KR_game_rule_flag_IRE  Der Marsch auf Dublin"
 RULE_OPTION_IRE_ELECTION_PATAUT_DESC: "$RULE_OPTION_IRE_ELECTION_SF_LOSE_DESC$, und die Handlungen ihrer Nachfolger verärgerten bald die konservativen und nationalistischen Kräfte im Lande, was zu ihrer Absetzung durch einen paramilitärischen Staatsstreich führte, der von Eoin O'Duffys §PAontas Náisiúnta§!  oder Nationale Union."

IRE_FORPOL: "£KR_game_rule_flag_IRE   Irische Außenpolitik"
RULE_OPTION_IRE_FORPOL_RANDOM: "Standard"
 RULE_OPTION_IRE_FORPOL_RANDOM_DESC: "Seit seiner Unabhängigkeit im Jahr 1922 und seinem Austritt aus der Entente nach der britischen Revolution ist Irland zwar Mitglied von Mitteleuropa, hat aber keine Anstalten gemacht, einem formellen Militärbündnis beizutreten. Die Ereignisse nach der Nordkrise 1938 könnten dazu führen, dass Irland freiwillig oder unfreiwillig Mitglied eines etablierten geopolitischen Blocks wird, oder aber eine Ära der erneuten Neutralität einläutet."
 RULE_OPTION_IRE_FORPOL_INDEPENDENT_START_DESC: "Irland bewahrt seine Unabhängigkeit nach der Nordirlandkrise"
 RULE_OPTION_IRE_FORPOL_INDEPENDENT: "£KR_game_rule_flag_IRE  Aufrechterhaltung der Unabhängigkeit"
 RULE_OPTION_IRE_FORPOL_INDEPENDENT_DESC: "$RULE_OPTION_IRE_FORPOL_INDEPENDENT_START_DESC$, und seine weiteren Handlungen dem Zufall überlassen werden."
 RULE_OPTION_IRE_FORPOL_NEUT: "£KR_game_rule_flag_IRE  Military Neutralität"
 RULE_OPTION_IRE_FORPOL_NEUT_DESC: "$RULE_OPTION_IRE_FORPOL_INDEPENDENT_START_DESC$, und wird nicht versuchen, einer Fraktion beizutreten, es sei denn, sie befindet sich im Krieg."
RULE_OPTION_IRE_FORPOL_GER: "£KR_game_rule_flag_IRE  £KR_game_rule_flag_GER   Reichspakt"
 RULE_OPTION_IRE_FORPOL_GER_DESC: "$RULE_OPTION_IRE_FORPOL_INDEPENDENT_START_DESC$, und später auf ihr altes Bündnis mit den Deutschen aufbauen, indem sie dem Reichspakt beitreten."
RULE_OPTION_IRE_FORPOL_ENT: "£KR_game_rule_flag_IRE  £KR_game_rule_flag_CAN   Entente"
 RULE_OPTION_IRE_FORPOL_ENT_DESC: "$RULE_OPTION_IRE_FORPOL_INDEPENDENT_START_DESC$, und später versuchen, das Kriegsbeil mit ihren alten Kolonialherren zu begraben, indem sie der Entente beitreten."
 RULE_OPTION_IRE_FORPOL_SITUATIONAL: "£KR_game_rule_flag_IRE  Situationsbezogene Ausrichtung"
 RULE_OPTION_IRE_FORPOL_SITUATIONAL_DESC: "$RULE_OPTION_IRE_FORPOL_INDEPENDENT_START_DESC$, und strebt keinen Beitritt zum Reichspakt oder zur Entente an, es sei denn, es befindet sich im Krieg, kann jedoch unter bestimmten begrenzten Umständen einer Fraktion beitreten."
 RULE_OPTION_IRE_FORPOL_COUP_DESC: "Die Nordkrise führt zu einem Militärputsch"
 RULE_OPTION_IRE_FORPOL_PUPPET_GER: "£KR_game_rule_flag_IRE  £KR_game_rule_flag_GER  Pro-deutscher Militärputsch"
 RULE_OPTION_IRE_FORPOL_PUPPET_GER_DESC: "$RULE_OPTION_IRE_FORPOL_COUP_DESC$, was zur Einsetzung einer mit Deutschland verbündeten Marionettenregierung und zum Beitritt Irlands zum Reichspakt führte."
 RULE_OPTION_IRE_FORPOL_PUPPET_ENG: "£KR_game_rule_flag_IRE_soc  £KR_game_rule_flag_ENG  Die Zweite Irische Revolution"
 RULE_OPTION_IRE_FORPOL_PUPPET_ENG_DESC: "$RULE_OPTION_IRE_FORPOL_COUP_DESC$, die dann in einer sozialistischen Revolution, die von der britischen Union unterstützt wird, gestürzt wird. Eine sozialistische Marionettenregierung wird eingesetzt, und Irland schließt sich der Dritten Internationale an."

 IRE_PATH: "£KR_game_rule_flag_IRE  Die Nachwirkungen der Nordkrise"
 IRE_PATH_SOCDEM_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CThe Compromise Coalition§! or §CThe Radical Coalition§! in §Y$IRE_ELECTION$§! and §Rnot§! §CPro-German Military Coup§! in §Y$IRE_FORPOL$§! or\n\n§CPro-German Military Coup§! in §Y$IRE_FORPOL$§! and §Rnot§! §CThe Centrist Coalition§! or §CThe Compromise Coalition§! or §CThe Radical Coalition§! in §Y$IRE_ELECTION$§!\n\n§RNot§! §CThe Second Irish Revolution§! in §Y$IRE_FORPOL$§!"
 IRE_PATH_NATPOP_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CThe March on Dublin§! in §Y$IRE_ELECTION$§!\n\n§RNot§! §CPro-German Military Coup§! or §CThe Second Irish Revolution§! in §Y$IRE_FORPOL$§!"
 IRE_PATH_SOC_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CThe Second Irish Revolution§! in §Y$IRE_FORPOL$§!"
 RULE_OPTION_IRE_PATH_RANDOM: "Standard"
 RULE_OPTION_IRE_PATH_RANDOM_DESC: "Die Ereignisse der Wahlen von 1937 und der Nordkrise haben die Weichen dafür gestellt, wer Irland in Zukunft anführen wird, sei es durch demokratische Wahlen, bewaffnete Aufstände oder ausländische Interventionen, um an die Macht zu kommen."
 RULE_OPTION_IRE_PATH_SINN_FEIN_DESC: "beginnen, die Restriktionen zu lockern und versuchen, sich mit ehemaligen Parteimitgliedern zu versöhnen und dabei die §mSinn Féin§! zu reformieren."
 RULE_OPTION_IRE_PATH_GER_MAJOR_DESC: "verlieren die Wahlen von 1937, werden zur Führung der durch einen pro-deutschen Militärputsch eingesetzten demokratischen Regierung gewählt und streben die Unabhängigkeit von Deutschland an, während sie Teil des Reichspakts bleiben."
 RULE_OPTION_IRE_PATH_GER_MINOR_DESC: "sind nach den Wahlen von 1937 nicht an der Regierung beteiligt und beteiligen sich später an einer demokratischen Regierung, die durch einen pro-deutschen Militärputsch eingesetzt wurde. Sie übernehmen diese Regierung in den folgenden Wahlen und streben die Unabhängigkeit von Deutschland an, während sie Teil des Reichspakts bleiben."
 RULE_OPTION_IRE_PATH_COLLINS_MARLIB: "£KR_game_rule_flag_IRE  Sinn Féin - Collins"
 RULE_OPTION_IRE_PATH_COLLINS_MARLIB_DESC: "Michael Collins bleibt Vorsitzender der §aSinn Féin§!, oder Wir selbst, und regiert Irland nach dem Wahlsieg 1937 und der Bewältigung der Nordirlandkrise nach den Grundsätzen des internationalen Handels, des religiösen Pluralismus und der Bedeutung von Recht und Ordnung. Nachdem die Bedrohung durch die Dritte Internationale in Europa vorüber ist, gehen sie $RULE_OPTION_IRE_PATH_SINN_FEIN_DESC$\n\nAlternativ kann auch Collins' §aSinn Féin§! $RULE_OPTION_IRE_PATH_GER_MAJOR_DESC$\n\n§RBenötigt:§!\n§CDer Große Kerl bleibt§! in §Y$IRE_ELECTION$§! und §Rnicht§! §CPro-deutscher Militärputsch§! in\n§Y$IRE_FORPOL$§! oder\n\n§CPro-deutscher Militärputsch§! in §Y$IRE_FORPOL$§! und §Rnicht§! §CDer Große Kerl bleibt§! oder §CMulcahy übernimmt das Ruder§! in §Y$IRE_ELECTION$§!\n\n§RNicht§! §CDie Zweite Irische Revolution§! in §Y$IRE_FORPOL$§!"
 RULE_OPTION_IRE_PATH_MULCAHY_MARLIB: "£KR_game_rule_flag_IRE  Sinn Féin - Mulcahy"
 RULE_OPTION_IRE_PATH_MULCAHY_MARLIB_DESC: "Richard Mulcahy übernimmt das Amt des Vorsitzenden der §aSinn Féin§!, oder Wir selbst, und nachdem er die Wahlen von 1937 gewonnen und die Nordkrise gemeistert hat, wählt er einen versöhnlicheren Ansatz als die Regierung $RULE_OPTION_IRE_PATH_SINN_FEIN_DESC$\n\nAlternativ dazu kann Mulcahys §aSinn Féin§! $RULE_OPTION_IRE_PATH_GER_MAJOR_DESC$\n\n§RBenötigt:§!\n§CMulcahy übernimmt das Ruder§! in §Y$IRE_ELECTION$§! und §Rnicht§! §CPro-deutscher Militärputsch§! in\n§Y$IRE_FORPOL$§! oder\n\n§CPro-deutscher Militärputsch§! in §Y$IRE_FORPOL$§! und §Rnicht§! §CDer Große Kerl bleibt§! oder §CMulcahy übernimmt das Ruder§! in §Y$IRE_ELECTION$§!\n\n§RNicht§! §CDie Zweite Irische Revolution§! in §Y$IRE_FORPOL$§!"
 RULE_OPTION_IRE_PATH_SOCCON: "£KR_game_rule_flag_IRE  Ein Christliche Freistaat"
 RULE_OPTION_IRE_PATH_SOCCON_DESC: "Éamon de Valeras §cEin Christlicher Freistaat§!, oder die Christliche Republik, führt die 1937 gewählte Koalition an und regiert Irland mit einer Politik, die sich stark an der katholischen Soziallehre orientiert. Ein Christlicher Freistaat führt die Regierungskoalition auch bei späteren Wahlen an.\n\nAlternativ dazu, §cEin Christliche Freistaat§! $RULE_OPTION_IRE_PATH_GER_MAJOR_DESC$\n\n§RBenötigt:§!\n§CDie Koalition der Mitte§! oder §CDie Konservative Koalition§! oder §CDer Marsch auf Dublin§! in §Y$IRE_ELECTION$§! und §Rnicht§! §CPro-deutscher Militärputsch§! in\n§Y$IRE_FORPOL$§! oder\n\n§CPro-deutscher Militärputsch§! in §Y$IRE_FORPOL$§! und §Rnicht§! §CDie Koalition der Mitte§! oder §CDie Konservative Koalition§! oder §CDer Marsch auf Dublin§! in §Y$IRE_ELECTION$§!\n\n§RNicht§! §CDie Zweite Irische Revolution§! in §Y$IRE_FORPOL$§!"
 RULE_OPTION_IRE_PATH_SOCDEM: "£KR_game_rule_flag_IRE  Arbeiter"
 RULE_OPTION_IRE_PATH_SOCDEM_DESC: "Die §SArbeiterpartei§! von William O'Brien führt die 1937 gewählte Koalition an und regiert Irland mit der sozialdemokratischen Politik, die im Demokratischen Programm des ersten Dáil von 1919 enthalten war, aber nie in die Praxis umgesetzt wurde. Labour führt die Regierungskoalition auch bei den folgenden Wahlen an.\n\nAlternativ dazu kann die §SArbeiterpartei§! $RULE_OPTION_IRE_PATH_GER_MAJOR_DESC$$IRE_PATH_SOCDEM_REQUIREMENTS$"
 RULE_OPTION_IRE_PATH_LEMASS_MARLIB: "£KR_game_rule_flag_IRE  Nationale Entwicklungspartei"
 RULE_OPTION_IRE_PATH_LEMASS_MARLIB_DESC: "Die §mNationale Entwicklungspartei§! von Seán Lemass wird bei den Wahlen 1937 als Teil einer Koalition gewählt und übernimmt dann bei den folgenden Wahlen die Führung der Koalition. Sie regiert Irland mit einer Politik, die Unternehmen und Wirtschaftswachstum in den Vordergrund stellt.\n\nAlternativ dazu kann die §mNationale Entwicklungspartei§! $RULE_OPTION_IRE_PATH_GER_MINOR_DESC$\n\n§RBenötigt:§!\n§CDie Koalition der Mitte§! oder §CDie Kompromiss-Koalition§! in §Y$IRE_ELECTION$§! und §Rnicht§! §CPro-deutscher Militärputsch§! in §Y$IRE_FORPOL$§! oder\n\n§CPro-deutscher Militärputsch§! in §Y$IRE_FORPOL$§! und §Rnicht§! §CDie Koalition der Mitte§! oder §CDie Kompromiss-Koalition§! in §Y$IRE_ELECTION$§!\n\n§RNicht§! §CDie Zweite Irische Revolution§! in §Y$IRE_FORPOL$§!"
 RULE_OPTION_IRE_PATH_SOCLIB: "£KR_game_rule_flag_IRE  Clann na Talmhan (Kinder der Erde)"
 RULE_OPTION_IRE_PATH_SOCLIB_DESC: "Michael Donnellans §lClann na Talmhan§!, oder Kinder der Erde, wird bei den Wahlen von 1937 als Teil einer Koalition gewählt und übernimmt bei den folgenden Wahlen die Rolle der wichtigsten Partei in der Koalition. Sie regieren Irland mit einer Politik, die Kleinbauern und ländliche Gebiete in den Vordergrund stellt.\n\nAlternativ dazu, §lClann na Talmhan§! $RULE_OPTION_IRE_PATH_GER_MINOR_DESC$$IRE_PATH_SOCDEM_REQUIREMENTS$"
 RULE_OPTION_IRE_PATH_SOC_END_DESC: "Sie streben dann die Unabhängigkeit von Britannien an, während sie Teil der Dritten Internationale bleiben."
 RULE_OPTION_IRE_PATH_RADSOC: "£KR_game_rule_flag_IRE  Progressive Arbeiter"
 RULE_OPTION_IRE_PATH_RADSOC_DESC: "Owen Sheehy-Skeffingtons §RProgressive Arbeiterpartei§ wird bei den Wahlen 1937 als Teil einer Koalition gewählt und übernimmt, solange Irland sich nicht in einer Fraktion oder im Krieg befindet und ausreichende Reformen verabschiedet hat, bei den folgenden Wahlen die Führung in der Koalition. Sie regieren Irland mit einer Politik, die auf Pazifismus, Egalitarismus und Säkularismus ausgerichtet ist, und dürfen nur unter bestimmten Umständen der Dritten Internationale beitreten.\n\nAlternativ dazu hat die §RProgressive Arbeiterpartei§! Sheehy-Skeffington dazu gebracht, die Kontrolle über die Parteiführung an militantere Mitglieder abzugeben, und nach dem Scheitern der Labour-Regierung in der Nordirlandkrise mit Hilfe der Union von Britannien die Regierung übernommen. $RULE_OPTION_IRE_PATH_SOC_END_DESC$\n\n§RBenötigt:§!\n§CDie Radikale Koalition§! in §Y$IRE_ELECTION$§!\n\n§CDie Zweite Irische Revolution§! in §Y$IRE_FORPOL$§! oder §Cdie Dritte Internationale existiert§!\n\n§RNicht§! §CReichspakt§! oder §CEntente§! oder §CPro-deutscher Militärputsch§! in §Y$IRE_FORPOL$§!"
 RULE_OPTION_IRE_PATH_PATAUT: "£KR_game_rule_flag_IRE  Aontas Náisiúnta - Autokratie"
 RULE_OPTION_IRE_PATH_PATAUT_DESC: "Eoin O'Duffys §PAontas Náisiúnta§!, oder Nationale Union, stürzt die instabile gewählte Regierung nach den Wahlen von 1937 und steuert erfolgreich durch die Nordkrise. Anschließend triumphiert er im innerparteilichen Machtkampf, festigt seine Herrschaft und regiert Irland als nationalistische, katholisch geprägte, korporatistische Diktatur, die von der Armee unterstützt wird.\n\nAlternativ beteiligt sich §PAontas Náisiúnta§! nach den Wahlen von 1937 nicht an der gewählten Regierung und stürzt diese auch nicht. O'Duffy wird später zum Anführer einer durch einen pro-deutschen Militärputsch eingesetzten Diktatur ernannt und versucht anschließend, die Unabhängigkeit von Deutschland zu erlangen, während das Land Teil des Reichspaktes bleibt.\n\n§RBenötigt:§!\n§CDer Marsch auf Dublin§! und §Rnicht§! §CPro-deutscher Militärputsch§! in §Y$IRE_FORPOL$§! oder\n\n§CPro-deutscher Militärputsch§! in §Y$IRE_FORPOL$§! und §Rnicht§! §CDie Konservative Koalition§! oder §CDer Marsch auf Dublin§! in §Y$IRE_ELECTION$§!\n\n§RNicht§! §CDie Zweite Irische Revolution§! in §Y$IRE_FORPOL$§!"
 RULE_OPTION_IRE_PATH_AN_DESC: "Aontas Náisiúnta, oder \"Nationale Union\", verdrängt nach den Wahlen von 1937 die instabile gewählte Regierung und meistert erfolgreich die Nordirlandkrise."
 RULE_OPTION_IRE_PATH_AUTDEM: "£KR_game_rule_flag_IRE  Aontas Náisiúnta - Demokratie"
 RULE_OPTION_IRE_PATH_AUTDEM_DESC: "$RULE_OPTION_IRE_PATH_AN_DESC$ Der parteiinterne Machtkampf führt zu einer Pattsituation, und der gemäßigte John J. O'Kelly muss die Scherben auflesen. Er verwandelt Irland in eine traditionalistische, konservativ geführte Demokratie, reformiert dabei §aAontas Náisiúnta§! und bildet eine Koalition mit Ein Christlicher Freistaat.\n\nAlternativ dazu, §PAontas Náisiúnta§! (Nationale Union) wird bei den Wahlen 1937 als Teil einer Koalition gewählt und übernimmt bei den folgenden Wahlen die Hauptrolle in der Koalition.\n\nAlternativ dazu, §aAontas Náisiúnta§! $RULE_OPTION_IRE_PATH_GER_MINOR_DESC$\n\n§RBenötigt:§!\n§CDie Konservative Koalition§! oder §CDer Marsch auf Dublin§! in §Y$IRE_ELECTION$§! und §Rnicht§! §CPro-deutscher Militärputsch§! in §Y$IRE_FORPOL$§! oder\n\n§CPro-deutscher Militärputsch§! in §Y$IRE_FORPOL$§! und §Rnicht§! §CDie Konservative Koalition§! oder §CDer Marsch auf Dublin§! in §Y$IRE_ELECTION$§!\n\n§RNicht§! §CDie Zweite Irische Revolution§! in §Y$IRE_FORPOL$§!"
 RULE_OPTION_IRE_PATH_NATPOP_DESC: "$RULE_OPTION_IRE_PATH_AN_DESC$ Gearóid Ó Cuinneagáins gälisch-supremistischer, integralistischer Flügel der §nAontas Náisiúnta§! verändert die Partei völlig."
 RULE_OPTION_IRE_PATH_REG_NATPOP: "£KR_game_rule_flag_IRE_mon  Aontas Náisiúnta - Regentschaft"
 RULE_OPTION_IRE_PATH_REG_NATPOP_DESC: "$RULE_OPTION_IRE_PATH_NATPOP_DESC$\n\nDa er das monarchische System bewundert, aber keinen würdigen Anwärter auf den irischen Thron hat, regiert Ó Cuinneagáin Irland als Regent, bis ein geeigneter Kandidat gefunden ist.$IRE_PATH_NATPOP_REQUIREMENTS$"
 RULE_OPTION_IRE_PATH_MON_NATPOP: "£KR_game_rule_flag_IRE_mon  Aontas Náisiúnta - Monarchie"
 RULE_OPTION_IRE_PATH_MON_NATPOP_DESC: "$RULE_OPTION_IRE_PATH_NATPOP_DESC$\n\nÓ Cuinneagáin krönt den portugiesischen Adligen Jorge Maria O'Neill, Spross der alten und angesehenen Ó Néill-Dynastie, in dem Bestreben, Irland wieder zu alter Blüte zu verhelfen.$IRE_PATH_NATPOP_REQUIREMENTS$"
 RULE_OPTION_IRE_PATH_SOC_START_DESC: "Die Regierung bricht während der Nordkrise zusammen, und einem versuchten pro-deutschen Militärputsch steht bald eine sozialistische Revolution gegenüber, die maßgeblich von der Union of Britain unterstützt wird."
 RULE_OPTION_IRE_PATH_SYNDIE: "£KR_game_rule_flag_IRE_soc  Irische Syndikalistische Partei"
 RULE_OPTION_IRE_PATH_SYNDIE_DESC: "$RULE_OPTION_IRE_PATH_SOC_START_DESC$\n\nJames Larkins §rIrische Syndikalistische Partei§! tritt nach der Revolution in den Vordergrund, inspiriert von den Ansichten von James Connolly und den Theorien des orthodoxen Syndikalismus in anderen sozialistischen Ländern. $RULE_OPTION_IRE_PATH_SOC_END_DESC$$IRE_PATH_SOC_REQUIREMENTS$"
 RULE_OPTION_IRE_PATH_TOTALIST: "£KR_game_rule_flag_IRE_soc  Saor Éire (Freies Irland)"
 RULE_OPTION_IRE_PATH_TOTALIST_DESC: "$RULE_OPTION_IRE_PATH_SOC_START_DESC$\n\nPeadar O'Donnells §oSaor Éire§!, oder Freies Irland, tritt nach der Revolution in den Vordergrund und begründet einen nationalistischen, avantgardistischen Parteienstaat, der von einem militanten ländlichen Sozialismus geprägt ist. $RULE_OPTION_IRE_PATH_SOC_END_DESC$$IRE_PATH_SOC_REQUIREMENTS$"

 NIR_REVOLT: "£KR_game_rule_flag_NIR  Die Nordische Revolte"
 NIR_REVOLT_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CThe March on Dublin§! in §Y$IRE_ELECTION$§! and §Rnot§! §CEntente§!, §CPro-German Military Coup§! or §CThe Second Irish Revolution§! in\n§Y$IRE_FORPOL$§! and §Rnot§! §CAontas Náisiúnta - Democracy§! in §Y$IRE_PATH$§! or\n\n§CThe Second Irish Revolution§! in §Y$IRE_FORPOL$§!\nand §Cthe Entente is at war with the Third Internationale§!"
 RULE_OPTION_NIR_REVOLT_RANDOM: "Standard"
 RULE_OPTION_NIR_REVOLT_RANDOM_DESC: "Da Nordirland ein Bündnis mit Dublin als vorteilhaft für eine Invasion durch die britische Union ansah, schloss es sich nach der Britischen Revolution der Republik an.\nDennoch bestehen weiterhin tiefe historische Gräben, und sollte Irland an Syndikalisten oder Hardliner-Nationalisten fallen, könnte sich Nordirland gegen die Dubliner Herrschaft erheben."
 RULE_OPTION_NIR_REVOLT_NO: "£KR_game_rule_flag_IRE_mon  £KR_game_rule_flag_IRE_soc  Keine Revolte"
 RULE_OPTION_NIR_REVOLT_NO_DESC: "Irlands neue rechts- oder linksextreme Regierung schafft es, eine mögliche Rebellion im Norden zu ersticken, bevor sie ausbricht.$NIR_REVOLT_REQUIREMENTS$"
 RULE_OPTION_NIR_REVOLT_DESC: "Nordirland erklärt der Regierung in Dublin den Krieg. Wenn es sich um ein reaktionäres Regime handelt, ist dies irgendwann nach März 1938, und Nordirland tritt der Entente bei, wenn dies gelingt.\nWenn es sich um ein syndikalistisches Regime handelt, kommt es zu einer Revolte, wenn die Entente sich im Krieg mit der Dritten Internationale befindet und Nordirland sich zu Beginn der Revolte der Entente anschließt."
 RULE_OPTION_NIR_REVOLT_YES: "£KR_game_rule_flag_NIR  £KR_game_rule_flag_IRE_mon  £KR_game_rule_flag_IRE_soc  Revolte"
 RULE_OPTION_NIR_REVOLT_YES_DESC: "$RULE_OPTION_NIR_REVOLT_DESC$$NIR_REVOLT_REQUIREMENTS$"
 RULE_OPTION_NIR_REVOLT_PUPPET: "£KR_game_rule_flag_NIR  £KR_game_rule_flag_GBR  £KR_game_rule_flag_IRE_mon  £KR_game_rule_flag_IRE_soc  Revolte - Devolution"
 RULE_OPTION_NIR_REVOLT_PUPPET_DESC: "$RULE_OPTION_NIR_REVOLT_DESC$\nSollte die Revolte erfolgreich sein, bleibt Nordirland eine dezentrale Regierung des Vereinigten Königreichs, wie es vor der britischen Revolution der Fall war.$NIR_REVOLT_REQUIREMENTS$"
 RULE_OPTION_NIR_REVOLT_ANNEX: "£KR_game_rule_flag_GBR  £KR_game_rule_flag_IRE_mon  £KR_game_rule_flag_IRE_soc  Revolte - Integration"
 RULE_OPTION_NIR_REVOLT_ANNEX_DESC: "$RULE_OPTION_NIR_REVOLT_DESC$\nSollte der Aufstand erfolgreich sein, wird Nordirland vollständig an das Vereinigte Königreich angegliedert.$NIR_REVOLT_REQUIREMENTS$"

BEL_FLAWAL_PATH: "£KR_game_rule_flag_BEL_flawal   Die Folgen des 17. Februar"
RULE_OPTION_BEL_FLAWAL_PATH_RANDOM: "Standard"
RULE_OPTION_BEL_FLAWAL_PATH_RANDOM_DESC: "Mit einem unbeliebten König und einer großen antideutschen Stimmung in der Bevölkerung steht Flanders-Wallonien auf dem Weg zu großen Veränderungen."
RULE_OPTION_BEL_FLAWAL_PATH_REFORM_AUTDEM: "£KR_game_rule_flag_BEL_flawal   Königliches Kabinett"
RULE_OPTION_BEL_FLAWAL_PATH_REFORM_AUTDEM_DESC: "Adelbert und sein §aKönigliches Kabinett / Royaal Kabinet§!, oder Königliches Kabinett, unterdrücken die Proteste mit Hilfe der Armee und wagen es nicht, Reformen im Königreich durchzuführen."
 RULE_OPTION_BEL_FLAWAL_PATH_REFORM_DESC: "Adelbert unterdrückt die Proteste mit Hilfe der Armee. Einige Zeit später beschließt er Reformen, die das Königreich zu einer vollwertigen konstitutionellen Monarchie machen."
RULE_OPTION_BEL_FLAWAL_PATH_REFORM_SOCCON: "£KR_game_rule_flag_BEL_flawal   Reformen - KP /  DC"
 RULE_OPTION_BEL_FLAWAL_PATH_REFORM_SOCCON_DESC: "$RULE_OPTION_BEL_FLAWAL_PATH_REFORM_DESC$\nDer §cKatholiek Blok / Démocratie Chrétienne§! oder Katholischer Block / Christdemokraten gewinnt die folgenden Wahlen."
 RULE_OPTION_BEL_FLAWAL_PATH_REFORM_SOCDEM: "£KR_game_rule_flag_BEL_flawal   Reformen - Arbeiter"
 RULE_OPTION_BEL_FLAWAL_PATH_REFORM_SOCDEM_DESC: "$RULE_OPTION_BEL_FLAWAL_PATH_REFORM_DESC$\nDie §SBelgische Werklieden Partij / Parti Ouvrier Belge§!, oder Belgische Arbeiterpartei, gewinnt die folgenden Wahlen."
 RULE_OPTION_BEL_FLAWAL_PATH_REFORM_MARLIB: "£KR_game_rule_flag_BEL_flawal  Reformen - Liberale"
 RULE_OPTION_BEL_FLAWAL_PATH_REFORM_MARLIB_DESC: "$RULE_OPTION_BEL_FLAWAL_PATH_REFORM_DESC$\nDie KP/DC gewinnt die darauffolgenden Wahlen, und die §mLiberale Partij§! übernimmt bei den folgenden Wahlen die Führung."
 RULE_OPTION_BEL_FLAWAL_PATH_REFORM_SOCLIB: "£KR_game_rule_flag_BEL_flawal  Reformen - Arbeit (Zentrum)"
 RULE_OPTION_BEL_FLAWAL_PATH_REFORM_SOCLIB_DESC: "$RULE_OPTION_BEL_FLAWAL_PATH_REFORM_DESC$\nDie Arbeiterpartei gewinnt die folgenden Wahlen, wobei der gemäßigte Flügel der §IBelgische Werklieden Partij / Parti Ouvrier Belge§!, oder Belgische Arbeiterpartei, bei den darauf folgenden Wahlen an Bedeutung gewinnt."
 RULE_OPTION_BEL_FLAWAL_PATH_COUP_DESC: "Adelbert unterdrückt die Proteste mit Hilfe der Armee. Nach einiger Zeit wird die Armee stark genug, um die unpopuläre Regierung zu stürzen und Adelbert zu einer Galionsfigur zu machen."
 RULE_OPTION_BEL_FLAWAL_PATH_COUP_SOCCON: "£KR_game_rule_flag_BEL_flawal   Militärputsch - KP /  DC"
 RULE_OPTION_BEL_FLAWAL_PATH_COUP_SOCCON_DESC: "$RULE_OPTION_BEL_FLAWAL_PATH_COUP_DESC$\nDie §cKP/DC§! gewinnen die folgenden Wahlen."
 RULE_OPTION_BEL_FLAWAL_PATH_COUP_MARLIB: "£KR_game_rule_flag_BEL_flawal   Militärputsch - Liberale"
 RULE_OPTION_BEL_FLAWAL_PATH_COUP_MARLIB_DESC: "$RULE_OPTION_BEL_FLAWAL_PATH_COUP_DESC$\nDie §mLiberale Partij§! gewinnt die folgenden Wahlen."
 RULE_OPTION_BEL_FLAWAL_PATH_COUP_SOCDEM: "£KR_game_rule_flag_BEL_flawal   Militärputsch - Arbeiter"
 RULE_OPTION_BEL_FLAWAL_PATH_COUP_SOCDEM_DESC: "$RULE_OPTION_BEL_FLAWAL_PATH_COUP_DESC$\nDie §SBWP/POB§! gewinnen die folgenden Wahlen."
 RULE_OPTION_BEL_FLAWAL_PATH_COUP_SOCLIB: "£KR_game_rule_flag_BEL_flawal  Militärputsch - Arbeiter (Zentrum)"
 RULE_OPTION_BEL_FLAWAL_PATH_COUP_SOCLIB_DESC: "$RULE_OPTION_BEL_FLAWAL_PATH_COUP_DESC$\nDie BWP/POB gewinnt die folgenden Wahlen, wobei der gemäßigte Flügel der §lBWP/POB§! bei den darauffolgenden Wahlen die Macht übernimmt."
 RULE_OPTION_BEL_FLAWAL_PATH_COUP_AUTDEM: "£KR_game_rule_flag_BEL_flawal   Militärputsch - Königliches Kabinett"
 RULE_OPTION_BEL_FLAWAL_PATH_COUP_AUTDEM_DESC: "$RULE_OPTION_BEL_FLAWAL_PATH_COUP_DESC$\n\nDie BWP/POB gewinnen die darauffolgenden Wahlen, aber Deutschland interveniert und setzt Adelbert und sein §aKönigliches Kabinett§! wieder ein. \nBelgien revoltiert später, nachdem die Französische Kommune dem Deutschland den Krieg erklärt hat."
 RULE_OPTION_BEL_FLAWAL_PATH_PATAUT: "£KR_game_rule_flag_BEL_flawal    Militärputsch - Flämischer Rat"
 RULE_OPTION_BEL_FLAWAL_PATH_PATAUT_DESC: "$RULE_OPTION_BEL_FLAWAL_PATH_COUP_DESC$.\nDas Militär beschließt, die Macht nicht abzugeben, und regiert über den §PVlaamse Raad§! , oder Flämischen Rat."
 RULE_OPTION_BEL_FLAWAL_PATH_REVOLT_DESC: "Adelbert schickt die Armee, um die Proteste vom 17. Februar niederzuschlagen. In einem letzten Versuch, die Macht zu erhalten, bevor er aufgelöst wird, wagt der §PVlaamse Raad§! den Schritt, einstimmig die Unabhängigkeit Flanderns zu erklären."
 RULE_OPTION_BEL_FLAWAL_PATH_INTERVENTION: "£KR_game_rule_flag_WAL  £KR_game_rule_flag_FLA   Flämischer Aufstand - Intervention"
 RULE_OPTION_BEL_FLAWAL_PATH_INTERVENTION_DESC: "$RULE_OPTION_BEL_FLAWAL_PATH_REVOLT_DESC$ Adelbert schlägt diesen Aufstand nieder."
 RULE_OPTION_BEL_FLAWAL_PATH_ACQUIESCENCE: "£KR_game_rule_flag_WAL  £KR_game_rule_flag_FLA   Flämischer Aufstand - Duldung"
 RULE_OPTION_BEL_FLAWAL_PATH_ACQUIESCENCE_DESC: "$RULE_OPTION_BEL_FLAWAL_PATH_REVOLT_DESC$ Adelbert zögert, in Flandern einzumarschieren."
 RULE_OPTION_BEL_FLAWAL_PATH_REBELLION: "£KR_game_rule_flag_BEL   Rebellion - Belgiens Unabhängigkeit"
 RULE_OPTION_BEL_FLAWAL_PATH_EBELLION_DESC: "Die örtliche Polizei versucht allein, die Proteste vom 17. Februar zu unterdrücken. Die Situation spitzt sich zu und gipfelt in einer Revolte. Flämische und wallonische Rebellen arbeiten zusammen, um die Unabhängigkeit eines vereinten Belgiens zu sichern und die deutschen Truppen aus dem Land zu vertreiben.\n\n§CAnmerkung: Belgien erklärt seine Unabhängigkeit 1936.§!"
 RULE_OPTION_BEL_FLAWAL_PATH_REFERENDUM_START_DESC: "Adelbert schickt die Armee, um die Proteste vom 17. Februar niederzuschlagen. Aufgrund der zunehmenden Spannungen wird ein geheimes Referendum abgehalten, in dem die Unabhängigkeit Belgiens gefordert wird."
 RULE_OPTION_BEL_FLAWAL_PATH_REFERENDUM: "£KR_game_rule_flag_BEL   Referendum - Unabhängigkeit von Belgien"
 RULE_OPTION_BEL_FLAWAL_PATH_REFERENDUM_DESC: "$RULE_OPTION_BEL_FLAWAL_PATH_REFERENDUM_START_DESC$ Deutschland akzeptiert das Ergebnis dieses Referendums und gewährt Belgien seine Unabhängigkeit.\n\n§Anmerkung: Belgien erklärt seine Unabhängigkeit um 1937 oder später§!"
 RULE_OPTION_BEL_FLAWAL_PATH_CRACKDOWN: "£KR_game_rule_flag_WAL   Referendum - Niederschlagung"
 RULE_OPTION_BEL_FLAWAL_PATH_CRACKDOWN_DESC: "$RULE_OPTION_BEL_FLAWAL_PATH_REFERENDUM_START_DESC$ Deutschland erkennt die Ergebnisse dieses Referendums nicht an und geht gegen alle Andersdenkenden vor. Belgien revoltiert später, nachdem die Komune von Frankreich Deutschland den Krieg erklärt hat."
 RULE_OPTION_BEL_FLAWAL_PATH_ABDICATION: "£KR_game_rule_flag_BEL   Abdankung - Belgiens Unabhängigkeit"
 RULE_OPTION_BEL_FLAWAL_PATH_ABDICATION_DESC: "Adelbert schickt die Armee, um die Proteste vom 17. Februar niederzuschlagen. Die Flämische Wacht ergreift die Gelegenheit, um ihre Macht zu festigen. Später führt sie einen erfolgreichen Staatsstreich durch und zwingt Adelbert zur Abdankung. \n\n§Anmerkung: Belgien erklärt die Unabhängigkeit um 1938 oder später§!"
 RULE_OPTION_BEL_FLAWAL_PATH_COLLAPSE: "£KR_game_rule_flag_WAL  £KR_game_rule_flag_FLA   Zusammenbruch"
 RULE_OPTION_BEL_FLAWAL_PATH_COLLAPSE_DESC: "Ein vereintes Flandern-Wallonien überlebt die Feuer der Revolution nicht, und an seiner Stelle entstehen zwei neue, getrennte Länder, deren Schicksal ungewiss ist.\n\n§CAnmerkung: Flandern-Wallonien kollabiert 1936.§!"

 BEL_PATH: "£KR_game_rule_flag_BEL   Erster belgischer Kongress"
 BEL_PATH_REQUIREMENTS: "\n\n§RBenötigt:§!\nAny §CBelgian Independence§! in §Y$BEL_FLAWAL_PATH$§!"
RULE_OPTION_BEL_PATH_RANDOM: "Standard"
RULE_OPTION_BEL_PATH_RANDOM_DESC: "Der deutsche Thronprätendent wird abgesetzt, und die provisorische Regierung ruft formelle Wahlen aus. Es müssen zwei getrennte Abstimmungen durchgeführt werden, die erste über die Art der Regierung, die der Staat anstrebt, und die zweite als allgemeine Wahl."
 RULE_OPTION_BEL_PATH_MON_START_DESC: "Die Belgier stimmen für die Rückkehr von König Albert I."
 RULE_OPTION_BEL_PATH_GENERIC_DESC: "und die nachfolgend gewählte Regierung dem Zufall überlassen."
 RULE_OPTION_BEL_PATH_MON: "£KR_game_rule_flag_BEL  Monarchie"
 RULE_OPTION_BEL_PATH_MON_DESC: "$RULE_OPTION_BEL_PATH_MON_START_DESC$, $RULE_OPTION_BEL_PATH_GENERIC_DESC$$BEL_PATH_REQUIREMENTS$"
 RULE_OPTION_BEL_PATH_MON_SOCDEM: "£KR_game_rule_flag_BEL  Monarchie – Arbeiter"
RULE_OPTION_BEL_PATH_MON_SOCDEM_DESC: "$RULE_OPTION_BEL_PATH_MON_START_DESC$, und wählt Achille Van Ackers Flügel der §SBelgische Werklieden Partij / Parti Ouvrier Belge§! oder Belgische Arbeiterpartei.$BEL_PATH_REQUIREMENTS$"
 RULE_OPTION_BEL_PATH_MON_SOCLIB: "£KR_game_rule_flag_BEL   Monarchie - Arbeiter (Zentrum)"
 RULE_OPTION_BEL_PATH_MON_SOCLIB_DESC: "$RULE_OPTION_BEL_PATH_MON_START_DESC$, und wählen den Flügel der BWP/POB von Achille Van Acker.\nBei den folgenden Wahlen gewinnen Paul-Henri Spaaks zentristischer Flügel der §lBelgischen Werklieden Partij / Parti Ouvrier Belge§! oder Belgische Arbeiterpartei.$BEL_PATH_REQUIREMENTS$"
 RULE_OPTION_BEL_PATH_MON_SOCCON: "£KR_game_rule_flag_BEL  Monarchie - KP /  DC"
 RULE_OPTION_BEL_PATH_MON_SOCCON_DESC: "$RULE_OPTION_BEL_PATH_MON_START_DESC$, und wählen Paul Van Zeelands §cKatholiek Blok / Démocratie Chrétienne§! oder Katholischer Block / Christdemokraten.§!$BEL_PATH_REQUIREMENTS$"
 RULE_OPTION_BEL_PATH_MON_MARLIB: "£KR_game_rule_flag_BEL  Monarchie - Liberale"
 RULE_OPTION_BEL_PATH_MON_MARLIB_DESC: "$RULE_OPTION_BEL_PATH_MON_START_DESC$, und wählen die KP/DC.\nBei den folgenden Wahlen siegt Paul-Emile Jansons §mLiberale Partij§!, die Liberale Partei.$BEL_PATH_REQUIREMENTS$"
 RULE_OPTION_BEL_PATH_MON_PATAUT: "£KR_game_rule_flag_BEL   Monarchie - Verdinaso"
 RULE_OPTION_BEL_PATH_MON_PATAUT_DESC: "$RULE_OPTION_BEL_PATH_MON_START_DESC$, und wählen Joris Van Severens §PVerbond van Dietsche Nationaal-Solidaristen§!, oder Union der Niederländischen Nationalen Solidaristen, auch bekannt als Verdinaso.$BEL_PATH_REQUIREMENTS$"
 RULE_OPTION_BEL_PATH_REP_START_DESC: "Die Bevölkerung Belgiens stimmt für die Ausrufung einer Republik."
 RULE_OPTION_BEL_PATH_REP: "£KR_game_rule_flag_BEL  Republik"
 RULE_OPTION_BEL_PATH_REP_DESC: "$RULE_OPTION_BEL_PATH_REP_START_DESC$, $RULE_OPTION_BEL_PATH_GENERIC_DESC$§!$BEL_PATH_REQUIREMENTS$"
 RULE_OPTION_BEL_PATH_REP_SOCDEM: "£KR_game_rule_flag_BEL  Republik – Arbeiter"
 RULE_OPTION_BEL_PATH_REP_SOCDEM_DESC: "$RULE_OPTION_BEL_PATH_REP_START_DESC$, und wählen Achille Van Ackers Flügel der §SBWP/POB§!$BEL_PATH_REQUIREMENTS$"
 RULE_OPTION_BEL_PATH_REP_SOCLIB: "£KR_game_rule_flag_BEL   Republik - Arbeiter (Zentrum)"
 RULE_OPTION_BEL_PATH_REP_SOCLIB_DESC: "$RULE_OPTION_BEL_PATH_REP_START_DESC$, und wählen Paul-Henri Spaaks zentristischer Flügel des §lBWP/POB§!$BEL_PATH_REQUIREMENTS$"
 RULE_OPTION_BEL_PATH_REP_MARLIB: "£KR_game_rule_flag_BEL   Republik - Liberale"
 RULE_OPTION_BEL_PATH_REP_MARLIB_DESC: "$RULE_OPTION_BEL_PATH_REP_START_DESC$, und wählen Paul-Emile Jansons §mLiberale Partij§!$BEL_PATH_REQUIREMENTS$"
 RULE_OPTION_BEL_PATH_REP_SOCCON: "£KR_game_rule_flag_BEL  Republik - KP /  DC"
 RULE_OPTION_BEL_PATH_REP_SOCCON_DESC: "$RULE_OPTION_BEL_PATH_REP_START_DESC$, und wählen die Liberalen.\n Bei den folgenden Wahlen siegt Paul Van Zeelands §cKP/DC§!$BEL_PATH_REQUIREMENTS$"
 RULE_OPTION_BEL_PATH_REP_PATAUT: "£KR_game_rule_flag_BEL   Republik - Verdinaso"
 RULE_OPTION_BEL_PATH_REP_PATAUT_DESC: "Nach der Abdankung Adelberts übernimmt Van Severen die Macht und erklärt sich zum \"Anführer\".\nEr setzt eine Militärregierung unter der Führung von §PVerdinaso§! ein.\n\n§RBenötigt:§!\n§CAbdankung - Belgiens Unabhängigkeit§! in\n§Y$BEL_FLAWAL_PATH$§!"
 RULE_OPTION_BEL_PATH_SYNDIE: "£KR_game_rule_flag_BEL_soc   Republik - Arbeiter (reformiert)"
 RULE_OPTION_BEL_PATH_SYNDIE_DESC: "$RULE_OPTION_BEL_PATH_REP_START_DESC$, und wählen die BWP/POB.\nJoseph Jacquemotte übernimmt die Regierung und reformiert die §RBelgische Werklieden Partij / Parti Ouvrier Belge§!, oder Belgische Arbeiterpartei, und verwandelt das Land in einen syndikalistischen Staat.$BEL_PATH_REQUIREMENTS$\n\n§RKein§! §CReichspakt§! oder §CEntente§! in §Y$BEL_FORPOL$§!"

 BEL_FORPOL: "£KR_game_rule_flag_BEL   Belgiens Außenpolitik"
 BEL_FORPOL_FACTION_REQUIREMENTS: "$BEL_PATH_REQUIREMENTS$\n§RNot§! §CRepublic - Arbeiter (reformiert)§! in §Y$BEL_PATH$§!"
RULE_OPTION_BEL_FORPOL_RANDOM: "Standard"
RULE_OPTION_BEL_FORPOL_RANDOM_DESC: "Mit der Wiedererlangung seiner Unabhängigkeit und den zunehmenden internationalen Spannungen muss Belgien seine Stellung in der Welt festigen."
RULE_OPTION_BEL_FORPOL_GER: "£KR_game_rule_flag_BEL  £KR_game_rule_flag_GER   Reichspakt"
RULE_OPTION_BEL_FORPOL_GER_DESC: "Belgien und Deutschland vereinbaren, dass Belgien im Gegenzug für die Anerkennung seiner Unabhängigkeit dem Reichspakt wieder beitritt.$BEL_FORPOL_FACTION_REQUIREMENTS$"
 RULE_OPTION_BEL_FORPOL_NOT_GER_DESC: "Belgien lässt sich von den deutschen diplomatischen Bemühungen um eine Wiederaufnahme in den Reichspakt nicht überzeugen."
RULE_OPTION_BEL_FORPOL_ENT: "£KR_game_rule_flag_BEL  £KR_game_rule_flag_CAN   Entente"
RULE_OPTION_BEL_FORPOL_ENT_DESC: "$RULE_OPTION_BEL_FORPOL_NOT_GER_DESC$ Belgien tritt später der Entente bei.$BEL_FORPOL_FACTION_REQUIREMENTS$"
RULE_OPTION_BEL_FORPOL_INT: "£KR_game_rule_flag_BEL_soc  £KR_game_rule_flag_FRA   Internationale"
RULE_OPTION_BEL_FORPOL_INT_DESC: "$RULE_OPTION_BEL_FORPOL_NOT_GER_DESC$ Später, unter der Herrschaft radikaler Elemente der BWP, tritt Belgien der Dritten Internationale bei.$BEL_PATH_REQUIREMENTS$\n§CRepublic - Arbeiter (reformiert)§! in §Y$BEL_PATH$§!"
RULE_OPTION_BEL_FORPOL_BEL: "£KR_game_rule_flag_BEL  £KR_game_rule_flag_HOL   Belgisch Niederländische Allianz"
RULE_OPTION_BEL_FORPOL_BEL_DESC: "$RULE_OPTION_BEL_FORPOL_NOT_GER_DESC$ Belgien verbündet sich später mit den Niederlanden.$BEL_PATH_REQUIREMENTS$\n§CBelgo-Dutch Alliance§! in §Y$HOL_FORPOL$§!\n\n§RNot§! §CRepublic - Arbeiter (reformiert)§! in §Y$BEL_PATH$§!"

 FLA_PATH: "£KR_game_rule_flag_FLA   Der Flämische Rat"
 FLA_PATH_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CCollapse§! or any §CFlemish Revolt§! in §Y$BEL_FLAWAL_PATH$§!"
 FLA_PATH_HOL_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CCollapse§! in §Y$BEL_FLAWAL_PATH$§!"
 FLA_PATH_HOL_WAR_REQUIREMENTS: "$FLA_PATH_HOL_REQUIREMENTS$\n\n§RNot§! §CFrance Guarantees Wallonia§! or §CFrance Abandons Wallonia§! or §CWeltkrieg Over Wallonia§! in §Y$WAL_PATH$§!"
 RULE_OPTION_FLA_PATH_RANDOM: "Standard"
 RULE_OPTION_FLA_PATH_RANDOM_DESC: "Ein Flämischer Rat, der sich hauptsächlich aus Adligen zusammensetzt, tritt zusammen, um den Monarchen eines neuen, unabhängigen Landes zu wählen. Aber kann dieser neue König an der Macht bleiben und sein Amt ausüben, oder wird er unter dem Ansturm der Radikalen und Befürworter eines Beitritts zu den Niederlanden zusammenbrechen?"
 RULE_OPTION_FLA_PATH_AUTDEM: "£KR_game_rule_flag_FLA   Monarchie – Loyalisten"
 RULE_OPTION_FLA_PATH_AUTDEM_DESC: "Nachdem sie ihre Macht im Rat gefestigt haben, beschließen die §aDuitse Loyalisten§!, oder niederländischen Loyalisten, unter den Adligen, Adelbert auf den Thron einzuladen, um unter seiner nominellen Herrschaft ihre Autorität ausüben zu können.$FLA_PATH_REQUIREMENTS$\n§CAbsolute Monarchie§! oder eine beliebige §CMonarchie§! in §Y$WAL_PATH$§!"
 RULE_OPTION_FLA_PATH_MON_DESC: "Nachdem sie ihre Macht im Rat gefestigt haben, beschließt der Adel, Graf Karel Van België auf den Thron einzuladen, der zu Karel van Vlaanderen wird.\nDer König wird zur Galionsfigur, und"
 RULE_OPTION_FLA_PATH_MON_SOCCON: "£KR_game_rule_flag_FLA   Herrschaft - Catholic Bloc"
 RULE_OPTION_FLA_PATH_MON_SOCCON_DESC: "$RULE_OPTION_FLA_PATH_MON_DESC$ §cKatholiek Blok§!, oder Katholischer Block, gewinnt die folgenden Wahlen.$FLA_PATH_REQUIREMENTS$"
 RULE_OPTION_FLA_PATH_MON_SOCDEM: "£KR_game_rule_flag_FLA   Herrschaft - Arbeiter"
 RULE_OPTION_FLA_PATH_MON_SOCDEM_DESC: "$RULE_OPTION_FLA_PATH_MON_DESC$ Die §SVlaamse Werklieden Partij§!, oder Flämische Arbeiterpartei, gewinnt die folgenden Wahlen.$FLA_PATH_REQUIREMENTS$"
 RULE_OPTION_FLA_PATH_MON_SOCLIB: "£KR_game_rule_flag_FLA   Herrschaft - Arbeiter (Zentrum)"
 RULE_OPTION_FLA_PATH_MON_SOCLIB_DESC: "$RULE_OPTION_FLA_PATH_MON_DESC$ der zentristische der Flügel der §lVlaamse Werklieden Partij§!, oder Flämische Arbeiterpartei, gewinnt die folgenden Wahlen.$FLA_PATH_REQUIREMENTS$"
 RULE_OPTION_FLA_PATH_MON_MARLIB: "£KR_game_rule_flag_FLA   Herrschaft - Liberale"
 RULE_OPTION_FLA_PATH_MON_MARLIB_DESC: "$RULE_OPTION_FLA_PATH_MON_DESC$ die §mLiberale Partij§! gewinnt die folgenden Wahlen.$FLA_PATH_REQUIREMENTS$"
 RULE_OPTION_FLA_PATH_REP_DESC: "Unter dem Druck des Volkes ist der Rat gezwungen, eine Republik auszurufen und freie Wahlen abzuhalten, die von der"
 RULE_OPTION_FLA_PATH_REP_SOCCON: "£KR_game_rule_flag_FLA   Republik - Catholic Bloc"
 RULE_OPTION_FLA_PATH_REP_SOCCON_DESC: "$RULE_OPTION_FLA_PATH_REP_DESC$ dem §cKatholischen Block§!.$FLA_PATH_REQUIREMENTS$"
 RULE_OPTION_FLA_PATH_REP_SOCDEM: "£KR_game_rule_flag_FLA   Republik - Arbeiter"
 RULE_OPTION_FLA_PATH_REP_SOCDEM_DESC: "$RULE_OPTION_FLA_PATH_REP_DESC$ §SVlaamse Werklieden Partij§!.$FLA_PATH_REQUIREMENTS$"
 RULE_OPTION_FLA_PATH_REP_SOCLIB: "£KR_game_rule_flag_FLA   Republik - Arbeiter (Zentrum)"
 RULE_OPTION_FLA_PATH_REP_SOCLIB_DESC: "$RULE_OPTION_FLA_PATH_REP_DESC$ dem zentristischen Flügel der Flämischen Arbeiterpartei.$FLA_PATH_REQUIREMENTS$"
 RULE_OPTION_FLA_PATH_REP_MARLIB: "£KR_game_rule_flag_FLA   Republik - Liberale"
 RULE_OPTION_FLA_PATH_REP_MARLIB_DESC: "$RULE_OPTION_FLA_PATH_REP_DESC$ der §mLiberale Partei§!.$FLA_PATH_REQUIREMENTS$"
 RULE_OPTION_FLA_PATH_NATPOP: "£KR_game_rule_flag_FLA   Regentschaft - Verdinaso"
 RULE_OPTION_FLA_PATH_NATPOP_DESC: "Infolge des Rücktritts der meisten königstreuen Ratsmitglieder gewinnt die Fraktion, die Van Severen folgt, dramatisch an Popularität. Sie gewinnen eine Abstimmung zur Fortsetzung der Regentschaft, und die §nVerbond van Dietsche Nationaal-Solidaristen§!, oder Union der Niederländischen Nationalen Solidaristen, auch bekannt als Verdinaso, reformieren den Rat zu einer nationalistischen Regierung.$FLA_PATH_REQUIREMENTS$"
 RULE_OPTION_FLA_PATH_REVOLT_HOL: "£KR_game_rule_flag_FLA  £KR_game_rule_flag_HOL   Groot-Nederlandisten"
 RULE_OPTION_FLA_PATH_REVOLT_HOL_DESC: "Nach dem Zusammenbruch von Flandern-Wallonien gewinnen die Groot-Nederlandisten, also die Befürworter eines Großniederlandes, innerhalb des §cKatoliek Blok§! die Oberhand, und Flandern wird zu einer Marionette der Niederlande, die schließlich in die Niederlande integriert wird. Die Deutschen greifen nicht ein.$FLA_PATH_HOL_REQUIREMENTS$"
 RULE_OPTION_FLA_PATH_HOL_START_DESC: "Während des Zusammenbruchs von Flandern-Wallonien wenden sich die Flamen an die Niederlande um Hilfe, und Flandern wird zu einer niederländischen Marionette unter der Führung des §cKatoliek Blok§!, die schließlich in die Niederlande integriert wird."
 RULE_OPTION_FLA_PATH_HOL: "£KR_game_rule_flag_FLA  £KR_game_rule_flag_HOL   Niederländische Marionette"
 RULE_OPTION_FLA_PATH_HOL_DESC: "$RULE_OPTION_FLA_PATH_HOL_START_DESC$ Deutschland beschließt, nicht einzugreifen.$FLA_PATH_HOL_WAR_REQUIREMENTS$"
 RULE_OPTION_FLA_PATH_HOL_GER: "£KR_game_rule_flag_FLA  £KR_game_rule_flag_HOL  £KR_game_rule_flag_GER   Niederländische Marionette - Reichspakt"
 RULE_OPTION_FLA_PATH_HOL_GER_DESC: "$RULE_OPTION_FLA_PATH_HOL_START_DESC$ Deutschland droht mit Krieg, und die Niederlande werden gezwungen, dem Reichspakt beizutreten.$FLA_PATH_HOL_WAR_REQUIREMENTS$"
 RULE_OPTION_FLA_PATH_HOL_WAR: "£KR_game_rule_flag_FLA  £KR_game_rule_flag_HOL  £KR_game_rule_flag_GER   Niederländische Marionette - Krieg"
 RULE_OPTION_FLA_PATH_HOL_WAR_DESC: "$RULE_OPTION_FLA_PATH_HOL_START_DESC$ Deutschland droht mit Krieg, aber die Niederlande lehnen das Ultimatum ab, was zu einem Krieg zwischen Deutschen und Niederländern führt.$FLA_PATH_HOL_WAR_REQUIREMENTS$"

 WAL_PATH: "£KR_game_rule_flag_WAL   Das Schicksal des wallonischen Hahns"
 WAL_PATH_HOL_WAR_REQUIREMENTS: "$FLA_PATH_HOL_REQUIREMENTS$\n\n§RNot§! any §CDutch Puppet§! in §Y$FLA_PATH$§!"
 RULE_OPTION_WAL_PATH_RANDOM: "Standard"
 RULE_OPTION_WAL_PATH_RANDOM_DESC: "Der wallonische Hahn ist wieder frei, aber welches Schicksal erwartet ihn?"
 RULE_OPTION_WAL_PATH_AUTDEM: "£KR_game_rule_flag_WAL   Monarchie – Royalisten"
 RULE_OPTION_WAL_PATH_AUTDEM_DESC: "Adelbert gelingt es, syndikalistische Unruhen zu unterdrücken, und mit Hilfe seiner §aRoyalisten§! errichtet er eine absolute Herrschaft.$FLA_PATH_REQUIREMENTS$"
 RULE_OPTION_WAL_PATH_MON_MARLIB: "£KR_game_rule_flag_WAL   Herrschaft - Liberale"
 RULE_OPTION_WAL_PATH_MON_MARLIB_DESC: "Adelbert macht Zugeständnisse und stimmt der Einführung einer konstitutionellen Monarchie zu. Die §mParti Liberal§!, oder Liberale Partei, gewinnt die folgenden Wahlen.$FLA_PATH_REQUIREMENTS$"
 RULE_OPTION_WAL_PATH_MON_SOCDEM: "£KR_game_rule_flag_WAL   Herrschaft - Arbeiter"
 RULE_OPTION_WAL_PATH_MON_SOCDEM_DESC: "Adelbert macht Zugeständnisse und stimmt der Einführung einer konstitutionellen Monarchie zu. Die §SParti Ouvrier Belge§!, oder Belgische Arbeiterpartei, gewinnt die folgenden Wahlen.$FLA_PATH_REQUIREMENTS$"
 RULE_OPTION_WAL_PATH_REP_DESC: "Adelbert fails to stay in power, and the people proclaim a republic."
 RULE_OPTION_WAL_PATH_REP_MARLIB: "£KR_game_rule_flag_WAL   Republik - Liberale"
 RULE_OPTION_WAL_PATH_REP_MARLIB_DESC: "$RULE_OPTION_WAL_PATH_REP_DESC$ Die §mLiberale Partei§! gewinnt die folgenden Wahlen. $FLA_PATH_REQUIREMENTS$"
 RULE_OPTION_WAL_PATH_REP_SOCDEM: "£KR_game_rule_flag_WAL   Republik - Arbeiter"
 RULE_OPTION_WAL_PATH_REP_SOCDEM_DESC: "$RULE_OPTION_WAL_PATH_REP_DESC$ Die §SBelgische Arbeiter Partei§! gewinnt die folgenden Wahlen. $FLA_PATH_REQUIREMENTS$"
 RULE_OPTION_WAL_PATH_REP_SYNDIE_START_DESC: "Die POB gewinnt die Wahlen. In der Folge wird der syndikalistische Flügel der §rParti Ouvrier Belge§!"
 RULE_OPTION_WAL_PATH_REP_SYNDIE: "£KR_game_rule_flag_WAL   Republik – Arbeiter (reformiert) §G(G.A.)§!"
 RULE_OPTION_WAL_PATH_REP_SYNDIE_DESC: "$RULE_OPTION_WAL_PATH_REP_DESC$ $RULE_OPTION_WAL_PATH_REP_SYNDIE_START_DESC$, oder die Belgische Arbeiterpartei, gewinnt an Einfluss. Als Reaktion darauf unternimmt Deutschland nichts dagegen.\n§G(G.A.)§! steht für German Acquiescence (deutsche Zustimmung).$FLA_PATH_REQUIREMENTS$"
 RULE_OPTION_WAL_PATH_REP_WAR_SYNDIE: "£KR_game_rule_flag_WAL   Republik – Arbeiter (reformiert) §Y(G.I.)§!"
 RULE_OPTION_WAL_PATH_REP_WAR_SYNDIE_DESC: "$RULE_OPTION_WAL_PATH_REP_DESC$ $RULE_OPTION_WAL_PATH_REP_SYNDIE_START_DESC$ gewinnt an Einfluss. Als Reaktion darauf erklärt Deutschland den Krieg.\n§Y(G.I.)§! steht für German Intervention (Deutsche Intervention). $FLA_PATH_REQUIREMENTS$"
 RULE_OPTION_WAL_PATH_REP_TOTALIST_START_DESC: "Die POB gewinnt die Wahlen. Da es keine Reaktion von den gemäßigten Sozialisten innerhalb der Partei gibt, gründet Julien Lahaut die §oParti Totalitaire de Wallonie§!"
 RULE_OPTION_WAL_PATH_REP_TOTALIST: "£KR_game_rule_flag_WAL  Republik – Totalitaristen §G(G.A.)§!"
 RULE_OPTION_WAL_PATH_REP_TOTALIST_DESC: "$RULE_OPTION_WAL_PATH_REP_DESC$ $RULE_OPTION_WAL_PATH_REP_TOTALIST_START_DESC$, oder Totalitäre Partei Walloniens, übernimmt die Regierungsgeschäfte und führt das Land in die Revolution.\n§G(G.A.)§! steht für German Acquiescence (deutsche Zustimmung).$FLA_PATH_REQUIREMENTS$"
 RULE_OPTION_WAL_PATH_REPUBLIC_WAR_TOTALIST: "£KR_game_rule_flag_WAL  Republik – Totalitaristen §Y(G.I.)§!"
 RULE_OPTION_WAL_PATH_REP_WAR_TOTALIST_DESC: "$RULE_OPTION_WAL_PATH_REP_DESC$ $RULE_OPTION_WAL_PATH_REP_TOTALIST_START_DESC$ übernimmt die Regierungsgeschäfte und führt das Land in die Revolution.\nAls Reaktion darauf erklärt Deutschland sowohl Wallonien als auch Frankreich den Krieg und löst damit den Zweiten Weltkrieg aus.\n §Y(G.I.)§! steht für German Intervention (deutsche Intervention). $FLA_PATH_REQUIREMENTS$"
 RULE_OPTION_WAL_PATH_NATPOP: "£KR_game_rule_flag_WAL_natpop   Republik – Rex"
 RULE_OPTION_WAL_PATH_NATPOP_DESC: "Nachdem Deutschland sich geweigert hatte, die Idee der Rückgabe der flämischen Gebiete zu unterstützen, gewannen nationalistische Bewegungen in der Bevölkerung rasch an Popularität. Die §nParti Rexiste§!, oder Rexistische Partei kommt an die Macht und stürzt die Monarchie.$FLA_PATH_REQUIREMENTS$"
 RULE_OPTION_WAL_PATH_TOTALIST_DESC: "Während der Revolution bitten wallonische Rebellen unter der Führung der §oParti Totalitaire de Wallonie§! die Commune de Paris um Unterstützung und erklären mit ihrer Hilfe die Unabhängigkeit Walloniens."
 RULE_OPTION_WAL_PATH_GUARANTEE_TOTALIST: "£KR_game_rule_flag_WAL  £KR_game_rule_flag_FRA   Frankreich garantiert für Wallonien"
 RULE_OPTION_WAL_PATH_GUARANTEE_TOTALIST_DESC: "$RULE_OPTION_WAL_PATH_TOTALIST_DESC$\nAufgrund der anhaltenden französischen Unterstützung für die Wallonen macht Deutschland einen Rückzieher und zieht seine Truppen aus Wallonien ab.$WAL_PATH_HOL_WAR_REQUIREMENTS$"
 RULE_OPTION_WAL_PATH_ALONE_TOTALIST: "£KR_game_rule_flag_WAL   Frankreich verlässt Wallonien"
 RULE_OPTION_WAL_PATH_ALONE_TOTALIST_DESC: "$RULE_OPTION_WAL_PATH_TOTALIST_DESC$\nDie französische Kommune ist zwar sehr daran interessiert, die Unabhängigkeit Walloniens zu sichern, gibt aber schließlich nach, um einen Krieg mit Deutschland zu vermeiden.$WAL_PATH_HOL_WAR_REQUIREMENTS$"
 RULE_OPTION_WAL_PATH_WAR_TOTALIST: "£KR_game_rule_flag_WAL  £KR_game_rule_flag_FRA  £KR_game_rule_flag_GER   Weltkrieg über Wallonien"
 RULE_OPTION_WAL_PATH_WAR_TOTALIST_DESC: "$RULE_OPTION_WAL_PATH_TOTALIST_DESC$\nDa beide Seiten nicht bereit sind, klein beizugeben, bricht zwischen Deutschland und der Kommune ein Krieg aus, der Zweite Weltkrieg.$WAL_PATH_HOL_WAR_REQUIREMENTS$"

HOL_PATH: "£KR_game_rule_flag_HOL   Zersetzung der Säulen"
RULE_OPTION_HOL_PATH_RANDOM: "Standard"
RULE_OPTION_HOL_PATH_RANDOM_DESC: "Die soziale Schichtung, bekannt als die \"Säulen\", hat die niederländische Gesellschaft konservativ und ruhig gehalten. Doch als das Jahr 1936 anbricht, bröckeln die Säulen schnell, und alle möglichen Ideologen lauern in diesem Chaos auf ihre Chance."
 RULE_OPTION_HOL_PATH_MON_SOCLIB_SOCDEM: "£KR_game_rule_flag_HOL  Wilhelmina - SDAP-VDB"
 RULE_OPTION_HOL_PATH_MON_SOCLIB_SOCDEM_DESC: "Die SDAP wird bei den Wahlen stärkste Partei und gibt der Forderung von Königin Wilhelmina nach, dass die Mitte-Links-Koalitionsregierung der \"Linken Liste\" nur mit dem Liberalen Pieter Oud als Premierminister gebildet werden kann, dem Vorsitzenden des §lVrijzinnig Democratische Bond§! oder der Freidenkerischen Demokratischen Liga.\n\nSpäter schließen sich die SDAP und die VDB zur §SPartij van de Arbeid§! zusammen, der Partei der Arbeit."
 RULE_OPTION_HOL_PATH_MON_MARLIB: "£KR_game_rule_flag_HOL  Wilhelmina - PvdV /  VVD"
 RULE_OPTION_HOL_PATH_MON_MARLIB_DESC: "Die SDAP wird bei den Wahlen die stärkste Partei und gibt den Forderungen von Königin Wilhelmina nach, dass die Mitte-Links-Koalitionsregierung der \"Linken Liste\" nur mit dem liberalen Pieter Oud, dem Vorsitzenden des VDB, als Premierminister gebildet werden kann.\n\nSpäter fusioniert der rechte Flügel der VDB mit der LSP und bildet entweder die §mPartij van de Vrijheid§! oder die §mVolkspartij voor Vrijheid en Democratie§! oder die Volkspartei für Freiheit und Demokratie. Diese Partei ist bei späteren Wahlen erfolgreich."
 RULE_OPTION_HOL_PATH_SOCDEM_DESC: "Die §SSociaal-Democratische Arbeiderspartij§!, oder Sozialdemokratische Arbeiterpartei, werden bei den Wahlen die größte Partei und lehnen die Forderung von Königin Wilhelmina ab, dass die Mitte-Links-Koalitionsregierung nur mit dem Vorsitzenden des VDB als Ministerpräsident gebildet werden kann. Königin Wilhelmina dankt ab, und"
 RULE_OPTION_HOL_PATH_MON_SOCDEM: "£KR_game_rule_flag_HOL  Juliana - SDAP-VDB"
 RULE_OPTION_HOL_PATH_MON_SOCDEM_DESC: "$RULE_OPTION_HOL_PATH_SOCDEM_DESC$ wird durch ihre Tochter Juliana ersetzt, und der SDAP-Vorsitzende Willem Albarda wird Ministerpräsident der Koalitionsregierung.\n\nSpäter schließen sich die SDAP und die VDB zur §SPartij van de Arbeid§! zusammen, der Partei der Arbeit."
 RULE_OPTION_HOL_PATH_REP_SOCDEM: "£KR_game_rule_flag_HOL  Republic - SDAP-RSAP"
 RULE_OPTION_HOL_PATH_REP_SOCDEM_DESC: "$RULE_OPTION_HOL_PATH_SOCDEM_DESC$ die SDAP, bilden stattdessen eine Koalition mit der RSAP, und die Niederlande werden eine Republik."
 RULE_OPTOON_HOL_PATH_REP_DESC: "Nachdem sich die SDAP nach dem Wahlsieg geweigert hat, einen VDB-Ministerpräsidenten zu ernennen, dankt Königin Wilhelmina ab, und die Niederlande werden eine Republik.\nBei den späteren Wahlen"
 RULE_OPTION_HOL_PATH_REP_SOCLIB: "£KR_game_rule_flag_HOL  Republik - VDB"
 RULE_OPTION_HOL_PATH_REP_SOCLIB_DESC: "Die SDAP $RULE_OPTOON_HOL_PATH_REP_DESC$ führte der §lVrijzinnig Democratische Bond§! oder Freidenkerische Demokratische Liga die Republik an."
 RULE_OPTION_HOL_PATH_REP_MARLIB: "£KR_game_rule_flag_HOL  LSP - Republik"
 RULE_OPTION_HOL_PATH_REP_MARLIB_DESC: "Die SDAP $RULE_OPTOON_HOL_PATH_REP_DESC$ führte die §mLiberale Staatspartij§! oder Liberale Staatspartei die Republik an."
 RULE_OPTION_HOL_PATH_REP_SOCCON: "£KR_game_rule_flag_HOL  Republik - RKSP"
 RULE_OPTION_HOL_PATH_REP_SOCCON_DESC: "Die SDAP $RULE_OPTOON_HOL_PATH_REP_DESC$ führte die §cRooms-Katholieke Staatspartij§! oder römisch-katholische Staatspartei die Republik an."
 RULE_OPTION_HOL_PATH_MON_SOCCON_MARLIB: "£KR_game_rule_flag_HOL  Wilhelmina - CNA-LSP Koalition"
 RULE_OPTION_HOL_PATH_MON_SOCCON_MARLIB_DESC: "Die §cChristelijke Nationale Alliantie§! (Christlich-Nationale Allianz) gewinnt knapp die Mehrheit und bildet eine Regierungskoalition mit der LSP. Die Regierung versucht, mit den radikalen Kräften zu verhandeln, um die Lage im Land zu stabilisieren."
 RULE_OPTION_HOL_PATH_MON_SOCLIB: "£KR_game_rule_flag_HOL  Wilhelmina - LSP"
 RULE_OPTION_HOL_PATH_MON_SOCLIB_DESC: "Die CNA erhält eine knappe Mehrheit und bildet eine Regierungskoalition mit der LSP. Die Regierung versucht, mit den radikalen Kräften zu verhandeln, um die Lage im Land zu stabilisieren.\n\nSpäter, nach der Diskreditierung aller linken Gruppierungen, strömen die Progressiven zur §lLiberale Staatspartij§!, oder Liberale Staatspartei, und verstärken deren Reihen, was zu ihrem Sieg bei den späteren Wahlen führt."
 RULE_OPTION_HOL_PATH_MON_SOCCON: "£KR_game_rule_flag_HOL  Wilhelmina - CNA Mehrheit"
 RULE_OPTION_HOL_PATH_MON_SOCCON_DESC: "Die §cChristelijke Nationale Alliantie§!, oder Christlich-Nationale Allianz, gewinnt knapp die Mehrheit und bildet keine Koalition, in der Hoffnung, die Lage allein stabilisieren zu können. Diese Regierung stürzt unweigerlich, und die CNA wird wiedergewählt, ist jedoch gezwungen, eine Koalition zu bilden."
 RULE_OPTION_HOL_PATH_MON_SOCCON_PATAUT: "£KR_game_rule_flag_HOL  Wilhelmina - CNA-VNH Koalition"
 RULE_OPTION_HOL_PATH_MON_SOCCON_PATAUT_DESC: "Die §Christelijke Nationale Alliantie§! (Christlich-nationale Allianz) gewinnt knapp die Mehrheit und bildet eine Regierungskoalition mit dem VNH, um den Einfluss der Sozialisten zu verringern."
 RULE_OPTION_HOL_PATH_SOC_DESC: "Sozialisten stürzen die bürgerliche Regierung in Den Haag und gründen die Batavische Kommune. Nach der Dritten Nationalversammlung wird das Land von der"
 RULE_OPTION_HOL_PATH_TOTALIST: "£KR_game_rule_flag_HOL_soc  Batavische Kommune - Patrioten"
 RULE_OPTION_HOL_PATH_TOTALIST_DESC: "$RULE_OPTION_HOL_PATH_SOC_DESC$ §oPatriotten§!, oder Patrioten."
 RULE_OPTION_HOL_PATH_NAS_SYNDIE: "£KR_game_rule_flag_HOL_soc  Batavische Kommune - NAS"
 RULE_OPTION_HOL_PATH_NAS_SYNDIE_DESC: "$RULE_OPTION_HOL_PATH_SOC_DESC$ §rNationaal Arbeids-Secretariaat§!, oder Nationale Arbeiter-Sektion."
 RULE_OPTION_HOL_PATH_KAPN_SYNDIE: "£KR_game_rule_flag_HOL_soc  Batavische Kommune - KAPN"
 RULE_OPTION_HOL_PATH_KAPN_SYNDIE_DESC: "$RULE_OPTION_HOL_PATH_SOC_DESC$ §rKommunistische Arbeiderspartij van Nederland§! oder Kommunistische Arbeiterpartei der Niederlande."
 RULE_OPTION_HOL_PATH_RSAP_RADSOC: "£KR_game_rule_flag_HOL_soc  Batavische Kommune - RSAP"
 RULE_OPTION_HOL_PATH_RSAP_RADSOC_DESC: "$RULE_OPTION_HOL_PATH_SOC_DESC$ §RRevolutionair-Socialistische Arbeiderspartij§! oder Revolutionäre Sozialistische Arbeiterpartei."
 RULE_OPTION_HOL_PATH_SDAP_RADSOC: "£KR_game_rule_flag_HOL_soc  Batavische Kommune - SDAP"
 RULE_OPTION_HOL_PATH_SDAP_RADSOC_DESC: "$RULE_OPTION_HOL_PATH_SOC_DESC$ radikalisierte §RSociaal-Democratische Arbeiderspartij§! oder Sozialdemokratische Arbeiterpartei."
RULE_OPTION_HOL_PATH_AUTDEM: "£KR_game_rule_flag_HOL   Wilhelmina - Militärjunta"
RULE_OPTION_HOL_PATH_AUTDEM_DESC: "Nach erheblichen Umwälzungen, die die Stabilität der Niederlande erschüttert haben, übernimmt General Izaak Reijnders den Staatsapparat und unterhält eine §aMilitärjunta§!, schließt die Niederlande an den Reichspakt an."
RULE_OPTION_HOL_PATH_PATAUT: "£KR_game_rule_flag_HOL_paternal_aut   Wilhelmina - VNH-Diktatur"
RULE_OPTION_HOL_PATH_PATAUT_DESC: "Der §PVerbond voor Nationaal Herstel§! oder Bund für nationalen Wiederaufbau übernimmt die Kontrolle über die Niederlande und errichtet eine reaktionäre Diktatur, die ihren populistischen Palastputsch erfolgreich abwehrt."
RULE_OPTION_HOL_PATH_NATPOP: "£KR_game_rule_flag_HOL_national_aut   Wilhelmina - Populistische VNH-Diktatur"
RULE_OPTION_HOL_PATH_NATPOP_DESC: "Die VNH übernimmt die Kontrolle über die Niederlande und errichtet eine reaktionäre Diktatur, die anschließend durch einen Palastputsch der aufständischen Jugendorganisation des §nVerbond voor Nationaal Herstel§!, oder Bündnis für den Nationalen Wiederaufbau, abgelöst wird."
 RULE_OPTION_HOL_PATH_NOT_SOC: "£KR_game_rule_flag_HOL  Keine sozialistische Revolution"
 RULE_OPTION_HOL_PATH_NOT_SOC_DESC: "Die Niederlande wählen ihren Weg über das reguläre zufallsbasierte System, mit Ausnahme aller sozialistischen Wege."

 HOL_FORPOL: "£KR_game_rule_flag_HOL  Niederländische Außenpolitik"
 RULE_OPTION_HOL_FORPOL_RANDOM: "Standard"
 RULE_OPTION_HOL_FORPOL_RANDOM_DESC: "Die Niederlande blieben während des Weltkriegs neutral, aber angesichts der Revolutionen in Großbritannien und Frankreich und der sich ständig verändernden geopolitischen Lage ist es keineswegs sicher, dass diese Neutralität aufrechterhalten werden kann."
 RULE_OPTION_HOL_FORPOL_GER: "£KR_game_rule_flag_HOL  £KR_game_rule_flag_GER  Reichspakt"
 RULE_OPTION_HOL_FORPOL_GER_DESC: "Angesichts der Gefahr, die vom internationalen Syndikalismus ausgeht, schließen sich die Niederlande den Deutschen an.\n\n§RBenötigt:§!\n§RNicht§! §CNiederländische Marionette - Krieg§! in §Y$FLA_PATH$§!\n§RNicht§! §CBatavische Kommune§! in §Y$HOL_PATH$§!"
 RULE_OPTION_HOL_FORPOL_ENT: "£KR_game_rule_flag_HOL  £KR_game_rule_flag_CAN  Entente"
 RULE_OPTION_HOL_FORPOL_ENT_DESC: "Während Niederländisch-Ostindien von Japan angegriffen wird, erhalten die Niederlande eine unerwartete Nachricht aus Australasien, in der ein Militärbündnis angeboten wird, um gemeinsam gegen die Japaner anzutreten.\n\n§RBenötigt:§!\n§CRevolte verhindert§! in §Y$INS_REVOLT$§!\noder §Cdie Indonesische Rebellion ist erfolglos§!\n\n§CJapan ist im Krieg mit den Niederlanden§!\n\n§RKeine§! §CRevolution§! oder §CAustralasien First Bewegung§! in §Y$AST_PATH$§!\n§RNicht§! §CNiederländische Marionette - Reichspakt§! oder §CNiederländische Marionette - Krieg§! in §Y$FLA_PATH$§!\n§RNicht§! §CMilitärjunta§! oder §CBatavische Kommune§! in \n§Y$HOL_PATH$§!"
 RULE_OPTION_HOL_FORPOL_BEL: "£KR_game_rule_flag_HOL  £KR_game_rule_flag_BEL  Belgisch-Niederländische Allianz"
 RULE_OPTION_HOL_FORPOL_BEL_DESC: "Die Niederlande scheuen den Umgang mit einem größeren Bündnis und entscheiden sich stattdessen für eine engere Zusammenarbeit mit dem benachbarten Belgien.\n\n§RBenötigt:§!\n§CBelgisch-Niederländische Allianz§! in §Y$BEL_FORPOL$§!\n\n§RNicht§! §CMilitärjunta§! oder §CCBatavische Kommune§! in\n§Y$HOL_PATH$§!"

