CUB_PATH: "£KR_game_rule_flag_CUB   Der Streik von Havanna"
RULE_OPTION_CUB_STRIKE_RANDOM: "Standard"
RULE_OPTION_CUB_STRIKE_RANDOM_DESC: "Kuba befindet sich im Vorfeld großer Umwälzungen. Gott allein weiß, wie sich die Ereignisse von 1936 entfalten werden."
 RULE_OPTION_CUB_PATH_DEM_DESC: "Der Streik wird abgebrochen und die gemäßigten Dissidenten beschwichtigt. Der politische Einfluss der Fraktion von General Diaz schwindet und wird schließlich durch einen gescheiterten Putschversuch beseitigt."
RULE_OPTION_CUB_PATH_MARLIB: "£KR_game_rule_flag_CUB   Republicanos"
 RULE_OPTION_CUB_PATH_MARLIB_DESC: "$RULE_OPTION_CUB_PATH_DEM_DESC$\nDie §mPartido Republicano§!, oder Republikanische Partei, gewinnt die Neuwahlen."
 RULE_OPTION_CUB_PATH_SOCLIB: "£KR_game_rule_flag_CUB  Nuevos Liberales"
 RULE_OPTION_CUB_PATH_SOCLIB_DESC: "$RULE_OPTION_CUB_PATH_DEM_DESC$\nDie §lPartido Nuevo Liberal§!, oder Neue Liberale Partei, gewinnt die Neuwahlen."
 RULE_OPTION_CUB_PATH_SOCDEM: "£KR_game_rule_flag_CUB  Unionistas"
 RULE_OPTION_CUB_PATH_SOCDEM_DESC: "$RULE_OPTION_CUB_PATH_DEM_DESC$\nDie §SPartido Unionista§!, oder Partei der Unionisten, gewinnt die Neuwahlen."
 RULE_OPTION_CUB_PATH_PATAUT: "£KR_game_rule_flag_CUB  Junta"
 RULE_OPTION_CUB_PATH_PATAUT_DESC: "General Diaz festigt seine Macht in Form einer militärischen §PJunta§! und übernimmt nach dem Streik in Havanna die vollständige Kontrolle über die Zivilregierung."
 RULE_OPTION_CUB_PATH_AUTDEM: "£KR_game_rule_flag_CUB  Auténticos"
 RULE_OPTION_CUB_PATH_AUTDEM_DESC: "Die zivile Regierung bricht zusammen und die nationalistische §aPartido Revolucionario Cubano - Auténtico§!, oder Authentische Fraktion der Kubanischen Revolutionären Partei, übernimmt die Macht."
 RULE_OPTION_CUB_PATH_SOCCON: "£KR_game_rule_flag_CUB  Democratic National Association"
 RULE_OPTION_CUB_PATH_SOCCON_DESC: "Die Zivilregierung bricht zusammen und die Auténticos übernehmen die Macht. Schließlich fällt das Regime einem Korruptionsskandal zum Opfer und die §cAsociación Nacional Democrática§!, oder Demokratische Nationale Vereinigung, kommt an die Macht."
 RULE_OPTION_CUB_PATH_SOC_DESC: "The civilian government collapses and a loose coalition of Socialists take power."
 RULE_OPTION_CUB_PATH_CONGRESS_DESC: "$RULE_OPTION_CUB_PATH_SOC_DESC$\nDie Macht im neuen Allsozialistischen Kongress wird gewonnen durch die"
RULE_OPTION_CUB_PATH_RADSOC: "£KR_game_rule_flag_CUB_soc   Revolution - Revolucionarios"
 RULE_OPTION_CUB_PATH_RADSOC_DESC: "$RULE_OPTION_CUB_PATH_CONGRESS_DESC$ §RRevolucionarios§!, oder Revolutionäre."
 RULE_OPTION_CUB_PATH_SYNDIE: "£KR_game_rule_flag_CUB_soc Revolution - Trabajadores"
 RULE_OPTION_CUB_PATH_SYNDIE_DESC: "$RULE_OPTION_CUB_PATH_CONGRESS_DESC$ §rTrabajadores§!, oder Arbeiter."
 RULE_OPTION_CUB_PATH_TOTALIST: "£KR_game_rule_flag_CUB_soc Revolution - Comunistas"
 RULE_OPTION_CUB_PATH_TOTALIST_DESC: "$RULE_OPTION_CUB_PATH_CONGRESS_DESC$ §oComunistas§!, oder Kommunisten."
RULE_OPTION_CUB_PATH_COUP_PATAUT: "£KR_game_rule_flag_CUB   Von den Amerikanern unterstützter Junta"
 RULE_OPTION_CUB_PATH_COUP_PATAUT_DESC: "$RULE_OPTION_CUB_PATH_SOC_DESC$ Dieses neue sozialistische Regime wird wiederum von General Diaz mit Hilfe der Vereinigten Staaten gestürzt, und er bildet eine §PJunta§!, um an der Macht zu bleiben."
 RULE_OPTION_CUB_PATH_LAPDOG_DESC: "$RULE_OPTION_CUB_PATH_SOC_DESC$ Dieses neue sozialistische Regime wird wiederum von General Diaz mit Hilfe der Vereinigten Staaten gestürzt.\nGeneral Diaz weigert sich, den Forderungen der USA nachzugeben, woraufhin die Amerikaner schließlich ein ihnen völlig unterwürfiges Regime in Havanna einsetzen."
 RULE_OPTION_CUB_PATH_COUP_AUTDEM: "£KR_game_rule_flag_CUB  American Lapdog - Progresistas"
 RULE_OPTION_CUB_PATH_COUP_AUTDEM_DESC: "$RULE_OPTION_CUB_PATH_LAPDOG_DESC$, angeführt von der §aPartido Progresista§!, oder Progressiven Partei."
 RULE_OPTION_CUB_PATH_COUP_MARLIB: "£KR_game_rule_flag_CUB  American Lapdog - Republicanos"
 RULE_OPTION_CUB_PATH_COUP_MARLIB_DESC: "$RULE_OPTION_CUB_PATH_LAPDOG_DESC$. An seine Stelle tritt ein gewähltes Regime der §mPartido Republicano§!, das eine gemäßigtere Haltung gegenüber dem Engagement der USA einnimmt."
 RULE_OPTION_CUB_PATH_COUP_SOCLIB: "£KR_game_rule_flag_CUB  American Lapdog - Nuevos Liberales"
 RULE_OPTION_CUB_PATH_COUP_SOCLIB_DESC: "$RULE_OPTION_CUB_PATH_LAPDOG_DESC$. An seine Stelle tritt ein gewähltes §lPartido Nuevo Liberal§!-Regime, das sich von der amerikanischen Beteiligung distanzieren will."

 CUB_FORPOL: "£KR_game_rule_flag_CUB  Kubanische Außenpolitik"
 CUB_FORPOL_NOT_SOC_REQUIREMENTS: "\n\n§RBenötigt:§!\n§RKeine§! §CRevolution§! in §Y$CUB_PATH$§!"
 RULE_OPTION_CUB_FORPOL_RANDOM: "Standard"
 RULE_OPTION_CUB_FORPOL_RANDOM_DESC: "Stellt sich Kuba auf die Seite alter Freunde, sucht es neue Verbündete oder versucht es, völlig neutral zu bleiben?"
 RULE_OPTION_CUB_FORPOL_AMERICA_DESC: "kein Mitglied einer Fraktion ist oder Kuba nicht beitreten darf, sucht Kuba stattdessen nach einer Garantie."
 RULE_OPTION_CUB_FORPOL_WAIT: "£KR_game_rule_flag_CUB  £KR_game_rule_flag_USA  £KR_game_rule_flag_WCA  £KR_game_rule_flag_APG  £KR_game_rule_flag_ACC  Alte Freunde - Warten"
 RULE_OPTION_CUB_FORPOL_WAIT_DESC: "Kuba versucht, sich der Fraktion anzuschließen, die den Zweiten Amerikanischen Bürgerkrieg gewinnt.\nWenn sie $RULE_OPTION_CUB_FORPOL_AMERICA_DESC$"
 RULE_OPTION_CUB_FORPOL_USA: "£KR_game_rule_flag_CUB  £KR_game_rule_flag_USA  Alte Freunde - Bundesregierung"
 RULE_OPTION_CUB_FORPOL_USA_DESC: "Kuba versucht, sich der Fraktion der Bundesregierung anzuschließen, falls diese den Zweiten Amerikanischen Bürgerkrieg gewinnt.\nIf the Federal Government is $RULE_OPTION_CUB_FORPOL_AMERICA_DESC$"
 RULE_OPTION_CUB_FORPOL_WCA: "£KR_game_rule_flag_CUB  £KR_game_rule_flag_Arbeiter-Kongress  Alte Freunde - Arbeiter-Kongress"
 RULE_OPTION_CUB_FORPOL_WCA_DESC: "Kuba versucht, sich der Fraktion des Arbeiterkongresses anzuschließen, wenn diese den Zweiten Amerikanischen Bürgerkrieg gewinnt.\nIf the Congress is $RULE_OPTION_CUB_FORPOL_AMERICA_DESC$"
 RULE_OPTION_CUB_FORPOL_APG: "£KR_game_rule_flag_CUB  £KR_game_rule_flag_APG  Alte Freunde - Volksregierung"
 RULE_OPTION_CUB_FORPOL_APG_DESC: "Kuba versucht, sich der Fraktion der Volksregierung anzuschließen, falls diese den Zweiten Amerikanischen Bürgerkrieg gewinnt.\nIf the Government is $RULE_OPTION_CUB_FORPOL_AMERICA_DESC$"
 RULE_OPTION_CUB_FORPOL_ACC: "£KR_game_rule_flag_CUB  £KR_game_rule_flag_ACC  Alte Freunde - Pacific States"
 RULE_OPTION_CUB_FORPOL_ACC_DESC: "Kuba versucht, sich der Fraktion der Konstitutionellen Koalition anzuschließen, falls diese den Zweiten Amerikanischen Bürgerkrieg gewinnt.\nIf the Coalition is $RULE_OPTION_CUB_FORPOL_AMERICA_DESC$"
 RULE_OPTION_CUB_FORPOL_NEE: "£KR_game_rule_flag_CUB  £KR_game_rule_flag_NEE  Alte Freunde - New England"
 RULE_OPTION_CUB_FORPOL_NEE_DESC: "Kuba versucht, sich der Fraktion Neuenglands anzuschließen, wenn diese den Zweiten Amerikanischen Bürgerkrieg gewinnt.\nWenn Neuengland $RULE_OPTION_CUB_FORPOL_AMERICA_DESC$ ist."
 RULE_OPTION_CUB_FORPOL_GER: "£KR_game_rule_flag_CUB  £KR_game_rule_flag_GER  Reichspakt"
 RULE_OPTION_CUB_FORPOL_GER_DESC: "Kuba versucht, dem Reichspakt beizutreten.$CUB_FORPOL_NOT_SOC_REQUIREMENTS$"
 RULE_OPTION_CUB_FORPOL_INT: "£KR_game_rule_flag_CUB_soc  £KR_game_rule_flag_FRA   Internationale"
 RULE_OPTION_CUB_FORPOL_INT_DESC: "Kuba versucht, der Dritten Internationale beizutreten.\n\n§RBenötigt:§!\njede §CRevolution§! in §Y$CUB_PATH$§!"
 RULE_OPTION_CUB_FORPOL_ENT: "£KR_game_rule_flag_CUB  £KR_game_rule_flag_CAN   Entente"
 RULE_OPTION_CUB_FORPOL_ENT_DESC: "Wenn die USA fallen, versucht Kuba, eine Koalition mit Kanada gegen den Arbeiterkongress von Amerika zu bilden. Nach dem Krieg versucht Kuba, der Entente beizutreten.$CUB_FORPOL_NOT_SOC_REQUIREMENTS$"
 RULE_OPTION_CUB_FORPOL_AUS: "£KR_game_rule_flag_CUB  £KR_game_rule_flag_AUS  Donau-Adriabund"
 RULE_OPTION_CUB_FORPOL_AUS_DESC: "Da Deutschland seine Position als europäischer Verbündeter Kubas verliert, sucht die Insel stattdessen eine Allianz mit den Österreichern.\n\n§RBenötigt:§!\n§CDeutschland kapituliert, oder Kuba befindet sich im Krieg mit Deutschland.§!\n\n§RNicht§! jede §CRevolution§! in §Y$CUB_PATH$§!"
 RULE_OPTION_CUB_FORPOL_CEN: "£KR_game_rule_flag_CUB  £KR_game_rule_flag_CEN  £KR_game_rule_flag_COS   Allianz der Karibik"
 RULE_OPTION_CUB_FORPOL_CEN_DESC: "Kuba strebt den Beitritt zur Demokratischen Allianz der Karibik an, falls diese gegründet wird.\n\n§RBenötigt:§!\n§CRepublicanos§! oder §CNuevo Liberales§! oder §CUnionistas§! in\n§Y$CUB_PATH$§!\n§CKaribische Allianz§! in §Y$CEN_DEM_FORPOL$§! oder §Y$COS_FORPOL$§!"

DOM_PATH: "£KR_game_rule_flag_DOM   Fenster der Gelegenheit"
RULE_OPTION_DOM_PATH_RANDOM: "Standard"
RULE_OPTION_DOM_PATH_RANDOM_DESC: "In der Dominikanischen Republik hat der amtierende Präsident Martínez die Verfassung geändert, um sich eine weitere Amtszeit zu ermöglichen. Der Widerstand gegen seine Bemühungen kann durch Wahlen oder auf weniger demokratische Weise erfolgen."
 RULE_OPTION_DOM_PATH_SOCCON: "£KR_game_rule_flag_DOM  Rojos"
 RULE_OPTION_DOM_PATH_SOCCON_DESC: "Virgilio Martínez Reyna von der §cPartido Rojo§! oder Rote Partei gewinnt eine weitere Amtszeit."
 RULE_OPTION_DOM_PATH_MARLIB: "£KR_game_rule_flag_DOM  Republicanos"
 RULE_OPTION_DOM_PATH_MARLIB_DESC: "Rafael Estrella Ureña von der §mPartido Republicano§!, oder Republikanischen Partei, wird zum neuen Präsidenten der Dominikanischen Republik gewählt."
 RULE_OPTION_DOM_PATH_COUP_DESC: "General Rafael Trujillo, der den Präsidentschaftskandidaten Rafael Estrella Ureña einsetzen will, führt einen erfolgreichen Staatsstreich gegen Präsident Martínez durch. Trujillo ersetzt Estrella bald durch einen Marionettenpräsidenten."
 RULE_OPTION_DOM_PATH_PATAUT: "£KR_game_rule_flag_DOM  Dominicanos - Trujillo"
 RULE_OPTION_DOM_PATH_PATAUT_DESC: "$RULE_OPTION_DOM_PATH_COUP_DESC$ und übernimmt später selbst die §PPartido Dominicano§!, oder Dominikanische Partei."
 RULE_OPTION_DOM_PATH_AUTDEM: "£KR_game_rule_flag_DOM  Dominicanos - Concha"
 RULE_OPTION_DOM_PATH_AUTDEM_DESC: "$RULE_OPTION_DOM_PATH_COUP_DESC$, Manuel Troncoso Concha, der nominell die §aPartido Dominicano§! oder Dominikanische Partei anführt."

 DOM_FORPOL: "£KR_game_rule_flag_DOM  Dominikanische Außenpolitik"
 RULE_OPTION_DOM_FORPOL_RANDOM: "Standard"
 RULE_OPTION_DOM_FORPOL_RANDOM_DESC: "Angesichts der weltweit zunehmenden Spannungen wird die Dominikanische Republik in den kommenden Jahren wahrscheinlich eine Annäherung anstreben."
 RULE_OPTION_DOM_FORPOL_GER: "£KR_game_rule_flag_DOM  £KR_game_rule_flag_GER  Reichspakt"
 RULE_OPTION_DOM_FORPOL_GER_DESC: "Die Dominikanische Republik versucht, dem Reichspakt beizutreten.\n\n§RBenötigt:§!\n§RNicht§! §CReichspakt§! in §Y$HAI_FORPOL$§!"
 RULE_OPTION_DOM_FORPOL_ENT: "£KR_game_rule_flag_DOM  £KR_game_rule_flag_CAN  Entente"
 RULE_OPTION_DOM_FORPOL_ENT_DESC: "Die Dominikanische Republik versucht, der Entente beizutreten.\n\n§RBenötigt:§!\n§RNicht§! §CEntente§! in §Y$HAI_FORPOL$§!"

 HAI_PATH: "£KR_game_rule_flag_HAI  Die Folgen des Putsches von 1933"
RULE_OPTION_HAI_PATH_RANDOM: "Standard"
RULE_OPTION_HAI_PATH_RANDOM_DESC: "In einem Umfeld grassierender Korruption und Instabilität muss der unbeliebte Präsident Calixte große Anstrengungen unternehmen, um nach den Wahlen zur Nationalversammlung an der Macht zu bleiben."
RULE_OPTION_HAI_PATH_CIVIL_WAR: "£KR_game_rule_flag_HAI  Bürgerkrieg"
 RULE_OPTION_HAI_PATH_CIVIL_WAR_DESC: "Die Lage spitzt sich zu und es kommt zum Ausbruch eines Bürgerkriegs. Der Ausgang ist ungewiss, ebenso wie das Schicksal Haitis."
 RULE_OPTION_HAI_PATH_CALIXTE_AUTDEM: "£KR_game_rule_flag_HAI  Ein starkes Haiti"
 RULE_OPTION_HAI_PATH_CALIXTE_AUTDEM_DESC: "Präsident Démosthènes Calixte bleibt an der Macht, behält die alte Verfassung bei, und seine §aParti du Salut§!, oder Partei der Erlösung, errichtet eine autoritäre Herrschaft."
 RULE_OPTION_HAI_PATH_TOTALIST: "£KR_game_rule_flag_HAI  Ein revolutionäres Haiti"
 RULE_OPTION_HAI_PATH_TOTALIST_DESC: "Präsident Démosthènes Calixte bleibt an der Macht, behält die alte Verfassung bei, übernimmt die §oParti Nationaliste des Ouvriers et Paysans§! oder Nationalistische Arbeiter- und Bauernpartei und errichtet eine sozialistische Diktatur."
 RULE_OPTION_HAI_PATH_SOCDEM: "£KR_game_rule_flag_HAI  Ein gleichberechtigtes Haiti"
 RULE_OPTION_HAI_PATH_SOCDEM_DESC: "Präsident Démosthènes Calixte bleibt an der Macht, verfasst eine neue Verfassung, und seine §SParti du Salut§! oder Partei der Erlösung führt eine demokratische Regierung ein."
 RULE_OPTION_HAI_PATH_RADSOC: "£KR_game_rule_flag_HAI  Ein sozialistisches Haiti"
 RULE_OPTION_HAI_PATH_RADSOC_DESC: "Präsident Démosthènes Calixte bleibt an der Macht, und seine §RParti du Salut§!, oder Partei der Erlösung, führt sozialistische Politik ein, nachdem sie sich der Dritten Internationale zugewandt hat."
 RULE_OPTION_HAI_PATH_SOCCON: "£KR_game_rule_flag_HAI  Ein konservatives Haiti"
 RULE_OPTION_HAI_PATH_SOCCON_DESC: "Elie Lescot kommt an die Macht, führt weiterhin die §cParti Libéral§! oder Liberale Partei an und behält die alte Verfassung bei."
 RULE_OPTION_HAI_PATH_MARLIB: "£KR_game_rule_flag_HAI  Ein liberales Haiti"
 RULE_OPTION_HAI_PATH_MARLIB_DESC: "Elie Lescot kommt an die Macht, übernimmt die §mParti National de l'Industrie Agricole§! oder Nationale Partei der Agrarindustrie und verfasst eine neue Verfassung."
 RULE_OPTION_HAI_PATH_ELECTION_DESC: "Nachdem Lescot an die Macht gekommen ist, verlaufen die Wahlen 1940 wie geplant."
 RULE_OPTION_HAI_PATH_SOCLIB: "£KR_game_rule_flag_HAI  Ein fortschrittliches Haiti"
 RULE_OPTION_HAI_PATH_SOCLIB_DESC: "$RULE_OPTION_HAI_PATH_ELECTION_DESC$\nJean Price-Mars §lParti Populaire Progressiste§!, oder Progressive Volkspartei, wird daraufhin gewählt."
 RULE_OPTION_HAI_PATH_VINCENT_AUTDEM: "£KR_game_rule_flag_HAI  Ein nationalistisches Haiti"
 RULE_OPTION_HAI_PATH_VINCENT_AUTDEM_DESC: "$RULE_OPTION_HAI_PATH_ELECTION_DESC$\nSténio Vincents §aParti Nationaliste§!, oder Nationalistische Partei, wird daraufhin gewählt."

 HAI_FORPOL: "£KR_game_rule_flag_HAI  Außenpolitik Haitis"
 RULE_OPTION_HAI_FORPOL_RANDOM: "Standard"
 RULE_OPTION_HAI_FORPOL_RANDOM_DESC: "Die Unsicherheit nach dem Ausbruch des Zweiten Amerikanischen Bürgerkriegs lastet auf der haitianischen Bevölkerung. Sie müssen entscheiden, wie sie sich in Zukunft am besten aufstellen."
 RULE_OPTION_HAI_FORPOL_GER: "£KR_game_rule_flag_HAI  £KR_game_rule_flag_GER  Reichspakt"
 RULE_OPTION_HAI_FORPOL_GER_DESC: "Haiti versucht, dem Reichspakt beizutreten.\n\n§RBenötigt:§!\n§RNicht§! §CEin Revolutionäres Haiti§! oder §CEin sozialistisches Haiti§! in\n§Y$HAI_PATH$§!"
 RULE_OPTION_HAI_FORPOL_ENT: "£KR_game_rule_flag_HAI  £KR_game_rule_flag_CAN  Entente"
 RULE_OPTION_HAI_FORPOL_ENT_DESC: "Haiti versucht, der Entente beizutreten.\n\n§RBenötigt:§!\n§CEin konservatives Haiti§! oder §CEin Liberales Haiti§! oder §CEin Fortschrittliches Haiti§! oder §CEin Nationalistisches Haiti§! in\n§Y$HAI_PATH$§!"
 RULE_OPTION_HAI_FORPOL_CEN: "£KR_game_rule_flag_HAI  £KR_game_rule_flag_CEN  £KR_game_rule_flag_COS  Karibische Allianz"
 RULE_OPTION_HAI_FORPOL_CEN_DESC: "Haiti strebt den Beitritt zur Demokratischen Allianz der Karibik an, falls diese gegründet wird.\n\n§RBenötigt:§!\n§CEin Gleichberechtigtes Haiti§! oder §CEin Konservatives Haiti§! oder §CEin Liberales Haiti§! oder §CEin Fortschrittliches Haiti§! in §Y$HAI_PATH$§!\n§CKaribische Allianz§! in §Y$CEN_DEM_FORPOL$§! oder §Y$COS_FORPOL$§!"

 WIF_PATH: "£KR_game_rule_flag_WIF  Wahlen und Revolutionen auf den Westindischen Inseln"
 RULE_OPTION_WIF_PATH_RANDOM: "Standard"
 RULE_OPTION_WIF_PATH_RANDOM_DESC: "Die nächsten Wahlen in Westindien entscheiden über den weiteren Weg der Föderation, während sich das Empire darauf vorbereitet, London zurückzuerobern. Doch sowohl loyalistische Ängste als auch syndikalistische Revolutionäre könnten das Land ins Chaos stürzen..."
 RULE_OPTION_WIF_PATH_PA_DESC: "Mit dem Sieg der Parti pour l'Autonomie (Partei für Autonomie) liegt die Koalition der Einheitspartei in Trümmern. Normalerweise wäre dies ein Grund zum Feiern unter den Parteimitgliedern, doch die Realität sieht so aus, dass die fragile Allianz, die sie einst zusammenhielt, nun zerbrochen ist, und die Fraktion der PA, die aus dem Machtkampf als Sieger hervorgeht, könnte die Gestalt der Föderation für immer verändern."
 RULE_OPTION_WIF_PATH_SOCDEM: "£KR_game_rule_flag_WIF  PA und Nationale Volkspartei"
 RULE_OPTION_WIF_PATH_SOCDEM_DESC: "$RULE_OPTION_WIF_PATH_PA_DESC$\nDie PA verbündet sich mit der People's National Party und bildet die §SParti pour l'Autonomie – People's National Party Coalition§!, oder Partei für Autonomie – Koalition der Volksnationalen Partei, und bringt die Föderation auf den Weg des Sozialismus."
 RULE_OPTION_WIF_PATH_SOCLIB: "£KR_game_rule_flag_WIF  PA und Labour"
 RULE_OPTION_WIF_PATH_SOCLIB_DESC: "$RULE_OPTION_WIF_PATH_PA_DESC$\nUm die radikalsten sozialistischen Gruppen auszuschalten, schließt sich die PA mit der Labour Partei zusammen und die §lParti pour l'Autonomie - Labour Party -Koalition§!, oder Partei für Autonomie - Volksnationale Partei Koalition, arbeitet daran, liberale Ideale in der Nation zu verwirklichen."
 RULE_OPTION_WIF_PATH_MARLIB: "£KR_game_rule_flag_WIF  Einheitspartei"
 RULE_OPTION_WIF_PATH_MARLIB_DESC: "Die §mEinheitspartei§!, die auf Versöhnung zwischen den verschiedenen Parteien und einen Kompromiss setzt, geht aus den Wahlen von 1937 als Sieger hervor."
 RULE_OPTION_WIF_PATH_SOCCON: "£KR_game_rule_flag_WIF  Partei der Nationalen Konsolidierung"
 RULE_OPTION_WIF_PATH_SOCCON_DESC: "Ab 1929, als die NCP die Macht verlor, verloren die Westindischen Inseln im Vergleich zu der Zeit, als das Gebiet der Föderation durch die Hinzufügung ehemaliger französischer Kolonien erweitert wurde, an Bedeutung. Viele sagen, dass die Politik der Partei zu einer Stagnation in der Föderation geführt habe, aber nachdem sie seit 1933 allmählich wieder an Boden gewonnen hatte, gelang der §cNationalen Konsolidierungs-Partei§! die Rückkehr an die Macht."
 RULE_OPTION_WIF_PATH_AUTDEM: "£KR_game_rule_flag_WIF  Patriotische Vereinigung"
 RULE_OPTION_WIF_PATH_AUTDEM_DESC: "The Governor General comes into the possession of extraordinary executive powers, empowering the §aPatriotic Union§! and finally making a move towards securing the Federation against those who threaten its existence."
 RULE_OPTION_WIF_PATH_SOC_DESC: "Socialists of the West Indies band together, full of the agitation and cries of the working class unheard by the governor in Kingston. The revolution rises up with the aim of bringing a new socialist era for the West Indies."
 RULE_OPTION_WIF_PATH_LABOUR_RADSOC: "£KR_game_rule_flag_WIF_soc Revolution - Arbeiter"
 RULE_OPTION_WIF_PATH_LABOUR_RADSOC_DESC: "$RULE_OPTION_WIF_PATH_SOC_DESC$\nThe §RLabour Party§! wins the subsequent elections."
 RULE_OPTION_WIF_PATH_PEOPLES_RADSOC: "£KR_game_rule_flag_WIF_soc Revolution - Volkspartei"
 RULE_OPTION_WIF_PATH_PEOPLES_RADSOC_DESC: "$RULE_OPTION_WIF_PATH_SOC_DESC$\nThe §RPeople's Party§! wins the subsequent elections."
 RULE_OPTION_WIF_PATH_SYNDIE: "£KR_game_rule_flag_WIF_soc Revolution - Butler Partei"
 RULE_OPTION_WIF_PATH_SYNDIE_DESC: "$RULE_OPTION_WIF_PATH_SOC_DESC$\nThe §rButler Party§! wins the subsequent elections."
 RULE_OPTION_WIF_PATH_NOT_SOC: "£KR_game_rule_flag_WIF  Keine Sozialistische Revolution"
 RULE_OPTION_WIF_PATH_NOT_SOC_DESC: "Die Westindische Föderation wählt ihren Weg über das reguläre zufallsbasierte System, mit Ausnahme aller sozialistischen Wege."

 PUE_PATH: "£KR_game_rule_flag_PUE   La Isla del Encanto (Die Insel der Verzauberung)"
 PUE_PATH_CAN_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CForm New England§! or §COccupy New England§! in\n§Y$CAN_ACW_NEW_ENGLAND$§!"
 RULE_OPTION_PUE_PATH_RANDOM: "Standard"
 RULE_OPTION_PUE_PATH_RANDOM_DESC: "Die prekäre Lage des Gouverneurs, die durch die Weltwirtschaftskrise und die Reformforderungen aller Parteien mit Ausnahme der Regierungskoalition verursacht wurde, kann in den Wirren des Zweiten Amerikanischen Bürgerkriegs kaum Bestand haben."
 RULE_OPTION_PUE_PATH_CAN: "£KR_game_rule_flag_CAN  Kanadische Besetzung"
 RULE_OPTION_PUE_PATH_ENT_DESC: "Nach der Intervention Kanadas in Neuengland ist nun Puerto Rico an der Reihe."
 RULE_OPTION_PUE_PATH_CAN_DESC: "$RULE_OPTION_PUE_PATH_ENT_DESC$ Kanada okkupiert die Insel.$PUE_PATH_CAN_REQUIREMENTS$"
 RULE_OPTION_PUE_PATH_WIF: "£KR_game_rule_flag_WIF  Westindische Inseln Besetzung"
 RULE_OPTION_PUE_PATH_WIF_DESC: "$RULE_OPTION_PUE_PATH_ENT_DESC$ Kanada besetzt die Insel, bevor es sie an die Westindischen Inseln abgibt.$PUE_PATH_CAN_REQUIREMENTS$"
 RULE_OPTION_PUE_PATH_PUPPET: "£KR_game_rule_flag_PUE  £KR_game_rule_flag_CAN  Kanadische Marionette"
 RULE_OPTION_PUE_PATH_PUPPET_DESC: ""$RULE_OPTION_PUE_PATH_ENT_DESC$ Kanada besetzt die Insel und errichtet ein Marionettenregime.$PUE_PATH_CAN_REQUIREMENTS$"
 RULE_OPTION_PUE_PATH_REVOLT_DESC: "Nachdem die Insel von den \"angloamerikanischen Besatzern\" eingenommen wurde, führt die§nPartido Nacionalista§!, oder Nationalistische Partei, einen Aufstand an und erklärt die Unabhängigkeit der Insel.\nIn response, their former owner"
 RULE_OPTION_PUE_PATH_INTERVENTION_NATPOP: "£KR_game_rule_flag_PUE_natpop  Revolution - Intervention"
 RULE_OPTION_PUE_PATH_INTERVENTION_NATPOP_DESC: "$RULE_OPTION_PUE_PATH_REVOLT_DESC$ erklärt der neu gegründeten Republik den Krieg."
 RULE_OPTION_PUE_PATH_ACQUIESCENCE_NATPOP: "£KR_game_rule_flag_PUE_natpop  Revolution - Duldung"
 RULE_OPTION_PUE_PATH_ACQUIESCENCE_NATPOP_DESC: "$RULE_OPTION_PUE_PATH_REVOLT_DESC$ beteiligt sich nicht aktiv an der Rebellion."
 RULE_OPTION_PUE_PATH_INDEPENDENCE: "£KR_game_rule_flag_PUE  Unabhängigkeit"
 RULE_OPTION_PUE_PATH_INDEPENDENCE_DESC: "Die Verhandlungen des Gouverneurs über den Beitritt zur Union scheitern, und ein unabhängiger Puertoricanischer Staat wird ausgerufen."
 RULE_OPTION_PUE_PATH_STAY_IN_UNION: "£KR_game_rule_flag_USA  In der Union bleiben"
 RULE_OPTION_PUE_PATH_STAY_IN_UNION_DESC: "Zur Verärgerung der Nationalisten bleibt Puerto Rico wie bisher Teil der Vereinigten Staaten.\n\n§RBenötigt:§!\n§CNeuengland meiden§! in §Y$CAN_ACW_NEW_ENGLAND$§!"
 RULE_OPTION_PUE_PATH_BACK_TO_UNION: "£KR_game_rule_flag_USA   Zurück in die Union"
 RULE_OPTION_PUE_PATH_BACK_TO_UNION_DESC: "Die Verhandlungen der §PGobernación Americana, oder Amerikanischen Regierung, über den Wiedereintritt in die Union sind erfolgreich, und Puerto Rico kehrt als eigenständiger Staat in die Vereinigten Staaten zurück."

 PUE_ELECTION: "£KR_game_rule_flag_PUE  Wahlen in Puerto Rico"
 PUE_ELECTION_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CUnabhängigkeit§! oder §CKanadische Marionette§! in §Y$PUE_PATH$§!"
 RULE_OPTION_PUE_ELECTION_RANDOM: "Standard"
 RULE_OPTION_PUE_ELECTION_RANDOM_DESC: "Nach der Unabhängigkeitserklärung hält Puerto Rico die ersten freien Wahlen seiner Geschichte ab."
 RULE_OPTION_PUE_ELECTION_SOCDEM: "£KR_game_rule_flag_PUE  Demócratas Populares"
 RULE_OPTION_PUE_ELECTION_SOCDEM_DESC: "Die §SPartido Popular Democratico§!, oder Volksdemokratische Partei, gewinnt die ersten Wahlen in Puerto Rico.$PUE_ELECTION_REQUIREMENTS$"
 RULE_OPTION_PUE_ELECTION_SOCLIB: "£KR_game_rule_flag_PUE  Liberals"
 RULE_OPTION_PUE_ELECTION_SOCLIB_DESC: "Die §lPartido Liberales§!, oder Liberale Partei, gewinnt die ersten Wahlen in Puerto Rico.$PUE_ELECTION_REQUIREMENTS$"
 RULE_OPTION_PUE_ELECTION_AUTDEM: "£KR_game_rule_flag_PUE  Unionistas"
 RULE_OPTION_PUE_ELECTION_AUTDEM_DESC: "Die §aPartido Unión Puertorriqueña§!, oder Puerto-Ricanische Union-Partei, gewinnen die ersten Wahlen in Puerto Rico.$PUE_ELECTION_REQUIREMENTS$"
 RULE_OPTION_PUE_ELECTION_NATPOP: "£KR_game_rule_flag_PUE_natpop  Nationalistas"
 RULE_OPTION_PUE_ELECTION_NATPOP_DESC: "Die §nPartido Nacionalista§!, oder Nationalistische Partei, gewinnt die ersten Wahlen in Puerto Rico.$PUE_ELECTION_REQUIREMENTS$"

 GUA_PATH: "£KR_game_rule_flag_GUA   Brief der 311"
 RULE_OPTION_GUA_PATH_RANDOM: "Standard"
 RULE_OPTION_GUA_PATH_RANDOM_DESC: "Die Partido Renovación Nacional (Partei der Nationalen Erneuerung), frustriert über den Mangel an Demokratie in Guatemala, schickt einen Brief an Präsident José María Orellana, in dem sie Reformen fordert. Der Brief dient jedoch nur dazu, Zeit zu gewinnen, da sie eine offene Revolte ausruft, die zu einem Bürgerkrieg führt."
 RULE_OPTION_GUA_PATH_AUTDEM: "£KR_game_rule_flag_GUA   Liberal Federalistas"
 RULE_OPTION_GUA_PATH_AUTDEM_DESC: "Trotz aller Widrigkeiten gelingt es Orellana, nach dem Sieg über die Rebellen und dem Gewinn des Bürgerkriegs Präsident zu bleiben, wobei seine §aPartido Liberal Federalista§!, oder Liberale Föderalistische Partei, an der Macht bleibt."
 RULE_OPTION_GUA_PATH_DEM_DESC: "Die PRN gewinnt den Bürgerkrieg. Später finden Wahlen statt und die"
 RULE_OPTION_GUA_PATH_RADSOC: "£KR_game_rule_flag_GUA_soc   Comunistas"
 RULE_OPTION_GUA_PATH_RADSOC_DESC: "$RULE_OPTION_GUA_PATH_DEM_DESC$ §RPartido Comunista de Guatemala§!, oder Kommunistische Partei Guatemalas, übernimmt die Macht."
 RULE_OPTION_GUA_PATH_SOCCON: "£KR_game_rule_flag_GUA   Unionistas"
 RULE_OPTION_GUA_PATH_SOCCON_DESC: "$RULE_OPTION_GUA_PATH_DEM_DESC$ §cPartido Unionista§!, oder Unionistische Partei, übernimmt die Macht."
 RULE_OPTION_GUA_PATH_SOCDEM: "£KR_game_rule_flag_GUA  Partido Renovación Nacional"
 RULE_OPTION_GUA_PATH_SOCDEM_DESC: "$RULE_OPTION_GUA_PATH_DEM_DESC$ §SPartido Renovación Nacional§!, oder Partei der Nationalen Erneuerung, bleibt an der Macht."
 RULE_OPTION_GUA_PATH_CIVIL_WAR_PATAUT: "£KR_game_rule_flag_GUA   Liberal Progresistas"
 RULE_OPTION_GUA_PATH_CIVIL_WAR_PATAUT_DESC: "Jorge Ubico Castañeda und seine §PPartido Liberal Progresista§!, oder Progressive Liberale Partei, gewinnen den Bürgerkrieg, und damit beginnt die Erholungsphase des Landes."
 RULE_OPTION_GUA_PATH_COUP_PATAUT: "£KR_game_rule_flag_GUA   UFC Gegenrevolution"
 RULE_OPTION_GUA_PATH_COUP_PATAUT_DESC: "Die PRN gewinnt den Bürgerkrieg, aber Ubico kehrt mit einer von der United Fruit Company bezahlten Söldnerarmee zurück, putscht die Regierung und bringt die §PPartido Liberal Progresistas§! wieder an die Macht."

 ELS_PATH: "£KR_game_rule_flag_ELS   Die Revolution von 1937"
 RULE_OPTION_ELS_PATH_RANDOM: "Standard"
 RULE_OPTION_ELS_PATH_RANDOM_DESC: "Genau wie 1932 greift das Feuer der Revolution erneut auf El Salvador über. Nur die Zeit wird zeigen, wer die Oberhand gewinnt und es schafft, El Salvador zu übernehmen."
 RULE_OPTION_ELS_PATH_PATAUT: "£KR_game_rule_flag_ELS   Fuerza Armada (Streitkräfte)"
 RULE_OPTION_ELS_PATH_PATAUT_DESC: "Der Tyrann Maximiliano Hernández Martínez wird abgesetzt, und an seine Stelle tritt Osmín Aguirre y Salinas als neuer Präsident. Salinas gelingt es, die Rebellen zu vernichten und den Sieg für die neue Garde der §PFuerza Armada de El Salvador§!, oder Streitkräfte von El Salvador, zu sichern."
 RULE_OPTION_ELS_PATH_NATPOP: "£KR_game_rule_flag_ELS   Pro-Patria"
 RULE_OPTION_ELS_PATH_NATPOP_DESC: "Die §nPartido Nacional Pro-Patria§!, oder Nationale Partei des Vaterlandes, unter der Führung von Maximiliano Hernández Martínez besiegt die Rebellen und sichert erneut ihre Position."
 RULE_OPTION_ELS_PATH_SYNDIE: "£KR_game_rule_flag_ELS_soc   Fuerzas Populares de Liberación"
 RULE_OPTION_ELS_PATH_SYNDIE_DESC: "Die §rFuerzas Populares de Liberación§!, oder Volksbefreiungskräfte, sind in ihrer Revolution siegreich und wollen El Salvador in eine bessere Zukunft führen."
 RULE_OPTION_ELS_PATH_DEM_DESC: "Der demokratischen Fraktion der Revolution gelingt es, die Präsidentschaft wiederherzustellen. Später werden vorgezogene Wahlen angesetzt, die von der"
 RULE_OPTION_ELS_PATH_SOCDEM: "£KR_game_rule_flag_ELS   Laboristas"
 RULE_OPTION_ELS_PATH_SOCDEM_DESC: "$RULE_OPTION_ELS_PATH_DEM_DESC$ §SPartido Laborista§!, oder Arbeiterpartei"
 RULE_OPTION_ELS_PATH_SOCLIB: "£KR_game_rule_flag_ELS   Nacional Democraticos"
 RULE_OPTION_ELS_PATH_SOCLIB_DESC: "$RULE_OPTION_ELS_PATH_DEM_DESC$ §lPartido Nacional Democratico§!, oder Nationale Demokratische Partei."
 RULE_OPTION_ELS_PATH_AUTDEM: "£KR_game_rule_flag_ELS  PRUD"
 RULE_OPTION_ELS_PATH_AUTDEM_DESC: "In einer überraschenden Wendung der Ereignisse sperrt General Salvador Castaneda Castro den Präsidenten ein und erklärt sich selbst zum vorläufigen Präsidenten, um die Nation vor Extremismus zu schützen, und führt die §aPartido Revolucionario de Unificación Democrática§!, oder Revolutionäre Demokratische Einheitspartei."

 HON_PATH: "£KR_game_rule_flag_HON   Die Notfallsitzung"
 RULE_OPTION_HON_PATH_RANDOM: "Standard"
 RULE_OPTION_HON_PATH_RANDOM_DESC: "Die Dringlichkeitssitzung des honduranischen Rates hat begonnen, um über die Zukunft der Bauernrepublik zu entscheiden. Die Ratsmitglieder Wainwright und Castro geraten wegen ihrer unterschiedlichen Ansichten fast aneinander, und beide Seiten beschuldigen sich gegenseitig heftig, während die Ratsmitglieder Morales und Callejas eine gemeinsame Front bilden und für die Auflösung des Rates und seine Neugründung als gewähltes Gremium plädieren. Letztendlich scheint es jedoch nur wenige Optionen für die Zukunft des Rates zu geben."
 RULE_OPTION_HON_PATH_PATAUT: "£KR_game_rule_flag_HON   Nacionalistas (Kontinuität)"
 RULE_OPTION_HON_PATH_PATAUT_DESC: "General Castro übernimmt den Vorsitz des Rates, übernimmt die Kontrolle und verhängt das Kriegsrecht. Er regiert mit der Continuismo-Fraktion der §PPartidio Nacional de Honduras§!, oder Nationale Partei von Honduras."
 RULE_OPTION_HON_PATH_SOCCON: "£KR_game_rule_flag_HON   Nacionalistas (Moderat)"
 RULE_OPTION_HON_PATH_SOCCON_DESC: "Der Rat hält eine Notwahl ab. Callejas und die gemäßigte Fraktion der §cPartidio Nacional de Honduras§!, oder Nationalpartei von Honduras, gehen als Sieger hervor."
 RULE_OPTION_HON_PATH_SOCDEM: "£KR_game_rule_flag_HON   Liberales (Radikal)"
 RULE_OPTION_HON_PATH_SOCDEM_DESC: "Der Rat hält eine Notwahl ab. Morales und die radikale Fraktion der §SPartido Liberal de Honduras§!, oder Liberale Partei von Honduras, gehen als Sieger hervor."
 RULE_OPTION_HON_PATH_TOTALIST: "£KR_game_rule_flag_HON_soc   Bloque Obrero y Campesino (Arbeiter- und Bauernblock)"
 RULE_OPTION_HON_PATH_TOTALIST_DESC: "Ratsmitglied Wainwright übernimmt den Vorsitz des Rates, übernimmt die Kontrolle und führt mit seinem §oBloque Obrero y Campesino, oder Arbeiter- und Bauernblock, eine Revolution herbei."

NIC_PATH: "£KR_game_rule_flag_NIC_soc    Liberal-Sozialistische Spaltung"
RULE_OPTION_NIC_PATH_RANDOM: "Standard"
RULE_OPTION_NIC_PATH_RANDOM_DESC: "Die Liberalen und Sozialisten stürzten gemeinsam das alte, von den USA unterstützte Regime Nicaraguas, doch nun werden die Gegner der regierenden Sandinisten Präsident Sandino zum Dorn im Auge. Bei den Wahlen von 1936 droht die Zusammenarbeit zwischen Liberalen und Sozialisten zu scheitern, aber auch der Sturz von Sandino und seiner Partei droht."
RULE_OPTION_NIC_PATH_SYNDIE: "£KR_game_rule_flag_NIC_soc   Frente de Soberanía Nacional"
RULE_OPTION_NIC_PATH_SYNDIE_DESC: "Augusto César Sandinos §rFrente de Soberanía Nacional§!, oder Front der nationalen Souveränität, hält durch und gewinnt die Wahlen von 1936."
RULE_OPTION_NIC_PATH_RADSOC: "£KR_game_rule_flag_NIC_soc   Campesinos"
RULE_OPTION_NIC_PATH_RADSOC_DESC: "Der Hitzkopf Francisco Sequeira Moreno und seine §RBauernpartei von Nicaragua§!, oder Bauernpartei Nicaraguas, gewinnen die Wahlen von 1936 und schaffen einen Mittelweg zwischen den Sandinisten und den Liberalen."
RULE_OPTION_NIC_PATH_SOCLIB: "£KR_game_rule_flag_NIC   Partido de la Revolución Liberal"
RULE_OPTION_NIC_PATH_SOCLIB_DESC: "Juan Bautista Sacasas §lLiberale Revolutionäre Partei§!, oder Partei der liberalen Revolution, gewinnt die Wahlen von 1936 und beginnt, die Revolution zugunsten der liberalen Demokratie umzukehren."
 RULE_OPTION_NIC_PATH_SOCCON: "£KR_game_rule_flag_NIC   Conservadores"
 RULE_OPTION_NIC_PATH_SOCCON_DESC: "Die Liberalen von Sacasa gewinnen die Wahlen von 1936 und führen nach einem gescheiterten sozialistischen Aufstand Neuwahlen durch. Diese werden von Emiliano Chamorro Vargas' §cKonservative Partei§!, oder Konservative Partei, gewonnen."

 CEN_DEM_PATH: "£KR_game_rule_flag_CEN   Zentralamerikanische Wahlen"
 CEN_DEM_PATH_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CCentral America is united by democrats§!"
 RULE_OPTION_CEN_DEM_PATH_RANDOM: "Standard"
 RULE_OPTION_CEN_DEM_PATH_RANDOM_DESC: "Zentralamerika ist unter demokratischer Herrschaft vereint. Welche Partei kommt nach den vorgezogenen Wahlen an die Macht?"
 RULE_OPTION_CEN_DEM_PATH_MARLIB: "£KR_game_rule_flag_CEN   Partido de Unificación Democrática"
 RULE_OPTION_CEN_DEM_PATH_MARLIB_DESC: "Die §mPartido de Unificación Democrática§!, oder Partei der Demokratischen Vereinigung, geht als Siegerin aus den Wahlen hervor.$CEN_DEM_PATH_REQUIREMENTS$"
 RULE_OPTION_CEN_DEM_PATH_SOCCON: "£KR_game_rule_flag_CEN   Unionistas"
 RULE_OPTION_CEN_DEM_PATH_SOCCON_DESC: "Die §cPartido Unionista§!, oder Unionistische Partei, geht als Siegerin aus den Wahlen hervor.$CEN_DEM_PATH_REQUIREMENTS$"
 RULE_OPTION_CEN_DEM_PATH_SOCLIB: "£KR_game_rule_flag_CEN   Liberales"
 RULE_OPTION_CEN_DEM_PATH_SOCLIB_DESC: "Die §lLiberales§!, oder Liberale Partei, geht als Siegerin aus den Wahlen hervor.$CEN_DEM_PATH_REQUIREMENTS$"
 RULE_OPTION_CEN_DEM_PATH_LABOUR_SOCDEM: "£KR_game_rule_flag_CEN   Trabajadores"
 RULE_OPTION_CEN_DEM_PATH_LABOUR_SOCDEM_DESC: "Die §STrabajodores§!, oder Arbeiterpartei, geht als Sieger aus den Wahlen hervor.$CEN_DEM_PATH_REQUIREMENTS$"
 RULE_OPTION_CEN_DEM_PATH_REVOLUTIONARY_SOCDEM: "£KR_game_rule_flag_CEN   Nationale Revolutionäre Partei"
 RULE_OPTION_CEN_DEM_PATH_REVOLUTIONARY_SOCDEM_DESC: "Während die Demokratie gegenüber den revolutionären Ideologien die Oberhand behält, wurde die am wenigsten extreme davon nicht verboten. Die §SPartido Nacional Revolucionario§!, oder Nationale Revolutionäre Partei, geht als Siegerin aus den Wahlen hervor.$CEN_DEM_PATH_REQUIREMENTS$"

 CEN_SOC_PATH: "£KR_game_rule_flag_CEN_soc   Zentralamerikanischer Kongress"
 CEN_SOC_PATH_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CZentralamerika wird von Sozialisten vereint§!"
 RULE_OPTION_CEN_SOC_PATH_RANDOM: "Standard"
 RULE_OPTION_CEN_SOC_PATH_RANDOM_DESC: "Zentralamerika ist unter linker Herrschaft vereint. Welche Fraktion kommt während des Ersten Zentralamerikanischen Kongresses an die Macht?"
 RULE_OPTION_CEN_SOC_PATH_SYNDIE: "£KR_game_rule_flag_CEN_soc   Confederación Obrera"
 RULE_OPTION_CEN_SOC_PATH_SYNDIE_DESC: "Die §rConfederación Obrera de Centro América§!, oder Zentralamerikanische Arbeiterkonföderation, kommen an die Macht. Der Handel mit den revolutionären Regimes Europas floriert, und das junge Land industrialisiert sich rasch.$CEN_SOC_PATH_REQUIREMENTS$"
 RULE_OPTION_CEN_SOC_PATH_REVOLUTIONARY_RADSOC: "£KR_game_rule_flag_CEN_soc   Partido Nacional Revolucionario"
 RULE_OPTION_CEN_SOC_PATH_REVOLUTIONARY_RADSOC_DESC: "Die Radikalsozialisten waren immer die populärste revolutionäre Fraktion in der Region, und der Kongress entscheidet sich gegen jede radikale Veränderung. So wird die §RPartido Nacional Revolucionario§!, oder Nationale Revolutionäre Partei, gewählt. Centroamérica wird zu einer agrarischen Bastion der Gleichheit.$CEN_SOC_PATH_REQUIREMENTS$"
 RULE_OPTION_CEN_SOC_PATH_TOTALIST: "£KR_game_rule_flag_CEN_soc   Maximistas"
 RULE_OPTION_CEN_SOC_PATH_TOTALIST_DESC: "Der Kongress beschließt, dass eine starke Zentralmacht erforderlich ist, und die §oPartido Maximista§!, oder Maximistische Partei, wird gewählt. Werden sie in der Lage sein, mit weniger radikalen Fraktionen zu kooperieren, oder wird ein Putsch ihre Herrschaft beenden?$CEN_SOC_PATH_REQUIREMENTS$"
 RULE_OPTION_CEN_SOC_PATH_MODERADO_RADSOC: "£KR_game_rule_flag_CEN_soc   Partido Popular"
 RULE_OPTION_CEN_SOC_PATH_MODERADO_RADSOC_DESC: "Die Gemäßigten der §RPartido Popular§!, oder Volkspartei, werden gewählt, um das Land mit Samthandschuhen zu führen.$CEN_SOC_PATH_REQUIREMENTS$"

 CEN_MIL_PATH: "£KR_game_rule_flag_CEN   Zentralamerikanischer Militärkongress"
 CEN_MIL_PATH_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CCentral America is united by reactionaries§!"
 RULE_OPTION_CEN_MIL_PATH_RANDOM: "Standard"
 RULE_OPTION_CEN_MIL_PATH_RANDOM_DESC: "Zentralamerika ist unter Militärherrschaft vereint. Welche Fraktion kommt während des ersten zentralamerikanischen Kongresses an die Macht?"
 RULE_OPTION_CEN_MIL_PATH_AUTDEM: "£KR_game_rule_flag_CEN   Partido Liberal Nacionalista"
 RULE_OPTION_CEN_MIL_PATH_AUTDEM_DESC: "Die Gemäßigten unter der Führung von Anastasio Somoza García aus Nicaragua errichten eine Militärregierung. Zentralamerika organisiert manipulierte Wahlen, um die §aPartido Liberal Nacionalista§!, oder Nationalistische Liberale Partei, zu legitimieren.$CEN_MIL_PATH_REQUIREMENTS$"
 RULE_OPTION_CEN_MIL_PATH_PATAUT: "£KR_game_rule_flag_CEN   Partido Liberal Progresista"
 RULE_OPTION_CEN_MIL_PATH_PATAUT_DESC: "Die Militaristen unter der Führung von Jorge Ubico Castañeda aus Guatemala errichten ein autoritäres Regime. Zentralamerika wird schnell zu einer Militärdiktatur, die angeblich von der §PPartido Liberal Progresista§!, oder Fortschrittliche Liberale Partei, angeführt wird.$CEN_MIL_PATH_REQUIREMENTS$"
 RULE_OPTION_CEN_MIL_PATH_NATPOP: "£KR_game_rule_flag_CEN  Pro-Patria"
 RULE_OPTION_CEN_MIL_PATH_NATPOP_DESC: "Die Radikalen unter der Führung von Maximiliano Hernández Martínez aus El Salvador errichten ein extremistisches Regime. Zentralamerika verwandelt sich in einen antilinke totalitären Staat unter der Führung der §nPartido Nacional Pro-Patria§!, oder Nationale Partei des Vaterlandes.$CEN_MIL_PATH_REQUIREMENTS$\n\n§CPro-Patria§! in §Y$ELS_PATH$§!"

 CEN_DEM_FORPOL: "£KR_game_rule_flag_CEN  Demokratische Zentralamerikanische Außenpolitik"
 RULE_OPTION_CEN_DEM_FORPOL_RANDOM: "Standard"
 RULE_OPTION_CEN_DEM_FORPOL_RANDOM_DESC: "Die wiedergeborene Republik befindet sich in einer schwierigen Lage, Ihr Traum, den anderen karibischen Nationen Demokratie und Freiheit zu bringen, kollidiert mit der Realität einer schlecht organisierten Armee und Regierung. Die Gefahren, die durch den Zweiten Amerikanischen Bürgerkrieg entstanden sind, werden letztendlich darüber entscheiden, ob solche Ideale zugunsten der Sicherheit geopfert werden müssen."
 RULE_OPTION_CEN_DEM_FORPOL_ENT: "£KR_game_rule_flag_CEN  £KR_game_rule_flag_CAN  Entente"
 RULE_OPTION_CEN_DEM_FORPOL_ENT_DESC: "Zentralamerika versucht, der Entente beizutreten.$CEN_DEM_PATH_REQUIREMENTS$\n\n§RKeine§! §CPartido de Unificación Democratica§! oder §CPartido Nacional Revolucionario§! in §Y$CEN_DEM_PATH$§!"
 RULE_OPTION_CEN_DEM_FORPOL_CEN: "£KR_game_rule_flag_CEN  £KR_game_rule_flag_COS  Allianz der Karibik"
 RULE_OPTION_CEN_DEM_FORPOL_CEN_DESC: "Zentralamerika konzentriert sich auf den Schutz der Region und gründet die Demokratische Allianz der Karibik oder tritt ihr bei.$CEN_DEM_PATH_REQUIREMENTS$"

 CEN_MIL_FORPOL: "£KR_game_rule_flag_CEN  Autoritäre Zentralamerikanische Außenpolitik"
 RULE_OPTION_CEN_MIL_FORPOL_RANDOM: "Standard"
 RULE_OPTION_CEN_MIL_FORPOL_RANDOM_DESC: "Nachdem sie Mittelamerika vereint hat, muss die junge Republik Verbündete suchen, um ihre Unabhängigkeit zu sichern und sich gegen den radikalen Sozialismus zu schützen, nachdem der zweite amerikanische Bürgerkrieg regionale und internationale Unruhen ausgelöst hat."
 RULE_OPTION_CEN_MIL_FORPOL_GER: "£KR_game_rule_flag_CEN  £KR_game_rule_flag_GER  Reichspakt"
 RULE_OPTION_CEN_MIL_FORPOL_GER_DESC: "Zentralamerika versucht, dem Reichspakt beizutreten.$CEN_MIL_PATH_REQUIREMENTS$"
 RULE_OPTION_CEN_MIL_FORPOL_ENT: "£KR_game_rule_flag_CEN  £KR_game_rule_flag_CAN  Entente"
 RULE_OPTION_CEN_MIL_FORPOL_ENT_DESC: "Zentralamerika versucht, der Entente beizutreten.$CEN_MIL_PATH_REQUIREMENTS$"
 RULE_OPTION_CEN_MIL_FORPOL_ACW_VICTOR: "£KR_game_rule_flag_CEN  £KR_game_rule_flag_USA  £KR_game_rule_flag_APG  £KR_game_rule_flag_ACC  £KR_game_rule_flag_NEE  Vereinigte Staaten"
 RULE_OPTION_CEN_MIL_FORPOL_ACW_VICTOR_DESC: "In der Erkenntnis, dass Uncle Sam der beste Garant für die Unabhängigkeit Mittelamerikas ist, verbündet sich die Militärjunta mit jedem nicht-sozialistischen Sieger des Zweiten Amerikanischen Bürgerkriegs.$CEN_MIL_PATH_REQUIREMENTS$\n\n§CDer Gewinner des Zweiten Amerikanischen Bürgerkriegs gehört einer Fraktion an und ist kein Sozialist.§!"

 COS_PATH: "£KR_game_rule_flag_COS   Costa Ricas Wahlen"
 RULE_OPTION_COS_PATH_RANDOM: "Standard"
 RULE_OPTION_COS_PATH_RANDOM_DESC: "Obwohl die Vorherrschaft der Partido Republicano Nacional bei den bevorstehenden Wahlen unbestritten ist, ist die Partei uneinig darüber, wen sie als Präsidentschaftskandidaten aufstellen soll."
 RULE_OPTION_COS_PATH_SOCCON: "£KR_game_rule_flag_COS   PRN (Konservativ)"
 RULE_OPTION_COS_PATH_SOCCON_DESC: "León Cortés Castro wird zum Präsidentschaftskandidaten der PRN nominiert. Zur Überraschung niemandes gewinnt die §cPartido Republicano Nacional§!, oder Nationale Republikanische Partei, die Wahlen, und Cortés steht nun an der Spitze der Nation."
 RULE_OPTION_COS_PATH_CALDERON_START_DESC: "Rafael Ángel Calderón Guardia wird zum Präsidentschaftskandidaten der PRN nominiert. Es überrascht niemanden, dass die PRN die Wahlen gewinnt und Calderón nun das Land führt."
 RULE_OPTION_COS_PATH_CALDERON_SOCDEM: "£KR_game_rule_flag_COS  PRN (Sozialistisch)"
 RULE_OPTION_COS_PATH_CALDERON_SOCDEM_DESC: "$RULE_OPTION_COS_PATH_CALDERON_START_DESC$\nCalderón vollzieht jedoch einen radikalen Politikwechsel, und die §SPartido Republicano Nacional, oder Republikanische Partei, beginnt mit der Umsetzung sozialistischer Reformen."
 RULE_OPTION_COS_PATH_FERRER_SOCDEM: "£KR_game_rule_flag_COS   Partido Liberación Nacional"
 RULE_OPTION_COS_PATH_FERRER_SOCDEM_DESC: "Nach Beginn seiner zweiten Amtszeit wird Calderón von der Legion del Caribe gestürzt. José Figueres Ferrer ruft eine Junta unter der Führung der §SPartido Liberación Nacional, oder Nationale Befreiungspartei, aus."
 RULE_OPTION_COS_PATH_SYNDIE: "£KR_game_rule_flag_COS  £KR_game_rule_flag_CEN_soc  £KR_game_rule_flag_NIC_soc  Partido Vanguardia Popular"
  RULE_OPTION_COS_PATH_SYNDIE_DESC: "$RULE_OPTION_COS_PATH_CALDERON_START_DESC$\nCalderón vollzieht jedoch einen radikalen Politikwechsel und beginnt mit der Umsetzung sozialistischer Reformen. Eine Koalition aus Unzufriedenen mit den Notstandsbefugnissen des Präsidenten stürzt Calderón und errichtet ein echtes syndikalistisches Regime unter Führung der §rPartido Vanguardia Popular§!, oder Volksavantgardepartei, die jedoch ohne Hilfe aus dem Ausland nicht überleben kann.\n\n§CHinweis: Wenn Zentralamerika oder Nicaragua syndikalistisch sind, annektieren sie Costa Rica. Andernfalls kehrt Costa Rica zu einem konservativen Regime zurück.§!"

 COS_FORPOL: "£KR_game_rule_flag_COS   Die Außenpolitik Costa Ricas"
 COS_FORPOL_NOT_SOC_REQUIREMENTS: "\n\n§RBenötigt:§!\n§RNot§! §CPartido Vanguardia Popular§! in §Y$COS_PATH$§!"
 RULE_OPTION_COS_FORPOL_RANDOM: "Standard"
 RULE_OPTION_COS_FORPOL_RANDOM_DESC: "Ein kleines Land wie Costa Rica sollte versuchen, in diesen turbulenten Zeiten eine Art Schirmherrschaft zu finden."
  RULE_OPTION_COS_FORPOL_DESC: "Das Land beantragt und erhält eine Garantie für die Unabhängigkeit von"
 RULE_OPTION_COS_FORPOL_ENT: "£KR_game_rule_flag_COS  £KR_game_rule_flag_CAN  Entente"
 RULE_OPTION_COS_FORPOL_ENT_DESC: "$RULE_OPTION_COS_FORPOL_DESC$ Kanada, und versucht später, ihrer Fraktion beizutreten.$COS_FORPOL_NOT_SOC_REQUIREMENTS$"
 RULE_OPTION_COS_FORPOL_GER: "£KR_game_rule_flag_COS  £KR_game_rule_flag_GER  Reichspakt"
 RULE_OPTION_COS_FORPOL_GER_DESC: "$RULE_OPTION_COS_FORPOL_DESC$ Deutschland, und versucht später, ihrer Fraktion beizutreten.$COS_FORPOL_NOT_SOC_REQUIREMENTS$"
 RULE_OPTION_COS_FORPOL_CEN: "£KR_game_rule_flag_COS  £KR_game_rule_flag_CEN  Karibische Allianz"
 RULE_OPTION_COS_FORPOL_CEN_DESC: "Costa Rica übernimmt die Rolle des Bollwerks der Demokratie für die Länder der Region und bildet die Demokratische Allianz der Karibik\n\n§RBenötigt:§!\n§CPartido Liberación Nacional§! in §Y$COS_PATH$§!"

 PAN_PATH: "£KR_game_rule_flag_PAN   Wahlen in Panama 1936"
 RULE_OPTION_PAN_PATH_RANDOM: "Standard"
 RULE_OPTION_PAN_PATH_RANDOM_DESC: "Mit dem endlich erreichten wirtschaftlichen Aufschwung sind die Wahlen von 1936 vielleicht die wichtigsten Wahlen in der Geschichte Panamas."
 RULE_OPTION_PAN_PATH_AUTDEM: "£KR_game_rule_flag_PAN   Nationale Revolutionäre Partei"
 RULE_OPTION_PAN_PATH_AUTDEM_DESC: "Die §aNationale Revolutionäre Partei§!, oder Nationale Revolutionäre Partei, gewinnt die Wahlen von 1936 mit einem Programm zur wirtschaftlichen Erholung durch Landwirtschaft und Investitionen."
 RULE_OPTION_PAN_PATH_SOCLIB: "£KR_game_rule_flag_PAN   Nationalliberale Partei"
 RULE_OPTION_PAN_PATH_SOCLIB_DESC: "Die §lNationalliberale Partei§!, oder Nationale Liberale Partei, gewinnt die Wahlen von 1936 mit einem Programm zur wirtschaftlichen Erholung durch Unternehmensinvestitionen und Arbeitnehmerschutz."
 RULE_OPTION_PAN_PATH_PATAUT: "£KR_game_rule_flag_PAN   Coalición Patriótica Nacional"
 RULE_OPTION_PAN_PATH_PATAUT_DESC: "Die Nationale Polizei hat sich bisher still im Hintergrund gehalten und darauf gewartet, dass die Regierung einen Fehler macht. Da das Land mehr denn je zerrissen ist, greifen sie ein, um in Panama \"die Ordnung wiederherzustellen\", und übergeben die Macht an die §PCoalición Patriótica Nacional§!, oder Nationale Patriotische Koalition."
 RULE_OPTION_PAN_PATH_SOCCON: "£KR_game_rule_flag_PAN   Partido Nacional Conservador"
 RULE_OPTION_PAN_PATH_SOCCON_DESC: "Aufgrund der Instabilität in der Bevölkerung und der Regierung ist Ricardo Joaquín Alfaro Jované gezwungen, zusammen mit seinem Kabinett zurückzutreten. Er bittet Juan Demóstenes Arosemena von der konservativen Fraktion der §mPartido Nacional Liberal§!, oder Nationale Liberale Partei, ein neues Kabinett als Präsident zu bilden.\nDaraufhin gründet Arosemena die §cPartido Nacional Conservador§!, oder Nationale Konservative Partei."

 PAN_CRISIS: "£KR_game_rule_flag_PAN  Panamakanal-Krise"
 RULE_OPTION_PAN_CRISIS_RANDOM: "Standard"
 RULE_OPTION_PAN_CRISIS_RANDOM_DESC: "Nach dem Beginn des Zweiten Amerikanischen Bürgerkriegs kann Panama den Kanal annektieren, der nun für die Entente lebenswichtig ist. Wie reagiert Kanada darauf?"
 RULE_OPTION_PAN_CRISIS_CAN: "£KR_game_rule_flag_CAN  Kanada annektiert den Kanal"
 RULE_OPTION_PAN_CRISIS_CAN_DESC: "Kanada übt Druck auf Panama aus und annektiert den Kanal."
 RULE_OPTION_PAN_CRISIS_ENT: "£KR_game_rule_flag_PAN   £KR_game_rule_flag_CAN  Entente"
 RULE_OPTION_PAN_CRISIS_ENT_DESC: "Kanada übt Druck auf Panama aus und zwingt es, sich der Entente anzuschließen, wodurch ihm der Kanal überlassen wird."
 RULE_OPTION_PAN_CRISIS_RETREAT: "£KR_game_rule_flag_PAN  Kanada zieht zurück"
 RULE_OPTION_PAN_CRISIS_RETREAT_DESC: "Kanada zieht sich zurück, und Panama übernimmt den Kanal"
 RULE_OPTION_PAN_CRISIS_WAR: "£KR_game_rule_flag_PAN   £KR_game_rule_flag_CAN  Krieg"
 RULE_OPTION_PAN_CRISIS_WAR_DESC: "Da eine Einigung mit Panama nicht zustande kommt, erklärt Kanada den Krieg."

### Länderpfade - Südamerika ###
RULE_GROUP_KAISERREICH_RULES_SOUTH_AMERICA: "Länderpfade - Südamerika"

ARG_PATH: "£KR_game_rule_flag_ARG   Auswirkungen des Weihnachts-Putsches"
RULE_OPTION_ARG_PATH_RANDOM: "Standard"
RULE_OPTION_ARG_PATH_RANDOM_DESC: "Als 1935 Gerüchte aufkamen, dass Roca die Beendigung des Konflikts begünstigen könnte, indem er den Kampf mit der FOP aufgibt, erregte die Empörung die Nation und ermöglichte es der "Liga Patriotica"  unter Manuél Carlés, den \"Weihnachtsputsch\" zu starten. Unterstützt von der Marine und verschiedenen militärischen Elementen, stürzte Carlés an Weihnachten 1935 die Regierung und übernahm die Kontrolle über die Hauptstadtregion.\nAm 1. Januar 1936 ist die Zukunft des Carlés-Regimes ungewiss. Außerhalb der Hauptstadtregion von Buenos Aires und kleiner Provinzen im Landesinneren hat die neue Regierung wenig Einfluss. Die Unterstützung durch die ARA oder \"Argentinische Armada\" ist garantiert, aber viele Offiziere der Armee bezweifeln das Potential von Carlés. Einige organisieren sich, um die Regierung erneut zu stürzen. Wie wird sich die Situation in Argentinien entwickeln?"
RULE_OPTION_ARG_PATH_NATPOP: "£KR_game_rule_flag_ARG   Liga Patriótica"
RULE_OPTION_ARG_PATH_NATPOP_DESC: "Nach einem blutigen Kampf nimmt Carlés Rosario ein und übernimmt nach einer mitreißenden Rede vor seinen Anhängern in Buenos Aires die Präsidentschaft. Mit dem Versprechen einer umfassenden territorialen Expansion und einem Ende des Roten Terrors, der Patagonien heimsucht, stößt die nationalistische Rhetorik, die er und seine §nLiga Patriótica Argentina§!, oder Patriotische Liga Argentiniens, verbreiten, bei der notleidenden Bevölkerung seines Landes auf große Begeisterung."
 RULE_OPTION_ARG_PATH_RAMIREZ_DESC: "Nach einem blutigen Kampf erringt die Armee bei Rosario einen entscheidenden Sieg und zwingt die Carlés-treuen Truppen zum Rückzug.\nNachdem sie die Hauptstadt eingenommen und die Ordnung im Land wiederhergestellt haben,"
RULE_OPTION_ARG_PATH_RAMIREZ_DEM: "£KR_game_rule_flag_ARG   Ramirez Restores Demokratie"
