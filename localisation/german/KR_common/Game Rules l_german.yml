 HAW_PATH_DEM_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CMonarchie§! oder §CRepublik§! in §Y$HAW_STRIKE$§!"
 HAW_PATH_SOC_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CRevolution§! in §Y$HAW_STRIKE$§!"
RULE_OPTION_HAW_PATH_RANDOM: "Standard"
 RULE_OPTION_HAW_PATH_RANDOM_DESC: "Nach der Unabhängigkeit von den Vereinigten Staaten hält Hawaii seine ersten Wahlen ab."
 RULE_OPTION_HAW_PATH_SOCDEM: "£KR_game_rule_flag_HAW_mon  Progressive"
 RULE_OPTION_HAW_PATH_SOCDEM_DESC: "Die §SProgressive Partei§! gewint die Wahlen.\n\n§RBenötigt:§!\n§CMonarchie§! in §Y$HAW_STRIKE$§!"
 RULE_OPTION_HAW_PATH_SOCLIB: "£KR_game_rule_flag_HAW  £KR_game_rule_flag_HAW_mon  Liberale"
