 SPA_FORPOL: "£KR_game_rule_flag_SPA_mon  Spanische Außenpolitik"
 RULE_OPTION_SPA_FORPOL_RANDOM: "Standard"
 RULE_OPTION_SPA_FORPOL_RANDOM_DESC: "Nachdem sich die Unruhen im Königreich Spanien gelegt haben, muss Spanien über seine Position in der Welt entscheiden."
 RULE_OPTION_SPA_FORPOL_GER: "£KR_game_rule_flag_SPA_mon   £KR_game_rule_flag_GER   Reichspakt"
 RULE_OPTION_SPA_FORPOL_GER_DESC: "Spanien sieht seinen Platz an der Seite Deutschlands und tritt dem Reichspakt bei, sodass sich die Syndikalisten umzingelt sehen.$SPA_PATH_REQUIREMENTS$"
  RULE_OPTION_SPA_FORPOL_ENT: "£KR_game_rule_flag_SPA_mon  £KR_game_rule_flag_CAN   Entente"
 RULE_OPTION_SPA_FORPOL_ENT_DESC: "Spanien sieht seinen Platz bei seinen traditionellen Verbündeten, den Briten. Sie sind der Meinung, dass sie den Briten helfen müssen, ihre Gebiete zurückzugewinnen, und ihre Streitkräfte denen ihrer neuen Verbündeten zur Verfügung stellen müssen, um den Syndikalismus von der Weltkarte zu tilgen.$SPA_PATH_REQUIREMENTS$"
 RULE_OPTION_SPA_FORPOL_NEUT: "£KR_game_rule_flag_SPA_mon   Isolation"
 RULE_OPTION_SPA_FORPOL_NEUT_DESC: "Spanien hat kein Interesse daran, sich an den größeren Konflikten der Welt zu beteiligen, da es der Meinung ist, schon genug Probleme erlebt zu haben. Vorerst konzentriert es sich auf den Wiederaufbau und seine eigene Verteidigung.$SPA_PATH_REQUIREMENTS$"

 SWF_PATH: "£KR_game_rule_flag_SPA  Kongress der Iberischen Sozialisten"
 SWF_PATH_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CThe CNT-FAI wins the Spanish Civil War§!"
 RULE_OPTION_SWF_PATH_RANDOM: "Standard"
 RULE_OPTION_SWF_PATH_RANDOM_DESC: "Nach dem Sieg der CNT-FAI im Spanischen Bürgerkrieg entscheidet der Kongress der Iberischen Sozialisten über die Richtung der Revolution in Spanien."
 RULE_OPTION_SWF_PATH_RADSOC: "£KR_game_rule_flag_SPA  Sozialistische Arbeiter"
 RULE_OPTION_SWF_PATH_RADSOC_DESC: "Auf dem Kongress der Iberischen Sozialisten wird die §RPartido Socialista Obrero Español§! (Spanische Sozialistische Arbeiterpartei) gewählt, um die Revolution in Spanien anzuführen.$SWF_PATH_REQUIREMENTS$"
 RULE_OPTION_SWF_PATH_SYNDIE: "£KR_game_rule_flag_SPA  CNT-FAI"
 RULE_OPTION_SWF_PATH_SYNDIE_DESC: "Auf dem Kongress der iberischen Sozialisten behält die §rConfederación Nacional del Trabajo - Federación Anarquista Ibérica§! oder Nationale Konföderation der Arbeit - Iberische Anarchistische Föderation die Macht und führt die Revolution in Spanien an.$SWF_PATH_REQUIREMENTS$"

 POR_PATH: "£KR_game_rule_flag_POR  Angelegenheiten des Reiches"
