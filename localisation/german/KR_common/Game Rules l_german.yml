 RULE_OPTION_POR_PATH_NOT_NATPOP_DESC: "Der König ist nicht länger an diejenigen gebunden, die ihm sein göttliches Recht absprechen wollen, und regiert nach eigenem Ermessen. Er gewinnt die Unterstützung der Couceiristen, insbesondere der"
 RULE_OPTION_POR_PATH_PATAUT: "£KR_game_rule_flag_POR  Rat der Monarchistischen Sache"
 RULE_OPTION_POR_PATH_PATAUT_DESC: "$RULE_OPTION_POR_PATH_NOT_NATPOP_DESC$ §PConselho de Causa Monárquica§!, or Council of the Monarchist Cause.$POR_PATH_NOT_NATPOP_REQUIREMENTS$"
 RULE_OPTION_POR_PATH_AUTDEM: "£KR_game_rule_flag_POR  Katholische Zentrumspartei"
