RULE_OPTION_AUS_ELECTION_SOCDEM: "£KR_game_rule_flag_AUS   Sozialdemokratische Arbeiterpartei"
RULE_OPTION_AUS_ELECTION_SOCDEM_DESC: "Das deutliche Ergebnis der §SSozialdemokratische Arbeiterpartei§! in Wien macht sie zum klaren Sieger."

