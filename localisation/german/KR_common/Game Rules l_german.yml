 RULE_OPTION_HAW_FORPOL_RANDOM: "Standard"
 RULE_OPTION_HAW_FORPOL_RANDOM_DESC: "Wenn die Hawaiianer auf einer Insel mitten im Pazifik, umgeben von Feinden, überleben wollen, müssen sie sich mit einer Großmacht verbünden. Die Frage ist nur, mit wem."
 RULE_OPTION_HAW_FORPOL_JAP: "£KR_game_rule_flag_HAW  £KR_game_rule_flag_JAP  Ko-Wohlstandssphäre"
