 RULE_OPTION_DEN_PATH_SOC_DESC: "Deutschland bedroht Dänemark, nachdem es seine Forderungen zurückgewiesen hat, woraufhin Dänemark einen Antrag auf Beitritt zur Dritten Internationalen stellt.\nAus der Verbindung von Syndikalismus und Staunings Idealen für eine demokratische Republik entsteht ein neues Statsraad-Regime, an dessen Spitze der Ministerpräsident steht."
