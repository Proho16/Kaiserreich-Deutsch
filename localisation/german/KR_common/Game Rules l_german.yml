 RULE_OPTION_DEN_PATH_SYNDIE_DESC: "$RULE_OPTION_DEN_PATH_ABDICATION_DESC$ $RULE_OPTION_DEN_PATH_SOC_DESC$ Die §rKommunistisk Føderationen – Enhedspartiet§!, oder Kommunistische Föderation – Einheitspartei, gewinnt den ersten Statsraad-Kongress."
 RULE_OPTION_DEN_PATH_JENSEN_SYNDIE: "£KR_game_rule_flag_DEN_soc  Statsraad - Enhedspartiet (Jensen)"
 RULE_OPTION_DEN_PATH_JENSEN_SYNDIE_DESC: "$RULE_OPTION_DEN_PATH_ABDICATION_DESC$ $RULE_OPTION_DEN_PATH_SOC_DESC$ Die §rKommunistisk Føderationen – Enhedspartiet§!, also die Kommunistische Föderation – Solidaritätspartei, gewinnt den ersten Statsraad-Kongress.\nRichard Jensen, ein Vertreter der jungen Garde der Partei, steht an der Spitze der neuen Führung."
 RULE_OPTION_DEN_PATH_CHRISTIANSEN_SYNDIE: "£KR_game_rule_flag_DEN_soc  Statsraad - Enhedspartiet (Christiansen)"
 RULE_OPTION_DEN_PATH_CHRISTIANSEN_SYNDIE_DESC: "$RULE_OPTION_DEN_PATH_ABDICATION_DESC$ $RULE_OPTION_DEN_PATH_SOC_DESC$ Die §rKommunistisk Føderationen – Enhedspartiet§! gewinnt den ersten Statsraad-Kongress.\nChristian Christiansen, ein Vertreter der alten Garde der Partei, steht an der Spitze der neuen Führung."
 RULE_OPTION_DEN_PATH_LARSEN_RADSOC: "£KR_game_rule_flag_DEN_soc  Statsraad - DVSP"
 RULE_OPTION_DEN_PATH_LARSEN_RADSOC_DESC: "$RULE_OPTION_DEN_PATH_ABDICATION_DESC$ $RULE_OPTION_DEN_PATH_SOC_DESC$ Die §RKommunistisk Føderationen – Danmarks Venstresocialistiske Parti§!, oder Dänische Linkssozialistische Partei der Kommunistischen Föderation, gewinnt den ersten Statsraad-Kongress."
 RULE_OPTION_DEN_PATH_STAUNING_RADSOC: "£KR_game_rule_flag_DEN_soc  Statsraad - Stauningerne"
 RULE_OPTION_DEN_PATH_STAUNING_RADSOC_DESC: "$RULE_OPTION_DEN_PATH_ABDICATION_DESC$ $RULE_OPTION_DEN_PATH_SOC_DESC$ Die §RKommunistisk Føderationen – Stauningerne§!, oder Stauningistische Clique der Kommunistischen Föderation, gewinnt den ersten Statsraad-Kongress."

 NOR_PATH: "£KR_game_rule_flag_NOR  Die Sackgasse des Königs"
 RULE_OPTION_NOR_PATH_RANDOM: "Standard"
 RULE_OPTION_NOR_PATH_RANDOM_DESC: "Die offen revolutionäre norwegische Arbeiterpartei hat seit vielen Jahren an Unterstützung gewonnen, wobei die aufeinanderfolgenden Regierungen Venstre und Høyre sie aufhalten konnten. Doch je näher die Wahlen rücken, desto unwahrscheinlicher wird es, dass sich die \"Königstreuen\" noch lange halten kann."
 RULE_OPTION_NOR_PATH_DEM: "£KR_game_rule_flag_NOR  Demokratie"
 RULE_OPTION_NOR_PATH_DEM_DESC: "Eine der demokratischen Parteien errang bei den Wahlen von 1936 die Mehrheit und zerstreute damit alle Befürchtungen, die norwegische Demokratie könnte zu Ende gehen."
 RULE_OPTION_NOR_PATH_SOCDEM: "£KR_game_rule_flag_NOR  Demokratie - NSA"
 RULE_OPTION_NOR_PATH_SOCDEM_DESC: "Die Demokratie wird beibehalten, und die §SNorges Socialdemokratiske Arbeiderparti§!, die norwegische sozialdemokratische Arbeiterpartei, bildet eine Regierungskoalition mit Venstre, der Linken, womit alle Befürchtungen über ein Ende der norwegischen Demokratie ausgeräumt werden."
 RULE_OPTION_NOR_PATH_MARLIB: "£KR_game_rule_flag_NOR  Demokratie - Høyre"
 RULE_OPTION_NOR_PATH_MARLIB_DESC: "§mHøyre§! oder die Rechte bildet eine Regierungskoalition mit der Bondepartiet oder der Bauernpartei, wodurch die Befürchtung eines Endes der norwegischen Demokratie abgewendet wird."
 RULE_OPTION_NOR_PATH_RADICAL_DESC: "Die Arbeiderpartiet gewinnt das Stortingsvalget von 1936 und beginnt mit der Umsetzung ihrer radikalen Agenda."
 RULE_OPTION_NOR_PATH_PATAUT: "£KR_game_rule_flag_NOR_pataut  Samfundsvernet (Zivilschutz)"
 RULE_OPTION_NOR_PATH_PATAUT_DESC: "$RULE_OPTION_NOR_PATH_RADICAL_DESC$ Als Reaktion darauf mobilisiert Vidkun Quisling die norwegische Rechte und schafft es, den Syndikalisten die Macht zu entreißen; er setzt ein nationalistisches Regime unter der Führung des §PSamfundsvernet§!, oder Gesellschaftsgarde, ein."
 RULE_OPTION_NOR_PATH_SOC_DESC: "$RULE_OPTION_NOR_PATH_RADICAL_DESC$ Der Versuch von Vidkun Quisling, die Rechte zu mobilisieren und die revolutionäre Regierung zu stürzen, scheitert und der Übergang zu einem sozialistischen Norwegen beginnt."
 RULE_OPTION_NOR_PATH_RADSOC: "£KR_game_rule_flag_NOR_radical_soc  Revolution - Arbeiderpartiet"
 RULE_OPTION_NOR_PATH_RADSOC_DESC: "$RULE_OPTION_NOR_PATH_SOC_DESC$\nDie §RArbeiderpartiet§!, oder Arbeiterpartei, behält die Macht."
 RULE_OPTION_NOR_PATH_SYNDIE: "£KR_game_rule_flag_NOR_soc Revolution - NSF"
 RULE_OPTION_NOR_PATH_SYNDIE_DESC: "$RULE_OPTION_NOR_PATH_SOC_DESC$\nDer §rNorsk Syndikalistisk Forbund§!, der Norwegische Syndikalistenverband, übernimmt die Kontrolle."
 RULE_OPTION_NOR_PATH_TOTALIST: "£KR_game_rule_flag_NOR_soc  Revolution - NNP"
 RULE_OPTION_NOR_PATH_TOTALIST_DESC: "$RULE_OPTION_NOR_PATH_SOC_DESC$\nDie §oNorges Nasjonalsyndikalistiske Parti§!, die Norwegische National-Syndikalistische Partei, übernimmt die Macht."

 NOR_FORPOL: "£KR_game_rule_flag_NOR   Norwegens Außenpolitik"
 NOR_FORPOL_DEM_REQUIREMENTS: "\n\n§RBenötigt:§!\nAny §CDemocracy§! in §Y$NOR_PATH$§!"
 RULE_OPTION_NOR_FORPOL_RANDOM: "Standard"
 RULE_OPTION_NOR_FORPOL_RANDOM_DESC: "Während des Weltkriegs blieb Norwegen neutral, was zu einer langen Isolation auf der internationalen Bühne geführt hat. In Erwartung eines neuen Konflikts ist die Zeit gekommen, zu entscheiden, ob diese Neutralität beibehalten werden soll oder nicht."
 RULE_OPTION_NOR_FORPOL_NEUT: "£KR_game_rule_flag_NOR   Militärische Neutralität"
 RULE_OPTION_NOR_FORPOL_NEUT_DESC: "Als Reaktion auf die aktuellen Ereignisse beschließt Norwegen, kein Risiko einzugehen und behält seine Neutralität bei, um sich selbst zu schützen.$NOR_FORPOL_DEM_REQUIREMENTS$"
 RULE_OPTION_NOR_FORPOL_ENT: "£KR_game_rule_flag_NOR  £KR_game_rule_flag_CAN   Entente"
 RULE_OPTION_NOR_FORPOL_ENT_DESC: "Die demokratische Regierung intensiviert ihre Beziehungen zu Kanada und tritt schließlich der Entente bei.$NOR_FORPOL_DEM_REQUIREMENTS$"
 RULE_OPTION_NOR_FORPOL_GER: "£KR_game_rule_flag_NOR  £KR_game_rule_flag_GER  Reichspakt"
 RULE_OPTION_NOR_FORPOL_GER_DESC: "Das reaktionäre norwegische Regime, das von seinen syndikalistischen Nachbarn bedroht wird, macht gemeinsame Sache mit den Deutschen und tritt dem Reichspakt bei.\n\n§RBenötigt:§!\n§CSamfundsvernet§! in §Y$NOR_PATH$§!\n\n§CRevolution§! in §Y$SWE_PATH$§!\noder eine §CRevolution§! in §Y$FIN_PATH$§!\noder §CSocialistische Republik§! in §Y$RUS_AFTERMATH$§!\noder §CRDP - Sulimow§! in §Y$RUS_PATH$§!\noder §CNorwegen befindet sich im Krieg mit der Französischen Kommune§!"
 RULE_OPTION_NOR_FORPOL_RUS: "£KR_game_rule_flag_NOR  £KR_game_rule_flag_RUS  Moskauer Abkommen"
 RULE_OPTION_NOR_FORPOL_RUS_DESC: "Angesichts der Tatsache, dass sich die Herrscher des rechtmäßigen norwegischen Landes mit Deutschland verbündeten, wäre es für das reaktionäre norwegische Regime nur logisch, sich auf die Seite eines wieder erstarkenden Russlands zu stellen.\n\n§RBenötigt:§!\n§CSamfundsvernet§! in §Y$NOR_PATH$§!\n\n§CReichspakt§! in §Y$FIN_FORPOL§!\noder §Rkeine§! §CRevolution§! in §Y$SWE_PATH$§!\n$RUS_AFTERMATH_NOT_SOC_REQUIREMENTS$"
 RULE_OPTION_NOR_FORPOL_SCA: "£KR_game_rule_flag_NOR  £KR_game_rule_flag_SCA   Nordischer Rat"
 RULE_OPTION_NOR_FORPOL_SCA_DESC: "Wenn Dänemark, Norwegen oder Schweden den Nordischen Rat gründen, kommen sie zusammen und versuchen, letztendlich eine nordische Föderation zu bilden.\n\n§RBenötigt:§!\n§CDemokratie§! in §Y$DEN_PATH$§!\n§CDemokratie§! in §Y$NOR_PATH$§!\n§CDemokratie§! in §Y$SWE_PATH$§!"

SWE_PATH: "£KR_game_rule_flag_SWE   Alle Männer des Königs"
RULE_OPTION_SWE_PATH_RANDOM: "Standard"
RULE_OPTION_SWE_PATH_RANDOM_DESC: "Schweden hat unter mehreren konservativen Regierungen weitergemacht, aber die Bevölkerung wird müde und die Mitte kann sich nicht halten. Die Zukunft bleibt ungewiss, und während die SAP sich anschickt, die Syndikalisten vor den Karren zu spannen, warten diejenigen, die bereit sind, Schweden zu retten, in den Startlöchern."
RULE_OPTION_SWE_PATH_DEM: "£KR_game_rule_flag_SWE   Demokratie"
RULE_OPTION_SWE_PATH_DEM_DESC: "Entweder die SAP oder die AV gewinnt die Reichstagswahlen 1936, ohne einen Militärputsch zu provozieren oder autoritär zu werden."
 RULE_OPTION_SWE_PATH_SOCDEM: "£KR_game_rule_flag_SWE   Demokratie - SAP"
 RULE_OPTION_SWE_PATH_SOCDEM_DESC: "Die §SSocialdemokratiska Arbetarepartiet§!, die Sozialdemokratische Arbeiterpartei, bildet eine Regierungskoalition mit dem Bondeförbundet, dem Bauernverband." 
 RULE_OPTION_SWE_PATH_SOCCON: "£KR_game_rule_flag_SWE   Demokratie - AV"
 RULE_OPTION_SWE_PATH_SOCCON_DESC: "Der §cAllmänna Valmansförbundet§!, oder Allgemeine Wahlvereinigung, gewinnt die Wahl und bildet eine Regierungskoalition. Die Regierung verfolgt eine Freihandelspolitik anstelle von Protektionismus und verteidigt erfolgreich die Demokratie."
 RULE_OPTION_SWE_PATH_AUTDEM_MARLIB_DESC: "Die AV gewinnt die Wahl und bildet eine Regierungskoalition. Die Regierung verfolgt eine protektionistische Handelspolitik, und die Partei"
 RULE_OPTION_SWE_PATH_ELECTED_AUTDEM: "£KR_game_rule_flag_SWE   AV (autoritär)"
 RULE_OPTION_SWE_PATH_ELECTED_AUTDEM_DESC: "$RULE_OPTION_SWE_PATH_AUTDEM_MARLIB_DESC$ entwickelt sich zu einem autoritäreren §aAllmänna Valmansförbundet§!, oder Allgemeinen Wahlverband."
 RULE_OPTION_SWE_PATH_MARLIB: "£KR_game_rule_flag_SWE  Folkpartiet"
 RULE_OPTION_SWE_PATH_MARLIB_DESC: "$RULE_OPTION_SWE_PATH_AUTDEM_MARLIB_DESC$ wird autoritärer.\nDie neue Verfassung führte dazu, dass die SAP nicht mehr wählbar war, was dazu führte, dass die §mFolkpartiet§!, oder Volkspartei, an Bedeutung gewann und bei den Wahlen von 1940 an die Macht kam."
 RULE_OPTION_SWE_PATH_COUP_DESC: "Die SAP gewinnt die Wahl und bildet zusammen mit der SSV eine radikale Regierung, die einen Militärputsch provoziert"
 RULE_OPTION_SWE_PATH_RESTORED_AUTDEM: "£KR_game_rule_flag_SWE  Militärputsch - AV (autoritär)"
 RULE_OPTION_SWE_PATH_RESTORED_AUTDEM_DESC: "$RULE_OPTION_SWE_PATH_COUP_DESC$.\nDie Putschisten setzen die alte konservative Regierung wieder ein, wenn auch mit einem autoritäreren §aAllmänna Valmansförbundet§!."
 RULE_OPTION_SWE_PATH_AUT_DESC: "Die Putschisten setzen eine ständige Militärjunta ein, die Schweden mit eiserner Faust regiert.\nSpäter,"
 RULE_OPTION_SWE_PATH_AUTDEM: "£KR_game_rule_flag_SWE  Militärputsch - Fosterländska Stiftelsen"
 RULE_OPTION_SWE_PATH_AUTDEM_DESC: "$RULE_OPTION_SWE_PATH_COUP_DESC$.\n$RULE_OPTION_SWE_PATH_AUT_DESC$ General Carl August Ehrensvärd wird Regierungschef, der die §aFosterländska Stiftelsen§!, oder Patriotische Freunde der Armee, leitete."
 RULE_OPTION_SWE_PATH_PATAUT: "£KR_game_rule_flag_SWE  Militärputsch - AFV"
 RULE_OPTION_SWE_PATH_PATAUT_DESC: "$RULE_OPTION_SWE_PATH_COUP_DESC$.\n$RULE_OPTION_SWE_PATH_AUT_DESC$ General Helge Jung übernimmt die Regierung und steht an der Spitze der §PArméns Fosterlandsvänner§!, oder Armee-Patrioten."
 RULE_OPTION_SWE_PATH_NATPOP: "£KR_game_rule_flag_SWE_natpop  Militärputsch - SRNS"
 RULE_OPTION_SWE_PATH_NATPOP_DESC: "$RULE_OPTION_SWE_PATH_COUP_DESC$.\nDie Putschisten versuchen, eine Militärjunta zu errichten, werden jedoch von den radikalen Offizieren Axel Gyllenkrok und Archibald Douglas untergraben, die ein ultranationalistisches Regime unter der Führung der §nSvea Rikes Nationella Samlingsparti§!, oder Schwedischen Nationalen Einheitspartei, errichten."
 RULE_OPTION_SWE_PATH_SOC_DESC: "welche von sozialistischen Milizen vereitelt wird. Nachdem die alte Regierung neutralisiert wurde, wird ein Regime errichtet von"
 RULE_OPTION_SWE_PATH_RADSOC: "£KR_game_rule_flag_SWE_soc Revolution - SSV"
 RULE_OPTION_SWE_PATH_RADSOC_DESC: "$RULE_OPTION_SWE_PATH_COUP_DESC$, $RULE_OPTION_SWE_PATH_SOC_DESC$ wird der §RSveriges Socialdemokratiska Vänsterparti§! (Schwedische Sozialdemokratische Linkspartei) gegründet."
 RULE_OPTION_SWE_PATH_SYNDIE: "£KR_game_rule_flag_SWE_soc Revolution - SAC"
 RULE_OPTION_SWE_PATH_SYNDIE_DESC: "$RULE_OPTION_SWE_PATH_COUP_DESC$, $RULE_OPTION_SWE_PATH_SOC_DESC$ die §rSveriges Arbetares Centralorganisation§!, die schwedische Zentralorganisation der Arbeiter."
 RULE_OPTION_SWE_PATH_TOTALIST: "£KR_game_rule_flag_SWE_soc  Revolution - VPT"
 RULE_OPTION_SWE_PATH_TOTALIST_DESC: "$RULE_OPTION_SWE_PATH_COUP_DESC$, $RULE_OPTION_SWE_PATH_SOC_DESC$ die Syndikalisten, was es der §oVänsterpartiet Totalisterna§!, der totalistischen Linkspartei, bald ermöglicht, eine Diktatur aufzubauen."

 FIN_PATH: "£KR_game_rule_flag_FIN_mon  Marsch auf Helsinki"
 RULE_OPTION_FIN_PATH_RANDOM: "Standard"
 RULE_OPTION_FIN_PATH_RANDOM_DESC: "Die konservative Herrschaft von König Kaarle Fredrik hat Finnland bisher Stabilität und Wohlstand gesichert, aber das Vertrauen auf das Wohlwollen Deutschlands könnte sich noch rächen, da die Feinde der Monarchie sowohl auf der rechten als auch auf der linken Seite an Zulauf gewinnen."
 RULE_OPTION_FIN_PATH_AUTDEM: "£KR_game_rule_flag_FIN_mon  Monarchie – Nationale Koalition"
 RULE_OPTION_FIN_PATH_AUTDEM_DESC: "Finnland hält an der Monarchie sowie an der Autorität der regierenden §aNationalen Koalitionsregierung§! fest, was es ihr ermöglicht, sich nach den durch den Schwarzem Montag verursachten Turbulenzen wieder zu stabilisieren."
 RULE_OPTION_FIN_PATH_PATAUT: "£KR_game_rule_flag_FIN  Mannerheim Clique"
 RULE_OPTION_FIN_PATH_PATAUT_DESC: "Die königliche Regierung ist zerrüttet, und die §PMannerheim Klikki§!, oder Mannerheim-Clique, mobilisiert die Weiße Garde, um einen weiteren Zusammenbruch zu verhindern. Feldmarschall Mannerheim regiert Finnland vorübergehend, bis sich das Land stabilisiert hat, übergibt die Macht jedoch schließlich an eine demokratisch gewählte Regierung."
 RULE_OPTION_FIN_PATH_DEM: "£KR_game_rule_flag_FIN  Demokratie"
 RULE_OPTION_FIN_PATH_DEM_DESC: "Finnland überlässt die königliche Regierung in einem Zustand der Desorganisation und ermöglicht es Mannerheim und seiner Clique, die Weiße Garde zu mobilisieren. Mannerheim übergibt daraufhin die Macht an eine demokratisch gewählte Regierung."
 RULE_OPTION_FIN_PATH_SDP_SOCDEM: "£KR_game_rule_flag_FIN  Demokratie - Sozialdemokraten"
 RULE_OPTION_FIN_PATH_SOCDEM_DESC: "$RULE_OPTION_FIN_PATH_DEM_DESC$\nDie §SSuomen Sosialidemokraattinen Puolue§!, oder die Sozialdemokratische Partei Finnlands, gewinnt die Wahlen."
 RULE_OPTION_FIN_PATH_RED_EARTH_SOCDEM: "£KR_game_rule_flag_FIN  Demokratie - Rote Erde Regierung"
 RULE_OPTION_FIN_PATH_RED_EARTH_SOCDEM_DESC: "$RULE_OPTION_FIN_PATH_DEM_DESC$\nDie §SSuomen Sosialidemokraattinen Puolue§! bildet mit den Agrariern eine Regierungskoalition, die als Rote-Erde-Regierung bekannt wird."
 RULE_OPTION_FIN_PATH_SOCLIB: "£KR_game_rule_flag_FIN  Demokratie - Agrarier"
 RULE_OPTION_FIN_PATH_SOCLIB_DESC: "$RULE_OPTION_FIN_PATH_DEM_DESC$\nDie §lMaalaisliitto§!, oder Agrarverband, gewinnen die Wahlen."
 RULE_OPTION_FIN_PATH_SOCCON: "£KR_game_rule_flag_FIN  Demokratie - Nationale Koalition"
 RULE_OPTION_FIN_PATH_SOCCON_DESC: "$RULE_OPTION_FIN_PATH_DEM_DESC$\nDer eher demokratisch orientierte Flügel der §cKansallinen Kokoomus§!, oder Nationale Koalition, gewinnt die Wahlen."
 RULE_OPTION_FIN_PATH_NATPOP: "£KR_game_rule_flag_FIN_natpop  Lapua-Bewegung"
 RULE_OPTION_FIN_PATH_NATPOP_DESC: "Die §nLapua Liike§!, oder Lapua-Bewegung, marschiert auf Helsinki zu und schafft es, die königliche Regierung zu stürzen.\nDies markiert die Entstehung eines ultranationalistischen Regimes in Finnland, das sich später zur §nIsänmaallinen Kansanliike§!, oder Patriotischen Volksbewegung, konsolidiert."
 RULE_OPTION_FIN_PATH_SOC_DESC: "Dem Marsch der Lapua-Bewegung auf Helsinki setzen finnische Sympathisanten der Dritten Internationale entgegen, die stattdessen selbst die Macht an sich reißen.\nIm Anschluss an diese Ereignisse,"
 RULE_OPTION_FIN_PATH_SYNDIE: "£KR_game_rule_flag_FIN_soc  Revolution - Volksdelegation"
 RULE_OPTION_FIN_PATH_SYNDIE_DESC: "$RULE_OPTION_FIN_PATH_SOC_DESC$ Die Roten Garden werden aufgelöst, und die §rSuomen Kansanvaltuuskunta§!, oder Finnische Volksdelegation, rückt in den Vordergrund."
 RULE_OPTION_FIN_PATH_TOTALIST: "£KR_game_rule_flag_FIN_soc  Revolution - Rote Garde"
 RULE_OPTION_FIN_PATH_TOTALIST_DESC: "$RULE_OPTION_FIN_PATH_SOC_DESC$ der Versuch der Syndikalisten die §oPunakaarti§!, oder Rote Garden, aufzulösen, scheitert und löst einen Putsch aus."

 FIN_FORPOL: "£KR_game_rule_flag_FIN  Finnische Außenpolitik"
 RULE_OPTION_FIN_FORPOL_RANDOM: "Standard"
 RULE_OPTION_FIN_FORPOL_RANDOM_DESC: "Wie mehrere andere Länder erlangte auch Finnland seine Unabhängigkeit im Gefolge des deutschen Sieges über das Russische Reich im Weltkrieg. Obwohl es zunächst an den deutschen Block gebunden war, könnte ein Wechsel in der finnischen Führung zu einer Verschiebung der Loyalitäten führen - oder zu einer Wiederaufnahme der alten."
 RULE_OPTION_FIN_FORPOL_GER: "£KR_game_rule_flag_FIN  £KR_game_rule_flag_GER  Reichspakt"
 RULE_OPTION_FIN_FORPOL_GER_DESC: "Finnland bleibt entweder im deutschen Einflussbereich oder sieht sich aufgrund internationalen Drucks nach der Absetzung des Königs gezwungen, dorthin zurückzukehren.\n\n§RBenötigt:§!\nJede §CNationale Koalition§! in §Y$FIN_PATH$§! oder\n\n§CLapua Bewegung§! in §Y$FIN_PATH$§!\nund §CSozialistische Republik§! in §Y$RUS_AFTERMATH$§!\noder §CRDP - Sulimow§! in §Y$RUS_PATH$§! oder\n\nEine §CRevolution§! in §Y$SWE_PATH$§! oder\n§CFinnland hat Karelien verloren§! oder\n§CDeutschland befindet sich im Krieg mit Finnlands Feinden§!\n\n§RKeine§! §CRevolution§! in §Y$FIN_PATH$§!"
 RULE_OPTION_FIN_FORPOL_RUS: "£KR_game_rule_flag_FIN  £KR_game_rule_flag_RUS  Moskauer Abkommen"
 RULE_OPTION_FIN_FORPOL_RUS_DESC: "Finnland begräbt das Kriegsbeil mit seinen ehemaligen imperialen Herrschern, während die Russen gegenüber den Gebieten ihres ehemaligen Reiches eine pragmatischere Politik verfolgen.\n\n§RBenötigt:§!\n§CMannerheim Clique§! oder §CDemocracy - Social Democrats§! oder §CDemocracy - Red Earth Government§! oder §CDemocracy - Agrarians§! in §Y$FIN_PATH$§!\n\nWenn §CMannerheim Clique§! in§Y$FIN_PATH$§!, dann muss Russland §CMonarchie§! oder §CRegentschaft§! in\n§Y$RUS_AFTERMATH$§ wählen!\n\nWenn §CDemokratie - Social Democrats§! oder §CDemokratie - Rote-Erde-Regierung§! oder §CDemokratie - Agrarier§! in §Y$FIN_PATH$§!, dann muss Russland §CRepublik§! in §Y$RUS_AFTERMATH$§ wählen!\n\n§RNicht§! §CVPP - Solonevich§! in §Y$RUS_PATH$§!\n§RKeine§! §CRevolution§! in §Y$SWE_PATH$§!\n§RNicht§! §CNordischer Rat§! in §Y$NOR_FORPOL$§!"
 RULE_OPTION_FIN_FORPOL_SCA: "£KR_game_rule_flag_FIN  £KR_game_rule_flag_SCA  Nordischer Rat"
 RULE_OPTION_FIN_FORPOL_SCA_DESC: "Wenn entweder Dänemark, Norwegen oder Schweden den Nordischen Rat gründen, schließt sich Finnland den skandinavischen Ländern an und versucht, schließlich eine Nordische Föderation zu bilden.\n\n§RBenötigt:§!\n§CMannerheim Clique§! oder eine §CDemokratie§! in §Y$FIN_PATH$§!\nEine §CDemokratie§! in §Y$DEN_PATH$§!\nEine §CDemokratie§! in §Y$NOR_PATH$§!\nEine §CDemokratie§! in §Y$SWE_PATH$§!\n§CNordische Föderation§! in §Y$NOR_FORPOL$§!"
 RULE_OPTION_FIN_FORPOL_NEUT: "£KR_game_rule_flag_FIN  Neutrality"
 RULE_OPTION_FIN_FORPOL_NEUT_DESC: "Finnland wird gezwungen, den russisch-finnischen Freundschafts- und Kooperationsvertrag zu unterzeichnen, wodurch das Land unter die Fuchtel Russlands gerät, aber nicht direkt in dessen Militärbündnis eintritt.$POL_REVOLTS_PATAUT_REQUIREMENTS$\n§RKein§! §CMonarchie – Nationale Koalition§! oder irgendeine §CRevolution§! in §Y$FIN_PATH$§!"

ICE_PATH: "£KR_game_rule_flag_ICE   Plebiszit im Nordatlantik"
RULE_OPTION_ICE_PATH_RANDOM: "Standard"
RULE_OPTION_ICE_PATH_RANDOM_DESC: "Seit 1919 ist Island ein unabhängiger Staat, wenn auch in Personalunion mit Dänemark, da die Dänen die Kontrolle über die Außenpolitik und die Verteidigungszuständigkeiten des Landes behalten. Obwohl sie nun mehr Freiheiten genießen als zuvor, wird ein Referendum über die vollständige Unabhängigkeit angesetzt, und die Ereignisse nach dem „Schwarzen Montag“ könnten ausschlaggebend dafür sein, in welche Richtung das Ergebnis ausfällt.\nSollte Island jedoch völlig unabhängig werden, könnten sie bald die Aufmerksamkeit anderer auf sich ziehen..."
RULE_OPTION_ICE_PATH_SOCDEM: "£KR_game_rule_flag_ICE  £KR_game_rule_flag_DEN  Sozialdemokraten"
RULE_OPTION_ICE_PATH_SOCDEM_DESC: "Die §SAlþýðuflokkurinn§, oder Sozialdemokratische Partei, gewinnt das Referendum, und das Land verbleibt im dänischen Einflussbereich.\n\n§RBenötigt:§!\n§RKein§! §CStatsraad§ in §Y$DEN_PATH$!"
RULE_OPTION_ICE_PATH_SOCCON_START_DESC: "Die §cSjálfstæðisflokkurinn§!, oder Unabhängigkeitspartei, gewinnt das Referendum, und das Land kann nun ungehindert in den Kabeljaukrieg eintreten."
RULE_OPTION_ICE_PATH_SOCCON: "£KR_game_rule_flag_ICE  Unabhängigkeitspartei"
 RULE_OPTION_ICE_PATH_SOCCON_DESC: "$RULE_OPTION_ICE_PATH_SOCCON_START_DESC$\nDer Ausgang des Kabeljaukriegs ist ungewiss."
 RULE_OPTION_ICE_PATH_SOCCON_INDEPENDENT: "£KR_game_rule_flag_ICE  Unabhängigkeitspartei – Neutralität"
 RULE_OPTION_ICE_PATH_SOCCON_INDEPENDENT_DESC: "$RULE_OPTION_ICE_PATH_SOCCON_START_DESC$\nIsland bleibt im Kabeljaukrieg neutral und wird im Nordmeer in Ruhe gelassen.
 RULE_OPTION_ICE_PATH_COD_WAR_DESC: "Die Unabhängigkeitspartei gewinnt das Referendum, und das Land kann nun ungehindert in den Kabeljaukrieg eintreten."
 RULE_OPTION_ICE_PATH_PATAUT: "£KR_game_rule_flag_ICE  £KR_game_rule_flag_CAN  Selbstverwaltungspartei"
 RULE_OPTION_ICE_PATH_PATAUT_DESC: "$RULE_OPTION_ICE_PATH_COD_WAR_DESC$\nEntgegen aller Erwartungen gelingt es den kanadischen Streitkräften, den britischen Einfluss in Island abzuwehren und die Insel in die Entente einzubinden. Dabei stärken sie die §PHeimastjórnarflokkurinn§! oder Home Rule Party."
 RULE_OPTION_ICE_PATH_INT_DESC: "$RULE_OPTION_ICE_PATH_COD_WAR_DESC$\nGroßbritannien sichert seine Hoheitsgewässer und erleichtert die Übernahme der"
 RULE_OPTION_ICE_PATH_SYNDIE: "£KR_game_rule_flag_ICE_soc  £KR_game_rule_flag_ENG  Partei der Volksunion"
 RULE_OPTION_ICE_PATH_SYNDIE_DESC: "$RULE_OPTION_ICE_PATH_INT_DESC$ §rSósíalistaflokkurinn§! oder Partei der Volkseinheit in Reykjavik."
 RULE_OPTION_ICE_PATH_RADSOC: "£KR_game_rule_flag_ICE_soc  £KR_game_rule_flag_ENG  Bauernpartei"
 RULE_OPTION_ICE_PATH_RADSOC_DESC: "$RULE_OPTION_ICE_PATH_INT_DESC$ §RBændaflokkur§!, oder Bauernpartei, in Reykjavik."

 ### Länderpfade - Ost- / Südosteuropa & Zentralasien ###
 RULE_GROUP_KAISERREICH_RULES_ESE_EUROPE_CENTRAL_ASIA: "Länderpfade - Ost- / Südosteuropa & Zentralasien"

 RUS_AFTERMATH: "£KR_game_rule_flag_RUS  Folgen des Attentats"
 RUS_AFTERMATH_NOT_SOC_REQUIREMENTS: "\n§RNot§! §CSocialist Republic§! in §Y$RUS_AFTERMATH$§!\n§RNot§! §CRDP - Sulimov§! in §Y$RUS_PATH$§!"
 RULE_OPTION_RUS_AFTERMATH_RANDOM: "Standard"
 RULE_OPTION_RUS_AFTERMATH_RANDOM_DESC: "Durch die Ermordung des Oppositionsführers Viktor Tschernow entsteht ein politisches Vakuum, und die Verwirklichung der Diktatur von Präsident Sawinkow ist näher denn je.\nWird der Wosch seine Träume vom Dritten Russland verwirklichen, oder wird er von den Kräften, die gegen ihn intrigieren, hinweggefegt werden?"
 RULE_OPTION_RUS_AFTERMATH_AUT: "£KR_game_rule_flag_RUS_natpop  Diktatur"
 RULE_OPTION_RUS_AFTERMATH_AUT_DESC: "Boris Sawinkows Schachzug gelingt, er ergreift die volle Macht über die Republik und ruft den Russischen Staat aus."
 RULE_OPTION_RUS_AFTERMATH_AUT_FAIL_DESC: "Boris Sawinkows Schachzug scheitert, als ein Volksaufstand ihm und seiner Partei den Todesstoß versetzt."
 RULE_OPTION_RUS_AFTERMATH_REP: "£KR_game_rule_flag_RUS  Republik"
 RULE_OPTION_RUS_AFTERMATH_REP_DESC: "$RULE_OPTION_RUS_AFTERMATH_AUT_FAIL_DESC$ Die von Anton Denikin befehligte Armee greift ein.\n Die Dritte Verfassungsgebende Versammlung wird einberufen und die russische Demokratie wiederhergestellt."
 RULE_OPTION_RUS_AFTERMATH_MON: "£KR_game_rule_flag_RUS_mon  Monarchie"
 RULE_OPTION_RUS_AFTERMATH_MON_DESC: "$RULE_OPTION_RUS_AFTERMATH_AUT_FAIL_DESC$ Die von Pjotr Wrangel befehligte Armee greift ein. Die Dritte Verfassungsgebende Versammlung wird einberufen, und unter dem Einfluss von Wrangel und verschiedenen rechtsgerichteten Politikern wird die russische Monarchie wiederhergestellt."
 RULE_OPTION_RUS_AFTERMATH_REG: "£KR_game_rule_flag_RUS_mon  Regentschaft"
 RULE_OPTION_RUS_AFTERMATH_REG_DESC: "$RULE_OPTION_RUS_AFTERMATH_AUT_DESC$ Der Krieg mit Deutschland scheitert jedoch zunächst, und Pjotr Wrangel, der Chef der Armee, setzt ihn ab.\nWrangel führt für den Rest des Krieges eine Kaiserliche Regentschaft, stellt die Monarchie wieder her und hält nach der deutschen Niederlage Wahlen ab.\n\n§RBenötigt:§!\n§CDie Freie Russische Armee wird nicht von einem menschlichen Spieler gesteuert§!"
 RULE_OPTION_RUS_AFTERMATH_SOC: "£KR_game_rule_flag_RUS_soc  Socialistische Republik"
 RULE_OPTION_RUS_AFTERMATH_SOC_DESC: "$RULE_OPTION_RUS_AFTERMATH_AUT_FAIL_DESC$ Die Armee reagiert nicht richtig und ermöglicht den Sozialisten die vollständige Übernahme der Republik."
 RULE_OPTION_RUS_AFTERMATH_NOT_SOC: "£KR_game_rule_flag_RUS  Keine Sozialistische Revolution"
 RULE_OPTION_RUS_AFTERMATH_NOT_SOC_DESC: "Nach dem Tod von Tschernow wählt Russland seinen Weg über das reguläre, auf Zufallsprinzipien basierende System, mit Ausnahme aller sozialistischen Wege."

 RUS_PATH: "£KR_game_rule_flag_RUS  An der Spitze des Mutterlandes"
 RUS_PATH_NATPOP_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CDictatorship§! in §Y$RUS_AFTERMATH$§!"
 RUS_PATH_SOCCON_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CRepublic§! or §CMonarchie§! in §Y$RUS_AFTERMATH$§!"
 RUS_PATH_MON_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CMonarchie§! in §Y$RUS_AFTERMATH$§!"
 RUS_PATH_REP_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CRepublic§! in §Y$RUS_AFTERMATH$§!"
 RUS_PATH_SOC_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CSocialist Republic§! in §Y$RUS_AFTERMATH$§!"
 RULE_OPTION_RUS_PATH_RANDOM: "Standard"
 RULE_OPTION_RUS_PATH_RANDOM_DESC: "Die Rolle Russlands im Zweiten Weltkrieg wird durch die Handlungen seines Volkes, insbesondere aber durch diejenigen, die es anführten, bestimmt werden.\nOb von Reaktionären oder Revolutionären gelenkt, Russlands Handeln in den kommenden Jahren wird den Lauf der Geschichte verändern."
 RULE_OPTION_RUS_PATH_OLD_SVOBODNIK_NATPOP: "£KR_game_rule_flag_RUS_natpop  SZRS (ehemals Svobodnik)"
 RULE_OPTION_RUS_PATH_OLD_SVOBODNIK_NATPOP_DESC: "$RULE_OPTION_RUS_PATH_NATPOP_START_DESC$ verschiedene Fraktionen innerhalb der Partei versuchen, dem inneren Kreis die Kontrolle über die Bewegung zu entreißen.\nNach der Niederlage Deutschlands triumphieren Sawinkow und seine alten Verbündeten, säubern die Partei von ihren Gegnern und bereiten den Krieg gegen die Dritte Internationale vor.$RUS_PATH_NATPOP_REQUIREMENTS$"
 RULE_OPTION_RUS_PATH_NATPOP_START_DESC: "Mit Sawinkows §nSojus Zashchity Rodiny i Svobody§! oder Union für die Verteidigung des Vaterlandes und der Freiheit konsolidiert sich ihre Macht,"
 RULE_OPTION_RUS_PATH_SOLIDARIST_NATPOP_END_DESC: "Nach der Niederlage Deutschlands festigen sie ihre Position als führende Kraft innerhalb der Partei."
 RULE_OPTION_RUS_PATH_SOLIDARIST_NATPOP: "£KR_game_rule_flag_RUS_natpop  SZRS (Solidaristen)"
 RULE_OPTION_RUS_PATH_SOLIDARIST_NATPOP_DESC: "$RULE_OPTION_RUS_PATH_NATPOP_START_DESC$ die Partei wird allmählich von der korporatistischen und legalistischen Solidaritätsbewegung beeinflusst.\n$RULE_OPTION_RUS_PATH_SOLIDARIST_NATPOP_END_DESC$$RUS_PATH_NATPOP_REQUIREMENTS$"
 RULE_OPTION_RUS_PATH_IDEOCRAT_NATPOP: "£KR_game_rule_flag_RUS_natpop  SZRS (Ideokraten)"
 RULE_OPTION_RUS_PATH_IDEOCRAT_NATPOP_DESC: "$RULE_OPTION_RUS_PATH_NATPOP_START_DESC$ die Partei wird allmählich von der eurasischen und totalitären Ideokratenbewegung beeinflusst.\n$RULE_OPTION_RUS_PATH_SOLIDARIST_NATPOP_END_DESC$$RUS_PATH_NATPOP_REQUIREMENTS$"
 RULE_OPTION_RUS_PATH_AUTDEM: "£KR_game_rule_flag_RUS_mon  VPS - Shulgin"
 RULE_OPTION_RUS_PATH_AUTDEM_DESC: "Die Regentschaft von Baron Wrangel ist im Krieg gegen Deutschland erfolgreich, und im wiederhergestellten Reich werden Wahlen abgehalten.\nDie neu gegründete §aWerossijskij Patriotitscheskij Sojus§! oder Allrussische Patriotische Union siegt, und Wassili Shulgin wird zum Ministerpräsidenten ernannt.\n\n§RBenötigt:§!\n§CRegentschaft§! in §Y$RUS_AFTERMATH$§!"
 RULE_OPTION_RUS_PATH_SOCCON_DESC: "Die §cVserossiyskaya Patrioticheskaya Partiya§!, die Allrussische Patriotische Partei, siegt bei den"
 RULE_OPTION_RUS_PATH_SOLONEVICH_SOCCON: "£KR_game_rule_flag_RUS  £KR_game_rule_flag_RUS_mon  VPP - Solonevich"
 RULE_OPTION_RUS_PATH_SOLONEVICH_SOCCON_DESC: "$RULE_OPTION_RUS_PATH_SOCCON_DESC$ Wahlen, die nach dem Sturz Sawinkows in der Republik oder im wiederhergestellten Reich stattfanden.\nIwan Solonevich steht an der Spitze der Partei und konzentriert, falls er zum Präsidenten der Republik gewählt wird, nach dem Krieg die Macht der §aVserossiyskaya Patrioticheskaya Partiya§!, oder Allrussischen Patriotischen Partei, auf sich selbst oder, falls er zum Vorsitzenden und Minister des wiederhergestellten Kaiserreichs ernannt wird, lenkt er das Kaiserreich unter der §PNarodnoye Monarkhicheskoye Dvizheniye§!, oder der Volksmonarchistischen Bewegung.$RUS_PATH_SOCCON_REQUIREMENTS$"
 RULE_OPTION_RUS_PATH_ROMANOV_SOCCON: "£KR_game_rule_flag_RUS  £KR_game_rule_flag_RUS_mon  VPP - Romanow"
 RULE_OPTION_RUS_PATH_ROMANOV_SOCCON_DESC: "$RULE_OPTION_RUS_PATH_SOCCON_DESC$ nach dem Sturz Sawinkows abgehaltenen Wahlen.\nIn der Republik wird Iwan Solonewitsch zum Präsidenten gewählt, fällt aber später einem Attentat zum Opfer und wird vom gemäßigt konservativen Dmitri Romanow abgelöst.\nIm wiederhergestellten Reich wird Alexander Golitsyn zum Ministerpräsidenten ernannt, der bei späteren Wahlen von seinem Parteikollegen Dmitri Romanow abgelöst wird.$RUS_PATH_SOCCON_REQUIREMENTS$"
 RULE_OPTION_RUS_PATH_GOLITSYN_SOCCON: "£KR_game_rule_flag_RUS_mon  VPP - Golitsyn"
 RULE_OPTION_RUS_PATH_GOLITSYN_SOCCON_DESC: "$RULE_OPTION_RUS_PATH_SOCCON_DESC$ erste Wahlen im wiederhergestellten Reich.\nDer Herrscher ernennt den politischen Veteranen Aleksandr Golitsyn zum Ministerpräsidenten.\n\n§RBenötigt:§!\n§CMonarchie§! oder §CRegentschaft§! in §Y$RUS_AFTERMATH$§!"
 RULE_OPTION_RUS_PATH_VERNADSKY_SOCCON: "£KR_game_rule_flag_RUS_mon  VPP - Vernadsky"
 RULE_OPTION_RUS_PATH_VERNADSKY_SOCCON_DESC: "$RULE_OPTION_RUS_PATH_SOCCON_DESC$ erste Wahlen im wiederhergestellten Reich.\nDer Herrscher ernennt den gemäßigten Konservativen und Eurasianisten Georgi Wernadskij zum Ministerpräsidenten.$RUS_PATH_MON_REQUIREMENTS$"
 RULE_OPTION_RUS_PATH_MARLIB_DESC: "Die §mKonstitutsionno-Demokratichesky Soyuz§!, oder Verfassungsdemokratische Union, auch bekannt als die Kadetten, gehen als Sieger aus den"
 RULE_OPTION_RUS_PATH_MAKLAKOV_MARLIB_START_DESC: "$RULE_OPTION_RUS_PATH_MARLIB_DESC$ nach dem Sturz Sawinkows abgehaltenen Wahlen.\nWassili Maklakow wird zum Präsidenten gewählt"
 RULE_OPTION_RUS_PATH_MAKLAKOV_MARLIB: "£KR_game_rule_flag_RUS  KDS - Maklakov"
 RULE_OPTION_RUS_PATH_MAKLAKOV_MARLIB_DESC: "$RULE_OPTION_RUS_PATH_MAKLAKOV_MARLIB_START_DESC$, und bringt die übrigen Kadetten erfolgreich dazu, sich seiner idealistischen Vision anzuschließen.$RUS_PATH_REP_REQUIREMENTS$"
 RULE_OPTION_RUS_PATH_DOLGORUKOV_MARLIB: "£KR_game_rule_flag_RUS  KDS - Dolgorukov"
 RULE_OPTION_RUS_PATH_DOLGORUKOV_MARLIB_DESC: "$RULE_OPTION_RUS_PATH_MAKLAKOV_MARLIB_START_DESC$, aber er tritt zurück, nachdem es ihm nicht gelungen ist, den Rest der Partei von seiner idealistischen Vision zu überzeugen, und wird von seinem Verbündeten Pjotr Dolgorukow abgelöst.$RUS_PATH_REP_REQUIREMENTS$"
 RULE_OPTION_RUS_PATH_KARTASHYOV_MARLIB: "£KR_game_rule_flag_RUS  £KR_game_rule_flag_RUS_mon  KDS - Kartashyov"
 RULE_OPTION_RUS_PATH_KARTASHYOV_MARLIB_DESC: "$RULE_OPTION_RUS_PATH_MARLIB_DESC$ die nach dem Sturz von Sawinkow abgehaltenen Wahlen in der Republik oder im wiederhergestellten Reich.\nIn der Republik tritt der gewählte Präsident Maklakov zurück, nachdem es ihm nicht gelungen ist, den Rest der Partei von seiner idealistischen Vision zu überzeugen, und wird von Anton Kartashyov vom rechten Flügel der Partei abgelöst. Im Reich wird Kartashyov zum Ministerpräsidenten ernannt.\n\n§RBenötigt:§!\n§CRepublik§! oder §CRegentschaft§! in §Y$RUS_AFTERMATH$§!"
 RULE_OPTION_RUS_PATH_GRONSKY_MARLIB: "£KR_game_rule_flag_RUS_mon  KDS - Gronsky"
 RULE_OPTION_RUS_PATH_GRONSKY_MARLIB_DESC: "$RULE_OPTION_RUS_PATH_MARLIB_DESC$ erste Wahlen im wiederhergestellten Reich.\nDer Herrscher ernennt Pavel Gronsky vom rechten Flügel der Partei zum Ministerpräsidenten.$RUS_PATH_MON_REQUIREMENTS$"
 RULE_OPTION_RUS_PATH_NEKRASOV_MARLIB: "£KR_game_rule_flag_RUS_mon  KDS - Nekrasov"
 RULE_OPTION_RUS_PATH_NEKRASOV_MARLIB_DESC: "$RULE_OPTION_RUS_PATH_MARLIB_DESC$ erste Wahlen im wiederhergestellten Reich.\nDer Herrscher ernennt Nikolaj Nekrassow vom linken Flügel der Partei zum Ministerpräsidenten.$RUS_PATH_MON_REQUIREMENTS$"
 RULE_OPTION_RUS_PATH_SOCLIB_DESC: "Der rechte Flügel der §lPartiya Sotsialistov-Revolyutsionerov§!, oder Partei der Sozialrevolutionäre, auch bekannt als die Rechts-SRs, geht als Sieger aus der"
 RULE_OPTION_RUS_PATH_RIKHTER_SOCLIB_START_DESC: "$RULE_OPTION_RUS_PATH_SOCLIB_DESC$ nach dem Sturz Sawinkows abgehaltenen Wahlen.\nVladimir Rikhter wird zum Präsidenten gewählt"
 RULE_OPTION_RUS_PATH_RIKHTER_SOCLIB: "£KR_game_rule_flag_RUS  PSR-Rechts - Rikhter"
 RULE_OPTION_RUS_PATH_RIKHTER_SOCLIB_DESC: "$RULE_OPTION_RUS_PATH_RIKHTER_SOCLIB_START_DESC$, und setzt seine ehrgeizigen, fortschrittlichen Reformen erfolgreich um.$RUS_PATH_REP_REQUIREMENTS$"
 RULE_OPTION_RUS_PATH_SOROKIN_SOCLIB: "£KR_game_rule_flag_RUS  PSR-Rechts - Sorokin"
 RULE_OPTION_RUS_PATH_SOROKIN_SOCLIB_DESC: "$RULE_OPTION_RUS_PATH_RIKHTER_SOCLIB_START_DESC$, wird aber aufgrund des Widerstands der Rechten gegen sein Regime ermordet und von seinem Verbündeten Pitrim Sorokin abgelöst.$RUS_PATH_REP_REQUIREMENTS$"
 RULE_OPTION_RUS_PATH_FONDAMINSKY_SOCLIB: "£KR_game_rule_flag_RUS  £KR_game_rule_flag_RUS_mon  PSR-Rechts - Fondaminsky"
 RULE_OPTION_RUS_PATH_FONDAMINSKY_SOCLIB_DESC: "$RULE_OPTION_RUS_PATH_SOCLIB_DESC$ nach dem Sturz von Sawinkow abgehaltenen Wahlen in der Republik oder im wiederhergestellten Reich.\nIn der Republik wird der gewählte Präsident Rikhter ermordet, nachdem es ihm nicht gelungen ist, den Widerstand der Rechten gegen sein Regime unter Kontrolle zu bringen. Sein Nachfolger ist der gemäßigte Rechts-SR Ilja Fondaminskij. Im Reich wird Fondaminskij zum Vorsitzenden des Ministeriums ernannt.$RUS_PATH_SOCCON_REQUIREMENTS$"
 RULE_OPTION_RUS_PATH_SOCDEM_START_DESC: "Überraschend siegt die §SRadikal'no-Demokraticheskaya Partiya§!, die Radikal-Demokratische Partei, bei den nach dem Sturz Sawinkows abgehaltenen Wahlen."
 RULE_OPTION_RUS_PATH_SOCDEM: "£KR_game_rule_flag_RUS  RDP - Titow"
 RULE_OPTION_RUS_PATH_SOCDEM_DESC: "$RULE_OPTION_RUS_PATH_SOCDEM_START_DESC$\nDer gemäßigte Sozialdemokrat Aleksandr Titow wird Präsident, nachdem er die Kontrolle über die Partei von der extremen Linken behalten hat.$RUS_PATH_REP_REQUIREMENTS$"
 RULE_OPTION_RUS_PATH_REP_SULIMOV_SYNDIE: "£KR_game_rule_flag_RUS_soc  RDP - Sulimov"
 RULE_OPTION_RUS_PATH_REP_SULIMOV_SYNDIE_DESC: "Überraschend siegt die RDP bei den nach dem Sturz Sawinkows abgehaltenen Wahlen.\nDie Partei wird von ihrem linksextremen Flügel unter der Führung von Daniil Sulimov übernommen.\nMit einem Selbstputsch verwandelt Sulimov die Republik in ein sozialistisches Regime unter der Führung der §rVserossiysky Soyuz Truda§!, oder Allrussischen Gewerkschaft.$RUS_PATH_REP_REQUIREMENTS$"
 RULE_OPTION_RUS_PATH_SOC_START_DESC: "Nach der Ausrufung der Sozialistischen Republik wird Russland von einer Mehrparteien-Arbeiterkoalition geführt."
 RULE_OPTION_RUS_PATH_LEFT_SR_START_DESC: "$RULE_OPTION_RUS_PATH_SOC_START_DESC$ Diese wird vom linken Flügel der §RPartiya Sotsialistov-Revolyutsionerov§!, oder Partei der Sozialrevolutionäre, auch bekannt als die Linken SRs, dominiert, und Maria Spiridonova wird zur Ministerpräsidentin gewählt.\nNach der deutschen Niederlage tritt Spiridonova zurück und wird von"
 RULE_OPTION_RUS_PATH_ZDOBNOV_RADSOC: "£KR_game_rule_flag_RUS_soc  PSR-Links (Spiridonowist) - Zdobnov"
 RULE_OPTION_RUS_PATH_ZDOBNOV_RADSOC_DESC: "$RULE_OPTION_RUS_PATH_LEFT_SR_START_DESC$ moderate Left-SR Nikolay Zdobnov.$RUS_PATH_SOC_REQUIREMENTS$"
 RULE_OPTION_RUS_PATH_KAMKOV_RADSOC: "£KR_game_rule_flag_RUS_soc  PSR-Links (Spiridonowist) - Kamkow"
 RULE_OPTION_RUS_PATH_KAMKOV_RADSOC_DESC: "$RULE_OPTION_RUS_PATH_LEFT_SR_START_DESC$ idealistische Linke-SR Boris Kamkow.$RUS_PATH_SOC_REQUIREMENTS$"
 RULE_OPTION_RUS_PATH_USTINOV_TOTALIST: "£KR_game_rule_flag_RUS_soc  PSR-Links (Maximalist) - Ustinow"
 RULE_OPTION_RUS_PATH_USTINOV_TOTALIST_DESC: "$RULE_OPTION_RUS_PATH_SOC_START_DESC$ Diese wird von den linken SR dominiert, und Maria Spiridonova wird zur Premierministerin gewählt.\nAllerdings gewinnt Aleksey Ustinovs §oPartiya Sotsialistov-Revolyutsionerov (maksimalistov)§!, oder die maximalistische Fraktion der Sozialrevolutionären Partei, allmählich an Einfluss und übernimmt die vollständige Kontrolle, als der Krieg mit Deutschland beginnt.\nNach der Niederlage Deutschlands werden die SR aufgelöst und in den §oSoyuz Sotsialistov-Revolyutsionerov§!, oder Union der Sozialrevolutionäre, umgewandelt.$RUS_PATH_SOC_REQUIREMENTS$"
 RULE_OPTION_RUS_PATH_VST_START_DESC: "$RULE_OPTION_RUS_PATH_SOC_START_DESC$ Diese wird von der §rVserossiysky Soyuz Truda§!, der Allrussischen Union der Arbeit, dominiert, und Wladimir Lewizki wird zum Ministerpräsidenten gewählt."
 RULE_OPTION_RUS_PATH_ABRAMOVICH_SYNDIE: "£KR_game_rule_flag_RUS_soc  VST-Right - Abramowitsch"
 RULE_OPTION_RUS_PATH_ABRAMOVICH_SYNDIE_DESC: "$RULE_OPTION_RUS_PATH_VST_START_DESC$\nAuf einem Parteitag wird Lewizkij jedoch durch Rafail Abramowitsch ersetzt, einen gemäßigten Sozialisten vom rechten Flügel der Partei.$RUS_PATH_SOC_REQUIREMENTS$"
 RULE_OPTION_RUS_PATH_LEVITSKY_SYNDIE: "£KR_game_rule_flag_RUS_soc  VST-Zentrum - Levitsky"
 RULE_OPTION_RUS_PATH_LEVITSKY_SYNDIE_DESC: "$RULE_OPTION_RUS_PATH_VST_START_DESC$\nLevitsky wägt sorgfältig die Interessen der Koalition ab und behauptet erfolgreich seine Position.$RUS_PATH_SOC_REQUIREMENTS$"
 RULE_OPTION_RUS_PATH_SULIMOV_SYNDIE: "£KR_game_rule_flag_RUS_soc  VST-Zentrum - Sulimov"
 RULE_OPTION_RUS_PATH_SULIMOV_SYNDIE_DESC: "$RULE_OPTION_RUS_PATH_VST_START_DESC$\nAngesichts erheblicher Fraktionskämpfe überlässt er die Macht seinem Schützling Daniil Sulimov, der die Fraktionskämpfe durch ein Dekret überwindet.$RUS_PATH_SOC_REQUIREMENTS$"
 RULE_OPTION_RUS_PATH_ZINOVIEV_MID_DESC: "Auf einem Parteitag wird Lewizkij jedoch durch Lew Kamenew, den Führer des linken Flügels der Partei, ersetzt."
 RULE_OPTION_RUS_PATH_KAMENEV_SYNDIE: "£KR_game_rule_flag_RUS_soc  VST-Links - Kamenev"
 RULE_OPTION_RUS_PATH_KAMENEV_SYNDIE_DESC: "$RULE_OPTION_RUS_PATH_VST_START_DESC$\n$RULE_OPTION_RUS_PATH_ZINOVIEV_MID_DESC$$RUS_PATH_SOC_REQUIREMENTS$"
 RULE_OPTION_RUS_PATH_ZINOVYEV_TOTALIST: "£KR_game_rule_flag_RUS_soc  VST-Links - Zinovyev"
 RULE_OPTION_RUS_PATH_ZINOVYEV_TOTALIST_DESC: "$RULE_OPTION_RUS_PATH_SOC_START_DESC$ Diese wird von der VST dominiert, und Wladimir Lewizkij wird zum Ministerpräsidenten gewählt.\n$RULE_OPTION_RUS_PATH_ZINOVIEV_MID_DESC$ Entweder durch zunehmenden Radikalismus innerhalb der Partei oder durch geschicktes Intrigieren gelingt es Grigori Sinowjew, die Führung der Partei zu übernehmen, und er nutzt die Bedrohung durch den deutschen Imperialismus, um die autoritäre §oVserossiysky Soyuz Truda (kommunistov)§!, oder kommunistische Fraktion der Allrussischen Arbeitsunion, zu stärken.$RUS_PATH_SOC_REQUIREMENTS$"

 RUS_FORPOL: "£KR_game_rule_flag_RUS_soc  Sozialistische Außenpolitik Russlands"
 RUS_FORPOL_REQUIREMENTS: "$RUS_PATH_SOC_REQUIREMENTS$\nor §CRDP - Sulimov§! in §Y$RUS_PATH$§!"
 RULE_OPTION_RUS_FORPOL_RANDOM: "Standard"
 RULE_OPTION_RUS_FORPOL_RANDOM_DESC: "Nach dem Sieg des Sozialismus in Europa ist die russische Führung gespalten, ob sie sich formell mit den westlichen Sozialisten verbünden oder ein eigenes Bündnis um Moskau herum bilden soll."
 RULE_OPTION_RUS_FORPOL_INT: "£KR_game_rule_flag_RUS_soc  £KR_game_rule_flag_FRA  Dritte Internationale"
 RULE_OPTION_RUS_FORPOL_INT_DESC: "In einem Akt sozialistischer Einheit und Brüderlichkeit tritt Russland dem Militärbündnis der Dritten Internationale bei.$RUS_FORPOL_REQUIREMENTS$\n\nWenn irgendwelche §CPSR-Links (Spiridonowist)§! in §Y$RUS_PATH$§!, dann muss die Kommune Frankreichs §CAnarchisten§! in §Y$FRA_PATH$§ wählen!\n§CHinweis: Wenn die Kommune von Frankreich nicht mehr die Führung der Dritten Internationale innehat, muss der neue Fraktionsvorsitzende eine Regierung mit $radical_socialist_coloured$ stellen\n\nWenn §CRDP - Sulimov§! oder ein §CVST-Zentrum§! in §Y$RUS_PATH$§!, dann darf die Kommune Frankreichs §Rkeine§! keine §CSorelianer§! oder §CJacobiner§! in\n§Y$FRA_PATH$§ wählen!\n§CHinweis: Wenn die Französische Kommune nicht mehr der Führer der Dritten Internationale ist, muss der neue Fraktionsführer auch §Rkeine§! $totalist_coloured$ Regierung§! haben.\n\n§Rnicht§! §CPSR-Links (Maximalist) - Ustinov§! in §Y$RUS_PATH$§!"
 RULE_OPTION_RUS_FORPOL_RUS: "£KR_game_rule_flag_RUS_soc  Eigenständiger Sozialismus"
 RULE_OPTION_RUS_FORPOL_RUS_DESC: "In der Überzeugung, die sozialistische Welt führen zu müssen, und aufgrund seiner einzigartigen geopolitischen Lage gründet Russland sein eigenes Militärbündnis.$RUS_FORPOL_REQUIREMENTS$\n\nWenn §CRDP - Sulimov§! oder ein beliebiges §CVST-Zentrum§! in §Y$RUS_PATH$§!, dann muss die Kommune Frankreichs einen beliebigen §CSorelianer§! oder §CJacobiner§! in\n§Y$FRA_PATH$§ wählen!\n§CHinweis: Wenn die Französische Kommune nicht mehr der Führer der Dritten Internationale ist, muss der neue Fraktionsvorsitzende eine $totalist_coloured$-Regierung§! haben."

 RUS_CENTRAL_ASIA: "£KR_game_rule_flag_RUS  £KR_game_rule_flag_KHI  £KR_game_rule_flag_TRK_autdem  £KR_game_rule_flag_BUK  Turkestan unter Moskau"
 RUS_CENTRAL_ASIA_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CRussland geht als Sieger aus seinem Eingreifen in Zentralasien hervor§!"
 RULE_OPTION_RUS_CENTRAL_ASIA_RANDOM: "Standard"
 RULE_OPTION_RUS_CENTRAL_ASIA_RANDOM_DESC: "Nachdem sie den Aufstand der Turkvölker in Zentralasien endgültig niedergeschlagen haben, haben die Russen das Schicksal Turkestans wieder in der Hand. Für diese zurückeroberten Gebiete muss eine neue Regelung gefunden werden."
 RULE_OPTION_RUS_CENTRAL_ASIA_ANNEX: "£KR_game_rule_flag_RUS  Annexion"
 RULE_OPTION_RUS_CENTRAL_ASIA_ANNEX_DESC: "Um künftige Aufstände besser unterbinden zu können, gliedert Russland die zentralasiatischen Reiche in sein eigenes Reich ein.$RUS_CENTRAL_ASIA_REQUIREMENTS$\n\n§RNot§! §CSocialist Republic§! in §Y$RUS_AFTERMATH$§!\n§RKeine§! CPSR-Right§! oder §CRDP§! in §Y$RUS_PATH$§!"
 RULE_OPTION_RUS_CENTRAL_ASIA_UNIFIED: "£KR_game_rule_flag_RUS  £KR_game_rule_flag_BUK  Vereinigtes Turkestan"
 RULE_OPTION_RUS_CENTRAL_ASIA_UNIFIED_DESC: "Die russische Regierung belohnt ihren Verbündeten aus Buchara im Süden mit den zurückeroberten Gebieten und schafft so ein neues Turkestan, das Moskau untersteht.$RUS_CENTRAL_ASIA_REQUIREMENTS$\n\n§RKeine§! §CSZRS (Ideokrat)§! in §Y$RUS_PATH$§!"
 RULE_OPTION_RUS_CENTRAL_ASIA_SEPARATE: "£KR_game_rule_flag_RUS_soc  £KR_game_rule_flag_KHI_soc  £KR_game_rule_flag_TRK  £KR_game_rule_flag_BUK_soc  Einzelne Marionetten"
 RULE_OPTION_RUS_CENTRAL_ASIA_SEPARATE_DESC: "Um künftige Unruhen zu verhindern, teilt die sozialistische russische Regierung Zentralasien anhand historischer und ethnischer Grenzen in einzelne Republiken auf.$RUS_CENTRAL_ASIA_REQUIREMENTS$\n\n§CSozialistische Republik§! in §Y$RUS_AFTERMATH$§! oder\n§CRDP – Sulimov§! in §Y$RUS_PATH$§!"

 RUS_CONFERENCE: "£KR_game_rule_flag_RUS  £KR_game_rule_flag_CAN  £KR_game_rule_flag_FRA  Die Eureka Konferenz"
 RUS_CONFERENCE_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CGermany is defeated in the Second Weltkrieg§!\n§CThe Entente is at war with the Third Internationale§!\n\n§CThe Second American Civil War is over§! or\n§Cnone of its American participants are members of the Entente or Third Internationale§!\n\n§RNot§! §CCRDP – Sulimov§! oder §CSZRS (Alte Svobodnik)§! oder\n§CSZRS (Ideokrat)§! in §Y$RUS_PATH$§!"
 RULE_OPTION_RUS_CONFERENCE_RANDOM: "Standard"
 RULE_OPTION_RUS_CONFERENCE_RANDOM_DESC: "Um einen dauerhaften Frieden zwischen den antideutschen Siegermächten zu sichern, findet in Tilsit eine Konferenz statt, auf der zahlreiche Fragen erörtert werden. Russland setzt sein diplomatisches Druckmittel ein und fordert einen weißen Frieden zwischen der Dritten Internationale und der Entente, was für den Westen zum Scheitern verurteilt sein könnte..."
 RULE_OPTION_RUS_CONFERENCE_SUCCESS: "£KR_game_rule_flag_RUS  £KR_game_rule_flag_CAN  £KR_game_rule_flag_FRA  Die Konferenz ist ein Erfolg"
 RULE_OPTION_RUS_CONFERENCE_SUCCESS_DESC: "Die Dritte Internationale gibt den russischen Forderungen nach, und es wird ein De-facto-Frieden zwischen der Entente und der Internationalen geschlossen.$RUS_CONFERENCE_REQUIREMENTS$"
 RULE_OPTION_RUS_CONFERENCE_FAILURE: "£KR_game_rule_flag_RUS  Die Konferenz scheitert"
 RULE_OPTION_RUS_CONFERENCE_FAILURE_DESC: "Die Dritte Internationale bricht die Gespräche aufgrund der russischen Forderungen ab, und der Krieg zwischen ihr und der Entente geht weiter.$RUS_CONFERENCE_REQUIREMENTS$"

 RSA_PATH: "£KR_game_rule_flag_RSA  Die Letzte Freiwilligen-Armee"
 RSA_PATH_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CDictatorship§! or §CSocialist Republic§! in §Y$RUS_AFTERMATH$§!\nor §CRDP - Sulimov§! in §Y$RUS_PATH$§!\n$RSA_PATH_RUS_REQUIREMENTS$"
 RSA_PATH_RUS_REQUIREMENTS: "\n§CRussia is defeated in the Second Weltkrieg§!"
 RULE_OPTION_RSA_PATH_RANDOM: "Standard"
 RULE_OPTION_RSA_PATH_RANDOM_DESC: "Der Putsch von General Wassili Boldyrew gegen Sawinkow im Jahr 1929 scheiterte, doch nun hat er mit Hilfe seiner deutschen Genossen die Tyrannen und Radikalen im Namen der russischen Demokratie gestürzt.\nIn der wiederhergestellten Russischen Republik sollen freie Wahlen abgehalten werden, und es ist Sache des Volkes, darüber zu entscheiden, ob Boldyrev an der Wahlurne der Sieg zugesprochen wird."
 RULE_OPTION_RSA_PATH_BOLDYREV_START_DESC: "General Boldyrev führt Freies Russland zum Sieg und wird zum ersten Präsidenten des Landes gewählt. Sein Regime, geführt von der"
 RULE_OPTION_RSA_PATH_BOLDYREV_END_DESC: "gründet sich darauf, die Russische Republik durch eine starke Präsidentschaft und verschiedene soziale Reformen vor jeglichem Radikalismus zu schützen."
 RULE_OPTION_RSA_PATH_SOCDEM: "£KR_game_rule_flag_RUS  Der Rote General"
 RULE_OPTION_RSA_PATH_SOCDEM_DESC: "$RULE_OPTION_RSA_PATH_BOLDYREV_START_DESC$ §SDemokratichesky Soyuz§!, oder Demokratische Union, $RULE_OPTION_RSA_PATH_BOLDYREV_END_DESC$$RUS_PATH_NATPOP_REQUIREMENTS$\n$RSA_PATH_RUS_REQUIREMENTS$"
 RULE_OPTION_RSA_PATH_SOCLIB: "£KR_game_rule_flag_RUS  Der Volksmarschall"
 RULE_OPTION_RSA_PATH_SOCLIB_DESC: "$RULE_OPTION_RSA_PATH_BOLDYREV_START_DESC$ §lDemokratichesky Soyuz§!, oder Demokratische Union, $RULE_OPTION_RSA_PATH_BOLDYREV_END_DESC$$RUS_PATH_NATPOP_REQUIREMENTS$\n$RSA_PATH_RUS_REQUIREMENTS$""
 RULE_OPTION_RSA_PATH_MARLIB: "£KR_game_rule_flag_RUS  Der Garant für Freiheit"
 RULE_OPTION_RSA_PATH_MARLIB_DESC: "$RULE_OPTION_RSA_PATH_BOLDYREV_START_DESC$ §mNatsionalny Soyuz§!, oder Nationale Union, $RULE_OPTION_RSA_PATH_BOLDYREV_END_DESC$$RUS_FORPOL_REQUIREMENTS$\n$RSA_PATH_RUS_REQUIREMENTS$"
 RULE_OPTION_RSA_PATH_SOCCON: "£KR_game_rule_flag_RUS  Der Retter Russlands"
 RULE_OPTION_RSA_PATH_SOCCON_DESC: "$RULE_OPTION_RSA_PATH_BOLDYREV_START_DESC$ §cNatsionalny Soyuz§!, oder Nationale Union, $RULE_OPTION_RSA_PATH_BOLDYREV_END_DESC$$RUS_FORPOL_REQUIREMENTS$\n$RSA_PATH_RUS_REQUIREMENTS$"
 RULE_OPTION_RSA_PATH_OPPOSITION: "£KR_game_rule_flag_RUS  Die Opposition triumphiert"
 RULE_OPTION_RSA_PATH_OPPOSITION_DESC: "Trotz Boldyrevs Erfolg auf dem Schlachtfeld verliert er in den Wahllokalen gegen die Opposition, die sich aus Menschen zusammensetzt, die dem herrschenden Deutschen Regime ähnlicher sind.$RSA_PATH_REQUIREMENTS$"

 RSA_FORPOL: "£KR_game_rule_flag_RUS  Außenpolitik des Freien Russlands"
 RULE_OPTION_RSA_FORPOL_RANDOM: "Standard"
 RULE_OPTION_RSA_FORPOL_RANDOM_DESC: "Die Freie Russische Armee hätte die Russische Republik ohne die Hilfe der Deutschen nicht erfolgreich wiederherstellen können, aber von einer Großmacht wie Russland kann nicht erwartet werden, dass sie vor ihrem Wohltäter auf unbestimmte Zeit einen Kotau macht.\nWenn die Zeit reif ist, kann die Republik ihren Platz in der Welt wieder einnehmen."
 RULE_OPTION_RSA_FORPOL_GER: "£KR_game_rule_flag_RUS  £KR_game_rule_flag_GER  Loyalität gegenüber Deutschland"
 RULE_OPTION_RSA_FORPOL_GER_DESC: "Russland baut seine neuen Beziehungen zu Deutschland aus und vertieft seine wirtschaftlichen Beziehungen durch den Beitritt zu Mitteleuropa.$RSA_PATH_REQUIREMENTS$"
 RULE_OPTION_RSA_FORPOL_RSA_DESC: "Russland lehnt die Strafbestimmungen des von Deutschland auferlegten Moskauer Vertrages ab"
 RULE_OPTION_RSA_FORPOL_ENT: "£KR_game_rule_flag_RUS  £KR_game_rule_flag_CAN  Entente"
 RULE_OPTION_RSA_FORPOL_ENT_DESC: "$RULE_OPTION_RSA_FORPOL_RSA_DESC$, und schließt sich seinen alten Verbündeten aus dem Ersten Weltkrieg an.$RSA_PATH_REQUIREMENTS$\n\n§CDie Französische Republik und entweder Kanada oder das Vereinigte Königreich sind Mitglieder der Entente, und die Entente befindet sich nicht im Krieg mit Deutschland§!\n\n§RNicht§! §CDie Opposition triumphiert§! in §Y$RSA_PATH$§!"
 RULE_OPTION_RSA_FORPOL_JAP: "£KR_game_rule_flag_RUS  £KR_game_rule_flag_JAP  Ko-Wohlstandssphäre"
 RULE_OPTION_RSA_FORPOL_JAP_DESC: "$RULE_OPTION_RSA_FORPOL_RSA_DESC$, und schließt ein neues Bündnis mit den Japanern.$RSA_PATH_REQUIREMENTS$\n\n§CJapan ist Fraktionsvorsitzender und nicht im Krieg mit Deutschland§!\n\n§RNicht§! §CDie Opposition triumphiert§! in §Y$RSA_PATH$§!"
 RULE_OPTION_RSA_FORPOL_ACW_VICTOR: "£KR_game_rule_flag_RUS  £KR_game_rule_flag_USA  Nordpazifik-Abkommen"
 RULE_OPTION_RSA_FORPOL_ACW_VICTOR_DESC: "$RULE_OPTION_RSA_FORPOL_RSA_DESC$, und schließt ein neues Bündnis mit den Amerikanern.$RSA_PATH_REQUIREMENTS$\n\n§CDer Sieger des Zweiten Amerikanischen Bürgerkriegs ist nicht sozialistisch, in einer Fraktion oder im Krieg mit Deutschland§!\n\n§RNicht§! §CDie Opposition triumphiert§! in §Y$RSA_PATH$§!\n\n§CHinweis: Wird diese Option gewählt, vermeidet jeder nicht-sozialistische Sieger des Zweiten Amerikanischen Bürgerkriegs es, Deutschland den Krieg zu erklären oder sich einer anderen Fraktion anzuschließen, es sei denn, Deutschland wird im Weltkrieg besiegt. Dies gilt auch dann, wenn die Spielregeln für die amerikanische Außenpolitik aktiviert sind.§!"

 FER_PATH: "£KR_game_rule_flag_FER_army  Der Pfad der Konterrevolution"
 RULE_OPTION_FER_PATH_RANDOM: "Standard"
 RULE_OPTION_FER_PATH_RANDOM_DESC: "Im Fernen Osten kommt es zu einem Aufstand gegen das Sawinkow-Regime oder das sozialistische Regime in Moskau. Angeführt von zwei ehrgeizigen Männern mit sehr gegensätzlichen Visionen – dem Kriegsherrn Grigory Semyonov und dem eingefleischten Monarchisten Mikhail Diterikhs – dürfte der Aufstand kaum Erfolg haben. So oder so kann nur einer als Sieger hervorgehen."
 RULE_OPTION_FER_PATH_RUS_DESC: "Semjonow säubert seine Rivalen Diterichs und versucht, ganz Russland zu erobern,"
 RULE_OPTION_FER_PATH_RUS_PATAUT: "£KR_game_rule_flag_RUS  Oberster Ataman von Russland"
 RULE_OPTION_FER_PATH_RUS_PATAUT_DESC: "$RULE_OPTION_FER_PATH_RUS_DESC$ Seine §PVserossiysky Voinsky Soyuz§, also die Allrussische Militärunion, übernimmt die volle Kontrolle, und er wird zum Obersten Ataman Russlands ernannt.$RSA_PATH_REQUIREMENTS$"
 RULE_OPTION_FER_PATH_RUS_AUTDEM: "£KR_game_rule_flag_RUS  Präsident auf Lebenszeit"
 RULE_OPTION_FER_PATH_RUS_AUTDEM_DESC: "$RULE_OPTION_FER_PATH_RU_DESCS$ seine §aVserossiyskaya Narodnaya Partiya§!, also die Allrussische Volkspartei, stellt die Russische Republik wieder her und setzt ihn als ihren autoritären Präsidenten ein.$RSA_PATH_REQUIREMENTS$"
 RULE_OPTION_FER_PATH_SIB_DESC: "Semjonow säubert seine Rivalen, die Diteriker, und festigt seine Herrschaft über Sibirien, anstatt zu versuchen, ganz Russland zu erobern."
 RULE_OPTION_FER_PATH_SIB_PATAUT: "£KR_game_rule_flag_FER  Oberster Ataman von Sibirien"
 RULE_OPTION_FER_PATH_SIB_PATAUT_DESC: "$RULE_OPTION_FER_PATH_SIB_DESC$\nNachdem die §PSemjonow-Clique§! die volle Kontrolle über das autokratische Regime übernommen hat, wird Semjonow zum Obersten Ataman von Sibirien ernannt.$RSA_PATH_REQUIREMENTS$"
 RULE_OPTION_FER_PATH_SIB_AUTDEM: "£KR_game_rule_flag_FER  Sibirischer Diktator"
 RULE_OPTION_FER_PATH_SIB_AUTDEM_DESC: "$RULE_OPTION_FER_PATH_SIB_DESC$\nSeine §aDemokraticheskaya Narodnaya Partiya Volnoy Sibiri§!, oder Demokratische Volkspartei des Freien Sibiriens, macht den sibirischen Demokraten kleine Zugeständnisse und schafft eine Republik, während er in der Praxis erhebliche Befugnisse behält.$RSA_PATH_REQUIREMENTS$"
 RULE_OPTION_FER_PATH_NATPOP: "£KR_game_rule_flag_RUS_mon  Wiederauferstandenes Zarenreich"
 RULE_OPTION_FER_PATH_NATPOP_DESC: "Diterikhs beseitigt seinen Rivalen Semjonow und versucht, ganz Russland zu erobern.\nSollte er bei der Rückeroberung Erfolg haben, stellt sein §nRusskij Monarchitscheskij Sovet§!, oder Russische Monarchische Union, das Zarenreich Russland wieder her, das den Zeiten vor Peter dem Großen ähnelt: zutiefst reaktionär und religiös, der Erbe der Heiligen Rus.$RSA_PATH_REQUIREMENTS$"
 RULE_OPTION_FER_PATH_NO_REVOLT: "£KR_game_rule_flag_RUS  Keine Revolte"
 RULE_OPTION_FER_PATH_NO_REVOLT_DESC: "Mit der Ermordung von Semjonow geht der Schwung für einen Aufstand im Fernen Osten verloren.$RUS_PATH_NATPOP_REQUIREMENTS$"

 FER_FORPOL: "£KR_game_rule_flag_RUS  £KR_game_rule_flag_FER  Fernöstliche Außenpolitik"
 FER_FORPOL_SIB_REQUIREMENTS: "\n\n§RBenötigt:§!\nAny §CSiberia§! in §Y$FER_PATH$§!\n$RSA_PATH_RUS_REQUIREMENTS$"
 RULE_OPTION_FER_FORPOL_RANDOM: "Standard"
 RULE_OPTION_FER_FORPOL_RANDOM_DESC: "Ob nun als Nachfolger Russlands selbst oder als sibirisches Regime – die ehemalige Fernostarmee muss entscheiden, wie sie sich auf der Weltbühne präsentieren will."
 RULE_OPTION_FER_FORPOL_FER: "£KR_game_rule_flag_RUS  Moskauer Abkommen"
 RULE_OPTION_FER_FORPOL_FER_DESC: "Der Aufstand im Fernen Osten übertrifft alle Erwartungen und führt zur Wiedervereinigung Russlands. Die neue Regierung stellt das Moskauer Abkommen wieder her.$RSA_PATH_REQUIREMENTS$\n\n§RKein§! §CSibirien§! in §Y$FER_PATH$§!\n\n§CDie Fernost-Armee kontrolliert Moskau§!"
 RULE_OPTION_FER_FORPOL_RSA: "£KR_game_rule_flag_FER_army  £KR_game_rule_flag_RSA  Freie Russische Armee"
 RULE_OPTION_FER_FORPOL_RSA_DESC: "Semjonow findet in der Freien Russischen Armee einen unwahrscheinlichen Verbündeten, den die gemeinsame Verachtung des amtierenden Kreml-Regimes eint.\nSollte es Boldyrevs Truppen gelingen, Moskau einzunehmen, vereinigt sich Semjonows Aufstand friedlich mit der wiederhergestellten Republik.$RSA_PATH_REQUIREMENTS$\n\n§RKein§! §CZarentum wiedererstanden§! in §Y$FER_PATH$§!"
 RULE_OPTION_FER_FORPOL_ENT: "£KR_game_rule_flag_RUS  £KR_game_rule_flag_CAN  Entente"
 RULE_OPTION_FER_FORPOL_ENT_DESC: "Der Aufstand im Fernen Osten übertrifft alle Erwartungen und führt zur Wiedervereinigung Russlands. Auf der Suche nach einem neuen Bündnis tritt das Regime von Semjonow der Entente bei.\n\n§RBenötigt:§!\n§COberster Ataman von Russland§! oder §CPräsident auf Lebenszeit§! in\n§Y$FER_PATH$§!\n\n§CDie Fernost-Armee kontrolliert Moskau§!"
 RULE_OPTION_FER_FORPOL_JAP: "£KR_game_rule_flag_FER  £KR_game_rule_flag_JAP  Ko-Wohlstandssphäre"
 RULE_OPTION_FER_FORPOL_JAP_DESC: "Semjonow erwidert die Gunst der japanischen Hilfe, indem er Sibirien vollständig der Ko-Wohlstands-Sphere anschließt.$FER_FORPOL_SIB_REQUIREMENTS$"
 RULE_OPTION_FER_FORPOL_SIB: "£KR_game_rule_flag_FER  Eigenständig"
 RULE_OPTION_FER_FORPOL_SIB_DESC: "Semjonow verzichtet auf ein Bündnis mit den Japanern und gründet ein unabhängiges Sibirisches Regime.$FER_FORPOL_SIB_REQUIREMENTS$"

 BAT_COLLAPSE: "£KR_game_rule_flag_BAT  £KR_game_rule_flag_EST  £KR_game_rule_flag_LAT  Der Aufstand der Waldbrüder"
 RULE_OPTION_BAT_COLLAPSE_RANDOM: "Standard"
 RULE_OPTION_BAT_COLLAPSE_RANDOM_DESC: "Das Vereinigte Baltische Herzogtum sieht sich mit einem Aufstand der Waldbrüder konfrontiert, einem Bündnis nationalistischer Partisanen, die für die Völker Estlands und Lettlands die Befreiung von der Herrschaft der deutschen Minderheit anstreben.\nDie Baltische Landeswehr hat die Aufständischen zwar bisher niedergeschlagen, doch angesichts der zunehmenden politischen und wirtschaftlichen Unsicherheit scheint das Herzogtum am Rande des Zusammenbruchs zu stehen."
 RULE_OPTION_BAT_COLLAPSE_NO: "£KR_game_rule_flag_BAT  Der Aufstand scheitert"
 RULE_OPTION_BAT_COLLAPSE_NO_DESC: "Die Bemühungen der Waldbrüder verlaufen im Sande, da das Herzogtum seine Gebiete und seine Kontrolle über die estnische und lettische Mehrheit weiterhin sicher in der Hand hält."
 RULE_OPTION_BAT_COLLAPSE_YES: "£KR_game_rule_flag_BAT_riga  £KR_game_rule_flag_EST  £KR_game_rule_flag_LAT  Der Aufstand ist erfolgreich"
 RULE_OPTION_BAT_COLLAPSE_YES_DESC: "Die Waldbrüder sind erfolgreich, denn sowohl Estland als auch Lettland erklären ihre Unabhängigkeit und bilden eigene neue Regierungen. Die Stadt Riga bleibt Deutschland treu und nimmt eine prekäre Stellung als Deutschlands einziger verbliebener Vorposten im ehemaligen Herzogtum ein."

BAT_PATH: "£KR_game_rule_flag_BAT   Das Gespaltene Herzogtum"
RULE_OPTION_BAT_PATH_RANDOM: "Standard"
RULE_OPTION_BAT_PATH_RANDOM_DESC: "Der Schwarze Montag hinterlässt tiefe politische Gräben innerhalb des Vereinigten Baltischen Herzogtums und reißt den Staat auseinander. Wie sich der baltisch-deutsche Traum gestalten wird und ob er Bestand haben wird, wird sich in den kommenden Monaten zeigen."
 RULE_OPTION_BAT_PATH_SOCLIB: "£KR_game_rule_flag_BAT  £KR_game_rule_flag_BAT_riga  Liberalismus durch Anleitung"
 RULE_OPTION_BAT_PATH_SOCLIB_DESC: "Im Vereinigten Herzogtum, bleibt die §lDeutsch-baltische Demokratische Partei§! an der Macht und führt die Nation weiter im Sinne des politischen Denkens von Paul Schiemann..\n\nSollte das Herzogtum an lettische und estnische Partisanen fallen, werden die Präsidentschaftswahlen in Riga von Wilhelm Munters §lDbDP§! gewonnen, die das Erbe Schiemanns fortsetzt."
 RULE_OPTION_BAT_PATH_PATAUT: "£KR_game_rule_flag_BAT  £KR_game_rule_flag_BAT_riga  Tradition bleibt bestehen"
 RULE_OPTION_BAT_PATH_PATAUT_DESC: "Im Vereinigten Herzogtum stürzt die Regierung von Samson-Himmelstjerna und der §PVerband der Baltischen Ritterschaften§! übernimmt wieder die Kontrolle über den Staat und setzt sich für die Wahrung von Harmonie und Tradition ein.\n\nFällt das Herzogtum an lettische und estnische Partisanen, putscht die deutsche Garnison in Riga und setzt eine diktatorische Regierung unter der Führung des §PBaltischen Alldeutschen Verbandes§! ein."
 RULE_OPTION_BAT_PATH_NATPOP: "£KR_game_rule_flag_BAT  Die Baltische Erneuerung"
 RULE_OPTION_BAT_PATH_NATPOP_DESC: "Im Chaos des Schwarzen Montags organisiert die Landeswehr einen Putsch und bringt die §nBaltische Brüderschaft§! an die Macht, um das Baltikum in einen nationalistischen Musterstaat zu verwandeln.\n\n§RBenötigt:§!\n§CThe Uprising Fails§! in §Y$BAT_COLLAPSE$§!"
 RULE_OPTION_BAT_PATH_SOCCON: "£KR_game_rule_flag_BAT_riga  Rechtsstaat"
 RULE_OPTION_BAT_PATH_SOCCON_DESC: "Das Vereinigte Baltische Herzogtum fällt an lettische und estnische Partisanen. Die §cDeutsch-Baltische Landespartei§! von Helmuth Stegman bleibt in Riga an der Macht und führt die Stadt in die legalistische Staatlichkeit.$EST_PATH_REQUIREMENTS$"
 RULE_OPTION_BAT_PATH_AUTDEM: "£KR_game_rule_flag_BAT_riga  Der Hirte des Baltikums"
 RULE_OPTION_BAT_PATH_AUTDEM_DESC: "Das Vereinigte Baltische Herzogtum fällt an lettische und estnische Partisanen. Nach der Rückeroberung der Gebiete des ehemaligen Herzogtums gewinnt Harry Lutz von der §aDeutsch-Baltischen Volkspartei§! die Wahlen nach dem Verfassungskonvent.\n\n§RBenötigt:§!\n§CRiga kontrolliert entweder Estland und Lettland oder ist mit ihnen verbündet§!"stnische Partisanen. In der Stadt Riga putscht die deutsche Garnison und setzt eine pan-germanische §PDiktaturregierung§! ein.\n\n§CDer Aufstand ist erfolgreich§! in §Y$BAT_COLLAPSE$§!"

 EST_PATH: "£KR_game_rule_flag_EST   Sirks Wahl"
 EST_PATH_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CThe Uprising Succeeds§! in §Y$BAT_COLLAPSE$§!"
 RULE_OPTION_EST_PATH_RANDOM: "Standard"
 RULE_OPTION_EST_PATH_RANDOM_DESC: "Nach der Ausrufung der Zweiten Estnischen Republik geht die Macht auf den Vorsitzenden der Übergangsregierung, Artur Sirk, über. Doch aufgrund seiner autoritären Herrschaft nehmen die Spannungen im Land zu. Wie wird sich Sirk entscheiden – wird er zurücktreten oder wird es ihm gelingen, seine Macht zu festigen?"
 RULE_OPTION_EST_PATH_PATAUT: "£KR_game_rule_flag_EST   Vaps-Bewegung"
 RULE_OPTION_EST_PATH_PATAUT_DESC: "Sirk bleibt im Amt und gründet den §PEesti Vabadussõjalaste Liit§!, also den Verband der Teilnehmer am estnischen Unabhängigkeitskrieg, auch bekannt als Vaps-Bewegung, und errichtet eine autoritäre Militärdiktatur.$EST_PATH_REQUIREMENTS$"
 RULE_OPTION_EST_PATH_AUTDEM: "£KR_game_rule_flag_EST Patriotische Liga"
 RULE_OPTION_EST_PATH_AUTDEM_DESC: "Die §aIsamaaliit§!, also die Patriotische Liga, stürzt Sirk und errichtet ein korporativistisches Regime.$EST_PATH_REQUIREMENTS$"
 RULE_OPTION_EST_PATH_DEM_DESC: "Sirk gibt dem Druck nach, und die Macht geht an die nationale Front der demokratischen Parteien über. Die folgenden Wahlen werden von der"
 RULE_OPTION_EST_PATH_SOCCON: "£KR_game_rule_flag_EST   Einheitsfront - Volkspartei"
 RULE_OPTION_EST_PATH_SOCCON_DESC: "$RULE_OPTION_EST_PATH_DEM_DESC$ §cEesti Rahvaerakond§!, oder Estnische Volkspartei, klar gewonnen.$EST_PATH_REQUIREMENTS$"
 RULE_OPTION_EST_PATH_MARLIB: "£KR_game_rule_flag_EST   Einheitsfront - Volkspartei (Mitte)"
 RULE_OPTION_EST_PATH_MARLIB_DESC: "$RULE_OPTION_EST_PATH_DEM_DESC$ §mEesti Rahvaerakond§!, also der Estnischen Volkspartei, gewonnen, mit Regierungsunterstützung durch zentristische Unabhängige im Austausch für einige kleinere liberale Zugeständnisse.$EST_PATH_REQUIREMENTS$"
 RULE_OPTION_EST_PATH_SOCLIB: "£KR_game_rule_flag_EST   Einheitsfront - Arbeiter"
 RULE_OPTION_EST_PATH_SOCLIB_DESC: "$RULE_OPTION_EST_PATH_DEM_DESC$  §lEesti Tööerakond§!, also die Estnische Arbeiterpartei.$EST_PATH_REQUIREMENTS$"
 RULE_OPTION_EST_PATH_SOCDEM: "£KR_game_rule_flag_EST   Einheitsfront - Sozialdemokratische Arbeiter"
 RULE_OPTION_EST_PATH_SOCDEM_DESC: "$RULE_OPTION_EST_PATH_DEM_DESC$ §SEesti Sotsiaaldemokraatlik Tööliste Partei§!, also die Estnische Sozialdemokratische Arbeiterpartei.$EST_PATH_REQUIREMENTS$"

 EST_FORPOL: "£KR_game_rule_flag_EST   Estlands Außenpolitik"
 RULE_OPTION_EST_FORPOL_RANDOM: "Standard"
 RULE_OPTION_EST_FORPOL_RANDOM_DESC: "Estland ist ein Neuling auf der politischen Bühne und muss sich angesichts mehrerer bedrohlicher Nachbarn nun entscheiden, auf welche Seite es sich stellen will."
 RULE_OPTION_EST_FORPOL_RUS: "£KR_game_rule_flag_EST  £KR_game_rule_flag_RUS   Moskauer Abkommen"
 RULE_OPTION_EST_FORPOL_RUS_DESC: "Da es wahrscheinlich ist, dass Riga versuchen wird, seine früheren Ländereien zurückzuerobern, wendet sich Estland an Russland, um ein Bündnis zu schließen. Wenn Russland eine expansionistische Haltung einnimmt, wird sein Antrag abgelehnt und Estland bleibt neutral.$EST_PATH_REQUIREMENTS$\n$RUS_AFTERMATH_NOT_SOC_REQUIREMENTS$"
 RULE_OPTION_EST_FORPOL_GER: "£KR_game_rule_flag_EST  £KR_game_rule_flag_GER   Reichspakt"
 RULE_OPTION_EST_FORPOL_GER_DESC: "Der Beitritt zum Reichspakt und die volle Kooperation mit Deutschland ist vielleicht Estlands beste Chance, seine Unabhängigkeit zu garantieren. Falls Deutschland von einer schwarz-weiß-roten Regierung regiert wird, wird ihr Antrag abgelehnt und Estland bleibt neutral.$EST_PATH_REQUIREMENTS$\n§RKeine§! §CKoalition S-W-R§! in §Y$GER_PATH$§!"
 RULE_OPTION_EST_FORPOL_SCA: "£KR_game_rule_flag_EST  £KR_game_rule_flag_SCA   Nordischer Rat"
 RULE_OPTION_EST_FORPOL_SCA_DESC: "Estland ist zwar kein skandinavisches Land, doch aufgrund seines Bekenntnisses zur Demokratie seit der Unabhängigkeit und seiner engen historischen Verbindungen zu Finnland strebt es an, sich den nordischen Ländern in einem Abkommen über gegenseitigen Schutz und eine spätere vollständige Vereinigung anzuschließen. Estland kann dies nur aushandeln, wenn auch Finnland den Beitritt zu diesem skandinavischen Projekt anstrebt; andernfalls bleibt es neutral.$EST_PATH_REQUIREMENTS$\nJede §CEinheitsfront§! in §Y$EST_PATH$§!\nJede §CDemokratie§! in §Y$DEN_PATH§!\nJede §CDemokratie§! in §Y$NOR_PATH$§!\n§CNordische Föderation§! in §Y$NOR_FORPOL$§!\nJede §CDemokratie§! in §Y$SWE_PATH$§!\nJede §CDemokratie§! in §Y$FIN_PATH$§!""
 RULE_OPTION_EST_FORPOL_NEUT: "£KR_game_rule_flag_EST   Neutralität"
 RULE_OPTION_EST_FORPOL_NEUT_DESC: "Estland verzichtet auf Bündnisse mit Großmächten und bevorzugt stattdessen eine Politik der bewaffneten Neutralität und einer möglichen Zusammenarbeit auf lokaler Ebene.$EST_PATH_REQUIREMENTS$"

 LAT_PATH: "£KR_game_rule_flag_LAT   Lettlands Verfassungskonvent"
 RULE_OPTION_LAT_PATH_RANDOM: "Standard"
 RULE_OPTION_LAT_PATH_RANDOM_DESC: "Abgesehen von Riga erlangt Lettland endlich seine Unabhängigkeit, wobei das Land ideologisch gespalten ist zwischen Sozialisten im Westen und Nationalisten im Osten. Es wird ein Verfassungskonvent einberufen, bei dem vor allem eine Frage im Mittelpunkt steht: Wer führt Lettland in die Zukunft?"
 RULE_OPTION_LAT_PATH_AUT_DESC: "Nach seinem Sieg über die Sozialisten wird General Jānis Kurelis Präsident von Lettland."
 RULE_OPTION_LAT_PATH_AUTDEM: "£KR_game_rule_flag_LAT   LTS(p)A – Gestärkte Saeima"
 RULE_OPTION_LAT_PATH_AUTDEM_DESC: "$RULE_OPTION_LAT_PATH_AUT_DESC$\nEr führt Lettland und die §aLatvijas Tēvzemes sargu (Partisanen) apvienība§!, also den lettischen Verband der Vaterlandsverteidiger (Partisanen), durch die aktuelle Krise, wobei seine Befugnisse durch die Saeima begrenzt werden.$EST_PATH_REQUIREMENTS$"
 RULE_OPTION_LAT_PATH_PATAUT: "£KR_game_rule_flag_LAT   LTS(p)A - Starke Exekutive"
 RULE_OPTION_LAT_PATH_PATAUT_DESC: "$RULE_OPTION_LAT_PATH_AUT_DESC$\nEr führt Lettland und die §PLatvijas Tēvzemes sargu (partizanu) apvienība§!, also die Lettische Liga der Vaterlandsverteidiger (Partisanen), mit uneingeschränkten Exekutivbefugnissen durch die aktuelle Krise und darüber hinaus.$EST_PATH_REQUIREMENTS$"
 RULE_OPTION_LAT_PATH_SOC_DESC: "Jēkabs Peterss und die Revolutionäre Lettische Legion gelten als maßgeblich an der Erlangung der lettischen Unabhängigkeit beteiligt und trugen zur Reform der Republik Iskolat bei."
 RULE_OPTION_LAT_PATH_RADSOC: "£KR_game_rule_flag_LAT_soc  LKP - Bolschewistische Erneuerung"
 RULE_OPTION_LAT_PATH_RADSOC_DESC: "$RULE_OPTION_LAT_PATH_SOC_DESC$\nSie haben Erfolg, wo Russland gescheitert ist, und die §RLatvijas Komunistiskā partija§!, also die Kommunistische Partei Lettlands, bleibt ihren bolschewistischen Wurzeln treu.$EST_PATH_REQUIREMENTS$"
 RULE_OPTION_LAT_PATH_TOTALIST: "£KR_game_rule_flag_LAT_soc   LKP - Übernahme des Syndikalismus"
 RULE_OPTION_LAT_PATH_TOTALIST_DESC: "$RULE_OPTION_LAT_PATH_SOC_DESC$\nAngesichts des Scheiterns des Bolschewismus in Russland wird deutlich, dass die §oLatvijas Komunistiskā partija§!, also die Kommunistische Partei Lettlands, den von Frankreich inspirierten revolutionären Syndikalismus als Weg in die Zukunft betrachtet.$EST_PATH_REQUIREMENTS$"

 LAT_FORPOL: "£KR_game_rule_flag_LAT   Lettlands Außenpolitik"
 LAT_FORPOL_REQUIREMENTS: "$EST_PATH_REQUIREMENTS$\nJedes §CLTS(p)A§! in §Y$LAT_PATH$§!"
 RULE_OPTION_LAT_FORPOL_RANDOM: "Standard"
 RULE_OPTION_LAT_FORPOL_RANDOM_DESC: "Jetzt, als unabhängiger Staat, fragt sich Lettland, ob es seine Ziele besser erreicht, wenn es sich mit den Russen verbündet, oder ob es vermeiden sollte, sich einer der großen Fraktionen anzuschließen."
 RULE_OPTION_LAT_FORPOL_RUS: "£KR_game_rule_flag_LAT  £KR_game_rule_flag_RUS   Moskauer Abkommen"
 RULE_OPTION_LAT_FORPOL_RUS_DESC: "Lettland strebt den Beitritt zum Moskauer Abkommen an.$LAT_FORPOL_REQUIREMENTS$\n$RUS_AFTERMATH_NOT_SOC_REQUIREMENTS$"
 RULE_OPTION_LAT_FORPOL_NEUT: "£KR_game_rule_flag_LAT   Neutralität"
 RULE_OPTION_LAT_FORPOL_NEUT_DESC: "Lettland verzichtet auf ein Bündnis mit Moskau und bevorzugt stattdessen eine Politik der bewaffneten Neutralität und einer möglichen Zusammenarbeit auf lokaler Ebene.$LAT_FORPOL_REQUIREMENTS$"

 LIT_PATH: "£KR_game_rule_flag_LIT_mon   Litauens längster Winter"
 RULE_OPTION_LIT_PATH_RANDOM: "Standard"
 RULE_OPTION_LIT_PATH_RANDOM_DESC: "Der Schwarze Montag und die Wahlen von 1937 stürzen Litauen in einen Umbruch. Können Demokratie und der Traum von einem multiethnischen Königreich in einem Land überleben, das von ethnischen Spannungen und wirtschaftlicher Not zerrissen ist?"
 RULE_OPTION_LIT_PATH_MON_SOCCON: "£KR_game_rule_flag_LIT_mon   Erneuerung durch Christus"
 RULE_OPTION_LIT_PATH_MON_SOCCON_DESC: "Nach den Wahlen von 1937 bleibt die §cLietuvos krikščionių demokratų partija§!, die Christlich-Demokratische Partei Litauens, an der Macht - nun allerdings unter der Führung des Philosophen Stasys Šalkauskis, der ein pluralistisches, christlich-korporatistisches Gedankengut für die Nation entwickelt."
 RULE_OPTION_LIT_PATH_MON_SOCDEM: "£KR_game_rule_flag_LIT_mon   Für den arbeitenden Menschen"
 RULE_OPTION_LIT_PATH_MON_SOCDEM_DESC: "Nach den Wahlen von 1937 übernimmt die §SLietuvos socialdemokratų partija§! (Sozialdemokratische Partei Litauens) die Macht. Unter der Führung von Steponas Kairys strebt sie einen demokratischen Sozialismus und die Einführung der nationalen Selbstverwaltung an."
 RULE_OPTION_LIT_PATH_AUTDEM: "£KR_game_rule_flag_LIT_mon   Stärke in Einigkeit"
 RULE_OPTION_LIT_PATH_AUTDEM_DESC: "Nach den Wahlen von 1937 übernimmt die Litauische Nationalistische Union (§aLietuvių tautininkų sąjunga§!) unter der Führung von Antanas Smetona die Macht und versucht, eine \"wahre Demokratie\" um ihren Führer, den Tautos Vadas, zu schaffen."
 RULE_OPTION_LIT_PATH_SOCLIB_DESC: "Die Lage in Litauen spitzt sich zu, und König Vytautas II. wird erschossen. Alle Parteien im Seimas schließen sich zu einer Regierung der nationalen Einheit zusammen, angeführt von Stanislaw Narutowicz und dem §lLietuvos lenkų komitetas/Komitet Polaków na Litwie§!, also dem Komitee der litauischen Polen, das darauf abzielt, die ethnischen Spannungen im Land durch eine Reform der Staatsstruktur im Sinne eines föderalen, von den Krajowcy inspirierten Modells zu lösen.\n\nNach der Ausrufung der Republik und dem anschließenden Rücktritt von Narutowicz wählt Litauen den"
 RULE_OPTION_LIT_PATH_REP_SOCCON: "£KR_game_rule_flag_LIT  Echos eines Großherzogtums - LKDP"
 RULE_OPTION_LIT_PATH_REP_SOCCON_DESC: "$RULE_OPTION_LIT_PATH_SOCLIB_DESC$ §cLietuvos krikščionių demokratų partija§! oder Christlich-Demokratische Partei Litauens, mit ihrem Vorsitzenden Stasys Šalkauskis als Präsident."
 RULE_OPTION_LIT_PATH_REP_SOCDEM: "£KR_game_rule_flag_LIT  Echos eines Großherzogtums - LSDP"
 RULE_OPTION_LIT_PATH_REP_SOCDEM_DESC: "$RULE_OPTION_LIT_PATH_SOCLIB_DESC$ §SLietuvos socialdemokratų partija§! (Sozialdemokratische Partei Litauens) mit ihrem Vorsitzenden Steponas Kairys als Präsident."
 RULE_OPTION_LIT_PATH_MARLIB: "£KR_game_rule_flag_LIT  Echos eines Großherzogtums - Santara"
 RULE_OPTION_LIT_PATH_MARLIB_DESC: "$RULE_OPTION_LIT_PATH_SOCLIB_DESC$ §Demokratinė tautos laisvės santara§! oder Demokratische Nationale Freiheitsliga mit ihrem Vorsitzenden Vaclovas Sidzikauskas als Präsident."
 RULE_OPTION_LIT_PATH_PATAUT: "£KR_game_rule_flag_LIT_mon   Vormundschaft der Armee"
 RULE_OPTION_LIT_PATH_PATAUT_DESC: "Die §Plechavičius-Clique§ verhängt das Kriegsrecht, nachdem es der vorherigen Zivilregierung nicht gelungen ist, den König zu schützen, und General Povilas Plechavičius führt das Land, bis der Bruder des ehemaligen Königs als Mindaugas III. gekrönt wird."
 RULE_OPTION_LIT_PATH_RADSOC: "£KR_game_rule_flag_LIT_soc   Endlich Revolution"
 RULE_OPTION_LIT_PATH_RADSOC_DESC: "Die Wahlen von 1937 sind vorbei, und die LSDP übernimmt die Macht. Während ihrer Regierungszeit gewinnen syndikalistisch gesinnte Kräfte innerhalb der Partei an Einfluss. Als Deutschland den Krieg gegen die Dritte Internationale zu verlieren beginnt, führt Vincas Galinis die §RLietuvos socialdemokratų partija – Radikalusis sparnas§!, also den radikalen Flügel der Sozialdemokratischen Partei Litauens, in eine sozialistische Revolution, wechselt die Kriegspartei und bringt Litauen dazu, an der Seite der Kommunarden zu kämpfen.\n\n§Anmerkung: Wenn Deutschland im Weltkrieg noch nicht 40 % der Kapitulationsfortschritte erreicht hat, sich weder im Krieg mit der Pariser Kommune noch mit dem sozialistischen Russland befindet oder die Sozialdemokraten nicht mehr an der Macht sind, findet dies nicht statt.§!"
 RULE_OPTION_LIT_PATH_NATPOP_DESC: "Der Regierung gelingt es nicht, den Aufstand der LAF niederzuschlagen. Während des Zweiten Weltkriegs nutzt die §nLietuvos aktyvistų frontas§!, also die Litauische Aktivistenfront, die Gelegenheit, um die Nation von Grund auf neu zu gestalten, das deutsche Joch zu stürzen und eine nationale Republik zu errichten.\n\nKurz nach Ausbruch des Aufstands zeigen sich erste Risse in der LAF, wobei"
 RULE_OPTION_LIT_PATH_VOLDEMARAS_NATPOP: "£KR_game_rule_flag_LIT_natpop  Eine nationale Republik – Geležinis Vilkas"
 RULE_OPTION_LIT_PATH_VOLDEMARAS_NATPOP_DESC: "$RULE_OPTION_LIT_PATH_NATPOP_DESC$ Die Fraktion von Augustinas Voldemaras, die §nGeležinis Vilkas§!, also die Eisernen Wölfe, auch bekannt als die Volemarininkai, übernahm die Führung der Bewegung."
 RULE_OPTION_LIT_PATH_ALANTAS_NATPOP: "£KR_game_rule_flag_LIT_natpop  Eine Nationale Republik – Vairas"
 RULE_OPTION_LIT_PATH_ALANTAS_NATPOP_DESC: "$RULE_OPTION_LIT_PATH_NATPOP_DESC$ Die Fraktion von Vytautas Alantas, §nVairas§!, oder Rad, übernimmt die Führung der Bewegung."
 RULE_OPTION_LIT_PATH_MACEINA_NATPOP: "£KR_game_rule_flag_LIT_natpop  Eine Nationale Republik – Naujoji Romuva"
 RULE_OPTION_LIT_PATH_MACEINA_NATPOP_DESC: "$RULE_OPTION_LIT_PATH_NATPOP_DESC$ Die Fraktion §nNaujoji Romuva§!, oder Neue Romuva, von Antanas Maceina übernahm die Führung der Bewegung."

 BLR_PATH: "£KR_game_rule_flag_BLR  Der Hramada-Kongress"
 RULE_OPTION_BLR_PATH_RANDOM: "Standard"
 RULE_OPTION_BLR_PATH_RANDOM_DESC: "Aufgrund von Meinungsverschiedenheiten über die Landreform in Weißrussland spaltet sich die regierende BSDP zunehmend in Rechte und Linke. Unterdessen fürchtet das Militär zunehmend den Einfluss der Syndikalisten, und es scheint, dass die Deutschen bereit sind, sie zu unterstützen..."
 RULE_OPTION_BLR_PATH_SOCDEM: "£KR_game_rule_flag_BLR  Sozialdemokraten"
 RULE_OPTION_BLR_PATH_SOCDEM_DESC: "Der rechte Flügel der §SBielaruskaja Sacyjal-Demakratyčnaja Partyja§!, also der Belarussischen Sozialdemokratischen Partei, führt seine Landreform erfolgreich durch, wodurch sich Weißrussland zu einem gesunden und entwickelten Land wandelt und sich der Welt als Belarussische Volksrepublik präsentiert."
 RULE_OPTION_BLR_PATH_SOCCON: "£KR_game_rule_flag_BLR  Christdemokratie"
 RULE_OPTION_BLR_PATH_SOCCON_DESC: "Die BSDP führt ihre Landreform erfolgreich durch, wodurch sich Weißrussland zu einem gesunden und entwickelten Land entwickelt und sich der Welt als Belarussische Volksrepublik präsentiert.\nMit der Einführung der Demokratie verliert die BSDP ab den Wahlen von 1943 an die Nationale Demokratische Vereinigung unter der Führung von Adam Stankievič’s §cBielaruskaja Khryscijanskaja Demakratyja§!, also der Belarussischen Christdemokratie."
 RULE_OPTION_BLR_PATH_SOCDEM_GER: "£KR_game_rule_flag_BLR  £KR_game_rule_flag_GER  Sozialdemokraten - Reichspakt"
 RULE_OPTION_BLR_PATH_SOCDEM_GER_DESC: "$RULE_OPTION_BLR_PATH_SOCDEM_DESC$\nSollte Russland erneut zum Sozialismus zurückkehren, lassen sich die Weißrussen von dessen Angeboten nicht verführen und bleiben dem Reichspakt treu, der ihre Unabhängigkeit bislang garantiert hat.$RUS_FORPOL_REQUIREMENTS$"
 RULE_OPTION_BLR_PATH_RADSOC: "£KR_game_rule_flag_BLR_soc  BSDP £KR_game_rule_flag_RUS_soc  Sozialdemokraten (links)"
 RULE_OPTION_BLR_PATH_RADSOC_DESC: "Die BSDP führt ihre Landreform erfolgreich durch, wodurch sich Weißrussland zu einem prosperierenden und entwickelten Land entwickelt und sich der Welt als Belarussische Volksrepublik präsentiert.\nIn einer geheimen Absprache hinter dem Rücken der Deutschen tauschen die Weißrussen jedoch einen Herrn gegen einen anderen ein und wechseln zu Beginn des Weltkriegs die Seiten, um zu einer Marionette der russischen Sozialisten zu werden, während sie gleichzeitig den linken Flügel der §RBielaruskaja Sacyjal-Demakratyčnaja Partyja§!, also der Weißrussischen Sozialdemokratischen Partei, weiter radikalisieren und stärken.$RUS_FORPOL_REQUIREMENTS$"
 RULE_OPTION_BLR_PATH_AUTDEM: "£KR_game_rule_flag_BLR_autdem  Zentrale Rada"
 RULE_OPTION_BLR_PATH_AUTDEM_DESC: "Aus Angst vor einer syndikalistischen Bedrohung stürzt Radasłaŭ Astroŭskis §aBielaruskaja Centraĺnaja Rada§!, also der Belarussische Zentralrat, auch bekannt als Zentral-Rada, mit deutscher Unterstützung den Sojm und verwandelt das Land in eine autoritäre Präsidialrepublik."
 RULE_OPTION_BLR_PATH_PATAUT: "£KR_game_rule_flag_BLR_autdem  Generalgouvernement Minsk"
 RULE_OPTION_BLR_PATH_PATAUT_DESC: "Aus Angst vor einer syndikalistischen Bedrohung stürzt Radasłaŭ Astroŭski mit Unterstützung der Deutschen den Sojm. Da er nicht bereit ist, anderswo weitere Unterstützung zu suchen, und es ihm nicht gelingt, den aufkeimenden Bürgerkrieg zu unterdrücken, verliert Astroŭski die Kontrolle an Werner Kempf, den Leiter der deutschen Militärmission in Weißrussland.\nKempf errichtet daraufhin das §PGeneralgouvernement Minsk§!, also das Generalgouvernement Minsk, um Weißrussland zu regieren."
 RULE_OPTION_BLR_PATH_NATPOP: "£KR_game_rule_flag_BLR_natpop  Bauernpartei – Grüne Eiche"
 RULE_OPTION_BLR_PATH_NATPOP_DESC: "Aus Angst vor einer syndikalistischen Bedrohung stürzt Radasłaŭ Astroŭski mit der Unterstützung der Deutschen den Sojm. Da er keine Unterstützung findet, übergibt er die Macht an Vacłaŭ Łastoŭskis §nBielaruskaja Sialianskaja Partyja – Zialionaha Duba§!, also die Belarussische Bauernpartei – Grüne Eiche, die Weißrussland in Kryvia verwandelt, einen zutiefst nationalistischen agrar-korporatistischen Staat."

 UKR_PATH: "£KR_game_rule_flag_UKR  Blut auf dem Dnipro"
 UKR_PATH_REQUIREMENTS: "\n\n§RBenötigt:§!$RSA_PATH_RUS_REQUIREMENTS$"
 RULE_OPTION_UKR_PATH_RANDOM: "Standard"
 RULE_OPTION_UKR_PATH_RANDOM_DESC: "Eine Wirtschaftskrise zerreißt die ohnehin instabile Ukraine. Die autoritäre Regierung des Hetmanats kämpft mit vereinten Kräften, um die Nation vor dem Zerfall zu bewahren, während Kräfte von innen und außen versuchen, eine einst besiegt geglaubte Republik wiederherzustellen. Am Horizont braut sich ein Sturm zusammen, und keine Seite wird ihn unbeschadet überstehen..."
 RULE_OPTION_UKR_PATH_HETMANATE_DESC: "Trotz des Chaos des Schwarzen Montags und der Anti-Hetman-Revolte setzt sich das Hetmanat durch."
 RULE_OPTION_UKR_PATH_USKHD_AUTDEM: "£KR_game_rule_flag_UKR  Hetmanat - Das klassokratische Ideal"
 RULE_OPTION_UKR_PATH_USKHD_AUTDEM_DESC: "$RULE_OPTION_UKR_PATH_HETMANATE_DESC$\nSkoropadskyi ernennt ein Kabinett, das von der §aUkrainskyi Soiuz Khliborobiv-Derzhavnykiv§! oder Ukrainischen Union der Agrarier-Statisten geführt wird, und die neue Regierung setzt deren antiparlamentarische, klassokratische Vision um."
 RULE_OPTION_UKR_PATH_UDKHP_DESC: "Skoropadskyi ernennt ein von der USKhD geführtes Kabinett, das den Hetman mit seinen schwachen Leistungen schwer enttäuscht.\nDas Kabinett wird später entlassen und durch ein Kabinett unter der Leitung des"
 RULE_OPTION_UKR_PATH_UDKHP_AUTDEM: "£KR_game_rule_flag_UKR  Hetmanat - Gegen Parteilichkeit"
 RULE_OPTION_UKR_PATH_UDKHP_AUTDEM_DESC: "$RULE_OPTION_UKR_PATH_HETMANATE_DESC$\n$RULE_OPTION_UKR_PATH_UDKHP_DESC$ §aUkrainska Demokratychna Khliborobska Partiia§! oder Ukrainische Demokratische Agrarpartei. Trotz der Versprechungen der Regierung in Richtung substanzieller parlamentarischer Reformen reichen diese nicht aus, um zu verhindern, dass der Soim dem Hetman, seinem Kabinett und seinen Beratern untergeordnet bleibt."
 RULE_OPTION_UKR_PATH_SOCCON: "£KR_game_rule_flag_UKR  Hetmanat - Eine rationale Lösung"
 RULE_OPTION_UKR_PATH_SOCCON_DESC: "$RULE_OPTION_UKR_PATH_HETMANATE_DESC$\n$RULE_OPTION_UKR_PATH_UDKHP_DESC$ UDKhP. Die neue Regierung verabschiedet mehrere Reformen, und nach der Niederlage Russlands vollendet die §cUkrainska Demokratychna Khliborobska Partiia§!, also die Ukrainische Demokratische Agrarpartei, den Prozess der Parlamentarisierung.$UKR_PATH_REQUIREMENTS$"
 RULE_OPTION_UKR_PATH_SHD_DESC: "Die enormen Misserfolge der Soim und der Koalitionsregierung spitzen sich zu, als die autoritäre"
 RULE_OPTION_UKR_PATH_SHD_END_DESC: "die Macht sichert und den Staat weiter zentralisiert."
 RULE_OPTION_UKR_PATH_PATAUT: "£KR_game_rule_flag_UKR  Hetmanat - Rechte Hand des Hetmans"
 RULE_OPTION_UKR_PATH_PATAUT_DESC: "$RULE_OPTION_UKR_PATH_HETMANATE_DESC$\n$RULE_OPTION_UKR_PATH_SHD_DESC$ §PSoiuz Hetmantsiv Derzhavnykiv§! oder Union der Hetmaniten-Staatserbauer, $RULE_OPTION_UKR_PATH_SHD_END_DESC$\n\nNach der Niederlage Russlands werden die Schrauben an der Macht angezogen: Kosakenführer Ivan Poltavets-Ostrianytsia macht den Hetman praktisch zu einer Marionette seiner Verwaltung."
 RULE_OPTION_UKR_PATH_SHD_AUTDEM: "£KR_game_rule_flag_UKR  Hetmanat - Eine Nation im Aufbruch"
 RULE_OPTION_UKR_PATH_SHD_AUTDEM_DESC: "$RULE_OPTION_UKR_PATH_HETMANATE_DESC$\n$RULE_OPTION_UKR_PATH_SHD_DESC$ SHD $RULE_OPTION_UKR_PATH_SHD_END_DESC$\n\nNach der Niederlage Russlands lockert der Staat seinen Griff, und Otaman-Minister Borys Homzyn beruft Neuwahlen ein, die von den Getreuen des Hetmans aus der §aSoiuz Hetmantsiv Derzhavnykiv§!, also der Union der Hetmaniten und Staatsbauer, gewonnen werden.$UKR_PATH_REQUIREMENTS$"
 RULE_OPTION_UKR_PATH_DANYLO_DESC: "Trotz aller Widrigkeiten gewinnt die Regierung die Unterstützung der URDP bei der Bewältigung des Schwarzen Montags und verhandelt erfolgreich mit der Allukrainischen Demokratischen Bewegung, um einen regelrechten Bürgerkrieg zu verhindern.\n\nDanylo Skoropadskyi und Dmytro Doroshenko bauen das Hetmanat mit weitreichenden demokratischen Reformen mühsam um, und die"
 RULE_OPTION_UKR_PATH_HETMANATE_SOCLIB: "£KR_game_rule_flag_UKR  Hetmanat - Der Geist des Fortschritts"
 RULE_OPTION_UKR_PATH_HETMANATE_SOCLIB_DESC: "$RULE_OPTION_UKR_PATH_DANYLO_DESC$ §lUkrainska Radykalno-Demokratychna Partiia§! oder Ukrainische Radikaldemokratische Partei bei den nächsten Wahlen an die Macht kommen."
 RULE_OPTION_UKR_PATH_HETMANATE_SOCDEM: "£KR_game_rule_flag_UKR  Hetmanat - Rotgefärbtes Hetmanat"
 RULE_OPTION_UKR_PATH_HETMANATE_SOCDEM_DESC: "$RULE_OPTION_UKR_PATH_DANYLO_DESC$ Die URDP wird bei den nächsten Wahlen an die Macht kommen. Nach der Niederlage Russlands errang die §SUkrainska Sotsial-Demokratychna Robitnycha Partiia§!, also die Ukrainische Sozialdemokratische Arbeiterpartei, bei den Nachkriegswahlen einen überraschenden Sieg.$UKR_PATH_REQUIREMENTS$"
 RULE_OPTION_UKR_PATH_NATPOP: "£KR_game_rule_flag_UKR  Republik - Nationale Revolution"
 RULE_OPTION_UKR_PATH_NATPOP_DESC: "$RULE_OPTION_UKR_PATH_HETMANATE_DESC$\nDoch eine neue Krise bedroht die Regierung. Nach dem Scheitern der Landreform wird Skoropadskyis Staat durch einen Militärputsch unter der Führung der §Nn
 RULE_OPTION_UKR_PATH_REP_DESC: "Mit dem Sieg der Allukrainischen Demokratischen Bewegung über die Regierung des Hetman kehrt die Freiheit in die Ukraine zurück."
 RULE_OPTION_UKR_PATH_REP_SOCLIB: "£KR_game_rule_flag_UKR  Republik - Eine radikale Note"
 RULE_OPTION_UKR_PATH_REP_SOCLIB_DESC: "$RULE_OPTION_UKR_PATH_REP_DESC$\n\nBei den Wahlen nach dem Aufstand bildet die §lUkrainska Radykalno-Demokratychna Partiia§! (Ukrainische Radikaldemokratische Partei) eine Regierung und bringt die Ukraine auf einen fortschrittlichen und parlamentarischen Kurs."
 RULE_OPTION_UKR_PATH_MARLIB: "£KR_game_rule_flag_UKR  Republik - Frieden und Wohlstand"
 RULE_OPTION_UKR_PATH_MARLIB_DESC: "$RULE_OPTION_UKR_PATH_REP_DESC$\n\nBei den auf den Aufstand folgenden Wahlen bildet die URDP eine Regierung und bringt die Ukraine auf einen fortschrittlichen und parlamentarischen Kurs. Nach der Niederlage Russlands gewinnt die Partei die Neuwahlen, wobei der rechte Flügel der §mUkrainska Radykalno-Demokratychna Partiia§!, also der Ukrainischen Radikal-Demokratischen Partei, an größter Einfluss gewinnt.$UKR_PATH_REQUIREMENTS$"
 RULE_OPTION_UKR_PATH_REP_SOCDEM: "£KR_game_rule_flag_UKR  Republik - Mandat für die Arbeiter"
 RULE_OPTION_UKR_PATH_REP_SOCDEM_DESC: "$RULE_OPTION_UKR_PATH_REP_DESC$\n\nBei den auf den Aufstand folgenden Wahlen bildet die §SUkrainska Sotsial-Demokratychna Robitnycha Partiia§! (Ukrainische Sozialdemokratische Arbeiterpartei) eine Regierung und bringt die Ukraine auf einen demokratisch-sozialistischen Kurs."
 RULE_OPTION_UKR_PATH_RADSOC: "£KR_game_rule_flag_UKR  Republik - Revolution von Innen"
 RULE_OPTION_UKR_PATH_RADSOC_DESC: "$RULE_OPTION_UKR_PATH_REP_DESC$\n\nBei den Wahlen nach dem Aufstand schließt sich die RDS mit der Sozialdemokratischen Arbeiterpartei der Ukraine zusammen, um den Grundstein für eine agrarische und sozialistische Ukraine zu legen.\n\nSollte die deutsche Verteidigung gegen die Dritte Internationale ins Wanken geraten, wird die §RRobitnycho-Demokratychnyi Soiuz§!, also die Arbeiterdemokratische Union, ihren Übergang zum Sozialismus vollenden und im Krieg die Seiten wechseln, um sich nach der Niederlage Deutschlands der Dritten Internationale anzuschließen.\n\n§CHinweis: Die Ukraine wechselt sofort die Seiten, sollte das sozialistische Russland sich im Krieg mit Deutschland befinden. Andernfalls muss Deutschland einen Kapitulationsfortschritt von mehr als 20 % erreichen, und die Ukraine muss sich im Krieg mit der Pariser Kommune befinden.§!"
 RULE_OPTION_UKR_PATH_SYNDIE: "£KR_game_rule_flag_UKR_soc  Republik - Ein Kampf für die Ewigkeit"
 RULE_OPTION_UKR_PATH_SYNDIE_DESC: "$RULE_OPTION_UKR_PATH_REP_DESC$\n\nAber nicht alles ist gut in der neuen Republik. Die Unzulänglichkeiten der neu gewählten Regierung bedeuten den Tod der republikanischen Sache, als ein sozialistischer Putsch unter der Führung der §rUkrainska Partiia Sotsialistiv-Revoliutsioneriv-Borotbystiv (Komunistiv-Syndykalistiv)§! oder Ukrainischen Partei der Sozialistisch-Revolutionären-Borotbysten (Kommunisten-Syndikalisten) gewaltsam die Macht übernimmt."

 UKR_FORPOL: "£KR_game_rule_flag_UKR  Ukrainische Außenpolitik"
 RULE_OPTION_UKR_FORPOL_RANDOM: "Standard"
 RULE_OPTION_UKR_FORPOL_RANDOM_DESC: "Nach dem Sturz des Hetmans und der Einsetzung einer republikanischen Regierung arrangiert das deutsche Außenministerium ein Treffen mit der neuen Führung. Die Ukraine muss sich entscheiden, wo ihre Loyalität liegt..."
 RULE_OPTION_UKR_FORPOL_GER: "£KR_game_rule_flag_UKR  £KR_game_rule_flag_GER  Reichspakt"
 RULE_OPTION_UKR_FORPOL_GER_DESC: "Die neue ukrainische Regierung hält die deutschen Bedingungen für angemessen und unterzeichnet einen Vertrag über den Wiederanschluss an die deutsche Sphäre.\n\n§RBenötigt:§!\nEine §CRepublik§! in §Y$UKR_PATH$§!"
 RULE_OPTION_UKR_FORPOL_AUS: "£KR_game_rule_flag_UKR  £KR_game_rule_flag_AUS  Donau-Adriabund"
 RULE_OPTION_UKR_FORPOL_AUS_DESC: "Nachdem die Verhandlungen mit Deutschland gescheitert sind, schließt sich die Ukraine stattdessen dem Österreichischen Einflussbereich an.\n\n§RBenötigt:§!\nEine §CRepublik§! in §Y$UKR_PATH$§!\n\nWenn §Republik - Nationale Revolution§! in §Y$UKR_PATH$§! und Österreich §CEnde der Doppelherrschaft§! in\n§Y$AUS_AUSGLEICH$§! wählt, dann muss §CÖsterreich seinen Krieg gegen seine Kronländer beenden§!\n\nWenn §RNicht§! §Republik - Nationale Revolution§! in §Y$UKR_PATH$§!, dann muss Österreich §Rnicht§! §Beenden der Doppelherrschaft§! in §Y$AUS_AUSGLEICH$§! wählen"

 BUL_PATH: "£KR_game_rule_flag_BUL   Das Gesetz zum Schutz des Staates"
 RULE_OPTION_BUL_PATH_RANDOM: "Standard"
 RULE_OPTION_BUL_PATH_RANDOM_DESC: "Die bulgarische Demokratie befindet sich in einem Kampf um ihr Leben. Der zunehmend autoritäre Königspalast, frustriert über die vermeintliche Schwäche der Regierung, baut seine Macht immer weiter aus, während die Demokraten einen letzten Versuch unternehmen, die Tarnovo-Verfassung zu retten, und eine radikale Clique von Offizieren gegen beide intrigiert. Während Bulgariens Feinde sich auf Rache vorbereiten, kann es sich nur eine Seite leisten, Recht zu bekommen..."
 RULE_OPTION_BUL_PATH_AUTDEM: "£KR_game_rule_flag_BUL   Überparteiliches Regime"
 RULE_OPTION_BUL_PATH_AUTDEM_DESC: "Das Staatsschutzgesetz bleibt bestehen, und Bulgarien blickt auf den Zaren und sein §aBezpartien rezhim§!, also sein überparteiliches Regime, um die Nation zu führen..."
 RULE_OPTION_BUL_PATH_PATAUT: "£KR_game_rule_flag_BUL   Zveno"
 RULE_OPTION_BUL_PATH_PATAUT_DESC: "Dem ineffizienten parlamentarischen Gezänk wird ein Ende gesetzt, da die Militärclique §PPoliticheski Krŭg \"Zveno\"§!, also der Politische Kreis \"Zveno\", die Macht ergreift, um eine rationalisierte und disziplinierte Regierung aufzubauen."
 RULE_OPTION_BUL_PATH_DEM_DESC: "Mit der Aufhebung des Staatsschutzgesetzes wird die Macht von der Monarchie auf die demokratischen Parteien übertragen, und das"
 RULE_OPTION_BUL_PATH_DEM_END_DESC: "Versprechen, freie Wahlen abzuhalten, eingelöst."
 RULE_OPTION_BUL_PATH_SOCCON: "£KR_game_rule_flag_BUL   Demokratie - Nationalliberale"
 RULE_OPTION_BUL_PATH_SOCCON_DESC: "$RULE_OPTION_BUL_PATH_DEM_DESC$ §cNatsionalliberalna Partiya§!, oder Nationalliberale Partei, $RULE_OPTION_BUL_PATH_DEM_END_DESC$"
 RULE_OPTION_BUL_PATH_MARLIB: "£KR_game_rule_flag_BUL   Demokratie - Demokraten"
 RULE_OPTION_BUL_PATH_MARLIB_DESC: "$RULE_OPTION_BUL_PATH_DEM_DESC$ NLP $RULE_OPTION_BUL_PATH_DEM_END_DESC$\nDie darauf folgenden Wahlen werden von der §mDemokraticheska Partiya§! oder Demokratischen Partei gewonnen."
 RULE_OPTION_BUL_PATH_SOCLIB: "£KR_game_rule_flag_BUL  Demokratie - Bauernverband \"Spatz 1\""
 RULE_OPTION_BUL_PATH_SOCLIB_DESC: "$RULE_OPTION_BUL_PATH_DEM_DESC$ NLP $RULE_OPTION_BUL_PATH_DEM_END_DESC$\nDie darauffolgenden Wahlen werden von der Partei §lBŭlgarski Zemedelski Naroden Sŭyuz \"Vrabcha 1\"§! oder Bulgarischer Agrarnationalverband \"Spatz 1\" gewonnen."
 RULE_OPTION_BUL_PATH_SOCDEM: "£KR_game_rule_flag_BUL  Demokratie - Breite Sozialisten"
 RULE_OPTION_BUL_PATH_SOCDEM_DESC: "$RULE_OPTION_BUL_PATH_DEM_DESC$ NLP $RULE_OPTION_BUL_PATH_DEM_END_DESC$\nDie folgenden Wahlen werden von der §SBŭlgarska Rabotnicheska Sotsialdemokraticheska Partiya, Shiroki Sotsialisti§! oder Bulgarische Sozialdemokratische Arbeiterpartei, Breite Sozialisten gewonnen."

 BUL_LOSS_PATH: "£KR_game_rule_flag_BUL   Die nationale Katastrophe"
 BUL_LOSS_PATH_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CBulgarien wird im Vierten Balkankrieg besiegt§!"
 BUL_LOSS_PATH_DEM_REQUIREMENTS: "$BUL_LOSS_PATH_REQUIREMENTS$\n§CÜberparteiliches Regime§! in §Y$BUL_PATH$§!"
 BUL_LOSS_PATH_FF_REQUIREMENTS: "$BUL_LOSS_PATH_REQUIREMENTS$\nEine §CDemokratie§! in §Y$BUL_PATH$§!"
 RULE_OPTION_BUL_LOSS_PATH_RANDOM: "Standard"
 RULE_OPTION_BUL_LOSS_PATH_RANDOM_DESC: "Das Unvorstellbare ist eingetreten, Bulgarien hat gegen den Belgrader Pakt verloren. Ein solcher Rückschlag bedeutet das Ende des herrschenden Regimes, doch wer wird Bulgarien nun führen?"
 RULE_OPTION_BUL_LOSS_PATH_MON_AUTDEM: "£KR_game_rule_flag_BUL_rep   Überparteiliches Regime"
 RULE_OPTION_BUL_LOSS_PATH_MON_AUTDEM_DESC: "§aZar Boris III§! gilt als der Führer, den Bulgarien schon immer gebraucht hat, und versucht, den durch die Katastrophe verursachten Schaden wieder gutzumachen.$BUL_LOSS_PATH_REQUIREMENTS$\n§CZveno§! oder eine beliebige §CDemokratie§! in §Y$BUL_PATH$§!"
 RULE_OPTION_BUL_LOSS_PATH_PATAUT: "£KR_game_rule_flag_BUL   Zveno"
 RULE_OPTION_BUL_LOSS_PATH_PATAUT_DESC: "Die Schwäche des Zaren und seine unfähige Herrschaft werden allen deutlich, und der §PPoliticheski Krŭg \"Zveno\"§!, also der Politische Kreis \"Zveno\", übernimmt schließlich die Macht und versucht, Bulgarien wieder zu Macht und Einfluss zu verhelfen.$BUL_LOSS_PATH_DEM_REQUIREMENTS$"
 RULE_OPTION_BUL_LOSS_PATH_DEM_DESC: "Aus Angst vor einer Übernahme durch radikale Kräfte nach dem verlorenen Krieg schließen die Konstitutionalisten einen Pakt mit dem neu gekrönten Zaren Boris, und Bulgarien wird eine konstitutionelle Monarchie unter der Führung der Shestorka."
 RULE_OPTION_BUL_LOSS_PATH_MARLIB: "£KR_game_rule_flag_BUL  Demokratie - Shestorka"
 RULE_OPTION_BUL_LOSS_PATH_MARLIB_DESC: "Aus Angst vor einer Machtübernahme durch radikale Kräfte nach dem verlorenen Krieg schließen die Verfechter der konstitutionellen Monarchie ein Abkommen mit dem frisch gekrönten Zaren Boris, und Bulgarien wird zu einer konstitutionellen Monarchie unter der Führung des §mKomitet na Shestimata§!, also des Sechs-Personen-Komitees.\nDie Schestorka schließen sich dann zur §mDemokraticheska Partiya§! (Demokratische Partei) zusammen, die die folgenden Wahlen gewinnt.$BUL_LOSS_PATH_DEM_REQUIREMENTS$"
 RULE_OPTION_BUL_LOSS_PATH_SOCCON: "£KR_game_rule_flag_BUL  Demokratie - Nationalliberale"
 RULE_OPTION_BUL_LOSS_PATH_SOCCON_DESC: "$RULE_OPTION_BUL_LOSS_PATH_DEM_DESC$\nFolgenden Wahlen werden von der §cNatsionalliberalna Partiya§! (Nationale Liberale Partei) gewonnen.$BUL_LOSS_PATH_DEM_REQUIREMENTS$"
 RULE_OPTION_BUL_LOSS_PATH_SOCLIB: "£KR_game_rule_flag_BUL  Demokratie - Bauernverband \"Spatz 1\""
 RULE_OPTION_BUL_LOSS_PATH_SOCLIB_DESC: "$RULE_OPTION_BUL_LOSS_PATH_DEM_DESC$\nAnschließenden Wahlen gewinnt die Partei §lBŭlgarski Zemedelski Naroden Sŭyuz \"Vrabcha 1\"§! oder Bulgarische Nationale Agrarunion \"Spatz 1\".$BUL_LOSS_PATH_DEM_REQUIREMENTS$"
 RULE_OPTION_BUL_LOSS_PATH_SOCDEM: "£KR_game_rule_flag_BUL  Demokratie - Breite Sozialisten"
 RULE_OPTION_BUL_LOSS_PATH_SOCDEM_DESC: "$RULE_OPTION_BUL_LOSS_PATH_DEM_DESC$\nFolgenden Wahlen gewinnt die §SBŭlgarska Rabotnicheska Sotsialdemokraticheska Partiya - Shiroki sotsialisti§! oder Bulgarische Sozialdemokratische Arbeiterpartei - Breite Sozialisten.$BUL_LOSS_PATH_DEM_REQUIREMENTS$"
 RULE_OPTION_BUL_LOSS_PATH_NATPOP: "£KR_game_rule_flag_BUL_natpop   Legionäre"
 RULE_OPTION_BUL_LOSS_PATH_NATPOP_DESC: "Zvenos frühere Mitstreiter, die extremistischen und von Codreanu inspirierten §nSŭyuz na Bŭlgarskite Natsionalni Legioni§! oder Union der Bulgarischen Nationalen Legionen, übernehmen nach dem Krieg die Kontrolle über das Land und versuchen, den Belgrader Pakt so schnell wie möglich zurückzuschlagen.$BUL_LOSS_PATH_REQUIREMENTS$\n§CZveno§! in §Y$BUL_PATH$§!"
 RULE_OPTION_BUL_LOSS_PATH_FF_DESC: "After losing the war, the democratic government is beset by loose coalition of republican extremists and dissidents, and lose power to the anti-establishment Fatherland Front."
 RULE_OPTION_BUL_LOSS_PATH_REP_AUTDEM: "£KR_game_rule_flag_BUL   Agrar-Union"
 RULE_OPTION_BUL_LOSS_PATH_REP_AUTDEM_DESC: "$RULE_OPTION_BUL_LOSS_PATH_FF_DESC$\nIn den darauf folgenden Unruhen befiehlt Aleksandŭr Stamboliyski der Orangenen Garde, der paramilitärischen Organisation der ANU, seine ehemaligen Verbündeten als Geiseln zu nehmen, und übernimmt in einem unblutigen Putsch die Macht. Stamboliyskis §aBŭlgarski Zemedelski Naroden Sŭyuz§!, also die Bulgarische Agrarische Nationalunion, gründet eine Bauernrepublik und bemüht sich um eine Annäherung an die anderen Südslawen.$BUL_LOSS_PATH_FF_REQUIREMENTS$"
 RULE_OPTION_BUL_LOSS_PATH_SOC_DESC: "After an attempted Agrarian counter-coup, Bulgaria is proclaimed a socialist republic."
 RULE_OPTION_BUL_LOSS_PATH_RADSOC: "£KR_game_rule_flag_BUL_radical_soc   Enge Sozialisten"
 RULE_OPTION_BUL_LOSS_PATH_RADSOC_DESC: "$RULE_OPTION_BUL_LOSS_PATH_FF_DESC$\n$RULE_OPTION_BUL_LOSS_PATH_SOC_DESC$\nGeorgi Dimitrovs §RBŭlgarska Rabotnicheska Sotsialdemokraticheska Partiya – Tesni sotsialisti§! , also die Bulgarische Sozialdemokratische Arbeiterpartei – Enge Sozialisten, gewinnt an Einfluss, lässt sich von Lenin inspirieren und fungiert als revolutionäre Avantgarde Bulgariens.$BUL_LOSS_PATH_FF_REQUIREMENTS$"
 RULE_OPTION_BUL_LOSS_PATH_SYNDIE: "£KR_game_rule_flag_BUL_radical_soc   Vlasovden"
 RULE_OPTION_BUL_LOSS_PATH_SYNDIE_DESC: "$RULE_OPTION_BUL_LOSS_PATH_FF_DESC$\n$RULE_OPTION_BUL_LOSS_PATH_SOC_DESC$\n§rZemedelskata Profesionalna Konfederatsiya \"Vlasovden\"§!, also der Landwirtschaftliche Berufsverband \"Vlasovden\", übernimmt die Führung und leitet Bulgarien durch einen Kongress, dessen Mitglieder aus den Reihen der landwirtschaftlichen Gewerkschaften gewählt werden.$BUL_LOSS_PATH_FF_REQUIREMENTS$"

 BUL_FORPOL: "£KR_game_rule_flag_BUL  Bulgarische Außenpolitik"
 BUL_FORPOL_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CBulgarien gehört Mazedonien§! oder\n§Cder Besitzer Mazedoniens befindet sich sowohl mit Bulgarien als auch mit§!"
 RULE_OPTION_BUL_FORPOL_RANDOM: "Standard"
 RULE_OPTION_BUL_FORPOL_RANDOM_DESC: "Unabhängig davon, ob Bulgarien den Vierten Balkankrieg gewinnt oder verliert, muss es entscheiden, auf welcher Seite es in den kommenden Jahren stehen wird."
 RULE_OPTION_BUL_FORPOL_GER: "£KR_game_rule_flag_BUL  £KR_game_rule_flag_GER  Reichspakt"
 RULE_OPTION_BUL_FORPOL_GER_DESC: "Da die Dritte Internationale immer bedrohlicher wirkt, sieht Bulgarien in Deutschland die größte Chance gegen die rote Gefahr.$BUL_FORPOL_REQUIREMENTS$ §CDeutschland, und der Zweite Weltkrieg hat begonnen§!n\nWenn §CZveno§! oder irgendeine §CDemokratie§! in §Y$BUL_PATH$§! oder §Y$BUL_LOSS_PATH$§! vorkommt, dann muss §CBulgarien an die Dritte Internationale grenzen§!\n\nWenn §CLegionäre§! in §Y$BUL_LOSS_PATH$§! vorhanden sind, dann muss §CBulgarien an die Dritte Internationale grenzen,§! und Deutschland darf §Rkeine§! §CDemokratische Union§! in §Y$GER_PATH$§! wählen\n\n§RKeine§! §CAgrarische Nationalunion§! oder §CEnge Sozialisten§! oder §CVlasovden§! in §Y$BUL_LOSS_PATH$§!"
 RULE_OPTION_BUL_FORPOL_AUS: "£KR_game_rule_flag_BUL  £KR_game_rule_flag_AUS  Donau-Adriabund"
 RULE_OPTION_BUL_FORPOL_AUS_DESC: "Bulgarien erneuert sein Bündnis mit Österreich aus dem Ersten Weltkrieg und tritt dem Donau-Adriabund bei.\n\n§RVoraussetzung:§!\nWenn §CAgrarische Nationalunion§! in §Y$BUL_LOSS_PATH$§! vorhanden ist, muss Serbien §CSozialistische Arbeiter§! oder einen beliebigen §CRoyalistischen Putsch§! oder §CMärzverschwörung§! in §Y$SER_PATH$§! wählen.\n\n§RKein§! §CUnparteiisches Regime§! in §Y$BUL_PATH$§!\n§RKeine§! §CEngen Sozialisten§! oder §CVlasovden§! in §Y$BUL_LOSS_PATH$§!"
 RULE_OPTION_BUL_FORPOL_RUS: "£KR_game_rule_flag_BUL  £KR_game_rule_flag_RUS  Moskauer Abkommen"
 RULE_OPTION_BUL_FORPOL_RUS_DESC: "Angesichts der wachsenden Bedeutung Bulgariens als neue europäische Hegemonialmacht verbündet sich das Land mit Russland und tritt dem Moskauer Abkommen bei.$BUL_FORPOL_REQUIREMENTS$ §CRussland, und der Zweite Weltkrieg hat begonnen\nSerbien ist noch nicht Teil des Moskauer Abkommens§!\n\nWenn eine §CDemokratie§! in §Y$BUL_PATH$§! oder §Y$BUL_LOSS_PATH$§!, dann muss Russland in §Y$RUS_AFTERMATH$§ die §CDiktatur§! wählen.\n\nWenn §CZveno§! oder §CLegionäre§! in §Y$BUL_PATH$§! oder §Y$BUL_LOSS_PATH$§!, dann darf Russland §Rnicht§! die §CRepublik§! in §Y$RUS_AFTERMATH$§ wählen!\n$RUS_AFTERMATH_NOT_SOC_REQUIREMENTS$\n§RKein§! §CÜberparteiliches Regime§! in §Y$BUL_PATH$§! und §CBulgarien siegt im Vierten Balkankrieg§!\n§RKein§! §CÜberparteiliches Regime§! oder §CAgrarische Nationalunion§! oder §CEnge Sozialisten§! oder §CVlasovden§! in\n§Y$BUL_LOSS_PATH$§!"
 RULE_OPTION_BUL_FORPOL_BPL: "£KR_game_rule_flag_BUL_rep  £KR_game_rule_flag_SER  Belgrader Pakt"
 RULE_OPTION_BUL_FORPOL_BPL_DESC: "Nach der Niederlage im Vierten Balkankrieg strebt die junge Republik eine Aussöhnung mit Serbien an und tritt dem Belgrader Pakt bei.\n\n§RBenötigt:§!\n§CVlasovden§! oder §CEnge Sozialisten§! oder §CAgrarischer Syndikalismus§! in §Y$BUL_LOSS_PATH$§!\n\nWenn §CNationale Agrarische Union§! in §Y$BUL_LOSS_PATH$§!, dann muss Serbien §CRepublikanisch§! oder irgendeine §CRadikale§! in §Y$SER_PATH$§! wählen\n\nWenn §CEnge Sozialisten§! oder §CVlasovden§! in §Y$BUL_LOSS_PATH$§!, dann muss Serbien §CSozialistische Arbeiter§! in §Y$SER_PATH$§ wählen!"
 RULE_OPTION_BUL_FORPOL_INT: "£KR_game_rule_flag_BUL_soc  £KR_game_rule_flag_FRA  £KR_game_rule_flag_RUS_soc  Dritte Internationale"
 RULE_OPTION_BUL_FORPOL_INT_DESC: "Nach der Ausrufung einer Republik und einer erfolgreichen sozialistischen Revolution tritt Bulgarien der Dritten Internationale bei.$BUL_FORPOL_REQUIREMENTS$ §Cdie Dritte Internationale, und der Zweite Weltkrieg hat begonnen§!\n\n§CEnge Sozialisten§! oder §CVlasovden§! in §Y$BUL_LOSS_PATH$§!\n\n§CHinweis: Wenn Russland sozialistisch ist, schließt sich Bulgarien der Ostfront der Dritten Internationale an.§!"

 BPL_WAR: "£KR_game_rule_flag_BUL  £KR_game_rule_flag_SER  £KR_game_rule_flag_ROM  £KR_game_rule_flag_GRE   Der vierte Balkankrieg"
RULE_OPTION_BPL_WAR_RANDOM: "Standard"
RULE_OPTION_BPL_WAR_RANDOM_DESC: "Bulgarien, der Titan der Halbinsel, hat im Weltkrieg viel gewonnen und alle bulgarischen Gebiete sowie weitere Gebiete vereinigt. Obwohl Serbien, Griechenland und Rumänien im Weltkrieg besiegt wurden, haben sie sich erneut zusammengeschlossen, nun unter dem Banner des Belgrader Pakts. Dieses Bündnis der Balkanstaaten stellt den Bulgaren ein Ultimatum und fordert die Wiederherstellung der vor 1914 bestehenden Balkan-Grenzen. Eine Ablehnung seitens Bulgariens würde die Region erneut in einen Konflikt stürzen. Wie reagiert Bulgarien?"
 RULE_OPTION_BPL_WAR_DESC: "Bulgaria ignores the ultimatum, and the Balkans once again plunges into war."
RULE_OPTION_BPL_WAR_BUL_BPL: "£KR_game_rule_flag_BUL  vs £KR_game_rule_flag_SER  £KR_game_rule_flag_ROM  £KR_game_rule_flag_GRE   Krieg auf dem Balkan"
RULE_OPTION_BPL_WAR_BUL_BPL_DESC: "$RULE_OPTION_BPL_WAR_DESC$\n\n§GAngreifer§!\n£KR_game_rule_flag_SER  §YSerbien§!\n£KR_game_rule_flag_ROM  §YRumänien§!\n£KR_game_rule_flag_GRE  §YGriechenland§!\n§CVerteidiger§!\n£KR_game_rule_flag_BUL  §YBulgarien§!"
RULE_OPTION_BPL_WAR_BUL_BPL_OTT: "£KR_game_rule_flag_BUL  vs £KR_game_rule_flag_SER  £KR_game_rule_flag_ROM  £KR_game_rule_flag_GRE  £KR_game_rule_flag_TUR   Krieg auf dem Balkan"
RULE_OPTION_BPL_WAR_BUL_BPL_OTT_DESC: "B$RULE_OPTION_BPL_WAR_DESC$ Während des Krieges macht das Osmanische Reich seinen Anspruch geltend, fordert Westthrakien und erklärt Bulgarien den Krieg, als dieses sich weigert, das Gebiet zu übergeben.\n\n§GAngreifer§!\n£KR_game_rule_flag_SER  §YSerbien§!\n£KR_game_rule_flag_ROM  §YRumänien§!\n£KR_game_rule_flag_GRE  §YGriechenland§!\n£KR_game_rule_flag_TUR  §YOsmanisches Reich§!\n§CVerteidiger§!\n£KR_game_rule_flag_BUL  §YBulgarien§!"
RULE_OPTION_BPL_WAR_BUL_ALB_BPL: "£KR_game_rule_flag_BUL  £KR_game_rule_flag_ALB  vs £KR_game_rule_flag_SER  £KR_game_rule_flag_ROM  £KR_game_rule_flag_GRE   Krieg auf dem Balkan"
RULE_OPTION_BPL_WAR_BUL_ALB_BPL_DESC: "$RULE_OPTION_BPL_WAR_DESC$ Albanien unterstützt Bulgarien und schließt sich dem Kampf an.\n\n§GAngreifer§!\n£KR_game_rule_flag_SER  §YSerbien§!_republic\n£KR_game_rule_flag_ROM  §YRumänien§!\n£KR_game_rule_flag_GRE  §YGriechenland§!\n§CVerteidiger§!\n£KR_game_rule_flag_BUL  §YBulgarien§!\n£KR_game_rule_flag_ALB  §YAlbanien§!"
RULE_OPTION_BPL_WAR_BUL_ALB_BPL_OTT: "£KR_game_rule_flag_BUL  £KR_game_rule_flag_ALB  vs £KR_game_rule_flag_SER  £KR_game_rule_flag_ROM  £KR_game_rule_flag_GRE  £KR_game_rule_flag_TUR   Krieg auf dem Balkan"
RULE_OPTION_BPL_WAR_BUL_ALB_BPL_OTT_DESC: "Bulgarien ignoriert das Ultimatum, und auf dem Balkan bricht erneut Krieg aus. Albanien unterstützt Bulgarien und schließt sich den Kämpfen an. Während des Krieges macht das Osmanische Reich seinen Anspruch geltend und fordert Westthrakien; als Bulgarien sich weigert, das Gebiet zu übergeben, erklärt es Bulgarien den Krieg.\n\n§GAngreifer§!\n£KR_game_rule_flag_SER  §YSerbien§!\n£KR_game_rule_flag_ROM  §YRumänien§!\n£KR_game_rule_flag_GRE  §YGriechenland§!\n£KR_game_rule_flag_TUR  §YOsmanisches Reich§!\n§CVerteidiger§!\n£KR_game_rule_flag_BUL  §YBulgarien§!\n£KR_game_rule_flag_ALB  §YAlbanien§!"

ALB_PATH: "£KR_game_rule_flag_ALB   Die Wahlen in Albanien"
RULE_OPTION_ALB_PATH_RANDOM: "Standard"
RULE_OPTION_ALB_PATH_RANDOM_DESC: "Seit der albanischen Revolution von 1924, als die österreichische Marionette Prinz Wilhelm von Wied gestürzt wurde, sind die Einwohner der jungen, kleinen Republik zwischen zwei gegnerischen Kräften gespalten. Die Fortschrittspartei, die in hohem Maße von wohlhabenden Grundbesitzern unterstützt wird, hat alle Reformversuche der Einheitspartei um jeden Preis verhindert. Vielleicht kann die nächste Wahl das Ende dieser spaltenden Stagnation bedeuten?"
RULE_OPTION_ALB_PATH_SOCDEM: "£KR_game_rule_flag_ALB   Einheitspartei"
RULE_OPTION_ALB_PATH_SOCDEM_DESC: "Avni Rustemi gewinnt die Wahlen von 1936 mit seiner §SPartia e Bashkimi§! (Partei der Einheit) und verhindert erfolgreich ein Attentat."
RULE_OPTION_ALB_PATH_SOCCON: "£KR_game_rule_flag_ALB   Fortschrittspartei"
RULE_OPTION_ALB_PATH_SOCCON_DESC: "Shefqet Vërlaci gewinnt mit seiner §cPartia Përparimtare§! (Fortschrittspartei) die Wahlen von 1936 und verhindert erfolgreich ein Attentat."

 ALB_FORPOL: "£KR_game_rule_flag_ALB  Albanische Außenpolitik"
 ALB_FORPOL_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CAlbania is not annexed and puppeted in the Fourth Balkan War§!"
 ALB_FORPOL_ROM_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CAlbania does not join the Fourth Balkan War§!"
 RULE_OPTION_ALB_FORPOL_RANDOM: "Standard"
 RULE_OPTION_ALB_FORPOL_RANDOM_DESC: "Der kleine Staat an der Adria könnte in ein Bündnis mit seinen Nachbarn hineingezogen werden, und zwar mit denen, mit denen sie selbst verbündet sind. In einer zunehmend polarisierten Welt muss Albanien entscheiden, wo es steht."
 RULE_OPTION_ALB_FORPOL_AUS: "£KR_game_rule_flag_ALB  £KR_game_rule_flag_AUS  Donau-Adriabund"
 RULE_OPTION_ALB_FORPOL_AUS_DESC: "Albanien akzeptiert das Angebot Österreichs zur Aufnahme in seine Sphäre.$ALB_FORPOL_REQUIREMENTS$"
 RULE_OPTION_ALB_FORPOL_GER: "£KR_game_rule_flag_ALB  £KR_game_rule_flag_GER  Reichspakt"
 RULE_OPTION_ALB_FORPOL_GER_DESC: "Albanien nimmt das Angebot zur Aufnahme in die Sphäre Deutschlands an.$ALB_FORPOL_REQUIREMENTS$\n§CDeutschland gewinnt den Zweiten Weltkrieg§!\n\n§CKabinett Goerdeler§! oder eine §CDemokratische Union§! in §Y$GER_PATH$§!"
 RULE_OPTION_ALB_FORPOL_BUL: "£KR_game_rule_flag_ALB  £KR_game_rule_flag_BUL  Bulgarien"
 RULE_OPTION_ALB_FORPOL_BUL_DESC: "Albanien verbündet sich mit den Bulgaren und schließt sich ihrer Fraktion an, wenn sie eine solche gründen oder ihr später beitreten.$ALB_FORPOL_REQUIREMENTS$\n§CBulgarien ist der Besitzer von Mazedonien§!"
 RULE_OPTION_ALB_FORPOL_ROM: "£KR_game_rule_flag_ALB  £KR_game_rule_flag_ROM  Rumänien"
 RULE_OPTION_ALB_FORPOL_ROM_DESC: "Albanien verbündet sich mit den Rumänen und schließt sich jeder Fraktion an, in der Rumänien Mitglied ist, und folgt ihnen in alle weiteren Fraktionen.$ALB_FORPOL_ROM_REQUIREMENTS$\n§CRumänien ist Eigentümer der Dobrudscha§!"
 RULE_OPTION_ALB_FORPOL_4BW: "£KR_game_rule_flag_ALB  £KR_game_rule_flag_BUL  £KR_game_rule_flag_ROM  Vierter Balkankrieg Sieger"
 RULE_OPTION_ALB_FORPOL_4BW_DESC: "Albanien wartet ab, wer von Bulgarien oder Rumänien auf der Gewinnerseite des Vierten Balkankrieges steht, und schließt sich der Seite des Siegers an.$ALB_FORPOL_ROM_REQUIREMENTS$"

 SER_PATH: "£KR_game_rule_flag_SER   Serbische Wahlen von 1936"
 SER_PATH_MARCH_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CSerbia can form Yugoslavia§!"
 RULE_OPTION_SER_PATH_RANDOM: "Standard"
 RULE_OPTION_SER_PATH_RANDOM_DESC: "Seit der Revolution im Jahr 1925 wurde Serbien von einer Reihe fortschrittlicher Regierungen geführt. Angesichts des drohenden Krieges ist die künftige Ausrichtung Serbiens jedoch durchaus noch umstritten."
 RULE_OPTION_SER_PATH_REP_SOCLIB: "£KR_game_rule_flag_SER   Republikaner"
 RULE_OPTION_SER_PATH_REP_SOCLIB_DESC: "Die §lSrpska republikanska stranka§!, also die Serbische Republikanische Partei, gewinnt die Wahlen und bleibt an der Macht, um ihre fortschrittlichen Reformen fortzusetzen.\nBei der Gründung Jugoslawiens gehörten sie zu den Gründern der §lRepublikanska demokratska stranka§!, also der Republikanischen Demokratischen Partei, und blieben an der Macht."
 RULE_OPTION_SER_PATH_SOCDEM: "£KR_game_rule_flag_SER  Sozialisten"
 RULE_OPTION_SER_PATH_SOCDEM_DESC: "Die Republikaner gewinnen die Wahlen von 1936 und bleiben an der Macht, um ihre fortschrittlichen Reformen fortzusetzen.\nNach der Gründung Jugoslawiens kommt die §SSocijalistička partija Jugoslavije§! oder Sozialistische Partei Jugoslawiens an die Macht und bildet eine Regierung mit den Republikanern.\n\n§RBenötigt:§!\n§CSerbien formt Jugoslawien§!"
 RULE_OPTION_SER_PATH_AUTDEM: "£KR_game_rule_flag_SER   Radikale"
 RULE_OPTION_SER_PATH_AUTDEM_DESC: "Die §mNarodna radikalna stranka§!, also die Radikale Volkspartei, gewinnt die Wahl und führt, wie schon seit Jahrzehnten, Serbiens Tradition der Demokratie und Freiheit fort. Anschließend schließt sie sich mit der Zemljoradnička stranka, also der Agrarpartei, zusammen, um die §cSrpska radikalna zajednica§!, also die Serbische Radikale Union, zu gründen, die auch unter dem Namen Sarez bekannt ist.\nNach der Gründung Jugoslawiens bewegten sie sich weiter nach rechts, und zwar in Form der §aJugoslavenska radikalna zajednica§!, also der Jugoslawischen Radikalen Union."
 RULE_OPTION_SER_PATH_REP_PATAUT: "£KR_game_rule_flag_SER   Radikale - SONU"
 RULE_OPTION_SER_PATH_REP_PATAUT_DESC: "Die Radikalen gewinnen die Wahl und versuchen nach ihrem Zusammenschluss mit den Agarianern, ein Mehrparteienbündnis namens §aSrpski odbor za narodno ujedinjenje§!, also Serbisches Komitee für nationale Vereinigung, zu bilden, das die Wahlen so lange aufschiebt, bis die Südslawen vereint sind.\nMit der Gründung Jugoslawiens schreitet die Zentralisierung der Macht weiter voran, da Präsident Stojadinović die §PSrpska radikalna zajednica§!, also die Serbische Radikale Union, auch bekannt als Sarez, konsolidiert."
 RULE_OPTION_SER_PATH_RADSOC: "£KR_game_rule_flag_SER_radical_soc  Sozialistische Arbeiter"
 RULE_OPTION_SER_PATH_RADSOC_DESC: "Die §RSocijalistička radnička partija§!, also die Sozialistische Arbeiterpartei, gewinnt die Wahl und versucht, die dritte Revolution in die Wege zu leiten.\nNach der Gründung Jugoslawiens setzten sie ihre Herrschaft in Form der §RSocijalistička radnička partija Jugoslavije§!, also der Sozialistischen Arbeiterpartei Jugoslawiens, fort."
 RULE_OPTION_SER_PATH_MON_PATAUT: "£KR_game_rule_flag_SER_mon   Putsch der Royalisten - Radikale Bauern"
 RULE_OPTION_SER_PATH_MON_PATAUT_DESC: "Die royalistische Partei §PBela ruka§!, also Weiße Hand, nutzt die antisozialistische Stimmung, um kurz nach der Wahl durch einen Staatsstreich die Macht zu ergreifen, und setzt Petar Živković als Regenten ein. Živković gründet die §PSrpska radikalna seljačka demokratija§!, also die Serbische Radikale Bauern-Demokratie, und verbietet alle anderen politischen Parteien.\nMit der Gründung Jugoslawiens formierte sich die Bewegung nach und nach zur §PJugoslavenska nacionalna stranka§!, also zur Jugoslawischen Nationalpartei."
 RULE_OPTION_SER_PATH_MON_NOT_PATAUT_DESC: "Die royalistische Weiße Hand übernimmt kurz nach der Wahl durch einen Staatsstreich die Macht und setzt Petar Živković als Regenten ein.\nIn den nächsten vier Jahren wird die"
 RULE_OPTION_SER_PATH_NATPOP: "£KR_game_rule_flag_SER_mon   Royalistischer Putsch - Nationale Bewegung"
 RULE_OPTION_SER_PATH_NATPOP_DESC: "$die Macht über die Regentschaft ging nach und nach in die Hände von Dimitrije Ljotićs §nSrpski narodni pokret \"Buđenje\"§!, also der Serbischen Nationalbewegung \"Erwachen\" über, aus der später die §nZdružena borbena organizacija rada§!, also die Vereinigte Aktive Arbeiterorganisation, hervorging.\nMit der Gründung Jugoslawiens formierte sich die Bewegung nach und nach zur §nJugoslavenska nacionalna stranka§!, also zur Jugoslawischen Nationalpartei."
 RULE_OPTION_SER_PATH_MON_DEM_DESC: "$RULE_OPTION_SER_PATH_MON_NOT_PATAUT_DESC$ der Machtkampf hinter den Kulissen zwischen den beiden Fraktionen der Regentschaft ermöglicht das Erstarken einer dritten Fraktion unter der Führung von Petar II. Als Petar Anfang 1941 volljährig wird, kommt es zu einem weiteren Staatsstreich, und es wird eine konstitutionelle Monarchie errichtet."
 RULE_OPTION_SER_PATH_MON_SOCLIB: "£KR_game_rule_flag_SER_mon  März-Verschwörung - Demokraten"
 RULE_OPTION_SER_PATH_MON_SOCLIB_DESC: "$RULE_OPTION_SER_PATH_MON_DEM_DESC$\nDie §lSrpska demokratska stranka§!, die Serbische Demokratische Partei, kommt an die Macht.\nNach der Gründung Jugoslawiens gründeten sie die SdJugoslavenska demokratska stranka, also die Jugoslawische Demokratische Partei.$SER_PATH_MARCH_REQUIREMENTS$"
 RULE_OPTION_SER_PATH_SOCCON: "£KR_game_rule_flag_SER_mon  März-Verschwörung - Radikale"
 RULE_OPTION_SER_PATH_SOCCON_DESC: "$RULE_OPTION_SER_PATH_MON_DEM_DESC$\nEine neu gegründete §cNarodna radikalna stranka§!, also die Radikale Volkspartei, kommt an die Macht und behält diese auch nach der Gründung Jugoslawiens.$SER_PATH_MARCH_REQUIREMENTS$"

 BPL_DISSOLUTION: "£KR_game_rule_flag_SER  £KR_game_rule_flag_ROM  £KR_game_rule_flag_GRE  Auflösung des Belgrader Paktes"
 BPL_DISSOLUTION_REQUIREMENTS: "$BUL_LOSS_PATH_REQUIREMENTS$\n§RNot§! §CCantacuzino – Legionäre§! in §Y$ROM_PATH$§!"
 BPL_DISSOLUTION_GRE_REQUIREMENTS: "$BUL_LOSS_PATH_REQUIREMENTS$\n\nIf any §CRevolution§! in §Y$GRE_REFERENDUM$§!, then Serbia must choose §CSozialistische Arbeiter§! in\n§Y$SER_PATH$§!\n\n§RNot§! §CCantacuzino – Legionäre§! in §Y$ROM_PATH$§!"
 RULE_OPTION_BPL_DISSOLUTION_RANDOM: "Standard"
 RULE_OPTION_BPL_DISSOLUTION_RANDOM_DESC: "Der Belgrader Pakt war ursprünglich ein Zweckbündnis zwischen potenziell ideologisch unterschiedlichen Nachbarn, in dem sich Serbien, Rumänien und Griechenland zusammenschlossen, um gegen die Bulgaren vorzugehen. Zwar könnte Griechenland nach der Niederlage Bulgariens aus der Fraktion austreten, doch müssen Serbien und Rumänien entscheiden, ob sie ihr kleines Bündnis auflösen und sich einem größeren anschließen oder als eigenständiger Block zusammenbleiben wollen."
 RULE_OPTION_BPL_DISSOLUTION_GRE_DESC: "Nachdem Griechenland nach der Niederlage Bulgariens im Vierten Balkankrieg den Belgrader Pakt verlässt,"
 RULE_OPTION_BPL_DISSOLUTION_KEEP: "£KR_game_rule_flag_SER  £KR_game_rule_flag_ROM  Pakt einhalten"
 RULE_OPTION_BPL_DISSOLUTION_KEEP_DESC: "$RULE_OPTION_BPL_DISSOLUTION_GRE_DESC$ Serbien und Rumänien bleiben Verbündete und schließen sich keiner anderen Fraktion an.$BPL_DISSOLUTION_REQUIREMENTS$"
 RULE_OPTION_BPL_DISSOLUTION_AUS_BEATEN: "£KR_game_rule_flag_SER  £KR_game_rule_flag_ROM  Habsburg besiegt"
 RULE_OPTION_BPL_DISSOLUTION_AUS_BEATEN_DESC: "$RULE_OPTION_BPL_DISSOLUTION_GRE_DESC$ Serbien und Rumänien halten ihr Bündnis aufrecht, bis die Österreicher besiegt sind, dann können sie getrennte Wege gehen.$BPL_DISSOLUTION_REQUIREMENTS$"
 RULE_OPTION_BPL_DISSOLUTION_INT_BEATEN: "£KR_game_rule_flag_SER  £KR_game_rule_flag_ROM  Die alte Ordnung"
 RULE_OPTION_BPL_DISSOLUTION_INT_BEATEN_DESC: "$RULE_OPTION_BPL_DISSOLUTION_GRE_DESC$ Serbien und Rumänien halten an ihrem Bündnis fest, bis die Pariser Kommune und die Union von Britannien besiegt sind und die Entente nach Europa zurückgekehrt ist; zu diesem Zeitpunkt könnten sie sich mit einer der alten Großmächte verbünden.$BPL_DISSOLUTION_REQUIREMENTS$"
 RULE_OPTION_BPL_DISSOLUTION_GRE_KEEP: "£KR_game_rule_flag_SER  £KR_game_rule_flag_ROM  £KR_game_rule_flag_GRE  Pakt einhalten"
 RULE_OPTION_BPL_DISSOLUTION_GRE_KEEP_DESC: "Serbien, Rumänien und Griechenland bleiben Verbündete und schließen sich keiner anderen Fraktion an.$BPL_DISSOLUTION_GRE_REQUIREMENTS$"
 RULE_OPTION_BPL_DISSOLUTION_GRE_AUS_BEATEN: "£KR_game_rule_flag_SER  £KR_game_rule_flag_ROM  £KR_game_rule_flag_GRE  Habsburg besiegt"
 RULE_OPTION_BPL_DISSOLUTION_GRE_AUS_BEATEN_DESC: "Serbien, Rumänien und Griechenland halten ihr Bündnis aufrecht, bis die Österreicher besiegt sind, dann können sie getrennte Wege gehen.$BPL_DISSOLUTION_GRE_REQUIREMENTS$"
 RULE_OPTION_BPL_DISSOLUTION_GRE_INT_BEATEN: "£KR_game_rule_flag_SER  £KR_game_rule_flag_ROM  £KR_game_rule_flag_GRE  Die alte Ordnung"
 RULE_OPTION_BPL_DISSOLUTION_GRE_INT_BEATEN_DESC: "Serbien, Rumänien und Griechenland halten an ihrem Bündnis fest, bis die Pariser Kommune und die Union von Britannien besiegt sind und die Entente nach Europa zurückgekehrt ist; erst dann könnten sie sich mit einer der alten Großmächte verbünden.$BPL_DISSOLUTION_GRE_REQUIREMENTS$"

 ROM_GAME: "£KR_game_rule_flag_ROM  Das große Spiel"
 RULE_OPTION_ROM_GAME_RANDOM: "Standard"
 RULE_OPTION_ROM_GAME_RANDOM_DESC: "Zu Beginn des Jahres 1936 tritt der Kampf zwischen den beiden konkurrierenden Führern des Landes, König Carol II. und Premierminister Codreanu, in eine neue Phase ein. Die beiden sind schon seit einiger Zeit festgefahren und haben keinen Platz mehr, um sich gegenseitig aus dem Weg zu gehen. Immer häufiger prallen sie frontal aufeinander und es wird immer schwieriger, die Fassade der Zusammenarbeit aufrechtzuerhalten.\nDerzeit wird sowohl dem König als auch dem Hauptmann bewusst, dass die Zeit näher rückt, in der sie den jeweils anderen endgültig ausschalten müssen. Da ein Zusammenprall zwischen den beiden Persönlichkeiten bevorsteht, sehen sich die Menschen zunehmend gezwungen, Partei zu ergreifen oder allein die Konsequenzen ihrer Neutralität zu tragen."
 RULE_OPTION_ROM_GAME_START_DESC: "Rumänien navigiert durch seinen Schwerpunktbaum aus der Perspektive von"
 RULE_OPTION_ROM_GAME_IRON_GUARD: "£KR_game_rule_flag_ROM  Legionäre"
 RULE_OPTION_ROM_GAME_IRON_GUARD_DESC: "$RULE_OPTION_ROM_GAME_START_DESC$ Codreanu und seine §nLegiunea Arhanghelului Mihail§!, also die Legion des Erzengels Michael."
 RULE_OPTION_ROM_GAME_CAROL: "£KR_game_rule_flag_ROM  Carol II"
 RULE_OPTION_ROM_GAME_CAROL_DESC: "$RULE_OPTION_ROM_GAME_START_DESC$ König Carol und seine §PCamarila Regală§!, also königliche Camarilla."

 ROM_PATH: "£KR_game_rule_flag_ROM  Rumäniens Schicksal"
 ROM_PATH_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CRomania is united with Transylvania§!"
 RULE_OPTION_ROM_PATH_RANDOM: "Standard"
 RULE_OPTION_ROM_PATH_RANDOM_DESC: "Im Laufe der Zeit spitzt sich der Konflikt zwischen Codreanu und Carol II. zu... wer wird als Sieger hervorgehen?"
 RULE_OPTION_ROM_PATH_PATAUT: "£KR_game_rule_flag_ROM  Carol – Nationale Wiedergeburts-Front"
 RULE_OPTION_ROM_PATH_PATAUT_DESC: "König Carol II. und seine §PCamarila Regală§!, also die kaiserliche Camarilla, gehen als Gesamtsieger aus dem Großen Spiel hervor.\nSpäter formiert Carol seine Camarilla zur §PFrontul Renaşterii Naţionale§!, also zur Nationalen Wiedergeburtsfront, um.$ROM_PATH_REQUIREMENTS$"
 RULE_OPTION_ROM_PATH_NATPOP: "£KR_game_rule_flag_ROM  Nicolae – Legionäre"
 RULE_OPTION_ROM_PATH_NATPOP_DESC: "Codreanu und seine §nLegiunea Arhanghelului Mihail§!, also die Legion des Erzengels Michael, gehen als Gesamtsieger aus dem Großen Spiel hervor.\nCarols Bruder Nicolae, ein bekannter Sympathisant der Legion, wird zum König Nicolae I. gekrönt.$ROM_PATH_REQUIREMENTS$"
 RULE_OPTION_ROM_DEM_DESC: "Da weder sein Vater noch die Legion den Sieg davongetragen haben, regiert König Michael I. Rumänien, nachdem der Staub sich gelegt hat. Der junge König führt sein Land zur Demokratie zurück."
 RULE_OPTION_ROM_DEM_END_DESC: "sich innerhalb seiner Partei durchsetzen und die Wahl gewinnen."
 RULE_OPTION_ROM_PATH_SOCDEM: "£KR_game_rule_flag_ROM  Mihai – Bauernpartei (links)"
 RULE_OPTION_ROM_PATH_SOCDEM_DESC: "$RULE_OPTION_ROM_DEM_DESC$\nVirgil Madgearus §SAripa de Stânga a Partidul National Taranesc§!, also der linke Flügel der Nationalen Bauernpartei, der sich zum Ziel gesetzt hat, die Landwirtschaft und die Arbeiter zu unterstützen, $RULE_OPTION_ROM_DEM_END_DESC$$ROM_PATH_REQUIREMENTS$"
 RULE_OPTION_ROM_PATH_SOCLIB: "£KR_game_rule_flag_ROM  Mihai – Bauernpartei (Zentrum)"
 RULE_OPTION_ROM_PATH_SOCLIB_DESC: "$RULE_OPTION_ROM_DEM_DESC$\nIuliu Manius §lAripa de Centru a Partidul National Taranesc§!, also der Zentrumsflügel der Nationalen Bauernpartei, der sich auf den Korporatismus konzentrierte, $RULE_OPTION_ROM_DEM_END_DESC$$ROM_PATH_REQUIREMENTS$"
 RULE_OPTION_ROM_PATH_SOCCON: "£KR_game_rule_flag_ROM  Mihai – Bauernpartei (rechts)"
 RULE_OPTION_ROM_PATH_SOCCON_DESC: "$RULE_OPTION_ROM_DEM_DESC$\nAlexandru Vaida-Voevods §cAripa de Dreapta a Partidul National Taranesc§!, also der rechte Flügel der Nationalen Bauernpartei, der der regionalen Entwicklung Vorrang einräumt,$RULE_OPTION_ROM_DEM_END_DESC$$ROM_PATH_REQUIREMENTS$"
 RULE_OPTION_ROM_PATH_MARLIB: "£KR_game_rule_flag_ROM  Mihai – Nationalliberale"
 RULE_OPTION_ROM_PATH_MARLIB_DESC: "$RULE_OPTION_ROM_DEM_DESC$\nDie §mPartidul National-Liberal§!, also der Nationalliberalen Partei, kehrt mit ihrem Zentralisierungsprogramm in die Politik zurück und gewinnt die Wahlen.$ROM_PATH_REQUIREMENTS$"
 RULE_OPTION_ROM_PATH_ELECTED_NATPOP: "£KR_game_rule_flag_ROM  Mihai – Legionäre"
 RULE_OPTION_ROM_PATH_ELECTED_NATPOP_DESC: "$RULE_OPTION_ROM_DEM_DESC$\nObwohl die Legion im Großen Spiel besiegt wurde, war ihre Macht nicht vollständig gebrochen, und es gelang ihr, die Wahlen unter dem Namen §nTotul pentru Ţară§!, also der Partei Alles für das Vaterland, zu gewinnen.$ROM_PATH_REQUIREMENTS$"
 RULE_OPTION_ROM_PATH_CANTACUZINO_NATPOP: "£KR_game_rule_flag_ROM_natpop  Cantacuzino – Legionäre"
 RULE_OPTION_ROM_PATH_CANTACUZINO_NATPOP_DESC: "Nach dem verheerenden Ende des Großen Spiels findet die §nLegion des Erzengels Michael§! in ihren radikalsten Sekten einen neuen Anführer. Alexandru Cantacuzino, der Grüne Prinz, tritt in den Vordergrund, entmachtet den ausländischen Monarchen und ernennt sich selbst zum Regenten.$ROM_PATH_REQUIREMENTS$"

 GRE_ELECTION: "£KR_game_rule_flag_GRE  Griechische Wahlen"
 RULE_OPTION_GRE_ELECTION_RANDOM: "Standard"
 RULE_OPTION_GRE_ELECTION_RANDOM_DESC: "Die Wahlen von 1938 sollten die letzten in der Republik vor dem Referendum über die Wiedereinführung der Monarchie sein."
 RULE_OPTION_GRE_ELECTION_SOCCON: "£KR_game_rule_flag_GRE  Volkspartei"
 RULE_OPTION_GRE_ELECTION_SOCCON_DESC: "§cLaïkón Kómma§!, also die Volkspartei, gewinnt die Wahlen von 1938 sowie alle darauf folgenden Wahlen."
 RULE_OPTION_GRE_ELECTION_MARLIB: "£KR_game_rule_flag_GRE  Liberale"
 RULE_OPTION_GRE_ELECTION_MARLIB_DESC: "§mKómma Fileléftheron§!, also die Liberale Partei, gewinnt die Wahlen von 1938 und alle weiteren Wahlen, die danach stattfinden."
 RULE_OPTION_GRE_ELECTION_SOCLIB: "£KR_game_rule_flag_GRE  Neue Liberale Union"
 RULE_OPTION_GRE_ELECTION_SOCLIB_DESC: "§lNéa Fileléftheri Énosi§!, also die Neue Liberale Union, gewinnt die Wahlen von 1938 und alle weiteren Wahlen, die danach stattfinden."
 RULE_OPTION_GRE_ELECTION_SOCDEM: "£KR_game_rule_flag_GRE  Nationale Einheitspartei"
 RULE_OPTION_GRE_ELECTION_SOCDEM_DESC: "Die §SEthnikón Enotikón Kómma§!, also die Nationale Einheitspartei, gewinnt die Wahlen von 1938. Die Neue Liberale Union, die nach dem Referendum über die Monarchie an Bedeutung verloren hatte, gewinnt keine der darauf folgenden Wahlen mehr."
 RULE_OPTION_GRE_ELECTION_SOC: "£KR_game_rule_flag_GRE_soc  Ländliche Demokraten / Sozialdemokraten"
 RULE_OPTION_GRE_ELECTION_SOC_DESC: "Die Partei der Nationalen Einheit gewinnt die Wahlen von 1938. Sollten die Monarchisten das Referendum zur Wiedereinführung der Monarchie gewinnen, ohne dass es zu einem Bürgerkrieg kommt, schließt sich die Linke um die agrarische §RAgrotikó Dimokratikó Métopo§!, also die Ländliche Demokratische Union, zusammen, die die Wahlen von 1942 gewinnt.\nSollten die Republikaner das Referendum über die Monarchie ohne Bürgerkrieg gewinnen, wird die §rKoinonikó Ergatikó Kómma tis Elládas§!, also die Sozialistische Arbeiterpartei Griechenlands, 1942 demokratisch gewählt.\n\n§RBenötigt:§!\n§König Aléxandros§! oder §Republik§! in §Y$GRE_REFERENDUM$§!\n\n§CAnmerkung: Griechenland verlässt seine Fraktion, sollte diese nicht von Sozialisten geführt werden.§!"

GRE_REFERENDUM: "£KR_game_rule_flag_GRE   Das Referendum zur Monarchie"
RULE_OPTION_GRE_REFERENDUM_RANDOM: "Standard"
RULE_OPTION_GRE_REFERENDUM_RANDOM_DESC: "Die Ergebnisse des Referendums, wenn es stattfindet, werden normal ermittelt."
RULE_OPTION_GRE_REFERENDUM_ALEXANDROS_DEM: "£KR_game_rule_flag_GRE_mon   König Aléxandros"
RULE_OPTION_GRE_REFERENDUM_ALEXANDROS_DEM_DESC: "Als das Referendum stattfindet, gewinnen die Monarchisten und setzen Aléxandros als konstitutionellen Monarchen wieder auf den Thron."
RULE_OPTION_GRE_REFERENDUM_ALEXANDROS_AUTDEM: "£KR_game_rule_flag_GRE_mon   König Aléxandros – Neuer Staat"
RULE_OPTION_GRE_REFERENDUM_ALEXANDROS_AUTDEM_DESC: "Als das Referendum stattfindet, gewinnen die Monarchisten und setzen Aléxandros als autoritären Monarchen wieder auf den Thron, der mit §aNéo Krátos§!, also der Partei des Neuen Staates, regiert."
RULE_OPTION_GRE_REFERENDUM_GEORGIOS_AUTDEM: "£KR_game_rule_flag_GRE_mon  König Geórgios"
RULE_OPTION_GRE_REFERENDUM_GEORGIOS_AUTDEM_DESC: "Als das Referendum stattfindet, gewinnen die Monarchisten und wählen Geórgios zum König, der mit der Partei §aNeuer Staat§ regiert!"
RULE_OPTION_GRE_REFERENDUM_REP: "£KR_game_rule_flag_GRE   Republik"
RULE_OPTION_GRE_REFERENDUM_REP_DESC: "Wenn das Referendum stattfindet, gewinnt die Republik. Die anschließenden Wahlen werden normal durchgeführt."
 RULE_OPTION_GRE_REFERENDUM_PATAUT_START_DESC: "Wenn das Referendum stattfindet, wird es zugunsten der republikanischen Sache manipuliert – und Ioannis Metaxas"
 RULE_OPTION_GRE_REFERENDUM_METAXAS_PATAUT: "£KR_game_rule_flag_GRE  Metaxas"
 RULE_OPTION_GRE_REFERENDUM_METAXAS_PATAUT_DESC: "$RULE_OPTION_GRE_REFERENDUM_PATAUT_START_DESC$, der Vorsitzende der §PKómma ton Eleftherofrónon§!, also der Freidenkerpartei, stürzt daraufhin die Regierung."
 RULE_OPTION_GRE_REFERENDUM_PAVLOS_PATAUT: "£KR_game_rule_flag_GRE_mon  König Pávlos"
 RULE_OPTION_GRE_REFERENDUM_PAVLOS_PATAUT_DESC: "$RULE_OPTION_GRE_REFERENDUM_PATAUT_START_DESC$ stürzt daraufhin die Regierung. Er setzt König Pávlos I. als autokratischen Monarchen mit der §PKómma ton Eleftherofrónon§! ein."
 RULE_OPTION_GRE_REFERENDUM_REVOLUTION_DESC: "Wenn das Referendum stattfindet, wird es zugunsten der monarchistischen Sache manipuliert, was die Syndikalisten dazu veranlasst, die Regierung zu stürzen. Dies führt zu einem Bürgerkrieg gegen ihre Machtübernahme."
 RULE_OPTION_GRE_REFERENDUM_SYNDIE: "£KR_game_rule_flag_GRE_soc  Revolution - Soziale Arbeiter"
 RULE_OPTION_GRE_REFERENDUM_SYNDIE_DESC: "$RULE_OPTION_GRE_REFERENDUM_REVOLUTION_DESC$ Die §rKoinonikó Ergatikó Kómma tis Elládas§!, also die Sozialistische Arbeiterpartei Griechenlands unter Nikos Zachariadis, spielt auf dem Ersten Griechischen Kongress weiterhin eine herausragende Rolle"
 RULE_OPTION_GRE_REFERENDUM_TOTALIST: "£KR_game_rule_flag_GRE_soc  Revolution - Nationale Befreiungsfront"
 RULE_OPTION_GRE_REFERENDUM_TOTALIST_DESC: "$RULE_OPTION_GRE_REFERENDUM_REVOLUTION_DESC$ Athanasios Klaras’ §oEthnikó Apeleftherotikó Métopo tis Elládas§!, also die Nationale Befreiungsfront Griechenlands, gewann auf dem Ersten Griechischen Kongress an Bedeutung."

 GRE_FORPOL: "£KR_game_rule_flag_GRE  Griechische Außenpolitik"
 GRE_FORPOL_REQUIREMENTS: "\n\n§RBenötigt:§!\nWenn §CTraditionelle Ansprüche§! oder §CDie Megali Idee wiederbeleben§! in §Y$GRE_EXPANSIONISM$§!, dann nein"
 GRE_FORPOL_START_REQUIREMENTS: "$GRE_FORPOL_REQUIREMENTS$ ein nicht-sozialistisches Land, auf dessen Territorium Griechenland Anspruch erhebt und das sich nicht bereits im Krieg befindet mit"
 GRE_FORPOL_END_REQUIREMENTS: "entweder Mitglied der Entente, des Reichspakts oder des Donau-Adriabunds ist oder von einer dieser drei Fraktionen garantiert wird\n\n§RKeine§! §RCevolution§! beim §Y$GRE_REFERENDUM$§!"
 RULE_OPTION_GRE_FORPOL_RANDOM: "Standard"
 RULE_OPTION_GRE_FORPOL_RANDOM_DESC: "Das im Weltkrieg besiegte Griechenland muss mit politischer Instabilität und der Abspaltung so vieler seiner Bürger vom griechischen Staat fertig werden. Nach dem Austritt aus dem Belgrader Pakt muss Griechenland nach außen blicken, um diese Schwierigkeiten zu lösen – aber an wen?"
 RULE_OPTION_GRE_FORPOL_ENT: "£KR_game_rule_flag_GRE  £KR_game_rule_flag_CAN  Entente"
 RULE_OPTION_GRE_FORPOL_ENT_DESC: "Nach dem Austritt aus dem Belgrader Pakt schließt sich Griechenland wieder seinen alten Verbündeten aus dem Weltkrieg an.$GRE_FORPOL_START_REQUIREMENTS$ der Entente befindet, entweder Mitglied der Entente, $GRE_FORPOL_END_REQUIREMENTS$"
 RULE_OPTION_GRE_FORPOL_GER: "£KR_game_rule_flag_GRE  £KR_game_rule_flag_GER  Reichspakt"
 RULE_OPTION_GRE_FORPOL_GER_DESC: "Nachdem Griechenland den Belgrader Pakt verlassen hat, verbündet es sich mit seinen alten Feinden, den Deutschen, nachdem der Zweite Weltkrieg begonnen hat.$GRE_FORPOL_START_REQUIREMENTS$ Deutschland, $GRE_FORPOL_END_REQUIREMENTS$"
 RULE_OPTION_GRE_FORPOL_AUS: "£KR_game_rule_flag_GRE  £KR_game_rule_flag_AUS  Donau-Adriabund"
 RULE_OPTION_GRE_FORPOL_AUS_DESC: "Nach dem Austritt aus dem Belgrader Pakt verbündet sich Griechenland mit dem Hegemon auf dem Balkan.$GRE_FORPOL_START_REQUIREMENTS$ Östereich, $GRE_FORPOL_END_REQUIREMENTS$"
 RULE_OPTION_GRE_FORPOL_RUS: "£KR_game_rule_flag_GRE  £KR_game_rule_flag_RUS  Moskauer Abkommen"
 RULE_OPTION_GRE_FORPOL_RUS_DESC: "Nach dem Austritt aus dem Belgrader Pakt sucht Griechenland nach Gemeinsamkeiten mit seinen Brüdern in der orthodoxen Kirche.$GRE_FORPOL_REQUIREMENTS$ Land, dessen Land Griechenland beansprucht, das sich nicht bereits im Krieg mit Russland befindet, entweder Mitglied des Moskauer Abkommens ist oder von Russland garantiert wird und entweder\n\nRussland muss sich für ein Scheitern des §Y$OTT_RUS_CONVENTION$§! entscheiden\noder §CGriechenland hat nicht alle seine beanspruchten Gebiete zurückerhalten\n$RUS_AFTERMATH_NOT_SOC_REQUIREMENTS$\n§RKeine§! §CRevolution§! in §Y$GRE_REFERENDUM$§!"

 GRE_EXPANSIONISM: "£KR_game_rule_flag_GRE   Griechischer Expansionismus"
 RULE_OPTION_GRE_EXPANSIONISM_RANDOM: "Standard"
 RULE_OPTION_GRE_EXPANSIONISM_RANDOM_DESC: "Hunderttausende Griechen leben im Ausland, und Griechenland sieht sich veranlasst, sie in ihre Heimat zurückzuholen."
 RULE_OPTION_GRE_EXPANSIONISM_DIPLO: "£KR_game_rule_flag_GRE   Diplomatie"
 RULE_OPTION_GRE_EXPANSIONISM_DIPLO_DESC: "Griechenland beschließt, den Weg der Diplomatie einzuschlagen, in der Hoffnung, seine Differenzen mit den Osmanen friedlich beizulegen."
 RULE_OPTION_GRE_EXPANSIONISM_MEGALI_SMALL: "£KR_game_rule_flag_GRE   Traditionelle Ansprüche"
 RULE_OPTION_GRE_EXPANSIONISM_MEGALI_SMALL_DESC: "Griechenland versucht, seine Grenzen zu erweitern, beschränkt sich jedoch auf die traditionellen Ansprüche. Griechenland beschließt, den Weg der Diplomatie einzuschlagen, in der Hoffnung, seine Differenzen mit den Osmanen friedlich beizulegen.\n\n§CHinweis: Ist Griechenland zum Zeitpunkt dieser Entscheidung Mitglied der Entente, des Reichspakts oder des Donau-Adriabunds, wird es aus der Fraktion ausgeschlossen und kann ihr nicht erneut beitreten.§!"
 RULE_OPTION_GRE_EXPANSIONISM_MEGALI_BIG: "£KR_game_rule_flag_GRE   Wiederbelebung der Megali-Idee"
 RULE_OPTION_GRE_EXPANSIONISM_MEGALI_BIG_DESC: "Griechenland versucht, seine Grenzen zu erweitern und die Megali Idee wieder vollständig zum Leben zu erwecken.\n\n§CHinweis: Ist Griechenland zum Zeitpunkt dieser Entscheidung Mitglied der Entente, des Reichspakts oder des Donau-Adriabunds, wird es aus der Fraktion ausgeschlossen und kann ihr nicht erneut beitreten.§!"

### Länderpfade - Afrika ###
RULE_GROUP_KAISERREICH_RULES_AFRICA: "Länderpfade - Afrika"

NFA_PATH: "£KR_game_rule_flag_NFA   Die Republik im Exil"
RULE_OPTION_NFA_PATH_RANDOM: "Standard"
 RULE_OPTION_NFA_PATH_RANDOM_DESC: "Wie wird das Schicksal der französischen Exilanten aussehen? Militärreformer und Demokraten wollen das Regime aufrütteln und zu den Wurzeln der Dritten Republik zurückkehren … oder eine effizientere Vierte Republik ins Leben rufen.\nIm Gegenteil, die integralistischen Reaktionäre machen die Republik für das Jahrhundert der Not des Landes verantwortlich und glauben, dass nur der König Frankreich retten könne.\nSchließlich ist Marschall Pétain, obwohl er mittlerweile hochbetagt ist, nach wie vor davon überzeugt, dass er der einzige Mann ist, der Frankreich zur Wiedergeburt führen kann: Neue Verbündete könnten ihm helfen, das Mutterland endlich vollständig neu zu gestalten."
 RULE_OPTION_NFA_PATH_DEM_DESC: "Das Feuer der Dritten Republik lodert in Algier weiterhin hell!\nEine zivile Mehrparteienregierung löst die provisorische Militärverwaltung von Marschall Pétain ab."
 RULE_OPTION_NFA_PATH_SUS_SOCCON: "£KR_game_rule_flag_NFA  Zweite Union Sacrée – Koalition"
 RULE_OPTION_NFA_PATH_SUS_SOCCON_DESC: "$RULE_OPTION_NFA_PATH_DEM_DESC$ Entgegen aller Erwartungen bleibt die von der §cParti Social Français§!, also der Französischen Sozialpartei, angeführte Regierungskoalition bestehen, wobei die Partei mit der Parti Républicain Démocrate und der Parti Radical zusammenarbeitet."
 RULE_OPTION_NFA_PATH_PSF_SOCCON: "£KR_game_rule_flag_NFA  Zweite Union Sacrée - PSF"
 RULE_OPTION_NFA_PATH_PSF_SOCCON_DESC: "$RULE_OPTION_NFA_PATH_DEM_DESC$ Die §cParti Social Français§!, also die Französische Sozialpartei, etabliert sich als Massenpartei und entlässt im Zuge ihres Wachstums ihre Koalitionspartner in der Regierung."
 RULE_OPTION_NFA_PATH_MARLIB: "£KR_game_rule_flag_NFA  Zweite Union Sacrée - PRD"
 RULE_OPTION_NFA_PATH_MARLIB_DESC: "$RULE_OPTION_NFA_PATH_DEM_DESC$ Die §mParti Républicain Démocrate§, also die Demokratisch-Republikanische Partei, steht an der Spitze der Concentration Républicaine, einer demokratischen Koalition der alten republikanischen Eliten, nachdem die PSF durch die fortschreitende Parlamentarisierung an den Rand gedrängt wurde."
 RULE_OPTION_NFA_PATH_AUTDEM: "£KR_game_rule_flag_NFA  Nationales Rettungskomitee"
 RULE_OPTION_NFA_PATH_AUTDEM_DESC: "Auch wenn die Demokratie die Zukunft Frankreichs ist, braucht es eine straffere Führung, um das Schiff wieder in den Hafen zu steuern!\nEs wird das §aComité du Salut National§, also das Nationale Rettungsgremium, gegründet, das verspricht, nach der Rückeroberung der Metropole die Demokratie wiederherzustellen."
 RULE_OPTION_NFA_PATH_PATAUT: "£KR_game_rule_flag_NFA  Französischen Erneuerung"
 RULE_OPTION_NFA_PATH_PATAUT_DESC: "Alle politischen Querelen müssen beiseite gelegt werden, und die Regierung muss an unparteiische Außenstehende übergeben werden!\nMarschall Philippe Pétain arbeitet mit dem §PRedressement Français§! – der französischen Erneuerung – zusammen, um alle Gedanken an eine Rückkehr zur Demokratie zu verwerfen und gemeinsam mit Industriellen und Unternehmen die Rückeroberung der Métropole voranzutreiben."
 RULE_OPTION_NFA_PATH_NATPOP: "£KR_game_rule_flag_NFA_mon  Aktion Française"
 RULE_OPTION_NFA_PATH_NATPOP_DESC: "Demokratie und Liberalismus haben Frankreich in die Knie gezwungen, und nur die Monarchie kann Frankreich zu seinem früheren Glanz zurückführen!\n§nAction Française§!, also die Französische Aktion, übernimmt die Macht im Regime von Algier und krönt Jean III."

 CHA_REVOLT: "£KR_game_rule_flag_CHA  Der Tschad-Aufstand"
 RULE_OPTION_NFA_REVOLT_START_DESC: "Trotz des Verlusts der Métropole hat die Regierung der Französischen Republik ihre Arbeit in Algier fortgesetzt, und die Bevölkerung von"
 RULE_OPTION_NFA_REVOLT_MID_DESC: "unter dem französischen Joch zu bleiben. Ein wachsendes Nationalbewusstsein, die überlasteten Ressourcen des Regimes in Algier und die Unterstützung durch antikoloniale Mächte könnten genau das sein, was nötig ist, um"
 RULE_OPTION_NFA_REVOLT_END_DESC: "sich ein für alle Mal gegen die Franzosen zu erheben."
 RULE_OPTION_CHA_REVOLT_RANDOM: "Standard"
 RULE_OPTION_CHA_REVOLT_RANDOM_DESC: "$RULE_OPTION_NFA_REVOLT_START_DESC$ Tschad $RULE_OPTION_NFA_REVOLT_MID_DESC$ Tschad $RULE_OPTION_NFA_REVOLT_END_DESC$"
 RULE_OPTION_NFA_REVOLT_NO_START_DESC: "Den Franzosen gelingt es, die Unruhen vor Ort zu unterdrücken, und die Bevölkerung von"
 RULE_OPTION_NFA_REVOLT_NOTE_DESC: "§CHinweis: Diese Spielregel gilt nicht, wenn ein menschlicher Spieler die Französische Republik steuert.§!"
 RULE_OPTION_NFA_REVOLT_NO_END_DESC: "weiterhin unter französischer Herrschaft leben.\n\n$RULE_OPTION_NFA_REVOLT_NOTE_DESC$"
 RULE_OPTION_CHA_REVOLT_NO: "£KR_game_rule_flag_NFA  Kein Aufstand"
 RULE_OPTION_CHA_REVOLT_NO_DESC: "$RULE_OPTION_NFA_REVOLT_NO_START_DESC$ Tschad $RULE_OPTION_NFA_REVOLT_NO_END_DESC$"
 RULE_OPTION_NFA_REVOLT_YES_END_DESC: "sich gegen die Franzosen erheben, entweder aus eigenem Antrieb oder irgendwann nach Juli 1939.\n\n$RULE_OPTION_NFA_REVOLT_NOTE_DESC$"
 RULE_OPTION_CHA_REVOLT_YES: "£KR_game_rule_flag_CHA  £KR_game_rule_flag_NFA  Aufstand"
 RULE_OPTION_CHA_REVOLT_YES_DESC: "Die Bevölkerung des Tschad $RULE_OPTION_NFA_REVOLT_YES_END_DESC$"

 NGR_REVOLT: "£KR_game_rule_flag_NGR  Der Niger-Aufstand"
 RULE_OPTION_NGR_REVOLT_RANDOM: "Standard"
 RULE_OPTION_NGR_REVOLT_RANDOM_DESC: "$RULE_OPTION_NFA_REVOLT_START_DESC$ Niger $RULE_OPTION_NFA_REVOLT_MID_DESC$ Niger $RULE_OPTION_NFA_REVOLT_END_DESC$"
 RULE_OPTION_NGR_REVOLT_NO: "£KR_game_rule_flag_NFA  Kein Aufstand"
 RULE_OPTION_NGR_REVOLT_NO_DESC: "$RULE_OPTION_NFA_REVOLT_NO_START_DESC$ Niger $RULE_OPTION_NFA_REVOLT_NO_END_DESC$"
 RULE_OPTION_NGR_REVOLT_YES: "£KR_game_rule_flag_NGR  £KR_game_rule_flag_NFA  Aufstand"
 RULE_OPTION_NGR_REVOLT_YES_DESC: "Die Bevölkerung des Niger $RULE_OPTION_NFA_REVOLT_YES_END_DESC$"

 VOL_REVOLT: "£KR_game_rule_flag_VOL  Der Volta-Aufstand"
 RULE_OPTION_VOL_REVOLT_RANDOM: "Standard"
 RULE_OPTION_VOL_REVOLT_RANDOM_DESC: "$RULE_OPTION_NFA_REVOLT_START_DESC$ Obervolta $RULE_OPTION_NFA_REVOLT_MID_DESC$ Upper Volta $RULE_OPTION_NFA_REVOLT_END_DESC$"
 RULE_OPTION_VOL_REVOLT_NO: "£KR_game_rule_flag_NFA  Kein Aufstand"
 RULE_OPTION_VOL_REVOLT_NO_DESC: "$RULE_OPTION_NFA_REVOLT_NO_START_DESC$ Obervolta $RULE_OPTION_NFA_REVOLT_NO_END_DESC$"
 RULE_OPTION_VOL_REVOLT_YES: "£KR_game_rule_flag_VOL  £KR_game_rule_flag_NFA  Aufstand"
 RULE_OPTION_VOL_REVOLT_YES_DESC: "Die Bevölkerung von Obervolta $RULE_OPTION_NFA_REVOLT_YES_END_DESC$"

 MLI_REVOLT: "£KR_game_rule_flag_MLI  Der Mali-Aufstand"
 RULE_OPTION_MLI_REVOLT_RANDOM: "Standard"
