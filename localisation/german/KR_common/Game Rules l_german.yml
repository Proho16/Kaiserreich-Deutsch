 RULE_OPTION_HAW_PATH_SOCCON: "£KR_game_rule_flag_HAW  £KR_game_rule_flag_HAW_mon  Hui Aloha Aina"
 RULE_OPTION_HAW_PATH_SOCCON_DESC: "Die §cHui Aloha Aina§!, oder die Hawaiianische Patriotische Liga, gewinnt die Wahlen.$HAW_PATH_DEM_REQUIREMENTS$"
 RULE_OPTION_HAW_PATH_RADSOC: "£KR_game_rule_flag_HAW_soc  Sozialisten"
 RULE_OPTION_HAW_PATH_RADSOC_DESC: "The §RSocialist Party of Hawaii§! gewinnt die Wahlen.$HAW_PATH_SOC_REQUIREMENTS$"
 RULE_OPTION_HAW_PATH_SYNDIE: "£KR_game_rule_flag_HAW_soc  Hawaiianischer Gewerkschaftsbund"
