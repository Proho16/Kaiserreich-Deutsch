 RULE_OPTION_HAW_FORPOL_ENT: "£KR_game_rule_flag_HAW  £KR_game_rule_flag_CAN  Entente"
 RULE_OPTION_HAW_FORPOL_ENT_DESC: "Hawaii tritt der Entente bei.$HAW_PATH_DEM_REQUIREMENTS$"
 RULE_OPTION_HAW_FORPOL_INT: "£KR_game_rule_flag_HAW_soc  £KR_game_rule_flag_FRA  Internationale"
 RULE_OPTION_HAW_FORPOL_INT_DESC: "Hawaii tritt der Dritten Internationale bei.$HAW_PATH_SOC_REQUIREMENTS$"
 RULE_OPTION_HAW_FORPOL_CHN: "£KR_game_rule_flag_HAW_soc  £KR_game_rule_flag_LKT  China"
 RULE_OPTION_HAW_FORPOL_CHN_DESC: "Hawaii schließt sich der Dritten Internationale an, dann der Fraktion der Linken Kuomintang, nachdem diese China vereint hat.$HAW_PATH_SOC_REQUIREMENTS$\n\n§CDie Linke Kuomintang vereinigt China§!\n§RKeine§! §CHu Zongnans Fünfte Nationale Revolution§! in\n§Y$CHI_PATH$§!"

MEX_PATH: "£KR_game_rule_flag_MEX   Attentat auf Zapata"
RULE_OPTION_MEX_PATH_RANDOM: "Standard"
RULE_OPTION_MEX_PATH_RANDOM_DESC: "Ein Attentäter schießt auf den mexikanischen Präsidenten Zapata. Der Attentäter wird von der Präsidentengarde getötet, und Zapata wird zur Genesung in ein Krankenhaus gebracht. Ob er überlebt, steht auf einem anderen Blatt."
RULE_OPTION_MEX_PATH_MAXIMATO_TOTALIST: "£KR_game_rule_flag_MEX   Maximato"
RULE_OPTION_MEX_PATH_MAXIMATO_TOTALIST_DESC: "Plutarco Calles und seine §oPartido Nacional Revolucionario§!, oder Nationale Revolutionäre Partei, erobern nach Zapatas Tod den Nationalpalast und etablieren das Maximato."
RULE_OPTION_MEX_PATH_PATAUT: "£KR_game_rule_flag_MEX   Militärjunta"
 RULE_OPTION_MEX_PATH_PATAUT_DESC: "Die reaktionären Generäle Garza und Treviño übernehmen nach Zapatas Tod die Macht. Sie entscheiden sich dafür, die Macht in Form einer §PJunta Militar§!, oder Militärjunta, zu konsolidieren, anstatt die Demokratie wiederherzustellen."
RULE_OPTION_MEX_PATH_AUTDEM: "£KR_game_rule_flag_MEX   Nacionalistas"
 RULE_OPTION_MEX_PATH_AUTDEM_DESC: "Die reaktionären Generäle Garza und Treviño übernehmen nach Zapatas Tod die Macht. Später stellen sie die Demokratie wieder her und gründen die §aPartido Nacionalista Mexicano§!, die Mexikanische Nationalistische Partei."
RULE_OPTION_MEX_PATH_NATPOP: "£KR_game_rule_flag_MEX_natpop   Sinarquistas"
 RULE_OPTION_MEX_PATH_NATPOP_DESC: "Jose Antonia Urquizas §nUnión Nacional Sinarquista§!, oder Nationale Synarchistische Union, gewinnt an Popularität und führt nach der Machtübernahme durch Garza und Treviño einen erfolgreichen Staatsstreich durch."
RULE_OPTION_MEX_PATH_ELECTED_TOTALIST: "£KR_game_rule_flag_MEX   Revolucionarios Nacionales"
 RULE_OPTION_MEX_PATH_TOTALIST_DESC: "Plutarco Calles und die §oPartido Nacional Revolucionario§!, oder Nationale Revolutionäre Partei_ELECTED, gewinnen die Wahlen von 1937."
RULE_OPTION_MEX_PATH_SYNDIE: "£KR_game_rule_flag_MEX   Trabajadores (Arbeiter)"
 RULE_OPTION_MEX_PATH_SYNDIE_DESC: "Vicente Toledano und die §rPartido Mexicano de los Trabajadores§!, oder Mexikanische Arbeiterpartei, gewinnen die Wahlen von 1937."
RULE_OPTION_MEX_PATH_RADSOC: "£KR_game_rule_flag_MEX   Agrarios Nacionales (Nationale Agrarier)"
 RULE_OPTION_MEX_PATH_RADSOC_DESC: "Pancho Villa und die §RPartido Nacional Agrarista§!, oder Nationale Agrarpartei, gewinnen die Wahlen von 1937."
RULE_OPTION_MEX_PATH_SOCDEM: "£KR_game_rule_flag_MEX   Laboristas"
 RULE_OPTION_MEX_PATH_SOCDEM_DESC: "Pascual Rubio und die §SPartido Laborista Mexicano§!, oder Mexikanische Arbeiterpartei gewinnen die Wahlen von 1937"

 MEX_REVOLT: "£KR_game_rule_flag_YUC   Der Yucatek-Aufstand"
 RULE_OPTION_MEX_REVOLT_RANDOM: "Standard"
 RULE_OPTION_MEX_REVOLT_RANDOM_DESC: "In der zweiten Hälfte des 19. Jahrhunderts war Yucatán in einen Kastenkrieg verwickelt, doch nach der mexikanischen Revolution stabilisierte sich die Lage mit Hilfe der Sozialistischen Partei Yucatáns. Nach dem Militärputsch stellt sich die Frage nach der Zukunft der Region."
 RULE_OPTION_MEX_REVOLT_NO: "£KR_game_rule_flag_MEX   Keine Revolte"
 RULE_OPTION_MEX_REVOLT_NO_DESC: "Nachdem die Gesetze über die indigene Bevölkerung in Kraft bleiben, beruhigt sich Yucatán und der Aufstand bleibt aus. \n\n§RBenötigt:§!\n§CJunta Militar§! oder §CNacionalistas§! in §Y$MEX_PATH$§!"
 RULE_OPTION_MEX_REVOLT_YES: "£KR_game_rule_flag_MEX  £KR_game_rule_flag_YUC   Revolte"
 RULE_OPTION_MEX_REVOLT_YES_DESC: "Nach der Abschaffung der Gesetze über die indigene Bevölkerung kocht die Situation in Yucatán über und Yucatán trennt sich von Mexiko. \n\n§RBenötigt:§!\n§Junta Militar§! or §CNacionalistas§! oder §CSinarquistas§! in\n§Y$MEX_PATH$§!"

 YUC_PATH: "£KR_game_rule_flag_YUC   Yucatec Demokratie"
 YUC_PATH_REQUIREMENTS: "\n\n§RBenötigt:§!\n§Yucatán ist in seinem Unabhängigkeitskrieg erfolgreich.§!\n\n§CRevolte§! in §Y$MEX_REVOLT$§!"
 RULE_OPTION_YUC_PATH_RANDOM: "Standard"
 RULE_OPTION_YUC_PATH_RANDOM_DESC: "Nach dem Sieg gegen Mexiko im Unabhängigkeitskrieg sollen in der neu gegründeten Republik Wahlen abgehalten werden."
 RULE_OPTION_YUC_PATH_MARLIB: "£KR_game_rule_flag_YUC   Liberale"
 RULE_OPTION_YUC_PATH_MARLIB_DESC: "Die §mPartido Liberal§!, odr Liberale Partei, gewinnt die Wahlen.$YUC_PATH_REQUIREMENTS$"
 RULE_OPTION_YUC_PATH_SOCLIB: "£KR_game_rule_flag_YUC  Partido Alianza"
 RULE_OPTION_YUC_PATH_SOCLIB_DESC: "Die §lPartido Alianza por Yucatán§!, oder Allianzpartei für Yucatán, gewinnt die Wahlen.$YUC_PATH_REQUIREMENTS$"
 RULE_OPTION_YUC_PATH_SOCDEM: "£KR_game_rule_flag_YUC  Partido de la Revolucion Democrática"
 RULE_OPTION_YUC_PATH_SOCDEM_DESC: "The §SPartido de la Revolucion Democrática§!, oder Partei der Demokratischen Revolution, gewinnt die Wahlen.$YUC_PATH_REQUIREMENTS$"
 RULE_OPTION_YUC_PATH_RADSOC: "£KR_game_rule_flag_YUC  Socialistas"
 RULE_OPTION_YUC_PATH_RADSOC_DESC: "Die §RPartido Socialista de Yucatán§!, oder Sozialistische Partei von Yucatán, gewinnt die Wahlen. Sollte es eine Sozialistisches Zentralamerika geben, strebt Yucatán einen Beitritt an.$YUC_PATH_REQUIREMENTS$"

