 RULE_OPTION_MAF_BUSH_WAR_OUTCOME_MOZAMBIQUE_DESC: "Mittelafrika erobert ganz Mosambik.$MAF_BUSH_WAR_OUTCOME_VICTORY_REQUIREMENTS$"
 RULE_OPTION_MAF_BUSH_WAR_OUTCOME_ALL: "£KR_game_rule_flag_MAF  £KR_game_rule_flag_POR  Mosambik & Angola"
