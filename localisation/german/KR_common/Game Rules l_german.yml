 GAB_PATH: "£GFX_KR_game_rule_flag_GAB  Das Ende des Protektorats Gabun"
 GAB_PATH_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CDeutschland verliert den Zweiten Weltkrieg§! und\n§CRKA (Hardliner) – Karl Ritter§! in §Y$MAF_PATH$§! oder\n\n§CDer Provisorischen Regierung Deutschlands in Afrika gelingt es nicht, Deutschland zurückzuerobern, und sie bricht zusammen§!"
 RULE_OPTION_GAB_PATH_RANDOM: "Standard"
 RULE_OPTION_GAB_PATH_RANDOM_DESC: "Nach dem Zusammenbruch des deutschen Kolonialregimes erlangt Gabun endlich seine Freiheit.\nMit dem Ende des Protektorats bestimmt Gabun sowohl seine Regierungsform als auch seinen Platz in der Welt."
 RULE_OPTION_GAB_PATH_SOCCON: "£GFX_KR_game_rule_flag_GAB  Sozialkonservative"
 RULE_OPTION_GAB_PATH_SOCCON_DESC: "$RULE_OPTION_GAB_PATH_DEM_START_DESC$ Entente und die §cSozialkonservativen§! $RULE_OPTION_GAB_PATH_DEM_END_DESC$$GAB_PATH_REQUIREMENTS$"
 RULE_OPTION_GAB_PATH_DEM_START_DESC: "Gabuns Demokratie übersteht die Unruhen im Zusammenhang mit der Unabhängigkeitserklärung, und Gabriel Léon M'ba bleibt Präsident.\n$RULE_OPTION_GAB_PATH_MID_DESC$"
 RULE_OPTION_GAB_PATH_MID_DESC: "Sollte Gabun die Kriege nach dem Zusammenbruch Zentralafrikas unbeschadet überstehen, wird es sich den"
 RULE_OPTION_GAB_PATH_DEM_END_DESC: "bei den ersten demokratischen Wahlen in Gabun an die Macht kommen."
 RULE_OPTION_GAB_PATH_MARLIB: "£GFX_KR_game_rule_flag_GAB  Marktliberale"
 RULE_OPTION_GAB_PATH_MARLIB_DESC: "$RULE_OPTION_GAB_PATH_DEM_START_DESC$ Entente und die §mMarktliberalen§! $RULE_OPTION_GAB_PATH_DEM_END_DESC$$GAB_PATH_REQUIREMENTS$"
 RULE_OPTION_GAB_PATH_SOCLIB: "£GFX_KR_game_rule_flag_GAB  Sozialliberale"
 RULE_OPTION_GAB_PATH_SOCLIB_DESC: "$RULE_OPTION_GAB_PATH_DEM_START_DESC$ Die Entente und die §lSozialliberalen§! $RULE_OPTION_GAB_PATH_DEM_END_DESC$$GAB_PATH_REQUIREMENTS$"
 RULE_OPTION_GAB_PATH_RADSOC: "£GFX_KR_game_rule_flag_GAB_soc  Radikale Sozialisten"
 RULE_OPTION_GAB_PATH_RADSOC_DESC: "$RULE_OPTION_GAB_PATH_SOC_START_DESC$ Die Dritte Internationale und die §RRadikalen Sozialisten§! $RULE_OPTION_GAB_PATH_SOC_END_DESC$$GAB_PATH_REQUIREMENTS$"
 RULE_OPTION_GAB_PATH_SOC_START_DESC: "Die Regierung wird von Jean-Baptiste Ndende Dibantsa und der gabunischen Sektion der Liga für Menschen- und Bürgerrechte herausgefordert, die im Zuge einer Revolution die Macht übernehmen.\n$RULE_OPTION_GAB_PATH_MID_DESC$"
 RULE_OPTION_GAB_PATH_SOC_END_DESC: "auf dem ersten Gewerkschaftskongress in Gabun an Einfluss gewinnen."
 RULE_OPTION_GAB_PATH_SYNDIE: "£GFX_KR_game_rule_flag_GAB_soc  Anarchosyndikalisten"
 RULE_OPTION_GAB_PATH_SYNDIE_DESC: "$RULE_OPTION_GAB_PATH_SOC_START_DESC$ Dritte Internationale und die §rAnarchosyndikalisten§! $RULE_OPTION_GAB_PATH_SOC_END_DESC$$GAB_PATH_REQUIREMENTS$"
 RULE_OPTION_GAB_PATH_TOTALIST: "£GFX_KR_game_rule_flag_GAB_soc  Totalisten"
 RULE_OPTION_GAB_PATH_TOTALIST_DESC: "$RULE_OPTION_GAB_PATH_SOC_START_DESC$ Dritte Internationale und die §oTotalisten§! $RULE_OPTION_GAB_PATH_SOC_END_DESC$$GAB_PATH_REQUIREMENTS$"

 KTG_PATH: "£GFX_KR_game_rule_flag_KTG  Die Verteidigung von Elisabethville"
 RULE_OPTION_KTG_PATH_RANDOM: "Standard"
 RULE_OPTION_KTG_PATH_RANDOM_DESC: "In der traditionsreichen belgischen Kolonie Katanga neigt sich die deutsche Herrschaft dem Ende zu, und das Volk der Garanganze nutzt diese Gelegenheit, um einen lang ersehnten Aufstand zu entfachen.\nSollte der Aufstand bei seinem Angriff auf Elisabethville erfolgreich sein, wird ein neues einheimisches Regime entstehen. Andernfalls bleibt die Kolonialherrschaft bestehen."
 RULE_OPTION_KTG_PATH_AUTDEM: "£GFX_KR_game_rule_flag_KTG  Die Regierung Ryckmans"
 RULE_OPTION_KTG_PATH_AUTDEM_DESC: "$RULE_OPTION_KTG_PATH_DEM_START$\nPierre Ryckmans, der belgische Bürgermeister von Elizabethville, behält nach der erfolgreichen Verteidigung der Stadt die Kontrolle, und §aRyckmans’ Regierung§a setzt ihre Herrschaft fort.$GAB_PATH_REQUIREMENTS$"
 RULE_OPTION_KTG_PATH_DEM_START: "Die flämisch-wallonische Verwaltung verteidigt Elizabethville unerschütterlich und bricht den Widerstand der Belagerer."
 RULE_OPTION_KTG_PATH_SOCCON: "£GFX_KR_game_rule_flag_KTG_dem  Christdemokraten"
 RULE_OPTION_KTG_PATH_SOCCON_DESC: "$RULE_OPTION_KTG_PATH_DEM_START$\n$RULE_OPTION_KTG_PATH_MID_DESC$ §cConvention des Démocrates Chrétiens§!, also der Kongress der Christdemokraten, geht als Sieger hervor.$GAB_PATH_REQUIREMENTS$"
 RULE_OPTION_KTG_PATH_MID_DESC: "Später finden freie Wahlen statt, und die"
 RULE_OPTION_KTG_PATH_SOCLIB: "£GFX_KR_game_rule_flag_KTG_dem  Bergbaugewerkschaft"
 RULE_OPTION_KTG_PATH_SOCLIB_DESC: "$RULE_OPTION_KTG_PATH_DEM_START$\n$RULE_OPTION_KTG_PATH_MID_DESC$ §lUnion Minière de Haut-Katanga§!, also die Bergbaugewerkschaft von Ober-Katanga, geht als Sieger hervor.$GAB_PATH_REQUIREMENTS$"
 RULE_OPTION_KTG_PATH_SOCDEM: "£GFX_KR_game_rule_flag_KTG_dem  Demokratische Koalition"
 RULE_OPTION_KTG_PATH_SOCDEM_DESC: "$RULE_OPTION_KTG_PATH_DEM_START$\n$RULE_OPTION_KTG_PATH_MID_DESC$ Die §SCoalition des Démocrates Katangais§!, also die Koalition der Demokraten von Katanga, geht als Sieger hervor.$GAB_PATH_REQUIREMENTS$"
 RULE_OPTION_KTG_PATH_PATAUT: "£GFX_KR_game_rule_flag_KTG  Mwami-Anhänger"
 RULE_OPTION_KTG_PATH_PATAUT_DESC: "Es wird eine Massenevakuierung der weißen Bevölkerung von Elizabethville organisiert, und die Stadt fällt dem Aufstand der Einheimischen zum Opfer.\nKitanika Mabumba Mushalila, der Mwami oder traditionelle Führer des Volkes der Garaganze, stellt das Königreich Garaganze wieder her und regiert mit seinen §PMwami-Loyalisten§ an seiner Seite.$GAB_PATH_REQUIREMENTS$"

 SAF_PATH: "£KR_game_rule_flag_SAF  Das schwankende Dominion"
 SAF_PATH_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CDie Entente befindet sich nicht im Krieg mit Deutschland§!"
 RULE_OPTION_SAF_PATH_RANDOM: "Standard"
 RULE_OPTION_SAF_PATH_RANDOM_DESC: "Südafrika, das seit jeher zwischen den Afrikanern und den Briten hin- und hergerissen ist, ist der Entente bisher treu geblieben – doch die nächsten Wahlen könnten sich als Wendepunkt erweisen..."
 RULE_OPTION_SAF_PATH_SAP_DESC: "Zum dritten Mal in Folge gewinnt Jan Smuts’ Südafrikanische Partei die nächsten Wahlen. Die Regierung verabschiedet schließlich das Gesetz über das Wahlrecht für \"Farbige\", woraufhin die Nationale Partei ausgeschaltet wird"
 RULE_OPTION_SAF_PATH_SAP_SOCLIB: "£KR_game_rule_flag_SAF  Das Liberale Dominion"
 RULE_OPTION_SAF_PATH_SAP_SOCLIB_DESC: "$RULE_OPTION_SAF_PATH_SAP_DESC$ und der liberale Flügel der §lSüdafrikanischen Partei§! gewinnt an Einfluss."
 RULE_OPTION_SAF_PATH_SOCDEM: "£KR_game_rule_flag_SAF  Das Neue Dominion"
 RULE_OPTION_SAF_PATH_SOCDEM_DESC: "$RULE_OPTION_SAF_PATH_SAP_DESC$.\nNach der Verabschiedung des Gesetzes zur Wahlberechtigung der \"Farbigen\" hat die §SLabour Partei§! die Chance, die nächsten Parlamentswahlen in Südafrika zu gewinnen, was ihr auch gelingt."
 RULE_OPTION_SAF_PATH_UNITED_START_DESC: "Jan Smuts' Südafrikanische Partei und J.B.M. Hertzogs Nationale Partei schlossen sich zusammen, um für die Wahlen von 1938 die §aVereinigte Südafrikanische Nationale Partei§! zu gründen.\nNach Hertzogs Tod im Jahr 1942,"
 RULE_OPTION_SAF_PATH_UNITED_MID_DESC: "wird neuer Parteivorsitzender und Ministerpräsident und führt die"
 RULE_OPTION_SAF_PATH_UNITED_END_DESC: "zum Sieg bei den Wahlen von 1943."
 RULE_OPTION_SAF_PATH_UNITED_AUTDEM: "£KR_game_rule_flag_SAF  Das Vereinigte Dominion – Havenga"
 RULE_OPTION_SAF_PATH_UNITED_AUTDEM_DESC: "$RULE_OPTION_SAF_PATH_UNITED_START_DESC$ Nicolaas Havenga $RULE_OPTION_SAF_PATH_UNITED_MID_DESC$ nationalistische Fraktion der §aVereinigten Südafrikanischen Nationalpartei§! $RULE_OPTION_SAF_PATH_UNITED_END_DESC$$SAF_PATH_REQUIREMENTS$"
 RULE_OPTION_SAF_PATH_UNITED_SOCCON: "£KR_game_rule_flag_SAF  Das Vereinigte Dominion - Smuts"
 RULE_OPTION_SAF_PATH_UNITED_SOCCON_DESC: "$RULE_OPTION_SAF_PATH_UNITED_START_DESC$ Jan Smuts $RULE_OPTION_SAF_PATH_UNITED_MID_DESC$ die konservative Fraktion der §cVereinigten Südafrikanischen Nationalpartei§! $RULE_OPTION_SAF_PATH_UNITED_END_DESC$$SAF_PATH_REQUIREMENTS$"
 RULE_OPTION_SAF_PATH_UNITED_SOCLIB: "£KR_game_rule_flag_SAF  Das Vereinigte Dominion - Hofmeyr"
 RULE_OPTION_SAF_PATH_UNITED_SOCLIB_DESC: "$RULE_OPTION_SAF_PATH_UNITED_START_DESC$ J.H. Hofmeyr $RULE_OPTION_SAF_PATH_UNITED_MID_DESC$ die liberale Fraktion der §lVereinigten Südafrikanischen Nationalpartei§! $RULE_OPTION_SAF_PATH_UNITED_END_DESC$"
 RULE_OPTION_SAF_PATH_NATIONAL_AUTDEM: "£KR_game_rule_flag_SAF  Das Afrikaner Dominion"
 RULE_OPTION_SAF_PATH_NATIONAL_AUTDEM_DESC: "J.B.M. Hertzog gelingt es, seine Führungsposition in der §aNationalen Partei§! lange genug zu behalten, um eine nationale Regierung zu führen und Südafrika zu einem von Afrikanern geführten Dominion zu formen."
 RULE_OPTION_SAF_PATH_AUT_DESC: "Der afrikanische Nationalist D.F. Malan übernimmt von Hertzog die Führung der Nationalen Partei und führt sie zum Wahlsieg, mit dem Ziel, Südafrika in eine unabhängige Republik unter der Führung der"
 RULE_OPTION_SAF_PATH_NEUTRAL_DESC: "Die neue Republik hält sich aus den europäischen Angelegenheiten heraus."
 RULE_OPTION_SAF_PATH_CIVIL_WAR_NOTE_DESC: "§CHinweis: Dieser Kurs löst einen Bürgerkrieg zwischen der Regierung und der britischen Bevölkerung in Natal und Rhodesien aus.§!"
 RULE_OPTION_SAF_PATH_PATAUT: "£KR_game_rule_flag_SAF_rep  Die Afrikaner-Republik"
 RULE_OPTION_SAF_PATH_PATAUT_DESC: "$RULE_OPTION_SAF_PATH_AUT_DESC$ §PNationale Partei§!.\n$RULE_OPTION_SAF_PATH_NEUTRAL_DESC$\n\n$RULE_OPTION_SAF_PATH_CIVIL_WAR_NOTE_DESC$"
 RULE_OPTION_SAF_PATH_GER_DESC: "Die neue Republik schließt sich Deutschlands Kreuzzug gegen den Syndikalismus an."
 RULE_OPTION_SAF_PATH_PATAUT_GER: "£KR_game_rule_flag_SAF_rep  Die Afrikaner-Republik - Reichspakt"
 RULE_OPTION_SAF_PATH_PATAUT_GER_DESC: "$RULE_OPTION_SAF_PATH_AUT_DESC$ §PNationale Partei§!.\n$RULE_OPTION_SAF_PATH_GER_DESC$\n\n$RULE_OPTION_SAF_PATH_CIVIL_WAR_NOTE_DESC$"
 RULE_OPTION_SAF_PATH_NATPOP_START_DESC: "$RULE_OPTION_SAF_PATH_AUT_DESC$ Nationale Partei.\nNach der Gründung der Republik Südafrika übernimmt Johannes Van Rensburg von der extremistischen Fraktion der §nNationalen Partei§! die Macht."
 RULE_OPTION_SAF_PATH_NATPOP: "£KR_game_rule_flag_SAF_natpop  Ossewabrandwag Staat"
 RULE_OPTION_SAF_PATH_NATPOP_DESC: "$RULE_OPTION_SAF_PATH_NATPOP_START_DESC$\n$RULE_OPTION_SAF_PATH_NEUTRAL_DESC$\n\n$RULE_OPTION_SAF_PATH_CIVIL_WAR_NOTE_DESC$"
 RULE_OPTION_SAF_PATH_NATPOP_GER: "£KR_game_rule_flag_SAF_natpop  Ossewabrandwag Staat - Reichspakt"
 RULE_OPTION_SAF_PATH_NATPOP_GER_DESC: "$RULE_OPTION_SAF_PATH_NATPOP_START_DESC$\n$RULE_OPTION_SAF_PATH_GER_DESC$\n\n$RULE_OPTION_SAF_PATH_CIVIL_WAR_NOTE_DESC$"
 RULE_OPTION_SAF_PATH_SOC_DESC: "Nach dem Schwarzem Montag wird die Aufhebung des Gesetzes über die Schlichtung in Arbeitskonflikten zum Auslöser einer sozialistischen Revolution in Südafrika."
 RULE_OPTION_SAF_PATH_RADSOC: "£KR_game_rule_flag_SAF_radsoc  Die Gemischethnische Republik"
 RULE_OPTION_SAF_PATH_RADSOC_DESC: "$RULE_OPTION_SAF_PATH_SOC_DESC$ Nach dem Kongress von Johannesburg übernimmt die unter David Ivon Jones stehende, in rassischer und ideologischer Hinsicht breit aufgestellte §RInternationale Sozialistische Liga§ die Führung der neuen sozialistischen Regierung Südafrikas."
 RULE_OPTION_SAF_PATH_SYNDIE: "£KR_game_rule_flag_SAF_radsoc  Die Syndikalistische Republik"
 RULE_OPTION_SAF_PATH_SYNDIE_DESC: "$RULE_OPTION_SAF_PATH_SOC_DESC$ Nach dem Kongress von Johannesburg übernimmt die interrassische syndikalistische Fraktion der §rIndustrie- und Handelsarbeiter Union§! unter der Führung von Clements Kadalie die Führung der neuen sozialistischen Regierung Südafrikas."
 RULE_OPTION_SAF_PATH_TOTALIST: "£KR_game_rule_flag_SAF_totalist  Die Republik der Einheimischen"
 RULE_OPTION_SAF_PATH_TOTALIST_DESC: "$RULE_OPTION_SAF_PATH_SOC_DESC$ Die weißen Rassistischen Kräfte des Südafrikanischer Handels- und Arbeitsrat missbrauchen den Kongress in Johannesburg, um die Politik des \"parallelen Gewerkschaftswesens\" zu festigen.\nDies veranlasst schließlich den ICU-Führer James La Guma, einen Putsch gegen die neue Regierung anzuführen und eine von Einheimischen geführte Republik unter der Führung der afrikanistischen Fraktion der §oGewerkschaft der Industrie- und Handelsarbeiter§! zu errichten – als ersten Schritt hin zu einer zukünftigen sozialistischen Gesellschaft."
 RULE_OPTION_SAF_PATH_DOMINION_DESC: "Sollten die britischen Streitkräfte den Dritten Burenkrieg gewinnen, nachdem die Republik Südafrika ausgerufen wurde,"
 RULE_OPTION_SAF_PATH_DOMINION_SOCLIB: "£KR_game_rule_flag_SAF_fed  Das Föderale Dominion"
 RULE_OPTION_SAF_PATH_DOMINION_SOCLIB_DESC: "$RULE_OPTION_SAF_PATH_DOMINION_DESC$ werden sie Südafrika nach föderalem Vorbild neu gestalten und unter der liberalen Fraktion der §lSüdafrikanischen Partei§! eine von Weißen geführte demokratische Regierung wiederherstellen.\n\n$RULE_OPTION_SAF_PATH_CIVIL_WAR_NOTE_DESC$"
 RULE_OPTION_SAF_PATH_DOMINION_PATAUT: "£KR_game_rule_flag_SAF_fed  Milners Kindergarten"
 RULE_OPTION_SAF_PATH_DOMINION_PATAUT_DESC: "$RULE_OPTION_SAF_PATH_DOMINION_DESC$ Hofmeyrs Südafrikanische Partei kehrt im neuen föderalen Südafrika an die Macht zurück.\nUnzufrieden mit der Idee einer Annäherung an die Afrikaner organisiert Charles Stallard von der §PDominion Partei§! einen Staatsstreich und übernimmt mit Hilfe des Generalgouverneurs die Macht, um Südafrika mit allen Mitteln zu einem loyalen Land der Anglosphäre zu machen.\n\n$RULE_OPTION_SAF_PATH_CIVIL_WAR_NOTE_DESC$"

 LIB_PATH: "£KR_game_rule_flag_LIB  Präsidentschaftswahlen in Liberia"
 RULE_OPTION_LIB_PATH_RANDOM: "Standard"
 RULE_OPTION_LIB_PATH_RANDOM_DESC: "Welche Partei wird bei den bevorstehenden Wahlen 1939 den Sieg davontragen? Die feststehende Position der Geheimgesellschaften könnte jedoch dazu führen, dass es noch vor den Wahlen zu einem Staatsstreich kommt."
 RULE_OPTION_LIB_PATH_NATPOP: "£KR_game_rule_flag_LIB  Freimaurer"
 RULE_OPTION_LIB_PATH_NATPOP_DESC: "Die Freimaurer der §nGroßloge von Liberia§! führten erfolgreich einen Staatsstreich durch, nachdem liberianischen Geheimgesellschaften gestattet worden war, weiter zu bestehen."
 RULE_OPTION_LIB_PATH_TOTALIST: "£KR_game_rule_flag_LIB_soc  Liberianische Schicksalspartei"
 RULE_OPTION_LIB_PATH_TOTALIST_DESC: "Die §oLiberianische Schicksalspartei§! führt erfolgreich einen Staatsstreich durch, nachdem liberianische Geheimgesellschaften verboten wurden."
 RULE_OPTION_LIB_PATH_SOCCON: "£KR_game_rule_flag_LIB  Wahre Whig Partei (Alte Garde)"
 RULE_OPTION_LIB_PATH_SOCCON_DESC: "Edwin James Barclay, ein Vertreter der alten Garde der §cWahren Whig Partei§!, wird gewählt."
 RULE_OPTION_LIB_PATH_MARLIB: "£KR_game_rule_flag_LIB  Wahre Whig Partei (Zentrum)"
 RULE_OPTION_LIB_PATH_MARLIB_DESC: "William Tubman von der Zentrumsfraktion der §mWahren Whig Partei§! wird gewählt."
 RULE_OPTION_LIB_PATH_SOCLIB: "£KR_game_rule_flag_LIB  Wahre Whig Partei (Neue Garde)"
 RULE_OPTION_LIB_PATH_SOCLIB_DESC: "Louis Arthur Grimes von der neuen Garde der §lWahren Whig Partei§! wird gewählt."
 RULE_OPTION_LIB_PATH_RADSOC: "£KR_game_rule_flag_LIB  Volkspartei"
 RULE_OPTION_LIB_PATH_RADSOC_DESC: "Thomas J.R. Faulkner von der §RVolkspartei§! wird gewählt."
 RULE_OPTION_LIB_PATH_AUTDEM: "£KR_game_rule_flag_LIB  Wahre Whig Partei (Hardliner)"
 RULE_OPTION_LIB_PATH_AUTDEM_DESC: "Nachdem der deutsche Botschafter Massaquoi Berlin um Finanzhilfen gebeten hat, übernimmt die Hardliner-Fraktion der §aWahre Whig Partei§! die Macht, und Liberia entwickelt sich technologisch und industriell weiter – auf Kosten seiner Rolle als deutsche Marionette."

 LIB_INDEPENDENCE: "£KR_game_rule_flag_LIB  Das Amerikanische Joch"
 RULE_OPTION_LIB_INDEPENDENCE_RANDOM: "Standard"
 RULE_OPTION_LIB_INDEPENDENCE_RANDOM_DESC: "Liberia, das von ehemaligen amerikanischen Sklaven gegründet wurde, unterhält nach wie vor enge Beziehungen zu den Vereinigten Staaten. Doch angesichts des Chaos des Zweiten Amerikanischen Bürgerkriegs kommt der Moment, in dem Liberia das amerikanische Joch abschütteln und wirklich frei werden kann."
 RULE_OPTION_LIB_INDEPENDENCE_USA: "£KR_game_rule_flag_LIB  £KR_game_rule_flag_USA  Den Amerikanern treu bleiben"
 RULE_OPTION_LIB_INDEPENDENCE_USA_DESC: "Liberia erklärt, dass sie keine Verräter sind und die Nation, die einst zu seiner Gründung beigetragen hat, nicht verraten."
 RULE_OPTION_LIB_INDEPENDENCE_DECLARE: "£KR_game_rule_flag_LIB  Werde unabhängig"
 RULE_OPTION_LIB_INDEPENDENCE_DECLARE_DESC: "Liberia verhält sich nicht mehr wie ein Schoßhund der USA und erklärt, dass es sich selbst schützen kann."

 ETH_PATH: "£KR_game_rule_flag_ETH  Der Löwe brüllt"
 RULE_OPTION_ETH_PATH_RANDOM: "Standard"
 RULE_OPTION_ETH_PATH_RANDOM_DESC: "Das Solominidenreich Äthiopien, das im Geiste vom Löwen von Juda beschützt wird, muss sich mit schwerwiegenden inneren Problemen auseinandersetzen oder die Konsequenzen tragen."
 RULE_OPTION_ETH_PATH_PATAUT: "£KR_game_rule_flag_ETH  Mekawints Verfassung"
 RULE_OPTION_ETH_PATH_PATAUT_DESC: "Das derzeitige Feudalsystem bleibt bestehen, wobei der Adel Einfluss auf die neue Verfassung nimmt, damit Äthiopien unter der Herrschaft des §PSelomonawiwi Siriwe Menigisiti§!, also des Hauses Salomos, verbleibt."
 RULE_OPTION_ETH_PATH_AUTDEM: "£KR_game_rule_flag_ETH  Selassies Verfassung"
 RULE_OPTION_ETH_PATH_AUTDEM_DESC: "Die Rolle des Kaisers bei der Ausarbeitung der neuen Verfassung führt dazu, dass die Bedeutung des Adels zugunsten des §aYe'itiyop'iya Zewidi Mikirbeti§!, des kaiserlichen Beratungsgremiums, geschwächt wird."
 RULE_OPTION_ETH_PATH_DEM_DESC: "Es wird eine demokratische Verfassung verkündet, wobei die Monarchie jedoch bestimmte Befugnisse behält."
 RULE_OPTION_ETH_PATH_SOCCON: "£KR_game_rule_flag_ETH  Volksverfassung - EPA"
 RULE_OPTION_ETH_PATH_SOCCON_DESC: "$RULE_OPTION_ETH_PATH_DEM_DESC$ Daraufhin übernimmt die „§cYager Feqer Mahber§!“, also die Äthiopische Patriotische Vereinigung, die Macht."
 RULE_OPTION_ETH_PATH_MARLIB: "£KR_game_rule_flag_ETH  Volksverfassung - YE"
 RULE_OPTION_ETH_PATH_MARLIB_DESC: "$RULE_OPTION_ETH_PATH_DEM_DESC$ §mWet'ati Itiyop'iya§!, also das Junge Äthiopien, kommt an die Macht."
 RULE_OPTION_ETH_PATH_SOCLIB: "£KR_game_rule_flag_ETH  Volksverfassung - EPA-NA"
 RULE_OPTION_ETH_PATH_SOCLIB_DESC: "$RULE_OPTION_ETH_PATH_DEM_DESC$ Die „§lYager Feqer Mahber – Addis Zaman§!“, also die Neue-Ära-Fraktion der Äthiopischen Patriotischen Vereinigung, kommt an die Macht."
 RULE_OPTION_ETH_PATH_SOCDEM: "£KR_game_rule_flag_ETH  Volksverfassung - ERC"
 RULE_OPTION_ETH_PATH_SOCDEM_DESC: "$RULE_OPTION_ETH_PATH_DEM_DESC$ Der „§SYe'itiyop'iya t'inatina Mirimiri Kawinisili§!“, also der Äthiopische Forschungsrat, übernimmt die Macht."

 ETH_FORPOL: "£KR_game_rule_flag_ETH  Äthiopische Außenpolitik"
 ETH_FORPOL_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CÄthiopien besiegt Somalia§!"
 RULE_OPTION_ETH_FORPOL_RANDOM: "Standard"
 RULE_OPTION_ETH_FORPOL_RANDOM_DESC: "Die Deutsche Kaiserliche Abessinien-Eisenbahn (DKAEB) prägt die Wirtschaftsleistung Äthiopiens maßgeblich. Sollte Mittelafrika seine Anteile an der Eisenbahnlinie behalten und diese erfolgreich verwalten, könnte sich das Verhältnis Äthiopiens zum Kaiserreich zu einem vollwertigen Militärbündnis entwickeln."
 RULE_OPTION_ETH_FORPOL_GER_START_DESC: "Mittelafika kontrolliert die DKAEB, die es mit Äthiopiens Hilfe schafft, den Bankrott abzuwenden. Nach dem Sieg über Somalia hat Äthiopien"
 RULE_OPTION_ETH_FORPOL_GER: "£KR_game_rule_flag_ETH  £KR_game_rule_flag_GER  Reichspakt"
 RULE_OPTION_ETH_FORPOL_GER_DESC: "$RULE_OPTION_ETH_FORPOL_GER_START_DESC$ dem Reichspakt entweder während oder nach dem Weltkrieg beitritt.$ETH_FORPOL_REQUIREMENTS$"
 RULE_OPTION_ETH_FORPOL_GER_GUARANTEE: "£KR_game_rule_flag_ETH  £KR_game_rule_flag_GER  Deutsche Garantie"
 RULE_OPTION_ETH_FORPOL_GER_GUARANTEE_DESC: "$RULE_OPTION_ETH_FORPOL_GER_START_DESC$ fordert von Deutschland eine Unabhängigkeitsgarantie, entweder während oder nach dem Weltkrieg.$ETH_FORPOL_REQUIREMENTS$"
 RULE_OPTION_ETH_FORPOL_JAP_START_DESC: "Die Kontrolle Mittelafikas über die DKAEB führt zu deren Konkurs, woraufhin Äthiopien mit Japan einen neuen ausländischen Geldgeber findet. Nach dem Sieg über Somalia"
 RULE_OPTION_ETH_FORPOL_JAP: "£KR_game_rule_flag_ETH  £KR_game_rule_flag_JAP  Ko-Prosperitätssphäre"
 RULE_OPTION_ETH_FORPOL_JAP_DESC: "$RULE_OPTION_ETH_FORPOL_JAP_START_DESC$ tritt entweder während oder nach dem Weltkrieg der Ko-Prosperitätssphäre bei.$ETH_FORPOL_REQUIREMENTS$"
 RULE_OPTION_ETH_FORPOL_JAP_GUARANTEE: "£KR_game_rule_flag_ETH  £KR_game_rule_flag_JAP  Japanische Garantie"
 RULE_OPTION_ETH_FORPOL_JAP_GUARANTEE_DESC: "$RULE_OPTION_ETH_FORPOL_JAP_START_DESC$ fordert von Japan eine Unabhängigkeitsgarantie, entweder während oder nach dem Weltkrieg.$ETH_FORPOL_REQUIREMENTS$"
 RULE_OPTION_ETH_FORPOL_RUS: "£KR_game_rule_flag_ETH  £KR_game_rule_flag_RUS  Moskauer Abkommen"
 RULE_OPTION_ETH_FORPOL_RUS_DESC: "Nach dem Zusammenbruch des Osmanischen Reiches strebt Russland danach, seinen Einfluss weiter auszubauen, und die von den Kadetten geführte Regierung bietet ihren orthodoxen Glaubensbrüdern in Äthiopien den Beitritt zum Moskauer Abkommen an.\n\n§RBenötigt:§!\n§CKDS - Kartaschjow§! in §Y$RUS_PATH$§!\n\n§CMoskauer Abkommen§! in §Y$PER_FORPOL$§! oder §CMoskauer Abkommen§! in §Y$TUR_FORPOL$§! oder\n§CRussland hat entweder den Iran oder die Türkei unter seine Kontrolle gebracht§!"
 RULE_OPTION_ETH_FORPOL_NEUT: "£KR_game_rule_flag_ETH  Neutralität"
 RULE_OPTION_ETH_FORPOL_NEUT_DESC: "Mittelafrika verkauft seine Anteile an der DKAEB und trennt damit die bisherigen wirtschaftlichen und politischen Verbindungen zwischen Äthiopien und Deutschland."

 SOM_PATH: "£KR_game_rule_flag_SOM  Der Herr von Warsangali"
 RULE_OPTION_SOM_PATH_RANDOM: "Standard"
 RULE_OPTION_SOM_PATH_RANDOM_DESC: "Die Vorherrschaft des Warsangali-Clans im neuen Somalia stößt bei den kleineren Clans auf Unmut. Die Warsangalis müssen ihre Position stärker institutionalisieren."
 RULE_OPTION_SOM_PATH_DEM_DESC: "Es wird ein Kompromiss zwischen den Clans sowie zwischen dem traditionellen somalischen Recht und dem Zivilrecht erzielt."
 RULE_OPTION_SOM_PATH_SOCCON: "£KR_game_rule_flag_SOM  Somalische Jugendliga"
 RULE_OPTION_SOM_PATH_SOCCON_DESC: "$RULE_OPTION_SOM_PATH_DEM_DESC$\nEs entsteht eine echte somalische Demokratie unter der Führung der §cUrurka Dhalinyarada Soomaaliyeed§!, also der Somalischen Jugendliga."
 RULE_OPTION_SOM_PATH_AUTDEM: "£KR_game_rule_flag_SOM  Stammesrat"
 RULE_OPTION_SOM_PATH_AUTDEM_DESC: "$RULE_OPTION_SOM_PATH_DEM_DESC$\nDie anschließenden Wahlen werden von der der Monarchie nahestehenden Organisation §aGolaha Qabiilada§!, also dem Stammesrat, gewonnen."
 RULE_OPTION_SOM_PATH_PATAUT: "£KR_game_rule_flag_SOM  Die Herrscher von Warsangali"
 RULE_OPTION_SOM_PATH_PATAUT_DESC: "Die §PSaldanadii Warsangali§!, also die Herrscher des Warsangali-Clans, festigen erfolgreich ihre Kontrolle über die anderen Clans."
 RULE_OPTION_SOM_PATH_NATPOP: "£KR_game_rule_flag_SOM_natpop  Neue Somalische Bewegung"
 RULE_OPTION_SOM_PATH_NATPOP_DESC: "Der Warsangali-Clan versucht, seine Kontrolle über die anderen Clans zu verstärken, geht dabei jedoch nicht weit genug. Kurz nach Ausbruch des Krieges mit Äthiopien stürzen Offiziere, die der  §nDhaqdhaqaaqa Cusub ee Soomaaliya§!, also der Neuen Somalischen Bewegung, angehören, im Rahmen eines Militärputsches die Monarchie.\n\n§RBenötigt:§!\n§CÄthiopien erklärt Somalia den Krieg§!"

 ### Länderpfade – Kaukasus & Naher Osten ###
 RULE_GROUP_KAISERREICH_RULES_CAUCASUS_MIDDLE_EAST: "Länderpfade – Kaukasus & Naher Osten"

 OTT_PATH: "£KR_game_rule_flag_TUR  Die Osmanische Reformation"
 RULE_OPTION_OTT_PATH_RANDOM: "Standard"
 RULE_OPTION_OTT_PATH_RANDOM_DESC: "Though Mustafa Kemal Gelibolu once again stands at the helm of the nation, his dream of a modernised empire remains far from secured. As forces of opposition await their chance to strike against the Kemalist movement, the slightest blunder could cost the Grand Vizier everything and steer the eternal state away from its centralist course."
 RULE_OPTION_OTT_PATH_AUTDEM: "£KR_game_rule_flag_TUR  Ottoman People's Party"
 RULE_OPTION_OTT_PATH_AUTDEM_DESC: "Mustafa Kemal Gelibolu centralises power around the §aOsmanlı Halk Fırkası§!, or Ottoman People's Party, and establishes the party as the revolutionary vanguard which will pull the Ottoman Empire into the 20th century."
 RULE_OPTION_OTT_PATH_LIB_START_DESC: "The Liberal Entente, led by Mehmed Sabahaddin Beyoğlu and the"
 RULE_OPTION_OTT_PATH_LIB_END_DESC: "take over from Mustafa Kemal.\nThey work towards the implementation of their programme of decentralisation and autonomy."
 RULE_OPTION_OTT_PATH_MARLIB: "£KR_game_rule_flag_TUR_fed  Freedom and Accord Party"
 RULE_OPTION_OTT_PATH_MARLIB_DESC: "$RULE_OPTION_OTT_PATH_LIB_START_DESC$ §mHürriyet ve İtilaf Fırkası§!, or Freedom and Accord Party, $RULE_OPTION_OTT_PATH_LIB_END_DESC$"
 RULE_OPTION_OTT_PATH_SOCLIB: "£KR_game_rule_flag_TUR_fed  Democratic Party"
 RULE_OPTION_OTT_PATH_SOCLIB_DESC: "$RULE_OPTION_OTT_PATH_LIB_START_DESC$ HİF, $RULE_OPTION_OTT_PATH_LIB_END_DESC$ The §lDemocrat Fırkası§!, or Democratic Party, later become leaders of the coalition, and Musa Kâzım Karabekir becomes Grand Vizier."
 RULE_OPTION_OTT_PATH_SOCCON: "£KR_game_rule_flag_TUR  National Conservative Party"
 RULE_OPTION_OTT_PATH_SOCCON_DESC: "$RULE_OPTION_OTT_PATH_LIB_START_DESC$ HİF, $RULE_OPTION_OTT_PATH_LIB_END_DESC$\nFollowing an escalation of protests sparked by secularisation, and the increased influence of ethnic minorities in the empire, Grand Vizier Sabahaddin is replaced by the conservative Shakib Arslan and the §cMilli Muhafazakâr Fırkası§!, or National Conservative Party, in an attempt to save the liberal ruling coalition. He laters fall to a military coup."
 RULE_OPTION_OTT_PATH_FEVZI_START_DESC: "Field Marshal Mustafa Fevzi Çakmak seizes power in the wake of the assassination of Grand Vizier Mustafa Kemal."
 RULE_OPTION_OTT_PATH_PATAUT: "£KR_game_rule_flag_TUR  Military Government"
 RULE_OPTION_OTT_PATH_PATAUT_DESC: "$RULE_OPTION_OTT_PATH_FEVZI_START_DESC$\nAn §PAskerî Hükûmet§!, or Military Government, controls the empire, bringing the country forward towards more extreme levels of modernisation, and aims to cement military rule over civilian affairs."
 RULE_OPTION_OTT_PATH_ENDEAVOUR_START_DESC: "He relinquishes power, and facilitates elections that result in Mustafa İsmet Reşit being made Grand Vizier, and the winners being a broad coalition known as the"
 RULE_OPTION_OTT_PATH_ENDEAVOUR_AUTDEM: "£KR_game_rule_flag_TUR  Endeavour Front (Statist)"
 RULE_OPTION_OTT_PATH_ENDEAVOUR_AUTDEM_DESC: "$RULE_OPTION_OTT_PATH_FEVZI_START_DESC$\n$RULE_OPTION_OTT_PATH_ENDEAVOUR_START_DESC$ §aÇalışma Cephesi§!, or Endeavour Front, which leads the empire towards a state-led centralist economy."
 RULE_OPTION_OTT_PATH_ENDEAVOUR_MARLIB: "£KR_game_rule_flag_TUR  Endeavour Front (Liberal)"
 RULE_OPTION_OTT_PATH_ENDEAVOUR_MARLIB_DESC: "$RULE_OPTION_OTT_PATH_FEVZI_START_DESC$\n$RULE_OPTION_OTT_PATH_ENDEAVOUR_START_DESC$ Çalışma Cephesi. After later replacing the Grand Vizier with Musa Kâzım Karabekir, the §mÇalışma Cephesi§!, or Endeavour Front, leads the empire towards economic liberalisation and the privatisation of state monopolies."
 RULE_OPTION_OTT_PATH_NATPOP: "£KR_game_rule_flag_TUR  Ottoman People's Party (Kadroist)"
 RULE_OPTION_OTT_PATH_NATPOP_DESC: "$RULE_OPTION_OTT_PATH_FEVZI_START_DESC$ $RULE_OPTION_OTT_PATH_ENDEAVOUR_START_DESC$ Endeavour Front.\nInspired by the \"Kadro\" paper, and of developments elsewhere, OHF extremists from within the Front take control of the party, and transform the Ottoman Empire into a totalitarian one-party-state led by the Kadroist faction of the §nOsmanlı Halk Fırkası§!, or Ottoman People's Party.\nThis is not without its consequences...\n\n§RBenötigt:§!\nAny §CSorelians§! or §CJacobins§! in §Y$FRA_PATH$§!\nAny §CMaximists§! in §Y$ENG_PATH$§!\n§CDictatorship§! in §Y$RUS_AFTERMATH$§!"

 OTT_FORPOL: "£KR_game_rule_flag_TUR  Ottoman Foreign Policy"
 OTT_FORPOL_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CThe Ottomans are victorious against the Cairo Pact§!"
 RULE_OPTION_OTT_FORPOL_RANDOM: "Standard"
 RULE_OPTION_OTT_FORPOL_RANDOM_DESC: "The time has come for the Ottomans to decide on their foreign policy - whether to join the old alliance in the company of the Reichspakt, look elsewhere, or keep neutrality?"
 RULE_OPTION_OTT_FORPOL_OTT: "£KR_game_rule_flag_TUR  Istanbul Pact"
 RULE_OPTION_OTT_FORPOL_OTT_DESC: "The Ottomans create the Istanbul Pact and invite other Muslim countries into the fold.$OTT_FORPOL_REQUIREMENTS$\n\n§RNot§! §COttoman People's Party (Kadroist)§! in §Y$OTT_PATH$§!"
 RULE_OPTION_OTT_FORPOL_AUS: "£KR_game_rule_flag_TUR  £KR_game_rule_flag_AUS  Sarajevo Accords"
 RULE_OPTION_OTT_FORPOL_AUS_DESC: "The Ottomans forge an alliance with Austria that increases their influence in the Balkans.$OTT_FORPOL_REQUIREMENTS$\n\n§RNot§! §CFreedom and Accord Party§! or §CDemocratic Party§! or §CEndeavour Front (Liberal)§! in §Y$OTT_PATH$§!\n\n§CFailure§! in §Y$OTT_RUS_CONVENTION$§!"
 RULE_OPTION_OTT_FORPOL_GER: "£KR_game_rule_flag_TUR  £KR_game_rule_flag_GER  Reichspakt"
 RULE_OPTION_OTT_FORPOL_GER_DESC: "The Ottomans aid their old allies Germany and join the Reichspakt.$OTT_FORPOL_REQUIREMENTS$\n\n§RNot§! §COttoman People's Party (Kadroist)§! in §Y$OTT_PATH$§!\n\n§CFailure§! in §Y$OTT_RUS_CONVENTION$§!"
 RULE_OPTION_OTT_FORPOL_ENT: "£KR_game_rule_flag_TUR  £KR_game_rule_flag_CAN  Entente"
 RULE_OPTION_OTT_FORPOL_ENT_DESC: "The Ottomans join the Americans in the Entente.$OTT_FORPOL_REQUIREMENTS$\n\n§CFreedom and Accord Party§! or §CDemocratic Party§! or §CEndeavour Front (Liberal)§! in §Y$OTT_PATH$§!\n§CFailure§! in §Y$OTT_RUS_CONVENTION$§!\n\n§CEntente§! in §Y$USA_FORPOL$§! or §Y$APG_FORPOL$§! or §Y$ACC_FORPOL$§!\nor §CNew England wins the Second American Civil War and remains a member of the Entente§!"

 OTT_RUS_CONVENTION: "£KR_game_rule_flag_TUR  £KR_game_rule_flag_RUS  The Russo-Ottoman Convention"
 OTT_RUS_CONVENTION_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CIstanbul Pact§! in §Y$OTT_FORPOL$§!\n§RNot§! §CMilitary Government§! in §Y$OTT_PATH$§!$RUS_AFTERMATH_NOT_SOC_REQUIREMENTS$"
 RULE_OPTION_OTT_RUS_CONVENTION_RANDOM: "Standard"
 RULE_OPTION_OTT_RUS_CONVENTION_RANDOM_DESC: "The Russian bear stirs, eyeing the crucial oil deposits in the Caucasus, alongside their former lands. However, by avoiding entering the Ottoman sphere of influence, the idea of a southern flank that is free from further German intervention also holds much value.\nThe Ottoman Empire and the Russians hold talks in Baku, seeking to reach a settlement on the Caucasus and Middle East, as well as form a mutual non-aggression pact."
 RULE_OPTION_OTT_RUS_CONVENTION_SUCCESS_DESC: "The negotiations are a success. A settlement is reached which favours the aims of the"
 RULE_OPTION_OTT_RUS_CONVENTION_SUCCESS_OTT: "£KR_game_rule_flag_TUR  £KR_game_rule_flag_RUS  Success - Ottomans"
 RULE_OPTION_OTT_RUS_CONVENTION_SUCCESS_OTT_DESC: "$RULE_OPTION_OTT_RUS_CONVENTION_SUCCESS_DESC$ Ottomans, where possible.$OTT_RUS_CONVENTION_REQUIREMENTS$"
 RULE_OPTION_OTT_RUS_CONVENTION_SUCCESS_RUS: "£KR_game_rule_flag_TUR  £KR_game_rule_flag_RUS  Success - Russians"
 RULE_OPTION_OTT_RUS_CONVENTION_SUCCESS_RUS_DESC: "$RULE_OPTION_OTT_RUS_CONVENTION_SUCCESS_DESC$ Russians, where possible.$OTT_RUS_CONVENTION_REQUIREMENTS$"
 RULE_OPTION_OTT_RUS_CONVENTION_FAILURE: "£KR_game_rule_flag_TUR  £KR_game_rule_flag_RUS  Failure"
 RULE_OPTION_OTT_RUS_CONVENTION_FAILURE_DESC: "The discussions break down at an early stage, and no agreement is reached."

 TUR_PATH: "£KR_game_rule_flag_TUR  The Fallen Empire"
 TUR_PATH_LOSS_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CThe Cairo Pact are victorious against the Ottomans§!"
 TUR_PATH_NOT_OSF_REQUIREMENTS: "$TUR_PATH_LOSS_REQUIREMENTS$\n\n§CFreedom and Accord Party§! or §CDemocratic Party§! in §Y$OTT_PATH$§!"
 TUR_PATH_KADRO_REQUIREMENTS: "Any §CSorelians§! or §CJacobins§! in §Y$FRA_PATH$§!\nor any §CMaximists§! in §Y$ENG_PATH$§!\nor any §CSZRS§! or §CPSR-Left (Maximalist)§! or §CVST-Left - Zinovyev§! in §Y$RUS_PATH$§!"
 RULE_OPTION_TUR_PATH_RANDOM: "Standard"
 RULE_OPTION_TUR_PATH_RANDOM_DESC: "The Ottoman Empire is dismantled, but Turkey remains. What will the future hold for it?"
 RULE_OPTION_TUR_PATH_OSF_DESC: "Kemal's former opponents take power and form the Ottoman Salvation Party, which aims to preserve the Sultanate at all cost.\nThe subsequent elections are won by the"
 RULE_OPTION_TUR_PATH_SOCLIB: "£KR_game_rule_flag_TUR  Ottoman Salvation Party (Liberal)"
 RULE_OPTION_TUR_PATH_SOCLIB_DESC: "$RULE_OPTION_TUR_PATH_OSF_DESC$ liberal wing of the §lOsmanlı Selâmet Fırkası§!, or Ottoman Salvation Party.$TUR_PATH_LOSS_REQUIREMENTS$"
 RULE_OPTION_TUR_PATH_SOCCON: "£KR_game_rule_flag_TUR  Ottoman Salvation Party (Conservative)"
 RULE_OPTION_TUR_PATH_SOCCON_DESC: "$RULE_OPTION_TUR_PATH_OSF_DESC$ conservative wing of the §cOsmanlı Selâmet Fırkası§!, or Ottoman Salvation Party.$TUR_PATH_LOSS_REQUIREMENTS$"
 RULE_OPTION_TUR_PATH_AUTDEM: "£KR_game_rule_flag_TUR_rep  Turkish People's Party (Kemalist)"
 RULE_OPTION_TUR_PATH_AUTDEM_DESC: "After the failure of the liberals, Mustafa Kemal Gelibolu seizes power with the Kemalist wing of the §aTürkiye Halk Fırkası§!, or Turkish People's Party, and begins to lead the country toward his dream: the proclamation of Republic.$TUR_PATH_NOT_OSF_REQUIREMENTS$"
 RULE_OPTION_TUR_PATH_PATAUT: "£KR_game_rule_flag_TUR  Turkish People's Party (Militarist)"
 RULE_OPTION_TUR_PATH_PATAUT_DESC: "In Kemal's absence, Fevzi Pasha takes power in the country after the fall of the Liberals. His vision of the republic is led by the militarist wing of the §PTürkiye Halk Fırkası§!, or Turkish People's Party, and is built on the cult of personality, and the cult of the military.$TUR_PATH_NOT_OSF_REQUIREMENTS$"
 RULE_OPTION_TUR_PATH_KEMAL_DESC: "After the failure of the liberals, Mustafa Kemal Gelibolu seizes power with the Turkish People's Party and begins to lead the country toward his dream: the proclamation of a Republic.\nHowever, the young republic is unable to control the rise of nationalism, and the"
 RULE_OPTION_TUR_PATH_NATPOP: "£KR_game_rule_flag_TUR_rep  Turkish People's Party (Kadroist)"
 RULE_OPTION_TUR_PATH_NATPOP_DESC: "$RULE_OPTION_TUR_PATH_KEMAL_DESC$ Kadroist wing of the §nTürkiye Halk Fırkası§!, or Turkish People's Party come to power.$TUR_PATH_NOT_OSF_REQUIREMENTS$\n\n$TUR_PATH_KADRO_REQUIREMENTS$"
 RULE_OPTION_TUR_PATH_TOTALIST: "£KR_game_rule_flag_TUR_rep  Turkish People's Party (Revolutionary)"
 RULE_OPTION_TUR_PATH_TOTALIST_DESC: "$RULE_OPTION_TUR_PATH_KEMAL_DESC$ Kadroist wing of the Turkish People's Party come to power. Leadership then passes to the revolutionaries of the §oTürkiye Halk Fırkası§!, or Turkish People's Party, who wish to finish the revolution and align with the Third Internationale.$TUR_PATH_NOT_OSF_REQUIREMENTS$\n\n$TUR_PATH_KADRO_REQUIREMENTS$"

 TUR_FORPOL: "£KR_game_rule_flag_TUR  Turkish Foreign Policy"
 RULE_OPTION_TUR_FORPOL_RANDOM: "Standard"
 RULE_OPTION_TUR_FORPOL_RANDOM_DESC: "After recovering from the great turmoil of the dissolution of the Ottoman Empire, Turkey is now ready to reassert itself on the world stage."
 RULE_OPTION_TUR_FORPOL_GER: "£KR_game_rule_flag_TUR  £KR_game_rule_flag_GER  Reichspakt"
 RULE_OPTION_TUR_FORPOL_GER_DESC: "As the Great Bear looms over the Caucasus, Turkey looks to renew their old alliance with Germany.$TUR_PATH_LOSS_REQUIREMENTS$\n\n§RNot§! §CTurkish People's Party (Kadroist)§! or §CTurkish People's Party (Revolutionary)§! in §Y$TUR_PATH$§!"
 RULE_OPTION_TUR_FORPOL_ENT: "£KR_game_rule_flag_TUR  £KR_game_rule_flag_CAN  Entente"
 RULE_OPTION_TUR_FORPOL_ENT_DESC: "Turkey aligns itself with their former enemies to help scourge the Mediterranean of syndicalism.$TUR_PATH_LOSS_REQUIREMENTS$\n\nAny §COttoman Salvation Party§! in §Y$TUR_PATH$§!"
 RULE_OPTION_TUR_FORPOL_BPL: "£KR_game_rule_flag_TUR  £KR_game_rule_flag_SER  Belgrade Pact"
 RULE_OPTION_TUR_FORPOL_BPL_DESC: "Seeking common cause with their old adversaries, Turkey sees its future best aligned to its neighbours in the Balkans.$TUR_PATH_LOSS_REQUIREMENTS$\n§CGreece left the Belgrade Pact§!\n\n§CTurkish People's Party (Kemalist)§! in §Y$TUR_PATH$§!"
 RULE_OPTION_TUR_FORPOL_RUS: "£KR_game_rule_flag_TUR  £KR_game_rule_flag_RUS  Moscow Accord"
 RULE_OPTION_TUR_FORPOL_RUS_DESC: "In a spectacular about-face, the Turks forge a new alliance with one of their most notorious historical adversaries.$TUR_PATH_LOSS_REQUIREMENTS$\n§CGermany is defeated in the Second Weltkrieg§!\n\n§RNot§! §CSocialist Republic§! in §Y$RUS_AFTERMATH$§!\n§RNot§! §CSZRS (Ideocrat)§! or §CRDP - Sulimov§! in §Y$RUS_PATH$§!"
 RULE_OPTION_TUR_FORPOL_CHN: "£KR_game_rule_flag_TUR  £KR_game_rule_flag_LKT  China"
 RULE_OPTION_TUR_FORPOL_CHN_DESC: "Finding common ground between the Kemalist movement and Kuomintang in China, Turkey chooses to align itself with their new friends in the East.$TUR_PATH_LOSS_REQUIREMENTS$\n\n§CThe Left Kuomintang unifies China§! and\n§CTurkish People's Party (Revolutionary)§! in §Y$TUR_PATH$§! or\n\n§CThe Right Kuomintang unifies China§! and\n§CTurkish People's Party (Kemalist)§! or §CTurkish People's Party (Kadroist)§! in §Y$TUR_PATH$§!\n\n§RNot§! §CHu Zongnan's Fifth National Revolution§! in\n§Y$CHI_PATH$§!\n§RNot§! §CThe Citizen-Stratocracy§! in §Y$GXC_KMT_PATH$§!\n§RNot§! §CThe Blue Shirt Revolution§! or any §CGeneralissimo§! in §Y$YUN_KMT_PATH$§!"

 GEO_PATH: "£KR_game_rule_flag_GEO  The Struggle for Sakartvelo"
 RULE_OPTION_GEO_PATH_RANDOM: "Standard"
 RULE_OPTION_GEO_PATH_RANDOM_DESC: "After the retirement of Zhordania, the future of Georgia is to be decided by the ballot, and if that fails, by the bullet."
 RULE_OPTION_GEO_PATH_SOCDEM_DESC: "Despite the retirement of Noe Zhordania, the §SSakartvelos Sotsial-Demokratiuli Partia§!, or Social-Democratic Party of Georgia, also known as the Mensheviks, manage to stay in power.\nThey form a coalition with the"
 RULE_OPTION_GEO_PATH_SOCDEM_SOCLIB: "£KR_game_rule_flag_GEO  Republic - Mensheviks-SSPSP"
 RULE_OPTION_GEO_PATH_SOCDEM_SOCLIB_DESC: "$RULE_OPTION_GEO_PATH_SOCDEM_DESC$ agrarian-focused Sakartvelos Sotsialist-Pederalistta Sarevolutsio Partia, or Socialist-Federalist Revolutionary Party of Georgia."
 RULE_OPTION_GEO_PATH_SOCDEM_RADSOC: "£KR_game_rule_flag_GEO  Republic - Mensheviks-SSRP"
 RULE_OPTION_GEO_PATH_SOCDEM_RADSOC_DESC: "$RULE_OPTION_GEO_PATH_SOCDEM_DESC$ revolutionary Sakartvelos Sotsialist-Revolutsionerta Partia, or Georgian Party of Socialist-Revolutionaries."
 RULE_OPTION_GEO_PATH_SOCCON_START_DESC: "The retirement of Noe Zhordania proves to be the death knell to the SSDP's hold on power. They are succeeded in the election by a conservative coalition"
 RULE_OPTION_GEO_PATH_REP_SOCCON: "£KR_game_rule_flag_GEO  Republic - National-Democrats"
 RULE_OPTION_GEO_PATH_REP_SOCCON_DESC: "$RULE_OPTION_GEO_PATH_SOCCON_START_DESC$ led by the §cErovnul-Demokratiuli Partia§!, or National-Democratic Party, which holds a referendum that re-affirms Georgia's status as a republic."
 RULE_OPTION_GEO_PATH_MON_DESC: "which holds a referendum that results in Georgia crowning"
 RULE_OPTION_GEO_PATH_MON_SOCCON_DESC: "$RULE_OPTION_GEO_PATH_SOCCON_START_DESC$ led by the §cErovnul-Demokratiuli Partia§!, $RULE_OPTION_GEO_PATH_MON_DESC$"
 RULE_OPTION_GEO_PATH_MON_GIORGI_SOCCON: "£KR_game_rule_flag_GEO_mon  Giorgi XIII - National-Democrats"
 RULE_OPTION_GEO_PATH_MON_GIORGI_SOCCON_DESC: "$RULE_OPTION_GEO_PATH_MON_SOCCON_DESC$ Giorgi XIII Bagration, descended from an ancient royal family, as king."
 RULE_OPTION_GEO_PATH_MON_JOACHIM_SOCCON: "£KR_game_rule_flag_GEO_mon  Ioakhim I - National-Democrats"
 RULE_OPTION_GEO_PATH_MON_JOACHIM_SOCCON_DESC: "$RULE_OPTION_GEO_PATH_MON_SOCCON_DESC$ Joachim of Prussia, a German prince, as king.\n\n§RBenötigt:§!\n§CThe Treaty Remains§! in §Y$GEO_TREATY$§!"
 RULE_OPTION_GEO_PATH_PATAUT: "£KR_game_rule_flag_GEO_mon  Giorgi XIII - Tetri Giorgi"
 RULE_OPTION_GEO_PATH_PATAUT_DESC: "$RULE_OPTION_GEO_PATH_SOCCON_START_DESC$ $RULE_OPTION_GEO_PATH_MON_DESC$ Giorgi XIII as king.\n\nFollowing the restoration of the Georgian monarchy, General Shalva Maglakelidze, with the agreement of the king, leads a coup and consolidates power in a coalition with the ultra-nationalist §PTetri Giorgi§!, or Patriotic Union of White George."

 GEO_TREATY: "£KR_game_rule_flag_GEO  £KR_game_rule_flag_GER  The Treaty of Poti"
 RULE_OPTION_GEO_TREATY_RANDOM: "Standard"
 RULE_OPTION_GEO_TREATY_RANDOM_DESC: "As the Georgian economy falls to pieces, the future of economic cooperation and political alignment with Germany hangs in the balance."
 RULE_OPTION_GEO_TREATY_KEPT: "£KR_game_rule_flag_GEO  £KR_game_rule_flag_GER  The Treaty Remains"
 RULE_OPTION_GEO_TREATY_KEPT_DESC: "Georgia keeps the Treaty of Poti afloat, keeping their alignment with Germany for the time being."
 RULE_OPTION_GEO_TREATY_RENOUNCED: "£KR_game_rule_flag_GEO  The Treaty Renounced"
 RULE_OPTION_GEO_TREATY_RENOUNCED_DESC: "Georgia renounces the Treaty of Poti and realigns into a more independent foreign and domestic policy.$POL_REVOLTS_PATAUT_REQUIREMENTS$"

 ARM_PATH: "£KR_game_rule_flag_ARM  The Sons of Hayk"
 RULE_OPTION_ARM_PATH_RANDOM: "Standard"
 RULE_OPTION_ARM_PATH_RANDOM_DESC: "Armenia, having struggled for centuries against its foreign rulers, has finally gained its independence. But after so much suffering, what does the future hold?"
 RULE_OPTION_ARM_PATH_PATAUT: "£KR_game_rule_flag_ARM  The Survival Party"
 RULE_OPTION_ARM_PATH_PATAUT_DESC: "Garegin Nzhdeh manages to retain power and, leading the §PHayreniki Prkutyan Komite§!, or Committee for the Salvation of the Fatherland, together with the Dashnaks, forms a government nicknamed the Survival Party, intent on defending Armenia against any possible foreign threat.\n\n§RBenötigt:§!\n§RNot§! §CDictatorship§! in §Y$RUS_AFTERMATH$§!"
 RULE_OPTION_ARM_PATH_NOT_PATAUT_DESC: "Garegin Nzhdeh manages to retain power and, inspired by Savinkov's thoughts, establishes a totalitarian state"
 RULE_OPTION_ARM_PATH_NATPOP: "£KR_game_rule_flag_ARM  Proclaim Tseghakronism"
 RULE_OPTION_ARM_PATH_NATPOP_DESC: "$RULE_OPTION_ARM_PATH_NOT_PATAUT_DESC$ led by the §nTseghakronutyun§!, or Tseghakronist Movement.$RUS_PATH_NATPOP_REQUIREMENTS$"
 RULE_OPTION_ARM_PATH_AUTDEM: "£KR_game_rule_flag_ARM  The True Saviour of Armenia"
 RULE_OPTION_ARM_PATH_AUTDEM_DESC: "$RULE_OPTION_ARM_PATH_NOT_PATAUT_DESC$.\nHowever, the opposition manages to stage a coup, and a democratic coalition led by Boghos Dadian takes over the §aHayreniki Prkutyan Komite§!, or Committee for the Salvation of the Fatherland, and the country itself.$RUS_PATH_NATPOP_REQUIREMENTS$"
 RULE_OPTION_ARM_PATH_ELECTIONS_DESC: "Garegin Nzhdeh resigns, and Armenia holds its first elections."
 RULE_OPTION_ARM_PATH_DEM_DESC: "$RULE_OPTION_ARM_PATH_ELECTIONS_DESC$ The Democratic Coalition wins"
 RULE_OPTION_ARM_PATH_MARLIB: "£KR_game_rule_flag_ARM  Democratic Coalition - Ramgavar"
 RULE_OPTION_ARM_PATH_MARLIB_DESC: "$RULE_OPTION_ARM_PATH_DEM_DESC$ and the new Prime Minister is Mihran Damadian of the §mRamgavar Azatakan Kusaktsutyun§!, or Armenian Democratic Liberal Party."
 RULE_OPTION_ARM_PATH_SOCDEM: "£KR_game_rule_flag_ARM  Democratic Coalition - Dashnaks"
 RULE_OPTION_ARM_PATH_SOCDEM_DESC: "$RULE_OPTION_ARM_PATH_DEM_DESC$ and the new Prime Minister is Ruben Ter Minassian of the §SHay Heghapokhakan Dashnaktsutyun§!, or Armenian Revolutionary Federation, also known as Dashnaks."
 RULE_OPTION_ARM_PATH_SOCCON: "£KR_game_rule_flag_ARM  Democratic Coalition - Populists"
 RULE_OPTION_ARM_PATH_SOCCON_DESC: "$RULE_OPTION_ARM_PATH_DEM_DESC$, with the Ramgavar candidate becoming Prime Minister.\nLater, the Democratic Coalition splits, and Michael Papadjanian's §cZhoghovrdakan Azatakan Kusaktsutyun§!, or Armenian Populist Party, are elected."
 RULE_OPTION_ARM_PATH_SOCLIB: "£KR_game_rule_flag_ARM  Democratic Coalition - Armenakan"
 RULE_OPTION_ARM_PATH_SOCLIB_DESC: "$RULE_OPTION_ARM_PATH_DEM_DESC$, with the Dashnak candidate becoming Prime Minister.\nLater, the Democratic Coalition splits, and Levon Pashalian's §lArmenakan Kusaktsutyun§!, or Armenakan Party, are elected."
 RULE_OPTION_ARM_PATH_SOC_DESC: "$RULE_OPTION_ARM_PATH_ELECTIONS_DESC$ After the revolutionaries score a landslide victory in the elections,"
 RULE_OPTION_ARM_PATH_RADSOC: "£KR_game_rule_flag_ARM_soc  Revolutionaries - Hunchaks"
 RULE_OPTION_ARM_PATH_RADSOC_DESC: "$RULE_OPTION_ARM_PATH_SOC_DESC$ Gregory Yeghikian's §RSocial Demokrat Hunchakian Kusaktsutyun§!, or Social Democrat Hunchakian Party, also known as Hunchaks, win over the First Armenian Popular Assembly."
 RULE_OPTION_ARM_PATH_TOTALIST: "£KR_game_rule_flag_ARM_soc  Revolutionaries - Communists"
 RULE_OPTION_ARM_PATH_TOTALIST_DESC: "$RULE_OPTION_ARM_PATH_SOC_DESC$ nastas Mikoyan's §oKomunistakan Kusaktsutyun§!, or Communist Party, win over the First Armenian Popular Assembly."

 ARM_FORPOL: "£KR_game_rule_flag_ARM  Armenian Foreign Policy"
 ARM_FORPOL_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CIran and the Cairo Pact are victorious against the Ottomans§!"
 RULE_OPTION_ARM_FORPOL_RANDOM: "Standard"
 RULE_OPTION_ARM_FORPOL_RANDOM_DESC: "The newly independent Armenia is quite vulnerable, and perhaps should think about joining a larger military bloc."
 RULE_OPTION_ARM_FORPOL_GER: "£KR_game_rule_flag_ARM  £KR_game_rule_flag_GER  Reichspakt"
 RULE_OPTION_ARM_FORPOL_GER_DESC: "Armenia's best protection against Russian encroachment is found with the Germans.$ARM_FORPOL_REQUIREMENTS$\n\n§CThe True Saviour of Armenia§! in §Y$ARM_PATH$§!"
 RULE_OPTION_ARM_FORPOL_RUS: "£KR_game_rule_flag_ARM  £KR_game_rule_flag_RUS  Moscow Accord"
 RULE_OPTION_ARM_FORPOL_RUS_DESC: "Armenia sees the old world lying decrepit and obsolete, and aligning with Russia as their best hope for continuing their independence.$ARM_FORPOL_REQUIREMENTS$\n\n§RNot§! §CThe True Saviour of Armenia§! or any §CRevolutionaries§! in §Y$ARM_PATH$§!$RUS_AFTERMATH_NOT_SOC_REQUIREMENTS$\n\n§CHinweis: If Russia is led by Boris Savinkov, Armenia becomes a Russian puppet.§!"
 RULE_OPTION_ARM_FORPOL_PER: "£KR_game_rule_flag_ARM  £KR_game_rule_flag_PER  Tabriz Accords"
 RULE_OPTION_ARM_FORPOL_PER_DESC: "Having fought side by side in the Levant Crisis, Armenia and Iran elect to deepen their military cooperation, turning the Tabriz Accords into a permanent alliance to shield themselves from foreign threats.$ARM_FORPOL_REQUIREMENTS$\n\n§CHinweis: If Persia later joins another faction, Armenia will join alongside them if they have a compatible government.§!"
 RULE_OPTION_ARM_FORPOL_INT: "£KR_game_rule_flag_ARM_soc  £KR_game_rule_flag_FRA  £KR_game_rule_flag_RUS_soc  Third Internationale"
 RULE_OPTION_ARM_FORPOL_INT_DESC: "Armenia declares itself to be the light of the revolution in the Caucasus!$ARM_FORPOL_REQUIREMENTS$\n\nAny §CRevolutionaries§! in §Y$ARM_PATH$§!\n\n§CSocialist Republic§! in §Y$RUS_AFTERMATH$§!\nor §CRDP - Sulimov§! in §Y$RUS_PATH$§!\nor §CTurkish People's Party (Revolutionary)§! in §Y$TUR_PATH$§!\nor §CThird Internationale§! in §Y$PER_FORPOL$§!\n\n§CHinweis: If Russia is socialist, Armenia joins the Eastern Front of the Third Internationale.§!"

 JBS_PATH: "£KR_game_rule_flag_JBS  Fate of the Majilis"
 RULE_OPTION_JBS_PATH_RANDOM: "Standard"
 RULE_OPTION_JBS_PATH_RANDOM_DESC: "With the Saudi fanatics scattered, the Rashidis must now contend with the growing influence of the Majilis, the voice of the Shammari nobility."
 RULE_OPTION_JBS_PATH_AUTDEM: "£KR_game_rule_flag_JBS  Cautious Modernisation"
 RULE_OPTION_JBS_PATH_AUTDEM_DESC: "The influence of the Majilis is allowed to further grow, setting the Emirate either §aĀl Rashīd§! or §aĀl Subhān§! on a course towards semi-parliamentary rule."
 RULE_OPTION_JBS_PATH_PATAUT: "£KR_game_rule_flag_JBS  An Absolute Emir"
 RULE_OPTION_JBS_PATH_PATAUT_DESC: "The Emir will smother what power the Majilis have managed to accrue and centralise power around his person, re-establishing the absolute rule of §PĀl Rashīd§! in the Emirate."

 JBS_EMIR: "£KR_game_rule_flag_JBS  The Battle for Ha'il"
 JBS_EMIR_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CJabbal Shammar wins the Arab Unification War§!"
 RULE_OPTION_JBS_EMIR_RANDOM: "Standard"
 RULE_OPTION_JBS_EMIR_RANDOM_DESC: "Despite having a significant period of internal peace, with Emir Saūd reigning for almost 30 years, the future still looms large for the Emirate of Jabal Shammar, also known as Ha'il.\nWith a resurgent Saudi state to their south, and a weakening Ottoman patron, many wonder if the Rashidi monarchy is long for this world."
 RULE_OPTION_JBS_EMIR_AZIZ: "£KR_game_rule_flag_JBS  £KR_game_rule_flag_TUR  Saūd ibn Abd al-Azīz"
 RULE_OPTION_JBS_EMIR_AZIZ_DESC: "Despite threats internal and external, the young but experienced Emir, manages to survive and keep the internal peace in the troubled monarchy, as well as its Ottoman affiliation.$JBS_EMIR_REQUIREMENTS$"
 RULE_OPTION_JBS_EMIR_IBN_TALAL_DESC: "Following the defeat of the Saudi forces, Abdallah ibn Talal launches a swift coup and takes power. However, this shakeup causes the shaky internal peace to fracture, and alongside the fratricide caused by the crisis, the polity's nominal alliance with the Ottoman Empire is put into question."
 RULE_OPTION_JBS_EMIR_IBN_TALAL_OTT: "£KR_game_rule_flag_JBS  £KR_game_rule_flag_TUR  Abdallah ibn Talal - Ottomans"
 RULE_OPTION_JBS_EMIR_IBN_TALAL_OTT_DESC: "$RULE_OPTION_JBS_EMIR_IBN_TALAL_DESC$\n\nIn the end, the existing alliance is maintained, and Jabal Shammar finds itself on the side of the Porte.$JBS_EMIR_REQUIREMENTS$"
 RULE_OPTION_JBS_EMIR_IBN_TALAL_EGY: "£KR_game_rule_flag_JBS  £KR_game_rule_flag_EGY  Abdallah ibn Talal - Cairo Pact"
 RULE_OPTION_JBS_EMIR_IBN_TALAL_EGY_DESC: "$RULE_OPTION_JBS_EMIR_IBN_TALAL_DESC$\n\nWith the Porte in seemingly dire straits, Abdallah throws caution to the wind and gambles on the conquest of Hejaz, on the side of the anti-Ottoman forces.$JBS_EMIR_REQUIREMENTS$"
 RULE_OPTION_JBS_EMIR_IBN_MITAB: "£KR_game_rule_flag_JBS  £KR_game_rule_flag_TUR  Abdallah ibn Mitab"
 RULE_OPTION_JBS_EMIR_IBN_MITAB_DESC: "With both Saūd and Abdallah ibn Talal dead following the failure of the latter's coup, Abdallah ibn Mitab takes control of a much battered and bruised Ha'il. Inline with his predecessors, he keeps the alliance with the Porte in effect.$JBS_EMIR_REQUIREMENTS$"
 RULE_OPTION_JBS_EMIR_SUBHAN: "£KR_game_rule_flag_JBS_subhan  £KR_game_rule_flag_EGY  Saūd al-Subhan"
 RULE_OPTION_JBS_EMIR_SUBHAN_DESC: "Following a coup by urban notables, the al-Subhan family takes control directly and casts aside the Rashidi Dynasty. With the Porte attempting to sponsor a Rashidi return, the new Subhani Emir has to rely on the assistance of Cairo to secure their independence, joining them on the side of the anti-Ottoman forces when the time comes.$JBS_EMIR_REQUIREMENTS$\n\n§RNot§! §CAn Absolute Emir§! in §Y$JBS_PATH$§!"

 JBS_UNIFICATION: "£KR_game_rule_flag_JBS  £KR_game_rule_flag_HEJ  Shammari-Hejazi Unification"
 JBS_UNIFICATION_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CJabal Shammar conquers Hejaz during the Levant Crisis§!\n\n§CAbdallah ibn Talal - Cairo Pact§! or §CSaūd al-Subhan§! in §Y$JBS_EMIR$§!"
 RULE_OPTION_JBS_UNIFICATION_RANDOM: "Standard"
 RULE_OPTION_JBS_UNIFICATION_RANDOM_DESC: "Having taken control of the former Sharifate of Mecca, the Shammari state now comes under pressure from the Hejazi nobility and civil service, desiring a degree of autonomy in managing their affairs."
 RULE_OPTION_JBS_UNIFICATION_ANNEX: "£KR_game_rule_flag_JBS_arabia  A United Arabia"
 RULE_OPTION_JBS_UNIFICATION_ANNEX_DESC: "Rejecting any notion of federalism, the Shammari state will directly annex the Hejaz, centralising power around the existing government to the dismay of many Hejazi.$JBS_UNIFICATION_REQUIREMENTS$"
 RULE_OPTION_JBS_UNIFICATION_UNION: "£KR_game_rule_flag_JBS  £KR_game_rule_flag_HEJ  Two States, One Sultan"
 RULE_OPTION_JBS_UNIFICATION_UNION_DESC: "Acceding to the wishes of the autonomists, the new Shammari state will be a federal and personal union between Central Arabia and Hejaz, sharing a single Monarch but retaining their own state institutions.$JBS_UNIFICATION_REQUIREMENTS$"

 SAU_PATH: "£KR_game_rule_flag_SAU  The Rule of the House of Saud"
 RULE_OPTION_SAU_PATH_RANDOM: "Standard"
 RULE_OPTION_SAU_PATH_RANDOM_DESC: "With the Turks' lapdogs in the House of Rashid dealt with, Arabia is caught between the ambitions of the House of Saud and their powerful powerful Ulama supporters."
 RULE_OPTION_SAU_PATH_START_DESC: "The House of Saud will use the Ikhwan and their allies in the Ulama against their Arab rivals,"
 RULE_OPTION_SAU_PATH_HEGEMONY: "£KR_game_rule_flag_SAU  A Saudi Betrayal"
 RULE_OPTION_SAU_PATH_HEGEMONY_DESC: "$RULE_OPTION_SAU_PATH_START_DESC$ but will seek to crush them once their common enemies are eliminated, centralising all power in the new Arabia around themselves."
 RULE_OPTION_SAU_PATH_FAITH: "£KR_game_rule_flag_SAU_arabia  Land of Faith"
 RULE_OPTION_SAU_PATH_FAITH_DESC: "$RULE_OPTION_SAU_PATH_START_DESC$ and will further embrace them once their common enemies are eliminated, seeking to cleanse Arabia of all foreign and apostate influence, potentially culminating in the declaration of a new Caliphate."

 OMA_PROTECTOR: "£KR_game_rule_flag_OMA  Muscat's Protector"
 OMA_PROTECTOR_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CNajd and Hasa wins the Arab Unification War§!"
 RULE_OPTION_OMA_PROTECTOR_RANDOM: "Standard"
 RULE_OPTION_OMA_PROTECTOR_RANDOM_DESC: "Taking advantage of old claims, the Saudis occupy the disputed territories. It is clear that they do not intend to stop until they capture all of Oman, which itself must decide how it is going to respond."
 RULE_OPTION_OMA_PROTECTOR_OTT: "£KR_game_rule_flag_OMA  £KR_game_rule_flag_TUR  Ottoman Protection"
 RULE_OPTION_OMA_PROTECTOR_OTT_DESC: "For the sake of their protection, the Omanis let in Ottoman troops and come under their patronage. At least for now...$OMA_PROTECTOR_REQUIREMENTS$"
 RULE_OPTION_OMA_PROTECTOR_RAJ: "£KR_game_rule_flag_OMA  £KR_game_rule_flag_RAJ  Lahore Protection"
 RULE_OPTION_OMA_PROTECTOR_RAJ_DESC: "For their protection, the Omanis re-establish weakened ties with Lahore. Although this limits their power, they gain a formidable defender.$OMA_PROTECTOR_REQUIREMENTS$"
 RULE_OPTION_OMA_PROTECTOR_ALONE: "£KR_game_rule_flag_OMA  Alone"
 RULE_OPTION_OMA_PROTECTOR_ALONE_DESC: "Neither the Ottomans nor Lahore respond to Oman's appeal.$OMA_PROTECTOR_REQUIREMENTS$"

 YEM_PATH: "£KR_game_rule_flag_YEM  A Fragile Imamate"
 RULE_OPTION_YEM_PATH_RANDOM: "Standard"
 RULE_OPTION_YEM_PATH_RANDOM_DESC: "The people grow tired of the Ottoman-allied Imamate of Yemen. Calls for change grow."
 RULE_OPTION_YEM_PATH_PATAUT: "£KR_game_rule_flag_YEM  The Threat Averted"
 RULE_OPTION_YEM_PATH_PATAUT_DESC: "The threat of revolution in Yemen is averted, as §PBanū al Rassī§!, or the Rassid Dynasty, and the Imamate holds on."
 RULE_OPTION_YEM_PATH_SOCCON: "£KR_game_rule_flag_YEM  A Moral Republic"
 RULE_OPTION_YEM_PATH_SOCCON_DESC: "A conservative republic under the §cHay' al Nadāl§!, or Committee for the Struggle, is established."
 RULE_OPTION_YEM_PATH_SOCLIB: "£KR_game_rule_flag_YEM  New Modernity"
 RULE_OPTION_YEM_PATH_SOCLIB_DESC: "A liberal republic under the §lShabāb al 'Amr bil Ma'rūf wal Nahyān al Munkar§!, or Free Yemen Movement, is established."

 ASY_REVOLT: "£KR_game_rule_flag_ASY  The Assyrian Aufstand"
 RULE_OPTION_ASY_REVOLT_RANDOM: "Standard"
 RULE_OPTION_ASY_REVOLT_RANDOM_DESC: "The Assyrians have been expelled to the Basra region, and their discontent begins to grow. Whether this leads to an uprising or not, time will tell."
 RULE_OPTION_ASY_REVOLT_NO_REVOLT: "£KR_game_rule_flag_TUR  Kein Aufstand"
 RULE_OPTION_ASY_REVOLT_NO_REVOLT_DESC: "The revolt is avoided."
 RULE_OPTION_ASY_REVOLT_ABANDON: "£KR_game_rule_flag_ASY  £KR_game_rule_flag_TUR  Assyrians Alone"
 RULE_OPTION_ASY_REVOLT_ABANDON_DESC: "The Assyrians revolt. Canada is reluctant to involve itself, leaving the Assyrians abandoned and likely doomed."
 RULE_OPTION_ASY_REVOLT_AUTON_DESC: "The Assyrians revolt. Canada intercedes on their behalf, petitioning the Ottomans to grant them autonomy. This request is"
 RULE_OPTION_ASY_REVOLT_AUTON_NO: "£KR_game_rule_flag_ASY  £KR_game_rule_flag_TUR  £KR_game_rule_flag_CAN  Autonomy Denied"
 RULE_OPTION_ASY_REVOLT_AUTON_NO_DESC: "$RULE_OPTION_ASY_REVOLT_AUTON_DESC$ denied, and Canada sends arms and manpower to aid the Assyrians."
 RULE_OPTION_ASY_REVOLT_AUTON_YES: "£KR_game_rule_flag_ASY  £KR_game_rule_flag_TUR  £KR_game_rule_flag_CAN  Autonomy Granted"
 RULE_OPTION_ASY_REVOLT_AUTON_YES_DESC: "$RULE_OPTION_ASY_REVOLT_AUTON_DESC$ granted, and the short-lived uprising concludes peacefully."
 RULE_OPTION_ASY_REVOLT_PEACE_DESC: "The Assyrians revolt. Canada petitions the Ottomans to grant independence to their old allies."
 RULE_OPTION_ASY_REVOLT_PEACE_NO: "£KR_game_rule_flag_ASY  £KR_game_rule_flag_TUR  £KR_game_rule_flag_CAN  Independence Denied"
 RULE_OPTION_ASY_REVOLT_PEACE_NO_DESC: "$RULE_OPTION_ASY_REVOLT_PEACE_DESC$ The Ottomans ignore the intercession and Canada and the Entente send arms, manpower and volunteers to aid the Assyrians."
 RULE_OPTION_ASY_REVOLT_PEACE_YES: "£KR_game_rule_flag_ASY  £KR_game_rule_flag_TUR  £KR_game_rule_flag_CAN  Independence Granted"
 RULE_OPTION_ASY_REVOLT_PEACE_YES_DESC: "$RULE_OPTION_ASY_REVOLT_PEACE_DESC$ Against the odds, the Ottomans comply with the intervention and grant independence to the Assyrians, ending the revolt."

 ASY_PATH: "£KR_game_rule_flag_ASY  A New Homeland"
 ASY_PATH_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CThe Assyrians are victorious in their rebellion against the Ottomans§!\n\n§RNot§! §CKein Aufstand§! or §CAutonomy Granted§! in §Y$ASY_REVOLT$§!"
 RULE_OPTION_ASY_PATH_RANDOM: "Standard"
 RULE_OPTION_ASY_PATH_RANDOM_DESC: "Assyria gained independence, and now its fate must be determined. Is Patriarch Shimun XXI Eshai to lead Assyria to become a multinational state, an \"Assyria for the Assyrians\", or to become a puppet of British influence?"
 RULE_OPTION_ASY_PATH_SOCCON: "£KR_game_rule_flag_ASY  Multinational State"
 RULE_OPTION_ASY_PATH_SOCCON_DESC: "Shimun XXI Eshai focuses his efforts on creating a multinational country, following the views of the §cAssyrian Christian Democratic Party (East Rites)§!.$ASY_PATH_REQUIREMENTS$"
 RULE_OPTION_ASY_PATH_NATPOP: "£KR_game_rule_flag_ASY_mon  Assyria for the Assyrians"
 RULE_OPTION_ASY_PATH_NATPOP_DESC: "Shimun XXI Eshai crowns himself King of the new Assyria, and focuses his efforts on expanding its borders and creating a united Assyrian nation, aided by the former underground movement §nKhubba w Khuyada Athōraya§!, or Assyrian Love and Unity.$ASY_PATH_REQUIREMENTS$"
 RULE_OPTION_ASY_PATH_MARLIB: "£KR_game_rule_flag_ASY_dem  The Frontline of Imperialism"
 RULE_OPTION_ASY_PATH_MARLIB_DESC: "Shimun XXI Eshai partners with the Entente to create a bastion of British influence in the Persian Gulf, leaving much of the government affairs to an §mIEDC Commission§!, or Imperial Economic Development Council Commission.$ASY_PATH_REQUIREMENTS$"

 SYR_PATH: "£KR_game_rule_flag_SYR  The Heart of the Levant"
 SYR_PATH_REQUIREMENTS: "$TUR_PATH_LOSS_REQUIREMENTS$\n\n§RNot§! §CAnnexed Syria§! or §CArab Kingdom of Syria§! in\n§Y$EGY_SYRIA_OCCUPY$§!"
 RULE_OPTION_SYR_PATH_RANDOM: "Standard"
 RULE_OPTION_SYR_PATH_RANDOM_DESC: "Emerged during the Cairo Pact War with the Ottomans, Syria is a highly volatile state. What is its future, no one can predict."
 RULE_OPTION_SYR_PATH_SOCLIB: "£KR_game_rule_flag_SYR  People's Party (Damascene Wing)"
 RULE_OPTION_SYR_PATH_SOCLIB_DESC: "The Damascene wing of the §lHizb al Sha'b§!, or People's Party, wins the first election.$SYR_PATH_REQUIREMENTS$"
 RULE_OPTION_SYR_PATH_MARLIB: "£KR_game_rule_flag_SYR  People's Party (Aleppan Wing)"
 RULE_OPTION_SYR_PATH_MARLIB_DESC: "The Aleppan wing of the §mHizb al Sha'b§!, or People's Party, wins the first election.$SYR_PATH_REQUIREMENTS$"
 RULE_OPTION_SYR_PATH_LEB_NOTE_DESC: "§CHinweis: The actions of this government result in the Lebanese Declaration of Independence.§!"
 RULE_OPTION_SYR_PATH_SOCCON: "£KR_game_rule_flag_SYR  National Bloc"
 RULE_OPTION_SYR_PATH_SOCCON_DESC: "The status-quo §cKutlat al Watanīyah§!, or National Bloc, wins the first election.$SYR_PATH_REQUIREMENTS$\n\n$RULE_OPTION_SYR_PATH_LEB_NOTE_DESC$"
 RULE_OPTION_SYR_PATH_AUT_START_DESC: "The status-quo Kutlat al Watanīyah wins the first election. Subsequently,"
 RULE_OPTION_SYR_PATH_PATAUT: "£KR_game_rule_flag_SYR  Military Government"
 RULE_OPTION_SYR_PATH_PATAUT_DESC: "$RULE_OPTION_SYR_PATH_AUT_START_DESC$ a §PMilitary Government§! is formed when they are overthrown by the army.$SYR_PATH_REQUIREMENTS$\n\n$RULE_OPTION_SYR_PATH_LEB_NOTE_DESC$"
 RULE_OPTION_SYR_PATH_NATPOP: "£KR_game_rule_flag_SYR_natpop  Syrian Social Nationalist Party"
 RULE_OPTION_SYR_PATH_NATPOP_DESC: "$RULE_OPTION_SYR_PATH_AUT_START_DESC$ the military overthrows the government, and transfers power to the §nHizb al Sūrī al Qawmī al 'Ijtimā'ī§!, or Syrian Social Nationalist Party.$SYR_PATH_REQUIREMENTS$\n\n$RULE_OPTION_SYR_PATH_LEB_NOTE_DESC$"

 SYR_FORPOL: "£KR_game_rule_flag_SYR  Syrian Foreign Policy"
 RULE_OPTION_SYR_FORPOL_RANDOM: "Standard"
 RULE_OPTION_SYR_FORPOL_RANDOM_DESC: "Syria's existence owes itself to Egypt and the Cairo Pact, but is their destiny to be tied together in the future?"
 RULE_OPTION_SYR_FORPOL_EGY: "£KR_game_rule_flag_SYR  £KR_game_rule_flag_EGY  Cairo Pact"
 RULE_OPTION_SYR_FORPOL_EGY_DESC: "Syria remains part of the Cairo Pact, confirming its alliance with the Egyptians.$TUR_PATH_LOSS_REQUIREMENTS$\n\n§RNot§! §CAnnexed Syria§! in §Y$EGY_SYRIA_OCCUPY$§!"
 RULE_OPTION_SYR_FORPOL_GER: "£KR_game_rule_flag_SYR  £KR_game_rule_flag_GER  Reichspakt"
 RULE_OPTION_SYR_FORPOL_GER_DESC: "Syria leaves the Cairo Pact, and joins the Reichspakt if it exists.$SYR_PATH_REQUIREMENTS$"
 RULE_OPTION_SYR_FORPOL_INT_RESEARCH: "£KR_game_rule_flag_SYR  £KR_game_rule_flag_EGY  £KR_game_rule_flag_FRA  Phalanstère"
 RULE_OPTION_SYR_FORPOL_INT_RESEARCH_DESC: "Syria remains part of the Cairo Pact, but seeks additional support from the Third Internationale and joins the Phalanstère.$TUR_PATH_LOSS_REQUIREMENTS$\n\n§CPeople's Party (Damascene Wing)§! in §Y$SYR_PATH$§!\n\n§RNot§! §CAnnexed Syria§! or §CArab Kingdom of Syria§! in\n§Y$EGY_SYRIA_OCCUPY$§!"
 RULE_OPTION_SYR_FORPOL_RUS: "£KR_game_rule_flag_SYR  £KR_game_rule_flag_RUS  Moscow Accord"
 RULE_OPTION_SYR_FORPOL_RUS_DESC: "In the wake of the collapse of the Ottoman Empire, Russia seeks to further expand its influence in the Middle East, and invite Syria into the Moscow Accord.$TUR_PATH_LOSS_REQUIREMENTS$\n\n§CMoscow Accord§! in §Y$PER_FORPOL$§! or §CMoscow Accord§! in §Y$TUR_FORPOL$§! or\n§CRussia has puppeted either Iran or Turkey§!\n\n§RNot§! §CAnnexed Syria§! or §CArab Kingdom of Syria§! in\n§Y$EGY_SYRIA_OCCUPY$§!$RUS_AFTERMATH_NOT_SOC_REQUIREMENTS$"
 RULE_OPTION_SYR_FORPOL_ARAB_FED: "£KR_game_rule_flag_IRQ_fed  Arab Federation"
 RULE_OPTION_SYR_FORPOL_ARAB_FED_DESC: "Syria leaves the Cairo Pact, and seeks to form a Pan-Arab state.$SYR_PATH_REQUIREMENTS$\n§RNot§! §CSyrian Social Nationalist Party§! in §Y$SYR_PATH$§!"
 RULE_OPTION_SYR_FORPOL_NEUT: "£KR_game_rule_flag_SYR  Neutrality"
 RULE_OPTION_SYR_FORPOL_NEUT_DESC: "Syria leaves the Cairo Pact and adopts a policy of neutrality.$SYR_PATH_REQUIREMENTS$"

 LEB_PATH: "£KR_game_rule_flag_LEB  The Cedar Stands Tall"
 RULE_OPTION_LEB_PATH_RANDOM: "Standard"
 RULE_OPTION_LEB_PATH_RANDOM_DESC: "After discrimination under the Syrian government, Lebanon declares war on Syria and wins its independence - but the situation in the country is still unstable."
 RULE_OPTION_LEB_PATH_AUTDEM: "£KR_game_rule_flag_LEB  Lebanese Volunteer Army"
 RULE_OPTION_LEB_PATH_AUTDEM_DESC: "Chehab and his §aJaysh al Lubnānī§!, or Lebanese Volunteer Army, remain in power. They form a unified Lebanese nation, and remain neutral on world affairs.$TUR_PATH_LOSS_REQUIREMENTS$\n\n§CNational Bloc§! or §CSyrian Social Nationalist Party§! in\n§Y$SYR_PATH$§! or\n§CArab Kingdom of Syria§! in §Y$EGY_SYRIA_OCCUPY$§!"
 RULE_OPTION_LEB_PATH_NOT_AUTDEM_DESC: "Chehab leaves power under pressure from the Provisional Parliament."
 RULE_OPTION_LEB_PATH_MARLIB: "£KR_game_rule_flag_LEB_rep  National Bloc"
 RULE_OPTION_LEB_PATH_MARLIB_DESC: "$RULE_OPTION_LEB_PATH_NOT_AUTDEM_DESC$ The first election is won by §mKutlat al Watanīyah§!, or the National Bloc, which aim to reform the country into a European state, and to align with the Entente.$TUR_PATH_LOSS_REQUIREMENTS$\n\n§CNational Bloc§! or §CSyrian Social Nationalist Party§! in\n§Y$SYR_PATH$§! or\n§CArab Kingdom of Syria§! in §Y$EGY_SYRIA_OCCUPY$§!"
 RULE_OPTION_LEB_PATH_SOCLIB: "£KR_game_rule_flag_LEB_rep  Beirut Reform Society"
 RULE_OPTION_LEB_PATH_SOCLIB_DESC: "$RULE_OPTION_LEB_PATH_NOT_AUTDEM_DESC$ The first election is won by the §lJam'īyat Bayrūt al Islāhīyah§!, or Beirut Reform Society, which pursue secularism and enacting female suffrage, as well as remaining neutral on world affairs.$TUR_PATH_LOSS_REQUIREMENTS$\n\n§CNational Bloc§! or §CSyrian Social Nationalist Party§! in\n§Y$SYR_PATH$§! or\n§CArab Kingdom of Syria§! in §Y$EGY_SYRIA_OCCUPY$§!"
 RULE_OPTION_LEB_PATH_SOCCON_START_DESC: "$RULE_OPTION_LEB_PATH_NOT_AUTDEM_DESC$ The first election is won by the §cKutlat al Dustūrīyah§!, or Constitutional Bloc, which seek to reconcile with their Arab neighbours, favouring an alliance with the"
 RULE_OPTION_LEB_PATH_SOCCON_EGY: "£KR_game_rule_flag_LEB_rep  Constitutional Bloc - Cairo Pact"
 RULE_OPTION_LEB_PATH_SOCCON_EGY_DESC: "$RULE_OPTION_LEB_PATH_SOCCON_START_DESC$ Egyptians, or failing that, the Iraqis, if they hold Pan-Arab ambitions.$TUR_PATH_LOSS_REQUIREMENTS$\n\n§CNational Bloc§! or §CSyrian Social Nationalist Party§! in\n§Y$SYR_PATH$§! or\n§CArab Kingdom of Syria§! in §Y$EGY_SYRIA_OCCUPY$§!"
 RULE_OPTION_LEB_PATH_SOCCON_IRQ: "£KR_game_rule_flag_LEB_rep  Constitutional Bloc - Arab States"
 RULE_OPTION_LEB_PATH_SOCCON_IRQ_DESC: "$RULE_OPTION_LEB_PATH_SOCCON_START_DESC$ Iraqis if they hold Pan-Arab ambitions, or failing that, the Egyptians.$TUR_PATH_LOSS_REQUIREMENTS$\n\n§CNational Bloc§! or §CSyrian Social Nationalist Party§! in\n§Y$SYR_PATH$§! or\n§CArab Kingdom of Syria§! in §Y$EGY_SYRIA_OCCUPY$§!"
 RULE_OPTION_LEB_PATH_NATPOP: "£KR_game_rule_flag_LEB_natpop  Marada Movement"
 RULE_OPTION_LEB_PATH_NATPOP_DESC: "$RULE_OPTION_LEB_PATH_NOT_AUTDEM_DESC$ Soon afterwards, the §nTayyār al Marada§!, or Marada Movement, stage a coup d'état and begin to pursue the policies \"God, Fatherland, Family.\" They attempt to realise the dream of a Greater Lebanon.$TUR_PATH_LOSS_REQUIREMENTS$\n\n§CNational Bloc§! or §CSyrian Social Nationalist Party§! in\n§Y$SYR_PATH$§! or\n§CArab Kingdom of Syria§! in §Y$EGY_SYRIA_OCCUPY$§!"

 IRQ_PATH: "£KR_game_rule_flag_IRQ  The Cradle of Civilisation"
 RULE_OPTION_IRQ_PATH_RANDOM: "Standard"
 RULE_OPTION_IRQ_PATH_RANDOM_DESC: "Emerging during the war between the Cairo Pact and the Ottomans, Iraq is a highly volatile state. What is its future, no one can predict."
 RULE_OPTION_IRQ_PATH_YASIN_DESC: "Yasin al-Hashimi, former Müsir of the Ottoman-Iraqi army, gains power shortly after the end of the war."
 RULE_OPTION_IRQ_PATH_YASIN_AUTDEM: "£KR_game_rule_flag_IRQ  The National Chief"
 RULE_OPTION_IRQ_PATH_YASIN_AUTDEM_DESC: "$RULE_OPTION_IRQ_PATH_YASIN_DESC$ He succeeds in maintaining his position of National Chief, leading the §aHizb al Ikhā' al Watanī§!, or National Brotherhood Party.$TUR_PATH_LOSS_REQUIREMENTS$"
 RULE_OPTION_IRQ_PATH_ASSASSINATED_DESC: "$RULE_OPTION_IRQ_PATH_YASIN_DESC$ After alienating his Arab nationalist support base, he is assassinated by forces loyal to his former ally"
 RULE_OPTION_IRQ_PATH_NATPOP: "£KR_game_rule_flag_IRQ  al-Gaylani Coup"
 RULE_OPTION_IRQ_PATH_NATPOP_DESC: "$RULE_OPTION_IRQ_PATH_ASSASSINATED_DESC$ Rashid al-Gaylani of the §nNādī al Muthannā§!, or Al-Muthanna Club, who becomes the new National Chief and solidifies his position.$TUR_PATH_LOSS_REQUIREMENTS$"
 RULE_OPTION_IRQ_PATH_TAHA_AUTDEM: "£KR_game_rule_flag_IRQ  Taha's Retribution"
 RULE_OPTION_IRQ_PATH_TAHA_AUTDEM_DESC: "$RULE_OPTION_IRQ_PATH_ASSASSINATED_DESC$ Rashid al-Gaylani. Al-Gaylani is in turn is ousted by Yasin's brother, Taha al-Hashimi, who takes over the §aHizb al Ikhā' al Watanī§!, or National Brotherhood Party.$TUR_PATH_LOSS_REQUIREMENTS$"
 RULE_OPTION_IRQ_PATH_REP_SOCDEM: "£KR_game_rule_flag_IRQ  The al-Ahali Cabinet"
 RULE_OPTION_IRQ_PATH_REP_SOCDEM_DESC: "$RULE_OPTION_IRQ_PATH_ASSASSINATED_DESC$ Rashid al-Gaylani, who in turn is ousted by Yasin's brother. Taha al-Hashimi then rules with the support of the reformist §SJamā'at al Ahlī§!, or al-Ahali Group.$TUR_PATH_LOSS_REQUIREMENTS$"
 RULE_OPTION_IRQ_PATH_MON_DESC: "Ajami al-Sa'adun, with the support of Iran, proclaims himself King Ajami I of Iraq."
 RULE_OPTION_IRQ_PATH_MON_SOCDEM: "£KR_game_rule_flag_IRQ  The King's al-Chadirchi Cabinet"
 RULE_OPTION_IRQ_PATH_MON_SOCDEM_DESC: "$RULE_OPTION_IRQ_PATH_MON_DESC$ Kamil al-Chadirchi of the §SJamā'at al Ahlī§!, or al-Ahali Group, becomes his prime minister.$TUR_PATH_LOSS_REQUIREMENTS$"
 RULE_OPTION_IRQ_PATH_PATAUT: "£KR_game_rule_flag_IRQ  The King's al-Gaylani Cabinet"
 RULE_OPTION_IRQ_PATH_PATAUT_DESC: "$RULE_OPTION_IRQ_PATH_MON_DESC$ Rashid al-Gaylani becomes his prime minister, though the true power remains with the §PĀl Sa'dūn§!, or House of Sa'doun.$TUR_PATH_LOSS_REQUIREMENTS$"
 RULE_OPTION_IRQ_PATH_MARLIB: "£KR_game_rule_flag_IRQ  The King's al-Umari Cabinet"
 RULE_OPTION_IRQ_PATH_MARLIB_DESC: "$RULE_OPTION_IRQ_PATH_MON_DESC$ Al-Chadirchi of al-Ahali becomes his prime minister.\nThis cabinet falls and is replaced by one led by Arshad al-Umari and the §mHizb Hurrat al 'Arab§!, or Free Arab Party.$TUR_PATH_LOSS_REQUIREMENTS$"

 IRQ_FORPOL: "£KR_game_rule_flag_IRQ  Iraqi Foreign Policy"
 RULE_OPTION_IRQ_FORPOL_RANDOM: "Standard"
 RULE_OPTION_IRQ_FORPOL_RANDOM_DESC: "Caught between the Egyptian and Iranian blocs, Iraqi's policy towards its neighbours and the wider world may well come to define its existence."
 RULE_OPTION_IRQ_FORPOL_EGY: "£KR_game_rule_flag_IRQ  £KR_game_rule_flag_EGY  Cairo Pact"
 RULE_OPTION_IRQ_FORPOL_EGY_DESC: "Iraq allies with the Egyptians.$TUR_PATH_LOSS_REQUIREMENTS$\n\n§RNot§! §Cal-Gaylani Coup§! in §Y$IRQ_PATH$§!"
 RULE_OPTION_IRQ_FORPOL_GER: "£KR_game_rule_flag_IRQ  £KR_game_rule_flag_GER  Reichspakt"
 RULE_OPTION_IRQ_FORPOL_GER_DESC: "Iraq allies with the German hegemon.$TUR_PATH_LOSS_REQUIREMENTS$\n\n§CThe National Chief§! or §CTaha's Retribution§! or §CThe King's al-Gaylani Cabinet§! in §Y$IRQ_PATH$§!"
 RULE_OPTION_IRQ_FORPOL_TUR: "£KR_game_rule_flag_IRQ  £KR_game_rule_flag_TUR_rep  Turkey"
 RULE_OPTION_IRQ_FORPOL_TUR_DESC: "Iraq reconciles with the Turks, and later adopts a policy of neutrality.$TUR_PATH_LOSS_REQUIREMENTS$\n\n§RNot§! §Cal-Gaylani Coup§! or §CThe al-Ahali Cabinet§! or §CThe King's al-Chadirchi Cabinet§! in §Y$IRQ_PATH$§!"
 RULE_OPTION_IRQ_FORPOL_RUS: "£KR_game_rule_flag_IRQ  £KR_game_rule_flag_RUS  Moscow Accord"
 RULE_OPTION_IRQ_FORPOL_RUS_DESC: "In the wake of the collapse of the Ottoman Empire, Russia seeks to further expand its influence in the Middle East, and invite Iraq into the Moscow Accord.$TUR_PATH_LOSS_REQUIREMENTS$\n\n§CMoscow Accord§! in §Y$PER_FORPOL$§! or §CMoscow Accord§! in §Y$TUR_FORPOL$§! or\n§CRussia has puppeted either Iran or Turkey§!\n$RUS_AFTERMATH_NOT_SOC_REQUIREMENTS$"
 RULE_OPTION_IRQ_FORPOL_ARAB_FED: "£KR_game_rule_flag_IRQ_fed  Arab Federation"
 RULE_OPTION_IRQ_FORPOL_ARAB_FED_DESC: "Iraq attempts to form a Pan-Arab state.$TUR_PATH_LOSS_REQUIREMENTS$"
 RULE_OPTION_IRQ_FORPOL_NEUT: "£KR_game_rule_flag_IRQ  Neutrality"
 RULE_OPTION_IRQ_FORPOL_NEUT_DESC: "Iraq adopts a policy of neutrality.$TUR_PATH_LOSS_REQUIREMENTS$\n\n§RNot§! §Cal-Gaylani Coup§! in §Y$IRQ_PATH$§!"

 PER_PATH: "£KR_game_rule_flag_PER_mon  All the Shah's Men"
 RULE_OPTION_PER_PATH_RANDOM: "Standard"
 RULE_OPTION_PER_PATH_RANDOM_DESC: "The Majlis has become unruly, and underground political movements threaten to upend Persia's ruling Qajar dynasty and the established order."
 RULE_OPTION_PER_PATH_MON_DESC: "Despite turmoil, democratic freedoms are guaranteed while the Qajar dynasty continues."
 RULE_OPTION_PER_PATH_MON_DEM_DESC: "$RULE_OPTION_PER_PATH_MON_DESC$\nThe following elections are won by"
 RULE_OPTION_PER_PATH_MON_SOCDEM: "£KR_game_rule_flag_PER_mon  Monarchy - Democrats"
 RULE_OPTION_PER_PATH_MON_SOCDEM_DESC: "$RULE_OPTION_PER_PATH_MON_DEM_DESC$ the §SHezb Democrat§!, or Democrat Party."
 RULE_OPTION_PER_PATH_MON_SOCLIB: "£KR_game_rule_flag_PER_mon  Monarchy - Moderates"
 RULE_OPTION_PER_PATH_MON_SOCLIB_DESC: "$RULE_OPTION_PER_PATH_MON_DEM_DESC$ a loose coalition led by the §lHezab Eetedaliun§!, or Moderate Party, when they run for election."
 RULE_OPTION_PER_PATH_MON_SOCCON: "£KR_game_rule_flag_PER_mon  Monarchy - Reformists"
 RULE_OPTION_PER_PATH_MON_SOCCON_DESC: "$RULE_OPTION_PER_PATH_MON_DEM_DESC$ the §cHezb Eslah Talaban§!, or Reform Party."
 RULE_OPTION_PER_PATH_AUTDEM: "£KR_game_rule_flag_PER_mon  Monarchy - Qajars (Constitutional)"
 RULE_OPTION_PER_PATH_AUTDEM_DESC: "$RULE_OPTION_PER_PATH_MON_DEM_DESC$ a right-wing coalition which gives more power to the §aKhandane Qajar§!, or House of Qajar, when they run for later elections."
 RULE_OPTION_PER_PATH_PATAUT: "£KR_game_rule_flag_PER_mon  Monarchy - Qajars (Absolutist)"
 RULE_OPTION_PER_PATH_PATAUT_DESC: "$RULE_OPTION_PER_PATH_MON_DESC$\nThe Shah and the §PKhandane Qajar§!, or House of Qajar, assumes a greater political role, eventually tearing up the constitution entirely."
 RULE_OPTION_PER_PATH_REP_DESC: "The nation is transformed into a republic."
 RULE_OPTION_PER_PATH_REP_SOCDEM: "£KR_game_rule_flag_PER  Republic - Democrats"
 RULE_OPTION_PER_PATH_REP_SOCDEM_DESC: "$RULE_OPTION_PER_PATH_REP_DESC$ Sayyed Hasan Taqizadeh's §SHezb Democrat§!, or Democrat Party, win the following elections."
 RULE_OPTION_PER_PATH_REP_SOCLIB: "£KR_game_rule_flag_PER  Republic - Moderates"
 RULE_OPTION_PER_PATH_REP_SOCLIB_DESC: "$RULE_OPTION_PER_PATH_REP_DESC$ Mohammad Mosaddegh's §lHezab Eetedaliun§!, or Moderate Party win the election whenever they are in the running."
 RULE_OPTION_PER_PATH_MARLIB: "£KR_game_rule_flag_PER  Republic - Revivalists"
 RULE_OPTION_PER_PATH_MARLIB_DESC: "$RULE_OPTION_PER_PATH_REP_DESC$ Mohammad Ali Foroughi Zoka-ol-Molk's §mHezb Tajadod§!, or Revival Party, win the 1938 election, with the Reform Party winning thereafter."
 RULE_OPTION_PER_PATH_REP_SOCCON: "£KR_game_rule_flag_PER  Republic - Reformists"
 RULE_OPTION_PER_PATH_REP_SOCCON_DESC: "$RULE_OPTION_PER_PATH_REP_DESC$ Ahmad Qavam's §cHezb Eslah Talaban§!, or Reform Party, win the elections, from 1942 onwards."
 RULE_OPTION_PER_PATH_RADSOC: "£KR_game_rule_flag_PER_soc  Socialist Republic"
 RULE_OPTION_PER_PATH_RADSOC_DESC: "The nation is transformed into a socialist republic led by the §RHezb Edalat§!, or Justice Party."

 PER_FORPOL: "£KR_game_rule_flag_PER_mon  Iranian Foreign Policy"
 PER_FORPOL_REQUIREMENTS: "§CFailure§! in §Y$OTT_RUS_CONVENTION$§!"
 PER_FORPOL_NOT_SOC_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CIran is victorious against the Ottomans§!\n$PER_FORPOL_REQUIREMENTS$\n§RNot§! §CSocialist Republic§! in §Y$PER_PATH$§!"
 PER_FORPOL_SOC_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CSocialist Republic§! in §Y$PER_PATH$§!\n$PER_FORPOL_REQUIREMENTS$\n§CIran is victorious against the Ottomans§!"
 RULE_OPTION_PER_FORPOL_RANDOM: "Standard"
 RULE_OPTION_PER_FORPOL_RANDOM_DESC: "Following the dismantling of the Ottoman Empire, Iran's cooperation with the Cairo Pact comes to an end, and it must decide its future alignment."
 RULE_OPTION_PER_FORPOL_GER: "£KR_game_rule_flag_PER_mon  £KR_game_rule_flag_GER  Reichspakt"
 RULE_OPTION_PER_FORPOL_GER_DESC: "Wary of Russian encroachment into Ashkhabad, Iran aligns with the Germans after defeating the Ottomans.$PER_FORPOL_NOT_SOC_REQUIREMENTS$"
 RULE_OPTION_PER_FORPOL_RUS: "£KR_game_rule_flag_PER_mon  £KR_game_rule_flag_RUS  Moscow Accord"
 RULE_OPTION_PER_FORPOL_RUS_DESC: "Seeing Russia's star destined to rise and Germany's to fall, Iran hands control of Ashkhabad over to the Russians, in exchange for an alliance.$PER_FORPOL_NOT_SOC_REQUIREMENTS$\n\n§CRussia or its ally controls Karakum§!$RUS_AFTERMATH_NOT_SOC_REQUIREMENTS$"
 RULE_OPTION_PER_FORPOL_NEUT: "£KR_game_rule_flag_PER_mon  Neutrality"
 RULE_OPTION_PER_FORPOL_NEUT_DESC: "Following the defeat of the Ottoman Empire, Iran eschews joining a military alliance.$PER_FORPOL_NOT_SOC_REQUIREMENTS$"
 RULE_OPTION_PER_FORPOL_HND: "£KR_game_rule_flag_PER_soc  £KR_game_rule_flag_HND  Bharatiya People's Republic"
 RULE_OPTION_PER_FORPOL_HND_DESC: "Iran aids with the Bharatiya People's Republic in their war against the imperialists and reactionaries, and remains in a formal military alliance with them after India is reunited.$PER_FORPOL_SOC_REQUIREMENTS$\n\n§CHinweis: If the Bharatiya People's Republic is not already in a faction, they form the Eastern Syndicalist Union with Iran.§!"
 RULE_OPTION_PER_FORPOL_INT: "£KR_game_rule_flag_PER_soc  £KR_game_rule_flag_FRA  Third Internationale"
 RULE_OPTION_PER_FORPOL_INT_DESC: "Iran joins with its comrades in the world revolution.$PER_FORPOL_SOC_REQUIREMENTS$\n\n§CHinweis: If Russia is socialist, Iran joins the Eastern Front of the Third Internationale.§!"
 RULE_OPTION_PER_FORPOL_CHN: "£KR_game_rule_flag_PER  £KR_game_rule_flag_LKT  China"
 RULE_OPTION_PER_FORPOL_CHN_DESC: "Considering an Asian-led socialist or anti-Imperialist republican alliance preferable to one led from elsewhere, Iran aligns with the Chinese.\n\n§RBenötigt:§!\n§CIran is victorious against the Ottomans§!\n$PER_FORPOL_REQUIREMENTS$\n\n§CThe Left Kuomintang unifies China§! and\n§CSocialist Republic§! in §Y$PER_PATH$§! or\n\n§CThe Right Kuomintang unifies China§! and\nany §CRepublic§! in §Y$PER_PATH$§!\n\n§RNot§! §CHu Zongnan's Fifth National Revolution§! in\n§Y$CHI_PATH$§!\n§RNot§! §CThe Citizen-Stratocracy§! in §Y$GXC_KMT_PATH$§!\n§RNot§! §CThe Blue Shirt Revolution§! or any §CGeneralissimo§! in §Y$YUN_KMT_PATH$§!"

 EGY_PATH: "£KR_game_rule_flag_EGY  Farouk's Reforms"
 RULE_OPTION_EGY_PATH_RANDOM: "Standard"
 RULE_OPTION_EGY_PATH_RANDOM_DESC: "A new constitution is being written up for Egypt, and its composition is affected by the proposed reforms put forth."
 RULE_OPTION_EGY_PATH_LIBMON_DESC: "The liberals' reforms are implemented, and the King becomes a constitutional monarch."
 RULE_OPTION_EGY_PATH_MARLIB: "£KR_game_rule_flag_EGY  Wafd Party"
 RULE_OPTION_EGY_PATH_MARLIB_DESC: "$RULE_OPTION_EGY_PATH_LIBMON_DESC$\nThe §mHizb al Wafd§!, or Wafd Party, win each subsequent election."
 RULE_OPTION_EGY_PATH_SOCLIB: "£KR_game_rule_flag_EGY  Liberal Constitutional Party"
 RULE_OPTION_EGY_PATH_SOCLIB_DESC: "$RULE_OPTION_EGY_PATH_LIBMON_DESC$\nThe §lHizb al Ahrār ad Dustūrīyyīn§!, or Liberal Constitutional Party, win each subsequent election."
 RULE_OPTION_EGY_PATH_SOCDEM: "£KR_game_rule_flag_EGY  Social Democrats"
 RULE_OPTION_EGY_PATH_SOCDEM_DESC: "$RULE_OPTION_EGY_PATH_LIBMON_DESC$\nThe §SHizb al Masrī ad Dīmuqrātī al Ijtimā'ī§!, or Egyptian Social Democratic Party, win the 1951 elections and thereafter, with the Liberals winning those prior."
 RULE_OPTION_EGY_PATH_CONMON_DESC: "The conservatives' reforms are implemented, and the new Egypt is becomes a more streamlined version of the old German styled-monarchy."
 RULE_OPTION_EGY_PATH_SOCCON: "£KR_game_rule_flag_EGY  Watanī Party"
 RULE_OPTION_EGY_PATH_SOCCON_DESC: "$RULE_OPTION_EGY_PATH_CONMON_DESC$\nThe §cHizb al Watanī§!, or Watanī Party, win each subsequent election."
 RULE_OPTION_EGY_PATH_AUTDEM: "£KR_game_rule_flag_EGY  Ittihād Party"
 RULE_OPTION_EGY_PATH_AUTDEM_DESC: "$RULE_OPTION_EGY_PATH_CONMON_DESC$\nThe §aHizb al Ittihād§!, or Ittihād Party, win each subsequent election."
 RULE_OPTION_EGY_PATH_PATAUT: "£KR_game_rule_flag_EGY  Alawiyya Dynasty"
 RULE_OPTION_EGY_PATH_PATAUT_DESC: "The absolutists' reforms are implemented, and all power is centralised to the §PĀl 'Alawīyah§!, or Alawiyya Dynasty."

 EGY_SYRIA_OCCUPY: "£KR_game_rule_flag_EGY  The Status of Syria"
 RULE_OPTION_EGY_SYRIA_OCCUPY_RANDOM: "Standard"
 RULE_OPTION_EGY_SYRIA_OCCUPY_RANDOM_DESC: "After the Ottoman Empire has been defeated, Egypt decides at the Third Arab Congress whether it shall annex or liberate Syria."
 RULE_OPTION_EGY_SYRIA_OCCUPY_INDEPENDENT: "£KR_game_rule_flag_SYR  Independent Syrian Republic"
 RULE_OPTION_EGY_SYRIA_OCCUPY_INDEPENDENT_DESC: "Egypt liberates Syria under a republican government, and as an equal partner in the Levant.$TUR_PATH_LOSS_REQUIREMENTS$"
 RULE_OPTION_EGY_SYRIA_OCCUPY_PUPPET: "£KR_game_rule_flag_SYR_mon  Arab Kingdom of Syria"
 RULE_OPTION_EGY_SYRIA_OCCUPY_PUPPET_DESC: "Egypt installs a puppet monarchy in Syria led by §aĀl 'Alawīyah§!, or the Alawiyya Dynasty, tightly binding it to their own nation.$TUR_PATH_LOSS_REQUIREMENTS$"
 RULE_OPTION_EGY_SYRIA_OCCUPY_ANNEX: "£KR_game_rule_flag_EGY  Annexed Syria"
 RULE_OPTION_EGY_SYRIA_OCCUPY_ANNEX_DESC: "Egypt annexes Syria into a greater Egyptian Empire.$TUR_PATH_LOSS_REQUIREMENTS$"

 LBA_PATH: "£KR_game_rule_flag_LBA  The Future of the Emirate"
 RULE_OPTION_LBA_PATH_RANDOM: "Standard"
 RULE_OPTION_LBA_PATH_RANDOM_DESC: "The Emirate of Cyrenaica is deprived of leadership due to Ibrahim ibn Ahmad as-Sharif's incapacitation. Who will lead the tribal heart of the Senussi order?"
 RULE_OPTION_LBA_PATH_AUTDEM: "£KR_game_rule_flag_LBA_autdem  Idris al-Mahdi"
 RULE_OPTION_LBA_PATH_AUTDEM_DESC: "Emir Idris returns from exile with his §aMuwālū Idrīs§!, or Idris Supporters, and joins the Cairo Pact, confirming pan-Arabic nationalism principles."
 RULE_OPTION_LBA_PATH_NATPOP_DESC: "The Emirate is cleansed from uncertainty, and Umar al-Mukhtar of §nAs Sanūsīyah§!, or the Senussi, becomes regent."
 RULE_OPTION_LBA_PATH_NATPOP_OTT: "£KR_game_rule_flag_LBA  Umar al-Mukhtār - Pro-Ottoman"
 RULE_OPTION_LBA_PATH_NATPOP_OTT_DESC: "$RULE_OPTION_LBA_PATH_NATPOP_DESC$ He later signs a pact of friendship with the Ottomans."
 RULE_OPTION_LBA_PATH_NATPOP_WAR: "£KR_game_rule_flag_LBA  Umar al-Mukhtār - Islamic Revolution"
 RULE_OPTION_LBA_PATH_NATPOP_WAR_DESC: "$RULE_OPTION_LBA_PATH_NATPOP_DESC$ He later seeks to unite Libya, and announces a Jihad against Imperialism."

 LBA_UNIFICATION: "£KR_game_rule_flag_LBA_autdem  The Unification of Libya"
 RULE_OPTION_LBA_UNIFICATION_RANDOM: "Standard"
 RULE_OPTION_LBA_UNIFICATION_RANDOM_DESC: "The defeat of the Ottomans may lead to the unification of Tripolitania, Fezzan and Cyrenaica into Libya, or they may wish to retain their independence from each other."
 RULE_OPTION_LBA_UNIFICATION_YES: "£KR_game_rule_flag_LBA_autdem  Libya Unified"
 RULE_OPTION_LBA_UNIFICATION_YES_DESC: "Cyrenaica and Tripolitania unite to form Libya.$TUR_PATH_LOSS_REQUIREMENTS$"
 RULE_OPTION_LBA_UNIFICATION_NO: "£KR_game_rule_flag_LBA  £KR_game_rule_flag_TRP  No Unification"
 RULE_OPTION_LBA_UNIFICATION_NO_DESC: "Cyrenaica and Tripolitania remain as independent states.$TUR_PATH_LOSS_REQUIREMENTS$"

 TRP_PATH: "£KR_game_rule_flag_TRP  Republic Among the Sands"
 TRP_PATH_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CNo Unification§! in §Y$LBA_UNIFICATION$§!\n§CThe Cairo Pact are victorious against the Ottomans§!"
 RULE_OPTION_TRP_PATH_RANDOM: "Standard"
 RULE_OPTION_TRP_PATH_RANDOM_DESC: "After the declaration of independence, Tripolitania stands at the crossroads between conservatism and syndicalism. Which one will prevail?"
 RULE_OPTION_TRP_PATH_RADSOC: "£KR_game_rule_flag_TRP  Free National Bloc"
 RULE_OPTION_TRP_PATH_RADSOC_DESC: "The §RKutlat al Watanīyah al Hurra§!, or Free National Bloc, wins the elections, with the aim of joining the Third Internationale.$TRP_PATH_REQUIREMENTS$"
 RULE_OPTION_TRP_PATH_SOCCON: "£KR_game_rule_flag_TRP  United National Front"
 RULE_OPTION_TRP_PATH_SOCCON_DESC: "The §cJabha al Watanīyah al Muttahida§!, or United National Front, wins the elections, with the aim of joining the Cairo Pact.$TRP_PATH_REQUIREMENTS$"
 RULE_OPTION_TRP_PATH_AUTDEM: "£KR_game_rule_flag_TRP  Tripolitanian People's Party"
 RULE_OPTION_TRP_PATH_AUTDEM_DESC: "The §aHizb as Sha'b Tarābulus§!, or Tripolitanian People's Party, wins the elections, with the aim of joining with the Ottomans, or failing that, the Cairo Pact.$TRP_PATH_REQUIREMENTS$"

 ### Country Paths - East Asia ###
 RULE_GROUP_KAISERREICH_RULES_EAST_ASIA: "Country Paths - East Asia"

 QIE_PATH: "£KR_game_rule_flag_QIE  Year of the Rat"
 RULE_OPTION_QIE_PATH_RANDOM: "Standard"
 RULE_OPTION_QIE_PATH_RANDOM_DESC: "With the collapse of Sun Chuanfang's precious League of Eight Provinces, Zhili dominance over China wobbles. As protests grow in Beijing, the decisions senior Zhili leaders such as Wu Peifu and Cao Kun - as well as other plotters in the shadows - make may determine the fate of the nation."
 RULE_OPTION_QIE_PATH_LEP_AUTDEM: "£KR_game_rule_flag_QIE  £KR_game_rule_flag_LEP  Zhili Monarchy - Pro-Nanjing"
 RULE_OPTION_QIE_PATH_LEP_AUTDEM_DESC: "During the collapse of the League of Eight Provinces, Wu Peifu's §aHexie Shetuan§!, or Harmony Association, backs the remnants of the League in Nanjing, sending the Qing down a pro-German path."
 RULE_OPTION_QIE_PATH_ANQ_AUTDEM: "£KR_game_rule_flag_QIE  £KR_game_rule_flag_ANQ  Zhili Monarchy - Pro-Anqing"
 RULE_OPTION_QIE_PATH_ANQ_AUTDEM_DESC: "During the collapse of the League of Eight Provinces, Wu Peifu's §aHexie Shetuan§! backs the anti-concessionists in Anqing, sending the Qing down an anti-imperialist route."
 RULE_OPTION_QIE_PATH_COUP_DESC: "Wu Peifu does not intervene in the League collapse, setting in motion a coup against his regime"
 RULE_OPTION_QIE_PATH_MANCHU_DESC: "$RULE_OPTION_QIE_PATH_COUP_DESC$ ends in his murder and the re-assertion of Puyi."
 RULE_OPTION_QIE_PATH_PATAUT: "£KR_game_rule_flag_QIE  Manchu Coup - Zongshe Party"
 RULE_OPTION_QIE_PATH_PATAUT_DESC: "$RULE_OPTION_QIE_PATH_MANCHU_DESC$ The §PZongshe Dang§!, or Royalist Party, made up of Manchu aristocracy, leads the new government.\n\n§RBenötigt:§!\n§CYan Xishan Accepts§! or §CQu Yingguang Accepts§! or §CZhang Tianran§! in §Y$QIE_COUP_FRIEND$§!"
 RULE_OPTION_QIE_PATH_MANCHU_AUTDEM: "£KR_game_rule_flag_QIE  Manchu Coup - YCP"
 RULE_OPTION_QIE_PATH_MANCHU_AUTDEM_DESC: "$RULE_OPTION_QIE_PATH_MANCHU_DESC$ The §aZhongguo Qingniandang§!, or Young China Party, which wants to centralise and urbanise China, leads the new government.\n\n§RBenötigt:§!\n§CYan Xishan Accepts§! or §CQu Yingguang Accepts§! in §Y$QIE_COUP_FRIEND$§!"
 RULE_OPTION_QIE_PATH_SOCCON: "£KR_game_rule_flag_QIE  Manchu Coup - CERA"
 RULE_OPTION_QIE_PATH_SOCCON_DESC: "$RULE_OPTION_QIE_PATH_MANCHU_DESC$ The §cBao Jiu Da Qing Huangdi Hui§!, or Chinese Empire Reform Association, dedicated to reforming China, leads the new government.\n\n§RBenötigt:§!\n§CYan Xishan Accepts§! or §CQu Yingguang Accepts§! or §CZhang Tianran§! in §Y$QIE_COUP_FRIEND$§!"
 RULE_OPTION_QIE_PATH_SOCDEM: "£KR_game_rule_flag_QIE  Manchu Coup - CERA (Reformist)"
 RULE_OPTION_QIE_PATH_SOCDEM_DESC: "$RULE_OPTION_QIE_PATH_MANCHU_DESC$ The combined efforts of Qu Yingguang and the CERA lad to significant reforms, and prepare the country for functioning public elections, with the re-elected §SBao Jiu Da Qing Huangdi Hui§!, or Chinese Empire Reform Association, forming a broader coalition in the future.\n\n§RBenötigt:§!\n§CQu Yingguang Accepts§! in §Y$QIE_COUP_FRIEND$§!"
 RULE_OPTION_QIE_PATH_REP_DESC: "$RULE_OPTION_QIE_PATH_COUP_DESC$ ultimately fails, letting him depose the monarchy and re-establish a republic in Beijing, declaring war on the coup's supporters in the process."
 RULE_OPTION_QIE_PATH_SHIH_AUTDEM: "£KR_game_rule_flag_QIE_rep  Zhili Republic - Hu Shih"
 RULE_OPTION_QIE_PATH_SHIH_AUTDEM_DESC: "$RULE_OPTION_QIE_PATH_REP_DESC$\nThe Zhili install eminent philosopher Hu Shih as the first president of the new republic, ruled by the §aHexie Shetuan§!, or Harmony Association."
 RULE_OPTION_QIE_PATH_KOO_AUTDEM: "£KR_game_rule_flag_QIE_rep  Zhili Republic - V.K. Wellington Koo"
 RULE_OPTION_QIE_PATH_KOO_AUTDEM_DESC: "$RULE_OPTION_QIE_PATH_REP_DESC$\nThe Zhili install renowned statesman Vi Kyuin Wellington Koo as the first president of the new republic, ruled by the §aHexie Shetuan§!, or Harmony Association."

 QIE_COUP_FRIEND: "£KR_game_rule_flag_QIE  Patron of the Beijing Coup"
 QIE_COUP_FRIEND_ACCEPTS_REQUIREMENTS: "\n\n§RBenötigt:§!\nAny §CManchu Coup§! or §CZhili Republic§! in §Y$QIE_PATH$§!"
 QIE_COUP_FRIEND_REFUSES_REQUIREMENTS: "\n\n§RBenötigt:§!\nAny §CZhili Republic§! in §Y$QIE_PATH$§!"
 RULE_OPTION_QIE_COUP_FRIEND_RANDOM: "Standard"
 RULE_OPTION_QIE_COUP_FRIEND_RANDOM_DESC: "Wu Peifu's indecision in refusing to declare support for either Nanjing or Anqing in the collapse of League of Eight Provinces causes great unrest in the government. There is a plot against him, but the plotters require assistance. Who do the Manchu Party ask for help?"
 RULE_OPTION_QIE_COUP_FRIEND_YAN_ACCEPTS: "£KR_game_rule_flag_QIE  £KR_game_rule_flag_SHX  Yan Xishan Accepts"
 RULE_OPTION_QIE_COUP_FRIEND_YAN_ACCEPTS_DESC: "Yan Xishan receives the invitation. Although Yan has never been loyal to Qing or Puyi, he becomes the first ally and innovator of the new government, should the plot succeed, or faces the consequences, should it fail.$QIE_COUP_FRIEND_ACCEPTS_REQUIREMENTS$"
 RULE_OPTION_QIE_COUP_FRIEND_YAN_REFUSES: "£KR_game_rule_flag_QIE  £KR_game_rule_flag_SHX  Yan Xishan Refuses"
 RULE_OPTION_QIE_COUP_FRIEND_YAN_REFUSES_DESC: "Yan Xishan receives the invitation. Unconviced by the plotters appealing to his fear, he refuses the coup outright, dooming the plot to fail before it even has the chance to begin.$QIE_COUP_FRIEND_REFUSES_REQUIREMENTS$"
 RULE_OPTION_QIE_COUP_FRIEND_QU_ACCEPTS: "£KR_game_rule_flag_QIE  £KR_game_rule_flag_SHD_autdem  Qu Yingguang Accepts"
 RULE_OPTION_QIE_COUP_FRIEND_QU_ACCEPTS_DESC: "Qu Yingguang receives the invitation. After Qu Yingguang's successful takeover in the Shandong Clique, he has shown absolute loyalty to Qing but not to Wu. He becomes a great ally, should the plot succeed, or faces the consequences, should it fail.$QIE_COUP_FRIEND_ACCEPTS_REQUIREMENTS$\n§CSociety of Restoring Benevolence§! in §Y$SHD_PATH$§!"
 RULE_OPTION_QIE_COUP_FRIEND_QU_REFUSES: "£KR_game_rule_flag_QIE  £KR_game_rule_flag_SHD_autdem  Qu Yingguang Refuses"
 RULE_OPTION_QIE_COUP_FRIEND_QU_REFUSES_DESC: "Qu Yingguang receives the invitation. After Qu Yingguang's successful takeover in the Shandong Clique, the Qing refuse to send aid to deal with subsequent riots, causing him to focus internally and refuse the coup outright, dooming the plot to fail before it even has the chance to begin.$QIE_COUP_FRIEND_REFUSES_REQUIREMENTS$\n§CSociety of Restoring Benevolence§! in §Y$SHD_PATH$§!"
 RULE_OPTION_QIE_COUP_FRIEND_ZHANG: "£KR_game_rule_flag_QIE  £KR_game_rule_flag_SHD_natpop  Zhang Tianran"
 RULE_OPTION_QIE_COUP_FRIEND_ZHANG_DESC: "Zhang Tianran receives the invitation. The teachings of the great Master are spreading like a hurricane after his takeover in the Shandong Clique. Zhang is ready to become more than an ally - a mentor and teacher for the whole new regime, should the plot succeed, or face the consequences, should it fail.\n\n§RBenötigt:§!\n§CZongshe Party§! or §CCERA§! or any §CZhili Republic§! in\n§Y$QIE_PATH$§!\n§CYiguandao Society§! in §Y$SHD_PATH$§!"

 JAP_PATH: "£KR_game_rule_flag_JAP  Twilight of Japanese Democracy"
 RULE_OPTION_JAP_PATH_RANDOM: "Standard"
 RULE_OPTION_JAP_PATH_RANDOM_DESC: "A debate in the Diet regarding the National Security Act has been raging for the past few weeks. Some conservative members of the Diet fear that if the act is not passed, radical elements in society will try to seize power. The future of Japan may depend on this act."
 RULE_OPTION_JAP_PATH_DEM_DESC: "The National Security Act is forced through. The government then initiates electoral reform and democracy is preserved, with the"
 RULE_OPTION_JAP_PATH_SOCCON: "£KR_game_rule_flag_JAP  Seiyūkai"
 RULE_OPTION_JAP_PATH_SOCCON_DESC: "$RULE_OPTION_JAP_PATH_DEM_DESC$ §cRikken Seiyūkai§!, or Association of Friends of Constitutional Government, winning the subsequent elections."
 RULE_OPTION_JAP_PATH_MARLIB: "£KR_game_rule_flag_JAP  Minseitō"
 RULE_OPTION_JAP_PATH_MARLIB_DESC: "$RULE_OPTION_JAP_PATH_DEM_DESC$ §mRikken Minseitō§!, or Constitutional Democratic Party, winning the subsequent elections."
 RULE_OPTION_JAP_PATH_SOCDEM: "£KR_game_rule_flag_JAP  Shakai Taishūtō"
 RULE_OPTION_JAP_PATH_SOCDEM_DESC: "$RULE_OPTION_JAP_PATH_DEM_DESC$ Minseitō winning the first elections, followed by the §SShakai Taishūtō§!, or Socialist Masses Party, in later elections."
 RULE_OPTION_JAP_PATH_AUTDEM: "£KR_game_rule_flag_JAP  Kokumin Dōmei"
 RULE_OPTION_JAP_PATH_AUTDEM_DESC: "The National Security Act is forced through. The government then initiates tough electoral reform and forcibly unites the nation's main political parties under the §aNational Unity Government§! to protect Japan from the syndicalist threat.\nAfter it splits apart, the nationalist §aKokumin Dōmei§!, or National Alliance, win the next elections."
 RULE_OPTION_JAP_PATH_PATAUT: "£KR_game_rule_flag_JAP  Kyōwakai"
 RULE_OPTION_JAP_PATH_PATAUT_DESC: "The National Security Act is forced through. However, the Restorationist faction of the Imperial Japanese Army, seeing the government lacks support, stage a coup. The Centralist Faction of the §PImperial Japanese Army§! crushes this coup, and is given a greater role in the government to help root out both the traitors and the syndicalists, eventually forming the §PKyōwakai§!, or Association of National Harmony."
 RULE_OPTION_JAP_PATH_NATPOP: "£KR_game_rule_flag_JAP  Taisei Yokusankai"
 RULE_OPTION_JAP_PATH_NATPOP_DESC: "The National Security Act is defeated by public opinion and the opposition. The Restorationist faction of the §nImperial Japanese Army§!, seizing upon the government's failure to deal with radicals, launch a successful coup, empowering the §nTaisei Yokusankai§!, or Imperial Rule Assistance Association."

 FNG_PATH: "£KR_game_rule_flag_FNG  Decisions in Dongbei"
 RULE_OPTION_FNG_PATH_RANDOM: "Standard"
 RULE_OPTION_FNG_PATH_RANDOM_DESC: "The Fengtian Clique's war for control over China is also pivotal for their domestic politics. Should Zhang Zuolin fail to make quick progress in the conflict, the Japanese Kwantung Army begin to conspire against him, and may assassinate him in an effort to force Tokyo's hand."
 RULE_OPTION_FNG_PATH_AUTDEM_START_DESC: "Zhang Zuolin successfully avoids being assassinated by the Kwantung Army."
 RULE_OPTION_FNG_PATH_AUTDEM_END_DESC: "Should he and his §aZhang Clique§! successfully unite China, he nominally steps down in favor of his son Zhang Xueliang, who forms a cabinet"
 RULE_OPTION_FNG_PATH_AUTDEM_DESC: "$RULE_OPTION_FNG_PATH_AUTDEM_START_DESC$\n$RULE_OPTION_FNG_PATH_AUTDEM_END_DESC$"
 RULE_OPTION_FNG_PATH_RECOVERY_AUTDEM: "£GFX_KR_game_rule_flag_CHN  True Recovery"
 RULE_OPTION_FNG_PATH_RECOVERY_AUTDEM_DESC: "$RULE_OPTION_FNG_PATH_AUTDEM_DESC$ dominated by the Recovery League."
 RULE_OPTION_FNG_PATH_COMMUNICATIONS_AUTDEM: "£GFX_KR_game_rule_flag_CHN  Political Economics"
 RULE_OPTION_FNG_PATH_COMMUNICATIONS_AUTDEM_DESC: "$RULE_OPTION_FNG_PATH_AUTDEM_DESC$ dominated by the New Communications Clique."
 RULE_OPTION_FNG_PATH_TWIN_DRAGONS_AUTDEM: "£GFX_KR_game_rule_flag_CHN  £KR_game_rule_flag_UPC_GRA  Twin Dragons Taming the Water"
 RULE_OPTION_FNG_PATH_TWIN_DRAGONS_AUTDEM_DESC: "$RULE_OPTION_FNG_PATH_AUTDEM_START_DESC$\nAfter the Second Sino-Japanese War begins, he successfully brokers a compromise with a southern Federalist Government. $RULE_OPTION_FNG_PATH_AUTDEM_END_DESC$ with the help of Zhang Junmai.\n\n§RBenötigt:§!\n§CA Federalist government forms in the south and survives until the Second Sino-Japanese War§!\n\n§CChinese United Front§! in §Y$FNG_FORPOL$§!"
 RULE_OPTION_FNG_PATH_PATAUT_DESC: "Zhang Zuolin is assassinated on his quest to unite China. Yang Yuting and his §PShikan Clique§! take power in the aftermath, and"
 RULE_OPTION_FNG_PATH_GAMBIT_PATAUT: "£GFX_KR_game_rule_flag_CHN  £KR_game_rule_flag_JAP  The Dragon's Gambit"
 RULE_OPTION_FNG_PATH_GAMBIT_PATAUT_DESC: "$RULE_OPTION_FNG_PATH_PATAUT_DESC$ successfully work to mitigate Japanese influence on their government."
 RULE_OPTION_FNG_PATH_CONCORD_PATAUT: "£GFX_KR_game_rule_flag_CHN  £KR_game_rule_flag_JAP  Concord of Nationalities"
 RULE_OPTION_FNG_PATH_CONCORD_PATAUT_DESC: "$RULE_OPTION_FNG_PATH_PATAUT_DESC$ are forced to accept Japanese influence on their government."

 FNG_FORPOL: "£KR_game_rule_flag_FNG  £KR_game_rule_flag_JAP  Fengtian Foreign Policy"
 FNG_FORPOL_REQUIREMENTS: "\n\n§RBenötigt:§!\n§RNot§! §CThe Dragons' Gambit§! or §CConcord of Nationalities§! in §Y$FNG_PATH$§!"
 RULE_OPTION_FNG_FORPOL_RANDOM: "Standard"
 RULE_OPTION_FNG_FORPOL_RANDOM_DESC: "Should the Fengtian Clique seize control of Beijing and several other important cities without Zhang Zuolin being assassinated, Marshal Zhang \"the Mukden Tiger\" holds a conference to discuss the future direction of his government. The most important topic in these proceedings is their relationship with Japan and their Co-Prosperity Sphere. The Clique needs to decide to either join the Sphere, or risk the possibility of aggression from the Japanese government."
 RULE_OPTION_FNG_FORPOL_CONDITIONAL_JAP: "£KR_game_rule_flag_FNG  £KR_game_rule_flag_JAP  Co-Prosperity Sphere (Conditional)"
 RULE_OPTION_FNG_FORPOL_CONDITIONAL_JAP_DESC: "The Fengtian Clique is guaranteed to join the Co-Prosperity Sphere in some manner, with the specifics decided by the situation that unfolds in-game. The Chinese United Front is formed against Japan and Fengtian.$FNG_FORPOL_REQUIREMENTS$"
 RULE_OPTION_FNG_FORPOL_UNCONDITIONAL_JAP: "£KR_game_rule_flag_FNG  £KR_game_rule_flag_JAP  Co-Prosperity Sphere (Unconditional)"
 RULE_OPTION_FNG_FORPOL_UNCONDITIONAL_JAP_DESC: "The Fengtian Clique joins the Co-Prosperity Sphere without any conditions during the conference, and the Chinese United Front is formed against Japan and Fengtian. After unification, the Fengtian Clique may choose to ask for concessions depending on the degree of Japanese influence on their country.$FNG_FORPOL_REQUIREMENTS$"
 RULE_OPTION_FNG_FORPOL_CONCESSIONS_JAP: "£KR_game_rule_flag_FNG  £KR_game_rule_flag_JAP  Co-Prosperity Sphere (Concessions)"
 RULE_OPTION_FNG_FORPOL_CONCESSIONS_JAP_DESC: "The Fengtian Clique joins the Co-Prosperity Sphere in exchange for the return of Japanese occupied concessions in China, and the Chinese United Front is formed against Japan and Fengtian.$FNG_FORPOL_REQUIREMENTS$"
 RULE_OPTION_FNG_FORPOL_CUF: "£KR_game_rule_flag_FNG  Chinese United Front"
 RULE_OPTION_FNG_FORPOL_CUF_DESC: "The Fengtian Clique demands concessions in exchange for joining the Co-Prosperity Sphere. Enraged, Tokyo orders its agents on the ground to manufacture a pretext for war resulting in a conflict between Japan and the Fengtian Clique, the latter of which likely joining the Chinese United Front.$FNG_FORPOL_REQUIREMENTS$"

 LEP_FORPOL: "£KR_game_rule_flag_LEP  Nanjing Clique Alignment"
 LEP_FORPOL_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CThe Nanjing Clique wins the League Collapse War§!"
 RULE_OPTION_LEP_FORPOL_RANDOM: "Standard"
 RULE_OPTION_LEP_FORPOL_RANDOM_DESC: "The kleptocratic bureaucratic rotting structure of the Eight Inter-Allied Armies marches on! Whilst the League may be under new, untenable and unsavoury management, they are nonetheless defeated both the Kuomintang and the Anti-Concessionists.\nCounting his losses, and restructuring the investments from Germany, Marshal Qi decides what the role of the new League is in the battleground of China."
 RULE_OPTION_LEP_FORPOL_LEP: "£KR_game_rule_flag_LEP  Independent"
 RULE_OPTION_LEP_FORPOL_LEP_DESC: "Scorned by the Jade Marshal and King of Baoding, perhaps Qi's only potential allies for his domain, the new League-Marshal strikes out on a warpath of his own, attempting to unite China by his own hand.$LEP_FORPOL_REQUIREMENTS$\n\n§RNot§! §CZhili Monarchy - Pro-Nanjing§! in §Y$QIE_PATH$§!"
 RULE_OPTION_LEP_FORPOL_ZHILI_DESC: "Attempting to bridge the North-South Zhili divide, and legitimise his fiefdom as an official entity, the League-Marshal aligns with the"
 RULE_OPTION_LEP_FORPOL_QIE: "£KR_game_rule_flag_LEP  £KR_game_rule_flag_QIE  Recognise Beijing"
 RULE_OPTION_LEP_FORPOL_QIE_DESC: "$RULE_OPTION_LEP_FORPOL_ZHILI_DESC$ Central Government in Beijing.$LEP_FORPOL_REQUIREMENTS$\n\n§RNot§! any §CManchu Coup§! in §Y$QIE_PATH$§!"
 RULE_OPTION_LEP_FORPOL_NZH: "£KR_game_rule_flag_LEP  £KR_game_rule_flag_QIE_rep  Align with the Zhili Remnants"
 RULE_OPTION_LEP_FORPOL_NZH_DESC: "$RULE_OPTION_LEP_FORPOL_ZHILI_DESC$ Zhili Remnants in Sichuan, recently expelled from the Central Plains.$LEP_FORPOL_REQUIREMENTS$\n\nAny §CManchu Coup§! in §Y$QIE_PATH$§!\n§CArmament Department§! or any §CZhili Remnants§! in\n§Y$SZC_PATH$§!"

 SHD_PATH: "£KR_game_rule_flag_SHD  Zhang's Latest Gamble"
 RULE_OPTION_SHD_PATH_RANDOM: "Standard"
 RULE_OPTION_SHD_PATH_RANDOM_DESC: "In the mountains of Shandong, ties between Zhang Zongchang and Zhang Tianran fray while Qu Yingguang searches for an opportunity against both. Seen as outcasts and illegitimate even among other warlords, the outcome may dictate the fortunes of the future Zhifeng conflict."
 RULE_OPTION_SHD_PATH_PATAUT: "£KR_game_rule_flag_SHD  Zhang Clique"
 RULE_OPTION_SHD_PATH_PATAUT_DESC: "Zhang Zongchang survives, and the decadent rule of his §PZhang Pai§!, or Zhang Clique, continues."
 RULE_OPTION_SHD_PATH_NATPOP: "£KR_game_rule_flag_SHD_natpop  Yiguandao Society"
 RULE_OPTION_SHD_PATH_NATPOP_DESC: "Zhang Tianran and his §nYiguandao Hui§!, or Yiguandao Society, ousts Zhang Zongchang and remodels the province along Millenarian lines."
 RULE_OPTION_SHD_PATH_AUTDEM: "£KR_game_rule_flag_SHD_autdem  Society of Restoring Benevolence"
 RULE_OPTION_SHD_PATH_AUTDEM_DESC: "Qu Yingguang and his §aGuiren Hui§!, or Society of Restoring Benevolence, ousts Zhang Zongchang and aligns the province with the central government in Beijing."

 SHD_FORPOL: "£KR_game_rule_flag_SHD  Shandong Clique Alignment"
 SHD_FORPOL_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CThe Shandong Clique wins the League Collapse War§!\n\n§CZhang Clique§! in §Y$SHD_PATH$§!"
 RULE_OPTION_SHD_FORPOL_RANDOM: "Standard"
 RULE_OPTION_SHD_FORPOL_RANDOM_DESC: "Zhang Zongchang surprisingly swoops southwards and vanquishes the Anti-Concessionists, the League and the socialists. Despite being a diehard supporter of Marshal Zuolin in Fengtian, Zhang Zongchang's actions are unsanctioned by the Old Marshal, and now an opportunity to strike out on his own holds merit, though his loyalty remains undying."
 RULE_OPTION_SHD_FORPOL_SHD: "£KR_game_rule_flag_SHD  Independent"
 RULE_OPTION_SHD_FORPOL_SHD_DESC: "Perhaps in his greatest gamble yet, the Dogmeat General seeks to unite China under a banner of depravity and debauchery.$SHD_FORPOL_REQUIREMENTS$\n§CWar - Fengtian Supports Anqing§! in §Y$ANQ_DEAL$§!"
 RULE_OPTION_SHD_FORPOL_AGJ: "£KR_game_rule_flag_SHD  £KR_game_rule_flag_FNG  Align with Fengtian"
 RULE_OPTION_SHD_FORPOL_AGJ_DESC: "Ever the loyal lieutenant of the Old Marshal, Zhang returns both the League and Shandong to the fold of the Anguojun.$SHD_FORPOL_REQUIREMENTS$\n\n§CShandong borders Fengtian or their subjects§!"
 RULE_OPTION_SHD_FORPOL_NPA: "£KR_game_rule_flag_SHD  £KR_game_rule_flag_GXC_OGXC   £KR_game_rule_flag_SZC  Align with the NPA"
 RULE_OPTION_SHD_FORPOL_NPA_DESC: "Scorned by the Old Marshal's abuse of Zhang as a mere pawn on the board, Zongchang refuses to align with Fengtian, instead opting to align with other independently minded provincial rulers.$SHD_FORPOL_REQUIREMENTS$\n§CWar - Fengtian Supports Anqing§! in §Y$ANQ_DEAL$§!\n\n§CRegionalists§! in §Y$GXC_PATH$§! and §CIndependent§! in §Y$GXC_FORPOL$§! or\n\n§CCreate the NPA§! in §Y$SZC_FORPOL$§!\n\n§CShandong borders the National Protection Alliance§!"

 ANQ_DEAL: "£KR_game_rule_flag_FNG  £KR_game_rule_flag_ANQ_FNG  £KR_game_rule_flag_SHD  Anqing / Shandong Arbitration"
 ANQ_DEAL_START_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CThe Nanjing Clique are defeated in the League Collapse War§!"
 ANQ_DEAL_END_REQUIREMENTS: "\n§CZhang Clique§! in §Y$SHD_PATH$§!\n\n§RNot§! §CZhili Monarchy - Pro-Anqing§! in §Y$QIE_PATH$§!"
 ANQ_DEAL_CHI_REQUIREMENTS: "$ANQ_DEAL_START_REQUIREMENTS$\n§CThe Left Kuomintang are defeated in the League Collapse War§!$ANQ_DEAL_END_REQUIREMENTS$"
 RULE_OPTION_ANQ_DEAL_RANDOM: "Standard"
 RULE_OPTION_ANQ_DEAL_RANDOM_DESC: "As the League of Five Provinces implodes, two of the combatants in the war are allies of the Fengtian Government. It may be in Fengtian's interests to negotiate an agreement between them, and prevent bloodshed between two fellow enemies of Beijing."
 RULE_OPTION_ANQ_DEAL_WAR: "£KR_game_rule_flag_ANQ_FNG  £KR_game_rule_flag_SHD  War"
 RULE_OPTION_ANQ_DEAL_WAR_DESC: "The Nanjing Government falls, but Fengtian decides that no deal between Anqing and Shandong can be reached, even in the face of the Kuomintang. Anqing and Shandong declare war on each other.$ANQ_DEAL_START_REQUIREMENTS$$ANQ_DEAL_END_REQUIREMENTS$"
 RULE_OPTION_ANQ_DEAL_WAR_CHI_DESC: "The Nanjing Government falls, with Anqing and Shandong then cooperating against the Kuomintang. However, the peace breaks down after the defeat of the socialists, with Fengtian"
 RULE_OPTION_ANQ_DEAL_WAR_ANQ: "£KR_game_rule_flag_FNG  £KR_game_rule_flag_ANQ_FNG  War - Fengtian Supports Anqing"
 RULE_OPTION_ANQ_DEAL_WAR_ANQ_DESC: "$RULE_OPTION_ANQ_DEAL_WAR_CHI_DESC$ supporting Anqing.$ANQ_DEAL_CHI_REQUIREMENTS$"
 RULE_OPTION_ANQ_DEAL_WAR_SHD: "£KR_game_rule_flag_FNG  £KR_game_rule_flag_SHD  War - Fengtian Supports Shandong"
 RULE_OPTION_ANQ_DEAL_WAR_SHD_DESC: "$RULE_OPTION_ANQ_DEAL_WAR_CHI_DESC$ supporting Shandong.$ANQ_DEAL_CHI_REQUIREMENTS$"
 RULE_OPTION_ANQ_DEAL_WAR_NOONE: "£KR_game_rule_flag_FNG  War - Fengtian Stands Aside"
 RULE_OPTION_ANQ_DEAL_WAR_NOONE_DESC: "$RULE_OPTION_ANQ_DEAL_WAR_CHI_DESC$ not taking a side in the conflict.$ANQ_DEAL_CHI_REQUIREMENTS$"
 RULE_OPTION_ANQ_DEAL_PEACE: "£KR_game_rule_flag_FNG  £KR_game_rule_flag_ANQ_FNG  £KR_game_rule_flag_SHD  Compromise Reached"
 RULE_OPTION_ANQ_DEAL_PEACE_DESC: "The Nanjing Government falls, with Anqing and Shandong cooperating against the Kuomintang. The Fengtian Government helps them come to a compromise, and peace is maintained among Fengtian's allies.$ANQ_DEAL_CHI_REQUIREMENTS$"

 ANQ_FORPOL: "£KR_game_rule_flag_ANQ_FNG  Anqing Clique Alignment"
 ANQ_FORPOL_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CThe Anqing Clique wins the League Collapse War§!"
 RULE_OPTION_ANQ_FORPOL_RANDOM: "Standard"
 RULE_OPTION_ANQ_FORPOL_RANDOM_DESC: "In spite of Beijing's lack of support, Chen Tiaoyuan manages to defeat concessionist lapdogs and socialist rebels alike, uniting the League under the banner of Anti-Concessionism.\nBut The Fool's commitment to his new benefactors, the Old Marshal Zhang Zuolin and the Fengtian Clique, is anything but certain. It is time to decide where his true loyalties lie."
 RULE_OPTION_ANQ_FORPOL_ANQ: "£KR_game_rule_flag_ANQ_FNG  Independent"
 RULE_OPTION_ANQ_FORPOL_ANQ_DESC: "Seeking even greater ambitions, Chen Tiaoyuan abandons the Fengtian Government and attempts to unify China himself.$ANQ_FORPOL_REQUIREMENTS$\n\n§RNot§! §CZhili Monarchy - Pro-Anqing§! in §Y$QIE_PATH$§!"
 RULE_OPTION_ANQ_FORPOL_NOT_FNG_DESC: "Scorned by Zhang Zuolin and seeking greater opportunity elsewhere, the ever ambitious and incredulous Chen Tiaoyuan betrays Fengtian,"
 RULE_OPTION_ANQ_FORPOL_QIE: "£KR_game_rule_flag_ANQ_FNG  £KR_game_rule_flag_QIE  Recognise Beijing"
 RULE_OPTION_ANQ_FORPOL_QIE_DESC: "$RULE_OPTION_ANQ_FORPOL_NOT_FNG_DESC$ and aligns with the Zhili in Beijing.$ANQ_FORPOL_REQUIREMENTS$\n\n§RNot§! §CManchu Coup§! in §Y$QIE_PATH$§!"
 RULE_OPTION_ANQ_FORPOL_AGJ: "£KR_game_rule_flag_ANQ_FNG  £KR_game_rule_flag_FNG  Align with Fengtian"
 RULE_OPTION_ANQ_FORPOL_AGJ_DESC: "Valuing his rule and his new partnership with Zhang Zuolin, Chen Tiaoyuan officially recognises the Fengtian Government, and commits to the War of National Reclamation.$ANQ_FORPOL_REQUIREMENTS$\n\n§RNot§! §CZhili Monarchy - Pro-Anqing§! in §Y$QIE_PATH$§!"
 RULE_OPTION_ANQ_FORPOL_NZH: "£KR_game_rule_flag_ANQ_FNG  £KR_game_rule_flag_QIE_rep  Align with the Zhili Remnants"
 RULE_OPTION_ANQ_FORPOL_NZH_DESC: "$RULE_OPTION_ANQ_FORPOL_NOT_FNG_DESC$ and aligns with the Zhili, having been exiled to Sichuan.$ANQ_FORPOL_REQUIREMENTS$\n\nAny §CManchu Coup§! in §Y$QIE_PATH$§!\n§CArmament Department§! or any §CZhili Remnants§! in\n§Y$SZC_PATH$§!"
 RULE_OPTION_ANQ_FORPOL_UPC: "£KR_game_rule_flag_ANQ_FNG  £KR_game_rule_flag_UPC_GRA  Align with the Federalists"
 RULE_OPTION_ANQ_FORPOL_UPC_DESC: "$RULE_OPTION_ANQ_FORPOL_NOT_FNG_DESC$ accepting the demands from the Federalist movement for his submission. Far from a true believer, his rule is at least legitimised and secure.$ANQ_FORPOL_REQUIREMENTS$\n\n§CFederalists§! in §Y$GXC_PATH$§! and §CIndependent§! in §Y$GXC_FORPOL$§! or\n\n§CThe Federalist Outpost§! in §Y$YUN_PATH$§! and §CIndependent§! in §Y$YUN_FORPOL$§! or\n\n§CRally the Federalists§! in §Y$SZC_PATH$§!\n\n§RNot§! §CZhili Monarchy - Pro-Anqing§! in §Y$QIE_PATH$§!\n\n§CAnqing borders the Federalists or their subjects§!"
 RULE_OPTION_ANQ_FORPOL_NPA: "£KR_game_rule_flag_ANQ_FNG  £KR_game_rule_flag_GXC_OGXC  £KR_game_rule_flag_SZC  Align with the NPA"
 RULE_OPTION_ANQ_FORPOL_NPA_DESC: "$RULE_OPTION_ANQ_FORPOL_NOT_FNG_DESC$ accepting the demands from the new National Protection Alliance for his submission, should it be formed by similarly-minded independent provinces.$ANQ_FORPOL_REQUIREMENTS$\n\n§CRegionalists§! in §Y$GXC_PATH$§! and §CIndependent§! in §Y$GXC_FORPOL$§! or\n\n§CCreate the NPA§! in §Y$SZC_FORPOL$§!\n\n§CAnqing borders the National Protection Alliance§!\n\n§RNot§! §CZhili Monarchy - Pro-Anqing§! in §Y$QIE_PATH$§!"

 CHI_PATH: "£KR_game_rule_flag_LKT  White Sun over Red China"
 CHI_PATH_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CThe Left Kuomintang unifies China§!"
 RULE_OPTION_CHI_PATH_RANDOM: "Standard"
 RULE_OPTION_CHI_PATH_RANDOM_DESC: "The Left Kuomintang emerge victorious after the initial war against the Nanjing Clique, reorganise, and plan their future path towards national reunification."
 RULE_OPTION_CHI_PATH_JINGWEI_RADSOC_DESC: "Wang Jingwei, the party's long-time chairman, successfully defeats his challengers and consolidates dictatorial powers around himself and his cult of personality with the help of the §RZhongguo Guomindang gaizu tongzhì huì§!, or Reorganisation Comrades Association of the Kuomintang."
 RULE_OPTION_CHI_PATH_CHAIRMAN_JINGWEI_RADSOC: "£KR_game_rule_flag_LKT  Wang the Chairman"
 RULE_OPTION_CHI_PATH_CHAIRMAN_JINGWEI_RADSOC_DESC: "$RULE_OPTION_CHI_PATH_JINGWEI_RADSOC_DESC$\nHe appoints a government dominated by Zeng Zhongming and the §RZhongguo Guomindang gongguan pai§!, or Presidential \"Residence Faction\" of the Kuomintang, allowing him to rule autocratically and implement an orthodox intepretion of Sun Yat-sen's teachings.$CHI_PATH_REQUIREMENTS$"
 RULE_OPTION_CHI_PATH_REVOLUTIONARY_JINGWEI_RADSOC: "£KR_game_rule_flag_LKT  Wang the Revolutionary"
 RULE_OPTION_CHI_PATH_REVOLUTIONARY_JINGWEI_RADSOC_DESC: "$RULE_OPTION_CHI_PATH_JINGWEI_RADSOC_DESC$\nEmbracing the radicalism of his protege Chen Gongbo, Wang allows him to steer the party-state in a militant, Marxist direction under the §RZhongguo Guomindang gaizu tongzhi hui - jijin pai§!, or radical faction of the Reorganisation Comrades Association of the Kuomintang.$CHI_PATH_REQUIREMENTS$"
 RULE_OPTION_CHI_PATH_STATESMAN_JINGWEI_RADSOC: "£KR_game_rule_flag_LKT  Wang the Statesman"
 RULE_OPTION_CHI_PATH_STATESMAN_JINGWEI_RADSOC_DESC: "$RULE_OPTION_CHI_PATH_JINGWEI_RADSOC_DESC$\nHoping to strike a more concilatory tone and radical elements of his faction, Wang selects the Gu Mengyu as his Premier - thus empowering the §RZhongguo Guomindang gaizu tongzhi hui - wenhe pai§!, or moderate faction of the Reorganisation Comrades Association of the Kuomintang.$CHI_PATH_REQUIREMENTS$"
 RULE_OPTION_CHI_PATH_QINGLING_RADSOC_DESC: "Increasingly dissatisfied with Wang Jingwei's tyrannical rule, Song Qingling rallies a broad coalition of opposition factions to oust the Chairman in a tense vote. She then reorganises the party under the §RZhongguo Guomindang gemingweiyuanhui§!, or Revolutionary Committee of the Kuomintang, and decides the fate of her allies."
 RULE_OPTION_CHI_PATH_RED_NAPOLEON_QINGLING_RADSOC: "£KR_game_rule_flag_LKT  The Red Napoleon"
 RULE_OPTION_CHI_PATH_RED_NAPOLEON_QINGLING_RADSOC_DESC: "$RULE_OPTION_CHI_PATH_QINGLING_RADSOC_DESC$\nDeng Yanda and his camarilla drawn from civilians, soldiers, and peasants dominate the new government and usher in a more honest tutelage.$CHI_PATH_REQUIREMENTS$"
 RULE_OPTION_CHI_PATH_ETERNAL_PREMIER_QINGLING_RADSOC: "£KR_game_rule_flag_LKT  Vision of the Eternal Premier"
 RULE_OPTION_CHI_PATH_ETERNAL_PREMIER_QINGLING_RADSOC_DESC: "$RULE_OPTION_CHI_PATH_QINGLING_RADSOC_DESC$\nSong and Deng are forced to compromise with Sun Fo and his allies in the Zhongguo Guomindang Zaizao hui, or Reconstruction Faction of the Kuomintang, creating an uneasy diarchy ostensibly pursuing constitutional democracy.$CHI_PATH_REQUIREMENTS$"
 RULE_OPTION_CHI_PATH_TRUE_LOVE_QINGLING_RADSOC: "£KR_game_rule_flag_LKT  Towards a Dream of True Love"
 RULE_OPTION_CHI_PATH_TRUE_LOVE_QINGLING_RADSOC_DESC: "$RULE_OPTION_CHI_PATH_QINGLING_RADSOC_DESC$\nThe League of Chinese Syndicalists, dominated by the Shijie She, or New World Society, and the classical anarchist-leaning Four Elders, serve as Song's closest allies, and promote a tutelage aiming for a utopian socialist future.$CHI_PATH_REQUIREMENTS$"
 RULE_OPTION_CHI_PATH_UNITY_QINGLING_RADSOC: "£KR_game_rule_flag_LKT  Unity of Peasants and Workers"
 RULE_OPTION_CHI_PATH_UNITY_QINGLING_RADSOC_DESC: "$RULE_OPTION_CHI_PATH_QINGLING_RADSOC_DESC$\nThe League of Chinese Syndicalists, dominated by the Zhongguo Gongtuandang-zhengtong pai, or orthodox faction of the Chinese Syndicalist Party, forms an uneasy relationship with the regime in the name of uniting the peasants and workers.$CHI_PATH_REQUIREMENTS$"
 RULE_OPTION_CHI_PATH_COUP_DESC: "Ceaseless infighting between the Kuomintang's civilian leadership causes the political situation to deterioate and fans the flames of radicalism. Once the nation reunifies, the party's unifying enemies disappear, along with any pretense of civility."
 RULE_OPTION_CHI_PATH_TOTALIST_DESC: "$RULE_OPTION_CHI_PATH_COUP_DESC$\nHu Zongnan and the §oZhongguo Guomindang zhonghua fuxing she§!, or China Revival Society, seizes control of the government to \"maintain order\", bringing about an extremist, militarised form of tutelage."
 RULE_OPTION_CHI_PATH_RED_GENERALISSIMO_TOTALIST: "£KR_game_rule_flag_LKT  The Red Generalissimo"
 RULE_OPTION_CHI_PATH_RED_GENERALISSIMO_TOTALIST_DESC: "$RULE_OPTION_CHI_PATH_TOTALIST_DESC$\nHu rules pragmatically, cultivating a broad patronage network and balancing Whampoa Army Academy alumni, old party grandees, the bureaucracy and even criminal syndicates.$CHI_PATH_REQUIREMENTS$"
 RULE_OPTION_CHI_PATH_REGENERATION_TOTALIST: "£KR_game_rule_flag_LKT  The National Regeneration"
 RULE_OPTION_CHI_PATH_REGENERATION_TOTALIST_DESC: "$RULE_OPTION_CHI_PATH_TOTALIST_DESC$\nHu empowers He Zhonghan and his Sorelian-inspired rhetoric, embracing totalitarianism in the name of National Regeneration.$CHI_PATH_REQUIREMENTS$"
 RULE_OPTION_CHI_PATH_COUP_RADSOC_DESC: "$RULE_OPTION_CHI_PATH_COUP_DESC$\nReeling from Wang Jingwei's assassination, Zeng Zhongming and Chen Gongbo rally Wang's surviving followers to retake control of the nation and implement a much more radical direction for the revolution under the §RZhongguo Guomindang gaizu tongzhi hui - jijin pai§!, or radical faction of the Reorganisation Comrades Association of the Kuomintang."
 RULE_OPTION_CHI_PATH_ZHONGMING_RADSOC: "£KR_game_rule_flag_LKT  The Chairman's Last Will"
 RULE_OPTION_CHI_PATH_ZHONGMING_RADSOC_DESC: "$RULE_OPTION_CHI_PATH_COUP_RADSOC_DESC$\nZeng Zhongming and Chen Gongbo are able to smoothen out their relationship and creating a working partnership, implementing a moderated version of Chen's Marxist-inspired vision and reuniting Wang's old coalition.$CHI_PATH_REQUIREMENTS$"
 RULE_OPTION_CHI_PATH_GONGBO_RADSOC: "£KR_game_rule_flag_LKT  Revolutionary Weltanschauung"
 RULE_OPTION_CHI_PATH_GONGBO_RADSOC_DESC: "$RULE_OPTION_CHI_PATH_COUP_RADSOC_DESC$\nZeng Zhongming's resignation in poor health marks the demise of the moderate factions within Wang Jingwei's camp, allowing Chen and his Marxist-inspired hardliners to assume control over the party.$CHI_PATH_REQUIREMENTS$"

 CHI_ALLY_BETRAYAL: "£KR_game_rule_flag_CHI  £KR_game_rule_flag_RKT  £KR_game_rule_flag_UPC_GRA  Alliances of Convenience"
 RULE_OPTION_CHI_ALLY_BETRAYAL_RANDOM: "Standard"
 RULE_OPTION_CHI_ALLY_BETRAYAL_RANDOM_DESC: "The Left Kuomintang, in specific circumstances, may form a pact and/or alliance with rival revolutionary governments run by the Federalists or the Right Kuomintang. These alliances are very likely to end in a betrayal, thanks to mutual distrust and divergent revolutionary goals."
 RULE_OPTION_CHI_ALLY_BETRAYAL_NEVER: "£KR_game_rule_flag_CHI  £KR_game_rule_flag_RKT  £KR_game_rule_flag_UPC_GRA  The Republican Alliance Holds"
 RULE_OPTION_CHI_ALLY_BETRAYAL_NEVER_DESC: "The Left Kuomintang, whenever they get the opportunity, seek a pact and/or alliance with rival revolutionary governments run by the Federalists or Right Kuomintang. Any alliance they should form is fully honoured, and there is no betrayal.\n\n§RBenötigt:§!\n§CThe Left Kuomintang and one of either the Federalists or Right Kuomintang must form a rival government\n\nThese must border each other and be at peace (without either owning Beijing or Wuhan) to take the decisions that allow for a non-aggression pact\n\nThis non-aggression pact must hold long enough for the Left Kuomintang to take Beijing and Wuhan, allowing them to take the decision to formalise the alliance, subjugating the latter§!"

 GXC_PATH: "£KR_game_rule_flag_GXC_OGXC  Trouble in the Twin Provinces"
 RULE_OPTION_GXC_PATH_RANDOM: "Standard"
 RULE_OPTION_GXC_PATH_RANDOM_DESC: "Two of the major bastions of Republicanism in the south, the provinces of Guangdong and Guangxi, together known as Liangguang, are destabilised by the demise of Qing rule in the area.\nKuomintang remnants and the Federalist-aligned Yue Army attempt to topple the old order, dominated by Old Guangxi Clique warlords."
 RULE_OPTION_GXC_PATH_NPA_AUTDEM: "£KR_game_rule_flag_GXC_OGXC  Regionalists"
 RULE_OPTION_GXC_PATH_NPA_AUTDEM_DESC: "Lu Yuguang and the old Regionalist order take power, turning Liangguang's attention generally inwards.\nLeading the §aJiuguixi - Shaozhuang Pai§!, or Old Guangxi Clique - Young Guangxi Faction, he has to contend with Shen Hongying, his father's old rival within the Old Guangxi Clique, as well as Chen Lianbo and his Guangzhou Merchant Government."
 RULE_OPTION_GXC_PATH_UPC_AUTDEM: "£KR_game_rule_flag_GXC_CJ  Federalists"
 RULE_OPTION_GXC_PATH_UPC_AUTDEM_DESC: "Chen Jiongming's Federalist coalition takes power thanks to the might of the Yue Army.\nHe secures the loyalty of various republicans, intellectuals, and gentrymen, under the banner of the §aGonghe Datongmeng - Yue Jun Siling Bu§!, or Grand Republican Alliance - Yue Army Clique, on his quest to unite China under a Federal system."
 RULE_OPTION_GXC_PATH_KMT_AUTDEM: "£KR_game_rule_flag_RKT  £KR_game_rule_flag_GXC_KMT  Kuomintang"
 RULE_OPTION_GXC_PATH_KMT_AUTDEM_DESC: "A junta of the §aZhongguo Guomindang Xinyuexi§!, or New Guangdong Clique of the Kuomintang, takes power under the initial leadership of Chen Jitang. Tensions between left and right, Guangdong and Guangxi have to be resolved from there, before they can commence their long-awaited Northern Expedition."

 GXC_FORPOL: "£KR_game_rule_flag_GXC_OGXC  Liangguang Clique Alignment"
 RULE_OPTION_GXC_FORPOL_RANDOM: "Standard"
 RULE_OPTION_GXC_FORPOL_RANDOM_DESC: "Liangguang was the centre of multiple southern governments seeking to challenge Beijing's hegemony across the warlord era. With the collapse of Zhili authority, they are once more in position to try and claim leadership over a rival government, or try to weather the storm the best they can depending on various factors."
 RULE_OPTION_GXC_FORPOL_GXC: "£KR_game_rule_flag_GXC_OGXC  £KR_game_rule_flag_RKT  £KR_game_rule_flag_UPC_GRA  Independent"
 RULE_OPTION_GXC_FORPOL_GXC_DESC: "Refusing any master but themselves, Liangguang takes it upon themselves to pursue national unification on their own terms. They refuse any demands that they submit, and any option to force them into submission will be blocked."
 RULE_OPTION_GXC_FORPOL_NZH: "£KR_game_rule_flag_GXC_OGXC  £KR_game_rule_flag_QIE_rep  Align with the Zhili"
 RULE_OPTION_GXC_FORPOL_NZH_DESC: "Liangguang aligns itself with its old patrons in the Zhili Clique, prioritising the strongest and most local faction. They forgo forming their own government.\n\n§RBenötigt:§!\n§CRegionalists§! in §Y$GXC_PATH$§!\n\n§CLiangguang borders a Zhili government or their subjects§!"
 RULE_OPTION_GXC_FORPOL_AGJ: "£KR_game_rule_flag_GXC_OGXC  £KR_game_rule_flag_FNG  Align with Fengtian"
 RULE_OPTION_GXC_FORPOL_AGJ_DESC: "Liangguang aligns itself with the Fengtian Clique and forgo forming their own government.\n\n§RBenötigt:§!\n§CRegionalists§! in §Y$GXC_PATH$§!\n\n§CLiangguang borders Fengtian or their subjects§!"
 RULE_OPTION_GXC_FORPOL_NPA: "£KR_game_rule_flag_GXC_OGXC  £KR_game_rule_flag_SZC  Align with the NPA"
 RULE_OPTION_GXC_FORPOL_NPA_DESC: "Liangguang aligns itself with the National Protection Alliance. If the NPA has not been formed, they will do so themselves, but will otherwise forgo forming their own government.\n\n§RBenötigt:§!\n§CRegionalists§! in §Y$GXC_PATH$§!\n§CCreate the NPA§! in §Y$SZC_FORPOL$§!"
 RULE_OPTION_GXC_FORPOL_LKT: "£KR_game_rule_flag_GXC_KMT  £KR_game_rule_flag_CHI  Align with the Left KMT"
 RULE_OPTION_GXC_FORPOL_LKT_DESC: "Liangguang aligns itself with the Left Kuomintang and forgo forming their own government. Liangguang take the easiest path to aligning with the Left Kuomintang available to them.\n\n§CHinweis: If the Left Kuomintang lost the League Collapse War, the Liangguang Kuomintang form their own government.§!\n\n§RBenötigt:§!\n§CKuomintang§! in §Y$GXC_PATH$§!"

 GXC_NPA_PATH: "£KR_game_rule_flag_GXC_OGXC  £KR_game_rule_flag_GXC_MER  The Master of South China's Destiny"
 GXC_NPA_PATH_GXC_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CLiangguang unifies China§!\n\n§CRegionalists§! in §Y$GXC_PATH$§!\n§CIndependent§! in §Y$GXC_FORPOL$§!"
 GXC_NPA_PATH_ZHL_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CThe Zhili unify China§!\n§CLiangguang defeats the Zhili and unifies China§!\n\n§CRegionalists§! in §Y$GXC_PATH$§!\n§CAlign with the Zhili§! in §Y$GXC_FORPOL$§!"
 GXC_NPA_PATH_FNG_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CFengtian unifies China§!\n§CLiangguang defeats Fengtian and unifies China§!\n\n§CRegionalists§! in §Y$GXC_PATH$§!\n§CAlign with Fengtian§! in §Y$GXC_FORPOL$§!"
 RULE_OPTION_GXC_NPA_PATH_RANDOM: "Standard"
 RULE_OPTION_GXC_NPA_PATH_RANDOM_DESC: "Having beaten back Kuomintang and Federalist attempts to topple the status quo, the regionalist powers in Liangguang can now turn their attention towards resolving unfinished business between Nanning, Shaoguan, and Guangzhou.\nDepending on both domestic factors and potential external influences, one of several strongmen and politicians may come to power in the two provinces - and potentially beyond."
 RULE_OPTION_GXC_NPA_PATH_YUGUANG_PATAUT: "£KR_game_rule_flag_CHN  The Protector of Tradition"
 RULE_OPTION_GXC_NPA_PATH_YUGUANG_PATAUT_DESC: "After unification, President Lu Yuguang appoints the (perhaps true) master of the Young Guangxi Faction, Ma Ji, as his Prime Minister.\nThis cements General Ma's role in the new §PJiuguixi - Shaozhuang Pai§!, or Old Guangxi Clique - Young Guangxi Faction, government, and allows for a smooth transition from Zhili rule to Old Guangxi Clique rule.$GXC_NPA_PATH_GXC_REQUIREMENTS$"
 RULE_OPTION_GXC_NPA_PATH_YUGUANG_AUTDEM: "£KR_game_rule_flag_CHN  The Progressive General"
 RULE_OPTION_GXC_NPA_PATH_YUGUANG_AUTDEM_DESC: "After unification, President Lu Yuguang appoints the respected intellectual Ma Junwu as his Prime Minister.\nThis cements his own leadership, the §aJiuguixi - Shaozhuang Pai§!, or Old Guangxi Clique - Young Guangxi Faction, and his promise for change in the new China.$GXC_NPA_PATH_GXC_REQUIREMENTS$"
 RULE_OPTION_GXC_GXC_NPA_PATH_JIAHUA_AUTDEM: "£KR_game_rule_flag_CHN  The Teacher-President"
 RULE_OPTION_GXC_GXC_NPA_PATH_JIAHUA_AUTDEM_DESC: "After Shen Hongying suddenly dies in office following unification, Prime Minister Zhu Jiahua and his §aJingxing Hui§!, or Brilliant Star Society, affiliated clique of technocrats and bureaucrats emerge on top of the ensuing succession battle.$GXC_NPA_PATH_ZHL_REQUIREMENTS$"
 RULE_OPTION_GXC_GXC_NPA_PATH_YAOHAN_PATAUT: "£KR_game_rule_flag_CHN  Old Guangxi's Canton Comprador"
 RULE_OPTION_GXC_GXC_NPA_PATH_YAOHAN_PATAUT_DESC: "After Shen Hongying suddenly dies in office following unification, General Li Yaohan and Marshal Shen's son Shen Rongguang's §PJiuguixi - Zhaojun Pai§!, or Old Guangxi Clique - Zhao Army Faction, emerges on top of the ensuing succession battle.$GXC_NPA_PATH_ZHL_REQUIREMENTS$"
 RULE_OPTION_GXC_NPA_PATH_DEM_DESC: "After successfully uniting China, the Guangzhou government holds elections for the national assembly.\nThrough"
 RULE_OPTION_GXC_NPA_PATH_SOCCON: "£KR_game_rule_flag_GXC_MER  The Chinese Plutocracy"
 RULE_OPTION_GXC_NPA_PATH_SOCCON_DESC: "$RULE_OPTION_GXC_NPA_PATH_DEM_DESC$ bribes and skullduggery, Chen Lianbo and his Merchant allies' §cGejie jiu Zhongguo lianhehui§!, or Association of All Classes to Save China, emerge on top.$GXC_NPA_PATH_FNG_REQUIREMENTS$"
 RULE_OPTION_GXC_NPA_PATH_MARLIB: "£KR_game_rule_flag_CHN  The Democratic Ideal"
 RULE_OPTION_GXC_NPA_PATH_MARLIB_DESC: "$RULE_OPTION_GXC_NPA_PATH_DEM_DESC$ cunning and politicking, Liu Zhenhuan and his allies' §mJiu Zhengxue Xì§!, or Old Political Science Clique, emerge on top.$GXC_NPA_PATH_FNG_REQUIREMENTS$"

 GXC_UPC_PATH: "£KR_game_rule_flag_UPC_GRA  £KR_game_rule_flag_UPC_CDL  The Light of Chinese Federalism"
 GXC_UPC_PATH_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CLiangguang unifies China§!\n\n§CFederalists§! in §Y$GXC_PATH$§!\n§CIndependent§! in §Y$GXC_FORPOL$§!"
 RULE_OPTION_GXC_UPC_PATH_RANDOM: "Standard"
 RULE_OPTION_GXC_UPC_PATH_RANDOM_DESC: "After taking power in Liangguang, Chen Jiongming attempts to assemble a wide coalition of republicans, intellectuals, gentrymen, merchants, and regional warlords to form a Federalist government in Guangzhou under the umbrella of his Grand Republican Alliance. This coalition experiences more turbulence the closer they come to unification, with a growing opposition that manifests in the China Democratic League.\nEventually Chen Jiongming retires, either on his own initiative or due to external pressure. Who ultimately comes to power is decided by Democratic Enthusiasm, and the political popularity of various factions."
 RULE_OPTION_GXC_UPC_PATH_SOCDEM_START_DESC: "Zhang Junmai and his §SZhongguo Minzhu Tongmeng - Zhongguo Minzhu Shehui Dang§!, or China Democratic League - Democratic Socialist Party, dominate the China Democratic League, and successfully win the"
 RULE_OPTION_GXC_UPC_PATH_FIRST_SOCDEM: "£KR_game_rule_flag_UPC_CDL  The Unanimous Republic"
 RULE_OPTION_GXC_UPC_PATH_FIRST_SOCDEM_DESC: "$RULE_OPTION_GXC_UPC_PATH_SOCDEM_START_DESC$ first two elections of the Federalist Republic.$GXC_UPC_PATH_REQUIREMENTS$"
 RULE_OPTION_GXC_UPC_PATH_SECOND_SOCDEM: "£KR_game_rule_flag_UPC_CDL  The Democratic Diarchy"
 RULE_OPTION_GXC_UPC_PATH_SECOND_SOCDEM_DESC: "$RULE_OPTION_GXC_UPC_PATH_SOCDEM_START_DESC$ second election of the Federalist Republic, pushing out the incumbent Public Interest Party.$GXC_UPC_PATH_REQUIREMENTS$"
 RULE_OPTION_GXC_UPC_PATH_SECOND_SOCLIB: "£KR_game_rule_flag_UPC_GRA  The Song of Ice and Fire"
 RULE_OPTION_GXC_UPC_PATH_SECOND_SOCLIB_DESC: "$RULE_OPTION_GXC_UPC_PATH_SOCLIB_START_DESC$ second election of the Federalist Republic, avenging their earlier electoral defeat by the incumbent Democratic Socialist Party.$GXC_UPC_PATH_REQUIREMENTS$"
 RULE_OPTION_GXC_UPC_PATH_SOCLIB_START_DESC: "Chen Qiyou and the §lGonghe Datongmeng Zhongguo - Zhigongdang§!, or Grand Republican Alliance - Public Interest Party of China, dominate the Grand Republican Alliance, and successfully win the"
 RULE_OPTION_GXC_UPC_PATH_FIRST_SOCLIB: "£KR_game_rule_flag_UPC_GRA  The Yue Clique's Democracy"
 RULE_OPTION_GXC_UPC_PATH_FIRST_SOCLIB_DESC: "$RULE_OPTION_GXC_UPC_PATH_SOCLIB_START_DESC$ first two elections of the Federalist Republic.$GXC_UPC_PATH_REQUIREMENTS$"
 RULE_OPTION_GXC_UPC_PATH_YE_JU_AUTDEM: "£KR_game_rule_flag_UPC_GRA  The Yue Army's Prerogatives"
 RULE_OPTION_GXC_UPC_PATH_YE_JU_AUTDEM_DESC: "Despite some initial promise, the Federalist republic ultimately regresses to authoritarianism, and after unification, Ye Ju engineers a palace coup.\nThis allows him to assume the Presidency, and rule China alongside the §aYue Xi Junfa§!, or Yue Clique, as Democratic Enthusiasm collapses.$GXC_UPC_PATH_REQUIREMENTS$"
 RULE_OPTION_GXC_UPC_PATH_JISHEN_AUTDEM_DESC: "After unification, Li Jishen and the China Democratic League successfully resist Chen Jiongming's attempt to consolidate control over the republic around his hand-picked successor Chen Qiyou. General Li then organises a §aGuojia Chongjian Zhengfu§!, or National Reconstruction Government, dominated by"
 RULE_OPTION_GXC_UPC_PATH_JISHEN_TUTELAGE_AUTDEM: "£KR_game_rule_flag_UPC_CDL  The Tutelage of Productive People"
 RULE_OPTION_GXC_UPC_PATH_JISHEN_TUTELAGE_AUTDEM_DESC: "$RULE_OPTION_GXC_UPC_PATH_JISHEN_AUTDEM_DESC$ fellow Kuomintang defectors.$GXC_UPC_PATH_REQUIREMENTS$"
 RULE_OPTION_GXC_UPC_PATH_JISHEN_RENAISSANCE_AUTDEM: "£KR_game_rule_flag_UPC_CDL  The Chinese Renaissance"
 RULE_OPTION_GXC_UPC_PATH_JISHEN_RENAISSANCE_AUTDEM_DESC: "$RULE_OPTION_GXC_UPC_PATH_JISHEN_AUTDEM_DESC$ members of the Democratic Socialist Party.$GXC_UPC_PATH_REQUIREMENTS$"
 RULE_OPTION_GXC_UPC_PATH_QIYOU_AUTDEM: "£KR_game_rule_flag_UPC_GRA  The Transitional Democracy"
 RULE_OPTION_GXC_UPC_PATH_QIYOU_AUTDEM_DESC: "After unification, Chen Jiongming successfully consolidates control over the republic around his hand-picked successor Chen Qiyou, defusing a conspiracy led by opposition intellectuals and regionalist warlords through shrewd negotiations, and empowering the §aYue Xi Junfa§!, or Yue Clique.$GXC_UPC_PATH_REQUIREMENTS$"
 RULE_OPTION_GXC_GXC_UPC_PATH_YE_JU_PATAUT: "£KR_game_rule_flag_UPC_GRA  Democracy's Last Line of Defence"
 RULE_OPTION_GXC_GXC_UPC_PATH_YE_JU_PATAUT_DESC: "After unification, Chen Jiongming fails to consolidate control over the republic around his hand picked successor Chen Qiyou, resulting in his death at the hands of a conspiracy led by opposition intellectuals and regionalist warlords. General Ye Ju declares martial law and snuffs out any potential rebellion, and rules indefinitely with the §PYue Xi Junfa§!, or Yue Clique, through an emergency government.$GXC_UPC_PATH_REQUIREMENTS$"

 GXC_KMT_PATH: "£KR_game_rule_flag_RKT  £KR_game_rule_flag_LKT  Home of the Revolution"
 GXC_KMT_PATH_LKMT_REQUIREMENTS: "\n\n§CHinweis: If the Left Kuomintang Central Committee in the MinGan Insurgency are victorious in the League Collapse War, Chen Mingshu is able to take power. Otherwise, the Right always take control eventually.§!\n\n§RBenötigt:§!\n§CThe Left Kuomintang unifies China§!\n§CLiangguang defeats the Left Kuomintang and unifies China§!\n\n§CKuomintang§! in §Y$GXC_PATH$§!\n§CAlign with the Left KMT§! in §Y$GXC_FORPOL$§!"
 GXC_KMT_PATH_RKMT_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CLiangguang unifies China§!\n\n§CKuomintang§! in §Y$GXC_PATH$§!\n§CIndependent§! in §Y$GXC_FORPOL$§!"
 RULE_OPTION_GXC_KMT_PATH_RANDOM: "Standard"
 RULE_OPTION_GXC_KMT_PATH_RANDOM_DESC: "Shortly after taking power, Liangguang's Kuomintang engages in the \"Clash for Canton\" between the rightist General Chen Jitang and the leftist General Chen Mingshu, for the fate of the region."
 RULE_OPTION_GXC_KMT_PATH_END_DESC: "control over Liangguang after the fall of Beijing, and the Baise Uprising in Guangxi destabilises Chen Mingshu's grip on the region."
 RULE_OPTION_GXC_KMT_PATH_SYNDIE: "£KR_game_rule_flag_GXC_CRP  The True Chinese Revolution"
 RULE_OPTION_GXC_KMT_PATH_SYNDIE_DESC: "Tan Pingshan and his allies in the Provisional Action Committee seize $RULE_OPTION_GXC_KMT_PATH_END_DESC$\nThe §rZhonghua Gemin Dang§!, or Chinese Revolutionary Party, take power. $GXC_KMT_PATH_LKMT_REQUIREMENTS$"
 RULE_OPTION_GXC_KMT_PATH_RADSOC: "£KR_game_rule_flag_GXC_CPP  Leadership of the Eternal One"
 RULE_OPTION_GXC_KMT_PATH_RADSOC_DESC: "Peng Pai and his allies in the Guangdong Farmer's Association seize $RULE_OPTION_GXC_KMT_PATH_END_DESC$\nThe §RZhongguo Nongmin Dang§!, or Chinese Peasants' Party, take power.$GXC_KMT_PATH_LKMT_REQUIREMENTS$"
 RULE_OPTION_GXC_KMT_PATH_SOCDEM: "£KR_game_rule_flag_GXC_PPP  The Lame General No More"
 RULE_OPTION_GXC_KMT_PATH_SOCDEM_DESC: "Chen Mingshu and his allies in the New Fourth Army maintain $RULE_OPTION_GXC_KMT_PATH_END_DESC$\nThe §SShengchan Renmin Dang§!, or Productive People's Party, take power.$GXC_KMT_PATH_LKMT_REQUIREMENTS$"
 RULE_OPTION_GXC_KMT_PATH_SOCLIB: "£KR_game_rule_flag_RKT  The First Step to Democracy"
 RULE_OPTION_GXC_KMT_PATH_SOCLIB_DESC: "Sun Fo and his allies aid Hu Hanmin in his battles against Li Zongren, and their §lZhongguo Guomindang Zaizao Pai§!, or Reconstruction Faction of the Kuomintang. $RULE_OPTION_GXC_KMT_PATH_DEM_END$$GXC_KMT_PATH_RKMT_REQUIREMENTS$"
 RULE_OPTION_GXC_KMT_PATH_DEM_END: "subsequently win party elections for Chairman after unification."
 RULE_OPTION_GXC_KMT_PATH_SOCCON: "£KR_game_rule_flag_RKT  The Datong of Benevolence and Love"
 RULE_OPTION_GXC_KMT_PATH_SOCCON_DESC: "Ju Zheng and his allies aid Hu Hanmin in his battles against Li Zongren, and their §cZhongguo Guomindang Xishan Huiyi Pai§!, or Western Hills Clique of the Kuomintang, $RULE_OPTION_GXC_KMT_PATH_DEM_END$$GXC_KMT_PATH_RKMT_REQUIREMENTS$"
 RULE_OPTION_GXC_KMT_PATH_NOT_DIARCHY_AUTDEM_DESC: "Hu Hanmin and his allies win their battles against Li Zongren, and their §aZhongguo Guomindang Yuanlao Pai§!, or Elders Clique of the Kuomintang, $RULE_OPTION_GXC_KMT_PATH_DEM_END$"
 RULE_OPTION_GXC_KMT_PATH_PRINCIPLED_AUTDEM: "£KR_game_rule_flag_RKT  A Principled Man"
 RULE_OPTION_GXC_KMT_PATH_PRINCIPLED_AUTDEM_DESC: "$RULE_OPTION_GXC_KMT_PATH_NOT_DIARCHY_AUTDEM_DESC$ They prioritise a speedy tutelage.$GXC_KMT_PATH_RKMT_REQUIREMENTS$"
 RULE_OPTION_GXC_KMT_PATH_REVOLUTIONARY_AUTDEM: "£KR_game_rule_flag_RKT  The True Revolutionary"
 RULE_OPTION_GXC_KMT_PATH_REVOLUTIONARY_AUTDEM_DESC: "$RULE_OPTION_GXC_KMT_PATH_NOT_DIARCHY_AUTDEM_DESC$ They prioritise a thorough tutelage.$GXC_KMT_PATH_RKMT_REQUIREMENTS$"
 RULE_OPTION_GXC_KMT_PATH_DIARCHY_AUTDEM: "£KR_game_rule_flag_RKT  The Diarchy"
 RULE_OPTION_GXC_KMT_PATH_DIARCHY_AUTDEM_DESC: "Hu Hanmin, Chen Jitang and their allies initially lose their battles against Li Zongren, but their §aZhongguo Guomindang Xinyuexi§!, or New Guangdong Clique of the Kuomintang, defeat him in the second round of intra-party power struggles after unification.$GXC_KMT_PATH_RKMT_REQUIREMENTS$"
 RULE_OPTION_GXC_KMT_PATH_PATAUT: "£KR_game_rule_flag_RKT  The Citizen-Stratocracy"
 RULE_OPTION_GXC_KMT_PATH_PATAUT_DESC: "Li Zongren and his allies defeat Hu Hanmin and other intra-party rivals, allowing their §PZhongguo Guomindang Xinguixi§!, or New Guangxi Clique of the Kuomintang, to implement their stratocratic ideal.$GXC_KMT_PATH_RKMT_REQUIREMENTS$"

 HNN_PATH: "£KR_game_rule_flag_HNN  Hunan's Fateful Elections"
 RULE_OPTION_HNN_PATH_RANDOM: "Standard"
 RULE_OPTION_HNN_PATH_RANDOM_DESC: "Having seceded from the League of Eight Provinces, Hunan under Zhao Hengti navigates a perilous road. Upon restoring Hunan's Constitution, his democratic dreams are challenged, and other factions clamour for power. What happens next determines the fate of the Crossroads of China."
 RULE_OPTION_HNN_PATH_SOCCON: "£KR_game_rule_flag_HNN  People's Renewal Society"
 RULE_OPTION_HNN_PATH_SOCCON_DESC: "Zhao Hengti's §cMinxinshe§!, or People's Renewal Society, win an expected victory in Hunan's election.\nThey prefer to align with the Federalists, then the Zhili if they are still in power in Beijing, and then Fengtian."
 RULE_OPTION_HNN_PATH_KMT_DESC: "The Kuomintang \"United\" Front win a surprise victory in Hunan's election, and the march of Tang Xiangming's"
 RULE_OPTION_HNN_PATH_SOCDEM: "£KR_game_rule_flag_HNN_KMT  Kuomintang-8th Army (Radicals)"
 RULE_OPTION_HNN_PATH_SOCDEM_DESC: "$RULE_OPTION_HNN_PATH_KMT_DESC$ Zhili Clique on Changsha fails.\nHunan is led by Tang Shengzhi's §SGuomin Geming Jun Di Ba Jun (Jijin Pai)§!, or radicals of the Kuomintang-8th Army, who prefer to align with the Left Kuomintang, then the Right Kuomintang, then the Federalists, and then the National Protection Alliance."
 RULE_OPTION_HNN_PATH_RKMT_AUTDEM: "£KR_game_rule_flag_HNN_KMT  Kuomintang-6th Army"
 RULE_OPTION_HNN_PATH_RKMT_AUTDEM_DESC: "$RULE_OPTION_HNN_PATH_KMT_DESC$ Zhili Clique on Changsha fails.\nHunan is led by Cheng Qian's §aGuomin Geming Jun Di Liu Jun§!, or Kuomintang-6th Army, who prefer to align with the Right Kuomintang, and then the Left Kuomintang."
 RULE_OPTION_HNN_PATH_TANG_END_DESC: "He prefers to align with the Northern Zhili, then the Southern Zhili, then Yan Xishan if he has made a government."
 RULE_OPTION_HNN_PATH_PATAUT: "£KR_game_rule_flag_HNN_zhili  Zhili Clique"
 RULE_OPTION_HNN_PATH_PATAUT_DESC: "$RULE_OPTION_HNN_PATH_KMT_DESC$ §PZhili Xi Junfa§!, or Zhili Clique, on Changsha is successful.\n$RULE_OPTION_HNN_PATH_TANG_END_DESC$"
 RULE_OPTION_HNN_PATH_TANG_AUTDEM: "£KR_game_rule_flag_HNN_zhili  Harmony Association"
 RULE_OPTION_HNN_PATH_TANG_AUTDEM_DESC: "$RULE_OPTION_HNN_PATH_KMT_DESC$ Zhili Clique on Changsha is successful. Later, he \"restores\" civilian rule under the §aHexie Shetuan§!, or Harmony Association.\n$RULE_OPTION_HNN_PATH_TANG_END_DESC$"

 SZC_PATH: "£KR_game_rule_flag_SZC  One Province, Four Cliques"
 SZC_PATH_ZHL_REQUIREMENTS: "\n\n§RBenötigt:§!\nAny §CManchu Coup§! in §Y$QIE_PATH$§!"
 RULE_OPTION_SZC_PATH_RANDOM: "Standard"
 RULE_OPTION_SZC_PATH_RANDOM_DESC: "In the wake of crumbling Zhili authority, the fragile alliance that has held together the ruling cliques of Sichuan has finally given way. As the ambitious Liu Xiang and his faction rise up against the dominant faction in the Accelerated Department, led by Yang Sen, a critical province stands at the crossroads."
 RULE_OPTION_SZC_PATH_AUTDEM_DESC: "Yang Sen's faction of the §aSucheng Xi§!, or Accelerated Department, successfully defends against the Liu Xiang's faction offensive, holding on to power and aiming to bring Sichuan into the Zhili sphere.\nOstensibly the continuity candidate, Yang Sen ensures the continuation of stable governance within Sichuan."
 RULE_OPTION_SZC_PATH_ZHL_NOTE_DESC: "§CHinweis: If Wu Peifu is successfully ousted in Beijing, then Zhili remnants take up arms in Sichuan.§!"
 RULE_OPTION_SZC_PATH_SEN_AUTDEM: "£KR_game_rule_flag_SZC  Accelerated Department - Yang Sen"
 RULE_OPTION_SZC_PATH_SEN_AUTDEM_DESC: "$RULE_OPTION_SZC_PATH_AUTDEM_DESC$\n\n$RULE_OPTION_SZC_PATH_ZHL_NOTE_DESC$"
 RULE_OPTION_SZC_PATH_XIANG_AUTDEM: "£KR_game_rule_flag_SZC  Accelerated Department - Liu Xiang"
 RULE_OPTION_SZC_PATH_XIANG_AUTDEM_DESC: "Liu Xiang's faction of the §aSucheng Xi§!, or Accelerated Department, successfully captures Chengdu, routing all opposition. Becoming opportunist and obsessed with high modernisation, Sichuan is transformed into a bastion of progress under Liu Xiang's watch, for the King of Sichuan has far greater ambitions."
 RULE_OPTION_SZC_PATH_CUNHOU_PATAUT: "£KR_game_rule_flag_SZC  Armament Department"
 RULE_OPTION_SZC_PATH_CUNHOU_PATAUT_DESC: "$RULE_OPTION_SZC_PATH_AUTDEM_DESC$\nLater, Yang's former ally Liu Cunhou and his §PWubei Xi§!, or Armament Department, launches a coup. An opportunist but devoutly loyal to the Jade Marshal, Sichuan is safe under his tenure.\n\n$RULE_OPTION_SZC_PATH_ZHL_NOTE_DESC$"
 RULE_OPTION_SZC_PATH_BAODING_DESC: "Yang Sen's faction of the Accelerated Department and their allies in the Armament Department collapse under the pressure of Liu Xiang's offensive. In the chaos, the Baoding Department under Deng Xihou asserts control over the capital and successfully lifts Xiang's siege of Chengdu.\nSichuan turns inwards and aims to stay neutral, becoming the cultural hub of rural China, with"
 RULE_OPTION_SZC_PATH_XIHOU_SOCCON: "£KR_game_rule_flag_SZC  Baoding Department - Deng Xihou"
 RULE_OPTION_SZC_PATH_XIHOU_SOCCON_DESC: "$RULE_OPTION_SZC_PATH_BAODING_DESC$ Deng Xihou leading the §cBaoding Xi§!, or Baoding Department, diarchy, leaning the province towards the mainstream Beiyang factions."
 RULE_OPTION_SZC_PATH_WENHUI_SOCCON: "£KR_game_rule_flag_SZC  Baoding Department - Liu Wenhui"
 RULE_OPTION_SZC_PATH_WENHUI_SOCCON_DESC: "$RULE_OPTION_SZC_PATH_BAODING_DESC$ Liu Wenhui leading the §cBaoding Xi§!, or Baoding Department, diarchy, leaning the province towards the Southern Republican factions."
 RULE_OPTION_SZC_PATH_OFFICER_DESC: "The Armament Department successfully routs Xiang's forces in the siege of Chengdu. The federalist forces of the Jiu Ren Tuan, or Nine Man Regiment, ally with the local Officer Department and the remnants of Liu Xiang's forces, and their combined forces crush the weakened Accelerated Department.\nSichuan becomes a bastion of republicanism, with"
 RULE_OPTION_SZC_PATH_SOCLIB: "£KR_game_rule_flag_SZC  Officer Department"
 RULE_OPTION_SZC_PATH_SOCLIB_DESC: "$RULE_OPTION_SZC_PATH_OFFICER_DESC$ Li Jiayu's §lJunguan Xi§!, or Officer Department, leaning the province towards the Southern Republicans but with major Kuomintang sympathies."
 RULE_OPTION_SZC_PATH_SOCDEM: "£KR_game_rule_flag_SZC  Nine Man Regiment"
 RULE_OPTION_SZC_PATH_SOCDEM_DESC: "$RULE_OPTION_SZC_PATH_OFFICER_DESC$ Xiong Kewu's §SJiu Ren Tuan§!, or Nine Man Regiment, leaning the province towards the Federalists but with Left Kuomintang sympathies."
 RULE_OPTION_SZC_PATH_ZHL_AUTDEM: "£KR_game_rule_flag_QIE_rep  Zhili Remnants - Yan Huiqing"
 RULE_OPTION_SZC_PATH_ZHL_AUTDEM_DESC: "The remnants of the Zhili see Yan Huiqing's §aBeijing Zhixi (Wenguan Pai)§!, or civilian wing of the Zhili Clique, secure themselves within the Marshal's Government.\nIntent on reforming sooner rather than later, they seek to analyse the political reasons as to why the Republic failed.$SZC_PATH_ZHL_REQUIREMENTS$"
 RULE_OPTION_SZC_PATH_ZHL_PATAUT: "£KR_game_rule_flag_QIE_rep  Zhili Remnants - Wang Chengbin"
 RULE_OPTION_SZC_PATH_ZHL_PATAUT_DESC: "The remnants of the Zhili see Marshal Wang Chengbin's §PBeijing Zhixi (Junren Pai)§!, or military wing of the Zhili Clique, continue to weather the storm.\nIntent on annihilating the despised royalists at any and all cost, the Marshal of Tianjin has a legacy to fulfil.$SZC_PATH_ZHL_REQUIREMENTS$"

 SZC_FORPOL: "£KR_game_rule_flag_SZC  Sichuan Clique Alignment"
 RULE_OPTION_SZC_FORPOL_RANDOM: "Standard"
 RULE_OPTION_SZC_FORPOL_RANDOM_DESC: "Long a bastion of internal tension and infighting, the Sichuan Clique finally establish a sense of peace and solidarity following the absolute triumph of ones of its many factions.\nA microcosm of the Warlord Era, Sichuan's future in light of the collapse of Zhili authority is uncertain, but it has the potential to be the last bastion of numerous movements. If an opportunity presents itself, Sichuan endeavours to become a national unifier, or join a sympathetic faction."
 RULE_OPTION_SZC_FORPOL_SZC: "£KR_game_rule_flag_SZC  Independent"
 RULE_OPTION_SZC_FORPOL_SZC_DESC: "Casting off the burden of all other national movements, Sichuan attempts to unify China itself.\n\n§RBenötigt:§!\n§CAccelerated Department - Liu Xiang§! or any §CZhili Remnants§! in §Y$SZC_PATH$§!"
 RULE_OPTION_SZC_FORPOL_EXILE_UPC_START_DESC: "With the demise of Zhili authority, loyalists and opportunists steer Sichuan to"
 RULE_OPTION_SZC_FORPOL_NOT_SZC_DESC: "$RULE_OPTION_SZC_FORPOL_EXILE_UPC_START_DESC$ align with"
 RULE_OPTION_SZC_FORPOL_QIE: "£KR_game_rule_flag_SZC  £KR_game_rule_flag_QIE  Recognise Beijing"
 RULE_OPTION_SZC_FORPOL_QIE_DESC: "$RULE_OPTION_SZC_FORPOL_NOT_SZC_DESC$ the central government in Beijing.\n\n§RBenötigt:§!\n§CAccelerated Department - Yang Sen§! or §CArmament Department§! or §CBaoding Department - Deng Xihou§! in §Y$SZC_PATH$§!\n\n§CSichuan borders a Zhili government or their subjects§!\n\n§RNot§! any §CManchu Coup§! in §Y$QIE_PATH$§!"
 RULE_OPTION_SZC_FORPOL_AGJ: "£KR_game_rule_flag_SZC  £KR_game_rule_flag_FNG  Align with Fengtian"
 RULE_OPTION_SZC_FORPOL_AGJ_DESC: "$RULE_OPTION_SZC_FORPOL_NOT_SZC_DESC$ the Fengtian Clique.\n\n§RBenötigt:§!\n§CAccelerated Department - Liu Xiang§! or §CBaoding Department - Deng Xihou§! in §Y$SZC_PATH$§!\n\n§CSichuan borders Fengtian or their subjects§!"
 RULE_OPTION_SZC_FORPOL_UPC: "£KR_game_rule_flag_SZC  £KR_game_rule_flag_UPC_GRA  Align with the Federalists"
 RULE_OPTION_SZC_FORPOL_UPC_DESC: "$RULE_OPTION_SZC_FORPOL_NOT_SZC_DESC$ the Federalist movement, implementing their vision.\n\n§RBenötigt:§!\n§CAccelerated Department - Liu Xiang§! or §COfficer Department§! or §CNine Man Regiment§! or any §CBaoding Department§! in §Y$SZC_PATH$§!\n\n§CFederalists§! in §Y$GXC_PATH$§! and §CIndependent§! in §Y$GXC_FORPOL$§! or\n\n§CThe Federalist Outpost§! in §Y$YUN_PATH$§! and §CIndependent§! in §Y$YUN_FORPOL$§!\n\n§CSichuan borders the Federalists or their subjects§!"
 RULE_OPTION_SZC_FORPOL_EXILE_UPC: "£KR_game_rule_flag_UPC_GRA  Rally the Federalists"
 RULE_OPTION_SZC_FORPOL_EXILE_UPC_DESC: "$RULE_OPTION_SZC_FORPOL_EXILE_UPC_START_DESC$ the take up the mantle of the Federalist movement, after all other potential leaders have failed.\n\n§CHinweis: Sichuan will align with the existing Federalist government if it exists.§!\n\n§RBenötigt:§!\n§CNine Man Regiment§! in §Y$SZC_PATH$§!\n\n§CNo Chinese splinter leads or can lead the Federalists by 1938§! or\n\n§RNot§! §CFederalists§! in §Y$GXC_PATH$§!\n§RNot§! §CThe Federalist Outpost§! in §Y$YUN_PATH$§!"
 RULE_OPTION_SZC_FORPOL_LKT: "£KR_game_rule_flag_SZC  £KR_game_rule_flag_CHI  Align with the Left KMT"
 RULE_OPTION_SZC_FORPOL_LKT_DESC: "$RULE_OPTION_SZC_FORPOL_NOT_SZC_DESC$ the left wing of the Kuomintang movement, implementing their vision locally.\n\n§RBenötigt:§!\n§CThe Left Kuomintang win the League Collapse War§!\n\n§COfficer Department§! or §CNine Man Regiment§! in\n§Y$SZC_PATH$§!\n\n§CSichuan borders the Left Kuomintang or their subjects§!"
 RULE_OPTION_SZC_FORPOL_RKT: "£KR_game_rule_flag_SZC  £KR_game_rule_flag_RKT  Align with the Right KMT"
 RULE_OPTION_SZC_FORPOL_RKT_DESC: "$RULE_OPTION_SZC_FORPOL_NOT_SZC_DESC$ the right wing of the Kuomintang movement, implementing their vision locally.\n\n§RBenötigt:§!\n§CBaoding Department - Liu Wenhui§! or §COfficer Department§! or §CNine Man Regiment§! in §Y$SZC_PATH$§!\n\n§CKuomintang§! in §Y$GXC_PATH$§! and §CIndependent§! in §Y$GXC_FORPOL$§! or\n\n§CA Nationalist Junta§! in §Y$YUN_PATH$§! and §CIndependent§! in §Y$YUN_FORPOL$§!\n\n§CSichuan borders the Right Kuomintang or their subjects§!"
 RULE_OPTION_SZC_FORPOL_FORM_NPA: "£KR_game_rule_flag_SZC  Create the NPA"
 RULE_OPTION_SZC_FORPOL_FORM_NPA_DESC: "Not to be corralled by any outside force ever again, Sichuan's leaders band together with other like-minded provincial heavyweights, and attempt to create the National Protection Alliance, or join the Alliance if it has already been formed.\n\n§RBenötigt:§!\n§CAccelerated Department - Liu Xiang§! in §Y$SZC_PATH$§!"
 RULE_OPTION_SZC_FORPOL_NPA: "£KR_game_rule_flag_SZC  £KR_game_rule_flag_GXC_OGXC  Align with the NPA"
 RULE_OPTION_SZC_FORPOL_NPA_DESC: "Not to be corralled by any outside force ever again, Sichuan's leaders band together with other like-minded provincial heavyweights, and attempt to join the National Protection Alliance.\n\n§RBenötigt:§!\n§CAccelerated Department - Liu Xiang§! in §Y$SZC_PATH$§!\n\n§CRegionalists§! in §Y$GXC_PATH$§! and §CIndependent§! in §Y$GXC_FORPOL$§!"

 SZC_UPC_PATH: "£KR_game_rule_flag_UPC_GRA  £KR_game_rule_flag_UPC_CDL  The Tide of Federalist Reconstruction"
 SZC_UPC_PATH_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CSichuan unifies China§!\n\n§CNine Man Regiment§! in §Y$SZC_PATH$§!\n§CIndependent§! in §Y$SZC_FORPOL$§!"
 RULE_OPTION_SZC_UPC_PATH_RANDOM: "Standard"
 RULE_OPTION_SZC_UPC_PATH_RANDOM_DESC: "If Sichuan's Federalists manage to do the impossible and unite China under their banner, they hold elections which likely determine the fate of National Reconstruction.\nThe China Democratic League coalesce around Zhang Lan's leadership, while the Grand Republican Alliance stands behind Dan Maoxin and Xiong Kewu.\nIn the background, many concerned about the stability of the republic begin to gravitate towards Liu Wenhui."
 RULE_OPTION_SZC_UPC_PATH_SOCDEM: "£KR_game_rule_flag_UPC_CDL  Democracy Eternally Remembered"
 RULE_OPTION_SZC_UPC_PATH_SOCDEM_DESC: "Zhang Lan and the §SZhongguo Minzhu Tongmeng - Xīn shiji xuehui§!, or China Democratic League - New Century Research Association, win an upset victory against Xiong Kewu and Dan Maoxin. Their government remains stable.$SZC_UPC_PATH_REQUIREMENTS$"
 RULE_OPTION_SZC_UPC_PATH_SOCLIB: "£KR_game_rule_flag_UPC_GRA  The Old Dispensation"
 RULE_OPTION_SZC_UPC_PATH_SOCLIB_DESC: "Dan Maoxin, Xiong Kewu and the §lGonghe Datongmeng - Zizhi Lianhe Hui§!, or Grand Republican Alliance - United Federal Autonomy Association, win the Federal elections as expected. Their government remains stable.$SZC_UPC_PATH_REQUIREMENTS$"
 RULE_OPTION_SZC_UPC_PATH_AUTDEM: "£KR_game_rule_flag_UPC_GRA  Benevolence and Righteousness"
 RULE_OPTION_SZC_UPC_PATH_AUTDEM_DESC: "Liu Wenhui and the §aGonghe Datongmeng - Minzhi Jingjinshe§!, or Grand Republican Alliance - Civil Governance and Progress Society, steps in to defend the republic after the previous government fails to address the needs of the people.$SZC_UPC_PATH_REQUIREMENTS$"

 YUN_PATH: "£KR_game_rule_flag_YUN  Breaking the Dian-Qian Stalemate"
 RULE_OPTION_YUN_PATH_RANDOM: "Standard"
 RULE_OPTION_YUN_PATH_RANDOM_DESC: "The crumbling Qing Hegemony has spurred both the Federalist-aligned Governor Tang Jiyao of the Yunnan Clique and the Kuomintang Junta in Guizhou to act. The two forces in the southwest, previously humbled by defeats in the 1920s, attempt to eliminate the other before marching on Guangzhou to re-ignite their respective movements."
 RULE_OPTION_YUN_PATH_AUTDEM: "£KR_game_rule_flag_YUN  The Federalist Outpost"
 RULE_OPTION_YUN_PATH_AUTDEM_DESC: "Federalist Governor Tang Jiyao, the \"King of Yunnan\", and his forces overrun Kuomintang forces in Guizhou and secure their northeastern flank. They then prepare to make their move on Guangzhou either seizing it for themselves, or submitting to an aligned Federalist government.\nEither way, Tang Jiyao rules through the §aTang Pai§!, or Tang Jiyao's Clique, a web of connections that include his own People's Government Party, his gentrymen and army commanders, and various intellectuals affiliated with Southwestern University."
 RULE_OPTION_YUN_PATH_SOCCON: "£KR_game_rule_flag_YUN_KMT  A Nationalist Junta"
 RULE_OPTION_YUN_PATH_SOCCON_DESC: "The Kuomintang operating out of Guizhou rout the Yunnan Army, and in desperation Tang Jiyao's commanders turn on him - allowing General Zhu Peide and the §cGuomindang - Guomingemingjun Di San Jun (Youpai)§!, or Kuomintang - 3rd Army of the National Revolutionary Army (Rightists), to assume de facto leadership over the southwest.\nHe and other Kuomintang commanders then gear up to bring the revolution to Guangzhou, either seizing it for themselves, or submitting to an aligned Kuomintang government.\nThe various factions within the Kuomintang, including old right, new right, and the left also begin to scheme among themselves as the old Yunnan gentry reels."

 YUN_FORPOL: "£KR_game_rule_flag_YUN  Yunnan Clique Alignment"
 YUN_FORPOL_KMT_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CA Nationalist Junta§! in §Y$YUN_PATH$§!"
 YUN_FORPOL_NPA_REQUIREMENTS: "$YUN_FORPOL_NPA_NOTE_DESC$\n\n§RBenötigt:§!\n§CYunnan's Regionalists take power after the South China War ends in a stalemate§!\n\nIf §CThe Federalist Outpost§! in §Y$YUN_PATH$§!, then Liangguang must §Rnot§! choose §CFederalists§! in §Y$GXC_PATH$§!\n\nIf §CA Nationalist Junta§! in §Y$YUN_PATH$§!, then Liangguang must §Rnot§! choose §CKuomintang§! in §Y$GXC_PATH$§!"
 YUN_FORPOL_NPA_NOTE_DESC: "\n\n§CHinweis: Yunnan's Regionalists taking power cannot be guaranteed, but is most likely to happen if Hunan is either neutral or on Yunnan's side in the South China War.§!"
 YUN_FORPOL_NPA_NOT_REQUIREMENTS: "\n\n§RNot§! §CLiangguang vs Hunan§! or §CNo War§! in §Y$CHN_SOUTH_CHINA_WAR$§!"
 RULE_OPTION_YUN_FORPOL_RANDOM: "Standard"
 RULE_OPTION_YUN_FORPOL_RANDOM_DESC: "After the Xinhai Revolution, Yunnan became a major power-player in national politics particularly in the early part of the warlord era when it led the National Protection Alliance against Yuan Shikai's monarchy. The later part of the 1920s saw take a more isolationist route, and after the League collapses its leaders make calculated decisions on whether or not to make a play for power or submit to stronger movements."
 RULE_OPTION_YUN_FORPOL_YUN: "£KR_game_rule_flag_YUN  Independent"
 RULE_OPTION_YUN_FORPOL_YUN_DESC: "Yunnan stubbornly refuses any attempt at an alliance or demands for submission, attempting to form a rival government if it can."
 RULE_OPTION_YUN_FORPOL_LKT: "£KR_game_rule_flag_YUN_KMT  £KR_game_rule_flag_CHI  Align with the Left KMT"
 RULE_OPTION_YUN_FORPOL_LKT_DESC: "Yunnan attempts to align with the Left Kuomintang if they have survived the League Collapse War. Otherwise, they default to their normal strategy.\n\n§RBenötigt:§!\n§CThe Left Kuomintang win the League Collapse War§!\n\n§CA Nationalist Junta§! in §Y$YUN_PATH$§!\n\n§CYunnan borders the Left Kuomintang or their subjects§!"
 RULE_OPTION_YUN_FORPOL_RKT: "£KR_game_rule_flag_YUN_KMT  £KR_game_rule_flag_RKT  Align with the Right KMT"
 RULE_OPTION_YUN_FORPOL_RKT_DESC: "Yunnan attempts to align with the Right Kuomintang if they have formed their own government. Otherwise, they default to their normal strategy.\n\n§RBenötigt:§!\n§CA Nationalist Junta§! in §Y$YUN_PATH$§!\n§CKuomintang§! in §Y$GXC_PATH$§!\n§CIndependent§! in §Y$GXC_FORPOL$§!\n\n§CYunnan borders the Right Kuomintang or their subjects§!"
 RULE_OPTION_YUN_FORPOL_UPC: "£KR_game_rule_flag_YUN  £KR_game_rule_flag_UPC_GRA  Align with the Federalists"
 RULE_OPTION_YUN_FORPOL_UPC_DESC: "Yunnan attempts to align with the Federalists if they have formed their own government. Otherwise, they default to their normal strategy.\n\n§RBenötigt:§!\n§CThe Federalist Outpost§! in §Y$YUN_PATH$§!\n§CFederalists§! in §Y$GXC_PATH$§!\n§CIndependent§! in §Y$GXC_FORPOL$§!\n\n§CYunnan borders the Federalists or their subjects§!"
 RULE_OPTION_YUN_FORPOL_NZH: "£KR_game_rule_flag_YUN  £KR_game_rule_flag_QIE_rep  Align with the Zhili"
 RULE_OPTION_YUN_FORPOL_NZH_DESC: "Yunnan attempts to align with a Zhili faction, taking the path of least resistance.$YUN_FORPOL_NPA_REQUIREMENTS$\n\n§CYunnan borders a Zhili government or their subjects§!$YUN_FORPOL_NPA_NOT_REQUIREMENTS$"
 RULE_OPTION_YUN_FORPOL_AGJ: "£KR_game_rule_flag_YUN  £KR_game_rule_flag_FNG  Align with Fengtian"
 RULE_OPTION_YUN_FORPOL_AGJ_DESC: "Yunnan accepts to Fengtian's demands of their submission, seeing their growing influence over China.$YUN_FORPOL_NPA_REQUIREMENTS$\n\n§CYunnan borders Fengtian or their subjects§!$YUN_FORPOL_NPA_NOT_REQUIREMENTS$"
 RULE_OPTION_YUN_FORPOL_NPA: "£KR_game_rule_flag_YUN  £KR_game_rule_flag_SZC  Align with the NPA"
 RULE_OPTION_YUN_FORPOL_NPA_DESC: "Yunnan attempts to join the National Protection Alliance.$YUN_FORPOL_NPA_REQUIREMENTS$\n\n§CRegionalists§! in §Y$GXC_PATH$§! and §CIndependent§! in §Y$GXC_FORPOL$§! or\n\n§CCreate the NPA§! in §Y$SZC_FORPOL$§!$YUN_FORPOL_NPA_NOT_REQUIREMENTS$"

 YUN_NPA_PATH: "£KR_game_rule_flag_YUN  Yunnan Retreats into Isolation"
 YUN_NPA_PATH_REQUIREMENTS: "$YUN_FORPOL_NPA_REQUIREMENTS$\n\n§CIndependent§! in §Y$YUN_FORPOL$§!\n\n§CYunnan unifies China§!$YUN_FORPOL_NPA_NOT_REQUIREMENTS$"
 RULE_OPTION_YUN_NPA_PATH_RANDOM: "Standard"
 RULE_OPTION_YUN_NPA_PATH_RANDOM_DESC: "With Yunnan's armies suffering devastating defeats in the war for Guangzhou, its generals have staged a coup d'etat in Kunming. They then retreat into de facto isolation, regardless if they are de jure forced to join a rival government or not.\nLong Yun initially takes power as the province's governor, but discontent about his patronage of former Tang Jiyao officials draws opposition from General Hu Ruoyu and his Mengzi Clique, and also the looming betrayal of his kinsman General Lu Han."
 RULE_OPTION_YUN_NPA_PATH_LONG_YUN_DESC: "Long Yun attempts to take advantage of the outbreak of the Second Sino-Japanese War to consolidate power in Yunnan, and he successfully crushes domestic opposition.\nShould Yunnan end up unifying the country, President Long Yun appoints a cabinet"
 RULE_OPTION_YUN_NPA_PATH_LONG_YUN_PATAUT: "£KR_game_rule_flag_CHN  Government by Efficiency"
 RULE_OPTION_YUN_NPA_PATH_LONG_YUN_PATAUT_DESC: "$RULE_OPTION_YUN_NPA_PATH_LONG_YUN_DESC$ consisting of technocrats, close political allies, and family members - most notably his brothers in law. This cements the §PLong Pai§!, or Long Yun's Clique, and his personal power as the nation's new benevolent autocrat.$YUN_NPA_PATH_REQUIREMENTS$"
 RULE_OPTION_YUN_NPA_PATH_LONG_YUN_AUTDEM: "£KR_game_rule_flag_CHN  Steeled Democracy"
 RULE_OPTION_YUN_NPA_PATH_LONG_YUN_AUTDEM_DESC: "$RULE_OPTION_YUN_NPA_PATH_LONG_YUN_DESC$ consisting of many ex-Beiyang, helping to promote reconciliation between North and South and smoothen the political transition from the old order. This shores up his legitimacy, and that of the §aLong Pai§!, or Long Yun's Clique, as he takes his place as China's latest strongman working behind the scenes.$YUN_NPA_PATH_REQUIREMENTS$"
 RULE_OPTION_YUN_NPA_PATH_OPPOSITION_DESC: "Long Yun attempts to take advantage of the outbreak of the Second Sino-Japanese War to consolidate power in Yunnan, and he is overthrown by his domestic opposition.\nShould Yunnan end up unifying the country,"
 RULE_OPTION_YUN_NPA_PATH_HU_RUOYU_PATAUT: "£KR_game_rule_flag_CHN  The Great Commandant"
 RULE_OPTION_YUN_NPA_PATH_HU_RUOYU_PATAUT_DESC: "$RULE_OPTION_YUN_NPA_PATH_OPPOSITION_DESC$ Hu Ruoyu defeats Lu Han's rebellion, and the §PMengzi Pai§!, or Mengzi Clique, forms a national government that incorporates many ex-Zhili officials and officers.$YUN_NPA_PATH_REQUIREMENTS$"
 RULE_OPTION_YUN_NPA_PATH_LU_HAN_AUTDEM: "£KR_game_rule_flag_CHN  The Adventerous Turncoat"
 RULE_OPTION_YUN_NPA_PATH_LU_HAN_AUTDEM_DESC: "$RULE_OPTION_YUN_NPA_PATH_OPPOSITION_DESC$ Lu Han successfullys oust Hu Ruoyu from office, and the §aLu Pai§!, or Lu Han's Clique, forms a national government that incorporates many southern officials and politicans.$YUN_NPA_PATH_REQUIREMENTS$"

 YUN_UPC_PATH: "£KR_game_rule_flag_UPC_GRA  £KR_game_rule_flag_UPC_CDL  The Federalist Bastion"
 YUN_UPC_PATH_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CThe Federalist Outpost§! in §Y$YUN_PATH$§!"
 YUN_UPC_PATH_PUPPET_REQUIREMENTS: "\n\n§CHinweis: A Federalist government must be formed in Guangzhou that Yunnan can submit to.§!\n\n§RBenötigt:§!\n§CThe Federalists unify China§!\n§CYunnan defeats the Federalists and unifies China§!\n\n§CThe Federalist Outpost§! in §Y$YUN_PATH$§!\n§CFederalists§! in §Y$GXC_PATH$§!\n§CIndependent§! in §Y$GXC_FORPOL$§!"
 YUN_UPC_PATH_INDEPENDENT_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CYunnan unifies China§!\n\n§CThe Federalist Outpost§! in §Y$YUN_PATH$§!\n§CIndependent§! in §Y$YUN_FORPOL$§!"
 RULE_OPTION_YUN_UPC_PATH_RANDOM: "Standard"
 RULE_OPTION_YUN_UPC_PATH_RANDOM_DESC: "After driving out the Kuomintang remnant in Guizhou, Tang Jiyao's attention shifts beyond the southwest.\nIf Yunnan submits to an outside Federalist government, Tang Jiyao must contend with rising opposition from within Yunnan by an alliance of the local intelligentsia and warlords.\nIf Yunnan manages to create a Federalist government of his own, he battles opposition from the more national oriented Crescent Moon Society.\nIn either case, there is a struggle not only for control over the nation, but for the integrity of China's fledging democracy."
 RULE_OPTION_YUN_UPC_PATH_NOT_JIYAO_DESC: "After Yunnan submits to an external Federalist government, growing internal pressure from democratic advocates, along with a failed attempt at reining in his military officers, sees Tang Jiyao toppled. He later dies under suspicious circumstances."
 RULE_OPTION_YUN_UPC_PATH_SOCDEM: "£KR_game_rule_flag_UPC_CDL  The Peaceful Road to Socialism"
 RULE_OPTION_YUN_UPC_PATH_SOCDEM_DESC: "$RULE_OPTION_YUN_UPC_PATH_NOT_JIYAO_DESC$\nCun Shusheng, a local educator and member of the China Democratic League emerges as leader, and his §SZhongguo Minzhu Tongmeng - Dian Pai§!, or China Democratic League - Yunnan Provincial Committee Faction, wins any subsequent elections should Yunnan end up unifying the country.$YUN_UPC_PATH_PUPPET_REQUIREMENTS$"
 RULE_OPTION_YUN_UPC_PATH_MARLIB: "£KR_game_rule_flag_UPC_GRA  The Grand Republican Statesman"
 RULE_OPTION_YUN_UPC_PATH_MARLIB_DESC: "$RULE_OPTION_YUN_UPC_PATH_NOT_JIYAO_DESC$\nThough Cun Shusheng initially seizes power in Yunnan in a coup, Tang Jiyao's son Tang Xiaoying slowly builds up a power base of his own. Should Yunnan end up uniting the country, the younger Tang and his §mGonghe Datongmeng - RenMin ZhengFu Dang§!, or Grand Republican Alliance - People's Government Party, win any subsequent elections on behalf of the Grand Republican Alliance.$YUN_UPC_PATH_PUPPET_REQUIREMENTS$"
 RULE_OPTION_YUN_UPC_XIAOYING_AUTDEM: "£KR_game_rule_flag_UPC_GRA  The Torch-Bearer"
 RULE_OPTION_YUN_UPC_XIAOYING_AUTDEM_DESC: "$RULE_OPTION_YUN_UPC_PATH_NOT_JIYAO_DESC$\nThough Cun Shusheng initially seizes power in Yunnan in a coup, Tang Jiyao's son Tang Xiaoying slowly builds up a power base of his own. Should Yunnan end up uniting the country, the younger Tang and his §aDian Pai§!, or Dian Clique, successfully orchestrate a palace coup.$YUN_UPC_PATH_PUPPET_REQUIREMENTS$"
 RULE_OPTION_YUN_UPC_PATH_JIYAO_START_DESC: "After unification, the new Federalist republic holds parliamentary elections."
 RULE_OPTION_YUN_UPC_PATH_SOCLIB: "£KR_game_rule_flag_UPC_CDL  The Talented Minority"
 RULE_OPTION_YUN_UPC_PATH_SOCLIB_DESC: "$RULE_OPTION_YUN_UPC_PATH_JIYAO_START_DESC$ Despite all odds, Luo Longji's §lZhongguo Minzhu Tongmeng - Xin Yue She§!, or China Democratic League - Crescent Moon Society, successfully rallies the China Democratic League to victory in the ensuing parliamentary elections, and avoid underhanded attempts by Tang Jiyao to reclaim power for himself.$YUN_UPC_PATH_INDEPENDENT_REQUIREMENTS$"
 RULE_OPTION_YUN_UPC_PATH_SOCCON: "£KR_game_rule_flag_UPC_GRA  Arbiter Between Provinces"
 RULE_OPTION_YUN_UPC_PATH_SOCCON_DESC: "$RULE_OPTION_YUN_UPC_PATH_JIYAO_START_DESC$ As expected, Tang Jiyao's §cGonghe Datongmeng - RenMin ZhengFu Dang§!, or Grand Republican Alliance - People's Government Party, are victorious.\nThey maintain enough Democratic Enthusiasm to maintain the legitimacy of the Federalist republic's fledging democracy.$YUN_UPC_PATH_INDEPENDENT_REQUIREMENTS$"
 RULE_OPTION_YUN_UPC_PATH_JIYAO_AUTDEM: "£KR_game_rule_flag_UPC_GRA  Cai E's Champion"
 RULE_OPTION_YUN_UPC_PATH_JIYAO_AUTDEM_DESC: "$RULE_OPTION_YUN_UPC_PATH_JIYAO_START_DESC$ As expected, Tang Jiyao and the Grand Republican Alliance are victorious.\nHowever, they fail to maintain enough Democratic Enthusiasm to maintain the legitimacy of the Federalist republic's fledging democracy, leaving the §aDian Pai§!, or Dian Clique, to be empowered.$YUN_UPC_PATH_INDEPENDENT_REQUIREMENTS$"

 YUN_KMT_PATH: "£KR_game_rule_flag_RKT  £KR_game_rule_flag_LKT  Last Stand of the Kuomintang"
 YUN_KMT_PATH_PUPPET_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CThe Kuomintang unifies China§!\n§CYunnan defeats the Kuomintang and unifies China§!\n\n§CA Nationalist Junta§! in §Y$YUN_PATH$§!\n§CAlign with the Left KMT§! or §CAlign with the Right KMT§! in §Y$YUN_FORPOL$§!"
 YUN_KMT_PATH_INDEPENDENT_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CYunnan unifies China§!\n\n§CA Nationalist Junta§! in §Y$YUN_PATH$§!\n§CIndependent§! in §Y$YUN_FORPOL$§!"
 RULE_OPTION_YUN_KMT_PATH_RANDOM: "Standard"
 RULE_OPTION_YUN_KMT_PATH_RANDOM_DESC: "After seizing control of Yunnan, the Southwestern Kuomintang turn their attention to Guangzhou. If they submit to an external Kuomintang government, the Yunnan Kuomintang under Zhu Peide work to consolidate control over the southwest with the help of Li Genyuan and the Political Science Clique which draws opposition from socialists, KMT rivals, and the gentry. If they instead conquered Guangzhou and formed their own rival government, He Yingqin and Dai Jitao dominate the party as the standard-bearers of the \"New Right\" but they are opposed by members of the \"Old Right\" which leads to many potential different outcomes."
 RULE_OPTION_YUN_KMT_PATH_RADSOC: "£KR_game_rule_flag_YUN_CPDWP  The Workers and Peasants"
 RULE_OPTION_YUN_KMT_PATH_RADSOC_DESC: "After Yunnan Kuomintang submits to the Left Kuomintang's Nanjing Nationalist Government, leftist agents work to begin socialising the southwest.\nDispleased by Zhu Peide's alliance with Li Genyuan and the Political Science Clique, socialist officers Zhang Bojun and Zhu De seizing power in Yunnan, and the §RZhongguo Nonggong Minzhu Dang§!, or Chinese Peasants and Workers' Democratic Party, remain in power should Yunnan successfully unite the country.\n\n§RBenötigt:§!\n§CThe Left Kuomintang unifies China§!\n§CYunnan defeats the Left Kuomintang and unifies China§!\n\n§CA Nationalist Junta§! in §Y$YUN_PATH$§!\n§CAlign with the Left KMT§! in §Y$YUN_FORPOL$§!"
 RULE_OPTION_YUN_KMT_PATH_DEM_DESC: "After the Yunnan Kuomintang submits to an external Kuomintang government, Chen Cheng drifts leftwards along with the remnants of the First Army."
 RULE_OPTION_YUN_KMT_PATH_SOCDEM: "£KR_game_rule_flag_LKT  Heir to the Red Napoleon"
 RULE_OPTION_YUN_KMT_PATH_SOCDEM_DESC: "$RULE_OPTION_YUN_KMT_PATH_DEM_DESC$\nDispleased by Zhu Peide's alliance with Li Genyuan and the Political Science Clique, the §SGuomindang - Guomingemingjun Tumu Xì§!, or Kuomintang - Civil Engineering Clique of the National Revolutionary Army, stage a coup after the fall of Beijing and remain in power should Yunnan successfully unite the country.$YUN_KMT_PATH_PUPPET_REQUIREMENTS$"
 RULE_OPTION_YUN_KMT_PATH_GENYUAN_MARLIB: "£KR_game_rule_flag_RKT  The Legacy of Gu Pinzhen"
 RULE_OPTION_YUN_KMT_PATH_GENYUAN_MARLIB_DESC: "$RULE_OPTION_YUN_KMT_PATH_MARLIB_DESC$ §mGuomindang - Zhengxue Xi§!, or Kuomintang - Political Science Clique, ultimately they prevail.\nAfter unification, the party eventually holds a congress which results in the elder statesman Li Genyuan securing the Chairmanship.$YUN_KMT_PATH_PUPPET_REQUIREMENTS$"
 RULE_OPTION_YUN_KMT_PATH_MARLIB_DESC: "$RULE_OPTION_YUN_KMT_PATH_DEM_DESC$\nThough many are displeased with Zhu Peide's alliance with Li Genyuan and the"
 RULE_OPTION_YUN_KMT_PATH_SOCCON: "£KR_game_rule_flag_RKT  The Sons of the Guofu"
 RULE_OPTION_YUN_KMT_PATH_SOCCON_DESC: "$RULE_OPTION_YUN_KMT_PATH_MARLIB_DESC$ Political Science Clique, ultimately they prevail.\nAfter unification, the party eventually holds a congress which results in General Zhu Peide and the §cGuomindang-Guomingemingjun Di San Jun (Youpai)§!, or Kuomintang - 3rd Army of the National Revolutionary Army (Rightists), retaining the Chairmanship.$YUN_KMT_PATH_PUPPET_REQUIREMENTS$"
 RULE_OPTION_YUN_KMT_PATH_INDEPENDENT_START_DESC: "After the Yunnan Clique seize Guangzhou and form their own rival government, He Yingqin and Dai Jitao initially emerge as its leaders.\nHowever, the growing opposition of the \"Old Right\" led by Hu Hanmin, particularly over a proposed provisional constitution that formally expands Presidential powers, pushes He Yingqin to attempt to arrest his opponents."
 RULE_OPTION_YUN_KMT_PATH_QUN_MARLIB: "£KR_game_rule_flag_RKT  Zhang Qun and the Genro's New Era"
 RULE_OPTION_YUN_KMT_PATH_QUN_MARLIB_DESC: "$RULE_OPTION_YUN_KMT_PATH_INDEPENDENT_START_DESC$\nHe Yingqin fails, and Zhang Qun and the §mGuomindang - (Xin) Zhengxue xì§!, or Kuomintang - (New) Political Science Clique, take advantage of the power vacuum to take power for themselves.$YUN_KMT_PATH_INDEPENDENT_REQUIREMENTS$"
 RULE_OPTION_YUN_KMT_PATH_JITAO_MID_DESC: "He Yingqin fails, and Dai Jitao takes advantage of the power vacuum to take power for himself.\nAfter unification, Dai Jitao"
 RULE_OPTION_YUN_KMT_PATH_AUTDEM: "£KR_game_rule_flag_RKT  The Doctrine of National Salvation"
 RULE_OPTION_YUN_KMT_PATH_AUTDEM_DESC: "$RULE_OPTION_YUN_KMT_PATH_INDEPENDENT_START_DESC$\n$RULE_OPTION_YUN_KMT_PATH_JITAO_MID_DESC$ chooses to retire, and his ally Chen Lifu, with his §aGuomindang - CC Xi§!, or Kuomintang - CC Clique, oversees the post-unification tutelage.$YUN_KMT_PATH_INDEPENDENT_REQUIREMENTS$"
 RULE_OPTION_YUN_KMT_PATH_JITAO_PATAUT: "£KR_game_rule_flag_RKT  The True Revolutionary"
 RULE_OPTION_YUN_KMT_PATH_JITAO_PATAUT_DESC: "$RULE_OPTION_YUN_KMT_PATH_INDEPENDENT_START_DESC$\n$RULE_OPTION_YUN_KMT_PATH_JITAO_MID_DESC$ chooses to not to retire, and the §PGuomindang - CC Xi§!, or Kuomintang - CC Clique, oversees the post-unification tutelage.$YUN_KMT_PATH_INDEPENDENT_REQUIREMENTS$"
 RULE_OPTION_YUN_KMT_PATH_CHENG_PATAUT: "£KR_game_rule_flag_RKT  The Little Generalissimo"
 RULE_OPTION_YUN_KMT_PATH_CHENG_PATAUT_DESC: "$RULE_OPTION_YUN_KMT_PATH_INDEPENDENT_START_DESC$\nHe Yingqin fails, and Chen Cheng and his §PGuomindang - Guomingemingjun Tumu Xì§!, or Kuomintang - Civil Engineering Clique of the National Revolutionary Army, take advantage of the power vacuum to take power for themselves.$YUN_KMT_PATH_INDEPENDENT_REQUIREMENTS$"
 RULE_OPTION_YUN_KMT_PATH_YINQIN_MID_DESC: "He succeeds, and after unification his §PGuomindang-Huangbu Xi (Benliu)§!, or Kuomintang - Whampoa Clique (Mainline Faction), forms a cabinet dominated by"
 RULE_OPTION_YUN_KMT_PATH_PEOPLES_YINGQIN_PATAUT: "£KR_game_rule_flag_RKT  The People's Generalissimo"
 RULE_OPTION_YUN_KMT_PATH_PEOPLES_YINGQIN_PATAUT_DESC: "$RULE_OPTION_YUN_KMT_PATH_INDEPENDENT_START_DESC$\n$RULE_OPTION_YUN_KMT_PATH_YINQIN_MID_DESC$ the Civil Engineering Clique.$YUN_KMT_PATH_INDEPENDENT_REQUIREMENTS$"
 RULE_OPTION_YUN_KMT_PATH_REVOLUTIONARY_YINGQIN_PATAUT: "£KR_game_rule_flag_RKT  The Revolutionary Generalissimo"
 RULE_OPTION_YUN_KMT_PATH_REVOLUTIONARY_YINGQIN_PATAUT_DESC: "$RULE_OPTION_YUN_KMT_PATH_INDEPENDENT_START_DESC$\n$RULE_OPTION_YUN_KMT_PATH_YINQIN_MID_DESC$ the CC Clique.$YUN_KMT_PATH_INDEPENDENT_REQUIREMENTS$"
 RULE_OPTION_YUN_KMT_PATH_LUCKY_YINGQIN_PATAUT: "£KR_game_rule_flag_RKT  The Lucky Generalissimo"
 RULE_OPTION_YUN_KMT_PATH_LUCKY_YINGQIN_PATAUT_DESC: "$RULE_OPTION_YUN_KMT_PATH_INDEPENDENT_START_DESC$\n$RULE_OPTION_YUN_KMT_PATH_YINQIN_MID_DESC$ his relatives and Whampoa Clique officers.$YUN_KMT_PATH_INDEPENDENT_REQUIREMENTS$"
 RULE_OPTION_YUN_KMT_PATH_LIBERAL_YINGQIN_PATAUT: "£KR_game_rule_flag_RKT  The Liberal Generalissimo"
 RULE_OPTION_YUN_KMT_PATH_LIBERAL_YINGQIN_PATAUT_DESC: "$RULE_OPTION_YUN_KMT_PATH_INDEPENDENT_START_DESC$\n$RULE_OPTION_YUN_KMT_PATH_YINQIN_MID_DESC$ the Political Science Clique.$YUN_KMT_PATH_INDEPENDENT_REQUIREMENTS$"
 RULE_OPTION_YUN_KMT_PATH_BLUE_SHIRT_YINGQIN_PATAUT: "£KR_game_rule_flag_RKT  The Blue Shirt Generalissimo"
 RULE_OPTION_YUN_KMT_PATH_BLUE_SHIRT_YINGQIN_PATAUT_DESC: "$RULE_OPTION_YUN_KMT_PATH_INDEPENDENT_START_DESC$\n$RULE_OPTION_YUN_KMT_PATH_YINQIN_MID_DESC$ the Blue Shirts Society.$YUN_KMT_PATH_INDEPENDENT_REQUIREMENTS$"
 RULE_OPTION_YUN_KMT_PATH_NATPOP: "£KR_game_rule_flag_RKT  The Blue Shirt Revolution"
 RULE_OPTION_YUN_KMT_PATH_NATPOP_DESC: "$RULE_OPTION_YUN_KMT_PATH_INDEPENDENT_START_DESC$\nHe Yingqin fails, and Teng Jie and the §nGuomindang - Lanyishe§!, or Kuomintang - Blue Shirts Society, take advantage of the power vacuum to take power for themselves.$YUN_KMT_PATH_INDEPENDENT_REQUIREMENTS$"

 CHN_SOUTH_CHINA_WAR: "£KR_game_rule_flag_GXC_OGXC  £KR_game_rule_flag_HNN  £KR_game_rule_flag_YUN  The South China War"
 CHN_SOUTH_CHINA_WAR_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CLiangguang, Hunan and Yunnan are independent§!"
 RULE_OPTION_CHN_SOUTH_CHINA_WAR_RANDOM: "Standard"
 RULE_OPTION_CHN_SOUTH_CHINA_WAR_RANDOM_DESC: "Ever since the 1911 Xinhai Revolution, the southern provinces of Liangguang, Hunan and Yunnan have been uniquely politically intertwined. Though cautious of one another, they tacitly cooperate to minimise their mutual Zhili influence.\nAs the Zhili order collapses, all bets are off, and the various Kuomintang, Federalist or Regionalist-aligned factions within these provinces may soon be at odds with their neighbours."
 RULE_OPTION_CHN_SOUTH_CHINA_WAR_GXC_HNN: "£KR_game_rule_flag_GXC_OGXC  vs £KR_game_rule_flag_HNN  Liangguang vs Hunan"
 RULE_OPTION_CHN_SOUTH_CHINA_WAR_GXC_HNN_DESC: "War breaks out as Liangguang and Hunan come to blows, while Yunnan remains on the sidelines.$CHN_SOUTH_CHINA_WAR_REQUIREMENTS$"
 RULE_OPTION_CHN_SOUTH_CHINA_WAR_GXC_YUN: "£KR_game_rule_flag_GXC_OGXC  vs £KR_game_rule_flag_YUN  Liangguang vs Yunnan"
 RULE_OPTION_CHN_SOUTH_CHINA_WAR_GXC_YUN_DESC: "War breaks out as Liangguang and Yunnan come to blows, while Hunan remains on the sidelines.$CHN_SOUTH_CHINA_WAR_REQUIREMENTS$"
 # RULE_OPTION_CHN_SOUTH_CHINA_WAR_HNN_YUN: "£KR_game_rule_flag_HNN  vs £KR_game_rule_flag_YUN  Hunan vs Yunnan"    # Not available in current content, maybe in the future
 # RULE_OPTION_CHN_SOUTH_CHINA_WAR_HNN_YUN_DESC: "War breaks out as Hunan and Yunnan come to blows, while Liangguang remains on the sidelines.$CHN_SOUTH_CHINA_WAR_REQUIREMENTS$"
 RULE_OPTION_CHN_SOUTH_CHINA_WAR_GXC_BOTH: "£KR_game_rule_flag_GXC_OGXC  vs £KR_game_rule_flag_HNN  £KR_game_rule_flag_YUN  Liangguang vs Hunan & Yunnan"
 RULE_OPTION_CHN_SOUTH_CHINA_WAR_GXC_BOTH_DESC: "War breaks out, and Liangguang is pitted against both Hunan and Yunnan.$CHN_SOUTH_CHINA_WAR_REQUIREMENTS$"
 RULE_OPTION_CHN_SOUTH_CHINA_WAR_HNN_BOTH: "£KR_game_rule_flag_HNN  vs £KR_game_rule_flag_GXC_OGXC  £KR_game_rule_flag_YUN  Hunan vs Liangguang & Yunnan"
 RULE_OPTION_CHN_SOUTH_CHINA_WAR_HNN_BOTH_DESC: "War breaks out, and Hunan is pitted against both Liangguang and Yunnan.$CHN_SOUTH_CHINA_WAR_REQUIREMENTS$"
 RULE_OPTION_CHN_SOUTH_CHINA_WAR_YUN_BOTH: "£KR_game_rule_flag_YUN  vs £KR_game_rule_flag_GXC_OGXC  £KR_game_rule_flag_HNN  Yunnan vs Liangguang & Hunan"
 RULE_OPTION_CHN_SOUTH_CHINA_WAR_YUN_BOTH_DESC: "War breaks out, and Yunnan is pitted against both Liangguang and Hunan.$CHN_SOUTH_CHINA_WAR_REQUIREMENTS$"
 RULE_OPTION_CHN_SOUTH_CHINA_WAR_GXC_HNN_YUN: "£KR_game_rule_flag_GXC_OGXC  vs £KR_game_rule_flag_HNN  vs £KR_game_rule_flag_YUN  Three-way War"
 RULE_OPTION_CHN_SOUTH_CHINA_WAR_GXC_HNN_YUN_DESC: "War breaks out, and mutual emnities result in a three-way war, with every province for itself.$CHN_SOUTH_CHINA_WAR_REQUIREMENTS$"
 RULE_OPTION_CHN_SOUTH_CHINA_WAR_NO_WAR: "£KR_game_rule_flag_GXC_OGXC  £KR_game_rule_flag_HNN  £KR_game_rule_flag_YUN  No War"
 RULE_OPTION_CHN_SOUTH_CHINA_WAR_NO_WAR_DESC: "Nominal alliances stand firm, and the South China War does not occur.$CHN_SOUTH_CHINA_WAR_REQUIREMENTS$\n\n§CFederalists§! in §Y$GXC_PATH$§! and §CPeople's Renewal Society§! in §Y$HNN_PATH$§! and §CThe Federalist Outpost§! in\n§Y$YUN_PATH$§! or\n\n§CKuomintang§! in §Y$GXC_PATH$§! and §CKuomintang-6th Army§! in §Y$HNN_PATH$§! and §CA Nationalist Junta§! in §Y$YUN_PATH$§!"

 LEC_PATH: "£KR_game_rule_flag_LEC  A New High Commissioner"
 RULE_OPTION_LEC_PATH_RANDOM: "Standard"
 RULE_OPTION_LEC_PATH_RANDOM_DESC: "The Legation Cities, established as a compromise between the Germans, Americans and Japanese (along with other powers with interests in China), stands at a precipice with America's descent into civil war, Germany's Black Monday, and Japan's imperial ambitions threatening the stability of the project. The new choice of High Commissioner determines their fate."
 RULE_OPTION_LEC_PATH_PATAUT: "£KR_game_rule_flag_LEC  Tool of the West"
 RULE_OPTION_LEC_PATH_PATAUT_DESC: "In the immediate aftermath of the Second American Civil War, the Germans invoke Article 14 of the Legation Treaty, and the German-aligned §POstchina Direktorium§!, or East China Directorate, take power in the resulting debate."
 RULE_OPTION_LEC_PATH_NATPOP: "£KR_game_rule_flag_LEC  Gateway to the East"
 RULE_OPTION_LEC_PATH_NATPOP_DESC: "In the immediate aftermath of the Second American Civil War, the Japanese invoke Article 14 of the Legation Treaty, and the Japanese-aligned §nShina Tokubetsu Honu§!, or China Agency, take power in the resulting debate."
 RULE_OPTION_LEC_PATH_MARLIB: "£KR_game_rule_flag_LEC  The Open Door - American Rule"
 RULE_OPTION_LEC_PATH_MARLIB_DESC: "In the immediate aftermath of the Second American Civil War, §mAmCham Shanghai§!, or the American Chamber of Commerce in the International Mandate, retain power."
 RULE_OPTION_LEC_PATH_SOCCON: "£KR_game_rule_flag_LEC  The Open Door - British Rule"
 RULE_OPTION_LEC_PATH_SOCCON_DESC: "The British in Hong Kong reach out to the British Crown, renewing British interest in the Cities. In the immediate aftermath of the Second American Civil War, the British-aligned §cHong Kong Club§! take power in the resulting debate."
 RULE_OPTION_LEC_PATH_AUTDEM_DESC: "The Legation Cities disastrously manage their financial assets, leading them into bankruptcy. After the fights in Shanghai, the §aShanghai Municipal Council§! falls into the"
 RULE_OPTION_LEC_PATH_AUTDEM_GER: "£KR_game_rule_flag_LEC  £KR_game_rule_flag_GER  Collapse - German Puppet"
 RULE_OPTION_LEC_PATH_AUTDEM_GER_DESC: "$RULE_OPTION_LEC_PATH_AUTDEM_DESC$ German sphere."
 RULE_OPTION_LEC_PATH_AUTDEM_JAP: "£KR_game_rule_flag_LEC  £KR_game_rule_flag_JAP  Collapse - Japanese Puppet"
 RULE_OPTION_LEC_PATH_AUTDEM_JAP_DESC: "$RULE_OPTION_LEC_PATH_AUTDEM_DESC$ Japanese sphere."

 LEC_FACTION: "£KR_game_rule_flag_LEC  The Cities' Allegiance"
 RULE_OPTION_LEC_FACTION_RANDOM: "Standard"
 RULE_OPTION_LEC_FACTION_RANDOM_DESC: "With a new High Commissioner elected, a decision needs to be made about the future direction of the Legations in securing its independence.\nAn active foreign policy appeases one shareholder, but may make them fair game for other hungry powers."
 RULE_OPTION_LEC_FACTION_NO: "£KR_game_rule_flag_LEC  Neutrality Maintained"
 RULE_OPTION_LEC_FACTION_NO_DESC: "The Legation Cities remains neutral, not favouring any factions.\n\n§RBenötigt:§!\n§RNot§! any §CCollapse§! in §Y$LEC_PATH$§!"
 RULE_OPTION_LEC_FACTION_YES: "£KR_game_rule_flag_LEC  Neutral No More"
 RULE_OPTION_LEC_FACTION_YES_DESC: "The Legation Cities abandons neutrality, and seeks an alliance with the Reichspakt, Entente or Co-Prosperity Sphere."

 SHX_PATH: "£KR_game_rule_flag_SHX  Battle Atop the Taihang Mountains"
 SHX_PATH_PATAUT_REQUIREMENTS: "If any §CManchu Coup§! in §Y$QIE_PATH$§!, then Qing must §Rnot§! choose §CYan Xishan Accepts§! in\n§Y$QIE_COUP_FRIEND$§!"
 RULE_OPTION_SHX_PATH_RANDOM: "Standard"
 RULE_OPTION_SHX_PATH_RANDOM_DESC: "Yan Xishan's rule is contested by Feng Yuxiang, as their diarchy collapses under the weight of renewed tensions. With their cooperation coming to an end, either Yan consolidates enough power to swiftly purge the Guominjun, or the Guominjun exploit Yan's weaknesses to topple his rule in a (mostly) bloodless coup."
 RULE_OPTION_SHX_PATH_PATAUT: "£KR_game_rule_flag_SHX  Triumph of Yan's Government"
 RULE_OPTION_SHX_PATH_PATAUT_DESC: "Yan Xishan levies the power of the provincial government, regional gentry, and Jin military clique to purge the insubordinate Guominjun and keep his seat as governor of Shanxi, and the §PYan Clique§! in power.\n\n§RBenötigt:§!\n$SHX_PATH_PATAUT_REQUIREMENTS$"
 RULE_OPTION_SHX_PATH_AUTDEM: "£KR_game_rule_flag_SHX_autdem  Feng Yuxiang's GMJ Revolution"
 RULE_OPTION_SHX_PATH_AUTDEM_DESC: "Feng Yuxiang assembles a revolutionary coalition of nationalists, socialist radicals, disaffected intellectuals, and others around his populist §aGuominjun§!, or National Army, to oust governor Yan from Taiyuan. This leads towards inevitable conflict with the central government.\n\n§RBenötigt:§!\nIf any §CZhili Republic§! in §Y$QIE_PATH$§!, then Qing must §Rnot§! choose §CYan Xishan Accepts§! in §Y$QIE_COUP_FRIEND$§!"

 SHX_FORPOL: "£KR_game_rule_flag_SHX  Shanxi Clique Alignment"
 SHX_FORPOL_YAN_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CTriumph of Yan's Government§! in §Y$SHX_PATH$§!\n\n"
 RULE_OPTION_SHX_FORPOL_RANDOM: "Standard"
 RULE_OPTION_SHX_FORPOL_RANDOM_DESC: "Isolated from the rest of China and poor in resources, Shanxi has traditionally remained aloof from national affairs. The collapse of the League has brought renewed instability, and to protect itself Shanxi seeks allies to survive. If there is an opening, Shanxi attempts to become a national unifier on its own right, otherwise it joins a sympathetic faction."
 RULE_OPTION_SHX_FORPOL_SHX: "£KR_game_rule_flag_SHX  £KR_game_rule_flag_SHX_autdem  Independent"
 RULE_OPTION_SHX_FORPOL_SHX_DESC: "Shanxi eschews aligning with other powers, and tries to unify China itself."
 RULE_OPTION_SHX_FORPOL_QIE: "£KR_game_rule_flag_SHX  £KR_game_rule_flag_QIE  Recognise Beijing"
 RULE_OPTION_SHX_FORPOL_QIE_DESC: "Shanxi attempts to come to an agreement with the central government.$SHX_FORPOL_YAN_REQUIREMENTS$If any §CManchu Coup§! or §CZhili Republic§! in §Y$QIE_PATH$§!, then Qing must §Rnot§! choose §CYan Xishan Accepts§! in §Y$QIE_COUP_FRIEND$§!"
 RULE_OPTION_SHX_FORPOL_AGJ: "£KR_game_rule_flag_SHX  £KR_game_rule_flag_FNG  Align with Fengtian"
 RULE_OPTION_SHX_FORPOL_AGJ_DESC: "Following the demise of the Qing, Shanxi attempts to ally itself with the Fengtian Government.$SHX_FORPOL_YAN_REQUIREMENTS$$SHX_PATH_PATAUT_REQUIREMENTS$\n\n§CQing has been defeated§!\n§CShanxi borders Fengtian or their subjects§!"
 RULE_OPTION_SHX_FORPOL_NZH: "£KR_game_rule_flag_SHX  £KR_game_rule_flag_QIE_rep  Align with the Zhili Remnants"
 RULE_OPTION_SHX_FORPOL_NZH_DESC: "Following the demise of the Qing, Shanxi attempts to ally itself with the Zhili Remnants.$SHX_FORPOL_YAN_REQUIREMENTS$Any §CManchu Coup§! in §Y$QIE_PATH$§!\n§CArmament Department§! or any §CZhili Remnants§! in\n§Y$SZC_PATH$§!\n\n§CShanxi borders the Zhili Remnants or their subjects§!\n\n§RNot§! §CYan Xishan Accepts§! in §Y$QIE_COUP_FRIEND$§!"
 RULE_OPTION_SHX_FORPOL_UPC: "£KR_game_rule_flag_SHX  £KR_game_rule_flag_SHX_autdem  £KR_game_rule_flag_UPC_GRA  Align with the Federalists"
 RULE_OPTION_SHX_FORPOL_UPC_DESC: "Following the demise of the Qing, if lead by Feng Yuxiang, Shanxi attempts to ally itself with the Federalists. Or if lead by either Yan Xishan or Feng Yuxiang, Shanxi submits to the Federalists if their submission is demanded.\n\n§RBenötigt:§!\n§CFederalists§! in §Y$GXC_PATH$§! and §CIndependent§! in §Y$GXC_FORPOL$§! or\n\n§CThe Federalist Outpost§! in §Y$YUN_PATH$§! and §CIndependent§! in §Y$YUN_FORPOL$§! or\n\n§CRally the Federalists§! in §Y$SZC_PATH$§!\n\n§CShanxi borders the Federalists or their subjects§!"
 RULE_OPTION_SHX_FORPOL_LKT: "£KR_game_rule_flag_SHX_KMT  £KR_game_rule_flag_CHI  Align with the Left KMT"
 RULE_OPTION_SHX_FORPOL_LKT_DESC: "Following the demise of the Qing, if lead by Feng Yuxiang, Shanxi attempts to ally itself with the Left Kuomintang. Or if lead by either Yan Xishan or Feng Yuxiang, Shanxi submits to the Left Kuomintang if their submission is demanded.\n\n§RBenötigt:§!\n§CThe Left Kuomintang win the League Collapse War§!\n\n§CShanxi borders the Left Kuomintang or their subjects§!"
 RULE_OPTION_SHX_FORPOL_RKT: "£KR_game_rule_flag_SHX_KMT  £KR_game_rule_flag_RKT  Align with the Right KMT"
 RULE_OPTION_SHX_FORPOL_RKT_DESC: "Following the demise of the Qing, Shanxi attempts to ally itself with the Right Kuomintang, or Shanxi submits to the Right Kuomintang if their submission is demanded.\n\n§RBenötigt:§!\n§CKuomintang§! in §Y$GXC_PATH$§! and §CIndependent§! in §Y$GXC_FORPOL$§! or\n\n§CA Nationalist Junta§! in §Y$YUN_PATH$§! and §CIndependent§! in §Y$YUN_FORPOL$§!\n\n§CShanxi borders the Right Kuomintang or their subjects§!"
 RULE_OPTION_SHX_FORPOL_NPA: "£KR_game_rule_flag_SHX  £KR_game_rule_flag_SHX_autdem  £KR_game_rule_flag_GXC_OGXC  £KR_game_rule_flag_SZC  Align with the NPA"
 RULE_OPTION_SHX_FORPOL_NPA_DESC: "Following the demise of the Qing, Shanxi joins the National Protection Alliance, should it form. Or if lead by Yan Xishan, Shanxi submits to the National Protection Alliance if their submission is demanded.\n\n§RBenötigt:§!\n§CRegionalists§! in §Y$GXC_PATH$§! and §CIndependent§! in §Y$GXC_FORPOL$§! or\n\n§CCreate the NPA§! §Y$SZC_FORPOL$§!\n\n§CTriumph of Yan's Government§! in §Y$SHX_PATH$§!\nor §CQing has been defeated§!"

 XSM_PATH: "£KR_game_rule_flag_XSM  Master of the Hui Clans"
 XSM_PATH_PATAUT_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CThe Ma Clique wins the Northwest War§!"
 RULE_OPTION_XSM_PATH_RANDOM: "Standard"
 RULE_OPTION_XSM_PATH_RANDOM_DESC: "After the death of Ma Fuxiang, the cousins Ma Lin and Ma Bufang fight for control of the Xining Council. If the Ma Clique succeeds against Mongolia and Tibet, the Governors of Ningxia and Gansu fight over control of the council."
 RULE_OPTION_XSM_PATH_SOCCON: "£KR_game_rule_flag_XSM  The True Successor"
 RULE_OPTION_XSM_PATH_SOCCON_DESC: "Ma Lin, of the §cXining Civilian Administration§!, the original successor to Ma Fuxiang as Governor of Qinghai, retains control of the Xining Council."
 RULE_OPTION_XSM_PATH_NATPOP: "£KR_game_rule_flag_XSM  The Fundamentalist and Radical"
 RULE_OPTION_XSM_PATH_NATPOP_DESC: "Ma Bufang, of the §nXining Military Administration§!, the upstart of the Ma family, gains control of the Xining Council."
 RULE_OPTION_XSM_PATH_PATAUT: "£KR_game_rule_flag_XSM  The Military Genius of the Ma Family"
 RULE_OPTION_XSM_PATH_PATAUT_DESC: "The Governor of Gansu, Ma Hongkui, of the §PTianshui Military Administration§!, leads the Xining Council after Tibet and Mongolia are defeated.$XSM_PATH_PATAUT_REQUIREMENTS$"
 RULE_OPTION_XSM_PATH_AUTDEM: "£KR_game_rule_flag_XSM  The Steady Hand at the Wheel"
 RULE_OPTION_XSM_PATH_AUTDEM_DESC: "The Governor of Ningxia, Ma Hongbin, of the §aNingxia Civil Defence Administration§!, leads the Xining Council after Tibet and Mongolia are defeated.$XSM_PATH_PATAUT_REQUIREMENTS$"

 SIK_PATH: "£KR_game_rule_flag_SIK  Chinese Hegemony Stands in Xinjiang"
 SIK_PATH_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CXinjiang wins the Xinjiang Unification War§!"
 RULE_OPTION_SIK_PATH_RANDOM: "Standard"
 RULE_OPTION_SIK_PATH_RANDOM_DESC: "Xinjiang is split, and all it leads back to Jin Shuren and his policies that lead to this awful situation. If he wishes to redeem himself, he needs to be quick in ending this conflict before it gets further out of control."
 RULE_OPTION_SIK_PATH_PATAUT: "£KR_game_rule_flag_SIK  Jin Shuren"
 RULE_OPTION_SIK_PATH_PATAUT_DESC: "Jin Shuren, holder of the §PDihua Governorship§!, manages to keep discontent at bay, and secures his rule.$SIK_PATH_REQUIREMENTS$"
 RULE_OPTION_SIK_PATH_SOCDEM: "£KR_game_rule_flag_SIK  Sheng Shicai"
 RULE_OPTION_SIK_PATH_SOCDEM_DESC: "Sheng Shicai, the §SDao-yin of Aksu§!, eliminates Jin Shuren to become the new ruler of Xinjiang after discontent has reached its maximum. Later on, he is successful in purging his political enemies.$SIK_PATH_REQUIREMENTS$"
 RULE_OPTION_SIK_PATH_AUTDEM: "£KR_game_rule_flag_SIK  Ma Shaowu"
 RULE_OPTION_SIK_PATH_AUTDEM_DESC: "Ma Shaowu, the §aDao-yin of Aksu§! takes control of Xinjiang after Sheng Shicai fails to purge his political enemies.$SIK_PATH_REQUIREMENTS$"

 KUM_PATH: "£KR_game_rule_flag_KUM  Victors and Spoils in Kumul"
 KUM_PATH_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CKumul wins the Xinjiang Unification War§!"
 RULE_OPTION_KUM_PATH_RANDOM: "Standard"
 RULE_OPTION_KUM_PATH_RANDOM_DESC: "There are many groups hungry for power in the Khanate, and managing them is key to ensuring the continued rule of the Khanate."
 RULE_OPTION_KUM_PATH_NASIR_DESC: "Nasīr Shah manages to escape from prison. Later on, he restores order to Xinjiang, securing the Khanate's rule under"
 RULE_OPTION_KUM_PATH_NASIR_PATAUT: "£KR_game_rule_flag_KUM  Nasīr (Autocratic)"
 RULE_OPTION_KUM_PATH_NASIR_PATAUT_DESC: "$RULE_OPTION_KUM_PATH_NASIR_DESC$ an autocratic government led by the §PNasīr Clique§!.$KUM_PATH_REQUIREMENTS$"
 RULE_OPTION_KUM_PATH_NASIR_SOCCON: "£KR_game_rule_flag_KUM  Nasīr (Constitutional)"
 RULE_OPTION_KUM_PATH_NASIR_SOCCON_DESC: "$RULE_OPTION_KUM_PATH_NASIR_DESC$ a constitutional government led by the §cBegs§!.$KUM_PATH_REQUIREMENTS$"
 RULE_OPTION_KUM_PATH_BASHIR_DESC: "Nasīr Shah is executed, and is succeeded by Bashir Shah. Later on, he manages to restore order to Xinjiang, securing the Khanate's rule under"
 RULE_OPTION_KUM_PATH_BASHIR_PATAUT: "£KR_game_rule_flag_KUM  Bashir (Autocratic)"
 RULE_OPTION_KUM_PATH_BASHIR_PATAUT_DESC: "$RULE_OPTION_KUM_PATH_BASHIR_DESC$ an autocratic government led by the §PBashir Clique§!.$KUM_PATH_REQUIREMENTS$"
 RULE_OPTION_KUM_PATH_BASHIR_SOCCON: "£KR_game_rule_flag_KUM  Bashir (Constitutional)"
 RULE_OPTION_KUM_PATH_BASHIR_SOCCON_DESC: "$RULE_OPTION_KUM_PATH_BASHIR_DESC$ a constitutional government led by the §cBegs§!.$KUM_PATH_REQUIREMENTS$"
 RULE_OPTION_KUM_PATH_NIYAZ_PATAUT: "£KR_game_rule_flag_KUM_hoja_niyaz  Hoja-Niyaz"
 RULE_OPTION_KUM_PATH_NIYAZ_PATAUT_DESC: "Hoja-Niyaz's increased influence in the Khanate allows him to seize power, and rule with his autocratic §PHoja-Niyaz Clique§!.$KUM_PATH_REQUIREMENTS$"
 RULE_OPTION_KUM_PATH_SOCDEM: "£KR_game_rule_flag_KUM_fan_yaonan  Fan Yaonan"
 RULE_OPTION_KUM_PATH_SOCDEM_DESC: "Fan Yaonan's increased influence in the Khanate allows him to seize power, and rule with his democratic §SFan Clique§!.$KUM_PATH_REQUIREMENTS$"
 RULE_OPTION_KUM_PATH_NATPOP: "£KR_game_rule_flag_KUM_zhongying  Ma Zhongying"
 RULE_OPTION_KUM_PATH_NATPOP_DESC: "Ma Zhongying's increased influence in the Khanate allows him to seize power, and rule with his radical §nZhongying Clique§!.$KUM_PATH_REQUIREMENTS$"

 ETS_PATH: "£KR_game_rule_flag_ETS  Freedom and Peril in East Turkestan"
 ETS_PATH_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CEast Turkestan wins the Xinjiang Unification War§!"
 RULE_OPTION_ETS_PATH_RANDOM: "Standard"
 RULE_OPTION_ETS_PATH_RANDOM_DESC: "With independence achieved, internal factions struggle for power. One day, these divisions come to a dramatic head in East Turkestan."
 RULE_OPTION_ETS_PATH_TIMUR_DESC: "Timur Beg survives the attempt on his life and drives his enemies from power."
 RULE_OPTION_ETS_PATH_ELECTION_AUTDEM: "£KR_game_rule_flag_ETS  Timur Beg (Republic)"
 RULE_OPTION_ETS_PATH_ELECTION_AUTDEM_DESC: "$RULE_OPTION_ETS_PATH_TIMUR_DESC$ He calls for open \"elections\" to legitimise his authoritarian §aYoung Kashgar Party§! regime.$ETS_PATH_REQUIREMENTS$"
 RULE_OPTION_ETS_PATH_SHAH_AUTDEM: "£KR_game_rule_flag_ETS  Timur Beg (Monarchy)"
 RULE_OPTION_ETS_PATH_SHAH_AUTDEM_DESC: "$RULE_OPTION_ETS_PATH_TIMUR_DESC$ He later crowns himself Shah, and his §aYoung Kashgar Party§! government remains in power.$ETS_PATH_REQUIREMENTS$"
 RULE_OPTION_ETS_PATH_ISLAM_NATPOP: "£KR_game_rule_flag_ETS  Hotan Amirs - Islam"
 RULE_OPTION_ETS_PATH_ISLAM_NATPOP_DESC: "Timur is slain, and with the victory of Muhammad Amin Bughra and the §nHotan Amirs§!, they focus inwards, in the goal of achieving \"Islam in One Country\".$ETS_PATH_REQUIREMENTS$"
 RULE_OPTION_ETS_PATH_TURKISM_NATPOP: "£KR_game_rule_flag_ETS  Hotan Amirs - Pan-Turkism"
 RULE_OPTION_ETS_PATH_TURKISM_NATPOP_DESC: "Timur is slain, and with the victory of Muhammad Amin Bughra and the §nHotan Amirs§!, they focus outwards, in the goal of achieving Pan-Turkism.$ETS_PATH_REQUIREMENTS$"
 RULE_OPTION_ETS_PATH_SABRI_DESC: "Timur is captured during the victory parade, allowing Masud Sabri to establish a new republic."
 RULE_OPTION_ETS_PATH_DEM_DESC: "$RULE_OPTION_ETS_PATH_SABRI_DESC$\nSabri steps down, and the"
 RULE_OPTION_ETS_PATH_SOCCON: "£KR_game_rule_flag_ETS  Kashgar Nationalist Party"
 RULE_OPTION_ETS_PATH_SOCCON_DESC: "$RULE_OPTION_ETS_PATH_DEM_DESC$ §cKashgar Nationalist Party§! is elected.$ETS_PATH_REQUIREMENTS$"
 RULE_OPTION_ETS_PATH_AUTDEM: "£KR_game_rule_flag_ETS  Young Kashgar Party"
 RULE_OPTION_ETS_PATH_AUTDEM_DESC: "$RULE_OPTION_ETS_PATH_DEM_DESC$ §aYoung Kashgar Party§! is elected.$ETS_PATH_REQUIREMENTS$"
 RULE_OPTION_ETS_PATH_SOCDEM: "£KR_game_rule_flag_ETS  Young Turkestan Party"
 RULE_OPTION_ETS_PATH_SOCDEM_DESC: "$RULE_OPTION_ETS_PATH_DEM_DESC$ §SYoung Turkestan Party§! is elected.$ETS_PATH_REQUIREMENTS$"
 RULE_OPTION_ETS_PATH_SABRI_AUTDEM: "£KR_game_rule_flag_ETS  Masud Sabri"
 RULE_OPTION_ETS_PATH_SABRI_AUTDEM_DESC: "$RULE_OPTION_ETS_PATH_SABRI_DESC$\nSabri refuses to step down, and establishes an dictatorship through the §aYoung Kashgar Party§! instead.$ETS_PATH_REQUIREMENTS$"

 MON_PATH: "£KR_game_rule_flag_MON  The Mad Baron and the Mongols"
 RULE_OPTION_MON_PATH_RANDOM: "Standard"
 RULE_OPTION_MON_PATH_RANDOM_DESC: "Mongolia, for now, remains in the hands of the Baron Ungern-Sternberg, though this position is threatend by fast-moving political currents. Ungern must act now if he is to remain in his position."
 RULE_OPTION_MON_PATH_PATAUT: "£KR_game_rule_flag_MON_pataut  Russian Military Clique"
 RULE_OPTION_MON_PATH_PATAUT_DESC: "Roman von Ungern-Sternberg, leader of the §PRossiyskaya Voyennaya Klika§!, or Russian Military Clique, retains control of Mongolia."
 RULE_OPTION_MON_PATH_SOCDEM: "£KR_game_rule_flag_MON  People's Party"
 RULE_OPTION_MON_PATH_SOCDEM_DESC: "The §SMongol Ardīn Nam - Dundaj üzel§!, or moderates of the Mongolian People's Party, gain power in Mongolia."
 RULE_OPTION_MON_PATH_SOCLIB: "£KR_game_rule_flag_MON  Liberals"
 RULE_OPTION_MON_PATH_SOCLIB_DESC: "The §lMongolyn Libyeral Nam§!, or Mongolian Liberal Party, gains power in Mongolia"
 RULE_OPTION_MON_PATH_SOCCON: "£KR_game_rule_flag_MON  Autonomous Federation"
 RULE_OPTION_MON_PATH_SOCCON_DESC: "The §cMongolyn Avtonomit Kholboo§!, or Mongolian Autonomous Federation, gains power in Mongolia"
 RULE_OPTION_MON_PATH_AUTDEM: "£KR_game_rule_flag_MON  Noble Council"
 RULE_OPTION_MON_PATH_AUTDEM_DESC: "A coalition of Mongolian nobles, known as the §aNoyodyn Zövlöl§!, or Noble Council, retake power in Mongolia following the fall of Ungern-Sternberg."
 RULE_OPTION_MON_PATH_NATPOP: "£KR_game_rule_flag_MON_natpop  Buddhist Council"
 RULE_OPTION_MON_PATH_NATPOP_DESC: "The §nBuddyn Zövlöl§!, or Buddhist Council, seize control of Mongolia following the fall of Ungern-Sternberg."

 TIB_PATH: "£KR_game_rule_flag_TIB  Instability in the Tibetan Plateau"
 RULE_OPTION_TIB_PATH_RANDOM: "Standard"
 RULE_OPTION_TIB_PATH_RANDOM_DESC: "Incensed by high taxation and stirred by various groups seeking power over Tibet, the regency of the Reting Rinpoche is all but assured. If he is overthrown, who knows what that may spell for the future of the plateau?"
 RULE_OPTION_TIB_PATH_PATAUT: "£KR_game_rule_flag_TIB  Traditionalists"
 RULE_OPTION_TIB_PATH_PATAUT_DESC: "Tibet's §PTraditionalists§! consolidate their grip on power."
 RULE_OPTION_TIB_PATH_AUTDEM: "£KR_game_rule_flag_TIB  Young Tibet Party"
 RULE_OPTION_TIB_PATH_AUTDEM_DESC: "The §aYoung Tibet Party§! take power and pursue a more moderate course."
 RULE_OPTION_TIB_PATH_SOCDEM: "£KR_game_rule_flag_TIB  Tibet Improvement Party"
 RULE_OPTION_TIB_PATH_SOCDEM_DESC: "The Panchen Lama returns, and the §STibet Improvement Party§! take power, remaining in power after the elections."
 RULE_OPTION_TIB_PATH_SOCLIB: "£KR_game_rule_flag_TIB  Kyicho Kuntun"
 RULE_OPTION_TIB_PATH_SOCLIB_DESC: "The Panchen Lama returns, and The Tibet Improvement Party take power. The §lKyicho Kuntun§!, or Union of Happiness, comes to power after the elections."
 RULE_OPTION_TIB_PATH_TOTALIST: "£KR_game_rule_flag_TIB_soc  Sacred Union Party"
 RULE_OPTION_TIB_PATH_TOTALIST_DESC: "The Panchen Lama returns, and The Tibet Improvement Party take power. The §oSacred Union Party§! comes to power after the elections."

 ### Country Paths - South Asia & Oceania ###
 RULE_GROUP_KAISERREICH_RULES_SOUTH_ASIA_OCEANIA: "Country Paths - South Asia & Oceania"

 AFG_WAR: "£KR_game_rule_flag_AFG_pataut  £KR_game_rule_flag_RAJ  The Fifth Anglo-Afghan War"
 AFG_WAR_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CAfghanistan loses the Fifth Anglo-Afghan War§!"
 RULE_OPTION_AFG_WAR_RANDOM: "Standard"
 RULE_OPTION_AFG_WAR_RANDOM_DESC: "Dissent has sprung up in the remnants of the Raj, providing an excellent opportunity for the Afghans to reclaim their lands."
 RULE_OPTION_AFG_START_DESC: "Afghanistan goes to war to reclaim their lands. If they lose, the Dominion of India chooses to only take their own claimed lands in the peace deal. After the war,"
 RULE_OPTION_AFG_WAR_AMANULLAH_PATAUT: "£KR_game_rule_flag_AFG_pataut  £KR_game_rule_flag_RAJ  Amanullah Khan"
 RULE_OPTION_AFG_WAR_AMANULLAH_PATAUT_DESC: "$RULE_OPTION_AFG_START_DESC$ Amanullah Khan manages to suppress the rebellion, retains control of the §PBārakzai§! dynasty, and order is restored.$AFG_WAR_REQUIREMENTS$"
 RULE_OPTION_AFG_WAR_NADIR_PATAUT: "£KR_game_rule_flag_AFG_nadir  £KR_game_rule_flag_RAJ  Mohammad Nadir Khan"
 RULE_OPTION_AFG_WAR_NADIR_PATAUT_DESC: "$RULE_OPTION_AFG_START_DESC$ Mohammad Nadir Khan deposes Amanullah and becomes the new leader of the §PBārakzai§! dynasty, and the new king of Afghanistan.$AFG_WAR_REQUIREMENTS$"
 RULE_OPTION_AFG_WAR_NO: "£KR_game_rule_flag_AFG_pataut  Afghanistan Avoids War"
 RULE_OPTION_AFG_WAR_NO_DESC: "What does India have but cows?"

 RAJ_PATH: "£KR_game_rule_flag_RAJ  The Election Promise"
 RAJ_PATH_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CThe Dominion of India unifies India§!"
 RULE_OPTION_RAJ_PATH_RANDOM: "Standard"
 RULE_OPTION_RAJ_PATH_RANDOM_DESC: "With the Dominion having resecured control over the whole of India and the nation now again at peace, the postponed general election is at last able to be held. It is up in the air whether the Unionists, Liberals, or Home Rule Party triumph at the polls."
 RULE_OPTION_RAJ_PATH_SOCCON: "£KR_game_rule_flag_RAJ  Unionists"
 RULE_OPTION_RAJ_PATH_SOCCON_DESC: "The §cUnionist Party§! led by Khizar Hayat Tiwana wins the election.$RAJ_PATH_REQUIREMENTS$"
 RULE_OPTION_RAJ_PATH_JAYAKAR_MARLIB: "£KR_game_rule_flag_RAJ  Liberals - Jayakar"
 RULE_OPTION_RAJ_PATH_JAYAKAR_MARLIB_DESC: "The §mNational Liberal Federation of India§! led by Mukund Ramrao Jayakar wins the election.$RAJ_PATH_REQUIREMENTS$"
 RULE_OPTION_RAJ_PATH_SAPRU_MARLIB: "£KR_game_rule_flag_RAJ  Liberals - Sapru"
 RULE_OPTION_RAJ_PATH_SAPRU_MARLIB_DESC: "The §mNational Liberal Federation of India§! led by Tej Bahadur Sapru wins the election.$RAJ_PATH_REQUIREMENTS$"
 RULE_OPTION_RAJ_PATH_SOCLIB: "£KR_game_rule_flag_RAJ  Home Rule"
 RULE_OPTION_RAJ_PATH_SOCLIB_DESC: "The §lAll-India Home Rule Party§! led by Muhammad Ali Jinnah wins the election.$RAJ_PATH_REQUIREMENTS$"

 HND_PATH: "£KR_game_rule_flag_HND  The First United Congress"
 HND_PATH_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CThe Bharatiya People's Republic unifies India§!"
 RULE_OPTION_HND_PATH_RANDOM: "Standard"
 RULE_OPTION_HND_PATH_RANDOM_DESC: "The Bharatiya People's Republic has emerged victorious in the renewed Indian Civil War, but now the factionalism that has engulfed its ruling Indian National Congress has at last reached its zenith.\nWith Huq's retirement as Chairman, his chosen successor of Jawaharlal Nehru sees his bid challenged by Subhas Chandra Bose and Sarojini Naidu."
 RULE_OPTION_HND_PATH_SYNDIE: "£KR_game_rule_flag_HND  Moderates"
 RULE_OPTION_HND_PATH_SYNDIE_DESC: "Jawaharlal Nehru sees off his challengers and the moderate wing of the §rIndian National Congress§! remain in control of the party.$HND_PATH_REQUIREMENTS$"
 RULE_OPTION_HND_PATH_RADSOC: "£KR_game_rule_flag_HND  Agrarians"
 RULE_OPTION_HND_PATH_RADSOC_DESC: "Sarojini Naidu successfully contests the election, with her agrarian wing of the §RIndian National Congress§! coming to dominate the party.$HND_PATH_REQUIREMENTS$"
 RULE_OPTION_HND_PATH_TOTALIST: "£KR_game_rule_flag_HND  Maximists"
 RULE_OPTION_HND_PATH_TOTALIST_DESC: "Subhas Chandra Bose successfully contests the election, with his maximist wing of the §oIndian National Congresss§! coming to dominate the party.$HND_PATH_REQUIREMENTS$"

 RAJ_BOMBAY: "£KR_game_rule_flag_RAJ  £KR_game_rule_flag_PRF  Future of the Bombay Pact"
 RAJ_BOMBAY_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CThe Bharatiya People's Republic is defeated by the Bombay Pact§!\n\n§CReign of the Princes§! or §CThe National Government§! or §CThe All-India Mahasabha§! in §Y$PRF_PATH$§!"
 RULE_OPTION_RAJ_BOMBAY_RANDOM: "Standard"
 RULE_OPTION_RAJ_BOMBAY_RANDOM_DESC: "Despite fighting alongside each other against the Bharatiya People's Republic, the Dominion of India and the Princely Federation still remain at odds with each other. While negotiators are sent to Hyderabad to discuss peaceful reunification, it is hard to say whether such a proposal will be agreed by both sides."
 RULE_OPTION_RAJ_BOMBAY_SUCCESS: "£KR_game_rule_flag_RAJ  £KR_game_rule_flag_PRF  Negotiations Succeed"
 RULE_OPTION_RAJ_BOMBAY_SUCCESS_DESC: "The Federation agrees to accede to the Dominion in exchange for concessions, leading to Indian reunification.$RAJ_BOMBAY_REQUIREMENTS$"
 RULE_OPTION_RAJ_BOMBAY_FAILURE: "£KR_game_rule_flag_RAJ  £KR_game_rule_flag_PRF  Negotiations Fail"
 RULE_OPTION_RAJ_BOMBAY_FAILURE_DESC: "Negotiations between the two Bombay Pact signatories break down, leading to a second stage of conflict.$RAJ_BOMBAY_REQUIREMENTS$"

 HND_FORPOL: "£KR_game_rule_flag_HND  Bharatiya Foreign Policy"
 RULE_OPTION_HND_FORPOL_RANDOM: "Standard"
 RULE_OPTION_HND_FORPOL_RANDOM_DESC: "Now that it has finally rid of itself of reactionaries and imperialists, India must decide upon her place in the world."
 RULE_OPTION_HND_FORPOL_INT: "£KR_game_rule_flag_HND  £KR_game_rule_flag_FRA  Internationale"
 RULE_OPTION_HND_FORPOL_INT_DESC: "Continuing its fight against its imperialist enemies, the Bharatiya People's Republic chooses to align itself with the western socialists, either becoming part of the Third Internationale, or attempting to recreate it if it has already fallen.$HND_PATH_REQUIREMENTS$"
 RULE_OPTION_HND_FORPOL_HND: "£KR_game_rule_flag_HND  Eastern Syndicalist Union"
 RULE_OPTION_HND_FORPOL_HND_DESC: "$RULE_OPTION_HND_FORPOL_HND_START_DESC$$HND_PATH_REQUIREMENTS$"
 RULE_OPTION_HND_FORPOL_HND_START_DESC: "After unifying the subcontinent, the Bharatiya People's Republic opts to focus on leading its own bloc of socialist states in Asia."
 RULE_OPTION_HND_FORPOL_CHN: "£KR_game_rule_flag_HND  £KR_game_rule_flag_LKT  Asian Solidarity League"
 RULE_OPTION_HND_FORPOL_CHN_DESC: "$RULE_OPTION_HND_FORPOL_HND_START_DESC$ With the success of the Left Kuomintang in uniting China, an agreement is subsequently reached to unify their factions together as partners.$HND_PATH_REQUIREMENTS$\n\n§CThe Left Kuomintang unifies China§!"

 PRF_PATH: "£KR_game_rule_flag_PRF  The Nizam's Gambit"
 RULE_OPTION_PRF_PATH_RANDOM: "Standard"
 RULE_OPTION_PRF_PATH_RANDOM_DESC: "The conflict between the Nizam and the four other members of the Council of Princes is continuing to escalate further and further every month, with one side sure to act against the other. Whether the Nizam or the Princes win against the other, or whether a compromise is reached, is impossible to stay."
 RULE_OPTION_PRF_PATH_PATAUT_DESC: "Utilising the Razakars to execute a self-coup, Osman Ali Khan takes full control of the Federation, dissolves the Council of Princes and leads the §PExecutive Council§! himself.\nAfter defeating both the Republic and the Dominion, he"
 RULE_OPTION_PRF_PATH_KAISAR_PATAUT: "£KR_game_rule_flag_PRF_mon  Kaisar-i-Hind"
 RULE_OPTION_PRF_PATH_KAISAR_PATAUT_DESC: "$RULE_OPTION_PRF_PATH_PATAUT_DESC$ assumes the title of Kaisar-i-Hind, and is crowned as the nation's emperor."
 RULE_OPTION_PRF_PATH_FATHER_PATAUT: "£KR_game_rule_flag_PRF  Father of the Federation"
 RULE_OPTION_PRF_PATH_FATHER_PATAUT_DESC: "$RULE_OPTION_PRF_PATH_PATAUT_DESC$ maintains his position as sole leader of the nation, depicting himself as its first among equals."
 RULE_OPTION_PRF_PATH_NATPOP: "£KR_game_rule_flag_PRF  Triumph of the Razakars"
 RULE_OPTION_PRF_PATH_NATPOP_DESC: "Utilising the Razakars to execute a self-coup, Osman Ali Khan takes full control of the Federation, dissolves the Council of Princes and leads the Executive Council himself.\nAfter defeating both the Republic and the Dominion, his continued reliance upon the §nMajlis-e-Ittehadul Muslimeen§!, or Council for Muslim Unity, also known as the Razakars, leads to them carrying out a coup of their own, with their leader Qasim Razvi installing himself as Diwan at gunpoint."
 RULE_OPTION_PRF_PATH_PRINCES_AUTDEM: "£KR_game_rule_flag_PRF  Reign of the Princes"
 RULE_OPTION_PRF_PATH_PRINCES_AUTDEM_DESC: "Hearing of Osman's plan to launch a self-coup against them using the Razakars, the other Princes of the Council send their armies to arrest leading Razakars and confront Osman himself.\nIn the aftermath, Osman is forced to surrender his powers to the Princes, remaining entirely as a ceremonial figurehead, with the §aCouncil of Princes§! now fully in control."
 RULE_OPTION_PRF_PATH_DEM_DESC: "Unable to break the conflict between himself and the Council, Osman instead agrees to implement Chetput Iyer's proposal of national elections with a national Diwan appointed by Osman."
 RULE_OPTION_PRF_PATH_IYER_AUTDEM: "£KR_game_rule_flag_PRF_dem  The National Government"
 RULE_OPTION_PRF_PATH_IYER_AUTDEM_DESC: "$RULE_OPTION_PRF_PATH_DEM_DESC$\nWhile the Andhra Mahasabha emerge the largest party, Osman chooses to appoint Iyer as the Diwan of a §aNational Government§!, hoping to keep radicalism in check."
 RULE_OPTION_PRF_PATH_MARLIB: "£KR_game_rule_flag_PRF_dem  The All-India Mahasabha"
 RULE_OPTION_PRF_PATH_MARLIB_DESC: "$RULE_OPTION_PRF_PATH_DEM_DESC$\nIn the subsequent elections, Madapati Hanumantha Rao is appointed Diwan and his §mAndhra Mahasabha§!, or Andhra Grand Assembly, emerge the largest party, soon renaming the party the §mAll-India Mahasabha§!, or All-India Grand Assembly."

 PRF_FORPOL: "£KR_game_rule_flag_PRF  Princely Foreign Policy"
 PRF_FORPOL_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CThe Princely Federation unifies India§!"
 RULE_OPTION_PRF_FORPOL_RANDOM: "Standard"
 RULE_OPTION_PRF_FORPOL_RANDOM_DESC: "Now that India is united by its own native ruling elite, it must decide on how best to put forward India's interests in the world around them."
 RULE_OPTION_PRF_FORPOL_GER: "£KR_game_rule_flag_PRF  £KR_game_rule_flag_GER  Reichspakt"
 RULE_OPTION_PRF_FORPOL_GER_DESC: "With the Germans at their side, the Princely Federation removes all traces of syndicalism from Asia.$PRF_FORPOL_REQUIREMENTS$"
 RULE_OPTION_PRF_FORPOL_RUS: "£KR_game_rule_flag_PRF  £KR_game_rule_flag_RUS  Moscow Accord"
 RULE_OPTION_PRF_FORPOL_RUS_DESC: "The Federation sees Russia's future as clearly destined for greatness, and joins with them, rather than have them as enemies.$PRF_FORPOL_REQUIREMENTS$\n$RUS_AFTERMATH_NOT_SOC_REQUIREMENTS$"
 RULE_OPTION_PRF_FORPOL_JAP: "£KR_game_rule_flag_PRF  £KR_game_rule_flag_JAP  Co-Prosperity Sphere"
 RULE_OPTION_PRF_FORPOL_JAP_DESC: "The Federation sees the Japanese maintain that Asia must be free from western imperialism, and ensure this alongside them.$PRF_FORPOL_REQUIREMENTS$"
 RULE_OPTION_PRF_FORPOL_OTT: "£KR_game_rule_flag_PRF  £KR_game_rule_flag_TUR  Istanbul Pact"
 RULE_OPTION_PRF_FORPOL_OTT_DESC: "Seeing opportunity with the creation of a new alliance led by the Ottomans, the Federation requests a partnership with the Turks and joins the Istanbul Pact.$PRF_FORPOL_REQUIREMENTS$\n\n§CIstanbul Pact§! in §Y$OTT_FORPOL$§!"
 RULE_OPTION_PRF_FORPOL_PRF: "£KR_game_rule_flag_PRF  South Asia Association"
 RULE_OPTION_PRF_FORPOL_PRF_DESC: "Rejecting involvement in global conflict, the Federation instead chooses to form a more local power bloc of its own, to consolidate its sphere of influence.$PRF_FORPOL_REQUIREMENTS$"

 NEP_PATH: "£KR_game_rule_flag_NEP  The Darjeeling Conspiracy"
 RULE_OPTION_NEP_PATH_RANDOM: "Standard"
 RULE_OPTION_NEP_PATH_RANDOM_DESC: "With Indian support, insurrection against the Rana dynasty in control of Nepal begins to mount. Whether or not this revolution succeeds will fundamentally reshape the future of the Nepali nation."
 RULE_OPTION_NEP_PATH_AUTDEM: "£KR_game_rule_flag_NEP  The Royal Restoration"
 RULE_OPTION_NEP_PATH_AUTDEM_DESC: "The failure of either side to achieve victory in the revolution sees a bloody civil war erupt, ending only with the direct intervention of the King at the army's behest. A new §aNational Government§! is subsequently established under the King's authority, comprised of members from across the political spectrum."
 RULE_OPTION_NEP_PATH_REP_DESC: "The victory of the Bharatiya-backed rebels in the revolution sees the ousting of the Rana dynasty in favour of the revolutionaries. In the aftermath,"
 RULE_OPTION_NEP_PATH_SOCLIB: "£KR_game_rule_flag_NEP  Formation of the Interim Government"
 RULE_OPTION_NEP_PATH_SOCLIB_DESC: "$RULE_OPTION_NEP_PATH_REP_DESC$ an interim government is established, led by the democratic §lNepal Praja Parishad§!, or Nepal People's Council."
 RULE_OPTION_NEP_PATH_RADSOC: "£KR_game_rule_flag_NEP_soc  £KR_game_rule_flag_HND  Rule of the Mutki Sena"
 RULE_OPTION_NEP_PATH_RADSOC_DESC: "$RULE_OPTION_NEP_PATH_REP_DESC$ a socialist puppet regime is installed by Calcutta, led by the §RLabour Swatantra Party§!.\n\nFollowing Indian unification, the government may realign itself ideologically to match the ruling wing of the Bharatiya People's Republic, potentially becoming §rSyndicalist§! or §oTotalist§!."
 RULE_OPTION_NEP_PATH_PATAUT: "£KR_game_rule_flag_NEP  £KR_game_rule_flag_RAJ  The Rana Regency"
 RULE_OPTION_NEP_PATH_PATAUT_DESC: "Backed by the Dominion of India, Nepal's Prime Minister defeats the attempted revolution against him and the §PRana Dynasty§! remains in power, aligning fully with the Dominion and becoming their subject. In the aftermath, King Tribhuvan flees and is replaced by his nephew Samrajya as king."

 NEP_FORPOL: "£KR_game_rule_flag_NEP  Nepalese Foreign Policy"
 RULE_OPTION_NEP_FORPOL_RANDOM: "Standard"
 RULE_OPTION_NEP_FORPOL_RANDOM_DESC: "Having avoided being drawn fully into the sphere of the Bharatiya People's Republic or the Dominion of India, Nepal has become free to choose its own position on the global stage."
 RULE_OPTION_NEP_FORPOL_JAP: "£KR_game_rule_flag_NEP  £KR_game_rule_flag_JAP  Co-Prosperity Sphere"
 RULE_OPTION_NEP_FORPOL_JAP_DESC: "Having maintained their neutrality, Nepal chooses to align itself with the quickly growing Japanese sphere.\n\n§RBenötigt:§!\n§CNepal or its puppets share a border with the Co-Prosperity Sphere§!\n\n§CThe Royal Restoration§! in §Y$NEP_PATH$§!"
 RULE_OPTION_NEP_FORPOL_PRF: "£KR_game_rule_flag_NEP  £KR_game_rule_flag_PRF  Princely Federation"
 RULE_OPTION_NEP_FORPOL_PRF_DESC: "With India having been united by the All-India Federation, Nepal chooses to ally them, either joining a faction directly led by the Federation or joining one of which they are a member.$PRF_FORPOL_REQUIREMENTS$\n\n§CThe Royal Restoration§! or §CFormation of the Interim Government§! in §Y$NEP_PATH$§!"
 RULE_OPTION_NEP_FORPOL_RUS: "£KR_game_rule_flag_NEP  £KR_game_rule_flag_RUS  Moscow Accord"
 RULE_OPTION_NEP_FORPOL_RUS_DESC: "The Eurasiansist tendencies of Russia's VPP-led government leads to them inviting Nepal into the Moscow Accord.\n\n§RBenötigt:§!\n§CThe Royal Restoration§! or §CFormation of the Interim Government§! in §Y$NEP_PATH$§!\n\n§CGermany is defeated in the Second Weltkrieg§!\n§CVPP - Vernadsky§! in §Y$RUS_PATH$§!"

 BHU_PATH: "£KR_game_rule_flag_BHU  A Meeting with Zhabdrung"
 RULE_OPTION_BHU_PATH_RANDOM: "Standard"
 RULE_OPTION_BHU_PATH_RANDOM_DESC: "The monks offer to arrange a meeting between the king and the Zhabdrung, nominally to determine the fate of the young upstart. Should Jigme Wangchuck take the risk and go?"
 RULE_OPTION_BHU_PATH_JIGME_PATAUT: "£KR_game_rule_flag_BHU  Jigme Wangchuck"
 RULE_OPTION_BHU_PATH_JIGME_PATAUT_DESC: "Jigme Wangchuck remains king, and empowering the traditionalists of the §PDruk Gyalpo§!, after the sudden death of Zhabdrung, avoiding any further bloodshed."
 RULE_OPTION_BHU_PATH_JIGME_DEAD_DESC: "Jigme Wangchuck succumbs to his wounds after being ambushed while meeting with Zhabdrung."
 RULE_OPTION_BHU_PATH_TSHERING_PATAUT: "£KR_game_rule_flag_BHU  Tshering Penjor"
 RULE_OPTION_BHU_PATH_TSHERING_PATAUT_DESC: "$RULE_OPTION_BHU_PATH_JIGME_DEAD_DESC$ Tshering Penjor is crowned as the new king, empowering the traditionalists of the §PDruk Gyalpo§!."
 RULE_OPTION_BHU_PATH_NATPOP: "£KR_game_rule_flag_BHU  Zhabdrung Rinpoche"
 RULE_OPTION_BHU_PATH_NATPOP_DESC: "$RULE_OPTION_BHU_PATH_JIGME_DEAD_DESC$ Zhabdrung Jigme Dorji, a loyalist of the §nZhung Dratshang§!, is then chosen as the new Zhabdrung Rinpoche of Bhutan."
 RULE_OPTION_BHU_PATH_AUTDEM: "£KR_game_rule_flag_BHU  Jigme Dorji"
 RULE_OPTION_BHU_PATH_AUTDEM_DESC: "$RULE_OPTION_BHU_PATH_JIGME_DEAD_DESC$ Jigme Dorji is crowned as the new king, empowering the reformers of the §aDruk Gyalpo§!."

 BRM_PATH: "£KR_game_rule_flag_BRM  Riots & Protests in Rangoon"
 RULE_OPTION_BRM_PATH_RANDOM: "Standard"
 RULE_OPTION_BRM_PATH_RANDOM_DESC: "Dissatisfaction with the lack of popular involvement in government has sparked some of the greatest demonstrations seen in Burma. What fate awaits Burma?"
 RULE_OPTION_BRM_PATH_STATUS_QUO_DESC: "The old regime remains in power after the army fires upon the protestors, ending the protests for good."
 RULE_OPTION_BRM_PATH_AUTDEM: "£KR_game_rule_flag_BRM  Republic - People's Party"
 RULE_OPTION_BRM_PATH_AUTDEM_DESC: "$RULE_OPTION_BRM_PATH_STATUS_QUO_DESC$\nThe reign of U Ba Pe's §aPeople's Party§! continues."
 RULE_OPTION_BRM_PATH_PATAUT: "£KR_game_rule_flag_BRM  Republic - Nationalist Party"
 RULE_OPTION_BRM_PATH_PATAUT_DESC: "$RULE_OPTION_BRM_PATH_STATUS_QUO_DESC$\nSubsequently, U Ba Pe stages a coup and through the §PNationalist Party§!, establishes absolute rule."
 RULE_OPTION_BRM_PATH_ELECTIONS_DESC: "The old regime topples after U Ba Pe is killed, with a provisional government holding free elections shortly afterwards."
 RULE_OPTION_BRM_PATH_MON_SOCCON: "£KR_game_rule_flag_BRM_mon  Monarchy - People's Party"
 RULE_OPTION_BRM_PATH_MON_SOCCON_DESC: "$RULE_OPTION_BRM_PATH_ELECTIONS_DESC$\nA reformed §cPeople's Party§! win these elections, and reinstate the monarchy."
 RULE_OPTION_BRM_PATH_REP_SOCCON: "£KR_game_rule_flag_BRM  Republic - People's Party (Reformed)"
 RULE_OPTION_BRM_PATH_REP_SOCCON_DESC: "$RULE_OPTION_BRM_PATH_ELECTIONS_DESC$\nA reformed §cPeople's Party§! win these elections."
 RULE_OPTION_BRM_PATH_SOCLIB: "£KR_game_rule_flag_BRM  Republic - United GCBA"
 RULE_OPTION_BRM_PATH_SOCLIB_DESC: "$RULE_OPTION_BRM_PATH_ELECTIONS_DESC$\nThe §lUnited General Council of Burmese Associations§! win these elections."
 RULE_OPTION_BRM_PATH_SOCDEM: "£KR_game_rule_flag_BRM  Republic - Poor Man's Party"
 RULE_OPTION_BRM_PATH_SOCDEM_DESC: "$RULE_OPTION_BRM_PATH_ELECTIONS_DESC$\nThe §SPoor Man's Party§! win these elections."
 RULE_OPTION_BRM_PATH_RADSOC: "£KR_game_rule_flag_BRM_soc  Socialist Republic"
 RULE_OPTION_BRM_PATH_RADSOC_DESC: "The army joins with the protestors after being ordered to fired upon them, overthrowing the old regime for good.\nThis leads to the §RPeople's Revolutionary Party§! coming to power, with a socialist republic being proclaimed."

 BRM_FORPOL: "£KR_game_rule_flag_BRM  Burmese Foreign Policy"
 BRM_FORPOL_SOC_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CSocialist Republic§! in §Y$BRM_PATH$§!"
 BRM_FORPOL_NOT_SOC_REQUIREMENTS: "\n\n§RBenötigt:§!\n§RNot§! §CSocialist Republic§! in §Y$BRM_PATH$§!"
 RULE_OPTION_BRM_FORPOL_RANDOM: "Standard"
 RULE_OPTION_BRM_FORPOL_RANDOM_DESC: "Burma, formerly part of the British Raj, gained its independence after the collapse of much of the British Empire. Following a crisis at Rangoon University, whichever government ends up ruling the country needs to decide where Burma aligns itself."
 RULE_OPTION_BRM_FORPOL_JAP: "£KR_game_rule_flag_BRM  £KR_game_rule_flag_JAP  Co-Prosperity Sphere"
 RULE_OPTION_BRM_FORPOL_JAP_DESC: "With Japan being seen as the rising power in Asia, and the main denouncer of Western imperialism, the Burmese join with them to see off any European influence.$BRM_FORPOL_NOT_SOC_REQUIREMENTS$"
 RULE_OPTION_BRM_FORPOL_GER: "£KR_game_rule_flag_BRM  £KR_game_rule_flag_GER  Reichspakt"
 RULE_OPTION_BRM_FORPOL_GER_DESC: "Burma is drawn into the Reichspakt, as part of the German's expansion of its influence in southeast Asia.$BRM_FORPOL_NOT_SOC_REQUIREMENTS$"
 RULE_OPTION_BRM_FORPOL_RUS: "£KR_game_rule_flag_BRM  £KR_game_rule_flag_RUS  Moscow Accord"
 RULE_OPTION_BRM_FORPOL_RUS_DESC: "The Eurasiansist tendencies of Russia's VPP-led government leads to them inviting Burma into the Moscow Accord.\n\n§RBenötigt:§!\n§CGermany is defeated in the Second Weltkrieg§!\n§CVPP - Vernadsky§! in §Y$RUS_PATH$§!\n\n§RNot§! §CSocialist Republic§! in §Y$BRM_PATH$§!"
 RULE_OPTION_BRM_FORPOL_INT: "£KR_game_rule_flag_BRM_soc  £KR_game_rule_flag_FRA  Internationale"
 RULE_OPTION_BRM_FORPOL_INT_DESC: "Following their revolution, instead of allying with the Chinese or Indians, Burma seeks to join the Third Internationale.$BRM_FORPOL_SOC_REQUIREMENTS$"
 RULE_OPTION_BRM_FORPOL_HND: "£KR_game_rule_flag_BRM_soc  £KR_game_rule_flag_HND  Bharatiya People's Republic"
 RULE_OPTION_BRM_FORPOL_HND_DESC: "Following their revolution, Burma allies with the Bharatiya People's Republic, the bastion of socialism in South Asia.$BRM_FORPOL_SOC_REQUIREMENTS$\n\n§CHinweis: If the Bharatiya People's Republic is not already in a faction, they form the Eastern Syndicalist Union with Burma.§!"
 RULE_OPTION_BRM_FORPOL_CHN: "£KR_game_rule_flag_BRM  £KR_game_rule_flag_QIE  £GFX_KR_game_rule_flag_CHN  £KR_game_rule_flag_UPC_GRA  £KR_game_rule_flag_LKT  China"
 RULE_OPTION_BRM_FORPOL_CHN_DESC: "China's resurgence as a global power leads to Burma requesting an alliance, or China offering them one.\n\n§RBenötigt:§!\n§CQing, Fengtian, Liangguang, Yunnan, the Left Kuomintang, Shanxi or the Sichuan federalists unify China, remain independent and do not join a faction§!\n\n§CBoth Burma and China have either socialist or non-socialist governments§!\n\nIf §Cthe Right Kuomintang unifies China§! then Burma must §Rnot§! choose §CRepublic - People's Party§! or §CMonarchy - People's Party§! in §Y$BRM_PATH$§!"
 RULE_OPTION_BRM_FORPOL_NEUT: "£KR_game_rule_flag_BRM  Isolation"
 RULE_OPTION_BRM_FORPOL_NEUT_DESC: "Isolation has served Burma well in the past, and will do so in the future as well."

 SIA_CONSTITUTION: "£KR_game_rule_flag_SIA  The Collapse of the Old Order"
 RULE_OPTION_SIA_CONSTITUTION_RANDOM: "Standard"
 RULE_OPTION_SIA_CONSTITUTION_RANDOM_DESC: "Being hit hard with Black Monday, the Siamese status quo is shaken to its core."
 RULE_OPTION_SIA_CONSTITUTION_PRAJADHIPOK: "£KR_game_rule_flag_SIA  Prajadhipok's Reform"
 RULE_OPTION_SIA_CONSTITUTION_PRAJADHIPOK_DESC: "King Prajadhipok finally manages to side-line the Supreme Council of State, and gathers enough momentum for the long-overdue constitution, with the §aKhanagummakarn Ratsadon§!, or People's Council, remaining in power until elections are held in a year's time."
 RULE_OPTION_SIA_CONSTITUTION_KHANARATSADON: "£KR_game_rule_flag_SIA  Khana Ratsadon Coup"
 RULE_OPTION_SIA_CONSTITUTION_KHANARATSADON_DESC: "Amidst the quickly deteriorating economic situation, the §aKhana Ratsadon§!, or People's Party, coups the Supreme Council of State. The kingdom's first constitution is reluctantly approved by the king."

 SIA_CIVIL_WAR: "£KR_game_rule_flag_SIA  Siamese Civil War"
 SIA_CIVIL_WAR_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CKhana Ratsadon Coup§! in §Y$SIA_CONSTITUTION$§!"
 RULE_OPTION_SIA_CIVIL_WAR_RANDOM: "Standard"
 RULE_OPTION_SIA_CIVIL_WAR_RANDOM_DESC: "A political crisis is currently ongoing and has nearly reached the boiling point! Tensions are high and a civil war seems very likely."
 RULE_OPTION_SIA_CIVIL_WAR_NO: "£KR_game_rule_flag_SIA  Civil War Averted"
 RULE_OPTION_SIA_CIVIL_WAR_NO_DESC: "Both sides manage to back down, narrowly avoiding an open conflict.$SIA_CIVIL_WAR_REQUIREMENTS$"
 RULE_OPTION_SIA_CIVIL_WAR_START_DESC: "The crisis quickly grows out of control and has engulfs the entire nation in chaos."
 RULE_OPTION_SIA_CIVIL_WAR_BOWORADET_PATAUT: "£KR_game_rule_flag_SIA_rebellion  £KR_game_rule_flag_SIA  Boworadet Rebellion"
 RULE_OPTION_SIA_CIVIL_WAR_BOWORADET_PATAUT_DESC: "$RULE_OPTION_SIA_CIVIL_WAR_START_DESC$\nGovernment Parliamentarian forces led by the §aKhana Ratsadon§!, or People's Party, are thrust into civil war with Royalist rebels, led by the §PKhana Gubarn Gumueang§!, or National Salvation Front, who rise up in the north.$SIA_CIVIL_WAR_REQUIREMENTS$"
 RULE_OPTION_SIA_CIVIL_WAR_RADSOC: "£KR_game_rule_flag_SIA  £KR_game_rule_flag_SIA_rebellion  Thamrongnawasawat Rebellion"
 RULE_OPTION_SIA_CIVIL_WAR_RADSOC_DESC: "$RULE_OPTION_SIA_CIVIL_WAR_START_DESC$\nGovernment Royalist forces led by the §aKhana Ratsadon§!, or People's Party, are thrust into civil war with Parliamentarian rebels, led by the §RKhana Pokpong Prachathipatai§!, or Democracy Protection Front, who rise up in the south.\n\nShould the rebels be successful, they later form the §RKhanagummakarn Sapha Patiwat§!, or Revolutionary Parliamentary Council.$SIA_CIVIL_WAR_REQUIREMENTS$"
 RULE_OPTION_SIA_CIVIL_WAR_COUP_DESC: "Field Marshal Plaek Phibunsongkhram declares himself the head of the new \"caretaker\" government, after months of martial law being used to suppress both the parliamentarians and the royalists."
 RULE_OPTION_SIA_CIVIL_WAR_PLAEK_NATPOP: "£KR_game_rule_flag_SIA_natpop  Coup - Plaek Phibunsongkhram"
 RULE_OPTION_SIA_CIVIL_WAR_PLAEK_NATPOP_DESC: "$RULE_OPTION_SIA_CIVIL_WAR_COUP_DESC$\nPhibunsongkhram successfully passes the Ratthaniyom Decrees, leads the Soi Ratchakhru clique of the §nPak Seri Manangkhasila§!, or Seri Manangkhasila Party, and remains in power.$SIA_CIVIL_WAR_REQUIREMENTS$"
 RULE_OPTION_SIA_CIVIL_WAR_SARIT_PATAUT: "£KR_game_rule_flag_SIA_natpop  Coup - Sarit Thanarat"
 RULE_OPTION_SIA_CIVIL_WAR_SARIT_PATAUT_DESC: "$RULE_OPTION_SIA_CIVIL_WAR_COUP_DESC$\nAfter his assassination, he is replaced by Sarit Thanarat, who forms the §PPak Chart Sangkhom§!, or Social Nation Party, and promotes extensive powers for the monarchy.$SIA_CIVIL_WAR_REQUIREMENTS$"
 RULE_OPTION_SIA_CIVIL_WAR_PHAO_NATPOP: "£KR_game_rule_flag_SIA_natpop  Coup - Phao Sriyanond"
 RULE_OPTION_SIA_CIVIL_WAR_PHAO_NATPOP_DESC: "$RULE_OPTION_SIA_CIVIL_WAR_COUP_DESC$\nAfter his assassination, he is replaced by Phao Sriyanond, who forms the §nPak Chart Thai§!, or Thai Nation Party, and declares a Republic.$SIA_CIVIL_WAR_REQUIREMENTS$"

 SIA_ELECTION: "£KR_game_rule_flag_SIA  Siam's First Elections"
 SIA_ELECTION_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CPrajadhipok's Reform§! in §Y$SIA_CONSTITUTION$§!\nor §CCivil War Averted§! in §Y$SIA_CIVIL_WAR$§!\nor §Cthe Government is victorious§!"
 RULE_OPTION_SIA_ELECTION_RANDOM: "Standard"
 RULE_OPTION_SIA_ELECTION_RANDOM_DESC: "Political parties soon form after the Khana Ratsadon coup, with each party having different plans in mind for the future of the nation. Which party shall win Siam's first free elections?"
 RULE_OPTION_SIA_ELECTION_SOCLIB: "£KR_game_rule_flag_SIA  Social Action Party"
 RULE_OPTION_SIA_ELECTION_SOCLIB_DESC: "Spearheaded by the intellectuals, the §lPak Kijsangkhom§!, or Social Action Party, embrace progressive thought for a freer Siam.$SIA_ELECTION_REQUIREMENTS$ §Cin either Siamese Civil War§!"
 RULE_OPTION_SIA_ELECTION_SOCDEM: "£KR_game_rule_flag_SIA  Socialists"
 RULE_OPTION_SIA_ELECTION_SOCDEM_DESC: "The planned land reform draft by Luang Praditmanutham (Pridi Phanomyong) gives the Siamese people hope of better future, and land the §SPak Sangkhomniyom§!, or Socialist Party, a firm majority.$SIA_ELECTION_REQUIREMENTS$ §Cagainst the Bowaradet Rebellion§!"
 RULE_OPTION_SIA_ELECTION_SOCCON: "£KR_game_rule_flag_SIA  Democrats"
 RULE_OPTION_SIA_ELECTION_SOCCON_DESC: "Formed by the royalists, the §cPak Prachathipat§!, or Democrat Party, plan to work very closely with his majesty the king on their new national development schemes.$SIA_ELECTION_REQUIREMENTS$ §Cagainst the Thamrongnawasawat Rebellion§!"

 SIA_FORPOL: "£KR_game_rule_flag_SIA  Siamese Foreign Policy"
 SIA_FORPOL_REBELS_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CParliamentarian Rebels win the Siamese Civil War§!"
 SIA_FORPOL_NOT_SOC_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CPrajadhipok's Reform§! in §Y$SIA_CONSTITUTION$§!\nor §CCivil War Averted§! or any §CCoup§! in §Y$SIA_CIVIL_WAR$§!\nor §Cthe Government is victorious in either Siamese Civil War§!"
 RULE_OPTION_SIA_FORPOL_RANDOM: "Standard"
 RULE_OPTION_SIA_FORPOL_RANDOM_DESC: "Siam may have benefited from Germany's victory in the Weltkrieg, but that is not to say that they wish to uphold the current German world order, one which may involve further European encroachment into Asia. It is up to Siam to decide where it stands."
 RULE_OPTION_SIA_FORPOL_JAP: "£KR_game_rule_flag_SIA  £KR_game_rule_flag_JAP  Co-Prosperity Sphere"
 RULE_OPTION_SIA_FORPOL_JAP_DESC: "With Japan being seen as the rising power in Asia, and the main denouncer of Western imperialism, the Siamese join with them to see off any European influence.$SIA_FORPOL_NOT_SOC_REQUIREMENTS$\n\nAny §CCoup§! in §Y$SIA_CIVIL_WAR$§!\nor §CJapan and Siam are both at war with Germany§!"
 RULE_OPTION_SIA_FORPOL_GER: "£KR_game_rule_flag_SIA  £KR_game_rule_flag_GER  Reichspakt"
 RULE_OPTION_SIA_FORPOL_GER_DESC: "Siam is one of several countries around the world that ended up on the \"winning\" side of the Weltkrieg, having found several benefits to Germany's victory. With ongoing German involvement in Indochina, it would be obvious to Siam to continue this relationship, upgrading their already cordial relations to a full military alliance.\n\n§RBenötigt:§!\n§CRoyalist Rebels win the Siamese Civil War§!\n\n§CBoworadet Rebellion§! in §Y$SIA_CIVIL_WAR$§!"
 RULE_OPTION_SIA_FORPOL_RUS: "£KR_game_rule_flag_SIA  £KR_game_rule_flag_RUS  Moscow Accord"
 RULE_OPTION_SIA_FORPOL_RUS_DESC: "The Eurasiansist tendencies of Russia's VPP-led government leads to them inviting Siam into the Moscow Accord.$SIA_FORPOL_NOT_SOC_REQUIREMENTS$\n\n§CGermany is defeated in the Second Weltkrieg§!\n§CVPP - Vernadsky§! in §Y$RUS_PATH$§!"
 RULE_OPTION_SIA_FORPOL_INT: "£KR_game_rule_flag_SIA_soc  £KR_game_rule_flag_FRA  Internationale"
 RULE_OPTION_SIA_FORPOL_INT_DESC: "Seeing the Third Internationale as the power to remove the shackles of capitalism and colonialism, the Siamese consider themselves their natural allies.$SIA_FORPOL_REBELS_REQUIREMENTS$\n\n§CThamrongnawasawat Rebellion§! in\n§Y$SIA_CIVIL_WAR$§!"
 RULE_OPTION_SIA_FORPOL_HND: "£KR_game_rule_flag_SIA_soc  £KR_game_rule_flag_HND  Bharatiya People's Republic"
 RULE_OPTION_SIA_FORPOL_HND_DESC: "Seeing the Bharatiyan People's Republic as the first Asian power to remove the shackles of capitalism and colonialism, the Siamese consider themselves their natural allies.$SIA_FORPOL_REBELS_REQUIREMENTS$\n\n§CThamrongnawasawat Rebellion§! in\n§Y$SIA_CIVIL_WAR$§!\n\n§CHinweis: If the Bharatiya People's Republic is not already in a faction, they form the Eastern Syndicalist Union with Siam.§!"
 RULE_OPTION_SIA_FORPOL_CHN: "£KR_game_rule_flag_SIA  £KR_game_rule_flag_QIE  £GFX_KR_game_rule_flag_CHN  £KR_game_rule_flag_UPC_GRA  £KR_game_rule_flag_LKT  China"
 RULE_OPTION_SIA_FORPOL_CHN_DESC: "The success the Chinese in their reunification and resurgence on the world stage inspires the Siamese to join forces with them.\n\n§RBenötigt:§!\n§CQing, Fengtian, Liangguang, Yunnan, the Left Kuomintang, Shanxi or the Sichuan federalists unify China, remain independent and do not join a faction§!\n\n§CBoth Siam and China have either socialist or non-socialist governments§!\n\nIf §Cthe Right Kuomintang unifies China§! then Siam must choose §CCoup - Phao Sriyanond§! in §Y$SIA_CIVIL_WAR$§!"
 RULE_OPTION_SIA_FORPOL_NEUT: "£KR_game_rule_flag_SIA  Neutrality"
 RULE_OPTION_SIA_FORPOL_NEUT_DESC: "Siam opts to remain outside of any faction, and focuses only on its own affairs."

 GEA_PATH: "£KR_game_rule_flag_GEA  Mücke's Reign"
 RULE_OPTION_GEA_PATH_RANDOM: "Standard"
 RULE_OPTION_GEA_PATH_RANDOM_DESC: "German East Asia has always been an unstable colony and now, after Black Monday, Hellmuth von Mücke has to decide how to manage it further."
 RULE_OPTION_GEA_PATH_AUTDEM: "£KR_game_rule_flag_GEA  Austerity Measures"
 RULE_OPTION_GEA_PATH_AUTDEM_DESC: "With the help of a strict austerity policy, Mücke strengthens the presence of the §aColonial Administration§!, which guides the economic presence within the colony."
 RULE_OPTION_GEA_PATH_PATAUT: "£KR_game_rule_flag_GEA  Collaboration"
 RULE_OPTION_GEA_PATH_PATAUT_DESC: "With some political concessions, Mücke gains assistance from the expertise of local elites, aiding the §PColonial Administration§! to achieve economic recovery within the colony."

 INC_REVOLT: "£KR_game_rule_flag_INC_soc  £KR_game_rule_flag_GEA  The Indochinese Rebellion"
 RULE_OPTION_INC_REVOLT_RANDOM: "Standard"
 RULE_OPTION_INC_REVOLT_RANDOM_DESC: "The situation in Indochina escalates following Black Monday, with a violent nationalist movement making plans to seize power. Can they challenge the Schutztruppe for control?"
 RULE_OPTION_INC_REVOLT_YES: "£KR_game_rule_flag_INC_soc   vs  £KR_game_rule_flag_GEA  Rebellion"
 RULE_OPTION_INC_REVOLT_YES_DESC: "With increased instability in Indochina following Black Monday, and the German inability to suppress rebel elements, a rebellion stars against German colonial rule."
 RULE_OPTION_INC_REVOLT_VIN: "£KR_game_rule_flag_INC_soc   vs  £KR_game_rule_flag_GEA  £KR_game_rule_flag_VIN  Rebellion"
 RULE_OPTION_INC_REVOLT_VIN_DESC: "After agreeing to Bao Dai's reforms, the German colonial administration, that now finds itself facing a rebellion, agrees to Vietnamese autonomy in exchange for their support.\n\n§RBenötigt:§!\n§CCollaboration§! in §Y$GEA_PATH$§!"
 RULE_OPTION_INC_REVOLT_NO: "£KR_game_rule_flag_GEA  Rebellion Avoided"
 RULE_OPTION_INC_REVOLT_NO_DESC: "The German colonial administration manages to suppress rebellious elements in Indochina, and thus avoid a mass scale revolt."

 INC_PATH: "£KR_game_rule_flag_INC_soc  The Future of Indochina"
 INC_PATH_REQUIREMENTS: "\n\n§RBenötigt:§!\nAny §CRebellion§! in §Y$INC_REVOLT$§!\n§CThe Indochinese Rebellion is successful§!"
 RULE_OPTION_INC_PATH_RANDOM: "Standard"
 RULE_OPTION_INC_PATH_RANDOM_DESC: "The socialist revolution struggles to find a factional consensus, with no clear winner in sight. Which of the many heirs to Brother Ho rise up to claim his position?"
 RULE_OPTION_INC_PATH_TOTALIST: "£KR_game_rule_flag_INC_soc  Socialists - Tan Viet"
 RULE_OPTION_INC_PATH_TOTALIST_DESC: "The §oTan Viet Cach mang Dang§!, or New Viet Revolutionary Party, become dominant in the National Assembly.$INC_PATH_REQUIREMENTS$"
 RULE_OPTION_INC_PATH_SYNDIE: "£KR_game_rule_flag_INC_soc  Socialists - Revolutionary League"
 RULE_OPTION_INC_PATH_SYNDIE_DESC: "The §rHoi Dong Duong Cach mang§!, or Indochinese Revolutionary League, become dominant in the National Assembly.$INC_PATH_REQUIREMENTS$"
 RULE_OPTION_INC_PATH_ASPIRATION_RADSOC: "£KR_game_rule_flag_INC_soc  Socialists - Aspiration Society"
 RULE_OPTION_INC_PATH_ASPIRATION_RADSOC_DESC: "The §RHoi Kin Cao vong§!, or Aspiration Society, become dominant in the National Assembly.$INC_PATH_REQUIREMENTS$"
 RULE_OPTION_INC_PATH_VNQDD_RADSOC: "£KR_game_rule_flag_INC_vnqdd  Nationalists"
 RULE_OPTION_INC_PATH_VNQDD_RADSOC_DESC: "The §RViet Nam Quoc dan Dang§!, or Vietnamese Nationalist Party, become dominant in the National Assembly, and not fall to a further socialist uprising or maintain martial law.$INC_PATH_REQUIREMENTS$"
 RULE_OPTION_INC_PATH_AUT_DESC: "The VNQDD become dominant in the National Assembly.\nFollowing a socialist uprising against the new nationalist government, martial law is not lifted after the uprising is put down, and a"
 RULE_OPTION_INC_PATH_AUTDEM: "£KR_game_rule_flag_INC  Martial Law - Civilian Government"
 RULE_OPTION_INC_PATH_AUTDEM_DESC: "$RULE_OPTION_INC_PATH_AUT_DESC$ civilian government led by the §aViet Nam Quoc dan Dang§!, or Vietnamese Nationalist Party, is formed.$INC_PATH_REQUIREMENTS$"
 RULE_OPTION_INC_PATH_PATAUT: "£KR_game_rule_flag_INC  Martial Law - Military Government"
 RULE_OPTION_INC_PATH_PATAUT_DESC: "$RULE_OPTION_INC_PATH_AUT_DESC$ military government led by the §PViet Nam Quoc dan Dang§!, or Vietnamese Nationalist Party, is formed.$INC_PATH_REQUIREMENTS$"

 INC_FORPOL: "£KR_game_rule_flag_INC_soc  Indochinese Foreign Policy"
 RULE_OPTION_INC_FORPOL_RANDOM: "Standard"
 RULE_OPTION_INC_FORPOL_RANDOM_DESC: "In the aftermath of its independence, Indochina is caught between nationalism and socialism, and between internationalism or a more regional focus. It is these decisions that will make all the difference in the future of the new revolutionary state."
 RULE_OPTION_INC_FORPOL_INT: "£KR_game_rule_flag_INC_soc  £KR_game_rule_flag_FRA  Internationale"
 RULE_OPTION_INC_FORPOL_INT_DESC: "Indochina retains a revolutionary government and aligns with their benefactors in Internationale.$INC_PATH_REQUIREMENTS$\n\n§CNationalists§! or any §CSocialists§! in §Y$INC_PATH$§!"
 RULE_OPTION_INC_FORPOL_HND: "£KR_game_rule_flag_INC_soc  £KR_game_rule_flag_HND  Bharatiya People's Republic"
 RULE_OPTION_INC_FORPOL_HND_DESC: "Indochina aligns with the South Asian bastion of socialism that is the Bharatiya People's Republic.$INC_PATH_REQUIREMENTS$\n\n§CNationalists§! or any §CSocialists§! in §Y$INC_PATH$§!\n\n§CHinweis: If the Bharatiya People's Republic is not already in a faction, they form the Eastern Syndicalist Union with Indochina.§!"
 RULE_OPTION_INC_FORPOL_JAP: "£KR_game_rule_flag_INC  £KR_game_rule_flag_JAP  Co-Prosperity Sphere"
 RULE_OPTION_INC_FORPOL_JAP_DESC: "The nationalist Indochinese government has seen the work that the Japanese have done in combatting western Imperialism in Asia, and aids them in their endeavours.$INC_PATH_REQUIREMENTS$\n\nAny §CMartial Law§! in §Y$INC_PATH$§!"
 RULE_OPTION_INC_FORPOL_CHN: "£KR_game_rule_flag_INC  £KR_game_rule_flag_QIE  £GFX_KR_game_rule_flag_CHN  £KR_game_rule_flag_UPC_GRA  £KR_game_rule_flag_LKT  China"
 RULE_OPTION_INC_FORPOL_CHN_DESC: "With the Kuomintang in China being considered as sister party to Indochina's VNQDD, and with China in general now resurgent on the world stage, it is no surprise when Indochina sides with their northern neighbours.$INC_PATH_REQUIREMENTS$\n\n§CQing, Fengtian, Liangguang, Yunnan, the Left Kuomintang, Shanxi or the Sichuan federalists unify China, remain independent and do not join a faction§!\n\n§CBoth Indochina and China have either socialist or non-socialist governments§!"

 DEI_PATH: "£KR_game_rule_flag_DEI  The New Governor-General"
 RULE_OPTION_DEI_PATH_RANDOM: "Standard"
 RULE_OPTION_DEI_PATH_RANDOM_DESC: "In the Dutch East Indies' first free elections in over a decade, which party win the elections?"
 RULE_OPTION_DEI_PATH_PALAR_AUTDEM: "£KR_game_rule_flag_DEI  Palar"
 RULE_OPTION_DEI_PATH_PALAR_AUTDEM_DESC: "Nico Palar takes over the §aRaad van Nederlandsch-Indië§!, or Council of the Dutch East Indies, and becomes the new governor-general.\n\n§RBenötigt:§!\n§CPvdV / VVD - Queen Wilhelmina§! or any §CSDAP-VDB§! or any §CRepublic§! in §Y$HOL_PATH$§!"
 RULE_OPTION_DEI_PATH_STARKENBORGH_STACHOUWER_AUTDEM: "£KR_game_rule_flag_DEI  Starkenborgh-Stachouwer"
 RULE_OPTION_DEI_PATH_STARKENBORGH_STACHOUWER_AUTDEM_DESC: "Alidius Tjarda van Starkenborgh-Stachouwer takes over the §aRaad van Nederlandsch-Indië§!, or Council of the Dutch East Indies, and becomes the new governor-general.$INS_REVOLT_AVOIDED_REQUIREMENTS$"
 RULE_OPTION_DEI_PATH_FURSTNER_AUTDEM: "£KR_game_rule_flag_DEI  Furnster"
 RULE_OPTION_DEI_PATH_FURSTNER_AUTDEM_DESC: "Johannes Furnster takes over the §aRaad van Nederlandsch-Indië§!, or Council of the Dutch East Indies, and becomes the new governor-general.\n\n§RBenötigt:§!\n§CCNA-VNH Coalition§! or §CMilitary Junta§! or any §CVNH Dictatorship§! in §Y$HOL_PATH$§!"

 INS_REVOLT: "£KR_game_rule_flag_DEI  £KR_game_rule_flag_INS  The Indonesian Rebellion"
 INS_REVOLT_AVOIDED_REQUIREMENTS: "\n\n§RBenötigt:§!\n§RNot§! any §CBatavian Commune§! in §Y$HOL_PATH$§!"
 RULE_OPTION_INS_REVOLT_RANDOM: "Standard"
 RULE_OPTION_INS_REVOLT_RANDOM_DESC: "Wracked by poor organisation and internal disunity, the Indonesian independence movement starts 1936 in a sorry state. However, over the next few years, the Dutch may have an uprising on their hands."
 RULE_OPTION_INS_REVOLT_YES: "£KR_game_rule_flag_DEI  £KR_game_rule_flag_INS  Revolt Occurs"
 RULE_OPTION_INS_REVOLT_YES_DESC: "An Indonesian uprising against the Dutch colony takes place in early 1938, if not earlier."
 RULE_OPTION_INS_REVOLT_NO: "£KR_game_rule_flag_DEI  Revolt Avoided"
 RULE_OPTION_INS_REVOLT_NO_DESC: "No uprising takes place in the Dutch East Indies.$INS_REVOLT_AVOIDED_REQUIREMENTS$"

 INS_PATH: "£KR_game_rule_flag_INS  Indonesia Independent"
 INS_PATH_REQUIREMENTS: "\n\n§RBenötigt:§!\nAny §CBatavian Commune§! in §Y$HOL_PATH$§!\nor §CRevolt Occurs§! in §Y$INS_REVOLT$§!\n§CThe Indonesian Rebellion is successful§!"
 RULE_OPTION_INS_PATH_RANDOM: "Standard"
 RULE_OPTION_INS_PATH_RANDOM_DESC: "The rebellion against the Dutch is a success, but the Indonesians must now decide who leads their newly-independent country."
 RULE_OPTION_INS_PATH_SOCCON: "£KR_game_rule_flag_INS  Revival of the Ulama"
 RULE_OPTION_INS_PATH_SOCCON_DESC: "The elections organised by Sukarno end in a victory for the §cNahdlatul Ulama§!, or Revival of the Ulama, allowing Indonesia's democracy to sustain itself.$INS_PATH_REQUIREMENTS$"
 RULE_OPTION_INS_PATH_AUTDEM: "£KR_game_rule_flag_INS  National Party"
 RULE_OPTION_INS_PATH_AUTDEM_DESC: "Sukarno centralises his power for himself, eventually culminating in the establishment of guided democracy under the §aPartai Nasional Indonesia§!, or Indonesian National Party.$INS_PATH_REQUIREMENTS$"
 RULE_OPTION_INS_PATH_RADSOC: "£KR_game_rule_flag_INS_soc  Proletarian Party"
 RULE_OPTION_INS_PATH_RADSOC_DESC: "The Indonesian elections organised by Sukarno are won by Tan Malaka's §RPartai Murba§!, or Proletarian Party, who establish a socialist state on the archipelago.$INS_PATH_REQUIREMENTS$"
 RULE_OPTION_INS_PATH_ISLAMIST_PATAUT: "£KR_game_rule_flag_INS_pataut  House of Islam"
 RULE_OPTION_INS_PATH_ISLAMIST_PATAUT_DESC: "In opposition to the secular and socialist-inspired policies of Sukarno, the §PDarul Islam§!, or House of Islam, movement topples the government to replace it with a moralistic imamate under the leadership of their founder.$INS_PATH_REQUIREMENTS$"
 RULE_OPTION_INS_PATH_SULTANATE_PATAUT: "£KR_game_rule_flag_INS_mon  Sultan Monarchists"
 RULE_OPTION_INS_PATH_SULTANATE_PATAUT_DESC: "With their rights under duress because of the extreme government that is put in power, the §PSultan Monarchists§! throughout the country organise a resistance and establish an archipelago-wide monarchy.$INS_PATH_REQUIREMENTS$"

 INS_FORPOL: "£KR_game_rule_flag_INS  Indonesian Foreign Policy"
 INS_FORPOL_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CRevolt Occurs§! in §Y$INS_REVOLT$§!\n§CThe Indonesian Rebellion is successful§!"
 RULE_OPTION_INS_FORPOL_RANDOM: "Standard"
 RULE_OPTION_INS_FORPOL_RANDOM_DESC: "No longer tied to the Netherlands, the people of Indonesia can decide where to align themselves, be it in larger alliance or more local cooperation."
 RULE_OPTION_INS_FORPOL_JAP: "£KR_game_rule_flag_INS  £KR_game_rule_flag_JAP  Co-Prosperity Sphere"
 RULE_OPTION_INS_FORPOL_JAP_DESC: "With Japan being seen as the rising power in Asia, and the main denouncer of Western imperialism, the Indonesians join with them to see off any European influence.$INS_FORPOL_REQUIREMENTS$\n\n§RNot§! §CProletarian Party§! in §Y$INS_PATH$§!"
 RULE_OPTION_INS_FORPOL_GER: "£KR_game_rule_flag_INS  £KR_game_rule_flag_GER  Reichspakt"
 RULE_OPTION_INS_FORPOL_GER_DESC: "Indonesia aligns with Germany, to best protect against Japan.$INS_FORPOL_REQUIREMENTS$\n\n§CSultanate Monarchists§! in §Y$INS_PATH$§! or §CJapan is at war with both Indonesia and Germany§!\n\n§RNot§! §CProletarian Party§! in §Y$INS_PATH$§!"
 RULE_OPTION_INS_FORPOL_ENT: "£KR_game_rule_flag_INS_mon  £KR_game_rule_flag_CAN  Entente"
 RULE_OPTION_INS_FORPOL_ENT_DESC: "With Australasia a prominent power in the region, the Indonesians align with the Entente.$INS_FORPOL_REQUIREMENTS$\n\n§CSultanate Monarchists§! in §Y$INS_PATH$§!"
 RULE_OPTION_INS_FORPOL_INT: "£KR_game_rule_flag_INS_soc  £KR_game_rule_flag_FRA  Internationale"
 RULE_OPTION_INS_FORPOL_INT_DESC: "Seeing the Third Internationale are their strongest possible allies against western imperialism and for the liberation of the workers, the Indonesians align with the Third Internationale.$INS_FORPOL_REQUIREMENTS$\n\n§CProletarian Party§! in §Y$INS_PATH$§!"
 RULE_OPTION_INS_FORPOL_HND: "£KR_game_rule_flag_INS_soc  £KR_game_rule_flag_HND  Bharatiya People's Republic"
 RULE_OPTION_INS_FORPOL_HND_DESC: "Seeing the Bharatiya People's Republic as the first Asian power to remove the shackles of capitalism and colonialism, the Indonesians consider themselves their natural allies.$INS_FORPOL_REQUIREMENTS$\n\n§CProletarian Party§! in §Y$INS_PATH$§!\n\n§CHinweis: If the Bharatiya People's Republic is not already in a faction, they form the Eastern Syndicalist Union with Indonesia.§!"
 RULE_OPTION_INS_FORPOL_CHN: "£KR_game_rule_flag_INS  £KR_game_rule_flag_QIE  £GFX_KR_game_rule_flag_CHN  £KR_game_rule_flag_UPC_GRA  £KR_game_rule_flag_LKT  China"
 RULE_OPTION_INS_FORPOL_CHN_DESC: "With the successful unification of China, Japan's status as the sole East Asian power is no more. Indonesia throws their lot with the Chinese in hopes of breaking foreign imperialism.$INS_FORPOL_REQUIREMENTS$\n\n§CQing, Fengtian, Liangguang, Yunnan, the Left Kuomintang, Shanxi or the Sichuan federalists unify China, remain independent and do not join a faction§!\n\n§CBoth Indonesia and China have either socialist or non-socialist governments§!\n\nIf §Cthe Right Kuomintang unifies China§! then Indonesia must choose §CNational Party§! in\n§Y$INS_PATH$§!\n\n§RNot§! §CHu Zongnan's Fifth National Revolution§! in\n§Y$CHI_PATH$§!\n§RNot§! §CThe Citizen-Stratocracy§! in §Y$GXC_KMT_PATH$§!\n§RNot§! §CThe Blue Shirt Revolution§! or any §CGeneralissimo§! in §Y$YUN_KMT_PATH$§!"

 PHI_PATH: "£KR_game_rule_flag_PHI  The Fate of the Philippines"
 RULE_OPTION_PHI_PATH_RANDOM: "Standard"
 RULE_OPTION_PHI_PATH_RANDOM_DESC: "With its American overlord tearing itself into pieces, the status of the newly-independent Philippines is determined by how effectively Manuel Quezon can carry out his reforms, and possibly the extent of foreign interference."
 RULE_OPTION_PHI_PATH_MARLIB: "£KR_game_rule_flag_PHI  Nationalists - Quezon"
 RULE_OPTION_PHI_PATH_MARLIB_DESC: "Manuel Quezon threads the needle in his economic reforms allowing his §mNacionalista Party§!, or Nationalist Party, to easily win re-election."
 RULE_OPTION_PHI_PATH_ROXAS_AUTDEM: "£KR_game_rule_flag_PHI  Nationalists - Roxas"
 RULE_OPTION_PHI_PATH_ROXAS_AUTDEM_DESC: "Manuel Quezon's overreliance on populism angers the elites, who manoeuvre to install Manuel Roxas as top of the §aNacionalista Party§!, or Nationalist Party, ticket."
 RULE_OPTION_PHI_PATH_SOCLIB: "£KR_game_rule_flag_PHI  Democrats"
 RULE_OPTION_PHI_PATH_SOCLIB_DESC: "Manuel Quezon's favouritism of the elites leaves the people hungry for change and with German help, Claro Recto's §lPartido Democrata§!, or Democratic Party, wins the election.\n\n§RBenötigt:§!\n§CGerman Alignment§! in §Y$PHI_FORPOL$§!"
 RULE_OPTION_PHI_PATH_AGUINALDO_AUTDEM: "£KR_game_rule_flag_PHI  National Socialists"
 RULE_OPTION_PHI_PATH_AGUINALDO_AUTDEM_DESC: "Manuel Quezon's favouritism of the elites leaves the people hungry for change and with Japanese help, Emilio Aguinaldo's §aPartido Pambansang Sosyalista§!, or National Socialist Party, wins the election.\n\n§RBenötigt:§!\n§CJapanese Alignment§! in §Y$PHI_FORPOL$§!"
 RULE_OPTION_PHI_PATH_SYNDIE: "£KR_game_rule_flag_PHI_soc  Labour"
 RULE_OPTION_PHI_PATH_SYNDIE_DESC: "The Philippines falls to syndicalism after populist anger at Quezon's elitist reforms boil over during the 1939 elections, empowering the §rPartido Obrero de Filipinas§!, or Labour Party of the Philippines.\n\n§RBenötigt:§!\n§CIndependent§! in §Y$PHI_FORPOL$§!"

 PHI_FORPOL: "£KR_game_rule_flag_PHI  Philippine Foreign Policy"
 PHI_FORPOL_SOC_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CLabour§! in §Y$PHI_PATH$§!"
 RULE_OPTION_PHI_FORPOL_RANDOM: "Standard"
 RULE_OPTION_PHI_FORPOL_RANDOM_DESC: "Now independent and adrift in the world, the Philippines is courted by Singapore and Tokyo and the chips will fall where they will by 1939."
 RULE_OPTION_PHI_FORPOL_NEUT: "£KR_game_rule_flag_PHI  Independent"
 RULE_OPTION_PHI_FORPOL_NEUT_DESC: "The Philippines adopt an independent foreign policy, remaining neutral and avoiding joining any faction unless attacked or a clear hegemon emerges in Asia."
 RULE_OPTION_PHI_FORPOL_JAP: "£KR_game_rule_flag_PHI  £KR_game_rule_flag_JAP  Co-Prosperty Sphere"
 RULE_OPTION_PHI_FORPOL_JAP_DESC: "The Japanese wins the Fight for the Philippines, bringing Manila into the Co-Prosperity Sphere.\n\n§RNot§! §CLabour§! in §Y$PHI_PATH$§!"
 RULE_OPTION_PHI_FORPOL_GER: "£KR_game_rule_flag_PHI  £KR_game_rule_flag_GER  Reichspakt"
 RULE_OPTION_PHI_FORPOL_GER_DESC: "The Germans win the Fight for the Philippines, bringing Manila into the Reichspakt.\n\n§RNot§! §CLabour§! in §Y$PHI_PATH$§!"
 RULE_OPTION_PHI_FORPOL_USA: "£KR_game_rule_flag_PHI  £KR_game_rule_flag_USA  American Alignment"
 RULE_OPTION_PHI_FORPOL_USA_DESC: "The Americans win the Fight for the Philippines, bringing Manila into any faction they end up joining.\n\n§RBenötigt:§!\n§CThe Second American Civil War concludes prior to the Philippine elections in September 1939§!\n\n§CThe Workers' Congress of America wins the Second American Civil War§! and §CLabour§! in §Y$PHI_PATH$§! or\n\n§CThe Workers' Congress of America does not §Rnot§! win the Second American Civil War§! and §Rnot§! §CLabour§! in §Y$PHI_PATH$§!"
 RULE_OPTION_PHI_FORPOL_ENT: "£KR_game_rule_flag_PHI  £KR_game_rule_flag_CAN  Entente"
 RULE_OPTION_PHI_FORPOL_ENT_DESC: "The Philippines adopt an independent foreign policy and join the Entente.\n\n§RNot§! §CLabour§! in §Y$PHI_PATH$§!"
 RULE_OPTION_PHI_FORPOL_INT: "£KR_game_rule_flag_PHI_soc  £KR_game_rule_flag_FRA  Internationale"
 RULE_OPTION_PHI_FORPOL_INT_DESC: "The Philippines adopt an independent foreign policy and join the Third Internationale as soon as the Germans are defeated.$PHI_FORPOL_SOC_REQUIREMENTS$"
 RULE_OPTION_PHI_FORPOL_HND: "£KR_game_rule_flag_PHI_soc  £KR_game_rule_flag_HND  Bharatiya People's Republic"
 RULE_OPTION_PHI_FORPOL_HND_DESC: "The Philippines adopt an independent foreign policy and later form an alliance with the Bharatiya People's Republic.$PHI_FORPOL_SOC_REQUIREMENTS$\n\n§CHinweis: If the Bharatiya People's Republic is not already in a faction, they form the Eastern Syndicalist Union with the Philippines.§!"
 RULE_OPTION_PHI_FORPOL_CHN: "£KR_game_rule_flag_PHI  £KR_game_rule_flag_QIE  £GFX_KR_game_rule_flag_CHN  £KR_game_rule_flag_UPC_GRA  £KR_game_rule_flag_LKT  China"
 RULE_OPTION_PHI_FORPOL_CHN_DESC: "The Philippines adopt an independent foreign policy and later form an alliance with China.\n\n§RBenötigt:§!\n§CQing, Fengtian, Liangguang, Yunnan, the Left Kuomintang, Shanxi or the Sichuan federalists unify China, remain independent and do not join a faction§!\n\n§CBoth the Philippines and China have either socialist or non-socialist governments§!"

 AST_PATH: "£KR_game_rule_flag_AST  Advance Australasia Fair"
 RULE_OPTION_AST_PATH_RANDOM: "Standard"
 RULE_OPTION_AST_PATH_RANDOM_DESC: "It is over a decade since the end of the Weltkrieg and the fall of Britain, but for many Australasians, this pain remains freshly etched in their minds. With Governor Birdwood and Billy Hughes' Nationalist Party at the helm of the nation, stability has been maintained, though coming at the cost of a painful stagnation that leaves many wounds to fester. In the last days of 1935, whispers begin to spread that the emergency rule may come to an end, and with it a spark of hope that the battered Commonwealth may be able to advance onwards."
 RULE_OPTION_AST_PATH_DEM: "£KR_game_rule_flag_AST  Democracy"
 RULE_OPTION_AST_PATH_DEM_DESC: "Democracy survives in Australasia for the foreseeable future, with no socialist or nationalist uprisings taking place."
 RULE_OPTION_AST_PATH_DEM_WIN_DESC: "They win the 1936 and subsequent elections."
 RULE_OPTION_AST_PATH_MARLIB: "£KR_game_rule_flag_AST  Country Party"
 RULE_OPTION_AST_PATH_MARLIB_DESC: "Despite historically not being a major player in politics, Earle Page's §mAustralasia Country Party§!, obtains enough votes to form a minority government. $RULE_OPTION_AST_PATH_DEM_WIN_DESC$"
 RULE_OPTION_AST_PATH_SOCDEM: "£KR_game_rule_flag_AST  Labor"
 RULE_OPTION_AST_PATH_SOCDEM_DESC: "Despite the odds being stacked against them, John Curtin's §SAustralasia Labor Party§!, led by John Curtin, displaces the newly formed UAP and secures a majority in both houses, promising to look out for the working class. $RULE_OPTION_AST_PATH_DEM_WIN_DESC$"
 RULE_OPTION_AST_PATH_SOCCON: "£KR_game_rule_flag_AST  United Australasia Party"
 RULE_OPTION_AST_PATH_SOCCON_DESC: "Stanley Bruce's newly formed §cUnited Australasia Party§! secures the popular vote, and reaffirms Australasia's commitment to the Empire and conservative policies. $RULE_OPTION_AST_PATH_DEM_WIN_DESC$"
 RULE_OPTION_AST_PATH_SOCLIB: "£KR_game_rule_flag_AST  Labor (Anti-Syndicalist)"
 RULE_OPTION_AST_PATH_SOCLIB_DESC: "The people choose the Australasian Labor Party in the 1936 election. When Jack Lang later leaves the Labor Party after syndicalists are re-admitted following the Third Internationale's defeat, his anti-syndicalist wing of the §lLabor Party§!, also known as Lang Labor, breaks off and uses populist rhetoric to be elected thereafter.\n\n§RBenötigt:§!\n§CAustralasia is not at war with any socialist country§!"
 RULE_OPTION_AST_PATH_SYNDIE_START_DESC: "With the recent electoral victory of the Labor Party, radical worker elements within the movement seize the opportunity, and declare a new socialist republic free from the yoke of British Imperialism."
 RULE_OPTION_AST_PATH_SYNDIE_END_DESC: "Fred Paterson, a prominent socialist, leader of the §rSyndicalist Party of Australasia§!, and popular figurehead during this period, eventually takes on the mantle as the reborn nation's first elected leader."
 RULE_OPTION_AST_PATH_SYNDIE: "£KR_game_rule_flag_AST_soc  Revolution - Syndicalists"
 RULE_OPTION_AST_PATH_SYNDIE_DESC: "$RULE_OPTION_AST_PATH_SYNDIE_START_DESC$\n$RULE_OPTION_AST_PATH_SYNDIE_END_DESC$"
 RULE_OPTION_AST_PATH_TOTALIST: "£KR_game_rule_flag_AST_soc  Revolution - Maximists"
 RULE_OPTION_AST_PATH_TOTALIST_DESC: "$RULE_OPTION_AST_PATH_SYNDIE_START_DESC$ Whilst not being at the forefront of the revolution, the leader of the §oMaximist Party of Australasia§!, J.B. Miles, with his intense personality and determination, eventually takes on the mantle as the reborn nation's first elected leader."
 RULE_OPTION_AST_PATH_RADSOC: "£KR_game_rule_flag_AST_soc  Revolution - Socialists"
 RULE_OPTION_AST_PATH_RADSOC_DESC: "$RULE_OPTION_AST_PATH_SYNDIE_START_DESC$ Whilst not a serious contender in the first Congress, the long time \"Trades Hall Red\" Jock Garden, is able to build wide support for the more moderate but still progressive platform of his §RAustralasian Socialist Party§!, and wins the second Congress election."
 RULE_OPTION_AST_PATH_NATPOP: "£KR_game_rule_flag_AST  Australasian Guard Coup"
 RULE_OPTION_AST_PATH_NATPOP_DESC: "The Labor Party wins the 1936 elections, but the elected government looks likely to be overthrown the ACTU-aligned syndicalist wing of the party. Fearing the inaction of the government to the syndicalist threat, the §nAustralian Guard§! under Eric Campbell takes direct action to ensure the unity of state, and its loyalty to the Empire."
 RULE_OPTION_AST_PATH_AUTDEM: "£KR_game_rule_flag_AST  National Party"
 RULE_OPTION_AST_PATH_AUTDEM_DESC: "With the failure of the second Melbourne Commune and the grotesque violence that followed by the ruling Australasian Guard, the nation faces anarchy. As a result the Governor General, with the aid of Canada, steps in to enact emergency powers, and takes over with the §aAustralasian National Party§!, in an echo to what occurred over a decade ago."
 RULE_OPTION_AST_PATH_ELECTED_NATPOP: "£KR_game_rule_flag_AST  Australasian Guard"
 RULE_OPTION_AST_PATH_ELECTED_NATPOP_DESC: "Mobilising disenfranchised UAP, Country and other conservative elements, Eric Campbell and the §nAustralasian Guard§! successfully obtains a majority in parliament in the 1939 and subsequent elections, reinforcing the nation's absolute commitment to King and Country."
 RULE_OPTION_AST_PATH_LATER_SYNDIE: "£KR_game_rule_flag_AST_soc  Revolution - Second Melbourne Uprising"
 RULE_OPTION_AST_PATH_LATER_SYNDIE_DESC: "Mobilising disenfranchised conservative elements, the Australasian Guard successfully obtains a majority in the 1939 elections, but their government later falls in a mass socialist uprising.\n$RULE_OPTION_AST_PATH_SYNDIE_END_DESC$"
 RULE_OPTION_AST_PATH_PATAUT: "£KR_game_rule_flag_AST_nationalist  Australasia First Movement"
 RULE_OPTION_AST_PATH_PATAUT_DESC: "With an outcome nobody expected, Percy Stephensen and the §PAustralasia First Movement§! wins the 1939 and subsequent elections, capitalising on the discontent many Australasians feel towards the Empire, putting the country on a course for total independence at any cost."
 RULE_OPTION_AST_PATH_ELECTED_AUTDEM: "£KR_game_rule_flag_AST_nationalist  National Party (Elected)"
 RULE_OPTION_AST_PATH_ELECTED_AUTDEM_DESC: "The §aAustralasian National Party§! unexpectedly regain power in the 1942 and subsequent elections."

 AST_REFERENDUM: "£KR_game_rule_flag_AST_nationalist  Great Southern Republic"
 AST_REFERENDUM_REQUIREMENTS: "\n\n§RBenötigt:§!\n§RNot§! any §CRevolution§!, any §CAustralasian Guard§! or §CAustralasia First Movement§! in §Y$AST_PATH$§!"
 RULE_OPTION_AST_REFERENDUM_RANDOM: "Standard"
 RULE_OPTION_AST_REFERENDUM_RANDOM_DESC: "Democracy has triumphed in Australasia in the 1936 and 1939 elections, but there is another question on the lips on its people.\nIn a referendum, should the people decide that Australasia remain a monarchy, with close ties to the British, or should it rid itself of its colonial legacy once and for all, and declare a Republic?"
 RULE_OPTION_AST_REFERENDUM_NO: "£KR_game_rule_flag_AST  Monarchy"
 RULE_OPTION_AST_REFERENDUM_NO_DESC: "Australasia votes to maintain its place in the British Empire, and remain under British rule.$AST_REFERENDUM_REQUIREMENTS$"
 RULE_OPTION_AST_REFERENDUM_YES_START_DESC: "After a clear democratic majority, Australasia decides it no longer wishes to be a dominion of the Empire, and instead wishes to shape its own destiny."
 RULE_OPTION_AST_REFERENDUM_YES: "£KR_game_rule_flag_AST_nationalist  Republic"
 RULE_OPTION_AST_REFERENDUM_YES_DESC: "$RULE_OPTION_AST_REFERENDUM_YES_START_DESC$\nIt does however, remain in the Entente.$AST_REFERENDUM_REQUIREMENTS$"
 RULE_OPTION_AST_REFERENDUM_YES_KICKED: "£KR_game_rule_flag_AST_nationalist  Republic - Removed from Entente"
 RULE_OPTION_AST_REFERENDUM_YES_KICKED_DESC: "$RULE_OPTION_AST_REFERENDUM_YES_START_DESC$\nThe leader of the Entente accepts the decision, but removes Australasia from the alliance as a result.$AST_REFERENDUM_REQUIREMENTS$"
 RULE_OPTION_AST_REFERENDUM_YES_WAR: "£KR_game_rule_flag_AST_nationalist  £KR_game_rule_flag_CAN  Republic - War"
 RULE_OPTION_AST_REFERENDUM_YES_WAR_DESC: "$RULE_OPTION_AST_REFERENDUM_YES_START_DESC$\nDespite the mandate, the British do not let such a vital territory go, and declare war to ensure that their political grip is absolute.$AST_REFERENDUM_REQUIREMENTS$"

 NZL_SUCCESSION: "£KR_game_rule_flag_AST  £KR_game_rule_flag_NZL  Dissolution of Australasia"
 RULE_OPTION_NZL_SUCCESSION_RANDOM: "Standard"
 RULE_OPTION_NZL_SUCCESSION_RANDOM_DESC: "After its forced unification with the Dominion of Australia in the contentious Consolidation Of Resources Act of 1924, New Zealand has baulked at having not enough say in their own affairs. If Australia pushes through with increasing conscription, or if extremists take control of the Australasian government, New Zealand may be able to become independent once more, either through rebellion or referendum."
 RULE_OPTION_NZL_SUCCESSION_ENT: "£KR_game_rule_flag_NZL  £KR_game_rule_flag_CAN  Independence - Entente"
 RULE_OPTION_NZL_SUCCESSION_ENT_DESC: "New Zealand votes to leave Australasia after the United Kingdom is restored or Australasia leaves the Entente, or rise up against either Australian syndicalists or the Australasia First Movement. They remain in the Entente, should it still exist.\n\n§RBenötigt:§!\n§RNot§! §CAustralasian Guard Coup§! or §CAustralasian Guard§! in §Y$AST_PATH$§!"
 RULE_OPTION_NZL_SUCCESSION_ALONE: "£KR_game_rule_flag_NZL  Independence"
 RULE_OPTION_NZL_SUCCESSION_ALONE_DESC: "New Zealand rises up against either Australian syndicalists or the Australasia First Movement, but is not be permitted to rejoin the Entente.\n\n§RBenötigt:§!\nAny §CRevolution§! or §CAustralasia First Movement§! in §Y$AST_PATH$§!"
 RULE_OPTION_NZL_SUCCESSION_NO: "£KR_game_rule_flag_AST  Remain with Australia"
 RULE_OPTION_NZL_SUCCESSION_NO_DESC: "New Zealand remains part of Australasia, and any request for an independence referendum is denied.\n\n§RBenötigt:§!\n§RNot§! any §CRevolution§! or §CAustralasia First Movement§! in §Y$AST_PATH$§!"

 NZL_PATH: "£KR_game_rule_flag_NZL  Tino Rangatiratanga"
 NZL_PATH_REQUIREMENTS: "\n\n§RBenötigt:§!\nAny §CRevolution§! or §CAustralasia First Movement§! in §Y$AST_PATH$§! or any §CIndependence§! in §Y$NZL_SUCCESSION$§!\n\n§RNot§! §CAustralasian Guard Coup§! or §CAustralasian Guard§! in §Y$AST_PATH$§!"
 RULE_OPTION_NZL_PATH_RANDOM: "Standard"
 RULE_OPTION_NZL_PATH_RANDOM_DESC: "New Zealand is separated from Australia once more, and is free to rule her people itself. It is now up to the New Zealanders, and no one else, to decide who leads them."
 RULE_OPTION_NZL_PATH_PATAUT: "£KR_game_rule_flag_NZL  Military Government"
 RULE_OPTION_NZL_PATH_PATAUT_DESC: "After New Zealand returns to peace, the interim §PTemporary Military Government§! remains in control.$NZL_PATH_REQUIREMENTS$"
 RULE_OPTION_NZL_PATH_DEM_DESC: "After New Zealand returns to peace, the interim government calls elections."
 RULE_OPTION_NZL_PATH_SOCDEM: "£KR_game_rule_flag_NZL  Labour"
 RULE_OPTION_NZL_PATH_SOCDEM_DESC: "$RULE_OPTION_NZL_PATH_DEM_DESC$ These are won easily by the §SNew Zealand Labour Party§!.$NZL_PATH_REQUIREMENTS$"
 RULE_OPTION_NZL_PATH_SOCCON: "£KR_game_rule_flag_NZL  National Party"
 RULE_OPTION_NZL_PATH_SOCCON_DESC: "$RULE_OPTION_NZL_PATH_DEM_DESC$ The §cNew Zealand National Party§! forms a minority government.$NZL_PATH_REQUIREMENTS$"
 RULE_OPTION_NZL_PATH_NATPOP: "£KR_game_rule_flag_NZL  New Zealand Legion"
 RULE_OPTION_NZL_PATH_NATPOP_DESC: "$RULE_OPTION_NZL_PATH_DEM_DESC$ The people turn to the §nNew Zealand Legion§! to protect them.$NZL_PATH_REQUIREMENTS$"
