SRI_PATH: "£KR_game_rule_flag_SRI   Die Sonne der Zukunft"
 SRI_PATH_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CThe Socialist Republic of Italy reunites Italy§!"
RULE_OPTION_SRI_PATH_RANDOM: "Standard"
RULE_OPTION_SRI_PATH_RANDOM_DESC: "Bei den Wahlen von 1936 geraten die drei großen Fraktionen der Sozialistischen Republik endgültig aneinander. Wie es weitergeht, wird durch heikle Machtspiele im Turiner Parlament entschieden."
 RULE_OPTION_SRI_PATH_SYNDIE_DESC: "Aus den ersten Wahlen nach der Wiedervereinigung geht die §rConfederazione Generale del Lavoro - Unione Sindacale Italiana§! oder Allgemeine Konföderation der Arbeit - Italienische Syndikalistische Union als Sieger hervor. Sie verteidigen die gewerkschaftliche Demokratie der Sozialistischen Republik erfolgreich gegen Mussolinis präsidialistische Angriffe."
 RULE_OPTION_SRI_PATH_VITTORIO_SYNDIE: "£KR_game_rule_flag_SRI  Rückkehr zur Normalität"
 RULE_OPTION_SRI_PATH_VITTORIO_SYNDIE_DESC: "$RULE_OPTION_SRI_PATH_SYNDIE_DESC$\nGiuseppe di Vittorio, der sich für die Belange der städtischen Arbeiter einsetzt, wird Präsident.$SRI_PATH_REQUIREMENTS$"
 RULE_OPTION_SRI_PATH_NENNI_SYNDIE: "£KR_game_rule_flag_SRI  Dem Licht folgen"
 RULE_OPTION_SRI_PATH_NENNI_SYNDIE_DESC: "$RULE_OPTION_SRI_PATH_SYNDIE_DESC$\nPietro Nenni, der einen von Frankreich inspirierten Kompromiss zwischen Stadt und Land anstrebt, wird Präsident.$SRI_PATH_REQUIREMENTS$"
 RULE_OPTION_SRI_PATH_MESCHI_SYNDIE: "£KR_game_rule_flag_SRI  Der Geist von 1907"
 RULE_OPTION_SRI_PATH_MESCHI_SYNDIE_DESC: "$RULE_OPTION_SRI_PATH_SYNDIE_DESC$\nAlberto Meschi, der die Revolution mit seinen ländlichen Anarchisten fortsetzt, wird Präsident.$SRI_PATH_REQUIREMENTS$"
 RULE_OPTION_SRI_PATH_RADSOC_DESC: "Zwischen Gewerkschaften und Faschisten gelingt es der parlamentarischen §RPartito d'Azione§! (Aktionspartei), die ersten Wahlen nach der Wiedervereinigung unter der Führung von Carlo Rosselli zu gewinnen."
 RULE_OPTION_SRI_PATH_SALVEMINI_RADSOC: "£KR_game_rule_flag_SRI_workers_republic  Die Wiederherstellung der Verfassung"
 RULE_OPTION_SRI_PATH_SALVEMINI_RADSOC_DESC: "$RULE_OPTION_SRI_PATH_RADSOC_DESC$\nSpäter bringt Rosselli Italien wieder auf den Weg der Demokratie und wählt Gaetano Salvemini zum Staatspräsidenten.$SRI_PATH_REQUIREMENTS$"
 RULE_OPTION_SRI_PATH_LUSSU_RADSOC: "£KR_game_rule_flag_SRI  Neuer parlamentarischer Kompromiss"
 RULE_OPTION_SRI_PATH_LUSSU_RADSOC_DESC: "$RULE_OPTION_SRI_PATH_RADSOC_DESC$\nSpäter wird Rosselli bei dem Versuch, Italien wieder auf den Weg der Demokratie zu bringen, ermordet; an seine Stelle tritt Emilio Lussu, der einen Kompromiss mit den demokratisch gesinnten Gewerkschaften sucht.$SRI_PATH_REQUIREMENTS$"
 RULE_OPTION_SRI_PATH_TOTALIST_DESC: "Nach jahrelangen Angriffen auf die demokratischen Institutionen Italiens siegt der §oFascio d'Azione Rivoluzionaria§! (Bund revolutionärer Aktion) bei den ersten Wahlen nach der Wiedervereinigung und ermöglicht Benito Mussolinis autoritärer Vision den Durchbruch."
 RULE_OPTION_SRI_PATH_MUSSOLINI_TOTALIST: "£KR_game_rule_flag_SRI_mussolini_rsi  Mussolinis Sieg"
 RULE_OPTION_SRI_PATH_MUSSOLINI_TOTALIST_DESC: "$RULE_OPTION_SRI_PATH_TOTALIST_DESC$\nNachdem er die letzten Angriffe auf seine Herrschaft überstanden hat, reformiert Mussolini die Sozialistische Republik nach seinem Vorbild.$SRI_PATH_REQUIREMENTS$"
 RULE_OPTION_SRI_PATH_MUSSOLINI_DEAD_DESC: "Nachdem er sich mit äußeren Feinden auseinandergesetzt hat, wird auf Mussolini ein Attentat verübt; sein Nachfolger Palmiro Togliatti"
 RULE_OPTION_SRI_PATH_TOGLIATTI_TOTALIST: "£KR_game_rule_flag_SRI  Die kommunistische Wiedergeburt"
 RULE_OPTION_SRI_PATH_TOGLIATTI_TOTALIST_DESC: "$RULE_OPTION_SRI_PATH_TOTALIST_DESC$\n$RULE_OPTION_SRI_PATH_MUSSOLINI_DEAD_DESC$ führt die faschistische Revolution in eine andere Richtung.$SRI_PATH_REQUIREMENTS$"
 RULE_OPTION_SRI_PATH_DE_AMBRIS_TOTALIST: "£KR_game_rule_flag_SRI_social_republic  Erfüllung von Sansepolcro"
 RULE_OPTION_SRI_PATH_DE_AMBRIS_TOTALIST_DESC: "$RULE_OPTION_SRI_PATH_TOTALIST_DESC$\n$RULE_OPTION_SRI_PATH_MUSSOLINI_DEAD_DESC$ wird durch einen Putsch der Schwarzhemden abgesetzt, und der neue Präsident Alceste de Ambris führt die faschistische Revolution zu ihrem natürlichen Ende.$SRI_PATH_REQUIREMENTS$"

 ITA_PATH: "£KR_game_rule_flag_ITA  Italien erwacht"
 RULE_OPTION_ITA_PATH_RANDOM: "Standard"
 RULE_OPTION_ITA_PATH_RANDOM_DESC: "Die liberale Demokratie Italiens hat im Nordosten überlebt, aber die von Premierminister Ivanoe Bonomi nach dem Rückzug Österreichs aus diesem Gebiet einberufenen Parlamentswahlen stellen die Zukunft der Nation als Demokratie in Frage."
RULE_OPTION_ITA_DEM_DESC: "Die ANI geht aus der Wahl nicht als Sieger hervor, und ihre Rebellion wird niedergeschlagen. Das Misstrauensvotum gegen die Regierung scheitert."
 RULE_OPTION_ITA_PATH_SOCLIB: "£KR_game_rule_flag_ITA  Liberaldemokraten"
 RULE_OPTION_ITA_PATH_SOCLIB_DESC: "$RULE_OPTION_ITA_DEM_DESC$\nDie §lPartito Liberale Democratico§!, oder Liberaldemokratische Partei, gewinnt die Wahlen von 1936 und die folgenden."
 RULE_OPTION_ITA_PATH_MARLIB: "£KR_game_rule_flag_ITA  Liberale"
 RULE_OPTION_ITA_PATH_MARLIB_DESC: "$RULE_OPTION_ITA_DEM_DESC$\nDie §mPartito Liberale Italiano§!, oder Italienische Liberale Partei, gewinnt die Wahlen von 1936 und die folgenden."
 RULE_OPTION_ITA_PATH_SOCCON: "£KR_game_rule_flag_ITA  Volkspartei"
 RULE_OPTION_ITA_PATH_SOCCON_DESC: "$RULE_OPTION_ITA_DEM_DESC$\nDie §cPartito Popolare Italiano§!, oder Italienische Volkspartei, gewinnt die Wahlen von 1936 und die folgenden."
 RULE_OPTION_ITA_PATH_SOCDEM: "£KR_game_rule_flag_ITA  Demokratische Reformisten"
 RULE_OPTION_ITA_PATH_SOCDEM_DESC: "$RULE_OPTION_ITA_DEM_DESC$\nDie §SLega Democratica Riformista§!, oder Demokratische Reformistenliga, tritt bei der Wahl 1936 nicht an, gewinnt aber die folgenden Abstimmungen."
RULE_OPTION_ITA_PATH_NATPOP: "£KR_game_rule_flag_ITA_ANI   Nationalisten"
RULE_OPTION_ITA_PATH_NATPOP_DESC: "Die §nAssociazione Nazionalista Italiana§!, oder Italienische Nationalistische Vereinigung, übernimmt nach den Wahlen die Macht innerhalb der Republik und versucht, den Staat zu zentralisieren."
RULE_OPTION_ITA_PATH_FED_DESC: "Die ANI geht aus den Wahlen nicht als Sieger hervor, ihre Rebellion wird niedergeschlagen, und die Regierung stürzt nach einem Misstrauensvotum.\nDie Italienische Föderation wird unter der Herrschaft von"
 RULE_OPTION_ITA_PATH_AUTDEM_DESC: "der den §aConsiglio della Federazione Italiana§!, oder Rat der Italienischen Föderation, leitet."
 RULE_OPTION_ITA_PATH_HABSBURG_AUTDEM: "£KR_game_rule_flag_ITA_fed  Föderation - Pietro Ferdinando I"
 RULE_OPTION_ITA_PATH_HABSBURG_AUTDEM_DESC: "$RULE_OPTION_ITA_PATH_FED_DESC$ der Großherzog der Toskana, Pietro Ferdinando d'Asburgo-Lorena, $RULE_OPTION_ITA_PATH_AUTDEM_DESC$"
 RULE_OPTION_ITA_PATH_VISCONTI_AUTDEM: "£KR_game_rule_flag_ITA_fed  Föderation - Marcello I"
 RULE_OPTION_ITA_PATH_VISCONTI_AUTDEM_DESC: "$RULE_OPTION_ITA_PATH_FED_DESC$ der Herzog von Modrone, Marcello Visconti, $RULE_OPTION_ITA_PATH_AUTDEM_DESC$"
RULE_OPTION_ITA_PATH_COLLAPSE: "£KR_game_rule_flag_LOM  £KR_game_rule_flag_VNC  Die Republik ist aufgelöst"
RULE_OPTION_ITA_PATH_COLLAPSE_DESC: "Die ANI geht aus den Wahlen nicht als Sieger hervor, und ihre Rebellion wird niedergeschlagen. Die Regierung stürzt nach einem Misstrauensvotum, und die Lombardei und Venedig gehen als unabhängige Staaten getrennte Wege."

 ITA_FORPOL: "£KR_game_rule_flag_ITA  Außenpolitik der Italienischen Republik"
 RULE_OPTION_ITA_FORPOL_RANDOM: "Standard"
 RULE_OPTION_ITA_FORPOL_RANDOM_DESC: "Nach der Stabilisierung der Lage im Land ist für die Italienische Republik die Zeit gekommen, eine Entscheidung zu treffen: Soll sie sich ihren österreichischen Wohltätern anschließen oder sich jemand anderen suchen?"
 RULE_OPTION_ITA_FORPOL_AUS: "£KR_game_rule_flag_ITA  £KR_game_rule_flag_AUS  Donau-Adriabund"
 RULE_OPTION_ITA_FORPOL_AUS_DESC: "Die Italienische Republik schließt sich ihren österreichischen Wohltätern an.\n\n§RBenötigt:§!\n§RNicht§! §CNationalisten§! oder §CDie Republik ist aufgelöst§! in\n§Y$ITA_PATH$§!"
 RULE_OPTION_ITA_FORPOL_GER: "£KR_game_rule_flag_ITA  £KR_game_rule_flag_GER  Reichspakt"
 RULE_OPTION_ITA_FORPOL_GER_DESC: "Nachdem Österreich erheblich geschwächt ist, hat die Italienische Republik keine andere Wahl, als dem Reichspakt beizutreten.\n\n§RBenötigt:§!\n§CÖsterreich existiert nicht mehr§! oder\n§CÖsterreich ist eine Marionette§! oder\n§CÖsterreich hat den Budapester Vertrag unterzeichnet§!\n\n§RNicht§! §CNationalisten§! oder §CDie Republik ist aufgelöst§! in\n§Y$ITA_PATH$§!"
 RULE_OPTION_ITA_FORPOL_ENT: "£KR_game_rule_flag_ITA_ANI  £KR_game_rule_flag_CAN  Entente"
 RULE_OPTION_ITA_FORPOL_ENT_DESC: "Der italienische Staat setzt den im Exil lebenden König wieder ein und tritt erneut der Entente bei.\n\n§RBenötigt:§!\n§CNationalisten§! in §Y$ITA_PATH$§!\n§CDer Venezianische Aufstand wird niedergeschlagen§!\n\n§CBlocco Nazionale§! oder eine §CBadoglio Deposed§! in\n§Y$SRD_PATH$§! oder §CSardinien existiert nicht mehr§!\n\n§CDer Italienische Staat und die Entente befinden sich beide im Krieg mit der Dritten Internationale.§!"
 RULE_OPTION_ITA_FORPOL_RUS: "£KR_game_rule_flag_ITA_ANI  £KR_game_rule_flag_RUS  Moskauer Abkommen"
 RULE_OPTION_ITA_FORPOL_RUS_DESC: "Der Italienische Staat schließt sich mit Russland zusammen, um den Deutsch-Österreichischen Block zu besiegen.\n\n§RBenötigt:§!\n§CNationalisten§! in §Y$ITA_PATH$§!\n§CDer Venezianische Aufstand wird niedergeschlagen§!\n\n§CEntweder die Sozialistische Republik Italien oder Deutschland werden besiegt.§!"
 RULE_OPTION_ITA_FORPOL_ROM: "£KR_game_rule_flag_ITA_ANI  £KR_game_rule_flag_ROM  Blutpakt"
 RULE_OPTION_ITA_FORPOL_ROM_DESC: "Der Italienische Staat schließt sich mit seinen ideologischen Verbündeten in Rumänien zusammen, um die Serben zu ihrem beiderseitigen Vorteil zu besiegen.\n\n§RBenötigt:§!\n§CNationalisten§! in §Y$ITA_PATH$§!\n§CDer Venezianische Aufstand wird niedergeschlagen§!\n\n§CCantacuzino - Legionaries§! in §Y$ROM_PATH$§! odr §CNicolae - Legionaries§! in §Y$ROM_PATH$§! und §Cder Italienische Staat vereint Italien wieder§!\n\n§CSerbien kontrolliert Gebiete, die entweder vom Italienischen Staat oder von Rumänien beansprucht werden.§!\n\n§RNicht§! den §CPakt einhalten§! in §Y$BPL_DISSOLUTION$§!"

 VNC_PATH: "£KR_game_rule_flag_VNC  Die ruhigste Republik"
 VNC_PATH_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CThe Republic is Disbanded§! in §Y$ITA_PATH$§!"
 RULE_OPTION_VNC_PATH_RANDOM: "Standard"
 RULE_OPTION_VNC_PATH_RANDOM_DESC: "Die ehemalige Republik Venedig bestand genau 1000 Jahre lang. Nachdem die Italienische Republik gefallen ist und Venedig über sein eigenes Schicksal entscheiden kann, bleibt eine Frage offen: Wird das neue Regierungssystem Bestand haben oder wird die alte Republik unter der Führung des Dogen wiederhergestellt werden?"
 RULE_OPTION_VNC_PATH_SOCCON: "£KR_game_rule_flag_VNC  Katholische Liga"
 RULE_OPTION_VNC_PATH_SOCCON_DESC: "Eine neue Republik wird ausgerufen, und die §cLega Catòłega§!, oder Katholische Liga, gewinnt die Wahlen.$VNC_PATH_REQUIREMENTS$"
 RULE_OPTION_VNC_PATH_MARLIB: "£KR_game_rule_flag_VNC  Republikaner"
 RULE_OPTION_VNC_PATH_MARLIB_DESC: "Eine neue Republik wird ausgerufen, und die §mPartito Repubblicano Veneto§!, oder die Republikanische Partei Venedigs, gewinnt die Wahlen.$VNC_PATH_REQUIREMENTS$"
 RULE_OPTION_VNC_PATH_SOCLIB: "£KR_game_rule_flag_VNC  Christliche Liberale"
 RULE_OPTION_VNC_PATH_SOCLIB_DESC: "Eine neue Republik wird ausgerufen, und die §lPartito Liberałe Cristian§!, oder Christlich-Liberale Partei, gewinnt die Wahlen.$VNC_PATH_REQUIREMENTS$"
 RULE_OPTION_VNC_PATH_SOCDEM: "£KR_game_rule_flag_VNC  Volkspartei"
 RULE_OPTION_VNC_PATH_SOCDEM_DESC: "Eine neue Republik wird ausgerufen, und die §SPartito Popolare Veneto§!, oder Venezianische Volkspartei, gewinnt die Wahlen.$VNC_PATH_REQUIREMENTS$"
 RULE_OPTION_VNC_PATH_AUTDEM: "£KR_game_rule_flag_VNC  Herzoglicher Rat"
 RULE_OPTION_VNC_PATH_AUTDEM_DESC: "Die alte Republik wird ausgerufen, und ein §aConsejo Ducałe§!, oder Herzoglicher Rat, unterstützt den neu gewählten Dogen Giuseppe Volpi.$VNC_PATH_REQUIREMENTS$"
 RULE_OPTION_VNC_PATH_PATAUT: "£KR_game_rule_flag_VNC  Großer Rat"
 RULE_OPTION_VNC_PATH_PATAUT_DESC: "Die Alte Republik wird ausgerufen, und ein wiedergeborener §PMaggior Consiglio§! , oder Großer Rat, unterstützt den neu gewählten Dogen Giovanni Ponti.$VNC_PATH_REQUIREMENTS$"

 VNC_FORPOL: "£KR_game_rule_flag_VNC  Venezianische Außenpolitik"
 RULE_OPTION_VNC_FORPOL_RANDOM: "Standard"
 RULE_OPTION_VNC_FORPOL_RANDOM_DESC: "Obwohl der Einfluss Österreichs in Venedig nach wie vor groß ist, sind die Venezianer nicht verpflichtet, ihm zu folgen."
 RULE_OPTION_VNC_FORPOL_AUS: "£KR_game_rule_flag_VNC  £KR_game_rule_flag_AUS  Donau-Adriabund"
 RULE_OPTION_VNC_FORPOL_AUS_DESC: "Venedig tritt dem Donau-Adria-Bund bei.$VNC_PATH_REQUIREMENTS$\n\n§RKein§! §CRat§! in §Y$VNC_PATH$§!"
 RULE_OPTION_VNC_FORPOL_GER: "£KR_game_rule_flag_VNC  £KR_game_rule_flag_GER  Reichspakt"
 RULE_OPTION_VNC_FORPOL_GER_DESC: "Venedig tritt dem Reichspakt bei.$VNC_PATH_REQUIREMENTS$\n§RKeine§! §CKatholische Liga§! in §Y$VNC_PATH$§!"
 RULE_OPTION_VNC_FORPOL_ENT: "£KR_game_rule_flag_VNC  £KR_game_rule_flag_CAN  Entente"
 RULE_OPTION_VNC_FORPOL_ENT_DESC: "Venedig tritt der Entente bei.$VNC_PATH_REQUIREMENTS$\n§RKeine§! §CKatholische Liga§! in §Y$VNC_PATH$§!"

 LOM_PATH: "£KR_game_rule_flag_LOM  Die Zukunft der Eisernen Krone"
 RULE_OPTION_LOM_PATH_RANDOM: "Standard"
 RULE_OPTION_LOM_PATH_RANDOM_DESC: "Nach dem Zusammenbruch der Italienischen Republik stand die neu unabhängige Region Lombardei vor einer Entscheidung: Sollte sie eine Lombardische Republik gründen oder Marcello Visconti auf den Thron einladen?"
 RULE_OPTION_LOM_PATH_REP_DESC: "Eine neue lombardische Republik wird ausgerufen,"
 RULE_OPTION_LOM_PATH_SOCCON_DESC: "und die §cPartito Popolare Lombardo§!, oder Lombardische Volkspartei, gewinnt die folgenden Wahlen"
 RULE_OPTION_LOM_PATH_REP_SOCCON: "£KR_game_rule_flag_LOM  Republik – Volkspartei"
 RULE_OPTION_LOM_PATH_REP_SOCCON_DESC: "$RULE_OPTION_LOM_PATH_REP_DESC$ $RULE_OPTION_LOM_PATH_SOCCON_DESC$$VNC_PATH_REQUIREMENTS$"
 RULE_OPTION_LOM_PATH_MARLIB_DESC: "und die §mPartito Liberale Lombarda§!, oder Lombardische Liberale Partei, gewinnt die folgenden Wahlen."
 RULE_OPTION_LOM_PATH_REP_MARLIB: "£KR_game_rule_flag_LOM  Republik – Liberale"
 RULE_OPTION_LOM_PATH_REP_MARLIB_DESC: "$RULE_OPTION_LOM_PATH_REP_DESC$$RULE_OPTION_LOM_PATH_MARLIB_DESC$$VNC_PATH_REQUIREMENTS$"
 RULE_OPTION_LOM_PATH_SOCLIB_DESC: "und die §lPartito Liberale Democratico§!, oder Liberaldemokratische Partei, gewinnt die folgenden Wahlen."
 RULE_OPTION_LOM_PATH_REP_SOCLIB: "£KR_game_rule_flag_LOM  Republik - Liberaldemokraten"
 RULE_OPTION_LOM_PATH_REP_SOCLIB_DESC: "$RULE_OPTION_LOM_PATH_REP_DESC$$RULE_OPTION_LOM_PATH_SOCLIB_DESC$$VNC_PATH_REQUIREMENTS$"
 RULE_OPTION_LOM_PATH_SOCDEM: "£KR_game_rule_flag_LOM  Republik - Demokratische Reformisten"
 RULE_OPTION_LOM_PATH_SOCDEM_DESC: "$RULE_OPTION_LOM_PATH_REP_DESC$ und die §SLega Democratica Riformista§!, oder Demokratische Reformistenliga, gewinnt die folgenden Wahlen.$VNC_PATH_REQUIREMENTS$"
 RULE_OPTION_LOM_PATH_NATPOP: "£KR_game_rule_flag_LOM  Republik - Lombardische Liga"
 RULE_OPTION_LOM_PATH_NATPOP_DESC: "$RULE_OPTION_LOM_PATH_REP_DESC$ und die §nLega Longobarda§!, oder Lombardische Liga, gewinnt die folgenden Wahlen.$VNC_PATH_REQUIREMENTS$"
 RULE_OPTION_LOM_PATH_MON_DESC: "Ein Herzogtum wird unter der verfassungsmäßigen Herrschaft von Marcello Visconti ausgerufen,"
 RULE_OPTION_LOM_PATH_MON_SOCCON: "£KR_game_rule_flag_LOM_mon  Monarchie - Volkspartei"
 RULE_OPTION_LOM_PATH_MON_SOCCON_DESC: "$RULE_OPTION_LOM_PATH_MON_DESC$ $RULE_OPTION_LOM_PATH_SOCCON_DESC$$VNC_PATH_REQUIREMENTS$"
 RULE_OPTION_LOM_PATH_MON_MARLIB: "£KR_game_rule_flag_LOM_mon  Monarchie - Liberale"
 RULE_OPTION_LOM_PATH_MON_MARLIB_DESC: "$RULE_OPTION_LOM_PATH_MON_DESC$ $RULE_OPTION_LOM_PATH_MARLIB_DESC$$VNC_PATH_REQUIREMENTS$"
 RULE_OPTION_LOM_PATH_MON_SOCLIB: "£KR_game_rule_flag_LOM_mon  Monarchie - Liberaldemokraten"
 RULE_OPTION_LOM_PATH_MON_SOCLIB_DESC: "$RULE_OPTION_LOM_PATH_MON_DESC$ $RULE_OPTION_LOM_PATH_SOCLIB_DESC$$VNC_PATH_REQUIREMENTS$"
 RULE_OPTION_LOM_PATH_PATAUT: "£KR_game_rule_flag_LOM_mon  Monarchie – Haus Visconti"
 RULE_OPTION_LOM_PATH_PATAUT_DESC: "Ein Herzogtum wird unter der absoluten Herrschaft von Marcello Visconti und der §PCasa di Visconti§!, oder dem Haus Visconti, ausgerufen.$VNC_PATH_REQUIREMENTS$"

 LOM_FORPOL: "£KR_game_rule_flag_LOM  Lombardische Außenpolitik"
 RULE_OPTION_LOM_FORPOL_RANDOM: "Standard"
 RULE_OPTION_LOM_FORPOL_RANDOM_DESC: "Obwohl der Einfluss Österreichs in der Lombardei nach wie vor groß ist, ist sie nicht verpflichtet, diesem zu folgen."
 RULE_OPTION_LOM_FORPOL_AUS: "£KR_game_rule_flag_LOM  £KR_game_rule_flag_AUS  Donau-Adriabund"
 RULE_OPTION_LOM_FORPOL_AUS_DESC: "Die Lombardei tritt dem Donau-Adriabund bei.$VNC_PATH_REQUIREMENTS$\n§CEine §CMonarchie§! in §Y$LOM_PATH$§!"
 RULE_OPTION_LOM_FORPOL_GER: "£KR_game_rule_flag_LOM  £KR_game_rule_flag_GER  Reichspakt"
 RULE_OPTION_LOM_FORPOL_GER_DESC: "Die Lombardei tritt dem Reichspakt bei.$VNC_PATH_REQUIREMENTS$\n\n§RKeine§! §CRepublik – Demokratische Reformisten§! oder §CRepublik – Lombardische Liga§! in §Y$LOM_PATH$§!"
 RULE_OPTION_LOM_FORPOL_RUS: "£KR_game_rule_flag_LOM  £KR_game_rule_flag_RUS  Moskauer Abkommen"
 RULE_OPTION_LOM_FORPOL_RUS_DESC: "Die Lombardei tritt dem Moskauer Abkommen bei.$VNC_PATH_REQUIREMENTS$\n§CRepublik§! in §Y$LOM_PATH$§!\n\n§CEntweder die Sozialistische Republik Italien oder Deutschland werden besiegt.§!\n\n$RUS_AFTERMATH_NOT_SOC_REQUIREMENTS$"
 RULE_OPTION_LOM_FORPOL_BPL: "£KR_game_rule_flag_LOM  £KR_game_rule_flag_SER  Belgrader Pakt"
 RULE_OPTION_LOM_FORPOL_BPL_DESC: "Die Lombardei tritt dem Belgrader Pakt bei.\n\n§RBenötigt:§!\n§CTrentino wird von einem Verbündeten Österreichs kontrolliert§! oder\n§CTrentino wird von einem Verbündeten Deutschlands kontrolliert§! oder\n§CSozialistische Republik§! in §Y$RUS_AFTERMATH$§! oder\n§CRDP - Sulimow§! in §Y$RUS_PATH$§!\n\n§CDie Republik ist aufgelöst§! in §Y$ITA_PATH$§!\nEine §CRepublik§! in §Y$LOM_PATH$§!\n\n§RKein§! §CSozialistische Arbeiter§! in §Y$SER_PATH$§!"

PAP_PATH: "£KR_game_rule_flag_PAP   Der neue Papst"
RULE_OPTION_PAP_PATH_RANDOM: "Standard"
RULE_OPTION_PAP_PATH_RANDOM_DESC: "Das Konklave kann einen von vier Männern zum neuen Papst wählen."
RULE_OPTION_PAP_PATH_NATPOP: "£KR_game_rule_flag_PAP   Julius IV."
RULE_OPTION_PAP_PATH_NATPOP_DESC: "Julius IV. wird gewählt und stärkt durch die §nUltramontanisti§!, oder Ultramontanisten, seine weltliche Macht."
RULE_OPTION_PAP_PATH_PATAUT: "£KR_game_rule_flag_PAP   Pius XII."
RULE_OPTION_PAP_PATH_PATAUT_DESC: "Pius XII. wird gewählt und stärkt durch den §PStato Ecclesiastico§!, oder Kirchenstaat, seine weltliche Macht."
RULE_OPTION_PAP_PATH_SOCCON: "£KR_game_rule_flag_PAP_rome  Stephen X."
 RULE_OPTION_PAP_PATH_SOCCON_DESC: "Stephen X wird gewählt und gibt seine weltliche Macht ab. Die §cMovimento Sociale Latino§!, oder Lateinische Sozialbewegung, ist bei den folgenden Wahlen erfolgreich."
RULE_OPTION_PAP_PATH_SOCDEM: "£KR_game_rule_flag_PAP_rome  John XXIII"
 RULE_OPTION_PAP_PATH_SOCDEM_DESC: "Johannes XXIII. wird gewählt und gibt seine weltliche Macht ab. Die §SAlleanza Cristiana Democratica§!, oder Christlich-Demokratische Allianz, ist bei den folgenden Wahlen erfolgreich."

 SIC_PATH: "£KR_game_rule_flag_SIC  Demokratie im Mezzogiorno"
 RULE_OPTION_SIC_PATH_RANDOM: "Standard"
 RULE_OPTION_SIC_PATH_RANDOM_DESC: "Die Wahl von 1937 entscheidet darüber, ob das sizilianische Volk weiterhin in einer Demokratie lebt oder dem Integralismus verfällt."
 RULE_OPTION_SIC_PATH_SOCCON: "£KR_game_rule_flag_SIC  Christdemokraten"
 RULE_OPTION_SIC_PATH_SOCCON_DESC: "Die §cPartito Democratico Cristiano§!, oder Christdemokratische Partei, geht als Sieger aus den Wahlen hervor."
 RULE_OPTION_SIC_PATH_SOCLIB: "£KR_game_rule_flag_SIC  Christdemokratie"
 RULE_OPTION_SIC_PATH_SOCLIB_DESC: "§lDemocrazia Cristiana§!, oder Christdemokratie, geht als Sieger aus den Wahlen hervor."
 RULE_OPTION_SIC_PATH_SOCDEM: "£KR_game_rule_flag_SIC  Volksdemokraten"
 RULE_OPTION_SIC_PATH_SOCDEM_DESC: "Die §SPartito Popolare Democratico§!, oder Volksdemokratische Partei, geht als Sieger aus den Wahlen hervor."
 RULE_OPTION_SIC_PATH_AUTDEM: "£KR_game_rule_flag_SIC  Agrarier"
 RULE_OPTION_SIC_PATH_AUTDEM_DESC: "Die §aPartito Agrario§!, oder Agrarpartei, geht als Siegerin aus den Wahlen hervor."
 RULE_OPTION_SIC_PATH_NATPOP: "£KR_game_rule_flag_SIC  Integralisten"
 RULE_OPTION_SIC_PATH_NATPOP_DESC: "Die §nIntegralisti d'e Ddoje Sicilie§!, oder Integralisten der beiden Sizilien, gehen als Sieger aus den Wahlen hervor und beginnen mit der Umgestaltung des Königreichs."

 SIC_FORPOL: "£KR_game_rule_flag_SIC  Sizilianische Außenpolitik"
 RULE_OPTION_SIC_FORPOL_RANDOM: "Standard"
 RULE_OPTION_SIC_FORPOL_RANDOM_DESC: "Aufgrund der strategischen Lage Siziliens im südlichen Mittelmeerraum ist es nicht verwunderlich, dass verschiedene regionale und globale Mächte bereit sind, Sizilien an ihrer Seite zu haben."
 RULE_OPTION_SIC_FORPOL_AUS: "£KR_game_rule_flag_SIC  £KR_game_rule_flag_AUS  Donau-Adriabund"
 RULE_OPTION_SIC_FORPOL_AUS_DESC: "Das Königreich Beider Sizilien tritt dem Donau-Adriabund bei."
 RULE_OPTION_SIC_FORPOL_GER: "£KR_game_rule_flag_SIC  £KR_game_rule_flag_GER  Reichspakt"
 RULE_OPTION_SIC_FORPOL_GER_DESC: "Das Königreich Beider Sizilien tritt dem Reichspakt bei."
 RULE_OPTION_SIC_FORPOL_ENT: "£KR_game_rule_flag_SIC  £KR_game_rule_flag_CAN  Entente"
 RULE_OPTION_SIC_FORPOL_ENT_DESC: "Das Königreich Beider Sizilien tritt der Entente bei."

 SIC_UNIFIED: "£KR_game_rule_flag_SIC  Der Stiefel, unter dem Bourbon Absatz"
 SIC_UNIFIED_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CThe Kingdom of Two Sicilies reunites Italy§!"
 RULE_OPTION_SIC_UNIFIED_RANDOM: "Standard"
 RULE_OPTION_SIC_UNIFIED_RANDOM_DESC: "Der agrarisch geprägte und relativ wenig industrialisierte Süden Italiens überwindet alle Widrigkeiten und schafft es, die Halbinsel unter der Herrschaft von König Ferdinand III. zu vereinen. Die Frage ist nun, ob der König und seine Regierung ein neues, vereinigtes italienisches Reich ausrufen oder ein stärker regionalisiertes, dezentralisiertes Italien in die Zukunft führen werden."
 RULE_OPTION_SIC_UNIFIED_START_DESC: "Nach dem erfolgreichen Sieg über die Sozialistische Republik Italien erklärte das Königreich Beider Sizilien"
 RULE_OPTION_SIC_UNIFIED_EMPIRE: "£KR_game_rule_flag_SIC_ITA  Italienisches Imperium"
 RULE_OPTION_SIC_UNIFIED_EMPIRE_DESC: "$RULE_OPTION_SIC_UNIFIED_START_DESC$ zum Ersten Italienischen Kaiserreich erklärt, das von den Bourbonen regiert wird.$SIC_UNIFIED_REQUIREMENTS$"
 RULE_OPTION_SIC_UNIFIED_CONFED: "£KR_game_rule_flag_SIC  Italienische Konföderation"
 RULE_OPTION_SIC_UNIFIED_CONFED_DESC: "$RULE_OPTION_SIC_UNIFIED_START_DESC$ reformiert die Halbinsel zu einer Konföderation autonomer italienischer Staaten.$SIC_UNIFIED_REQUIREMENTS$"

 SRD_PATH: "£KR_game_rule_flag_SRD  Das Haus von Savoyen"
 RULE_OPTION_SRD_PATH_RANDOM: "Standard"
 RULE_OPTION_SRD_PATH_RANDOM_DESC: "Sardinien, das vom Haus Savoie regiert wird, ist gespalten zwischen Autoritarismus und Konstitutionalismus. Premierminister Bardanzellu ist zurückgetreten, und König Amedeo muss einen Nachfolger ernennen, was ihm eine willkommene Gelegenheit bietet, Sardinien in eine Richtung zu lenken, die er für richtig hält."
 RULE_OPTION_SRD_PATH_PATAUT: "£KR_game_rule_flag_SRD  Nationaler Block"
 RULE_OPTION_SRD_PATH_PATAUT_DESC: "König Amedeo ernennt den autokratischen Marschall Badoglio. Der Marschall festigt seine Macht und führt den §PBlocco Nazionale§!, oder Nationalblock, an, der an der Macht bleibt, wenn Sardinien mit seiner Rückeroberung erfolgreich ist."
 RULE_OPTION_SRD_PATH_LIBERALS_DESC: "King Amedeo appoints the autocratic Marshal Badoglio. The Marshal fails to consolidate power around himself, and the King relieves him of his command, replacing him with §PGoverno Paolo Thaon di Revel§!.\nThaon di Revel führt Sardinien an,"
 RULE_OPTION_SRD_PATH_AUTDEM: "£KR_game_rule_flag_SRD  Rechte Liberale"
 RULE_OPTION_SRD_PATH_AUTDEM_DESC: "$RULE_OPTION_SRD_PATH_LIBERALS_DESC$ die nach der Rückkehr zur Demokratie nach dem Vorbild des Italiens vor 1912 unter der Führung des rechten Flügels der §aUnione Liberale§!, oder Liberalen Union."
 RULE_OPTION_SRD_PATH_AUT_MARLIB: "£KR_game_rule_flag_SRD  Linke Liberale"
 RULE_OPTION_SRD_PATH_AUT_MARLIB_DESC: "$RULE_OPTION_SRD_PATH_LIBERALS_DESC$ die nach der Rückkehr zu einer Demokratie nach dem Vorbild des Italiens vor 1912 , angeführt vom linken Flügel der §mUnione Liberale§!, oder Liberalen Union."
 RULE_OPTION_SRD_PATH_DEM_DESC: "König Amedeo ernennt den unpolitischen Technokraten General Marras. Die Reformisten in Sardinien drängen erfolgreich auf eine weitere Demokratisierung, und es werden Wahlen abgehalten."
 RULE_OPTION_SRD_PATH_SOCCON: "£KR_game_rule_flag_SRD  Demokraten"
 RULE_OPTION_SRD_PATH_SOCCON_DESC: "$RULE_OPTION_SRD_PATH_DEM_DESC$\nDie §cUnione Democratica Sarda§!, oder Sardische Demokratische Union, bildet eine Mitte-Rechts-Koalition mit Monarchisten, die an der Macht bleibt, wenn das Mutterland als §cDemocrazia Cristiana§!, oder Christdemokratie, wiederhergestellt wird."
 RULE_OPTION_SRD_PATH_DEM_MARLIB: "£KR_game_rule_flag_SRD  Liberale"
 RULE_OPTION_SRD_PATH_DEM_MARLIB_DESC: "$RULE_OPTION_SRD_PATH_DEM_DESC$\nDie §mUnione Liberale§!, oder Liberale Union, bildet eine Koalition der Mitte mit den Demokraten. Die Liberalen bleiben als Partito Liberale Italiano, oder §mItalienische Liberale Partei§!, an der Macht, wenn das Mutterland wiederhergestellt wird."
 RULE_OPTION_SRD_PATH_SOCLIB: "£KR_game_rule_flag_SRD  Sardisten /  Nationales Zentrum"
 RULE_OPTION_SRD_PATH_SOCLIB_DESC: "$RULE_OPTION_SRD_PATH_DEM_DESC$\nDie §lPartito Sardo d'Azione§!, oder Sardische Aktionspartei, auch bekannt als die Sardisten, werden gewählt und Camillo Bellieni führt die Regierung an.\nDie Gemäßigten innerhalb der Sardisten spalten sich nach der Wiederherstellung des Festlandes von der Partei ab, und es entsteht das §lNationale Zentrum§!, das an der Macht bleibt."
 RULE_OPTION_SRD_PATH_SOCDEM: "£KR_game_rule_flag_SRD  Sardisten / Sozialistische Arbeiterpartei"
 RULE_OPTION_SRD_PATH_SOCDEM_DESC: "$RULE_OPTION_SRD_PATH_DEM_DESC$\nDie §SPartito Sardo d'Azione§!, oder Sardische Aktionspartei, auch bekannt als die Sardisten, werden gewählt und Giovanni Battista Melis führt die Regierung an.\nDie Sardisten spalten sich nach der Wiederherstellung des Mutterlandes und die Überreste der Partei bleiben an der Macht und bilden die §SPartito Socialista dei Lavoratori Italiani§!, oder Italienische Sozialistische Arbeiterpartei."
 
 ###  Länderpfade – Zentral-/Nordeuropa  ###
 RULE_GROUP_KAISERREICH_RULES_CN_EUROPE: "Länderpfade - Mittel- / Nordeuropa"

 GER_PATH: "£KR_game_rule_flag_GER  Das Ende des März"
 RULE_OPTION_GER_PATH_RANDOM: "Standard"
 RULE_OPTION_GER_PATH_RANDOM_DESC: "Nach jahrelangem Ränkespiel wird Kurt von Schleicher, der preußische Kriegsminister, zum Reichskanzler ernannt, als die Wahlen in Deutschland nach dem Schwarzen Montag keine Mehrheit im Reichstag ergeben. Er muss sich mit der Opposition von links und rechts auseinandersetzen und gleichzeitig versuchen, das Kaiserreich in einen stärkeren, dauerhaften \"Neuen Staat\" umzuwandeln."
 RULE_OPTION_GER_PATH_START_DESC: "Kurt von Schleicher wird zum Reichskanzler ernannt, als die Wahlen in Deutschland nach dem Schwarzen Montag keine Mehrheit im Reichstag ergeben."
 RULE_OPTION_GER_PATH_SCHLEICHER_DESC: "Später veranlasst ihn ein Versuch einer sozialistischen Revolution dazu, das Ermächtigungsgesetz zu verabschieden, wodurch er die Macht seines §aKabinett Schleicher§!, oder Schleicher-Kabinetts, sichert und ihm ermöglicht, Deutschland gemäß seinem zentralistischen und militaristischen Bild umzugestalten.\nNach dem Sieg im Zweiten Weltkrieg führt sein Nachfolger das Erbe des"
 RULE_OPTION_GER_PATH_SCHLEICHER_END_DESC: "der den Neuen Staat regiert, den Schleicher errichtet, mit einem Regime, das Deutschland für die kommenden Jahrzehnte regieren soll."
 RULE_OPTION_GER_PATH_SCHLEICHER_AUTDEM: "£KR_game_rule_flag_GER  Kabinett Schleicher - Moderat"
 RULE_OPTION_GER_PATH_SCHLEICHER_AUTDEM_DESC: "$RULE_OPTION_GER_PATH_START_DESC$\n$RULE_OPTION_GER_PATH_SCHLEICHER_DESC$ eine gemäßigtere §aDeutschnationale Einheitsfront§! $RULE_OPTION_GER_PATH_SCHLEICHER_END_DESC$"
 RULE_OPTION_GER_PATH_SCHLEICHER_PATAUT: "£KR_game_rule_flag_GER  Kabinett Schleicher - Harte Linie"
 RULE_OPTION_GER_PATH_SCHLEICHER_PATAUT_DESC: "$RULE_OPTION_GER_PATH_START_DESC$\n$RULE_OPTION_GER_PATH_SCHLEICHER_DESC$ Harte Linie §PDeutschnationale Einheitsfront§!, $RULE_OPTION_GER_PATH_SCHLEICHER_END_DESC$"
 RULE_OPTION_GER_PATH_SCHLEICHER_GONE_DESC: "£KR_game_rule_flag_GER  Schleichers Amtszeit wird abgebrochen,"
 RULE_OPTION_GER_PATH_DU_DESC: "und ihre Verbündeten stürzen seine Regierung, um parlamentarische Reformen durchzusetzen und einen Sozialstaat zu errichten.\nIn den Wahlen nach dem Sieg im Zweiten Weltkrieg,"
 RULE_OPTION_GER_PATH_SOCDEM: "£KR_game_rule_flag_GER  Demokratische Union - SPD Nachkriegszeit"
 RULE_OPTION_GER_PATH_SOCDEM_DESC: "$RULE_OPTION_GER_PATH_START_DESC$\n$RULE_OPTION_GER_PATH_SCHLEICHER_GONE_DESC$ als §SSozialdemokratische Partei Deutschlands§!, $RULE_OPTION_GER_PATH_DU_DESC$ bleibt die SPD an der Macht."
 RULE_OPTION_GER_PATH_SOCCON: "£KR_game_rule_flag_GER  Demokratische Union - CVP Nachkriegszeit"
 RULE_OPTION_GER_PATH_SOCCON_DESC: "$RULE_OPTION_GER_PATH_START_DESC$\n$RULE_OPTION_GER_PATH_SCHLEICHER_GONE_DESC$ als die §SSPD§! $RULE_OPTION_GER_PATH_DU_DESC$ die §cChristliche Volkspartei§! sind siegreich."
 RULE_OPTION_GER_PATH_SWR_DESC: "als die Koalition Schwarz-Weiß-Rot und ihre Verbündeten seine Regierung stürzen, um die Reformen der Märzverfassung rückgängig zu machen und das §PKabinett Kleist-Schmenzin§!, oder das Kabinett von Kleist-Schmenzin, zu bilden.\nNach dem Sieg im Zweiten Weltkrieg schließt sich die deutsche Rechte in der"
 RULE_OPTION_GER_PATH_SWR_END_DESC: "oder Deutschnationale Volksunion, maßgeblich beeinflusst durch die"
 RULE_OPTION_GER_PATH_SWR_PATAUT: "£KR_game_rule_flag_GER  Koalition S-W-R - DVLP dominiert"
 RULE_OPTION_GER_PATH_SWR_PATAUT_DESC: "$RULE_OPTION_GER_PATH_START_DESC$\n$RULE_OPTION_GER_PATH_SCHLEICHER_GONE_DESC$ $RULE_OPTION_GER_PATH_SWR_DESC$ §PDeutschnationaler Volksbund§!, $RULE_OPTION_GER_PATH_SWR_END_DESC$ Deutsche Vaterlandspartei."
 RULE_OPTION_GER_PATH_SWR_AUTDEM: "£KR_game_rule_flag_GER  Koalition S-W-R - DkP dominiert"
 RULE_OPTION_GER_PATH_SWR_AUTDEM_DESC: "$RULE_OPTION_GER_PATH_START_DESC$\n$RULE_OPTION_GER_PATH_SCHLEICHER_GONE_DESC$ $RULE_OPTION_GER_PATH_SWR_DESC$ §aDeutschnationaler Volksbund§!, $RULE_OPTION_GER_PATH_SWR_END_DESC$ Deutschkonservative Partei."
 RULE_OPTION_GER_PATH_SOCLIB: "£KR_game_rule_flag_GER  Kabinett Goerdeler - LVP Nachkriegszeit"
 RULE_OPTION_GER_PATH_SOCLIB_DESC: "$RULE_OPTION_GER_PATH_START_DESC$\n$RULE_OPTION_GER_PATH_SCHLEICHER_GONE_DESC$ als eine vom Freistaat Bayern vorgebrachte Klage ihn zwingt, als Reichskanzler zurückzutreten, und er durch das §aKabinett Goerdeler§! unter der Führung von Carl Friedrich Goerdeler ersetzt wird.\nNach dem Sieg im Zweiten Weltkrieg finden Wahlen statt, die die Liberale Volkspartei§! gewinnt."

 GER_CARD_GAME: "£KR_game_rule_flag_GER  Schwarzer Montag Kartenspiel"
 RULE_OPTION_GER_CARD_GAME_RANDOM: "Standard"
 RULE_OPTION_GER_CARD_GAME_RANDOM_DESC: "Die Krise des Schwarzen Montags wird mit einem Mechanismus gelöst, der auf Tischkartenspielen basiert."
 RULE_OPTION_GER_CARD_GAME_DISABLED: "£KR_game_rule_flag_GER  Kartenspiel gesperrt"
 RULE_OPTION_GER_CARD_GAME_DISABLED_DESC: "Wenn Sie einen weniger intensiven Spielverlauf wünschen und/oder nicht möchten, dass das Kartenspiel Sie im Mehrspielermodus ablenkt, können Sie das Kartenspiel hier deaktivieren. Allerdings verläuft die Erholung vom Schwarzen Montag dann deutlich langsamer."

 POL_ELECTION: "£KR_game_rule_flag_POL  Die Sejm-Wahlen"
 POL_ELECTION_AUS_REQUIREMENTS: "\n\n§RBenötigt:§!\n§RNot§! §CEnd the Dual Rule§! in §Y$AUS_AUSGLEICH$§!"
 RULE_OPTION_POL_ELECTION_RANDOM: "Standard"
 RULE_OPTION_POL_ELECTION_RANDOM_DESC: "Die Wahlen zum Sejm, dem Unterhaus der Legislative des Königreichs Polen, im Jahr 1938 sind noch völlig offen. Es ist nicht sicher, dass die amtierende Regierungskoalition aus dem monarchistischen Interpartisan Circle und der gemäßigt nationalistischen Chjena die Wahl überstehen wird, und sogar der Status der Monarchie selbst könnte in Frage gestellt werden."
 RULE_OPTION_POL_ELECTION_MON_DESC: "Sie streben danach, Teil des Reichspakts zu bleiben und die Monarchie beizubehalten."
 RULE_OPTION_POL_ELECTION_MARLIB: "£KR_game_rule_flag_POL  £KR_game_rule_flag_GER  Monarchie – MKP"
 RULE_OPTION_POL_ELECTION_MARLIB_DESC: "Die Regierungskoalition überlebt, wobei Antoni Ponikowskis §mMiędzypartyjne Koło Polityczne§! oder Überparteilicher Politischer Kreis sich erneut mit der Chjena verbündet und die größte Partei in der Regierung wird.\n$RULE_OPTION_POL_ELECTION_MON_DESC."
 RULE_OPTION_POL_ELECTION_SOCCON: "£KR_game_rule_flag_POL  £KR_game_rule_flag_GER  Monarchie – Chjena"
 RULE_OPTION_POL_ELECTION_SOCCON_DESC: "Die Regierungskoalition bleibt bestehen, obwohl Józef Chacińskis §cChrześcijański Związek Jedności Narodowej§!, oder Christliche Union der Nationalen Einheit, auch bekannt als Chjena, mehr Sitze als der Kreis gewinnt und damit zur größten Partei in der Regierung wird\n$RULE_OPTION_POL_ELECTION_MON_DESC$, obwohl sie versucht, sich leicht vom deutschen Einfluss zu distanzieren."
 RULE_OPTION_POL_ELECTION_AUTDEM: "£KR_game_rule_flag_POL  £KR_game_rule_flag_GER  Monarchie – MKP-SP"
 RULE_OPTION_POL_ELECTION_AUTDEM_DESC: "Der autoritäre und offen pro-deutsche Flügel des Kreises, Władysław Studnickis §aStronnictwo Państwowe§!, oder Staatspartei, wird nach einer spaltenden Wahl vom König eingesetzt, um Ordnung und Stabilität aufrechtzuerhalten."
 RULE_OPTION_POL_ELECTION_REP_DESC: "Das Mitte-Links-Bündnis aus PPS und PSL gewinnt die Wahlen auf einem gemeinsamen Wahlzettel und bildet eine links-liberale Regierung. Sie werden jedoch umgehend vom König abgesetzt, der eine pro-deutsche Regierung einsetzt, die bald durch Massenproteste gestürzt wird. Daraufhin dankt der König ab und die Zweite Polnische Republik wird gegründet,"
 RULE_OPTION_POL_ELECTION_REP_AUS_DESC: "tritt formell in die Sphäre Österreichs ein und strebt die Vereinigung mit Galizien und Lodomerien an."
 RULE_OPTION_POL_ELECTION_SOCDEM_AUS: "£KR_game_rule_flag_POL  £KR_game_rule_flag_AUS  Republik - PPS (Donau-Adriabund)"
 RULE_OPTION_POL_ELECTION_SOCDEM_AUS_DESC: "$RULE_OPTION_POL_ELECTION_REP_DESC$ unter der Führung von Norbert Barlickis §SPolska Partia Socjalistyczna§!, oder Polnische Sozialistische Partei, in Koalition mit der PSL.\nDie neue Republik $RULE_OPTION_POL_ELECTION_REP_AUS_DESC$$POL_ELECTION_AUS_REQUIREMENTS$"
 RULE_OPTION_POL_ELECTION_SOCLIB_AUS: "£KR_game_rule_flag_POL  £KR_game_rule_flag_AUS  Republik - PSL (Donau-Adriabund)"
 RULE_OPTION_POL_ELECTION_SOCLIB_AUS_DESC: "$RULE_OPTION_POL_ELECTION_REP_DESC$ unter der Führung von Maksymilian Malinowskis §lPolskie Stronnictwo Ludowe§!, oder Polnische Volkspartei, in Koalition mit der PPS.\nDie neue Republik $RULE_OPTION_POL_ELECTION_REP_AUS_DESC$$POL_ELECTION_AUS_REQUIREMENTS$"
 RULE_OPTION_POL_ELECTION_REP_SOCCON_DESC: "Nach einer Kontroverse über die Liberalisierung wird die Regierung von Mitgliedern der Armee, die mit der §cChjena§! verbündet sind, durch einen Putsch gestürzt, und Władysław Grabski wird als Präsident eingesetzt."
 RULE_OPTION_POL_ELECTION_REP_SOCCON_AUS: "£KR_game_rule_flag_POL  £KR_game_rule_flag_AUS  Republik - Chjena (Donau-Adriabund)"
 RULE_OPTION_POL_ELECTION_REP_SOCCON_AUS_DESC: "$RULE_OPTION_POL_ELECTION_REP_DESC$, welche $RULE_OPTI_POL_ELECTION_REP_AUS_DESC$\n$RULE_OPTION_POL_ELECTION_REP_SOCCON_DESC$$POL_ELECTION_AUS_REQUIREMENTS$"
 RULE_OPTION_POL_ELECTION_REP_GER_DESC: "tritt erneut dem Reichspakt bei und wird wieder ein deutscher Oststaat, diesmal jedoch ohne König."
 RULE_OPTION_POL_ELECTION_SOCDEM_GER: "£KR_game_rule_flag_POL  £KR_game_rule_flag_GER  Republik - PPS (Reichspakt)"
 RULE_OPTION_POL_ELECTION_SOCDEM_GER_DESC: "$RULE_OPTION_POL_ELECTION_REP_DESC$ unter der Führung von Norbert Barlickis §SPPS§!, in Koalition mit der PSL.\nDie neue Republik $RULE_OPTION_POL_ELECTION_REP_GER_DESC$."
 RULE_OPTION_POL_ELECTION_SOCLIB_GER: "£KR_game_rule_flag_POL  £KR_game_rule_flag_GER  Republik - PSL (Reichspakt)"
 RULE_OPTION_POL_ELECTION_SOCLIB_GER_DESC: "$RULE_OPTION_POL_ELECTION_REP_DESC$ unter der Führung von Maksymilian Malinowskis §lPSL§!, in Koalition mit der PPS. \nDie neue Republik $RULE_OPTION_POL_ELECTION_REP_GER_DESC$"
 RULE_OPTION_POL_ELECTION_REP_SOCCON_GER: "£KR_game_rule_flag_POL  £KR_game_rule_flag_GER  Republik - Chjena (Reichspakt)"
 RULE_OPTION_POL_ELECTION_REP_SOCCON_GER_DESC: "$RULE_OPTION_POL_ELECTION_REP_DESC$ die $RULE_OPTION_POL_ELECTION_REP_GER_DESC$\n$RULE_OPTION_POL_ELECTION_REP_SOCCON_DESC$"

 POL_REVOLTS: "£KR_game_rule_flag_POL Der Weg des Widerstands"
 POL_REVOLTS_NATPOP_REQUIREMENTS: "\n\n§RBenötigt:§!\n§Rkeine§! §CChjena§! Regierung in §Y$POL_ELECTION$§!$RUS_AFTERMATH_NOT_SOC_REQUIREMENTS$\n\n$RULE_OPTION_POL_REVOLTS_NATIONALIST_NOTE_DESC$"
 POL_REVOLTS_PATAUT_REQUIREMENTS: "\n\n§RBenötigt:§!$RUS_AFTERMATH_NOT_SOC_REQUIREMENTS$"
 RULE_OPTION_POL_REVOLTS_RANDOM: "Standard"
 RULE_OPTION_POL_REVOLTS_RANDOM_DESC: "Der Sieger der Wahlen von 1938 steht zwar fest, aber das bedeutet nicht, dass seine Herrschaft sicher ist. Kräfte links und rechts von der herrschenden Regierung Polens versuchen mit Hilfe ihrer Gönner, die Kontrolle über das Land durch bewaffnete Aufstände zu erlangen, die während des Weltkriegs stattfinden können."
 RULE_OPTION_POL_REVOLTS_NO_REVOLT: "£KR_game_rule_flag_POL  £KR_game_rule_flag_GER  £KR_game_rule_flag_AUS  Keine Revolte"
 RULE_OPTION_POL_REVOLTS_NO_REVOLT_DESC: "Die polnische Regierung wehrt ihre extremistischen Herausforderer ab und bleibt ihrem deutschen oder österreichischen Verbündeten treu."
 RULE_OPTION_POL_REVOLTS_ZAKRZEWSKI_DESC: "Der Vorsitzende Kazimierz Zakrzewski führt die sozialistische Revolution an, nachdem er von der Provisorischen Revolutionsregierung mit Notstandsbefugnissen ausgestattet wurde."
 RULE_OPTION_POL_REVOLTS_SOC_NOTE_DESC: "§CHinweis: Die sozialistische Revolte kann nur voranschreiten, wenn die Dritte Internationale den Rhein überquert oder wenn Russland sozialistisch ist und die Ostfront des Reichspakts ins Wanken gerät.§!"
 RULE_OPTION_POL_REVOLTS_TOTALIST: "£KR_game_rule_flag_POL_soc  £KR_game_rule_flag_FRA  £KR_game_rule_flag_RUS_soc  Sozialisten - ZSP Radikale"
 RULE_OPTION_POL_REVOLTS_TOTALIST_DESC: "$RULE_OPTION_POL_REVOLTS_ZAKRZEWSKI$_DESC\nMit der Unterstützung des Radikalen Flügels des §oZwiązek Syndykalistów Polskich§!, oder Union der polnischen Syndikalisten, hält er diese Notstandsbefugnisse um der Revolution willen aufrecht und bleibt oberster Führer.\n\n$RULE_OPTION_POL_REVOLTS_SOC_NOTE_DESC$"
 RULE_OPTION_POL_REVOLTS_ELECTIONS_DESC: "Nachdem er auf diese Befugnisse verzichtet hat, werden Wahlen abgehalten, die von"
 RULE_OPTION_POL_REVOLTS_SYNDIE: "£KR_game_rule_flag_POL_soc  £KR_game_rule_flag_FRA  £KR_game_rule_flag_RUS_soc  Sozialisten - ZSP / SZW"
 RULE_OPTION_POL_REVOLTS_SYNDIE_DESC: "$RULE_OPTION_POL_REVOLTS_ZAKRZEWSKI_DESC$\n$RULE_OPTION_POL_REVOLTS_ELECTIONS_DESC$ entweder von Zakrzewki und seinen Anhängern im §rZwiązek Syndykalistów Polskich§!, oder Union der Polnischen Syndikalisten, oder durch ihre syndikalistische und anarchistische Opposition in der §rSyndykalistyczny Związek \"Wolność\"§! oder Syndikalistische Union \"Freiheit\".\n\n$RULE_OPTION_POL_REVOLTS_SOC_NOTE_DESC$"
 RULE_OPTION_POL_REVOLTS_RADSOC: "£KR_game_rule_flag_POL_soc  £KR_game_rule_flag_FRA  £KR_game_rule_flag_RUS_soc  Sozialisten - PPS-L"
 RULE_OPTION_POL_REVOLTS_RADSOC_DESC: "$RULE_OPTION_POL_REVOLTS_ZAKRZEWSKI_DESC$\n$RULE_OPTION_POL_REVOLTS_ELECTIONS_DESC$ die vergleichsweise gemäßigte §RPolska Partia Socjalistyczna - Lewica§! oder der linke Flügel der Polnischen Sozialistischen Partei.\n\n$RULE_OPTION_POL_REVOLTS_SOC_NOTE_DESC$"
 RULE_OPTION_POL_REVOLTS_NATIONALIST_NOTE_DESC: "§CAnmerkung: Der nationalistische Aufstand kann nur weitergehen, wenn die Ostfront des Reichspakts ins Wanken gerät.§!"
 RULE_OPTION_POL_REVOLTS_NATPOP: "£KR_game_rule_flag_POL  £KR_game_rule_flag_RUS  Nationalisten - ON"
 RULE_OPTION_POL_REVOLTS_NATPOP_DESC: "Adam Doboszyński, der unwahrscheinliche Nachfolger von Roman Dmowski, führt einen nationalistischen Aufstand gegen die herrschende polnische Regierung an. Nachdem er sich in dem Konflikt bewährt und seine Rivalen innerhalb der nationalistischen Bewegung zum Schweigen gebr$POL_REVOLTS_NATPOP_REQUIREMENTS$"
 RULE_OPTION_POL_REVOLTS_PATAUT: "£KR_game_rule_flag_POL  £KR_game_rule_flag_RUS  Nationalisten - OZN"
 RULE_OPTION_POL_REVOLTS_PATAUT_DESC: "Entweder durch ein Komplott mit der amtierenden Chjena-Regierung oder durch den Sturz des radikalen Emporkömmlings Doboszyński versuchen Edward Rydz-Śmigły und das §PObóz Zjednoczenia Narodowego§! oder Lager der nationalen Einheit, sich auf Piłsudskis Vision zu berufen, Polen zu militarisieren und traditionelle Werte zu fördern.$POL_REVOLTS_PATAUT_REQUIREMENTS$\n\n$RULE_OPTION_POL_REVOLTS_NATIONALIST_NOTE_DESC$"
 RULE_OPTION_POL_REVOLTS_SOCCON: "£KR_game_rule_flag_POL  £KR_game_rule_flag_RUS  Nationalisten - Chjena"
 RULE_OPTION_POL_REVOLTS_SOCCON_DESC: "Nachdem der gefährliche Fanatiker Doboszyński einen nationalistischen Aufstand gegen die frühere Regierung angezettelt hat, nutzen gemäßigtere Nationalisten aus den Reihen des Sejm ihren Einfluss, um das Parlament auf ihre Seite zu ziehen und den Extremistenführer zu verhaften.\nDie §cChrześcijański Związek Jedności Narodowej§! , oder Christliche Union der Nationalen Einheit, auch bekannt als Chjena, bildet eine konservative Regierung, um den Aufstand anzuführen.$POL_REVOLTS_NATPOP_REQUIREMENTS$"

 SWI_CRISIS: "£KR_game_rule_flag_SWI  Die Savoyer-Krise"
 SWI_CRISIS_GER_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CGermany is not at war during the Savoyard Crisis§!"
 SWI_CRISIS_AUS_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CAustria is not at war during the Savoyard Crisis§!\n\n§CHinweis: Wenn Österreich versucht, den Rest seines Reiches unter militärische Besatzung zu stellen, verlässt die Schweiz den Donau-Adria-Bund.§!"
 RULE_OPTION_SWI_CRISIS_RANDOM: "Standard"
 RULE_OPTION_SWI_CRISIS_RANDOM_DESC: "Mit Unterstützung der Kommune von Frankreich gehen syndikalistische Revolutionäre in der Romandie und in der Haute-Savoie gegen die Schweizer Bundesregierung vor, was als \"Savoyer Krise\" bekannt wird.\nDie Reaktion der Regierung auf diese Krise entscheidet über die Zukunft der Schweizer Bevölkerung."
 RULE_OPTION_SWI_CRISIS_KEEP: "£KR_game_rule_flag_SWI  Status Quo"
 RULE_OPTION_SWI_CRISIS_KEEP_DESC: "Dank der Zurückhaltung der Schweizer Regierung entscheiden sich die Kommunarden dafür, weiterhin gute Beziehungen zur Schweiz zu pflegen. Die Krise ebbt ab und die Schweiz behält die Kontrolle über das besetzte Haute-Savoie."
 RULE_OPTION_SWI_CRISIS_GIVE: "£KR_game_rule_flag_SWI  Die Schweiz räumt Haute-Savoie"
 RULE_OPTION_SWI_CRISIS_GIVE_DESC: "Die Kommune Frankreichs fordert von der Schweizer Regierung unter Androhung von Waffengewalt die Abtretung der besetzten Region Haute-Savoie. Die Schweizer Regierung will einen Krieg vermeiden und willigt ein.\nDie Haute-Savoie wird an Frankreich zurückgegeben."
 RULE_OPTION_SWI_CRISIS_WAR: "£KR_game_rule_flag_SWI_natpop  £KR_game_rule_flag_FRA  Die Schweiz erklärt Frankreich den Krieg"
 RULE_OPTION_SWI_CRISIS_WAR_DESC: "Als Reaktion auf die Krise marschieren französische Truppen in die Haute-Savoie und die Romandie ein. Die Schweizer Regierung erklärt den Krieg, um diese Gebiete zurückzuerobern. Da sie die Regierung als schwach einschätzt, übernimmt eine nationalistische provisorische Militärregierung die Kontrolle über die Schweiz. Deutschland könnte diese Gelegenheit nutzen, um der Kommune ein Ende zu setzen."
 RULE_OPTION_SWI_CRISIS_FACTION_START_DESC: "Als Reaktion auf die verschärften Spannungen mit der Pariser Kommune bemüht sich die Schweizer Regierung um ausländische Unterstützung."
 RULE_OPTION_SWI_CRISIS_FACTION_MID_DESC: "greift ein und stellt Paris ein Ultimatum, alle diplomatischen und verdeckten Aktivitäten einzustellen, die gegen die territoriale Integrität der Schweiz gerichtet sind."
 RULE_OPTION_SWI_CRISIS_GER: "£KR_game_rule_flag_SWI  £KR_game_rule_flag_GER  Reichspakt"
 RULE_OPTION_SWI_CRISIS_GER_DESC: "$RULE_OPTION_SWI_CRISIS_FACTION_START_DESC$\nDeutschland $RULE_OPTION_SWI_CRISIS_FACTION_MID_DESC$\nMit dem Beitritt der Schweiz zum Reichspakt, die einen vorzeitigen Krieg mit Deutschland befürchtet, gibt die Kommune von Frankreich nach.$SWI_CRISIS_GER_REQUIREMENTS$"
 RULE_OPTION_SWI_CRISIS_FACTION_END_DESC: "Frankreich ignoriert dieses Ultimatum, und da beide Seiten nicht bereit sind, nachzugeben,"
 RULE_OPTION_SWI_CRISIS_GER_WAR: "£KR_game_rule_flag_SWI  £KR_game_rule_flag_GER  £KR_game_rule_flag_FRA  Reichspakt - Krieg"
 RULE_OPTION_SWI_CRISIS_GER_WAR_DESC: "$RULE_OPTION_SWI_CRISIS_FACTION_START_DESC$\nDeutschland $RULE_OPTION_SWI_CRISIS_FACTION_MID_DESC$\nObwohl die Schweiz dem Reichspakt beitritt, $RULE_OPTION_SWI_CRISIS_FACTION_END_DESC$erklärt Deutschland Frankreich den Krieg.$SWI_CRISIS_GER_REQUIREMENTS$"
 RULE_OPTION_SWI_CRISIS_AUS: "£KR_game_rule_flag_SWI  £KR_game_rule_flag_AUS  Donau-Adriabund"
 RULE_OPTION_SWI_CRISIS_AUS_DESC: "$RULE_OPTION_SWI_CRISIS_FACTION_START_DESC$\nÖsterreich $RULE_OPTION_SWI_CRISIS_FACTION_MID_DESC$\nMit dem Beitritt der Schweiz zum Donau-Adriabund, die einen Krieg mit Österreich fürchtet, gibt die Französische Kommune nach.$SWI_CRISIS_AUS_REQUIREMENTS$"
 RULE_OPTION_SWI_CRISIS_AUS_WAR: "£KR_game_rule_flag_SWI  £KR_game_rule_flag_AUS  £KR_game_rule_flag_FRA  Donau-Adriabund - Krieg"
 RULE_OPTION_SWI_CRISIS_AUS_WAR_DESC: "$RULE_OPTION_SWI_CRISIS_FACTION_START_DESC$\nÖsterreich $RULE_OPTION_SWI_CRISIS_FACTION_MID_DESC$\nObwohl die Schweiz dem Donau-Adria-Bund beigetreten ist, $RULE_OPTION_SWI_CRISIS_FACTION_END_DESC$ erklärt Österreich Frankreich den Krieg.$SWI_CRISIS_AUS_REQUIREMENTS$"
 RULE_OPTION_SWI_CRISIS_INT: "£KR_game_rule_flag_SWI_soc  £KR_game_rule_flag_FRA  Dritte Internationale"
 RULE_OPTION_SWI_CRISIS_INT_DESC: "Nach dem illegalen Referendum in den französischsprachigen Kantonen, in dem die Wiedervereinigung der Haute-Savoie mit der Kommune Frankreichs gefordert wurde, lehnt die Schweiz die Möglichkeit ab, die Gemeinderäte der Kantone aufzulösen.\nDies führt dazu, dass die westlichen Kantone ihre Unabhängigkeit erklären und von Frankreich bewaffnete Milizen die Haute-Savoie und die Romandie übernehmen.\nSchließlich breitet sich der Aufstand auf die Hauptstadt aus, und die Regierung wird gestürzt."
 RULE_OPTION_SWI_CRISIS_ABANDONED: "£KR_game_rule_flag_SWI_natpop  Die Schweiz gibt auf"
 RULE_OPTION_SWI_CRISIS_ABANDONED_DESC: "$RULE_OPTION_SWI_CRISIS_FACTION_START_DESC$\nTrotz aller Bemühungen der Schweiz findet sich jedoch kein Land, das bereit ist, sie zu unterstützen. Infolgedessen akzeptiert die Schweizer Regierung die Forderungen Frankreichs und gibt die Haute-Savoie zurück. Die von Frankreich wieder eingesetzte Regierung der Romandie beschließt kurz darauf, aus der Schweizerischen Eidgenossenschaft auszutreten und sich der Komune Frankreichs anzuschließen.\nEine nationalistische Militärverschwörung gegen die Schweizer Regierung beginnt sich zu entwickeln."

