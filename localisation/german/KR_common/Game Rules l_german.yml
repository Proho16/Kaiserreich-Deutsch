 RULE_OPTION_ARG_PATH_FARRELL_ELEC_DESC: "Ramirez errichtet eine Militärjunta. Während der Debatte über den Beitritt zum Zweiten Weltkrieg auf deutscher Seite wird Ramirez von Farrell gestürzt, der Wahlen abhält."
