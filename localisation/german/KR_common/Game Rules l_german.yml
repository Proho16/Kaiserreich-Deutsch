PRU_PATH: "£KR_game_rule_flag_PRU   Ein versuchtes Attentat"
RULE_OPTION_PRU_PATH_RANDOM: "Standard"
RULE_OPTION_PRU_PATH_RANDOM_DESC: "In Peru kommt es während des Krieges mit Ecuador zu einem Anschlag der Apristen auf Sánchez Cerro. Wird der Präsident überleben, und wenn nicht, was wird sein Nachfolger tun?"
 RULE_OPTION_PRU_PATH_EXTREMIST_DESC: "Regierung verbietet Wahlen vollständig und verschärft damit den Konflikt mit den Apristen."
 RULE_OPTION_PRU_PATH_SANCHEZ_CERRO_PATAUT: "£KR_game_rule_flag_PRU  Harte Line der Armee - Sánchez Cerro"
 RULE_OPTION_PRU_PATH_SANCHEZ_CERRO_PATAUT_DESC: "Präsident Sánchez Cerro überlebt das Attentat. $RULE_OPTION_PRU_PATH_EXTREMIST_DESC$ Es gelingt ihr, die §PApristen§! zu zerschlagen, die als letztes Mittel alle verbliebenen Milizen sammelten und in die Hauptstadt marschierten, und die $RULE_OPTION_PRU_PATH_EXTREMIST_DESC$\nDie Apristen sind zerschlagen, und Sánchez Cerro regiert mit Hilfe seiner §PLinea dura del Ejercito§!, der Hardliner der Armee, weiter."
 RULE_OPTION_PRU_PATH_BENAVIDES_PATAUT: "£KR_game_rule_flag_PRU  Harte Linie der Armee – Benavides"
 RULE_OPTION_PRU_PATH_BENAVIDES_PATAUT_DESC: "Präsident Sánchez Cerro überlebt das Attentat nicht, und die $RULE_OPTION_PRU_PATH_EXTREMIST_DESC$\nDie Apristen werden zerschlagen, und Óscar Raimundo Benavides Larrea übernimmt die Kontrolle über die §PLinea dura del Ejercito§!, oder die Hardliner der Armee, und über Peru selbst."
 RULE_OPTION_PRU_PATH_SOC_DESC: "Die $RULE_OPTION_PRU_PATH_EXTREMIST_DESC$ Die Apristen marschieren als letztes Mittel auf die Hauptstadt und stürzen die Regierung."
RULE_OPTION_PRU_PATH_SYNDIE: "£KR_game_rule_flag_PRU   APRA"
RULE_OPTION_PRU_PATH_SYNDIE_DESC: "$RULE_OPTION_PRU_PATH_SOC_DESC$\nDie §RAlianza Popular Revolucionaria Americana§!, oder Volksrevolutionäre Allianz Amerikas, schafft es, den Machtkampf innerhalb der Revolution für sich zu entscheiden."
RULE_OPTION_PRU_PATH_TOTALIST: "£KR_game_rule_flag_PRU_soc  Socialistas"
RULE_OPTION_PRU_PATH_TOTALIST_DESC: "$RULE_OPTION_PRU_PATH_SOC_DESC$\nDie Tupacamaristen der §oPartido Socialista Peruano§!, oder Peruanischen Sozialistischen Partei, gewinnen den Machtkampf innerhalb der Revolution."
RULE_OPTION_PRU_PATH_DEM_DESC: "Die neue Regierung hält offene Wahlen ab, welche gewonnen wird von"
