RULE_OPTION_PAR_PATH_NATPOP: "£KR_game_rule_flag_PAR   Liga de Defesa Independente"
RULE_OPTION_PAR_PATH_NATPOP_DESC: "Nach den unverantwortlichen politischen Entscheidungen der autoritären Regierung Paraguays kommen Higinio Morínigo Martínez und seine §nLiga de Defesa Independente§!, oder Liga für die Verteidigung der Unabhängkeit, an die Macht"
