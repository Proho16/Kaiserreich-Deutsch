FOP_PATH: "£KR_game_rule_flag_FOP Der Erste Nationale Gewerkschaftskongress"
 FOP_FORPOL_REQUIREMENTS: "\n\n§RBenötigt:§!\n§CPatagonia gewinnt den Krieg im Südkegel§!"
RULE_OPTION_FOP_PATH_RANDOM: "Standard"
RULE_OPTION_FOP_PATH_RANDOM_DESC: "Aus der Tradition der republikanischen Demokratie kommend, hatte Argentinien bis zu diesem Zeitpunkt noch nie einen Gewerkschaftskongress gehabt, und obwohl viele darauf bedacht sind, diese historischen Ereignisse zu sehen, befürchten viele, dass es sich lediglich um eine Maskerade für ein diktatorisches Regime handelt. Während sich die Tore des alten Kongresses für die Gewerkschaftsdelegierten öffnen, hängt das Schicksal der Nation in der Schwebe...$FOP_FORPOL_REQUIREMENTS$"
RULE_OPTION_FOP_PATH_RADICALS_SYNDIE: "£KR_game_rule_flag_FOP Sindicatos (Radikale)"
RULE_OPTION_FOP_PATH_RADICALS_SYNDIE_DESC: "Mit Severino di Giovanni als amtierenden Vorsitzenden setzen sich die anarchistischen Radikalen der §rUnión de Sindicatos Argentinos, oder Union der Argentinischen Syndikalisten, entscheidend gegen die anderen Fraktionen durch. Mit ihrer sehr harten Haltung gegenüber Religion, Ungleichheit und Nationalismus versuchen die Anarchisten, alle Überreste des alten Argentiniens zu beseitigen und das argentinische Territorium zu einer Nation für alle Arbeiter der Welt zu machen\nDie radikalen Anarchisten streben den Beitritt zur Dritten Internationale an.$FOP_FORPOL_REQUIREMENTS$"
RULE_OPTION_FOP_PATH_MODERATES_SYNDIE: "£KR_game_rule_flag_FOP Sindicatos (Moderados)"
RULE_OPTION_FOP_PATH_MODERATES_SYNDIE_DESC: "Da Soto weiterhin sein Amt als Vorsitzender bekleidet, bleiben die Gemäßigten der §rUnión de Sindicatos Argentinos§!, oder Union der argentinischen Syndikalisten, an der Spitze der anderen Fraktionen und bereiten sich darauf vor, tiefgreifende Veränderungen im Land durchzuführen. Obwohl Soto ideologisch motiviert ist, ist er innerhalb der revolutionären Bewegung ein Pragmatiker und versucht, seine anarchistischen Ideale mit der Gesellschaft, die er nun wiederaufbauen muss, in Einklang zu bringen.\nDie gemäßigten Anarchisten streben den Beitritt zur Dritten Internationale an.$FOP_FORPOL_REQUIREMENTS$"
 RULE_OPTION_FOP_PATH_RADSOC_START_END_DESC: "schließlich gelingt es ihnen, die dominierende Kraft in der argentinischen Politik zu werden. Ihre Herrschaft ist zwar nicht so radikal wie die der anderen Gewerkschaften, dennoch versuchen sie, das Land zugunsten der Arbeiter zu reformieren."
 RULE_OPTION_FOP_PATH_RADSOC_START_DESC: "Nach jahrzehntelangem Kampf haben die Gemäßigten der §RFederación Obrera Regional Argentina, oder Argentinischer Regionaler Arbeiterverband, $RULE_OPTION_FOP_PATH_RADSOC_START_END_DESC$"
 RULE_OPTION_FOP_CONSTITUTION_START_DESC: "$RULE_OPTION_FOP_PATH_RADSOC_START_DESC$, während die Verfassung der Argentinischen Republik von 1898 wiederhergestellt wurde."
 RULE_OPTION_FOP_PATH_CONSTITUTION_RADSOC: "£KR_game_rule_flag_ARG  Wiederherstellung der Verfassung – FORA"
 RULE_OPTION_FOP_PATH_CONSTITUTION_RADSOC_DESC: "$RULE_OPTION_FOP_CONSTITUTION_START_DESC$\nFORA ist bei den folgenden Wahlen erfolgreich und strebt an, in weltpolitischen Angelegenheiten neutral zu bleiben.$FOP_FORPOL_REQUIREMENTS$"
 RULE_OPTION_FOP_PATH_NOT_RADSOC_START_DESC: "Nach jahrzehntelangem Kampf hat die Federación Obrera Regional Argentina $RULE_OPTION_FOP_PATH_RADSOC_START_END_DESC$"
 RULE_OPTION_FOP_CONSTITUTION_NOT_RADSOC_START_DESC: "$RULE_OPTION_FOP_PATH_NOT_RADSOC_START_DESC$, während die Verfassung der Argentinischen Republik von 1898 wiederhergestellt wurde."
 RULE_OPTION_FOP_NOT_RADSOC_END_DESC: "einen überraschenden Sieg bei den folgenden Wahlen erringen und eine neutrale Haltung in weltpolitischen Angelegenheiten einnehmen."
 RULE_OPTION_FOP_PATH_SOCLIB: "£KR_game_rule_flag_ARG  Wiederherstellung der Verfassung – UCR"
 RULE_OPTION_FOP_PATH_SOCLIB_DESC: "$RULE_OPTION_FOP_CONSTITUTION_NOT_RADSOC_START_DESC$\nDie §lUnión Cívica Radical§!, oder Radikale Bürgerunion, $RULE_OPTION_FOP_NOT_RADSOC_END_DESC$"
 RULE_OPTION_FOP_PATH_MARLIB: "£KR_game_rule_flag_ARG  Verfassung wiederherstellen – PDN"
 RULE_OPTION_FOP_PATH_MARLIB_DESC: "$RULE_OPTION_FOP_CONSTITUTION_NOT_RADSOC_START_DESC$\nDie §mPartido Demócrata Nacional§!, oder Nationale Demokratische Partei, $RULE_OPTION_FOP_NOT_RADSOC_END_DESC$"
 RULE_OPTION_FOP_PATH_REVOLUTIONARY_RADSOC: "£KR_game_rule_flag_ARG  FORA (Moderados)"
 RULE_OPTION_FOP_PATH_REVOLUTIONARY_RADSOC_DESC: "$RULE_OPTION_FOP_PATH_RADSOC_START_DESC$, und das derzeitige System der revolutionären Demokratie Argentiniens aufrechtzuerhalten.\nDie Gemäßigten streben danach, in weltpolitischen Angelegenheiten neutral zu bleiben.$FOP_FORPOL_REQUIREMENTS$"
 RULE_OPTION_FOP_PATH_UGARTISTAS_RADSOC: "£KR_game_rule_flag_ARG  FORA (Ugartistas)"
 RULE_OPTION_FOP_PATH_UGARTISTAS_RADSOC_DESC: "Mit dem Sieg der Revolution entwickeln sich die Ugartistas von einem kleinen Verein zu einer bedeutenden Fraktion der §RFederación Obrera Regional Argentina§!, oder Argentinischen Regionalen Arbeiterföderation. Sie suchen nach einem neuen Ansatz für den Sozialismus, der die Ideen des argentinischen Nationalismus, des amerikanischen Antiimperialismus, des Agrarismus und der Wirtschaftsdemokratie miteinander verbindet.\nDie Ugartistas streben die Schaffung einer neuen Fraktion Südamerikanischer Sozialistischer Staaten an.$FOP_FORPOL_REQUIREMENTS$"
 RULE_OPTION_FOP_PATH_UGARTISTAS_BOOSTED_RADSOC: "£KR_game_rule_flag_ARG  FORA (Ugartistas) - Verstärkt"
 RULE_OPTION_FOP_PATH_UGARTISTAS_BOOSTED_RADSOC_DESC: "$RULE_OPTION_FOP_PATH_UGARTISTAS_RADSOC_DESC$\n\n§CHinweis: Diese Regeloption bewirkt auch, dass jedes sozialistische Land in Südamerika die Einladung Patagoniens in diese neue Fraktion annimmt und den Beitritt zu einer anderen Fraktion vermeidet. Dies geschieht nur, wenn das Land in seiner eigenen außenpolitischen Spielregel nicht auf den Beitritt zu einer anderen Fraktion festgelegt ist und Patagonien unabhängig bleibt.\nDies gilt auch, wenn Patagonien von einem Spieler kontrolliert wird.§!"
RULE_OPTION_FOP_PATH_TOTALIST: "£KR_game_rule_flag_FOP_totalist Comité de Unión Sindical Clasista"
RULE_OPTION_FOP_PATH_TOTALIST_DESC: "Trotz eines herben Rückschlags durch das Scheitern der Oktoberrevolution in Russland gelingt es dem kommunistischen §oComité de Unión Sindical Clasista§!, oder Klassistisches Gewerkschaftskomitee, an die Macht zu kommen und die Mehrheit der Sitze im Kongress zu erringen. Ihr gemeinsamer Traum mit den Bolschewiki von einer neuen Weltordnung unter kommunistischer Flagge mag noch in weiter Ferne liegen, doch dieser Sieg bringt sie diesem Ziel einen Schritt näher.\nDie Kommunisten streben den Beitritt zur Dritten Internationale an.$FOP_FORPOL_REQUIREMENTS$"

