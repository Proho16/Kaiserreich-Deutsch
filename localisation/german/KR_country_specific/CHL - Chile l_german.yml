### Focuses ###
CHL_air: "Die Philosophie der Luftwaffe aktualisieren"
CHL_air_desc: "Unsere Luftdoktrinen sind immer noch ein Relikt der frühen Luftfahrt und was früher modern war, gehört heute in ein Museum. Unsere Piloten und Planungen werden entsprechend aktualisiert"
CHL_air2: "Flugzeugproduktion"
CHL_air2_desc: "Die plötzliche Kürzung der Finanzierung für die Luftwaffe ist vielleicht ein Schlüsselfaktor, warum sie sich uns an der Revolution angeschlossen hat. Jetzt sollten wir mit größter Sorgfalt dafür sorgen, dass unsere Flugzeuge sowohl modern als auch gepflegt sind. Glücklicherweise haben wir Genossen aus der Union von Britannien, die uns bei diesem Vorhaben sehr helfen können.
CHL_fighters: "Jägerbemühungen"
CHL_fighter2: "Flugzeuge zur Luftnahunterstützung"
CHL_fighter3: "Experimente mit Langstreckenflugzeugen"
CHL_fighters_desc: "Luftherrschaft ist der Schlüssel zum modernen Krieg, an dem nur wenige zweifeln können. Das Aufkommen neuer Kriegsmechanismen bedeutet jedoch, dass unsere alten Doppeldecker nicht mehr für die Verteidigung des chilenischen Himmels geeignet sind"
CHL_fighter2_desc: "Luftherrschaft ist bedeutungslos, wenn wir daraus keinen Vorteil an der Front schlagen können. Es sind nicht nur spezielle Flugzeuge erforderlich, sondern auch spezielles Training"
CHL_fighter3_desc: "Unser Land befindet sich strategisch gesehen auf einer zu langen Nord-Süd-Achse, um von gewöhnlichen Kampfflugzeugen angemessen geschützt zu werden. Wir müssen mit Hilfe unserer Genossen in Europa sicherstellen, dass unsere Luftwaffe Flugzeuge hat, die zu langen autonomen Flügen fähig sind"
CHL_airdoc: "Luftstrategie"
CHL_airdoc2_desc: "Auch die Luftkämpfe selbst sind zu analysieren und unsere wenigen Flugzeuge können wir nicht einfach wegwerfen. Sorgfältiges Lernen von Manövern wird der Schlüssel für unseren kommenden Sieg sein"
CHL_airdoc_desc: "Luftkämpfe sind schnelle und brutale Angelegenheiten; es lohnt sich, sie und strategische Einsätze im Voraus zu planen. Worauf sich unsere Luftwaffe im kommenden Krieg konzentrieren wird, muss unser Generalstab entscheiden"
CHL_airdoc2: "Lufttaktik"
CHL_bomber: "Bomber-Aufwand"
CHL_bomber_desc: "Die Rolle eines Bomber-Flugzeugs ist etwas neu, aber seine Verwendung wurde oft deutlich. Um sicherzustellen, dass wir das Vaterland verteidigen können, müssen unsere Modelle aus Weltkriegszeiten ersetzt werden"
CHL_bomber2: "Moderne Bomber"
CHL_bomber2_desc: "Wir werden weiterhin in verschiedene, auf bestimmte Aufgaben zugeschnittene Bomber investieren, um diese nicht nur zu einem aktiven, modernen Bestandteil unserer Luftwaffe zu machen, sondern auch sicherzustellen, dass sie auf dem neuesten Stand sind!"
CHL_navy: "Herrscher des Pazifiks"
CHL_navy_desc: "Unsere Flotte ist mit ihren jüngsten Ergänzungen und Investitionen in der Amtszeit vom Vositzenden Puga die vielleicht mächtigste in Südamerika. Es ist mit Sicherheit die am besten bewaffnete Streitmacht im Südpazifik und sowohl zu defensiven als auch zu offensiven Einsätzen fähig"
CHL_highseas: "Eine Hochseemarine"
CHL_highseas_desc: "Die entscheidenden Schlachten der kommenden Kriege werden in tiefen Gewässern ausgetragen, abseits der Küstenunterstützung. Um sicherzustellen, dass unsere Marine für diesen entscheidenden Kampf gegen einen gewissen ungenannten Feind im Westen gerüstet ist, werden wir Übungen und Planungsbemühungen durchführen"
CHL_dockyard: "Erneuerung der Flotte"
CHL_dockyard_desc: "Unsere Flotte ist gut bewaffnet und gut ausgestattet, verfügt jedoch über viele gebrauchte oder veraltete Schiffe. Wenn wir es modernisieren wollen, müssen wir keine Kosten für Werften, Schiffswerften und Waffensysteme scheuen"
CHL_carry2: "Flugzeugträger Bemühungen"
CHL_carry2_desc: "Viele Experten glauben an die Bedeutung von Flugzeugträgern bei einem Seegefecht. Dies gilt insbesondere für unsere Republik, da sehr viele einflussreiche Mitarbeiter einen Luftwaffenhintergrund haben. Ein moderner Flugzeugträger ist zwar enorm teuer, kann aber den Unterschied zwischen Sieg und Niederlage ausmachen"
CHL_cafi: "Marinebomber"
CHL_cafi_desc: "Seeflugzeuge waren schon immer ein Schlüsselfaktor der Landesverteidigung. Die meisten unserer wichtigen Militärzentren befinden sich in Reichweite der Marineartillerie. Es ist äußerst wichtig, dass wir unsere Küste vor Angriffen aus dem Ausland schützen können"
CHL_hc: "Kreuzer Durchbrüche"
CHL_hc_desc: "Kreuzer sind eine Hauptstütze unserer Marine, aber es sind alles veraltete Modelle und Spezifikationen, trotz unserer Aufbaubemühungen. Technologische Verbesserungen sind angebracht"
CHL_bc: "Zusätzliche Werftinvestitionen"
CHL_bc_desc: "Eine mächtige Marine kann nicht unterhalten werden, wenn man sich auf ausländische Werften verlässt. Unsere Docks werden mit Hilfe unserer Kameraden aus Europa auf den neuesten Stand gebracht"
CHL_bb: "Erwerben Sie mehr Schlachtschiffe"
CHL_bb_desc: "Das Schlachtschiff der Almirante Latorre-Klasse ist ein feines Schiff, aber es zeigt sein Alter, auch mit den kleinen Verbesserungen, die wir vorgenommen haben. Wir werden wahrscheinlich ein neues Flaggschiff benötigen, um unsere nationale Sicherheit zu gewährleisten"
CHL_highseas2: "Blauwassermarine"
CHL_highseas2_desc: "Es wird noch mehr Wert auf Taktiken, Doktrinen und Manöver in tiefen Gewässern gelegt werden müssen, wenn unsere Marine eine Chance gegen feindliche Flotten haben soll. Übung macht den Meister."
CHL_sub: "U-Boot-Unternehmungen"
CHL_sub_desc: "Unsere derzeitige U-Boot-Flotte ist klein und veraltet. Daher benötigen wir neuere, gut bewaffnete Modelle, um die imperialistischen Flotten auf Trab zu halten"
CHL_des: "U-Boot-Abwehr"
CHL_des_desc: "Unsere Bemühungen, feindliche U-Boote zu jagen, können erfolglos enden, wenn unsere kleineren Schiffe nicht modern genug sind, was sowohl unsere Flaggschiffe als auch unsere Schifffahrtswege gefährdet. Das dürfen wir nicht zulassen"
CHL_ls: "Schiffe für den Handelskrieg"
CHL_ls_desc: "Auch wenn unsere Marine zu den mächtigsten des Südens gehört, könnten imperialistische Kräfte aus Deutschland, den Vereinigten Staaten und Argentinien dazu führen, dass wir uns möglicherweise auf einen asymmetrischen Seekrieg verlassen müssen, um unseren Mangel an Tonnage und Arbeitskräften auszugleichen."
CHL_arms_of_the_revolution: "Eine Nation unter Belagerung"
CHL_arms_of_the_revolution_desc: "Die größte Gefahr für Chile geht nicht von innen aus, sondern von dem wiederauflebenden konterrevolutionären Argentinien. Seit der Gründung ihres Staates im 19. Jahrhundert haben sie kaum einen Hehl aus ihren Ambitionen auf unser Territorium gemacht, und nun, ermutigt durch die Unfähigkeit Brasiliens, wollen sie Chile erobern. Das werden wir nicht zulassen!"
CHL_mobility_potential: "Mobilitätspotential"
CHL_mobility_potential_desc: "Viele haben gehört, dass moderne Kriegsführung eine rasante, mechanisierte Angelegenheit sein wird. Selbst wenn sich herausstellen sollte, dass dies nicht der Fall ist, verfügen wir nicht über die Arbeitskräfte, um einen traditionellen Krieg mit Argentinien und den anderen Imperialisten zu führen. Wir werden unser Bestes tun, um die Mobilität unserer Streitkräfte zu verbessern"
CHL_communard_expertise: "Ausländisches Panzerexpertise"
CHL_communard_expertise_desc: "Mobilität war auf dem Schlachtfeld schon immer von großer Bedeutung. Mit den Fortschritten in der Motorisierung und Mechanisierung hat eine neue Generation von Offizieren weltweit begonnen, aggressivere Kriegsführungsstrategien unter Einsatz dieser neuen Technologien zu fördern. Wir sollten solche Männer aus dem Ausland anwerben."
CHL_tanque: "Panzerbemühungen"
CHL_tanque_desc: "Unser Militär benötigt nicht nur Panzer, sondern Panzer, die modern und autonom sind und mit dem rauen Terrain unserer Heimat umgehen können. Fortgeschrittene Kriegsmaschinen können den Unterschied zwischen Sieg und Niederlage ausmachen"
CHL_tanque2: "Panzerproduktionsbemühungen"
CHL_tanque2_desc: "Wir können unsere Streitkräfte mit einfachen Importen nicht richtig mechanisieren; wir müssen sicherstellen, dass unsere Fabriken unsere Streitkräfte selbst versorgen können, denn wir können uns in solchen wichtigen Angelegenheiten nicht auf andere Nationen verlassen"
CHL_infantry: "Armee-Wiederbewaffnung"
CHL_infantry_desc: "Die Armee ist zwar nicht wie vor der Revolution unterbezahlt oder unterernährt, aber immer noch schlecht ausgerüstet. Lassen Sie uns auf die Bedürfnisse unserer Offiziere eingehen und sicherstellen, dass unsere Armee alle Bedrohungen abwehren kann"
CHL_art: "Neue Verordnungen"
CHL_art_desc: "Unsere Artillerie muss dringend modernisiert werden; die Schlachtfelder des Weltkriegs zeugen davon. Nur mit neueren Modellen haben wir eine Chance gegen den Angreifer aus dem Osten."
CHL_infeq2: "Moderne Ausrüstung"
CHL_infeq2_desc: "Trotz unserer Bemühungen entspricht die Ausrüstung unseres Militärs nicht ganz dem modernen Standard. Unsere Offiziere werden mehr Geld und Aufmerksamkeit von unserer Regierung verlangen, aber die Avantgarde der Revolution verdient nur das Beste!"
CHL_arty2: "Feuerkraftbemühungen"
CHL_arty2_desc: "Wir brauchen in der Tat präzisere, besser ausgerüstete Artilleriegeschütze, wenn wir das Überleben unserer Nation sichern wollen. Mit diesen Spezialgeschützen werden wir nun in der Lage sein, den Feind unter Beschuss zu nehmen!"
CHL_high_command: "Oberkommandoreformen"
CHL_high_command_desc: "Unser militärisches Oberkommando muss aufgerüttelt werden und die Konterrevolutionäre werden nicht warten, bis unsere Taktiken und Strategien aktualisiert sind, bevor sie uns angreifen!"
CHL_mountaineer_focus: "Erweiterung der Bergsteigerbrigade"
CHL_mountaineer_focus_desc: "Die Berge, die uns umgeben, sind ein wesentlicher Bestandteil jedes nationalen Verteidigungsplans im Falle einer Invasion. Pässe, Gipfel und Hügel dürfen nicht mit neuen Rekruten besetzt werden, sondern mit speziell ausgebildeten Elite-Regimentern, die für die raue Realität des Berglebens gerüstet sind"
CHL_andean_strategy: "Anden-Strategie"
CHL_andean_strategy_desc: "Die sogenannte Santiago-Linie wird die letzte Bastion unserer Nation sein, wenn Argentinien uns überwältigt und die Anden überquert. Das unwegsame Gelände in und um Santiago wird für ausländische Invasoren undurchdringlich gemacht, so dass wir auch den härtesten numerischen Nachteilen widerstehen können"
CHL_long_term_planning: "Langzeitplanung"
CHL_long_term_planning_desc: "Nicht nur Schlachten und Gefechte sind wichtig, sondern die Bewegung und Organisation sowohl unserer Streitkräfte als auch der unserer Feinde werden gründlich untersucht und unser Generalpersonal auf die Herausforderung des kommenden Krieges des Imperialismus vorbereitet"
CHL_strategic_mining: "Wirtschaftliche Entwicklung"
CHL_strategic_mining_desc: "Um in Kriegszeiten effektiv zu sein, müssen wir in die Wirtschaft investieren. Die weitere Industrialisierung wird für unser Land von großem Nutzen sein."
CHL_doctrine_offense: "Offensive Doktrin"
CHL_doctrine_offense_desc: "Wir werden sicherstellen, dass unsere Streitkräfte und unser Generalstab bereit sind, die Offensive gegen unsere Feinde aufzunehmen. Stolz hilft uns nur begrenzt, aber Strategie und Planung sichern unseren Endsieg!"
CHL_drilled_military: "Erneuern Sie strenge Bohrnormen"
CHL_drilled_military_desc: "Chiles Militär war einst als "Südpreußen" bekannt, und seine Leistung und Disziplin waren der Neid aller. Jetzt, da es die Vorreiterrolle des Volkes spielt, kann es seinen Blick auf diejenigen richten, die unsere Landsleute und die Ideen, für die wir stehen, verletzen würden"
CHL_the_third_chairman: "Der dritte Vorsitzende"
CHL_the_third_chairman_desc: "Wer wird nach Ablauf der verteidigungspolitischen Amtszeit von Marmaduke Grove der dritte Vorsitzende?"
CHL_total: "Labarca und die Totalistische Fraktion"
CHL_total_desc: "Labarca und die Mosleyisten wissen, dass nur eine starke Regierung Chile vor vielen Feinden schützen kann. Die Leute sind jetzt in Sicherheit!"
CHL_permanet: "Doktrin der permanenten Revolution"
CHL_permanet_desc: "Die Labarcisten vertreten unter anderem die Auffassung, dass die Revolution nur mit Gewalt aufrechterhalten werden kann, da mit reaktionären Kräften weder vernünftig diskutiert noch verhandelt werden kann. Die proletarische Diktatur bleibt so lange bestehen, bis sie nicht mehr benötigt wird"
CHL_directrule: "Zentralisierte Planung"
CHL_directrule_desc: "Alle Entscheidungen, die das Wohlergehen der Wirtschaft und des Staates betreffen, müssen mit den Zentralkomitees in Santiago abgestimmt werden. Andernfalls wäre es bestenfalls Ungeschick, schlimmstenfalls Verrat"
CHL_chairmanmega: "Erweitern Sie die Befugnisse des Vorsitzenden"
CHL_chairmanmega_desc: "Der Vorsitzende benötigt für viele Maßnahmen nach wie vor die Zustimmung des Gewerkschaftskongresses, was die Reaktionsfähigkeit unseres Staates erheblich einschränkt. Das müssen wir ändern!"
CHL_commisariats: "Revolutionäre Kommissare"
CHL_commisariats_desc: "Jetzt können wir Offiziere in Armeekorps und Fabriken einsetzen, die zu jeder Zeit Loyalität und harte Arbeit gewährleisten. Denn ein untätiger Geist ist eine Einladung zur Konterrevolution"
CHL_directcivilian: "Industriequoten"
CHL_directcivilian_desc: "Jede Fabrik, jede Mine und jede Gemeinde wird Ziele haben, damit nicht ganz Chile untergeht. Wir werden sicherstellen, dass diese Quoten eingehalten werden."
CHL_loyalty: "Belohnung loyaler Totalisten"
CHL_loyalty_desc: "Die Männer und Frauen, die uns von Anfang an geholfen haben, als unsere Streitkräfte schwach waren; das werden die wenigen Treuen sein, die die Avantgardepartei leiten werden!"
CHL_clean: "Eine totalistische Regierung"
CHL_clean_desc: "Totalismus bedeutet völlige Loyalität und völlige Hingabe an die revolutionären Ideale, an denen wir so sehr festhalten, unabhängig von den Kosten. "Moderate" haben bei weitem keinen Platz für ernsthafte Entscheidungen"
CHL_getcounterrev: "Gewährleisten Sie die Loyalität der Offiziere"
CHL_getcounterrev_desc: "Viele Offiziere denken immer noch traditionell und archaisch und könnten mit ihrer traurigen Hingabe an alte Religionen genauso gut Theokraten sein. Aber ihre Priester gewährten ihnen kein Hellsehen, um eine Flucht vor den Revolutionsgerichten herbeizuführen!"
CHL_helicopter_rides: "Umgang mit Verrätern"
CHL_helicopter_rides_desc: "Einige Menschen halten immer noch an konterrevolutionären Idealen fest und würden sie niemals gehen lassen. Es gibt einen Ort, an dem sie diese Ideen verwirklichen können: die Osterinsel. Natürlich passieren auf so langen Reisen immer schlimme Dinge…"
CHL_santiago: "Direktherrschaft aus Santiago"
CHL_santiago_desc: "Die Revolution ist jetzt total und wir können die Vorteile unserer langen und anstrengenden Bemühungen teilen. Genosse Labarca und seine Mithelden sollen gelobt werden, um Licht in die Dunkelheit zu bringen!"
CHL_strengthen_republic: "Die Republik stärken"
CHL_strengthen_republic_desc: "Unsere Revolution verbrachte zu viel Zeit damit, sich über Bedrohungen und Verschwörungen Gedanken zu machen, und vergaß den einfachen Arbeiter, für den sie kämpfen sollte. Das wird sich jetzt ändern!"
CHL_cement_congresses: "Autorität des Kongresses festigen"
CHL_cement_congresses_desc: "Der Kongress der Syndikate ist den Arbeitern noch etwas unbekannt; viele nennen es einfach aus Gewohnheit Senat. Wir werden sicherstellen, dass die Mitglieder, Entscheidungen und Erfolge der Bevölkerung bekannt sind"
CHL_extended: "Befugnisse des CSC erweitern"
CHL_extended_desc: "Im Gegensatz zum Parlament der Alten Republik ist der Syndikatskongress heute ein wahres Haus der Demokratie. Es ist jedoch in vielen Angelegenheiten immer noch ziemlich machtlos, ein Relikt unserer überzentralisierenden präsidentialistischen Vergangenheit. Hier müssen wir Abhilfe schaffen!"
CHL_autonomous_councils: "Autonome Räte"
CHL_autonomous_councils_desc: "Die örtlichen Arbeiterräte werden nun autonomer sein von Santiago, wobei die Anweisungen unserer Genossen in der Hauptstadt weiterhin eingehalten werden. Ein solches Gleichgewicht wird beiden Seiten des Problems helfen"
CHL_anarchosyndicalism: "Erweiterte lokale Autonomie"
CHL_anarchosyndicalism_desc: "Lokale Gemeinden wissen am besten, was sie mit ihren Bürgern tun sollen, und wir werden ihnen erlauben, Prioritäten und Investitionen entsprechend zu wählen"
CHL_conciliation: "Vermittlungsbemühungen"
CHL_conciliation_desc: "Jede politische Debatte führt zu Feindseligkeiten und eine Revolution ist in dieser Hinsicht noch schlimmer. Viele qualifizierte Genossen werden wegen ihrer vor Jahren geäußerten schlecht informierten Meinungen diskriminiert und das schadet dem Wohlergehen der Republik nur"
CHL_tackle_unemployment: "Bekämpfung der Arbeitslosigkeit"
CHL_tackle_unemployment_desc: "Viele Städte in Chile tragen nicht in vollem Umfang zur Gesellschaft bei, da der Mangel an Industrie nach wie vor ein Problem darstellt, das wir so schnell wie möglich angehen müssen"
CHL_peace_and_calm: "Industrieller Wohlstand"
CHL_peace_and_calm_desc: "Nach der Überarbeitung der Regierung und der Streitkräfte kann unsere Nation endlich wahren Frieden und Wohlstand genießen!"
CHL_do_away_with_conservative: "Arbeiter der Heimatfront"
CHL_do_away_with_conservative_desc: "Jetzt, wo so viele gute Männer an vorderster Front stehen, fehlt es unseren Fabriken an Arbeitskräften, um weiterzulaufen. Es ist an der Zeit, konservative Ideale abzuschaffen und dafür zu sorgen, dass die Frauen von Chile ihren Beitrag leisten"
CHL_arms_factories: "Umfangreiche militärisch-industrielle Expansion"
CHL_arms_factories_desc: "Wir werden dafür sorgen, dass unsere Kameraden an der Front ausgerüstet sind und ihren Dienst auf dem Schlachtfeld verrichten können"
CHL_additonal_militarization: "Erweitern Sie Arsenale"
CHL_additonal_militarization_desc: "Wir müssen uns mit aller Kraft auf den bevorstehenden Sturm der Konterrevolution vorbereiten, auch wenn dies mit gewaltsamen Kämpfen einhergeht"
CHL_joint_projects: "Gemeinsame Projekte"
CHL_joint_projects_desc: "Viele unserer Akademiker werden nach Frankreich und Europa geschickt, um sowohl Chile als auch der Weltrevolution insgesamt zu helfen!"
CHL_techslot: "Große Bildungsreform"
CHL_techslot_desc: "Unser Bildungssystem weist in vielerlei Hinsicht Mängel auf, vor allem aber in Bezug auf den groben Finanzierungsmangel und die staatlichen Hilfsmaßnahmen. Das wird sich jetzt ändern"
CHL_watchoutforthosesiterockets: "Teilen von fortgeschrittener Technologie"
CHL_watchoutforthosesiterockets_desc: "Unsere Wissenschaftler, die an Studien in Europa teilnehmen, haben uns fortschrittliche Ideen und Entwürfe geliefert, die für die Sicherheit der Revolution von entscheidender Bedeutung sein könnten!"
CHL_milsci: "Militärwissenschaft"
CHL_milsci_desc: "Leider müssen sich unsere Schulen vorerst mehr auf die Verteidigung der Revolution konzentrieren als auf theoretische Fragen. Ganz Chile wird dem Ruf folgen!"
CHL_counter_revolution: "Gegenrevolution"
CHL_counter_revolution_desc: "Nach dem Sturz der syndikalistischen Regierung müssen wir zuerst die Grundlagen unserer neuen Regierung aufstellen"
CHL_provisional_junta: "Provisorische Junta"
CHL_provisional_junta_desc: "Die Junta von Blanche hat die Kontrolle übernommen und muss reibungslos zur vollständigen Kontrolle der chilenischen Regierung übergehen"
CHL_restoring_order: "Ordnung wiederherstellen"
CHL_restoring_order_desc: "Da unsere Junta die Kontrolle über die ehemaligen syndikalistischen Institutionen hat, müssen wir zuerst die Bevölkerung beschwichtigen und einen Anschein von Ordnung in Chile erlangen"
CHL_restoring_private_enterprise: "Wiederherstellung privater Unternehmen"
CHL_restoring_private_enterprise_desc: "Um wirklich vom Syndikalismus abzuweichen, müssen wir das Privateigentum wiederherstellen, angefangen bei wichtigen Unternehmen"
CHL_restoring_mining_industry: "Wiederherstellung der Bergbauindustrie"
CHL_restoring_mining_industry_desc: "Um den Wiederaufbau Chiles zu unterstützen, müssen wir wieder kompetente Geschäftsleute einsetzen, die die Minen unseres Landes leiten"
CHL_basic_economics: "Grundökonomie"
CHL_basic_economics_desc: "Der Aufbau der Basis unserer neuen Wirtschaft ist wichtig für die künftige Stabilität und den Wohlstand Chiles"
CHL_restoring_democratic_instituitions: "Wiederherstellung demokratischer Institutionen"
CHL_restoring_democratic_instituitions_desc: "Wir müssen die ehemaligen demokratischen Institutionen der Republik Chile wieder aufbauen"
CHL_restoring_rule_of_law: "Wiederherstellung der Rechtsstaatlichkeit"
CHL_restoring_rule_of_law_desc: "Die frühere Regierung hat viele chilenische Gesetze geändert. Wir müssen sie reformieren und den Obersten Gerichtshof von Chile wiederherstellen, um eine echte Rechtsstaatlichkeit zu erreichen"
CHL_the_last_power: "Der letzte Schritt"
CHL_the_last_power_desc: "Um einen erfolgreichen Übergang zur Demokratie zu gewährleisten, müssen wir den Rahmen für das Parlament und den Präsidenten der Republik schaffen"
CHL_emergency_aid: "Nothilfe"
CHL_emergency_aid_desc: "Um Chile wieder zu einer stabilen südamerikanischen Demokratie zu machen, müssen wir unsere ehemaligen Feinde auf der ganzen Welt um Hilfe bitten"
CHL_reinstate_taxation: "Wiedereinsetzung der Besteuerung"
CHL_reinstate_taxation_desc: "Die Besteuerung ist ein Muss für unser Land, um wieder stabil und einflussreich zu werden. Die Wiedereinführung sollte oberste Priorität haben"
CHL_desyndicalize_provincial_organization: "Provinzielle Organisation vom Syndikalismus bereinigen"
CHL_desyndicalize_provincial_organization_desc: "Durch die Umstrukturierung der ehemaligen Provinzorganisation können wir unsere Industrie noch weiter verbessern"
CHL_elections_free: "Freie Wahlen"
CHL_elections_free_desc: "Jetzt, da Wahlen endlich vorbei sind, können wir uns wieder als Demokratie bezeichnen!"
CHL_elections_free_conservative: "Konservativer Sieg"
CHL_elections_free_conservative_desc: "Mit Del Campos Partei an der Macht können sie endlich ihren Namen reinwaschen und Chile Wohlstand bringen"
CHL_youth_recovery: "Erholung der Jugend"
CHL_youth_recovery_desc: "Wir müssen ein Programm auflegen, um die Jugend von Chile zu ermutigen, in den prestigeträchtigen Streitkräften zu dienen, und Familien Vorteile bieten, um das Bevölkerungswachstum zu fördern und die Zukunft von Chile zu sichern"
CHL_restore_church_special_status: "Stellen Sie den besonderen Status der Kirche wieder her"
CHL_restore_church_special_status_desc: "Eine Sache, die in unserer hastigen Wiedereinführung der Besteuerung übergangen wurde, waren Ausnahmen für die Kirche. Dies ist etwas, das wir korrigieren müssen"
CHL_chilean_traditions: "Chilenische Traditionen"
CHL_chilean_traditions_desc: "Chile muss über stabile und produktive Bildungsprogramme verfügen, die unsere Traditionen vermitteln, wenn wir wissenschaftlich mit der Welt Schritt halten wollen"
CHL_industrial_collaboration: "Industrielle Zusammenarbeit"
CHL_industrial_collaboration_desc: "Durch die Zusammenarbeit mit den glücklichen Geschäftsinhabern, die wir wieder aufgebaut haben, können wir unsere Zivilindustrie leicht erweitern"
CHL_restore_landowning_private: "Stellen Sie das Privateigentum wieder her"
CHL_restore_landowning_private_desc: "Die Rückgabe von Land an seine rechtmäßigen Landbesitzer wird gleichzeitig die Belastung unserer Regierung verringern und es uns ermöglichen, uns darauf zu konzentrieren, mehr aus dem Land herauszuholen, das wir kontrollieren"
CHL_elections_free_socdem: "Sieg der Sozialdemokraten"
CHL_elections_free_socdem_desc: "Da Montero die Wahlen gewonnen hat, müssen er und die Partei sich darauf konzentrieren, die Grundlagen für künftige Reformen in Chile zu schaffen"
CHL_fuffling_the_calais_pact: "Umsetzung des Calais-Pakts"
CHL_fuffling_the_calais_pact_desc: "Durch die Umstrukturierung unserer Partei werden wir Gesetze effizienter verabschieden und unsere Regierungsarbeit besser beeinflussen können."
CHL_development_program: "Entwicklungsprogramm"
CHL_development_program_desc: "Die Zusammenarbeit mit unseren Industrieführern in einem neuen Regierungsprogramm zur Planung einer weiteren Expansion und Weiterentwicklung wird ein stabiles industrielles Wachstum gewährleisten"
CHL_the_new_republic: "Die neue Republik"
CHL_the_new_republic_desc: "Dank des Erfolgs unserer vorherigen Programme können wir die Popularität unserer Partei und die Stabilität der Nation leicht verbessern"
CHL_democratic_amnesty: "Demokratische Amnestie"
CHL_democratic_amnesty_desc: "Das Anbieten von Amnestie für demokratische Exilanten in Südamerika wird uns einen Zustrom von talentierten Politikern und Wissenschaftlern ermöglichen, die aus unterdrückerischen Regimen stammen"
CHL_rehabilitation_military: "Militär rehabilitieren"
CHL_rehabilitation_military_desc: "Viele Militärs waren syndikalistische Anhänger und obwohl sie den Machtwechsel akzeptierten, sind viele immer noch gegen uns verärgert. Mit etwas Mühe können wir dies ausbessern und die Stabilität unserer Streitkräfte sichern"
CHL_elections_free_marlib: "Liberaler Sieg"
CHL_elections_free_marlib_desc: "Mit dem Sieg Arturo Allessandris und den Liberalen in trockenen Tüchern, kann Chile sich darauf konzentrieren eine wirtschaftliche Großmacht zu werden "
CHL_detable_prices: "Preise deregulieren"
CHL_detable_prices_desc: "Die Deregulierung der Preise wird ein organisches Wachstum des Unternehmenssektors ermöglichen, das wir nutzen können, um unsere eigenen Anstrengungen zu beschleunigen und um unsere Ressourcen profitabler zu handeln"
CHL_laissez_faire: "Laissez-faire"
CHL_laissez_faire_desc: "Unsere Politik des Laissez-faire wird mehr Kapital und Fachkräfte in unser Land locken, wodurch wir sowohl die Produktions- als auch die Forschungsbemühungen ausweiten können"
CHL_deunionze_workers: "Gewerkschaften abschaffen"
CHL_deunionze_workers_desc: "Indem wir die Arbeitergewerkschaften loswerden, können wir sowohl den verbleibenden Syndikalisten einen Schlag versetzen als auch unsere Expansion der Industrie in Chile beschleunigen"
CHL_press_freedom: "Pressefreiheit garantieren"
CHL_press_freedom_desc: "Indem wir die Pressefreiheit garantieren, können wir allen Chilenen mitteilen, dass sie wirklich frei sind und dass wir keine Angst vor Kritik haben"
CHL_detable_currencies: "Die Währung deregulieren"
CHL_detable_currencies_desc: "Durch die Deregulierung unserer Währung können wir uns der schlechten Wirtschaftsregulierung entledigen, den Markt gedeihen lassen und davon profitieren"
CHL_elections_free_np: "Populistischer Sieg"
CHL_elections_free_np_desc: "Überraschenderweise haben Marees und seine populistische Partei die Wahl gewonnen. Obwohl viele Bürger verärgert sind, feilt Marees bereits an Plänen, wie er seine Macht noch steigern kann."
CHL_nationalist_junta: "Nationalistische Junta"
CHL_nationalist_junta_desc: "Nach der Machtergreifung hat Valderrama bereits einen Plan skizziert, um seine politischen Feinde bösartig zu verfolgen und einen syndikalistischen Gegenputsch zu verhindern"
CHL_assert_dominance: "Dominanz behaupten"
CHL_assert_dominance_desc: "Wir müssen mit aller Deutlichkeit zeigen, dass wir die Zügel des Staates in der Hand haben."
CHL_cleanse_military_dissent: "Militärische Meinungsverschiedenheiten bereinigen"
CHL_cleanse_military_dissent_desc: "Es gibt viele in der Armee, die immer noch syndikalistische Sympathien hegen. Wir müssen sie umerziehen, bevor sie zu einem Problem werden"
CHL_cleanse_naval_dissent: "Meinungsverschiedenheiten in der Marine bereinigen"
CHL_cleanse_naval_dissent_desc: "Selbst unsere Großmarine ist unsicher gegenüber syndikalistischen Sympathisanten. Wir müssen sicherstellen, dass sie diese Sympathisanten nicht länger beherbergen"
CHL_political_peace_by_force: "Erzwungener politischer Frieden"
CHL_political_peace_by_force_desc: "Mit unserer immensen politischen Schlagkraft und einem Kraftakt können wir unserer Nation Stabilität verleihen"
CHL_violent_de_syndicalization: "Aggressive Desyndikalisierung"
CHL_violent_de_syndicalization_desc: "Obwohl es offiziell verboten ist, länger an der Regierung teilzunehmen, gibt es immer noch Syndikalisten in unseren Reihen, und die Überreste ihres Regimes liegen um uns herum, wir müssen diese Tatsache schnell beheben"
CHL_radical_curriculum_changes: "Radikale Lehrplanänderungen"
CHL_radical_curriculum_changes_desc: "Unser Lehrplan ist veraltet und ineffizient, wir müssen ihn radikal reformieren, wenn wir ein stabiler moderner Staat werden wollen"
CHL_administrative_centralization: "Administrative Zentralisierung"
CHL_administrative_centralization_desc: "Durch die Zentralisierung der Verwaltung aller Bereiche der Regierung können wir unseren Halt sichern und gleichzeitig den militärischen Aufbau steigern"
CHL_the_state: "Den Staat stärken"
CHL_the_state_desc: "Indem wir unseren Staatsapparat stärken, steigern wir gleichzeitig unseren Einfluss steigern und unsere Unterstützung ausbauen"
CHL_chilean_identity: "Chilenische Identität"
CHL_chilean_identity_desc: "Wir müssen eine nationale Identität fördern, die eindeutig chilenisch ist, um den Stolz und den Geist zu fördern, den wir für unser Volk wollen"
CHL_nationalist_propaganda: "Nationalistische Propaganda"
CHL_nationalist_propaganda_desc: "Durch die Kontrolle der Medien können wir den Propagandastrom und Unterstützung für unsere Regierung ausbauen"
CHL_prussian_ethos: "Preußisches Ethos"
CHL_prussian_ethos_desc: "Wir müssen unsere Identität als "Südpreußen" voll und ganz anerkennen und unser Militär bis an die Grenzen von Disziplin und Kriegsbereitschaft ausbauen"
CHL_national_mythos: "Nationaler Mythos"
CHL_national_mythos_desc: "Indem wir für die chilenische Identität und Kultur werben, fördern wir einen Geist in jedem Chilenen, der niemals gebrochen werden kann"
CHL_hispanism: "Hispanismus"
CHL_hispanism_desc: "Die Kernidee des Hispanismus ist, dass alle spanischsprachigen Völker wieder unter einem Reich sein sollten, wir sollten uns bemühen, dieses Ziel zu erreichen!"
CHL_natural_order: "Natürliche Ordnung"
CHL_natural_order_desc: "Es ist die natürliche Ordnung der Schwachen, die Starken zu fürchten. Deshalb sollten wir ein erweitertes Militär fördern, um unsere neue Ideologie zu unterstützen"
CHL_anti_sindicalism: "Anti-Syndikalismus"
CHL_anti_sindicalism_desc: "Obwohl wir bereits Schritte unternommen haben, um unser Land vom Einfluss des Syndikalismus zu befreien, sollten wir uns darauf konzentrieren, die letzte Glut der sterbenden Ideologie zu beseitigen, um die Stabilität Chiles zu gewährleisten"
CHL_land_of_santiago: "Land von Santiago"
CHL_land_of_santiago_desc: "Um wahren Hispanismus zu erreichen, müssen wir dem Titel des heiligen Anführers der spanisch sprechenden Welt gerecht werden und unsere Entschlossenheit, unsere Ziele, falls nötig, mit Gewalt zu erreichen, offen tragen"

### Intro Screen ###
 CHL_country_intro_background: "GFX_CHL_intro"
 CHL_country_intro_header: "Chile im Jahr 1936"
 CHL_country_intro_content: "Nach dem Salpeterkrieg (1879–1883), in dessen Folge Chile neben der bolivianischen Küstenregion Antofagasta auch die peruanischen Salpeterprovinzen Tarapacá und Arica erhielt, verfügte das Land über riesige Kupfervorkommen und monopolisierte den weltweiten Salpeterhandel. Es begann eine Phase wirtschaftlichen Wohlstands, begünstigt durch die hohe Nachfrage nach Salpeter zu Beginn des Ersten Weltkriegs. Die während dieses Krieges entwickelten chemischen Verfahren zur künstlichen Herstellung von Salpeter machten Chiles Vorkommen jedoch wertlos.\n\nDie sich verschlechternden wirtschaftlichen Verhältnisse sowie das Bevölkerungswachstum verschärften die soziale Krise. Arbeiter und Gewerkschaften gewannen an politischem Einfluss, insbesondere unter der katastrophalen Herrschaft von Carlos Ibañez Del Campo, während der Chile 1931 bankrott ging. Kurz darauf wurde Ibañez abgesetzt, und die Marine sowie der Großteil der Armee meuterten; mit der Unterstützung des Volkes und der Ankunft von Verstärkung durch den lange im Exil lebenden Marmaduke Grove aus der Union von Britannien wurde die Syndikalistische Republik Chile ausgerufen.\n\nNach fünf Jahren des Wiederaufbaus unter dem ersten Rat, der zumindest nominell von Arturo Puga geleitet wurde, erholte sich die Wirtschaft der Republik erheblich, und es begann ein militärischer Aufbau. Nun, da Argentiniens Rhetorik zunehmend aggressiver wird, steht der hoch angesehene Marmaduke Grove, ein Militärveteran zweier Revolutionen, die Welten voneinander trennen, an der Spitze des Wiederaufbaus der Republik. Allerdings blicken nicht alle Chilenen ebenso hoffnungsvoll in die Zukunft wie die Führer der Gewerkschaftsbewegung..."

 CHL_guide: "§MPartido Sindicalista Chileno / Alianza Socialista Nacional / Partido Revolucionario Permanente§! ($radical_socialist_coloured$ / $syndicalist_coloured$ / $totalist_coloured$)\n£white_dot Wenn das Ereignis des dritten Vorsitzenden erscheint, wählen Sie Carlos Labarca, um Totalist zu werden, Salvador Allende, um Radikalsozialist zu werden, oder Clotario Blest Riffo, um Syndikalist zu bleiben.\n£white_dot Nach 5 Jahren wird es wieder Wahlen geben, und Sie können den vierten Vorsitzenden syndikalistisch, radikal-sozialistisch oder totalistisch wählen, und 5 Jahre danach wird eine weitere Wahl mit den gleichen Optionen stattfinden."

### Events ###
 chile_events.100.t: "Erdbeben in Chile"
 chile_events.100.d: "Bei einem Erdbeben in Chile wurden 30.000 Menschen getötet und Tausende von Menschen sind obdachlos geworden. Wir sollten etwas tun, um ihnen zu helfen."
 chile_events.100.a: "Helft den Überlebenden!"
 chile_events.100.b: "Die Bedürfnisse der Vielen überwiegen die Bedürfnisse dieser wenigen Unglücklichen."

 chile_events.1.t: "Der dritte Vorsitzende"
 chile_events.1.d: "Unsere junge Republik hält jetzt ihre zweiten zentralen Wahlen ab; es wird viel gefeiert und drei Hauptkandidaten versuchen, die Stimmen der Arbeiter zu beeinflussen. Blest Riffo, ein langjähriger Kämpfer für die Rechte der Arbeiter in den schlimmsten Zeiten der Unterdrückung, wird sowohl von Marmaduke als auch von den meisten orthodoxen Syndikalisten und damit von der Mehrheit der Wähler bevorzugt. Sein Gegenkandidat ist der junge Salvador Allende, dessen breite Oppositionskoalition ebenso vielfältig wie wenig geschlossen ist, aber eine bessere Zukunft für Chile verspricht. Auch die Totalisten, die von den Ideen europäischer Sozialisten wie Mosley und Beira beeinflusst sind, laufen mit eher geringen Chancen mit Labarca als Frontmann. Wie wird das Volk entscheiden?"
 chile_events.1.a: "Clotario Blest Riffo und die orthodoxen Syndikalisten."
 chile_events.1.b: "Salvador Allende und die soziale Koalition."
 chile_events.1.c: "Carlos Labarca und die Mosleyisten."

 chile_events.2.t: "Der vierte Vorsitzende"
 chile_events.2.d: "Nach 10 Jahren stabiler Regierung freuen sich die Menschen in Chile über den Wohlstand und den Frieden, die die Revolution gebracht hat. Jetzt ist die Zeit gekommen, den vierten Vorsitzenden der Chilenischen Syndikalistischen Republik zu wählen. Auf dem Stimmzettel stehen drei Kandidaten, von denen zwei angesehene und hochgeschätzte Dichter und Schriftsteller sind. Gabriela Mistral leitet den Pacto de Calais, eine breite Koalition von Intellektuellen und Politikern, die die Zentralregierung der Republik verteidigen. Im Gegensatz zu den Totalisten von Carlos Contreras Labarca sind regelmäßige Wahlen und persönliche Freiheiten jedoch von größter Bedeutung. Die orthodoxen Syndikalisten werden von Pablo Neruda angeführt, einem weiteren sehr versierten Schriftsteller und Dichter. Aber wer wird die dominierende Partei in Chile sein?"
 chile_events.2.a: "Lucila Godoy y Alcayaga, besser bekannt als Gabriela Mistral, und die Heterodoxen Syndikalisten."
 chile_events.2.b: "Carlos Labarca und die Mosleyisten."
 chile_events.2.c: "Ricardo Eliécer Neftalí, besser bekannt als Pablo Neruda, und die orthodoxen Syndikalisten."

 chile_events.3.t: "Der fünfte Vorsitzende!"
 chile_events.3.d: "15 Jahre einer stabilen Regierung in Chile sind vergangen und es ist wieder an der Zeit, den Vorsitzenden der Republik zu bestimmen."
 chile_events.3.a: "Aurelio Celedon Palma und die Neue Soziale Koalition"
 chile_events.3.b: "Carlos Díaz Loyola, besser bekannt als Pablo de Rokha, und die Mosleyisten."
 chile_events.3.c: "Luis Emilio Recabarren und die orthodoxen Syndikalisten."

 chile_events.4.t: "[GetYear] Amtsantritt des Vorsitzenden"
 chile_events.4.d: "Jetzt, wo der Vorsitzende offiziell sein Amt angetreten hat, jubeln die Anhänger der Partei ihrem Erfolg zu."
 chile_events.4.a: "Viva!"

 chile_events.5.t: "Demokratische Wahlen von [GetYear]"
 chile_events.5.d: "Es ist an der Zeit, dass die Junta endet und das Volk sich endgültig für einen Anführer entscheidet, der es wieder in die Demokratie führt. Da dies die erste Wahl nach der Junta ist, ist niemand sicher, welcher der vier Kandidaten als Sieger hervorgehen wird."
 chile_events.5.a: "Carlos Ibáñez del Campo und die Popular Freedom Alliance."
 chile_events.5.b: "Juan Esteban Montero und der Pakt von Calais."
 chile_events.5.c: "Arturo Allessandri und die Liberale Partei."
 chile_events.5.e: "Jorge González von Marées und das Komitee der Offiziere gegen Atheismus und Verräter."

 chile_events.6.t: "Demokratische Wahlen von [GetYear]"
 chile_events.6.d: "Sechs Jahre sind seit den ersten demokratischen Wahlen nach dem Sturz des syndikalistischen Regimes vergangen, und nun ist es an der Zeit, erneut über die nächste Regierungspartei der Republik Chile abzustimmen. Wieder stehen vier Kandidaten zur Wahl, und es wird erwartet, dass die Wahl völlig offen ist."
 chile_events.6.a: "Rafael Fernandez Reyes und die Popular Freedom Alliance."
 chile_events.6.b: "Gabriel González Videla und der Pakt von Calais."
 chile_events.6.c: "Eduardo Alessandri und die Liberale Partei."
 chile_events.6.e: "Jorge González von Marées und das Komitee der Offiziere gegen Atheismus und Verräter."

 chile_events.9.t: "Befreiungskrieg!"
 chile_events.9.d: "Es besteht nun ein Kriegszustand zwischen uns und Argentinien, unsere Armee und Marine mobilisieren bereits für den kommenden Konflikt."
 chile_events.9.a: "Wir müssen unseren argentinischen Genossen helfen!"

 chile_events.10.t: "Verhandeln Sie für Feuerland"
 chile_events.10.d: "Jetzt, da unsere Kameraden die Kontrolle über Feuerland haben, haben wir die einmalige Gelegenheit, für das Land zu verhandeln, um unsere Unterstützung im Krieg zu entschädigen. Dies würde es uns ermöglichen, die Kontrolle über die Magellanstraße für Chile vollständig zu sichern!"
 chile_events.10.a: "Ja! Beginnen Sie mit den Verhandlungen."
 chile_events.10.b: "Es ist wertlos, sie können es haben."

 chile_events.11.t: "Chile bittet um Feuerland"
 chile_events.11.d: "Unsere Genossen in Chile fordern die Kontrolle über Feuerland als Wiedergutmachung für ihre Hilfe im Krieg gegen Argentinien."
 chile_events.11.a: "Es ist wertlos, sie können es haben."
 chile_events.11.b: "Niemals!"

 chile_events.12.t: "Die Galapagosinseln ergreifen"
 chile_events.12.d: "Wir können den Krieg auf dem ecuadorianischen Festland als Ablenkung und Vorwand nutzen, um die Galapagos-Inseln als Marinestützpunkt für unsere Flotte zu erobern."
 chile_events.12.a: "Tu es! Unsere mächtige Marine regiert den Pazifik."
 chile_events.12.b: "Besser nicht."

 chile_events.17.t: "Der Coup ist erfolgreich!"
 chile_events.17.d: "Das Offizierskomitee hat es geschafft! Die beiden Hauptfraktionen der Gruppe sind die Offiziere unter der Führung von Bartolomé Blanche, der sich für eine vorübergehende Rückkehr der Junta zur Demokratie einsetzt, und die zweite Gruppe unter der Führung von Francisco Díaz Valderrama, der die Macht des Staates in einer nationalistischen Junta sichern will. Nur eine dieser Fraktionen kann an der Spitze der neuen chilenischen Regierung stehen..."
 chile_events.17.a: "Bartolomé Blanche hält die Macht in einer Junta!"
 chile_events.17.b: "Francisco Díaz Valderrama erobert den Staatsapparat!"

 chile_events.18.t: "Blanche signalisiert Wahlen"
 chile_events.18.d: "Blanche hat die Befürchtungen einer ständigen Junta besänftigt, indem er bestätigt hat, dass demokratische Wahlen in Chile stattfinden werden."
 chile_events.18.a: "Großartig!"

 chile_events.19.t: "Die hispanistische Kulturkampagne"
 chile_events.19.d: "Die Regierung unter der Leitung von Valderrama hat eine Kampagne zur Förderung der hispanistischen Kultur in Chile angekündigt, um sie an die Spitze der chilenischen Kultur heranzuführen."
 chile_events.19.a: "Eine lobenswerte Initiative."

 chile_events.20.t: "Rafael Franco fordert uns auf, Paraguay zu befreien"
 chile_events.20.d: "Unsere Kameraden in Uruguay haben uns um unsere Unterstützung bei der Befreiung von ihrem Unterdrückungsregime gebeten."
 chile_events.20.a: "Wir werden sehen, was wir tun können!"

 chile_events.21.t: "Goliath besiegen!"
 chile_events.21.d: "Es ist endlich an der Zeit, Brasilien zu zeigen, dass die Größe Ihres Landes nicht immer über Kriege entscheidet!"
 chile_events.21.a: "Brasilien kann uns nicht aufhalten!"

 chile_events.22.t: "Reaktionäre verhaftet"
 chile_events.22.d: "Unsere jüngsten Bemühungen, Verräter auszumerzen, haben Früchte getragen, und viele Verräter und Reaktionäre wurden festgenommen."
 chile_events.22.a: "Bring sie in die Flugzeuge und aus meinen Augen."

 chile_events.23.t: "Mapuchen revoltieren gegen uns!"
 chile_events.23.d: "Mit dem gegenwärtigen Krieg, der unser Land belastet, haben sich die Mapuchen in den Provinzen südlich von Santiago gegen unsere Regierung aufgelehnt und verwenden Krieg auf niedriger Ebene, um uns Probleme zu bereiten."
 chile_events.23.a: "Verdammte Eingeborene!"

 chile_events.24.t: "Ein besonderes Treffen"
 chile_events.24.d: "Oppositionsführer Salvador Allende traf sich heute beim Mittagessen mit dem angesehenen Offizier Bartolomé Blanche und besprach die Vereinbarung eines weiteren Treffens, um über 'heikle Themen' zu sprechen."
 chile_events.24.a: "\"Ich bin fasziniert, wir sehen uns wieder.\""

 chile_events.25.t: "Ein zweites Treffen"
 chile_events.25.d: "Salvador Allende und Bartolomé Blanche trafen sich erneut, diesmal in Allendes Haus, wo der Offizier vorschlug, ihre Differenzen beiseite zu legen, um zusammenzuarbeiten und die derzeitige totalistische Regierung zu stürzen, aber er würde Zeit brauchen, um einen Plan auszuarbeiten."
 chile_events.25.a: "\"Arbeiten wir zusammen … für den Moment.\""

 chile_events.26.t: "Planung der Operation"
 chile_events.26.d: "Nach dem langen Warten kehrte Blanche mit einem endgültigen Plan, den Totalisten die Zügel der Regierung abzunehmen, zu Allende zurück. Blanche bestand darauf, dass ein Attentat notwendig war, um sicherzustellen, dass der Plan funktionierte, während Allende zögerte und dazu tendierte, einen Rücktritt zu erzwingen."
 chile_events.26.a: "Töten wir den Vorsitzenden!"
 chile_events.26.b: "Umgebt den Palast und zwingt ihn zum Rücktritt."

 chile_events.27.t: "Der Coup ist erfolgreich!"
 chile_events.27.d: "Die Streitkräfte von Allende und Blanche haben das Unterdrückungsregime der Totalisten erfolgreich abgesetzt, aber es bleibt abzuwarten, welcher der beiden sich erheben wird, um den Mantel der chilenischen Führung zu übernehmen."
 chile_events.27.a: "Unter Bartolomé Blanche entsteht eine Junta."
 chile_events.27.b: "Gemäßigte Sozialisten, angeführt von Allende, kommen an die Macht."

 chile_events.28.t: "Coup vereitelt!"
 chile_events.28.d: "Trotz aller Bemühungen der Verschwörer ist es den totalistischen Kräften gelungen, das Komplott gegen ihre Regierung zu vereiteln! Sie haben viele der Verschwörer festgenommen, doch die Drahtzieher sind weiterhin auf freiem Fuß. Das Ansehen des totalistischen Regimes in der Öffentlichkeit hat durch diese Tortur jedoch gelitten."
 chile_events.28.a: "Verdammte Verräter! Startet die Flugzeuge und rufen Sie die Osterinsel an, sie haben viel Verkehr zu erwarten."

 chile_events.32.t: "Lucila Godoy schließt sich mit Allende zusammen"
 chile_events.32.d: "Lucila Godoy y Alcayaga, besser bekannt unter ihrem Pseudonym Gabriela Mistral, hat ihren Beitritt zu Allendes Partei der gemäßigten Sozialisten, die kürzlich in 'Heterodoxe Syndikalisten' umbenannt wurde, sowie ihre Nominierung als Kandidatin für den Vorsitz bekannt gegeben."
 chile_events.32.a: "Die breite Front wird noch breiter!"

 chile_events.33.t: "Ricardo Eliécer Neftalí steigt in den orthodoxen Rängen auf"
 chile_events.33.d: "Ricardo Eliécer Neftalí, besser bekannt als Pablo Neruda, ist in den Reihen der orthodoxen Sozialisten erstaunlich schnell aufgestiegen und hat sich bei den bevorstehenden Wahlen als Spitzenreiter für den Vorsitz herausgestellt."
 chile_events.33.a: "Ein Dichter gegen einen anderen!"

 chile_events.34.t: "Labarca wird es erneut versuchen!"
 chile_events.34.d: "Trotz seiner Niederlage bei der letzten Wahl hat Labarca nichts von seinem Elan eingebüßt und heute Vormittag seine zweite Kandidatur für das Amt des Vorsitzenden angekündigt."
 chile_events.34.a: "In der Tat."

 chile_events.35.t: "Neftalí veröffentlicht politisch aufgeladenes Buch!"
 chile_events.35.d: "Überraschenderweise veröffentlichte Neftalí ein Buch, in dem er seine Pläne als neuer Vorsitzender ankündigte, sowie die Politik und die Schwächen von Lucila Godoy und Carlos Labarca sowie ihrer Parteien verleumdete."
 chile_events.35.a: "Ein Kampf braut sich zusammen!"

 chile_events.36.t: "Lucila reagiert aggressiv auf Neftalis Behauptungen"
 chile_events.36.d: "Als Reaktion auf die verleumderischen Behauptungen, die Neftalí in seinem Buch aufgestellt hat, hat Lucila mit Behauptungen von Feigheit und böser Absicht zurückgeschossen, was wie der zweite Schlag eines politischen Kampfes aussieht."
 chile_events.36.a: "So unzivilisiert!"

 chile_events.37.t: "Pablo de Rokha unterstützt Labarca und verspottet Neftalí"
 chile_events.37.d: "Ein dritter Dichter hat für die aktuelle Wahl die Bühne der Politik betreten. Carlos Díaz Loyola, bekannt als Pablo de Rokha, hat seine Unterstützung für Labarca und die Mosleyisten angekündigt und gleichzeitig Neftalis Buch und sein Fehlen von Führungsstärke verspottet."
 chile_events.37.a: "Bei so vielen Dichtern vermissen wir bestimmt bald die üblichen Politiker!"

 chile_events.38.t: "Neftalí reagiert auf Anschuldigungen und bittet um Höflichkeit"
 chile_events.38.d: "Der orthodoxe Spitzenreiter hat auf die Angriffe reagiert, indem er auf seine frühere Feindseligkeit zurückgegangen ist und vor den sich rasch nähernden Wahlen um Höflichkeit gebeten hat, was dazu geführt hat, dass einige ihn als schwach ansehen, während andere es als professionelle Reaktion ansehen."
 chile_events.38.a: "Warum können wir nicht alle miteinander auskommen?"

 chile_events.39.t: "Neftalí und Lucila versöhnen sich wegen Missverständnissen"
 chile_events.39.d: "Nach den Wahlen trafen sich die Parteiführer Lucila Godoy und Ricardo Neftalí, um die angespannten Beziehungen zwischen ihren beiden Parteien auszubügeln und ein engeres Band zu knüpfen, um Chile effektiver zu führen."
 chile_events.39.a: "Eine großartige Entwicklung!"

 chile_events.40.t: "Pablo de Rokha greift erneut Neftalí und Godoy an"
 chile_events.40.d: "Trotz der Wahlniederlage haben die Totalisten ihre feindselige Rhetorik fortgesetzt, und Pablo de Rokha hat neue Anschuldigungen gegen die beiden Führer seiner Oppositionsparteien erhoben. Dies hat in der politischen Szene Chiles zu mehr Unruhe und Feindseligkeit geführt, obwohl der Führer der moslemischen Partei, Carlos Labarca, zu dieser Angelegenheit seltsam still geblieben ist."
 chile_events.40.a: "Wie unhöflich!"

 chile_events.41.t: "Pablo de Rokha übernimmt die Herrschaft über die Totalisten!"
 chile_events.41.d: "Unter Berufung auf seine ineffektive Führung und die Niederlage bei den Wahlen ist Carlos Labarca als Parteichef der Mosleyisten zurückgetreten. Die Lücke wurde schnell von dem dreisten Dichter Pablo de Rokha gefüllt, der der maroden mosleyistischen Partei neues Leben einhaucht."
 chile_events.41.a: "Wird ihnen eine neue Führung wirklich helfen?"

 chile_events.42.t: "Die Revolution in Amerika anführen!"
 chile_events.42.d: "Mit dem katastrophalen Fall von [WCA.GetNameDefCap] sind wir das letzte große syndikalistische Land in Amerika. Wir müssen die Fackel aufnehmen und die Revolution mutig führen!"
 chile_events.42.a: "Viva!"

 chile_events.43.t: "Carlos Ibáñez del Campo kehrt zurück?"
 chile_events.43.d: "Nachdem Carlos Ibáñez del Campo nach der Revolution ins Exil geschickt worden war, kehrte er schließlich nach Chile zurück und kündigte seine Kandidatur für die Präsidentschaft im Rahmen der Popular Freedom Alliance an."
 chile_events.43.a: "Er glaubt wirklich, er kann gewinnen?"

 chile_events.44.t: "Sozialistische Rehabilitation"
 chile_events.44.d: "Während wir uns darauf konzentrieren, Chile auf einen Übergang zur Demokratie vorzubereiten, haben wir erfolglos versucht, Pläne zur Wiederherstellung der Beziehungen zu den Sozialisten umzusetzen. Vielleicht hat eine Regierung, die nicht in einer Junta ist, mehr Glück?"
 chile_events.44.a: "Wir werden Zeit brauchen."

 chile_events.45.t: "Sich mit Carlés und Aguero zusammenschließen?"
 chile_events.45.d: "Unsere neue Regierung ist viel enger mit unseren früheren Feinden verbunden als bisher angenommen und sie haben Interesse bekundet, dass wir uns ihrem Bündnis anschließen. Vielleicht sollten wir uns ihnen anschließen?"
 chile_events.45.a: "Dios y Patria!"
 chile_events.45.b: "Das ist keine gute Idee."

 chile_events.451.t: "Chile bittet darum, der [ROOT.GetFactionName] beizutreten."
 chile_events.451.d: "Wir haben eine Anfrage der chilenischen diplomatischen Vertreter erhalten, in der sie darum bitten, dass Chile mit uns ein Militärabkommen unterzeichnen darf und sich damit in dem immer komplexer werdenden Kräfteverhältnis formell mit uns verbündet."
 chile_events.451.a: "Wunderbar, wir sind ganz Ihrer Meinung."
 chile_events.451.b: "Sich in eine solche Vereinbarung zu verstricken, ist nicht in unserem Sinne."

 chile_events.51.t: "Unser Anspruch auf die Antarktis"
 chile_events.51.d: "Chile hat lange das Eigentum an Teilen der Antarktis beansprucht. Wir könnten diese Forderungen aggressiver durchsetzen, wenn wir dies wünschen."
 chile_events.51.a: "Warum? Da sind nur Pinguine."
 chile_events.51.b: "Es gehört zu Chile!"

 chile_events.52.t: "Chile erobert die Galapagosinseln"
 chile_events.52.d.ecu: "Chile hat den Konflikt mit Peru ausgenutzt und versucht, die Inseln zu erobern, während wir von unserem Krieg abgelenkt sind."
 chile_events.52.d.not_ecu: "Unter Ausnutzung unserer kürzlichen Annexion Ecuadors hat Chile einen Vorstoß auf die Galapagos-Inseln unternommen und sie in Besitz genommen, bevor sie von uns besetzt werden konnten."
 chile_events.52.a: "Wir können nichts tun..."
 chile_events.52.b: "Befiehlt der Garnison, sie abzuwehren!"

 chile_events.53.t: "Versagen auf den Galapagosinseln"
 chile_events.53.d: "Trotz unseres großartigen Plans, die Galapagosinseln zu erobern, während Ecuador von ihrem Krieg abgelenkt war, waren die Inseln weitaus stärker besetzt, als wir erwartet hatten und unsere Invasion wurde ins Meer zurückgeschickt. Dies ist eine Schande für die Nation und es ist unwahrscheinlich, dass Ecuador unsere Übertretungen vergisst."
 chile_events.53.a: "Verdammt sollen sie sein!"

 chile_events.54.t: "Chile möchte der Internationalen beitreten"
 chile_events.54.d: "Die Arbeiterrevolution in Chile war sehr erfolgreich, ein leuchtendes Vorbild in der südlichen Hemisphäre für revolutionäre Ideale. Sie fühlen sich jedoch von reaktionären Nachbarn und anderen imperialistischen Bedrohungen bedroht und meinen, dass es höchste Zeit ist, der Internationale beizutreten."
 chile_events.54.a: "Lasst sie uns im Kampf für die Weltrevolution willkommen heißen!"
 chile_events.54.b: "Das ist unsinnig!"

 chile_events.55.t: "[From.GetNameDefCap] Hat zugestimmt"
 chile_events.55.d: "[From.GetNameDefCap] haben unsere Bitte angenommen, der Dritten Internationale beizutreten. Wir haben jetzt starke Verbündete auf der ganzen Welt."
 chile_events.55.a: "Vorwärts!"

 chile_events.56.t: "[From.GetNameDefCap] Hat abgelehnt"
 chile_events.56.d: "Inexplicably, [From.GetNameDefCap] hat sich geweigert, unseren Eintritt in die Dritte Internationale zuzulassen."
 chile_events.56.a: "Haben sie den Verstand verloren?"

 chile_events.57.t: "Konterrevolution in Chile"
 chile_events.57.d: "Obwohl Chile einst als die erfolgreichste Bastion syndikalistischer und sozialistischer Werte in Südamerika galt, scheint es, dass sein Regime nicht mehr besteht. Eindeutige Führungsschwächen während des Krieges gegen Argentinien und die katastrophale strategische Lage, in der sich das Land heute befindet, haben dazu geführt, dass eine Kabale von Militärs die Macht in Santiago an sich gerissen hat und eine Reihe von wichtigen Punkten in der Stadt und im ganzen Land schnell in ihre Hände gefallen sind.\n\nWie es mit Chile weitergeht, bleibt ungewiss, doch es scheint, als regiere in Lateinamerika – zumindest vorerst – eine weitere Junta."
 chile_events.57.a: "Der Hammer und die Fackel erleiden einen Schlag."

### Decisions ###
CHL_join_internationale: "Beitritt zur Internationale"
CHL_join_internationale_desc: "Viele unserer Männer, einschließlich Marmaduke Grove selbst, waren Teil der Revolution sowohl dort als auch in Großbritannien. Jetzt, da der Sozialismus in Argentinien entscheidend triumphiert hat, sollten wir unseren Platz inmitten unserer Brüder und Schwestern der internationalen syndikalistischen Gemeinschaft einnehmen."
 
