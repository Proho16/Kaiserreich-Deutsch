### Ideas ###
CHL_airmanufactury: "Flugzeugproduktion"
CHL_airmanufactury_desc: "Mit Hilfe erfahrener ausländischer Experten werden wir unsere Luftwaffe auf den neuesten Stand bringen."
CHL_tankmanufactury: "Panzerproduktionsbemühungen"
CHL_tankmanufactury_desc: "Die Herstellung von Panzern im eigenen Land ist ein kostspieliges Unterfangen. Deshalb werden wir dafür sorgen, dass unsere Anstrengungen nicht umsonst sind. Ausländische Experten sind eingetroffen, und unsere Fabriken sind bereit."
CHL_south_prussia1_desc: "Die strenge Disziplin des chilenischen Militärs bedeutete, dass unsere Nation seit ihrer Geburt praktisch unbesiegt war, ohne Zweifel dank der Professionalität der Armee und unseres mutigen Geistes."
CHL_south_prussia1: "Strenge disziplinäre Standards"
CHL_south_prussia2_desc: "Die strenge Disziplin des chilenischen Militärs bedeutete, dass unsere Nation seit ihrer Geburt praktisch unbesiegt war, ohne Zweifel dank der Professionalität der Armee und unseres mutigen Geistes."
CHL_south_prussia2: "Volles preußisches Ethos"
CHL_workers_ofthe_homefront: "Soldaten der Heimatfront"
CHL_workers_ofthe_homefront_desc: "Was unserer Nation an Zahlen fehlt, zahlt sich im Geiste aus; indem wir konservative Werte abschaffen und nicht nur die Hälfte unserer Bevölkerung ausnutzen, können wir sowohl einen Fortschritt für die Rechte der Frauen als auch einen erheblichen strategischen Vorteil sicherstellen."
CHL_MapuchesRevolt: "Mapuches Aufstand"
CHL_MapuchesRevolt_desc: "Die Mapuche greifen uns weiterhin mit Guerillataktiken an. Es wird noch einige Zeit dauern, bis wir sie los sind."
CHL_Private_Enterprise1: "Private Unternehmen wiederhergestellt"
CHL_Private_Enterprise1_desc: "Unsere frühen Bemühungen zur Privatisierung von Unternehmen zahlen sich aus."
CHL_Private_Enterprise2: "Privateigentum wiederhergestellt"
CHL_Private_Enterprise2_desc: "Durch die Wiederherstellung des Landbesitzes hat unsere Regierung aufgrund einer besseren Organisation Zugang zu mehr Ressourcen erhalten."
CHL_Democratic_Institutuions1: "Demokratische Institutionen"
CHL_Democratic_Institutuions1_desc: "Diese Institutionen stärken unsere Fähigkeit, Gesetze zu verabschieden und den Weg für den Übergang zu einer demokratischen Regierung zu ebnen."
CHL_Democratic_Institutuions2: "Gestärkte Institutionen"
CHL_Democratic_Institutuions2_desc: "Unsere Nation hat jetzt einen blühenden demokratischen Geist dank unserer Erweiterung der demokratischen Institutionen."
CHL_Economics: "Kapitalistische Ökonomie"
CHL_Economics_desc: "Wenn wir unsere Wirtschaft neu ausrichten, geben wir weniger für soziale Programme und mehr für den Staatsaufbau aus."
CHL_Taxation1: "Wiedereingestellte Besteuerung"
CHL_Taxation1_desc: "Neue Steuern bedeuten, dass unsere Nation mehr Geld in Produktion und Bau stecken kann."
CHL_Taxation2: "Deregulierte Währung"
CHL_Taxation2_desc: "Dank unserer neuen Währung und Marktwirtschaft können wir den Baumaßnahmen noch mehr Nachdruck verleihen."
CHL_Youth_Recovered: "Erholungsplan für Jugendliche"
CHL_Youth_Recovered_desc: "Die Pflege der Traditionen unserer Streitkräfte und die Einrichtung staatlich finanzierter Jugendprogramme haben dazu geführt, dass wir einen Zustrom neuer junger Erwachsener als Rekruten verzeichnen."
CHL_Marlib_Trade1: "Deregulierte Märkte"
CHL_Marlib_Trade1_desc: "Die kürzliche Wiederherstellung des freien Marktes ermöglicht es uns, den Fluss der Ressourcen, die unser Land verlassen, zu kontrollieren und gleichzeitig Gewinne zu erzielen."
CHL_Marlib_Trade2: "Laissez-Faire-Märkte"
CHL_Marlib_Trade2_desc: "Der erweiterte Außenhandel hat es uns ermöglicht, mit unserer Politik von Laissez-Faire noch vorteilhafter zu profitieren."
CHL_Education: "Nationalistisches Bildungsprogramm"
CHL_Education_desc: "Unser Fokus auf die Erziehung der Jugend der Nation liefert uns mehr militärische Rekruten und qualifizierte Wissenschaftler."
CHL_Identity1: "Chilenische nationale Identität"
CHL_Identity1_desc: "Die Förderung unseres nationalen Erbes verleiht uns mehr politische Schlagkraft und inspiriert die Menschen, härter für ihr Land zu kämpfen."
CHL_Identity2: "Chilenischer Nationalstolz"
CHL_Identity2_desc: "Unsere Regierung hat betont, dass alle Menschen in Chile stolz darauf sein sollten, chilenisch zu sein, mit erheblicher Unterstützung der Bevölkerung."
CHL_Hispanism1: "Hispanismusprogramm"
CHL_Hispanism1_desc: "Unsere Nation regt die Unterstützung des Hispanismus in der lokalen Bevölkerung an."
CHL_Hispanism2: "Dominanz des Hispanismus"
CHL_Hispanism2_desc: "Chile wird die Nation sein, die den verlorenen Ruhm des spanischen Reichs zurückerobert!"
CHL_Order: "Natürliche Ordnung"
CHL_Order_desc: "Unsere Nation muss Stärke durch ihre militärischen Fähigkeiten und ihre Zahl zeigen, um die Ordnung aufrechtzuerhalten."
CHL_home_of_south_american_syndicalism: "Heimat des südamerikanischen Syndikalismus"
CHL_home_of_south_american_syndicalism_desc: "Seit der ursprünglichen Revolution im Jahr 1931 bleibt Santiago das Zentrum des Syndikalismus in Südamerika. Viele der Menschen sind bereit, für die Verteidigung ihrer Ideologie gegen die Reaktionäre, die uns umgeben, zu sterben."

