 CHL_marmaduke_grove_vallejo: "Marmaduke Grove Vallejo"
 CHL_marmaduke_grove_vallejo_leader_desc: "§YGeboren:§! §L6. Juli 1878, in Copiapó, Provinz Atacama, Republik Chile§!\n§YHintergrund:§! §LGrove stammt aus einer Familie, die mit der Radikalen Partei Chiles sympathisierte, und ist der Sohn von José Marmaduke Grove Abalos, einem Rechtsanwalt, und Ana Vallejo Burgoa. Sein Vater wurde 1891 ins Exil geschickt, weil er sich dem Präsidenten José Manuel Balmaceda widersetzte. Trotz seiner frühen Opposition gegen die herrschenden Behörden, trat er 1892 in die chilenische Marineakademie ein. Wegen seiner sozialistischen Tendenzen ins Exil geschickt, wurde er als Verbindungsmann in Großbritannien eingesetzt, eigentlich nur, um ihn aus Chile herauszuhalten. Während seines Aufenthalts dort beteiligte er sich jedoch an der Revolution; und während seines Exils unter der Herrschaft von Präsident Ibáñez del Campo verschlechterte sich die wirtschaftliche Lage Chiles zunehmend, bis das Land 1931 bankrott ging. Kurz darauf wurde Ibañez abgesetzt, als der Großteil der Armee und der Marine meuterte, was die Rückkehr Groves nach Chile und die Ausrufung der Sozialistischen Republik ermöglichte. Sein kürzlicher Aufstieg zum Vorsitzenden ist ein deutliches Zeichen dafür, dass sowohl die militärischen als auch die zivilen Behörden in Chile nach jahrelanger Unterstützung der patagonischen Rebellen einen Konflikt mit Argentinien für nahezu unvermeidlich halten.§!"

