### Characters ###

KOR_kim_koo: "Kim Koo"
KOR_kim_koo_bio: "LKim Koo, der sowohl seine Verbündeten als auch seine Gegner überragt, ist sowohl die politische Verkörperung dessen, was vom koreanischen Nationalismus übrig geblieben ist, als auch der Puppenspieler hinter unzähligen Fällen von weißem Terror. Der großgewachsene Kim Koo schloss sich als junger Mann der Bauernarmee der Tonghak-Bewegung an, und als sich der Aufstand auflöste, wurde er von An Taehoon gerettet, dem Vater des legendären An Junggeun, dem späteren Attentäter von Itō Hirobumi. 1896 wurde Kim verhaftet, weil er einen japanischen Händler ermordet hatte, den er für einen Militäroffizier hielt. Nach seiner Flucht wandte sich Kim von der Politik ab und setzte sich stattdessen mit Hilfe der Kirchen für die Gründung von Schulen ein. Im Jahr 1905 kehrte Kim jedoch aus Empörung über die Unterzeichnung des japanisch-koreanischen Vertrags in die nationalistische Szene zurück und freundete sich mit Gleichgesinnten an, die zu seinen Kameraden wurden.\n\n Als 1925 in Schanghai die provisorische Regierung der Republik Korea gegründet wurde, wurde Kim eines ihrer wichtigsten Mitglieder und etablierte sich schnell als das Rückgrat der provisorischen Regierung, sei es direkt oder indirekt. Im Zuge seines Aufstiegs zur Macht fungierte Kim sowohl als Mitglied des Provisorischen Kongresses Koreas als auch als Polizeichef, wodurch er seine Position weiter festigte. 1923 wurde er zum provisorischen Innenminister und 1926 zum Premierminister ernannt, bevor es ihm 1928 gelang, Syngman Rhee aus der Provisorischen Regierung zu verdrängen. Schließlich gründete Kim 1930 die Koreanische Unabhängigkeitspartei, die ihm als wichtigstes politisches Instrument dienen sollte."
KOR_kim_koo_leader_desc: "§YGeboren:§! §L29. August 1876 in Haeju, Provinz Hwanghae, Joseon§!\n§YHintergrund:§! §L$KOR_kim_koo_bio$\n\nNach der Befreiung Koreas sind Kim und die KIP nach Korea zurückgekehrt, mit dem Auftrag, aus den Trümmern der japanischen Kolonialherrschaft eine neue Republik aufzubauen und Korea hoffentlich in eine strahlende Zukunft zu führen – mit einer Regierung, die den Willen des Volkes vertritt.§!"
KOR_kim_koo_soccon_leader_desc: "§YGeboren:§! §L29. August 1876 in Haeju, Provinz Hwanghae, Joseon§!\n§YHintergrund:§! §L$KOR_kim_koo_bio$\n\nNach der Befreiung Koreas haben Kim und die KIP im Anschluss an die ersten freien und fairen demokratischen Wahlen ein echtes Mandat des Volkes erhalten, obwohl zunächst befürchtet wurde, die KIP könnte zu autoritären Mitteln greifen und Oppositionsparteien verfolgen. Nun, da er das Vertrauen des koreanischen Volkes genießt, wird Kim Koo weiterhin eine stabile und demokratische Republik Korea führen und sich dafür einsetzen, deren Unabhängigkeit auf Dauer zu sichern.§!"
KOR_kim_koo_autdem_leader_desc: "§YGeboren:§! §L29. August 1876 in Haeju, Provinz Hwanghae, Joseon§!\n§YHintergrund:§! §L$KOR_kim_koo_bio$\n\nKim und die KIP, die nun die Führung der neuen Republik Korea übernommen haben, haben die Kontrolle über das Land gesichert und eine Regierung auf der Grundlage einer echten koreanischen Demokratie eingesetzt, die es dem Volk ermöglicht, seinen Willen zum Ausdruck zu bringen, und gleichzeitig das Land vor Verrätern und äußeren Bedrohungen schützt. Unter seiner Führung wird Kim Koo dafür sorgen, dass sich die Republik Korea zu einer starken, unabhängigen Nation entwickelt, die von ausländisch beeinflussten und radikalen Elementen befreit ist.§!"
KOR_kim_koo_sic_desc: "§YGeboren:§! §L29. August 1876 in Haeju, Provinz Hwanghae, Joseon§!"

