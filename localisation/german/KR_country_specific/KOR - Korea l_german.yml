korea_events.3.t: "Revolutionäre Erfolge in Korea"
korea_events.3.d: "Während der Vereinigungskriege und des Widerstandskrieges kämpften koreanische Revolutionäre an der Seite der Nationalen Revolutionsarmee. Viele von ihnen gehörten der Koreanischen Nationalen Revolutionspartei (KNRP) an, einer Organisation, die von dem koreanischen Offizier Kim Wonbong - selbst Absolvent der revolutionären Whampoa-Akademie - gegründet wurde.\n\nNach dem Krieg kehrte Kim Wonbong mit der KNRP in seine Heimat zurück, um die gerade befreite koreanische Nation zu verwalten. Im Rahmen seiner Reformen zur Modernisierung Koreas hat Kim die Ideale der Drei Prinzipien des Volkes umgesetzt und sich dabei stark von der chinesischen Kuomintang beeinflussen lassen. Heute trafen sich koreanische Vertreter mit [ROOT.GetLeader], um die zukünftigen Beziehungen zwischen der Republik China und der Republik Korea zu besprechen. Während Korea unter Chinas Einfluss und Schutz bleiben soll, wird es dennoch eine gewisse nominelle Autonomie genießen - da beide versprochen haben, als revolutionäre Zwillingsschwestern zusammenzuarbeiten, um Ostasien vom Imperialismus zu befreien."
korea_events.3.a: "Wir stehen zusammen!"

korea_events.4.t: "Vertrag über Frieden und Sicherheit"
korea_events.4.d: "Während der Vereinigungskriege und des Widerstandskrieges kämpften koreanische Revolutionäre an der Seite der Nationalen Revolutionsarmee. Viele von ihnen gehörten der Provisorischen Regierung der Republik Korea (PGROK) an, einer koreanischen Unabhängigkeitsfraktion, die von dem großen koreanischen Revolutionär Kim Koo angeführt wurde.\n\nNach dem Krieg kehrten Kim Koo und die PGROK nach Hause zurück, um die neu befreite Nation Korea mit dem Segen der Republik China zu verwalten. Doch trotz der hart erkämpften Unabhängigkeit Koreas haben die Koreaner die Hilfe und Freundschaft mit ihren chinesischen Genossen in der Kuomintang nicht vergessen. Heute trafen sich koreanische Vertreter mit [ROOT.GetLeader], um die zukünftigen Beziehungen zwischen der Republik China und der Republik Korea zu besprechen. Korea soll zwar weiterhin unter Chinas Einfluss und Schutz stehen, aber dennoch eine gewisse nominelle Autonomie genießen, da sich beide Länder verpflichtet haben, als Zwillingstiger zusammenzuarbeiten, um Frieden, Sicherheit und Stabilität in Ostasien zu wahren."
korea_events.4.a: "Wir stehen zusammen!"

korea_events.5.t: "Kim Hong-il kehrt nach Korea zurück"
korea_events.5.d: "Infolge der japanischen Besetzung ihres Landes verbreiteten sich in den 1920er Jahren verschiedene koreanische Guerilla-Armeen in der Mandschurei, Nordkorea und auf dem chinesischen Festland. Viele koreanische Revolutionäre und Nationalisten im Exil suchten Schutz in chinesischen Militärakademien und republikanischen Bewegungen, in der Hoffnung, eines Tages vielleicht in ihre Heimat zurückkehren zu können.\nWie viele andere befand sich auch Kim Hong-il im Exil und reiste in den äußersten Südwesten von Guizhou, um eine militärische Ausbildung zu absolvieren, wo er He Yingqin kennenlernte. 1926 schloss sich Hong-il der Nationalen Revolutionsarmee an und nahm an der zum Scheitern verurteilten Nordexpedition teil. Nach deren Scheitern floh Hong-il mit Yingqin und den Überresten der rechten Fraktion der Kuomintang nach Yunnan. Mit dem Sieg der Chinesen über ihre japanischen Gegner im Zweiten Chinesisch-Japanischen Krieg hat Hong-il jedoch offiziell seinen Rücktritt erklärt, um in der neuen koreanischen Republik zu dienen."
korea_events.5.a: "Vielen Dank für deinen Dienst."

korea_events.6.t: "Unsere Verbündeten in Korea"
korea_events.6.d: "Während des letzten Krieges gegen die japanische Aggression arbeiteten koreanische Revolutionäre Seite an Seite mit unserer Regierung daran, dem elenden Imperium Tokios ein Ende zu bereiten und nach einem halben Jahrhundert der Herrschaft ein freies Korea zu verwirklichen. Diese treuen Revolutionäre, die unter der Provisorischen Regierung der Republik Korea dienten, haben sich von einer bunten Truppe von Freiheitskämpfern zu einer verantwortungsbewussten Regierung unter der Führung von Kim Koo gewandelt, mit dem Segen und der Unterstützung von [ROOT.getLeader] und der [ROOT.getAdjective]-Regierung in [ROOT.Capital.GetCapitalVictoryPointName].\n\nKim, der seine Position als Gründervater Koreas gefestigt hat, hat dafür gesorgt, dass sich Korea zu einer pluralistischen Gesellschaft entwickelt hat, die sich der Verbesserung der Nation mit jedem Jahr verschrieben hat. Auch im Ausland unterhält Kim Koo enge Beziehungen zur Regierung von [ROOT.getLeader], wobei externe Beobachter die aufblühende besondere Beziehung zwischen [ROOT.getAdjective] und Korea hervorheben. Da [ROOT.getLeader] und Kim Koo stets auf einer Linie liegen und die gleiche Agenda verfolgen, wird der [ROOT.getAdjective]-koreanische Block auch weiterhin eine Säule des Weltfriedens und der Sicherheit sein."
korea_events.6.a: "Auf eine dauerhafte Partnerschaft."

korea_events.7.t: "Der Sozialismus in der Schwesterrepublik"
korea_events.7.d: "Da Generalissimus Feng Yuxiang derzeit dabei ist, sich der linken Flanke der Kuomintang anzunähern, strebt der christliche General nun danach, Chinas Einflusssphäre in einer neuen sozialistischen Richtung zu festigen, insbesondere in der Koreanischen Republik. Obwohl Kim Kyu-sik von Feng ins Amt gebracht wurde und seine fortwährende Loyalität zugesichert hat, bleiben Feng und die Kuomintang gegenüber seiner Regierung vorsichtig. Zwar folgte er dem Zentralen Exekutivkomitee und der Koreanischen Nationalen Revolutionspartei ins Exil nach Paris, bevor er ein Jahrzehnt später triumphierend nach China zurückkehrte, doch war stets bekannt, dass Kim Kyu-sik sich eher den rechten Kreisen innerhalb der Kuomintang zuwandte.\n\nWährend Kim unter Fengs Führung eine sozialistischere Richtung eingeschlagen hat, raten viele innerhalb der Partei dem Generalissimus, Kim gänzlich zu entlassen und durch eine zuverlässigere Persönlichkeit zu ersetzen. Kim Wonbong, ein langjähriger Verbündeter des linken Flügels der Kuomintang und ehemaliger Vorsitzender der KNRP, wurde als Hauptkandidat für die Nachfolge von Kim Kyu-sik ins Gespräch gebracht. Obwohl er sich durch Fengs anfängliche Bevorzugung von Kim Kyu-sik zurückgesetzt fühlte, signalisierte er Feng seine Absicht, die neue sozialistische Regierung zu unterstützen, sollte diese die Macht übernehmen, und überzeugte damit den christlichen General.\n\nAm späten Nachmittag stürmten Kim Wonbong und eine Gruppe von Getreuen das Armeehauptquartier und besetzten die Nationalversammlung. Kim Wonbong handelte schnell und nahm Kim Kyu-sik persönlich fest, bevor er ihn seines Amtes enthob. In einer Rede vor den Zuschauern erklärte Kim Wonbong, dass Korea einen echten sozialistischen Kurs einschlagen und eine Republik schmieden werde, die den Arbeitern und Bauern echte Macht verleiht."
korea_events.7.a: "Das koreanische Volk hat sich erhoben!"

korea_events.8.t: "Die Revolution im Ausland reinigen"
korea_events.8.d: "Endlich ist die Kuomintang von der Plage befreit, die sie im vergangenen Jahrzehnt zu einer unbeweglichen und zerfallenden Organisation gemacht hat. Doch in ganz Ostasien gibt es noch immer weitere Mitglieder der fünften Kolonne und sozialistischen Abschaum. Auf der kürzlich befreiten koreanischen Halbinsel überließ Generalissimus He Yingqin die Regierung der Kontrolle von Kim Kyu-sik und der Koreanischen Nationalrevolutionären Partei – ein schwerwiegender Fehler.\n\nKim, der zwar weniger zum Marxismus neigte als der törichte Anarchist Kim Wonbong, schloss sich dennoch Wang Jingweis Hundezwinger in Paris an, anstatt in China zu bleiben, um den gerechten Kampf gegen Imperialismus und Reaktion fortzusetzen. Während seines Aufenthalts in Paris hat Kim Kyu-sik zweifellos eine beträchtliche Menge syndikalistischen Unsinns in seine politische Agenda aufgenommen, was Korea mit Sicherheit ins Verderben stürzen wird.\n\nDoch noch ist nicht alles verloren. In dem dekadenten Chaos, das die KNRP darstellt, befinden sich Yeom Dong-jin und seine „White Shirt Society“. Als langjähriger Freund von Teng Jie und den „Blue Shirts“ der Kuomintang hat Yeom den Einsatz von Terror und Revolver begrüßt, um einen echten politischen Wandel herbeizuführen, und seinen Anhängern wahre revolutionäre Prinzipien eingeimpft. Der Lingxiu hat beschlossen, seinen alten Freund um Hilfe zu bitten, um die Koreanische Republik vor dem Krypto-Marxismus zu retten und Korea auf den wahren Weg der Revolution zu führen.\n\nMit einer Koalition aus Loyalisten und wahren nationalen Revolutionären übernahmen Yeoms Männer rasch die Kontrolle über die Innenstadt von Seoul und das Armeehauptquartier, während er persönlich die Nationalversammlung stürmte, um Präsident Kim festzunehmen. Nach einer improvisierten Vereidigungszeremonie erklärte Präsident Yeom, er werde die Republik vor allen Feinden Koreas verteidigen und die Nation von allen Verrätern säubern."
korea_events.8.a: "Die Schwesterrepublik kehrt in den Schoß der Gemeinschaft zurück."

