KOR_revolution_tt: "§tNach Jahrzehnten der Unterdrückung hat sich das koreanische Volk erhoben. Mit der gesicherten Unabhängigkeit wird unsere Nation in den Flammen der Revolution neu geschmiedet werden!§!"
KOR_socialist_republic_tt: "§tUnsere Revolution steht in den Startlöchern, um unseren glorreichen Marsch in die Utopie anzutreten. Für die Partei und die Nation!§!"
KOR_germany_tt: "Angriffsbonus gegen §HDeutschland und seine Kolonien§!: [?0.10|+=%1]"
KOR_china_check_tt: "§LKorea steht unter der Kontrolle der §aKoreanischen Nationalen§! §RRevolutionären Partei§!.§!"
KOR_knrp_wss_check_tt: "§LDie §nGesellschaft der Weißen Hemden§! hat die §aKoreanische Nationale Revolutionspartei§! kooptiert.§!"
KOR_establishing_korean_national_capitalism_effect_tt: "§WWir werden zivile Fabriken in §YSeoul, Pjöngjang, Busan und Chongjin§! erhalten. Je nach dem Einfluss unserer Beliebtheitswerte bei den §RRadikalen Sozialisten§!, §aAutoritären Demokraten§! und §nNationalen Populisten§! erhalten wir bis zu zwei zivile Fabriken pro Stadt.§!"

KOR_all_military_reforms_tt: "§LWir haben alle notwendigen Militärreformen abgeschlossen.§!"
KOR_final_army_tooltip_tt: "§CMit Disziplin, Engagement und eisernem Willen haben wir eine mächtige Streitmacht aufgebaut, die Korea für immer frei halten wird!§!"

KOR_national_army_tt: "§CAuch wenn wir nun frei von kolonialer Herrschaft sind, wird der Aufbau einer neuen nationalen Armee sicherstellen, dass Korea unabhängig bleibt. Lasst uns eine Armee aufbauen, um die uns der ganze Osten beneiden wird!§!"

KOR_improve_legitimacy_effect_tt: "§GDie Legitimität unserer Regierung wird sich verbessern!§!"
