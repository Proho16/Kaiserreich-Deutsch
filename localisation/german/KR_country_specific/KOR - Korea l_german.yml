### Initial Parties ####
KOR_totalist_party: "WPK"
KOR_totalist_party_long: "Arbeiterpartei Koreas\n§LDie Arbeiterpartei Koreas entstand aus dem Zusammenschluss mehrerer marxistisch-syndikalistischer Gruppen, die im Zuge der japanischen Besatzung entstanden waren. Pak Hon-yong und die \"Inlandsfraktion\" der koreanischen Sozialisten traten schnell als die prominentesten Vertreter hervor, da sie ihre Aktivitäten während der japanischen Besatzung von innerhalb Koreas aus betrieben hatten. Zu den kleineren Fraktionen gehörten die (mandschurische) Guerilla-Fraktion unter der Führung von Kim Song-ju, die Jangan-Fraktion/Wiederaufbau-Fraktion unter der Führung von Choe Ik-han, Yi Yong, Cho Tong-ho und Hyon Chun-hyok (selbst ein Zusammenschluss mehrerer kleinerer Fraktionen, darunter die Fraktionen von Seoul, Gyeongseong und Shanghai; den Tuesday Club und die Wonsan Red Union) sowie die wenig bekannte Red Flag-Gruppe.\n\nEin Versuch, sich mit der Volkspartei Koreas und später mit der Neue Volkspartei zusammenzuschließen, scheiterte, woraufhin die Arbeiterpartei unter Paks Führung eine harte Auslegung des Marxismus vertrat§!\n"

KOR_KPP_shared_desc: "Als Japans Herrschaft über Korea zu bröckeln begann, verstärkte Lyuh Woon-Hyung seine Bemühungen, diese Herrschaft zu untergraben und Menschen aus allen Gesellschaftsschichten für die Unabhängigkeitsbewegung zu gewinnen. Obwohl er von den japanischen Behörden verhaftet worden war, setzte er seine Arbeit fort; sein Bekanntenkreis reichte von ehemaligen Kollegen aus der Presse über Sportler und Kampfsportler, Wehrdienstverweigerer, Studentengruppen, Militärdeserteure und verschiedene sozialistische Gruppen bis hin zur \"Bauernallianz\". Auf dieser Grundlage gründete er das Komitee zur Vorbereitung der koreanischen Unabhängigkeit, das kleinere Überfälle auf die japanische Nachhut durchführte. Das Komitee entwickelte sich zur Koreanischen Volkspartei, zerfiel jedoch bald aufgrund interner Machtkämpfe."
KOR_syndicalist_party: "NPP"
KOR_syndicalist_party_long: "Neue Volkspartei\n§L$KOR_KPP_shared_desc$\n\nDie Neue Volkspartei wurde von Kim Mu-chong, Kim Tu-bong, Choe Chang-ik und ihren Verbündeten gegründet, die als \"MinGan\"-Fraktion der koreanischen Linken bekannt wurden, da viele von ihnen erstmals durch den Kampf an der Seite der Kuomintang-Aufständischen im Aufstandsgebiet von Jiangxi und Fujian bekannt wurden. Sie ist moderater als die Arbeiterpartei, aber radikaler als ihre Pendants, die Koreanische Nationale Revolutionspartei und die Partei der arbeitenden Menschen, und unterhält enge Beziehungen zur globalen syndikalistischen Bewegung.§!\n"
KOR_social_democrat_party: "LPP"
KOR_social_democrat_party_long: "Partei der arbeitenden Bevölkerung\n§L$KOR_KPP_shared_desc$\n\nLyuh Woon-hyung und seine Verbündeten gründeten daraufhin die Partei der arbeitenden Bevölkerung (LPP), die sich zwischen revolutionäreren sozialistischen Fraktionen und der vehementen antisozialistischen Opposition reaktionärer Kräfte bewegte. Obwohl er viele Anhänger verlor, hat Lyuhs persönliche Popularität es ihm ermöglicht, sich zu einer bedeutenden Kraft in der koreanischen Politik zu entwickeln, und die LPP erweist sich als eine weitaus geschlossener auftretende Partei als ihre Vorgängerin.§!\n"

KOR_KNP_shared_desc: "Die Koreanische Nationalistische Partei, die im Zuge der Neuordnung von Ji Cheong-cheons Neue Koreanische Unabhängigkeitspartei angesichts der neu erlangten Unabhängigkeit Koreas gegründet wurde, orientiert sich an Dr. Sun Yat-sens Drei Volksprinzipien und strebt den Wiederaufbau Koreas nach dem Vorbild des Tridemismus an. Obwohl sie in ihrem Engagement für die Umsetzung der Sanmin-Doktrin Ähnlichkeiten mit der Koreanischen Nationalrevolutionären Partei aufweist, versteht sich die KNP als wahre Anhängerin von Suns Vision und lehnt die KNRP wegen ihres syndikalistischen Einflusses entschieden ab."
#Because this should not be a rulign party, does not need a longer desc unless something goes wrong.
KOR_social_liberal_party_united: "KNP"
KOR_social_liberal_party_united_long: "Koreanische Nationalistische Partei\n§L$KOR_KNP_shared_desc$§!\n"
KOR_social_liberal_party: "KNP-M"
KOR_social_liberal_party_long: "Koreanische Nationalistische Partei – Gemäßigte\n§L$KOR_KNP_shared_desc$\n\nDie gemäßigtere Fraktion der KNP wird von Yun Chi-yong angeführt, der bei der Machtsicherung im Allgemeinen einen eher parlamentarischen Ansatz bevorzugt. Dank seiner Fähigkeiten im Umgang mit der Öffentlichkeit und der Jugend – die sich gut auf zynischere Methoden zur Gewährleistung der \"öffentlichen Sicherheit\" durch die Bewaffnung junger Milizionäre übertragen ließen – erweist sich Yun als fähiger und flexibler politischer Überlebenskünstler.§!\n"
KOR_authoritarian_democrat_party: "KNP-R"
KOR_authoritarian_democrat_party_long: "Koreanische Nationalistische Partei – Radikale\n§L$KOR_KNP_shared_desc$\n\nInnerhalb der Partei bilden Ji Cheong-cheon und seine Anhänger den radikalen Flügel der KNP, von denen viele Mitglieder der Koreanischen Befreiungsarmee waren. Geprägt durch jahrzehntelangen Widerstand gegen die japanischen Besatzer ist Jis Flügel der KNP fest entschlossen, seinen Willen kompromisslos durchzusetzen.§!\n"

KOR_market_liberal_party: "KDP"
KOR_market_liberal_party_long: "Demokratische Partei Koreas\n§LDie Demokratische Partei Koreas entstand aus dem Zusammenschluss mehrerer kleinerer Parteien, die nach dem Ende der japanischen Herrschaft gegründet worden waren, darunter die Demokratische Partei, die Nationale Partei und das Vorbereitungskomitee für die Nationalversammlung. Obwohl sie ursprünglich als breite Volksbewegung gedacht war, entwickelte sie sich in der Praxis zu einer konservativen und vehement antisozialistischen Partei. Ihr Ruf ist äußerst zwiespältig: Sie gilt zwar als Koreas erste liberale Partei (wenn auch mit konfuzianischen Einflüssen), wird jedoch von manchen aufgrund ihrer Opposition gegen den Sozialismus als streng reaktionär angesehen und beschuldigt, viele ehemalige japanische Kollaborateure aufgenommen zu haben.\n\nSie ist nicht zu verwechseln mit der Demokratischen Partei von Cho Man-sik, einem linksgerichteten Zusammenschluss von Unternehmern, Kaufleuten, Handwerkern, Kleinbürgern, Bauern und Christen.§!\n"

KOR_KIP_shared_desc: "Die Koreanische Unabhängigkeitspartei ist die bedeutendste politische Kraft in der Provisorischen Regierung Koreas und verkörpert das Streben nach Unabhängigkeit unzähliger Parteien und Menschen. Die KIP besteht aus vielen verschiedenen Fraktionen, von der KMT nahestehenden Linken bis hin zu rechten Ultranationalisten. Dennoch sind sich die meisten bewusst, dass letztendlich die Macht und die Methoden aller verschiedenen Fraktionen voll und ganz genutzt werden müssen, damit Korea wieder auf die Beine kommen und gegen die Strömungen der Welt bestehen kann."
#Because this is not a ruling party, does not need a longer desc.
KOR_social_conservative_party: "KIP"
KOR_social_conservative_party_long: "Koreanische Unabhängigkeitspartei\n§L$KOR_KIP_shared_desc$§!\n"
KOR_social_conservative_party_split: "KIP-M"
KOR_social_conservative_party_split_long: "Koreanische Unabhängigkeitspartei – Gemäßigte\n§L$KOR_KIP_shared_desc$\n\nObwohl die KIP gezwungen war, einen eher parlamentarischen Ansatz zu verfolgen, um ihre Machtposition zu sichern, gelang es ihr dennoch, durch einen aggressiven Wahlkampf und die politische Trägheit der Opposition ihren Sieg zu erringen. Sie kann nun für sich beanspruchen, ein offizielles Mandat des Volkes zu haben, um ihre Vision eines freien Koreas umzusetzen.§!\n"
KOR_authoritarian_democrat_party_kip: "KIP-H"
KOR_authoritarian_democrat_party_kip_long: "Koreanische Unabhängigkeitspartei – Hardliner\n§L$KOR_KIP_shared_desc$\n\nDie KIP nutzte ihre privilegierte Stellung als führende Persönlichkeiten der koreanischen Provisorischen Regierung sowohl vor als auch nach ihrer Rückkehr aus dem Exil aus und konnte so durch politische Machenschaften und Unterdrückung mühelos Wahlen gewinnen. Dies mag zwar einen Schatten auf ihre Legitimität werfen, hindert sie jedoch nicht daran, auch legitime Popularität zu genießen.§!\n"

KOR_radical_socialist_party: "KNRP"
KOR_KNRP_desc: "Die KNRP ist die offizielle Schwesterorganisation der Kuomintang und entstand aus alten Gruppierungen der KIP, die nicht bereit waren, mit deren überwiegend antisozialistischer Regierung zusammenzuarbeiten. Die KNRP strebt danach, die Drei Volksprinzipien auch in Korea umzusetzen, sei es durch demokratische oder eher zwanghafte Methoden. Während sie innerhalb der Kuomintang sicherlich eine unpolitische Organisation war, vertreten ihre Mitglieder ein breites Spektrum an Tendenzen, von Anhängern des Provisorischen Aktionskomitees bis hin zu Anhängern der Vereinigung zur Neuorganisation der Genossen."
KOR_radical_socialist_party_long: "Koreanische Nationale Revolutionspartei\n§L$KOR_KNRP_desc$§!\n"
KOR_radical_socialist_party_split: "KNRP-L"
KOR_radical_socialist_party_split_long: "Koreanische Nationale Revolutionspartei – Links\n§L$KOR_KNRP_desc$\n\nDie linke Hauptfraktion wird von Kim Wonbong und Yoon Se-ju angeführt und dreht sich im Wesentlichen um Kims Personenkult.§!\n"
KOR_authoritarian_democrat_party_knrp: "KNRP-R"
KOR_authoritarian_democrat_party_knrp_long: "Koreanische Nationale Revolutionspartei – Rechts\n§L$KOR_KNRP_desc$\n\nDie rechte Fraktion wird von Kim Kyu-sik und Jo So-ang angeführt, die sich im Allgemeinen von den eher sozialistischen Elementen des KNRP-Programms distanziert haben.§!\n"

KOR_WSS_shared_desc: "Die Gesellschaft der Weißen Hemden wurde von verschiedenen Extremisten innerhalb der Koreanischen Befreiungsarmee gegründet, die entschlossen waren, die japanische Herrschaft zu stürzen. Unter der Führung von Yeom Dong-jin standen sie zwar auf der Seite der von der Beiyang-Regierung finanzierten Provisorischen Regierung Koreas, ließen sich jedoch von den Drei Volksprinzipien der Kuomintang inspirieren. Da sie dem Syndikalismus und anderen, dem Sozialismus gegenüber versöhnlicheren Fraktionen generell feindlich gegenüberstehen, haben sie sich als mehr als bereit erwiesen, ihre nationalpopulistische Rhetorik mit politischer Gewalt und Terrorismus zu untermauern. Leider sind sie mit dieser Bereitschaft bei weitem nicht allein – viele andere Fraktionen der Nachunabhängigkeitszeit verüben ebenfalls Attentate."
KOR_national_populist_party_knrp: "KNRP-WSS"
KOR_national_populist_party_knrp_long: "Koreanische Nationale Revolutionspartei – Gesellschaft der Weißen Hemden\n§L$KOR_WSS_shared_desc$\n\nAuf Geheiß der Chinesen waren sie gezwungen, sich mit der KNRP zu verbünden, blieben aber der Blue Shirts Society nahestehend, die sie als eine ihnen verwandte Bewegung betrachteten. Dennoch schmiedeten sie weiterhin Pläne für den Tag, an dem sie die Führung vollständig an sich reißen könnten.§!\n"
KOR_national_populist_party: "WSS"
KOR_national_populist_party_long: "Gesellschaft der Weißen Hemden\n§L$KOR_WSS_shared_desc$§!\n"

KOR_KLP_shared_desc: "Die Liberale Partei entstand aus dem Zusammenschluss mehrerer wichtiger Gruppen, die der neuen Diktatur treu ergeben waren – dem Koreanischen Jugendkorps, der Koreanischen Nationalen Vereinigung zur Förderung der Unabhängigkeit, dem Koreanischen Gewerkschaftsbund, dem Koreanischen Bauernverband, dem Koreanischen Frauenverband sowie Mitgliedern der Koreanischen Befreiungsarmee unter der Führung von Lee Beom-seok, die ursprünglich die Vereinigte Arbeiter- und Bauernpartei gegründet hatten. Trotz ihres Namens lehnen sie den westlichen Individualismus ab und streben stattdessen eine \"liberale Demokratie nach koreanischem Vorbild\" an, die von Traditionalismus, Antisozialismus und antijapanischen Gefühlen sowie vom Ilminismus – dem \"Ein-Volk-Prinzip\", das den koreanischen Ultranationalismus und die ethnische Vorherrschaft fördert – geprägt ist."
KOR_authoritarian_democrat_party_lp: "LP-C"
KOR_authoritarian_democrat_party_lp_long: "Liberale Partei – Konservative\n§L$KOR_KLP_shared_desc$\n\nDie konservative Fraktion der Liberalen Partei wird von Lee Gap-seong angeführt, einem langjährigen Unabhängigkeitsaktivisten, Mitglied christlicher Gruppen in Korea und Organisator der Liberalen Partei (obwohl er anfangs zwischen verschiedenen Gruppierungen hin- und herwechselte). Sie wurden von Rhee als Gegengewicht zur Ilmin-Fraktion von Lee Beom-seok eingesetzt.§!\n"
KOR_paternal_autocrat_party_split: "LP-I"
KOR_paternal_autocrat_party_split_long: "Liberale Partei – Ilministen\n§L$KOR_KLP_shared_desc$\n\nDie Ilministen werden von Lee Beom-seok angeführt und repräsentieren den radikaleren Flügel der Partei – sie agieren vor allem über das Koreanische Nationale Jugendkorps und das Militär. Sie werden von Rhee mit gewissem Misstrauen betrachtet und wurden beschuldigt, mit der globalen nationalpopulistischen Bewegung zu sympathisieren.§!\n"
KOR_paternal_autocrat_party: "LP"
KOR_paternal_autocrat_party_long: "Liberale Partei\n§L$KOR_KLP_shared_desc$\n\nDie Ilministen werden von Lee Beom-seok angeführt und repräsentieren den radikaleren Flügel der Partei – sie agieren vor allem über das Koreanische Nationale Jugendkorps und das Militär. Man sagt ihnen Sympathien für die globale nationalpopulistische Bewegung nach; im Allgemeinen agieren sie wie eine veredelte Militärregierung.§!\n"

### Events ###
korea_events.1.t: "Ein Telegramm aus Seoul"
korea_events.1.d: "Unter der Führung der Provisorischen Regierung, die von Kim Koo’s Korea Independence Party geleitet wird, scheint der koreanische Staat auf dem besten Weg zu sein, sich zu einer stabilen und ausgeglichenen Nation zu entwickeln. Nach zahlreichen Gesprächen und Verhandlungen mit anderen kleineren Parteien scheint es, als könnte Korea in naher Zukunft sogar Wahlen abhalten. Doch trotz der ausgelassenen Stimmung herrscht weiterhin eine unterschwellige Unsicherheit. Während Kim Koo öffentlich die Notwendigkeit freier und fairer Wahlen betont hat, hegen viele Zweifel daran, inwieweit der provisorische Präsident beabsichtigt, sein Wort zu halten.\n\nZwar wird Kim Koo allgemein als Gründervater der Nation geachtet, doch glauben viele, dass seine Befürchtung, andere Parteien könnten das Land in die Irre führen, ihn daran hindern wird, faire Wahlen zu gewährleisten. Tatsächlich hat eine zunehmende Polarisierung in der öffentlichen Debatte radikalere Kräfte innerhalb der koreanischen Bevölkerung mobilisiert und schürt ein wachsendes Gefühl der Parteizugehörigkeit in dem jungen Staat. Es scheint, dass diese zunehmenden Spannungen Kim tatsächlich Anlass zur Sorge geben, denn unser Außenministerium hat einen Brief von Kim erhalten, in dem er um Unterstützung für mögliche Pläne bittet, um die Stabilität des Landes zu wahren.\n\nKim führt an, dass sozialistische und radikale Elemente zunehmend gewalttätiger werden, je näher der Wahltag rückt, und hat geheime Pläne skizziert, um sicherzustellen, dass die Wahl reibungslos zugunsten der KIP verläuft, oder sogar einen Staatsstreich durchzuführen, sollte eine Partei gewinnen, die den nationalen Interessen unseres Landes feindlich gegenübersteht. Mit der Behauptung, er allein sei der Einzige, der Korea in eine bessere Zukunft führen könne, und ein fähiger Verbündeter von [ROOT.getLeader], hat Kim seine Position klargestellt. Zwar bleibt Kim ein starker Verbündeter unserer Regierung, doch könnte die Unterstützung solcher Maßnahmen riskant sein.\n\nSollte Kims Risiko fehlschlagen und die neu gewählte Regierung davon erfahren, könnten sich die Beziehungen zum koreanischen Staat rasch zu gegenseitigem Misstrauen verschlechtern. Noch schlimmer wäre es jedoch, wenn die Wahlen von bereits feindlich gesinnten Kräften gekapert würden, weil die KIP nicht ausreichend durch unsere Unterstützung gestützt würde. Letztendlich muss [ROOT.getLeader] eine schwierige Entscheidung treffen."
korea_events.1.a: "Unterstützt Kims Plan, er ist unser Mann bis zum Schluss."
korea_events.1.b: "Wir sind zuversichtlich, dass Kim in einem fairen Wettbewerb gewinnen kann."

korea_events.2.t: "Wahl von [GetYear]"
korea_events.2.d: "Nach langer Vorfreude auf die Wahlen stehen die Gewinner der diesjährigen Wahlen fest..."
