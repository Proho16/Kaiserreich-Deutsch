KOR_improve_economy_effect_tt: "§GUnser Land wird seine wirtschaftliche Lage verbessern!§!"

KOR_free_nation_tt: "§mAuch wenn Korea sich nun vielleicht aus dem Würgegriff Tokios befreit hat, ist unsere Unabhängigkeit mit einer wirtschaftlichen Katastrophe erkauft worden. Lasst uns die Trümmer aufräumen.§!"

KOR_bright_future_tt: "§mWir werden unsere Anstrengungen zur Modernisierung Koreas bündeln!§!"
KOR_cinema_tt: "§lLicht, Kamera, Action!§!"

KOR_railways_tt: "§CSollte Korea zu China gehören, wird im Rahmen dieses Projekts eine zusätzliche Eisenbahnverbindung nach Shenyang gebaut!§!"

### Ideas ####
KOR_legitimacy_idea_1: "Legitimität der Provisorischen Regierung: §oKatastrophal§!"
KOR_legitimacy_idea_1_desc: "Die seit Jahrzehnten im Exil lebende Provisorische Regierung Koreas konnte nur mit Entsetzen zusehen, wie das Japanische Kaiserreich der Nation immer mehr Freiheiten entzog und das koreanische Volk der Demütigung der Knechtschaft aussetzte. Selbst jetzt, da die japanischen Fesseln endgültig gesprengt sind, befindet sich der koreanische Staat nach wie vor in einem ungewissen Zustand.\n\nDer Abzug der japanischen Kolonialbehörden hat die Provisorische Regierung dazu gezwungen, hastig die Regierungsgeschäfte zu übernehmen, was zu einer vorübergehenden chaotischen Lage geführt hat. Abgesehen von den Problemen beim Regierungswechsel muss sich das neue Regime auch darauf vorbereiten, eine Nation zu regieren, die seit Generationen unter Kolonialherrschaft stand. Trotz der unüberwindbaren Aufgabe der Provisorischen Regierung, eine neue und freie Nation zu errichten, sind das Volk und seine Führung zuversichtlich, dass Koreas Zukunft in der Tat rosig sein wird."
KOR_legitimacy_idea_2: "Legitimität der Provisorischen Regierung: §oKatastrophal§!": §gDysfunktional§!"
KOR_legitimacy_idea_2_desc: "$KOR_legitimacy_idea_1_desc$"
KOR_legitimacy_idea_3: "Legitimität der Provisorischen Regierung: §oKatastrophal§!": §GGeduldet§!"
KOR_legitimacy_idea_3_desc: "$KOR_legitimacy_idea_1_desc$"

KOR_legitimacy_democratic: "Legitimität der Provisorischen Regierung: §oKatastrophal§!": §cDemokratisches Korea§!"
KOR_legitimacy_democratic_desc: "Es wurde oft behauptet, dass die Provisorische Regierung Koreas und die Koreanische Unabhängigkeitspartei dazu verdammt waren, mit ihren Hoffnungen auf die Errichtung eines freien und gleichberechtigten koreanischen Staates zu scheitern, und auch heute noch sind viele pessimistische Stimmen zu hören; doch lässt sich nicht leugnen, dass die Provisorische Regierung Koreas ihre Ziele erreicht hat.\n\nKorea ist heute nicht nur von der Fremdherrschaft einer Kolonialmacht befreit, sondern genießt auch die Freiheiten eines aufstrebenden demokratischen Staates, was in einem postkolonialen Staat als unmöglich galt. Es stimmt zwar, dass Koreas neue Demokratie noch jung und unerprobt ist, doch das koreanische Volk ist der Aufgabe gewachsen, sein Land weise und gerecht zu regieren."
KOR_legitimacy_kip: "Legitimität der Provisorischen Regierung: §oKatastrophal§!": §cUnabhängigkeit für immer§!"
KOR_legitimacy_kip_desc: "Es wurde oft behauptet, dass die Provisorische Regierung Koreas und die Koreanische Unabhängigkeitspartei dazu verdammt waren, mit ihren Hoffnungen auf die Errichtung eines freien und gleichberechtigten koreanischen Staates zu scheitern, und auch heute noch sind viele pessimistische Stimmen zu hören; doch lässt sich nicht leugnen, dass die Provisorische Regierung Koreas ihre Ziele erreicht hat.\n\nKorea ist heute nicht nur von der Fremdherrschaft einer Kolonialmacht befreit, sondern genießt auch die Freiheiten eines aufstrebenden demokratischen Staates, was in einem postkolonialen Staat als unmöglich galt. Zwar ist Koreas neue Demokratie noch jung und unerprobt, doch das koreanische Volk ist der Aufgabe gewachsen, sein Land weise und gerecht zu regieren.\n\nKim Koo, einst provisorischer Regierungschef und nun vom koreanischen Volk mit einem Mandat ausgestattet, ist bereit, einen konservativen und doch überraschend egalitären Kurs einzuschlagen, der den einzigartigen sozialen und wirtschaftlichen Bedingungen Koreas entspricht."
KOR_legitimacy_authkip: "Legitimität der Provisorischen Regierung: §oKatastrophal§!": §aUnabhängigkeit um jeden Preis verteidigt§!"
KOR_legitimacy_authkip_desc: "Unter starker Führung und dank fähiger Staatskunst hat sich Korea wahrhaft stabilisiert und ist bereit, zu einer neuen Nation umgestaltet zu werden, die frei von jeglichem kolonialen Einfluss ist. Doch im Schatten lauern Verräter und Unruhestifter.\n\nAngesichts solcher Parasiten, die bereit sind, unser Land erneut in die Schrecken von Krieg und Ausbeutung zu stürzen, wie könnten wir da freie und faire Wahlen zulassen, bei denen diese Mitglieder der fünften Kolonne das Volk in die Irre führen könnten?\n\nNein, Korea wird wahren Wohlstand durch die Aufrechterhaltung unserer glorreichen und gerechten Führung erlangen. Mit freier Hand, den nationalen Willen umzusetzen, kann man sogar sagen, dass die derzeitige Regierung eine Ausübung wahrer Demokratie ist, ungeachtet dessen, was Kritiker fälschlicherweise behaupten mögen.\n\nAuch wenn Kim Koo vielleicht erwogen hat, das demokratische Experiment durchzuführen, ist ihm klar geworden, dass er allein Koreas bestes Interesse im Sinn hat. Angesichts der Tatsache, dass er auf Schritt und Tritt von Krypto-Syndikalisten, westlichen Handlangern und übereifrigen Clowns flankiert wird, wie könnte der Mann, der so lange an der Spitze der Provisorischen Regierung stand, zulassen, dass diese Koreas Chance auf eine bessere Zukunft zunichte machen? Nein, Kim Koo wird dafür sorgen, dass Korea auf dem richtigen und richtigen Weg zu Freiheit und Unabhängigkeit bleibt."
KOR_legitimacy_knp: "Legitimität der Provisorischen Regierung: §oKatastrophal§!": §lDrei Grundsätze für Korea§!"
KOR_legitimacy_knp_desc: "Es wurde oft behauptet, dass die Provisorische Regierung Koreas und die Koreanische Unabhängigkeitspartei dazu verdammt waren, mit ihren Hoffnungen auf die Errichtung eines freien und gleichberechtigten koreanischen Staates zu scheitern, und auch heute noch sind viele pessimistische Stimmen zu hören; doch lässt sich nicht leugnen, dass die Provisorische Regierung Koreas ihre Ziele erreicht hat.\n\nKorea ist heute nicht nur von der Fremdherrschaft einer Kolonialmacht befreit, sondern genießt auch die Freiheiten eines aufstrebenden demokratischen Staates, was in einem postkolonialen Staat als unmöglich galt. Zwar ist Koreas neue Demokratie noch jung und unerprobt, doch das koreanische Volk ist der Aufgabe gewachsen, sein Land weise und gerecht zu regieren.\n\nUnter ihrem ersten demokratischen Staatschef, Yun Chi-Young, ist die Nation bereit, einen Weg einzuschlagen, der von Sun Yat-sen und seinen Drei Prinzipien vorgegeben ist, jedoch in eine demokratischere und konservativere Richtung, die den besonderen sozialen und wirtschaftlichen Gegebenheiten Koreas besser entspricht."
KOR_legitimacy_kdp: "Legitimität der Provisorischen Regierung: §oKatastrophal§!": §mDemocratic Stronghold§!"
KOR_legitimacy_kdp_desc: "Es wurde oft behauptet, dass die Provisorische Regierung Koreas und die Koreanische Unabhängigkeitspartei dazu verdammt waren, mit ihren Hoffnungen auf die Errichtung eines freien und gleichberechtigten koreanischen Staates zu scheitern, und auch heute noch sind viele pessimistische Stimmen zu hören; doch lässt sich nicht leugnen, dass die Provisorische Regierung Koreas ihre Ziele erreicht hat.\n\nKorea ist heute nicht nur von der Fremdherrschaft einer Kolonialmacht befreit, sondern genießt auch die Freiheiten eines aufstrebenden demokratischen Staates, was in einem postkolonialen Staat als unmöglich galt. Zwar ist Koreas neue Demokratie noch jung und unerprobt, doch das koreanische Volk ist der Aufgabe gewachsen, sein Land weise und gerecht zu regieren.\n\nUnter ihrem ersten demokratischen Staatschef, Chough Pyung-ok, ist das Land bereit, einen gemäßigt konservativen Kurs einzuschlagen, der sich an den liberalen Demokratien des Westens orientiert, aber an die besonderen sozialen und wirtschaftlichen Gegebenheiten Koreas angepasst ist."
KOR_legitimacy_lpp: "Legitimität der Provisorischen Regierung: §oKatastrophal§!": §SUncompromised Idealism§!"
KOR_legitimacy_lpp_desc: "Es wurde oft behauptet, dass die Provisorische Regierung Koreas und die Koreanische Unabhängigkeitspartei dazu verdammt waren, mit ihren Hoffnungen auf die Errichtung eines freien und gleichberechtigten koreanischen Staates zu scheitern, und auch heute noch sind viele pessimistische Stimmen zu hören; doch lässt sich nicht leugnen, dass die Provisorische Regierung Koreas ihre Ziele erreicht hat.\n\nKorea ist heute nicht nur von der Fremdherrschaft einer Kolonialmacht befreit, sondern genießt auch die Freiheiten eines aufstrebenden demokratischen Staates, was in einem postkolonialen Staat als unmöglich galt. Zwar ist Koreas neue Demokratie noch jung und unerprobt, doch das koreanische Volk ist der Aufgabe gewachsen, sein Land weise und gerecht zu regieren.\n\nUnter ihrem ersten demokratischen Staatschef, Luh Woon-hyung, ist das Land bereit, einen gemäßigt-sozialistischen Kurs einzuschlagen, der sowohl den westlichen kapitalistischen Mächten als auch einem übereifrigen revolutionären Syndikalismus entgegensteht, da Korea einen eigenen Weg einschlagen muss, der seinen einzigartigen sozialen und wirtschaftlichen Gegebenheiten entspricht."

KOR_legitimacy_authoritarian: "Legitimität der Provisorischen Regierung: §oKatastrophal§!": §aFreiheit durch Stärke§!"
KOR_legitimacy_authoritarian_desc: "Unter starker Führung und dank fähiger Staatskunst hat sich Korea wirklich stabilisiert und ist bereit, zu einer neuen Nation umgestaltet zu werden, die frei von jeglichem kolonialen Einfluss ist. Doch im Schatten lauern Verräter und Unruhestifter.\n\nAngesichts solcher Parasiten, die bereit sind, unser Land erneut in die Schrecken von Krieg und Ausbeutung zu stürzen, wie könnten wir da freie und faire Wahlen gutheißen, bei denen diese Mitglieder der fünften Kolonne das Volk in die Irre führen könnten?\n\nNein, Korea wird wahren Wohlstand durch die Aufrechterhaltung unserer ruhmreichen und gerechten Führung erlangen. Da sie freie Hand hat, den nationalen Willen umzusetzen, kann man sogar sagen, dass die derzeitige Regierung eine Ausübung wahrer Demokratie ist, ungeachtet dessen, was Kritiker fälschlicherweise behaupten mögen."
KOR_legitimacy_authknp: "Legitimität der Provisorischen Regierung: §oKatastrophal§!": §aTridemismus in Perfektion§!"
KOR_legitimacy_authknp_desc: "Unter starker Führung und dank fähiger Staatskunst hat sich Korea wirklich stabilisiert und ist bereit, zu einer neuen Nation umgestaltet zu werden, die frei von jeglichem kolonialen Einfluss ist. Doch im Schatten lauern Verräter und Unruhestifter. Angesichts solcher Parasiten, die bereit sind, unser Land erneut in die Schrecken von Krieg und Ausbeutung zu stürzen, wie können wir da nur zulassen, dass freie und faire Wahlen stattfinden, bei denen diese Mitglieder der fünften Kolonne das Volk in die Irre führen könnten?\n\nNein, Korea wird durch die Aufrechterhaltung unserer ruhmreichen und gerechten Führung wahren Wohlstand erlangen. Da sie freie Hand hat, den nationalen Willen umzusetzen, kann man sogar sagen, dass die derzeitige Regierung ein Beispiel für echte Demokratie ist, ungeachtet dessen, was Kritiker fälschlicherweise behaupten mögen.\n\nPräsident Ji Cheong-cheon hat, im Gegensatz zu den Narren, die sich ihm widersetzen, sein ganzes Leben lang für die Freiheit Koreas gekämpft. Als wahrer Anhänger von Sun Yat-sen – und im Gegensatz zu den syndikalistischen Schädlingen der Koreanischen Nationalrevolutionären Partei, die seine Vision besudelt haben – kann das Volk sicher sein, dass Präsident Ji die Sanmin-Doktrin auf eine Weise umsetzen wird, die dem koreanischen Volk wahrhaft würdig ist."
KOR_legitimacy_lp: "Legitimität der Provisorischen Regierung: §oKatastrophal§!": §PDer große Generalissimus§!"
KOR_legitimacy_lp_desc: "Unter starker Führung und dank fähiger Staatskunst hat sich Korea wirklich stabilisiert und ist bereit, zu einer neuen Nation umgestaltet zu werden, die frei von jeglichem kolonialen Einfluss ist. Doch im Schatten lauern Verräter und Unruhestifter. Angesichts solcher Parasiten, die bereit sind, unser Land erneut in die Schrecken von Krieg und Ausbeutung zu stürzen, wie können wir da nur zulassen, dass freie und faire Wahlen stattfinden, bei denen diese Mitglieder der fünften Kolonne das Volk in die Irre führen könnten?\n\nNein, Korea wird durch die Aufrechterhaltung unserer ruhmreichen und gerechten Führung wahren Wohlstand erlangen. Da sie freie Hand hat, den nationalen Willen umzusetzen, kann man sogar sagen, dass die derzeitige Regierung ein Beispiel für echte Demokratie ist, ungeachtet dessen, was Kritiker fälschlicherweise behaupten mögen.\n\nGeneralissimus Lee Beom-seok und die Liberale Partei hegen nichts als Liebe für das koreanische Volk und streben danach, eine wahrhaft große Koreanische Republik aufzubauen. Unsere Nation wird sich nie wieder Menschen unterwerfen, die der Würde Koreas nicht gerecht werden, und unter der Führung des Generalissimus können wir sicher sein, dass wir stets frei von den Kapitalisten und Sozialisten bleiben werden, die danach trachten, uns zu versklaven."
KOR_legitimacy_diarchy: "Legitimität der Provisorischen Regierung: §oKatastrophal§!": §PDie Macht der Regel der Zwei§!"
KOR_legitimacy_diarchy_desc: "Unter starker Führung und dank fähiger Staatskunst hat sich Korea wirklich stabilisiert und ist bereit, zu einer neuen Nation umgestaltet zu werden, die frei von jeglichem kolonialen Einfluss ist. Doch im Schatten lauern Verräter und Unruhestifter. Angesichts solcher Parasiten, die bereit sind, unser Land erneut in die Schrecken von Krieg und Ausbeutung zu stürzen, wie können wir da nur zulassen, dass freie und faire Wahlen stattfinden, bei denen diese Mitglieder der fünften Kolonne das Volk in die Irre führen könnten?\n\nNein, Korea wird durch die Aufrechterhaltung unserer ruhmreichen und gerechten Führung wahren Wohlstand erlangen. Da sie freie Hand hat, den nationalen Willen umzusetzen, kann man sogar sagen, dass die derzeitige Regierung ein Beispiel für echte Demokratie ist, ungeachtet dessen, was Kritiker fälschlicherweise behaupten mögen.\n\nPräsident Syngman Rhee ist ein Mann, der die Nöte des koreanischen Volkes nur allzu gut kennt. Mit Generalissimus Lee an seiner Seite und der Liberalen Partei unter seiner Führung kann das koreanische Volk beruhigt sein, denn diese beiden Männer der göttlichen Vorsehung werden ein Korea schaffen, das von Stärke durchdrungen ist und ein Bollwerk gegen grausamen und unnatürlichen Syndikalismus bildet."
KOR_legitimacy_rhee: "Legitimität der Provisorischen Regierung: §oKatastrophal§!": §aKoreas einziger Retter§!"
KOR_legitimacy_rhee_desc: "Unter starker Führung und dank fähiger Staatskunst hat sich Korea wirklich stabilisiert und ist bereit, zu einer neuen Nation umgestaltet zu werden, die frei von jeglichem kolonialen Einfluss ist. Doch im Schatten lauern Verräter und Unruhestifter. Angesichts solcher Parasiten, die bereit sind, unser Land erneut in die Schrecken von Krieg und Ausbeutung zu stürzen, wie können wir da nur zulassen, dass freie und faire Wahlen stattfinden, bei denen diese Mitglieder der fünften Kolonne das Volk in die Irre führen könnten?\n\nNein, Korea wird durch die Aufrechterhaltung unserer ruhmreichen und gerechten Führung wahren Wohlstand erlangen. Da sie freie Hand hat, den nationalen Willen umzusetzen, kann man sogar sagen, dass die derzeitige Regierung ein Beispiel für echte Demokratie ist, ungeachtet dessen, was Kritiker fälschlicherweise behaupten mögen.\n\nPräsident Syngman Rhee ist ein Mann, der die Nöte des koreanischen Volkes nur allzu gut kennt. Mit der Liberalen Partei als seinem alleinigen Werkzeug wird Rhee ein wahrhaft gerechtes und starkes Korea aufbauen, das die Werte und Traditionen seines Volkes nicht verrät. Dank seiner Freunde in Washington kann das koreanische Volk beruhigt sein, denn es weiß, dass keine Nation jemals wieder die Unabhängigkeit Koreas bedrohen wird."

KOR_legitimacy_revolutionary: "Legitimität der Provisorischen Regierung: §oKatastrophal§!": §tRevolutionäres Korea§!"
KOR_legitimacy_revolutionary_desc: "Zum ersten Mal in seiner Geschichte steht Korea am Abgrund einer wahrhaft großartigen und egalitären Gesellschaft. Unter der derzeitigen Regierung wurden alle reaktionären und kolonialistischen Ideen ausgemerzt, und die Nation ist dadurch besser geworden. Törichte Ilministen und verwirrte Demokraten verurteilen den Kurs der Republik Korea als Verrat an den koreanischen Werten und Traditionen, aber was wissen sie schon von Anstand und Gerechtigkeit?\n\nKim Koo hat sich der Beiyang-Regierung angeschlossen und den gerechten Kampf der Kuomintang gegen Imperialismus und Dekadenz aufgegeben, Lee versteht nichts anderes, als die Bevölkerung zu brutalisieren, Rhee ist nichts weiter als ein amerikanischer Schoßhund, und die sogenannte demokratische Opposition besteht aus Nörglern, die zu sehr in den Klang ihrer eigenen Stimmen verliebt sind. Nein, Koreas Revolutionsregierung wird sich nicht der Kritik dieser Schwachköpfe beugen, die nicht bereit sind, die Zukunft anzunehmen, indem sie mit der Vergangenheit brechen."
KOR_legitimacy_wpk: "Legitimität der Provisorischen Regierung: §oKatastrophal§!": §oDie Revolution aus eigenem Anbau§!"
KOR_legitimacy_wpk_desc: "Zum ersten Mal in seiner Geschichte steht Korea am Abgrund einer wahrhaft großartigen und egalitären Gesellschaft. Unter der derzeitigen Regierung wurden alle reaktionären und kolonialistischen Ideen ausgemerzt, und die Nation ist dadurch besser geworden. Törichte Ilministen und verwirrte Demokraten verurteilen den Kurs der Republik Korea als Verrat an den koreanischen Werten und Traditionen, aber was wissen sie schon von Anstand und Gerechtigkeit?\n\nKim Koo hat sich der Beiyang-Regierung angeschlossen und den gerechten Kampf der Kuomintang gegen Imperialismus und Dekadenz aufgegeben, Lee versteht nichts anderes, als die Bevölkerung zu brutalisieren, Rhee ist nichts weiter als ein amerikanischer Schoßhund, und die sogenannte demokratische Opposition besteht aus Nörglern, die zu sehr in den Klang ihrer eigenen Stimmen verliebt sind. Nein, Koreas Revolutionsregierung wird sich nicht der Kritik dieser Schwachköpfe beugen, die nicht bereit sind, die Zukunft anzunehmen, indem sie mit der Vergangenheit brechen.\n\nNiemand weiß das besser als der Vorsitzende Pak Hon-yong. Als erfahrener Revolutionär, der den Kampf im besetzten Heimatland geführt hat, wird er dafür sorgen, dass Koreas Weg zum wahren Sozialismus nach Koreas eigenen Vorstellungen beschritten wird."
KOR_legitimacy_npp: "Legitimität der Provisorischen Regierung: §oKatastrophal§!": §rKorea hat sich behauptet§!"
KOR_legitimacy_npp_desc: "Zum ersten Mal in seiner Geschichte steht Korea am Abgrund einer wahrhaft großartigen und egalitären Gesellschaft. Unter der derzeitigen Regierung wurden alle reaktionären und kolonialistischen Ideen ausgemerzt, und die Nation ist dadurch besser geworden. Törichte Ilministen und verwirrte Demokraten verurteilen den Kurs der Republik Korea als Verrat an den koreanischen Werten und Traditionen, aber was wissen sie schon von Anstand und Gerechtigkeit?\n\nKim Koo hat sich der Beiyang-Regierung angeschlossen und den gerechten Kampf der Kuomintang gegen Imperialismus und Dekadenz aufgegeben, Lee versteht nichts anderes, als die Bevölkerung zu brutalisieren, Rhee ist nichts weiter als ein amerikanischer Schoßhund, und die sogenannte demokratische Opposition besteht aus Nörglern, die zu sehr in den Klang ihrer eigenen Stimmen verliebt sind. Nein, Koreas Revolutionsregierung wird sich nicht der Kritik dieser Schwachköpfe beugen, die nicht bereit sind, die Zukunft anzunehmen, indem sie mit der Vergangenheit brechen.\n\nNiemand weiß das besser als der Vorsitzende Kim Tu-bong. Als gestählter Revolutionär, der in der revolutionären Hochburg MinGan geschmiedet wurde, werden Kim und die NPP dafür sorgen, dass Korea den stetigen Weg in Richtung Sozialismus einschlägt, wobei alle patriotischen und wahrhaft demokratischen Parteien die Möglichkeit erhalten, sich an der bevorstehenden Arbeit zu beteiligen."
KOR_legitimacy_knrp: "Legitimität der Provisorischen Regierung: §oKatastrophal§!": §RDie nationale Revolution Koreas§!"
KOR_legitimacy_knrp_desc: "Zum ersten Mal in seiner Geschichte steht Korea am Abgrund einer wahrhaft großartigen und egalitären Gesellschaft. Unter der derzeitigen Regierung wurden alle reaktionären und kolonialistischen Ideen ausgemerzt, und die Nation ist dadurch besser geworden. Törichte Ilministen und verwirrte Demokraten verurteilen den Kurs der Republik Korea als Verrat an den koreanischen Werten und Traditionen, aber was wissen sie schon von Anstand und Gerechtigkeit?\n\nKim Koo hat sich der Beiyang-Regierung angeschlossen und den gerechten Kampf der Kuomintang gegen Imperialismus und Dekadenz aufgegeben, Lee versteht nichts anderes, als die Bevölkerung zu brutalisieren, Rhee ist nichts weiter als ein amerikanischer Schoßhund, und die sogenannte demokratische Opposition besteht aus Nörglern, die zu sehr in den Klang ihrer eigenen Stimmen verliebt sind. Nein, Koreas Revolutionsregierung wird sich nicht der Kritik dieser Schwachköpfe beugen, die nicht bereit sind, die Zukunft anzunehmen, indem sie mit der Vergangenheit brechen.\n\nNiemand weiß das besser als die treuen Mitglieder der Koreanischen Nationalen Revolutionspartei. Als wahre Anhänger von Sun Yat-sen und der Kuomintang kennen Kim Wonbong und Kim Kyu-sik die wahre Bedeutung von Freiheit, und unter ihrer Führung wird Korea durch eine gerechte nationale Revolution neu gestaltet werden."
KOR_legitimacy_wss: "Legitimität der Provisorischen Regierung: §oKatastrophal§!": §nDie Demokratisierung der Angst§!"
KOR_legitimacy_wss_desc: "Zum ersten Mal in seiner Geschichte steht Korea am Abgrund einer wahrhaft großartigen und egalitären Gesellschaft. Unter der derzeitigen Regierung wurden alle reaktionären und kolonialistischen Ideen ausgemerzt, und die Nation ist dadurch besser geworden. Törichte Ilministen und verwirrte Demokraten verurteilen den Kurs der Republik Korea als Verrat an den koreanischen Werten und Traditionen, aber was wissen sie schon von Anstand und Gerechtigkeit?\n\nKim Koo hat sich der Beiyang-Regierung angeschlossen und den gerechten Kampf der Kuomintang gegen Imperialismus und Dekadenz aufgegeben, Lee versteht nichts anderes, als die Bevölkerung zu brutalisieren, Rhee ist nichts weiter als ein amerikanischer Schoßhund, und die sogenannte demokratische Opposition besteht aus Nörglern, die zu sehr in den Klang ihrer eigenen Stimmen verliebt sind. Nein, Koreas Revolutionsregierung wird sich nicht der Kritik dieser Schwachköpfe beugen, die nicht bereit sind, die Zukunft anzunehmen, indem sie mit der Vergangenheit brechen.\n\nNiemand weiß das besser als Yeom Dong-jin. Manche verurteilen ihn als Kollaborateur, Terroristen und Banditen, doch der Oberste Führer schenkt solchen Stimmen keine Beachtung. Für ihn kann das neue Korea nur durch seinen eisernen Willen geschmiedet werden, wobei der Terror sein bevorzugtes Mittel für die Wiedergeburt der Nation ist."

#Democratic Ideas
KOR_welfare_state: "Der aufstrebende Sozialstaat"
KOR_welfare_state_desc: "Obwohl Korea von den japanischen Besatzern befreit wurde, leidet unser Volk weiterhin unter wirtschaftlicher Not, zumal sich das Land noch immer von den Kriegsfolgen erholt. Nun, da sich die Lage stabilisiert hat, werden wir eine Grundsicherung für alle Koreaner einführen, um angemessene Lebensbedingungen zu gewährleisten und zu verhindern, dass radikale Ideologien in der Bevölkerung Fuß fassen."
KOR_westernising_state: "Verwestlichung des Staates"
KOR_westernising_state_desc: "Die Befreiung Koreas führte zur Gründung einer demokratischen Republik, und die Demokratische Partei Koreas hat die ersten Wahlen gewonnen. Mit dem Mandat des Volkes in unseren Händen ist es nun unsere Aufgabe, die langfristige Stabilität der Republik zu gewährleisten. Die demokratischen Gesellschaften der westlichen Welt haben uns ein hervorragendes Vorbild gegeben, dem wir nacheifern können. Lasst uns die positiven Werte der westlichen Demokratien sorgfältig übernehmen und dabei unsere einzigartige koreanische Identität bewahren."
KOR_working_class: "Unterstützung der Arbeiterklasse"
KOR_working_class_desc: "Als führende Kraft der Linken im neuen demokratischen Korea wird sich die Partei der arbeitenden Bevölkerung dafür einsetzen, die Lebensbedingungen der Arbeiterklasse zu verbessern. Grundlegende arbeitsrechtliche Reformen wie der Achtstundentag, das Verbot von Kinderarbeit, die Einführung eines Mindestlohns und andere grundlegende Arbeitnehmerrechte werden landesweit umgesetzt, damit die koreanischen Arbeitnehmer die Früchte ihrer Arbeit in vollem Umfang genießen können."
KOR_civilian_rule: "Zivile Kontrolle über das Militär"
KOR_civilian_rule_desc: "Nach der Rückkehr der Provisorischen Regierung wurde in Korea eine konstitutionelle Republik gegründet. Die junge Republik steht sowohl innen- als auch außenpolitisch vor zahlreichen Herausforderungen. Um den zivilen Charakter der Regierung zu wahren, muss das Militär vollständig der zivilen Kontrolle unterstellt werden, damit das Fortbestehen der Verfassung gesichert und eine gewaltsame Machtübernahme durch Radikale und Extremisten verhindert wird."

#Authoritarian Ideas
KOR_antisocialist: "Die moralische Nation"
KOR_antisocialist_desc: "Der Sozialismus in all seinen Formen zielt lediglich darauf ab, den Klassenkonflikt weiter anzuheizen, in der Hoffnung, durch eine Revolution eine vermeintliche soziale Gleichheit zu erreichen. Wenn wir dem keinen Riegel vorschieben, wird das Streben nach diesen Zielen nur zur Zerstörung der koreanischen Nation und ihrer Kultur führen. Nur durch die Förderung einer moralischen Gesellschaft, die kindliche Pietät und die Achtung vor Traditionen in den Vordergrund stellt, können wir Stabilität und das Überleben Koreas als Ganzes sichern."
KOR_autarkic_state: "Der autarke Staat"
KOR_autarkic_state_desc: "Auch wenn unser Land nicht über eine Wirtschaft verfügt, die mit der unserer Nachbarn mithalten kann, müssen wir uns letztendlich mit dem begnügen, was wir haben, und uns weiterentwickeln, wenn Korea ein wahrhaft unabhängiges Land sein soll. Allein durch den Willen und die Entschlossenheit des koreanischen Volkes werden wir die Grundlagen für eine unabhängige Volkswirtschaft schaffen, die in der Lage ist, Wohlstand für alle zu sichern und die Sicherheit des Vaterlandes zu gewährleisten."
KOR_neither_china_nor_japan: "Gegen den Drachen, gegen die Sonne"
KOR_neither_china_nor_japan_desc: "Zu lange schon war Korea ein Spielball sowohl Chinas als auch Japans, die uns lediglich als Untertanen ihrer imperialen Ambitionen betrachteten. Lassen wir diese Vorstellung hinter uns und machen wir deutlich: Solange die Taegeukgi stolz und hoch weht, ist Korea ein Volk, das bereit ist, für seine Unabhängigkeit zu kämpfen – solange beide Länder versuchen, uns ihren Einfluss aufzuzwingen."
KOR_corporatism: "Der korporatistische Staat"
KOR_corporatism_desc: "Die Unterwerfung unseres Volkes durch Japan erfolgte in einer Zeit, in der Korea sich in einer Phase großer Schwäche befand, wobei seine Rückständigkeit durch die Korruption der Joseon-Eliten noch verschärft wurde. In der Folge kam es zu Bauernaufständen, die das Land in noch größere Schwäche stürzten und unser koreanisches Herrenvolk zu jahrzehntelanger Demütigung durch die japanischen Imperialisten verdammten. Nun, da Korea wieder frei ist, werden wir dafür sorgen, dass es nie wieder zu Klassenkonflikten kommt und die Harmonie unter allen Koreanern um jeden Preis gewahrt bleibt."
KOR_third_way: "Gegen den Gestank des Kapitalismus und des Marxismus"
KOR_third_way_desc: "Sowohl der marxistische als auch der kapitalistische Imperialismus – wobei ersterer schlimmer ist – streben unablässig nach Vorherrschaft und Profit, was zur Vernichtung anderer ethnischer Gruppen und Nationen führt. Um dieses Gift der imperialistischen Ideologien auf unserem Boden zu bekämpfen, ist die Vereinigung aller Koreaner zu einem unteilbaren Volk notwendig, um die Unabhängigkeit der koreanischen Nation zu bewahren."
KOR_universal_suffrage: "Vorreiter der Emanzipation"
KOR_universal_suffrage_desc: "Unser Land ist ein leuchtendes Vorbild für Emanzipation, denn fast nirgendwo sonst auf der Welt genießen Frauen ein vergleichbares Maß an politischer Freiheit."
KOR_stratocracy: "Koreanische Stratokratie"
KOR_stratocracy_desc: "Die dauerhafte Wahrung der Unabhängigkeit und Souveränität Koreas hängt von der Fähigkeit unseres Militärs ab, Korea vor äußeren Kräften zu verteidigen; es ist nur natürlich, dass jeder seinen Beitrag zur Unterstützung unserer Armee leisten muss, wenn wir unsere Nation nicht erneut verlieren wollen. Indem wir dem Militär oberste nationale Priorität einräumen und die Einheit zwischen Militär und Bürgern herstellen, wird Korea für immer frei sein!"

#Revolutionary Ideas
KOR_equal_republic: "Die Gleichberechtigte Republik"
KOR_equal_republic_desc: "Endlich ist die Revolution in Korea angekommen. Mit der Befreiung des Landes ist es nun Aufgabe unserer Regierung, wirtschaftliche Gleichheit für alle Koreaner herzustellen und die Fesseln der Unterdrückung zu sprengen. Der ungerechte Einfluss und die Vorherrschaft der Yangban sollen abgeschafft werden, und Koreas Reichtum soll allen Koreanern zugänglich sein."
KOR_unique_socialism: "Sozialismus mit koreanischen Merkmalen"
KOR_unique_socialism_desc: "Der Marxismus, wie er ursprünglich konzipiert wurde, orientierte sich an den reifen kapitalistischen Volkswirtschaften Westeuropas, die über ein großes industrielles Proletariat verfügten. Als agrarisch geprägte Nation mit einer kaum vorhandenen industriellen Basis sind die Voraussetzungen für Korea jedoch nicht gegeben, um eine sozialistische Produktionsweise zu erreichen. Dennoch werden wir die universellen Wahrheiten des Marxismus mit den Realitäten Koreas verbinden und unseren eigenen Weg zum Sozialismus beschreiten!"
KOR_longyan: "Lehren aus Longyan"
KOR_longyan_desc: "Der MinGan-Aufstand der Kuomintang war für sozialistische Revolutionäre auf der ganzen Welt eine wertvolle Lektion. Im Gegensatz zu den herkömmlichen Taktiken, die in den Bürgerkriegen Frankreichs und Großbritanniens zum Einsatz kamen, hat der Aufstand in Longyan wichtige Erkenntnisse über die Wirksamkeit des Guerillakriegs geliefert. Wenn wir solche unkonventionellen Taktiken gegen unsere Feinde anwenden, werden wir siegen, selbst wenn die ganze Welt gegen uns ist!"
KOR_tutelage: "Zweite Phase der Revolution"
KOR_tutelage_desc: "In seinem Werk Grundlagen des nationalen Wiederaufbaus beschrieb Dr. Sun Yat-sen die drei Phasen der Revolution, die China zu einer demokratischen Nation führen sollten: Militärherrschaft, politische Vormundschaft und konstitutionelle Regierung. Mit der Beseitigung aller Hindernisse für die Demokratie ist Korea in die zweite Phase der Revolution eingetreten. Bis das Volk vollständig bereit für Selbstverwaltung und demokratische Rechte ist, werden wir es als Mentoren anleiten und hart gegen diejenigen vorgehen, die die Revolution untergraben wollen."
KOR_revolutionary_vanguard: "Revolutionäre Avantgarde"
KOR_revolutionary_vanguard_desc: "Damit eine Revolution Erfolg hat, muss sie organisiert und diszipliniert sein und von einer Avantgarde der bewusstesten Individuen geleitet werden. Soll Asien aus den Fängen des imperialistischen Kolonialismus befreit werden, muss es eine Avantgarde geben, die die Flammen der Revolution in alle Ecken Asiens trägt. Gemeinsam mit unseren Verbündeten werden wir diese Avantgarde bilden und alle Völker Asiens für die große Vision des Panasiatismus begeistern!"
KOR_germany: "Bollwerk gegen Deutschland"
OR_germany_desc: "In den letzten zwei Jahrzehnten hat sich Deutschland konsequent als Bastion des ausländischen Imperialismus in Asien erwiesen und sich zur führenden europäischen Macht in der Region entwickelt, während es gemeinsam mit lokalen Kollaborateuren antiimperialistische Revolutionen niederschlug, wie es beispielsweise bei der Nordexpedition der Fall war. Nun werden China und Korea unter der Führung der Drei Prinzipien gemeinsam für die Befreiung Asiens eintreten, und wir werden als Bollwerk gegen die deutsche Bedrohung dienen."
KOR_great_purge: "Die gereinigte Revolution"
KOR_great_purge_desc: "Der lange, mühsame Kampf um die Unabhängigkeit Koreas wurde oft durch die Anwesenheit verräterischer Intellektueller und Bürokraten unterschiedlichster Couleur untergraben, seien es entartete Sozialisten, die Demokraten, die Führer der Provisorischen Regierung oder die Ilministen. Das soll nicht länger geschehen! Unter unserem Obersten Führer wird die koreanische Revolution vollständig vollendet werden. Die Gesellschaft der Weißen Hemden wird die Missstände der koreanischen Gesellschaft heilen, sie von ihren giftigen Elementen reinigen und sie in eine wahrhaft revolutionäre Zukunft führen, die die Wiedergeburt der Nation einleitet."

#Economy Ideas
KOR_economy_idea_1: "Koreanische Volkswirtschaft: §oIn Trümmern§!"
KOR_economy_idea_1_desc: "Obwohl das koreanische Volk nun von der japanischen Tyrannei befreit ist, befindet sich das Land inmitten von Trümmern und Unruhen. Als die Japaner kapitulierten und die Kontrolle über Korea abtraten, hinterließ die Massenflucht der kolonialen Geschäftsleute und Siedler eine große Lücke im wirtschaftlichen Gefüge unserer Nation. Wellen von verwirrten Bürgern, die nichts vom Rückzug der Japaner wussten, haben die Aufgaben der Provisorischen Regierung nur noch verstärkt.\n\nEin Großteil der nördlichen Industriegebiete Koreas wurde vom Krieg besonders hart getroffen, und kollaborierende Großgrundbesitzer im ganzen Land machen der Regierung weiterhin zu schaffen. Wenn die Provisorische Regierung die Unterstützung des Volkes gewinnen will, muss sie sich mit Nachdruck darum bemühen, den wirtschaftlichen Bedürfnissen der Bevölkerung gerecht zu werden."
KOR_economy_idea_2: "Koreanische Volkswirtschaft: §gWiederaufbau im Gange§!"
KOR_economy_idea_2_desc: "Obwohl das koreanische Volk nun von der japanischen Tyrannei befreit ist, befindet sich das Land inmitten von Trümmern und Unruhen. Als die Japaner kapitulierten und die Kontrolle über Korea abtraten, hinterließ die Massenflucht der kolonialen Geschäftsleute und Siedler eine große Lücke im wirtschaftlichen Gefüge unserer Nation. Wellen von verwirrten Bürgern, die nichts vom Rückzug der Japaner wussten, haben die Aufgaben der Provisorischen Regierung nur noch verstärkt.\n\nEin Großteil der nördlichen Industriegebiete Koreas wurde vom Krieg besonders hart getroffen, und kollaborierende Großgrundbesitzer im ganzen Land machen der Regierung weiterhin zu schaffen. Als Reaktion auf die Wirtschaftskrise hat die Provisorische Regierung bereits mit der Ausarbeitung eines Plans begonnen, der die Umverteilung des Vermögens von Kollaborateuren und Kolonialherren an die ärmsten koreanischen Bauern vorsieht, und die Industriebetriebe im Norden wurden vorläufig unter direkte staatliche Kontrolle gestellt."
KOR_economy_idea_3: "Koreanische Volkswirtschaft: §GModernisierung der Nation§!"
KOR_economy_idea_3_desc: "Zwar stürzte der Rückzug der Japaner den koreanischen Staat in eine Zeit der Unruhen und Turbulenzen, doch scheint das Schlimmste nun überstanden zu sein. Im Norden wurden viele der zerstörten Fabriken wieder aufgebaut, auch wenn es noch eine Weile dauern dürfte, bis sie wieder mit voller Produktivität arbeiten. Auf dem Land genießen viele koreanische Bauern die Vorteile von eigenem Land, das durch die Auflösung der Ländereien der Kolonialherren und Kollaborateure entstanden ist, und entwickeln sich rasch zu einer tragenden Säule der koreanischen Regierung. Auch wenn Korea noch weit davon entfernt ist, ein wohlhabendes Land zu sein, ist seine Zukunft vielversprechend, und das koreanische Volk ist zuversichtlich, den richtigen Weg in die Zukunft einschlagen zu können."
KOR_economy_idea_4: "Koreanische Volkswirtschaft: §LDen Weg zum Wohlstand ebnen§!"
KOR_economy_idea_4_desc: "Zwar stürzte der Rückzug der Japaner den koreanischen Staat in eine Zeit der Unruhen und Turbulenzen, doch scheint das Schlimmste nun überstanden zu sein. Im Norden wurden viele der zerstörten Fabriken wieder aufgebaut und haben einen neuen Weg in der aufkeimenden koreanischen industriellen Revolution eingeschlagen.\n\nAuf dem Land genießen viele koreanische Bauern dank der Auflösung der Ländereien von Kolonialherren und Kollaborateuren die Vorteile eigenen Landes und entwickeln sich rasch zu einer tragenden Säule der koreanischen Regierung. Mit jedem Jahr verzeichnet der koreanische Staat ein beispielloses Wachstum und Wohlstand – eine Entwicklung, die Außenstehenden einst undenkbar erschien."
KOR_economy_idea_5: "Koreanische Volkswirtschaft: §YWiedererstarkte Wirtschaft Thailands§!"
KOR_economy_idea_5_desc: "Zwar stürzte der Rückzug der Japaner den koreanischen Staat in eine Zeit der Unruhen und Turbulenzen, doch scheint das Schlimmste nun überstanden zu sein. Im Norden wurden viele der zerstörten Fabriken wieder aufgebaut, wodurch sich das Land zu einem dynamischen Produktionszentrum entwickelt hat, das sowohl mit China als auch mit Japan konkurriert.\n\nAuf dem Land genießen viele koreanische Bauern dank der Auflösung kolonialer und kollaborierender Landgüter die Vorteile eigenen Landes und entwickeln sich rasch zu einer tragenden Säule der koreanischen Regierung.\n\nMit jedem Jahr verzeichnet der koreanische Staat ein beispielloses Wachstum und Wohlstand – eine Entwicklung, die Außenstehenden einst undenkbar erschien. Auch wenn es sich zweifellos um ein kleines Land in Ostasien handelt, lässt sich nicht leugnen, dass das koreanische Wirtschaftswunder es zu einem einzigartig leuchtenden Leuchtturm des wirtschaftlichen Wohlstands im Fernen Osten gemacht hat."
KOR_developmentalism: "Der Entwicklungsstaat"
KOR_developmentalism_desc: "Zwar hat der angloamerikanische Kapitalismus zweifellos das Wachstum zweier mächtiger Supermächte befeuert, doch ist klar, dass solche auf Freihandel und Laissez-faire ausgerichteten Prinzipien im 20. Jahrhundert völlig überholt sind. Die Macht des Imperiums des Freihandels konnte weder deren Zusammenbruch in den Sozialismus verhindern, noch bewahrte sie die Amerikaner vor einer lähmenden Weltwirtschaftskrise und einem Bürgerkrieg.\n\nNein, es ist klar, dass das deutsche Modell, das von Bismarck eingeführt und von Svobodnik-Russland, Tokio und chinesischen Staatsmännern neu gestaltet wurde, auch Koreas Schicksal sein muss. Unter der Anleitung des koreanischen Wirtschaftsplanungsausschusses wird die koreanische Regierung sicherstellen, dass die Nation stetig und planmäßig aufsteigt, ohne etwas dem Zufall zu überlassen. Der Staatssozialismus hat Japan und China geformt, und so wird er auch ein starkes Korea aufbauen!"
KOR_liberalising_economy: "Liberalisierung der Wirtschaft"
KOR_liberalising_economy_desc: "Während es weltweit ein zunehmender Trend ist, dass Regierungen sich direkt in die Wirtschaftsführung ihres Landes einmischen, darf der koreanische Staat diesen Weg nicht einschlagen. Korea hat gerade erst seine Unabhängigkeit von der Kolonialherrschaft erlangt, und das amerikanische Modell ist für unser Land am besten geeignet.\n\nPräsident Rhee ist zuversichtlich, dass die Regierung durch die Befolgung der Prinzipien des freien Marktkapitalismus eine untragbare Defizitfinanzierung vermeiden und ausländische Investitionen fördern kann. Indem wir Korea zu einem wirtschaftsfreundlichen Land machen, können wir schnelles Wachstum sichern, ohne uns in idealistischen Träumen vom ostasiatischen Staatssozialismus zu verlieren. Wie man in Amerika so oft sagt, sollen Leben, Freiheit und das Streben nach Glück unser Leitmotiv sein."
KOR_agriculture: "Die koreanische Agrarrevolution"
KOR_agriculture_desc: "Die Landwirtschaft, seit jeher das Rückgrat der koreanischen Wirtschaft, hat in der heutigen Zeit noch weiter an Bedeutung gewonnen. In einem Entwicklungsland mit wachsender Bevölkerung muss eine Nation stets auf Hungersnöte gefasst sein. Wenn sich Korea in dieser äußerst kritischen Zeit neu erfinden will, muss es sicherstellen, dass seine Landwirte und Bauern in Krisenzeiten angemessene Unterstützung von der Regierung erhalten. Die Ländereien im Süden, die stets reichhaltige Ernten liefern, sollen das Fundament bilden, auf dem Koreas Zukunft aufgebaut wird."
KOR_industry: "Die koreanische industrielle Revolution"
KOR_industry_desc: "In der Moderne sah sich das einst landwirtschaftlich geprägte koreanische Volk von den Strömungen des Kapitalismus und der Industrialisierung mitgerissen. Während der Kolonialzeit errichtete das japanische Kaiserreich in Pjöngjang und Umgebung verschiedene industrielle Monopole und machte Nordkorea zu einem regionalen Industriezentrum, das der Mandschurei nicht unähnlich war. Nun ist Korea von der japanischen Vorherrschaft befreit und in der Lage, sein Schicksal selbst zu bestimmen. Die Industrie im Norden wird unser Land zu einem Produktionszentrum im Fernen Osten machen, und Produkte aus aller Welt werden das Label Made in Korea tragen!"
KOR_developmental_improved: "Der Entwicklungsstaat"
KOR_developmental_improved_desc: "$KOR_developmentalism_desc$"
KOR_liberalising_improved: "Ein vom freien Markt geprägter Staat"
KOR_liberalising_improved_desc: "$KOR_liberalising_economy_desc$"

#Military Ideas
KOR_military_idea_1: "Koreanischer Militärstaat: §oNachkoloniales Chaos§!"
KOR_military_idea_1_desc: "Angesichts des Zusammenbruchs des japanischen Kaiserreichs muss unser Land darauf hinarbeiten, jegliche weiteren Unterwerfungsversuche zu verhindern, indem wir unsere Streitkräfte wieder aufstellen. Die Koreanische Nationalarmee war von Anfang an mit Problemen konfrontiert, die für eine frisch befreite Nation typisch sind: ein Offizierskorps voller ehemaliger Kollaborateure und eine fast nicht vorhandene Rüstungsindustrie, die lediglich zur Herstellung von Handfeuerwaffen in der Lage war.\n\nDarüber hinaus ist unter unseren im Exil lebenden Offizieren eine Debatte darüber entbrannt, welche Richtung unsere KNA in Bezug auf ihre Doktrin einschlagen soll, wobei das wertvolle Erbe von Whampoa, Beiyang und Japan in dieser Auseinandersetzung eine dominierende Rolle spielt. Welchen Weg die KNA auch immer einschlagen mag, wir müssen sicherstellen, dass sie zu einer Streitmacht wird, die in der Lage ist, alle ausländischen Angreifer abzuwehren, und dafür sorgen, dass Korea für die nächsten zehntausend Jahre frei bleibt."
KOR_military_idea_2: "Koreanischer Militärstaat: §gUmstrukturierung im Gange§!"
KOR_military_idea_2_desc: "Angesichts des Zusammenbruchs des japanischen Kaiserreichs muss unser Land darauf hinarbeiten, jegliche weiteren Unterwerfungsversuche zu verhindern, indem wir unsere Streitkräfte wieder aufstellen. Die Koreanische Nationalarmee hat begonnen, sich von einer autonomen Miliz zu einer echten Streitmacht der Landesverteidigung zu wandeln. Unser Offizierskorps ist dabei, ehemalige Kollaborateure aus unseren Reihen zu entfernen, auch wenn unsere Rüstungsindustrie nach wie vor stark von der Unterstützung unserer wohlwollenden Befreier abhängig ist.\n\nWährend unsere Umstrukturierung im Gange ist, toben im Generalstab nach wie vor hitzige Debatten darüber, in welche Richtung sich unser junges Militär in Zukunft entwickeln soll, wobei die Traditionen von Whampoa, Beiyang und Japan nach wie vor dominieren. Welchen Weg die KNA auch immer einschlagen mag, wir müssen sicherstellen, dass sie zu einer Streitmacht wird, die in der Lage ist, alle ausländischen Angreifer abzuwehren, und dafür sorgen, dass Korea für die nächsten zehntausend Jahre frei bleibt."
KOR_military_idea_3: "Koreanischer Militärstaat: §GNNeues koreanisches Militär§!"
KOR_military_idea_3_desc: "Angesichts des Zusammenbruchs des japanischen Kaiserreichs muss unser Land darauf hinarbeiten, jegliche weiteren Unterwerfungsversuche zu verhindern, indem wir unsere Streitkräfte wieder aufstellen. Unsere Umstrukturierungsbemühungen tragen nun erste Früchte, und die Koreanische Nationalarmee gewinnt zunehmend an Stärke. Da die Säuberungsaktionen gegen ehemalige Kollaborateure große Fortschritte machen, verzeichnet unser heimisches Offizierskorps die ersten neuen Rekruten – junge Patrioten, die bereit sind, die Nation zu verteidigen –, während unsere Rüstungsindustrie langsam, aber sicher durch stetiges Wachstum den Anforderungen der Zeit gerecht wird.\n\nIm Zuge dieser Fortschritte haben sich die aktuellen Debatten darüber, wo man in Bezug auf die Doktrin Inspiration suchen sollte, langsam mehr in Richtung patriotischer Zusammenarbeit statt ausländischer Loyalitäten verschoben, wobei eine Synthese zwischen unseren beiden ehemaligen Kolonialherren aus unterschiedlichen Epochen angestrebt wird. Nur die Zukunft kann zeigen, wohin diese Diskussion führen wird. Welchen Weg die KNA auch immer einschlagen mag, wir müssen sicherstellen, dass sie zu einer Streitmacht wird, die in der Lage ist, alle ausländischen Angreifer abzuwehren, und dafür sorgen, dass Korea für die nächsten zehntausend Jahre frei bleibt."
KOR_military_idea_4: "Koreanischer Militärstaat: §LKoreas erste Verteidigungslinie§!"
KOR_military_idea_4_desc: "Angesichts des Zusammenbruchs des japanischen Kaiserreichs muss unser Land darauf hinarbeiten, jegliche weiteren Unterwerfungsversuche zu verhindern, indem wir unsere Streitkräfte wieder aufstellen. Unsere Nationalarmee ist nicht länger eine bloße Miliz aus im Exil lebenden Freiheitskämpfern, sondern eine wahrhaft professionelle, einheimische Armee von Patrioten, die bereit sind, das Land ihrer Vorfahren mit ihrem Leben zu verteidigen. Unser Offizierskorps besteht nicht mehr aus Kollaborateuren und Lakaien des japanischen Kaiserreichs, sondern aus neu ausgebildeten Unteroffizieren und Kadetten, die bereit sind, unser Volk in eine bessere Zukunft zu führen.\n\nUnsere Rüstungsindustrie ist nun fast vollständig unabhängig von unseren wohlwollenden Befreiern und in der Lage, Waffen zu entwickeln, mit denen wir die Kontrolle über unser Land, unsere Meere und unseren Luftraum übernehmen können. Die Diskussionen um unsere Militärdoktrin sind immer positiver geworden, wobei unser Oberkommando und unsere Militärakademien langsam aber sicher die Lehren unserer im Exil lebenden Patrioten zu einer einzigartigen koreanischen Doktrin zusammenführen. Welchen Weg die KNA auch immer einschlagen mag, wir müssen sicherstellen, dass sie zu einer Streitmacht wird, die in der Lage ist, alle ausländischen Angreifer abzuwehren, und dafür sorgen, dass Korea für die nächsten zehntausend Jahre frei bleibt."
KOR_military_idea_5: "Koreanischer Militärstaat: §YVanguard im Osten§!"
KOR_military_idea_5_desc: "Angesichts des Zusammenbruchs des japanischen Kaiserreichs muss unser Land darauf hinarbeiten, jegliche weiteren Unterwerfungsversuche zu verhindern, indem wir unsere Streitkräfte wieder aufstellen. Die Koreanische Nationalarmee ist heute eine in ganz Ostasien geachtete Streitmacht, die in der Lage ist, jedem Versuch, unser Volk zu unterwerfen, standzuhalten. Das koreanische Offizierskorps ist nun vollständig von Kollaborateuren und Opportunisten gesäubert, unsere Militärakademien strömen von enthusiastischen jungen Menschen, die bereit sind, ihren Verstand, ihr Herz und ihre Seele für die Verteidigung des Landes unserer Vorfahren einzusetzen.\n\nUnsere Rüstungsindustrie ist nun in der Lage, mit der Effizienz und dem technologischen Niveau Europas und Amerikas mitzuhalten und Kriegswaffen herzustellen, die noch vor wenigen Jahren undenkbar waren. Unser Oberkommando steht nun geschlossen hinter einer wahrhaft koreanischen Doktrin, gestützt auf jahrzehntelange Erfahrung aus den Schulen Ostasiens und aufrichtig entschlossen, für unsere Nation zu kämpfen. Welchen Weg die KNA auch immer einschlagen mag, wir müssen sicherstellen, dass sie zu einer Streitmacht wird, die in der Lage ist, alle ausländischen Angreifer abzuwehren, und dafür sorgen, dass Korea für die nächsten zehntausend Jahre frei bleibt."
KOR_kaic: "KAIC"
KOR_kaic_desc: "In den Tagen des Joseon-Königreichs setzte der Königshof geheime königliche Inspektoren ein, um die Loyalität der Regierungsbeamten gegenüber dem Staat zu gewährleisten und für Sicherheit im ganzen Land zu sorgen. Im wiedergeborenen koreanischen Staat haben öffentliche Sicherheit und staatliche Sicherheit noch mehr an Bedeutung gewonnen, da regierungsfeindliche Agenten und opportunistische Aufwiegler bereit sind, jede vermeintliche Schwäche auszunutzen. Angesichts von Feinden im In- und Ausland wird die KAIC den Staat vor verräterischen Elementen im Verborgenen verteidigen."
KOR_navy: "Wiedergeborene koreanische Marine"
KOR_navy_desc: "Korea hat eine stolze Tradition, die Meere zu beherrschen, eine, die wir zurückfordern müssen, damit uns nicht eine andere imperiale Macht in eine andere Generation der Knechtschaft unterwirft. Unsere wohlwollenden Befreier haben zugestimmt, uns eine ausgewählte Anzahl von Kreuzern und Küstenverteidigungsschiffen zu verkaufen, um unsere Strände zu verteidigen, und gleichzeitig koreanische Unteroffiziere in ihre renommierten Marineakademien aufzunehmen, um unsere Tradition wirklich in die Zukunft zu bringen. Der verstorbene Admiral Yi wäre stolz auf das, was wir erreicht haben, obwohl noch viel Arbeit bleibt, bevor das Ostmeer wirklich unter unserer Kontrolle ist."
KOR_airforce: "Neue koreanische Luftstreitkräfte"
KOR_airforce_desc: "Obwohl unsere Vorfahren eine Geschichte der Herrschaft über Land und Meer haben, bleibt die Domäne des Himmels unter der Kontrolle der imperialistischen Mächte. Wenn wir wirklich frei sein wollen, muss dieses Ungleichgewicht von uns behoben werden. Unsere wohlwollenden Befreier haben zugestimmt, uns eine Reihe älterer Verbindungsflugzeuge und Kämpfer zu verkaufen, um eine koreanische Luftwaffe zu starten, die bereit ist, den Himmel zu erobern. Es wird lange dauern, bis unsere Fähigkeiten denen des Westens entsprechen werden, aber wir müssen bereit sein, das Land unserer Vorfahren an allen Flanken zu verteidigen."
KOR_office: "Koreanisches Generalplanbüro"
KOR_office_desc: "Unsere neu professionalisierende und expandierende Armee, die nicht mehr einem ausländischen Armeepersonal unterstellt ist, das durch unser Fehlen eines Staates gefordert wird, verlangt ein zentralisiertes Generalplanbüro, um die Aktivitäten und Bewegungen mehrerer Branchen auf der gesamten Halbinsel zu koordinieren. Ein loyales Generalplanbüro wird mit direkter Verbindung zum Präsidenten eingerichtet, um die Koordination zwischen den zivilen und militärischen Zweigen zu gewährleisten."
KOR_bushido: "Dem Bushido-Geist nacheifern"
KOR_bushido_desc: "In dem langen und schwierigen Prozess, uns als Nation neu zu etablieren, müssen wir in allen Bereichen des militärischen Lebens die absolute Loyalität gegenüber der Nation in den Vordergrund stellen. Man muss ihr Opfer von Blut, Herz und Seele auf dem Schlachtfeld nicht als individuellen Kampf betrachten, sondern als einen kollektiven Kampf, um die Nation vor jenen zu schützen, die uns dazu zwingen wollen, unsere Werte zu verraten. Wir müssen bereit sein, unseren Körper und unseren Geist einer Reihe von Regeln und Disziplinen zu unterwerfen, die uns von jenen unterscheiden, die das Land unserer Vorfahren erneut unterwerfen wollen."
KOR_lightning_war: "Mobilität der koreanischen Streitkräfte"
KOR_lightning_war_desc: "Um den Anforderungen einer sich wandelnden Welt gerecht zu werden, müssen wir unsere Doktrin an die Erfordernisse einer schnelllebigen Kriegsführung anpassen. Unsere großzügigen Befreier waren so freundlich, ihr Wissen über die motorisierte und gepanzerte Kriegsführung mit uns zu teilen, in der Hoffnung, dass wir irgendwann eine eigene Panzerindustrie aufbauen können, die mit der Japans und sogar Europas mithalten kann. Bis dahin werden wir uns bemühen, diese Veränderungen in unsere derzeitigen Streitkräfte zu integrieren, in der Hoffnung auf eine bessere Zukunft."
KOR_eliteheer: "Koreanisches Eliteheer"
KOR_eliteheer_desc: "Mit dem Ausbruch des verheerendsten Weltkriegs, den wir je erlebt haben, ist sich unser Generalstab einig, dass wir dem Beispiel unserer Befreier folgen und unsere Streitkräfte modernisieren müssen, um dem exponentiellen technologischen Fortschritt in allen Bereichen der Landesverteidigung gerecht zu werden. Wir müssen uns am deutschen Heer und den unter der Regierung in Beijing durchgeführten Reformen orientieren, um eine kleine, elitäre Truppe mobiler Streitkräfte aufzubauen, die mit modernster Ausrüstung ausgestattet ist. Auch wenn wir unsere Ambitionen, dem sogenannten 80-Divisionen-Plan gerecht zu werden, möglicherweise zurückstellen müssen, erfordert unsere Landesverteidigung den Aufbau einer Elitetruppe, die in der Lage ist, allen Formen imperialistischer Aggression Widerstand zu leisten."
KOR_whampoa_dynamic_modifier: "Koreanisches Whampoa"
KOR_whampoa_dynamic_modifier_desc: "Auch wenn viele unserer angesehenen Generäle und Offiziere von unseren Verbündeten in China in Whampoa ausgebildet wurden, dürfen wir nicht zulassen, dass wir von einer anderen ausländischen Macht abhängig werden. Wir haben gegenüber dem Mutterland die Pflicht, in Seoul ein neues Whampoa zu errichten, um neue Jahrgänge patriotischer Kadetten heranzubilden, die sowohl eine erstklassige militärische Ausbildung als auch eine ideologische Schulung erhalten, welche vielfältige patriotische Gefühle zu einem einheitlichen brüderlichen Bewusstsein formt, das sich auf den revolutionären Kampf ihrer Vorfahren für ein unabhängiges Mutterland konzentriert."
KOR_loyalty: "Loyale Armee"
KOR_loyalty_desc: "Weltweit sind die mächtigsten Mächte, die die Welt je gesehen hat, den eigenmächtigen Bestrebungen einer Armee zum Opfer gefallen, die den Staat selbst und sein Volk ihren eigenen Willensvorstellungen unterwerfen wollte. Auch wenn die KNA für das Überleben unserer Nation von entscheidender Bedeutung ist, müssen wir sie daran erinnern, wem sie zu dienen hat. Um die uneingeschränkte zivile Kontrolle über unsere Nation zu gewährleisten, muss die KNA den Vorgaben des Präsidialamtes und der Nationalversammlung untergeordnet werden."
KOR_final_army_modifier: "Der modernisierte Schrecken des Ostens"
KOR_final_army_modifier_desc: "Jahrhundert um Jahrhundert lang stand das stolze Königreich Joseon in ganz Asien als rechtschaffener Hort der Moral und Gerechtigkeit. Tragischerweise wurde der große koreanische Staat vom aufstrebenden japanischen Kaiserreich verschlungen, das sich zum aufkommenden Schrecken Asiens entwickeln sollte. Doch die Geschichte sollte dieses Monstrum endgültig besiegen, und die koreanische Nation wurde erneut befreit. Dennoch wussten wir, dass wir uns noch nicht auf unseren Lorbeeren ausruhen durften, denn in den turbulenten Zeiten, in denen wir leben, würden sonst die Tage der japanischen Besatzung zurückkehren.\n\nUnd so arbeiteten die Menschen an einem großen Projekt, um ein neues mächtiges Militär zu schmieden, das Koreas ewige Unabhängigkeit sicherstellen würde. Nach Jahren harter Arbeit und der Einbeziehung alter und neuer Ideen hat sich das koreanische Militär zu einer einzigartig tödlichen Streitmacht entwickelt. Als Synthese japanischer, chinesischer, deutscher und russischer militärischer Entwicklungen sind die koreanischen Streitkräfte zum neuen Schrecken Asiens geworden, im Dienste der Verteidigung Koreas gesegneter Freiheit. Hanguk Manse!"

