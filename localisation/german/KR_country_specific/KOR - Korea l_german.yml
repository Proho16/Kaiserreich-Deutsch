KOR_cha_ri_seok_advisor_desc: "§YGeboren:§! §L26. Juli 1881 in der Provinz Pyongan, Joseon§!"

KOR_yi_kang: "Yi Kang"
KOR_yi_kang_leader_desc: "§YGeboren:§! §L30. März 1877 in Hanseong, Provinz Gyeonggi, Joseon§!\n§YHintergrund:§! §LYi Kang, der als fünfter Sohn von Gojong und seiner Konkubine Lady Jang geboren wurde, wurde 1892 zum Prinzen Uihwa ernannt. Nachdem er Kim Deoksu geheiratet hatte, geriet der Prinz in Rechtsstreitigkeiten und Schulden; 1895 wurde er zu Koreas Sonderbotschafter in Japan ernannt, um an den japanischen Siegesfeiern über die Chinesen im Ersten Chinesisch-Japanischen Krieg teilzunehmen. Da er keine eigenen Kinder hatte, diente er als Botschafter in europäischen Ländern und den Vereinigten Staaten, obwohl sein Playboy-Lebensstil und seine verschwenderischen Ausgaben die koreanische Regierung verärgerten. Von 1906 bis 1907 engagierte er sich im Koreanischen Roten Kreuz; als sein Vater jedoch abdankte, wurde sein Halbbruder Prinz Yi Un zum Kronprinzen ernannt, da sein Vater ihn nicht mochte.\n\nNach der Annexion Koreas durch Japan im Jahr 1910 wurde Yi Kang zunehmend unzufrieden mit seinem Status, obwohl ihm eine großzügige jährliche Zuwendung gewährt wurde. Als er 1928 von der Provisorischen Regierung der Republik Korea erfuhr, versuchte er, aus Korea zu fliehen, um sich den Exilanten anzuschließen. Seine Flucht schlug fehl, und trotz Yi Kangs Bemühungen, seine Titel abzulegen, blieb er faktisch ein politischer Gefangener in Seoul. 1930 trat er offiziell in den Ruhestand. Trotz alledem schwand sein brennender Wunsch nach einem unabhängigen Korea nie; er bemerkte einmal, er sei lieber Bauer in einem unabhängigen Korea als Adliger unter japanischer Herrschaft.\n\nAls Korea nach vielen Jahrzehnten der Unterwerfung befreit wurde, konnte Yi Kang endlich die Provisorische Regierung treffen, die so lange im Exil gelebt hatte. Um die Vorliebe der koreanischen Befreier für die Monarchie zu ehren und ihre neu gefundene Beziehung anzuerkennen, wurde Yi Kang fast einstimmig zum Kaiser eines wiederbelebten Kaiserreichs Korea erklärt, wobei sein Bruder, Kronprinz Yi Un, der mit den Japanern kollaboriert hatte, übergangen wurde. Er trägt nun die Verantwortung, das glorreiche Erbe des Kaiserreichs Korea unter dem Banner eines neu befreiten Koreas fortzuführen.§!"

KOR_kim_hong_il: "Kim Hong-il"
KOR_kim_hong_il_high_command_desc: "§YGeboren:§! §L23. September 1898, in Yongcheon, Provinz Nord-Pyeongan, Kaiserreich Korea§!\n§YHintergrund:§! §LDie Kindheit von Kim Hong-il wurde von Kanonendonner erschüttert, als der Russisch-Japanische Krieg in seiner Heimatstadt begann. Bald darauf war der Krieg zu Ende und das koreanische Reich brach unter dem japanischen Stiefel zusammen, und Kim, der die Schrecken des Krieges und den Untergang einer Nation schon in jungen Jahren erlebt hatte, begann seinen Kampf für sein Land. Nach einer turbulenten Jugend, in der er zwischen Korea und China hin und her reiste und sich schließlich als Lehrer niederließ, wurde Kim von der japanischen Polizei verfolgt. Er floh schließlich in die Mandschurei, wo sein Bruder ein Geschäft betrieb. 1918 gelangte Kim nach Shanghai, wo er Huang Jue, einen antijapanischen Partisanen, kennenlernte, der ihm half, sich als Kadett an der Militärakademie von Guizhou einzuschreiben. Kim, der seine Ausbildung mit dem plötzlichen Verlust seiner Waffe begann, wurde von He Yingqin unterrichtet, der ihn so gut unterrichtete, dass er seinen Abschluss mit Auszeichnung machte. Nach seinem Abschluss machte sich Kim auf den Weg nach Schanghai, um der provisorischen Regierung der Republik Korea beizutreten, wurde aber von den internen Streitigkeiten, die durch die kürzliche Amtsenthebung von Syngman Rhee ausgelöst wurden, gemieden. Später machte Kim eine unstete Karriere als Söldner und Erzieher zwischen China, der Mandschurei und dem russischen Fernen Osten. Bei einer Beerdigung lernte er Dr. Sun Yat-sen kennen, der ihn in seinem Streben nach Unabhängigkeit sehr unterstützte. Zu Beginn der Nordexpedition schloss sich Kim der Kuomintang an und begann seinen Dienst als Adjutant seines alten Lehrers He Yingqin. Während der Expedition überzeugte Kim koreanische Piloten aus den Zhili-Armeen für die Sache der KMT. Am Ende der Nordexpedition stieg er bis zum General auf, obwohl der Sturz der KMT diese Errungenschaft eher überflüssig machen sollte. Kim folgte He zurück nach Guizhou und in die Ebene von Yunnan, wo er zu den Überresten der Zhu Peide treuen NRA gehörte. 1931 nahm Kim erneut Kontakt mit dem Büro der Provisorischen Regierung Koreas in Schanghai auf und wurde einer der Anführer der koreanischen Befreiungsarmee, während er gleichzeitig einer der Rüstungskontakte der PGROK wurde.§!\n\n§YAnmerkungen: Als enger Berater und langjähriger Freund von He Yingqin wird er mit dem rechten Flügel der Kuomintang und der koreanischen Unabhängigkeitsbewegung in Verbindung gebracht.§!"

KOR_kim_kyu_sik: "Kim Kyu-sik"
KOR_kim_kyu_sik_leader_desc: "§YGeboren:§! §L29. Januar 1881 in Busan, Provinz Gyeongsang, Joseon§!\n§YHintergrund:§! §LKim Kyu-sik wurde schon in jungen Jahren in ein Waisenhaus geschickt, das vom amerikanischen Missionar Horace Grant Underwood geleitet wurde, und verbrachte seine Jugend damit, das Christentum und Englisch zu lernen. Mit der Unterstützung von Underwood reiste Kim 1896 in die Vereinigten Staaten, wo er – anders als in Korea – wegen seiner Herkunft nicht ausgegrenzt wurde. Während seines Studiums in den USA erwarb er 1903 einen Bachelor-Abschluss am Roanoke College und im folgenden Jahr einen Master-Abschluss in englischer Literatur an der Princeton University. Als der Russisch-Japanische Krieg ausbrach, kehrte Kim nach Korea zurück und schloss sich erneut Underwood an, wo er als dessen Sekretär tätig war und am örtlichen YMCA unterrichtete.\n\nNach dem 105-Mann-Zwischenfall im Jahr 1911, bei dem die Japaner koreanische Unabhängigkeitsaktivisten verhafteten, von denen viele Christen waren, floh Kim Anfang 1913 nach China. Neben dem Versuch, Gelder für die koreanische Unabhängigkeitsbewegung zu beschaffen, freundete sich Kim mit chinesischen Revolutionären wie Dr. Sun Yat-sen an. Als die Nordexpedition der Kuomintang scheiterte, folgte Kim der KMT ins Exil nach Paris.  Im Jahr 1932 war Kim an der Gründung der Koreanischen Nationalrevolutionären Partei beteiligt und führte deren rechte Fraktion an.\n\nMit der Befreiung Koreas unter dem rechten Flügel der Kuomintang wurde Kim ausgewählt, die neue koreanische Schwesterrepublik zu führen. Als Anhänger von Sun Yat-sen beabsichtigt Kim, die junge Nation neu zu gestalten und alle Koreaner unter dem Banner der Nationalen Revolution zu vereinen.§!"
KOR_kim_kyu_sik_sic_desc: "§YGeboren:§! §L29. Januar 1881 in Busan, Provinz Gyeongsang, Joseon§!"

KOR_lee_beom_seok: "Lee Beom-seok"
KOR_lee_beom_seok_desc_body: "Als Nachkomme des Joseon-Königshauses und Sohn eines Regierungsbeamten war der junge Lee Beom-seok ein kluger, aber oft schelmischer Junge. Über seine Streiche hinaus hegte er bald den Wunsch nach Rache an den japanischen Besatzern in Korea, als Jeong Tae-gyu, ein freigelassener Nobi, der sich um Lee gekümmert hatte, ermordet wurde, während er sich gegen die Auflösung der koreanischen Armee nach dem Japan-Korea-Vertrag von 1907 wehrte. Während seiner Zeit an der Gyeongseong-Oberschule hatte Lee schlechte Noten und ein noch schlechteres Verhältnis zu seinen japanischen Mitschülern und Lehrern. Angesichts schwindender Zukunftsaussichten und einer wachsenden Leidenschaft in seinem Inneren, die ihn dazu drängte, gegen die Japaner zu kämpfen, ging er mit Hilfe von Lyuh Woon-hyung ins Exil nach China und schloss sich der koreanischen Diaspora in Shanghai an.\n\nIm Exil lernte Lee Dr. Sun Yat-sen kennen, der ihn für die Aufnahme in die Militärakademie von Yunnan empfahl. Nach seinem Abschluss im Jahr 1919 wurde er Ausbilder an der Militärakademie von Yunnan, bevor er 1925 nach Shanghai zurückkehrte, um sich der Koreanischen Befreiungsarmee anzuschließen. Nachdem er den Zusammenbruch des Nordfeldzugs der Kuomintang und das Scheitern des Shanghai-Aufstands von 1932 miterlebt hatte, wurde Lee gegenüber linken Elementen immer misstrauischer. Mit der Zeit wurde er zu einem großen Bewunderer des rumänischen Premierministers Corneliu Zelea Codreanu und der russischen Savinkov-Bewegung – er sah in ihnen eine Inspiration für ein starkes und klassenloses Korea."
KOR_lee_beom_seok_commander_desc: "§YGeboren:§! §L20. Oktober 1900, in Hanseong, Provinz Gyeonggi, Kaiserreich Korea§!\n§YHintergrund:§! §L$KOR_lee_beom_seok_desc_body$§!"
KOR_lee_beom_seok_leader_desc: "§YGeboren:§! §L20. Oktober 1900, in Hanseong, Provinz Gyeonggi, Kaiserreich Korea§!\n§YHintergrund:§! §L$KOR_lee_beom_seok_desc_body$\n\n Als die Unabhängigkeit endlich erreicht war, kehrte Lee Beom-seok in ein freies Korea zurück. Sein Misstrauen gegenüber linken Elementen innerhalb der KIP hat zur Popularität seiner Anhänger, der Ilministen, geführt, die das "Ein-Volk-Prinzip" für die koreanische Nation befürworten. Sie glauben an die Revolutionierung und Mobilisierung Koreas zu einer militarisierten monoethnischen klassenlosen Gesellschaft mit extremer Verehrung für Kim Koo, der Galionsfigur der Nation.§!"
KOR_lee_beom_seok_sic_desc: "§YGeboren:§! §L20. Oktober 1900, in Hanseong, Provinz Gyeonggi, Kaiserreich Korea§!"

KOR_syngman_rhee: "Syngman Rhee"
KOR_syngman_rhee_leader_desc: "§YGeboren:§! §L26. März 1875 in Pyeongsan, Provinz Hwanghae, Joseon§!\n§YHintergrund:§! §LSyngman Rhee stammte aus einer bescheidenen Familie im ländlichen Korea und schloss sich der koreanischen Unabhängigkeitsbewegung an, nachdem er nach der Ermordung von Königin Min in einen Racheplan verwickelt worden war. Nach mehreren Jahren, in denen er Basisorganisationen aufbaute, wurde er 1899 verhaftet und in der Gefangenschaft gefoltert, bevor er 1904 bei Ausbruch des Russisch-Japanischen Krieges freigelassen wurde. Anschließend zog Rhee in die Vereinigten Staaten und studierte in den folgenden Jahren in Princeton und Harvard, während er seine Bemühungen zur Unterstützung der koreanischen Unabhängigkeit wieder aufnahm.\n\nAls sich 1925 mit dem Zusammenbruch des Britischen Empire und den Protesten vom 30. Mai, die Ostchina erfassten, Unruhen ausbreiteten, schlossen sich koreanische Unabhängigkeitsaktivisten zusammen und gründeten in Shanghai die Provisorische Regierung der Republik Korea, wobei sie Syngman Rhee zu ihrem Vorsitzenden wählten. Als Vorsitzender wandte er sich auf der Shanghai-Konferenz von 1928 an die amerikanischen Delegierten, in der Hoffnung, politische Unterstützung für die koreanische Unabhängigkeit zu erhalten. Dieser Plan scheiterte jedoch, was Rhees Führungsrolle in Frage stellte, zu seiner Entmachtung durch Kim Koo führte und ihn erneut ins Exil nach Amerika zwang.\n\nNach der amerikanischen Besetzung Koreas kehrte Rhee nach Jahrzehnten im Exil schließlich in seine Heimat zurück, widerlegte alle Erwartungen und wurde zum Führer einer neuen koreanischen Regierung. Obwohl sich andere ihm angeschlossen und seinen Aufstieg unterstützt haben, bleiben viele vorsichtig, da Rhee alles daran setzt, seine Herrschaft mit allen notwendigen Mitteln zu sichern.§!"

KOR_lee_gap_seong: "Lee Gap-seong"
KOR_lee_gap_seong_sic_desc: "§YGeboren:§! §L23. Oktober 1889 in Daegu, Provinz Gyeongsang, Joseon§!"

KOR_ji_cheong_cheon: "Ji Cheong-cheon"
KOR_ji_cheong_cheon_desc_body: "Nach seinem Abschluss an der Pai-Chai-Akademie im Jahr 1906 trat Ji in die Militärakademie des Kaiserreichs Korea ein, als das Land kurz vor der Annexion durch Japan stand. Im Jahr 1909 schaffte der japanische Generalresident das koreanische Militär und damit auch die Akademie ab. Ji landete schließlich an der Kaiserlich Japanischen Militärakademie und schloss diese 1914 ab. 1919 desertierte Ji aus der japanischen Armee und ging ins Exil in die Mandschurei, wo er Ausbilder an der Sinhŭng-Militärakademie wurde, einer seit 1911 bestehenden Ausbildungsstätte für koreanische Unabhängigkeitskämpfer. n\nNach einer siegreichen Schlacht zwischen koreanischen und japanischen Einheiten in Qingshanli im Jahr 1921 schloss Ji die Akademie und führte seine Truppen nach Gando, um groß angelegten Vergeltungsmaßnahmen der Japaner gegen Koreaner zu entgehen. Als 1925 in Shanghai die koreanische Provisorische Regierung gegründet wurde, half Ji bei der Gründung der Koreanischen Befreiungsarmee als deren militärischem Flügel. Obwohl er ursprünglich Mitglied der Korea-Unabhängigkeitspartei war, führten Streitigkeiten zwischen ihm und der Fraktion von Kim Koo dazu, dass Ji die Partei verließ und die Neue Korea-Unabhängigkeitspartei gründete."
KOR_ji_cheong_cheon_army_chief_desc: "§YGeboren:§! §L25. Januar 1888, in Hanseong, Provinz Gyeonggi, Joseon§!\n§YHintergrund:§! §L$KOR_ji_cheong_cheon_desc_body$§!"
KOR_ji_cheong_cheon_leader_desc: "§YGeboren:§! §LJanuary 25th, 1888, in Hanseong, Gyeonggi Province, Joseon§!\n§YHintergrund:§! §L$KOR_ji_cheong_cheon_desc_body$\n\nNach Jahren des Kampfes und der Organisation des Widerstands gegen Japan steht Ji nun an der Spitze eines neu unabhängigen Koreas. Vage inspiriert vom rechten Flügel der Kuomintang hat Ji seine NKIP in die Koreanische Nationalistische Partei umgewandelt, eine neue politische Kraft, die darauf abzielt, Korea durch die konsequente Umsetzung der Sanmin-Doktrin wiederaufzubauen.§!"

KOR_yu_chin_san: "Yu Chin-san"
KOR_yu_chin_san_sic_desc: "§YGeboren:§! §L18. Oktober 1905 im Kreis Jinsan, Provinz Nord-Jeolla, Kaiserreich Korea§!"

KOR_kim_wonbong: "Kim Wonbong"
KOR_kim_wonbong_commander_desc: "§YGeboren:§! §L28. September 1898, in Miryang, Provinz Süd-Gyeongnam, Kaiserreich Korea§!\n§YHintergrund:§! §LNachdem er in Fengtian das koreanische "Heldenkorps" organisiert hatte, führte Kim Wonbong im verzweifelten Kampf um die koreanische Unabhängigkeit zahlreiche Angriffe gegen japanische Truppen und Außenposten durch. Inspiriert von der nationalistischen chinesischen Regierung in Guangzhou schrieb sich Kim im Januar 1926 an der Militärakademie Whampoa ein, um eine eigene Armee gegen die Japaner auszubilden. Als die Expedition scheiterte, reiste Kim auf dem chinesischen Festland umher und unterstützte sozialistische und koreanische nationalistische Bewegungen bei ihrer Organisierung. Nachdem er sich 1931 von der Dritten Internationale distanziert hatte, nahm Kim Kontakt zu seinen alten Freunden in Whampoa auf, um sich als assoziierter Offizier der Kuomintang wieder einzugliedern. So beschloss er, sich zusammen mit den Überresten des Heldenkorps vollständig in die Linke KMT zu integrieren, die seine Spionagekenntnisse aus seiner Zeit als Kämpfer für die koreanische Unabhängigkeit nutzen und gleichzeitig Zugang zur weiteren Ausbildung koreanischer Kadetten erhalten sollte. 1932 organisierte Kim die Koreanische Nationale Revolutionspartei, die als Schwesterorganisation der KMT innerhalb der ebenfalls der KMT nahestehenden Provisorischen Regierung Koreas und als Opposition zu deren Regierungspartei, der Koreanischen Unabhängigkeitspartei, fungierte.§!\n\n§YAnmerkungen: Kim Wonbong ist mit fast allen Fraktionen der KMT in gewissem Maße verbunden, und um seine Position als pragmatischer Partner zu respektieren, steht er meist über der internen Parteipolitik.§!"
KOR_kim_wonbong_leader_desc: "§YGeboren:§! §L28. September 1898, in Miryang, Provinz Süd-Gyeongnam, Kaiserreich Korea§!\n§YHintergrund:§! §LNachdem er sich 1931 von der Dritten Internationale distanziert hatte, nahm Kim Kontakt zu seinen alten Freunden in Whampoa auf, um sich als assoziierter Offizier der Kuomintang wieder einzugliedern und sich später zusammen mit den Überresten des Heldenkorps vollständig in die Linke KMT zu integrieren, die seine Spionagekenntnisse aus seiner Zeit im Dienste der rechtschaffenen Armeen für sich nutzte, während er Zugang zur weiteren Ausbildung koreanischer Kadetten erhielt. 1932 organisierte Kim die Koreanische Nationale Revolutionspartei, die als Schwesterorganisation der KMT innerhalb der ebenfalls weitgehend KMT-nahen Provisorischen Regierung Koreas und als Opposition zu deren Regierungspartei, der Koreanischen Unabhängigkeitspartei, fungierte.\n\n Ein Leben im Exil hielt den patriotischen koreanischen Revolutionär Kim Wonbong kaum davon ab, die Wiederauferstehung einer koreanischen Nation noch zu Lebzeiten zu erleben. Er hat sich als energischer und leidenschaftlicher Führer erwiesen, wie seine Führung und sein Mut in der Nationalen Revolutionsarmee während der Zweiten Nordexpedition und des Krieges mit Japan zeigen. Während der Weg zu einem sozialistischen und nationalistischen Korea noch in der Zukunft liegt, hat Wonbong den Traum von der Befreiung seines Landes noch zu seinen Lebzeiten verwirklicht.§!"
KOR_kim_wonbong_sic_desc: "§YGeboren:§! §L28. September 1898, in Miryang, Provinz Süd-Gyeongnam, Kaiserreich Korea§!"

KOR_yoon_se_ju: "Yoon Se-ju"
KOR_yoon_se_ju_sic_desc: "§YGeboren:§! §L24. Juni 1901 in Miryang, Provinz Süd-Gyeongsang, Kaiserreich Korea§!"

KOR_pak_hon_yong: "Pak Hon-yong"
KOR_pak_hon_yong_leader_desc: "§YGeboren:§! §L28. Mai 1900, in Yesan, Provinz Süd-Chungcheong, Kaiserreich Korea§!\n§YHintergrund:§! §LPak Hon-yong, der als unehelicher Sohn eines Yangban-Vaters geboren wurde, reiste nach Seoul, um dort zu studieren, und schloss sich dabei dem nationalistischen Gedankengut an. Ins Exil gezwungen und als Loyalist einer staatenlosen Nation suchte Pak Zuflucht im Ausland. Er ließ sich in Europa nieder und wurde ideologisch mit dem Aufkommen des Syndikalismus in Frankreich, Italien und Großbritannien in Verbindung gebracht. Von den Revolutionen, deren Zeuge er wurde, zutiefst beeindruckt, schloss sich Pak als einer der ersten Koreaner der Dritten Internationale an und kehrte als Geheimagent nach Korea zurück, um die syndikalistischen Ideale auf der japanisch besetzten Halbinsel zu verbreiten. Nach einer Zeit der Gefangenschaft und Krankheit entkam Pak wie durch ein Wunder dem Zorn der japanischen Streitkräfte und fand seinen Weg zurück nach Paris. Dort engagierte er sich stark in der aufkeimenden totalistischen Bewegung, näherte sich den Lagern von Mosley und Mussolini an und fand Gemeinsamkeiten mit deren nationalistischen Tendenzen. Bis 1931 pendelte Pak zwischen Europa und Schanghai, wo er sowohl den Kampf für die Unabhängigkeit als auch den Kampf für den Syndikalismus unterstützen konnte, indem er die Herausgabe von pro-syndikalistischen Zeitungen initiierte. Im darauffolgenden Jahr verurteilte Pak die Provisorische Regierung, weil sie zu reaktionär war und sozialistische Denker ausschloss. Nachdem er einen gleichgesinnten Unterstützer gefunden hat, behauptet sich Pak fest als Verfechter des Totalismus in Korea, und die Macht der roten Herrschaft hat erst begonnen.§!"

KOR_yi_sung_yop: "Yi Sung-yop"
KOR_yi_sung_yop_sic_desc: "§YGeboren:§! §L8. Februar 1905 im Bezirk Bupyeong, Provinz Gyeonggi, Kaiserreich Korea§!"

KOR_kim_tu_bong: "Kim Tu-bong"
KOR_kim_tu_bong_leader_desc: "§YGeboren:§! §L16. Februar 1889 in Gijang, Provinz Gyeongsang, Joseon§!\n§YHintergrund:§! §LKim, der ursprünglich als Koreanist tätig war, schloss sich 1919 der koreanischen Unabhängigkeitsbewegung an und war an der Gründung der Provisorischen Regierung in Shanghai beteiligt. Während seines Aufenthalts dort kam Kim mit sozialistischen Ideen in Berührung und lernte bald die linke Kuomintang sowie chinesische Syndikalisten kennen. Nach der Befreiung Koreas steht Kim nun an der Spitze der Neuen Volkspartei und vereint die sozialistischen Bewegungen Koreas unter ihrer entschlossenen Führung.§!"

KOR_kim_mu_chong: "Kim Mu-chong"
KOR_kim_mu_chong_commander_desc: "§YGeboren:§! §L16. Mai 1904 in Chongjin, Provinz Nord-Hamgyeong, Kaiserreich Korea§!\n§YHintergrund:§! §LKim Mu-chong stammte aus einer wohlhabenden Großgrundbesitzerfamilie und kam 1919 mit der revolutionären Politik in Berührung, als er sich an der Bewegung des 1. März beteiligte. Nachdem er 1922 schließlich von der Schule verwiesen worden war, wurde er in den folgenden Jahren zum Sozialisten und floh nach China, um als Artillerieoffizier an der Militärakademie von Baoding zu studieren – dort trat er in den Dienst des Gouverneurs von Shanxi, Yan Xishan. Da er jedoch bereits von der sozialistischen Ideologie begeistert war, trat er 1925 in Peking der Chinesischen Syndikalistischen Partei bei und beteiligte sich 1932 am Shanghai-Aufstand. Er stieg in den Reihen auf und stand in engem Kontakt zu prominenten MinGan-Guerillagenerälen wie Peng Dehuai; dabei spielte er eine Rolle bei der Organisation ihrer wertvollen Artillerie. Nach der Befreiung Koreas unter einer roten Regierung wurde Kim Mu-chong rasch in führende Positionen der neuen koreanischen Armee katapultiert.\n\nAls einer der Anführer der sogenannten \"MinGan-Fraktion\" der koreanischen Sozialisten bildeten sie den Kern der Neuen Volkspartei. Er war aufbrausend (und manche beschrieben ihn sogar als hinterhältig); trotz seiner Zeit in China war er ein bekannter Verfechter der koreanischen Ansprüche auf Gando (auf Chinesisch Yanbian), eine Region in der Mandschurei mit einer bedeutenden koreanischen Einwandererbevölkerung, und argumentierte, dass \"Korea Gando als Belohnung für das Blutvergießen der koreanischen Armee im Mandschurischen Krieg erhalten sollte\".§!"

KOR_kim_song_ju: "Kim Song-ju"
KOR_kim_song_ju_army_chief_desc: "§YGeboren:§! §L15. April 1912 in Heijō, Chōsen, Kaiserreich Japan§!\n§YHintergrund:§! §LEr stammte aus einer armen Familie christlicher Konvertiten; als er noch ein Teenager war, nahm sein Vater an der Bewegung des 1. März von 1919 teil, mit der gegen die japanische Besatzung protestiert wurde. Die brutale Unterdrückung durch die Japaner zwang seine Familie zur Flucht in die Mandschurei, doch er wurde allein nach Korea zurückgeschickt, um dort in den folgenden Jahren seine Ausbildung fortzusetzen. Sein Vater starb im Jahr darauf, und er schloss seine Ausbildung in China ab, wo er die chinesische Sprache erlernte und sich zudem mit der marxistischen Theorie vertraut machte.\n\nEr schloss sich einer Reihe von antijapanischen Gruppen an, und seine Verhaftung im Jahr 1929 markierte das Ende seiner formalen Ausbildung und den Beginn seines Lebens als Guerillakämpfer. Diese Aufständischen wurden von der mit Japan verbündeten Fengtian-Regierung Chinas hart unterdrückt, woraufhin sie sich mit größeren chinesischen sozialistischen Rebellengruppen zusammenschlossen, um gemeinsam Widerstand zu leisten. Da sie häufig auf der Flucht waren, begannen die chinesischen Rebellenführer, den in der Region lebenden Koreanern zu misstrauen – in der Annahme, diese seien wahrscheinlich japanische Kollaborateure. Im Jahr 1933 begannen sie, die Hunderte von koreanischen Sozialisten in ihren Reihen zu säubern. Kim gehörte zu denjenigen, die 1933 verhaftet und 1934 freigesprochen wurden, doch es gelang ihm, die Akten des Säuberungskomitees an sich zu nehmen und zu verbrennen. Die Überlebenden dieses sogenannten Minsaengdan-Zwischenfalls scharten sich um Kim, und er entwickelte sich zum Anführer der koreanischen Sozialisten in der Mandschurei. Obwohl er noch ein unbedeutender, wenn auch beliebter Guerillakommandant war, gelang es ihm, seine (vielleicht übertriebenen) Heldentaten zu nutzen, um sich als prominenter Offizier in der neuen koreanischen Armee zu profilieren.§!"

KOR_choe_hyon: "Choe Hyon"
KOR_choe_hyon_high_command_desc: "§YGeboren:§! §L6. Mai 1907 in Hunchun, Provinz Jilin, Groß-Qing§!\n§YHintergrund:§! §LChoe Hyon wurde in China als Sohn koreanischer Eltern geboren und wurde unter dem Einfluss seiner Eltern schon in jungen Jahren zu einem antijapanischen Revolutionär. Sieben Jahre Haft durch die Japaner konnten ihn nicht beirren, und nach seiner Freilassung im Jahr 1932 schloss er sich einer Gruppe koreanischer Guerillakämpfer an, die von der Mandschurei aus operierten, wo er sich als fähiger Guerillakommandant erwies. Als enger Vertrauter von Kim Song-ju kehrte er nach der Unabhängigkeit mit Kim nach Korea zurück und spielte eine wichtige Rolle in deren neuer Armee.§!"

KOR_yi_geon: "Yi Geon"
KOR_yi_geon_commander_desc: "§YGeboren:§! §L28. Oktober 1909 in Hanseong, Provinz Gyeonggi, Joseon§!\n§YHintergrund:§! §LYi, der uneheliche Sohn von Prinz Yi Kang und einer Konkubine, wurde als Yong-gil geboren, änderte seinen Namen jedoch 1924 in Geon. Er wurde im Erlass des Meiji-Kaisers von 1910 nicht zu den acht Mitgliedern der königlichen Familie gezählt, und sein jüngerer Bruder übernahm 1917 nach seiner Adoption den Palast von Unhyeon; dennoch behielt Yi einen beachtlichen Status. Er ging 1918 zum Studium nach Japan und erhielt 1926 den Titel eines Herzogsprinzen sowie die Anerkennung als Mitglied der königlichen Familie.\n\nIm selben Jahr trat er in die japanische Militärakademie ein, die er 1930 abschloss. Er heiratete 1931 eine japanische Adlige und wurde zum Kavallerieoffizier der Kaiserlichen Japanischen Armee (IJA) ernannt, wo er hauptsächlich als Ausbilder tätig war. Vor der Befreiung war er Oberst der IJA; die Wiederherstellung der koreanischen Monarchie ermöglichte es ihm, eine höhere Position im neuen Militär zu übernehmen.§!"

KOR_yi_un: "Yi Un"
KOR_yi_un_high_command_desc: "§YGeboren:§! §L20. Oktober 1897 in Hanseong, Provinz Gyeonggi, Joseon§!\n§YHintergrund:§! §LAls siebter Sohn von Gojong, dem Kaiser Gwangmu, in die königliche Familie von Joseon hineingeboren, wusste Yi Un kaum, wie es war, König von Korea zu sein. 1907 zum Kronprinzen ernannt, wurde er im Alter von zehn Jahren auf Initiative von Ito Hirobumi nach Japan gebracht. Dort schenkte der japanische Kaiser Meiji dem jungen koreanischen Prinzen besondere Zuneigung und Aufmerksamkeit. Der Prinz wuchs zusammen mit japanischen Adligen wie den Prinzen Hirohito, Takamatsu und Chichibu auf. Nach der Ermordung Itos im Jahr 1909 brach der Kaiser Meiji jedoch den Kontakt zu Yi Un ab, und der koreanische Prinz wurde in seinem Adoptivland zum Gefangenen.\n\nVon 1911 bis 1924 diente Yi Un trotz seiner geringen Körpergröße in der Kaiserlich Japanischen Armee (IJA), nachdem er sich an der Zentralen Jugendschule der Armee eingeschrieben hatte. Von 1927 bis 1928 beschloss der Prinz, die Welt außerhalb Japans und Koreas zu erkunden. So begab er sich auf eine Reise nach Europa, besuchte die syndikalistischen Hauptstädte London und Paris sowie das Deutsche Reich und Österreich-Ungarn, bevor er Ende 1928 nach Japan zurückkehrte.\n\nNach seiner Rückkehr diente er weiterhin in verschiedenen Einrichtungen der IJA, vorwiegend in Ausbildungsfunktionen, aber auch in einigen Führungspositionen. Er war auch kurzzeitig als Luftwaffenkommandant eingesetzt. Während des jüngsten Konflikts verspürte er zunehmend das Bedürfnis, die koreanische Kultur zu bewahren, und bemühte sich um die Beschaffung von Aufzeichnungen mit Volksliedern, Volkskunst und anderen Artefakten.§!"

KOR_hong_sa_ik: "Hong Sa-ik"
KOR_hong_sa_ik_army_chief_desc: "§YGeboren:§! §L4. März 1889 in Anseong, Provinz Gyeonggi, Joseon§!\n§YHintergrund:§! §LAls Mitglied des Namyang-Hong-Clans stammte Hong aus einer Familie des Landadels. Er trat 1905 in eine koreanische Militärakademie ein, setzte jedoch nach deren Auflösung im Jahr 1909 sein Studium in Japan fort, zusammen mit dem damaligen koreanischen Kronprinzen Yi Un. Als Japan Korea 1910 offiziell annektierte, verließen viele andere Studenten entweder aus Protest die Akademie oder folgten dem Beispiel von Ji Cheong-cheon, der sein Studium zunächst abschloss und sich dann dem koreanischen Widerstand anschloss. Hong vermied es jedoch, sich einer der beiden Gruppen anzuschließen, obwohl er persönlich mit Ji befreundet blieb und dessen Bemühungen finanziell unterstützte, und trat als Offizier in die kaiserliche japanische Armee ein.\n\nTrotz des Drucks, seinen Namen in einen japanischeren Namen zu ändern, behielt Hong seinen Nachnamen bei. Dies hinderte ihn nicht daran, die Ränge zu durchlaufen, bis er General wurde – wobei er hauptsächlich in China diente.§!"

KOR_yi_u: "Yi U"
KOR_yi_u_commander_desc: "§YGeboren:§! §L4. März 1889 in Anseong, Provinz Gyeonggi, Joseon§!\n§YHintergrund:§! §LYi U, der zweite Sohn (und erste eheliche Sohn) von Prinz Yi ang, wurde im Alter von fünf Jahren als Thronfolger von Prinz Yeongseon adoptiert. Kurz darauf wurde er nach Japan geschickt, um dort gemeinsam mit anderen hochrangigen Vertretern des japanischen und koreanischen Adels eine Ausbildung zu absolvieren. Er diente in der kaiserlichen japanischen Armee, vorwiegend in Stabsfunktionen.\n\nTrotzdem bewahrte er seine koreanische Identität und wurde zum Lieblingssohn seines Vaters, der für seinen Einsatz für die Unabhängigkeit bekannt war. Bemerkenswert ist auch, dass Yi U eine koreanische Adlige heiratete. Mit der Thronbesteigung seines Vaters auf den wiederhergestellten koreanischen Thron wurde Yi U bald als Kronprinz anerkannt.§!"

