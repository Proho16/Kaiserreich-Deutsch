KOR_sohn_won_yil: "Sohn Won-yil"
KOR_sohn_won_yil_navy_chief_desc: "§YGeboren:§! §L22. Juni 1909, in Hanseong, Provinz Gyeonggi, Kaiserreich Korea§!\n§YHintergrund:§! §LSohn Won-yil, Sohn des Pastors Sohn Jung-do, wurde während der japanischen Besatzung gefoltert und floh daraufhin mit seiner Familie nach Shanghai. Sein Vater wurde Mitglied der im Exil ansässigen Provisorischen Regierung, während er Medizin studierte. Inspiriert von den großen Schiffen, die er dort sah, schwor er sich: \"Unsere Meere müssen von unseren eigenen Händen geschützt werden.\"\n\nEr begann, Navigation zu studieren, und trat der chinesischen Marine bei, die ihn zum Studium nach Deutschland entsandte. Als er 1930 versuchte, nach Korea zurückzukehren, wurde er von den Japanern verhaftet und inhaftiert. Danach, von 1935 bis zur Befreiung, erwarb er als Handelsmariner im japanisch besetzten Korea und in Shanghai ein Vermögen.\n\nNach der Befreiung nutzte der Zivilist Sohn sein Vermögen, um das Befreiungskorps zu gründen, das zur Grundlage der koreanischen Marine wurde. Er spielte eine wichtige Rolle bei der Gründung einer neuen Marineakademie und eines Marinekorps (obwohl er angeblich nicht an deren Gründungszeremonie teilnahm).§!"

KOR_kim_suk_won: "Kim Suk-won"
KOR_kim_suk_won_high_command_desc: "§YGeboren:§! §L29. September 1893, in Hanseong, Provinz Gyeonggi, Joseon§!"

KOR_choi_yong_duk: "Choi Yong-duk"
KOR_choi_yong_duk_air_chief_desc: "§YGeboren:§! §L19. September 1898, in Seongbuk-dong, Hanseong, Provinz Gyeonggi, Kaiserreich Korea§!\n§YAusrichtung:§! §LUnpolitisch§!\n§YHintergrund:§! §LDer in Korea geborene Choi Yong-duk besuchte 1913 die Huiwen-Mittelschule in Beijing und kehrte später in sein Heimatland (unter japanischer Kolonialherrschaft) zurück, um seine Ausbildung an der Chongsil-Mittelschule in Pjöngjang zu beenden. Nach seinem Abschluss kehrte Choi nach China zurück und schrieb sich an der Militärakademie Nanyuan unter Duan Qirui ein, die er 1916 abschloss. Danach diente er in der Zweiten Armee der Beiyang-Regierung.\n\n1919 wurde Choi ein Anhänger der Bewegung des 1. März und begann, seine eigenen Loyalitäten zur koreanischen Unabhängigkeit zu kultivieren. Er beteiligte sich an der provisorischen Regierung der Republik Korea. 1920 empfahl ihm Seo Wal-bo, der erste koreanische Pilot und Befürworter der Unabhängigkeit, ein Flugstudium an der Flugschule von Baoding. Im Jahr 1924 schloss er sich der Fliegertruppe von Wu Peifu an und nahm am Zweiten ZhiFeng-Krieg teil. Während des Krieges wurde fälschlicherweise berichtet, dass Choi in der Schlacht gefallen sei, doch er überlebte und wurde zusammen mit allen anderen Baoding-Kadetten in Feng Yuxiangs Armee aufgenommen.\n\nNach seinem Abschluss 1925 wurde Choi der 2. Choi kämpfte in der Nordexpedition und wurde in den späteren ZhiFeng-Kriegen zum stellvertretenden Kommandeur der Ersten Luftstreitkraft ernannt. Nach einem langsamen Aufstieg wurde Choi Ausbilder an der Luftwaffenakademie von Nanjing und diente ab 1935 als Major der Luftstreitkräfte.§!"

KOR_lee_eung_jun: "Lee Eung-jun"
KOR_lee_eung_jun_army_chief_desc: "§YGeboren:§! §L12. August 1890, in Anju, Provinz Pyongan, Joseon§!"

KOR_lyuh_woon_hyung: "Lyuh Woon-hyung"
KOR_lyuh_woon_hyung_leader_desc: "§YGeboren:§! §L25. Mai 1886, in Yangpyeong, Provinz Gyeonggi, Joseon§!\n§YHintergrund:§! §LNicht alle koreanischen Nationalisten schlossen sich der Provisorischen Regierung an, und Lyuh Woon-hyung, einst Außenminister der PGROK, ist einer von ihnen. Als Außenminister geriet Lyuh häufig in Konflikt mit den dominierenden Fraktionen. Nach einem Beschluss der Provisorischen Regierung, der ehemaligen kaiserlichen Familie letztendlich eine Vorzugsbehandlung zu gewähren, trat Lyuh zurück und ging seinen eigenen Weg. Danach suchte er neue Kontakte zur Dritten Internationale und anschließend zur Kuomintang, wandte sich jedoch nach dem Scheitern des Nordfeldzugs wieder von ihr ab. Nach einer Reise durch Südostasien, wo er an der Seite lokaler Nationalisten gegen ihre Kolonialherren kämpfte, wurde Lyuh schließlich während eines Fußballspiels in Shanghai gefangen genommen, von wo aus die japanischen Behörden ihn nach Japan auslieferten. Nach einer kurzen Haftzeit kehrte Lyuh als Leiter der Joongang Newspaper Company, einer der drei führenden koreanischen Zeitungen, die weiterhin erschienen, auf die Bühne zurück und kritisierte ununterbrochen die japanische Herrschaft über Korea.\n\nNach der Befreiung Koreas gründete Lyuh Woon-hyung die Arbeiterpartei, die schnell zum Vorreiter der demokratischen Linken wurde. Nach seinem Sieg bei den ersten Wahlen in Korea hat Lyuh versprochen, die koreanische Demokratie zu stärken und die Rechte der Arbeiter und Bauern Koreas zu schützen, um eine gleichberechtigte, demokratische Regierung zu schaffen, die allen Koreanern zugutekommt.§!"

KOR_yi_yong: "Yi Yong"
KOR_yi_yong_sic_desc: "§YGeboren:§! §L7. April 1888 in Bukcheong, Provinz Süd-Hamgyong, Joseon§!"

KOR_yun_chi_young: "Yun Chi-young"
KOR_yun_chi_young_leader_desc: "§YGeboren:§! §L10. Februar 1898 in Hanseong, Provinz Gyeonggi, Kaiserreich Korea§!\n§YHintergrund:§! §LYun stammte aus einer wohlhabenden Familie und wurde an der YMCA Christian Youth School eingeschrieben, wo er bei Syngman Rhee Unterricht erhielt. Fasziniert von diesem, wurde Yun zu einem glühenden Anhänger Rhees und widmete sich ab 1916 der Unabhängigkeitsbewegung. Die folgenden Jahre verbrachte Yun mit einem Studium in Japan, setzte dort seine Aktivitäten in der lokalen koreanischen Gemeinschaft fort und unterstützte die Provisorische Regierung, als diese 1919 gegründet wurde. Nach einer kurzen Rückkehr nach Korea pendelte Yun zwischen Korea und Hawaii, wo Syngman Rhee lebte, hin und her, bevor er sich 1924 endgültig zu ihm gesellte. In den Vereinigten Staaten absolvierte Yun ein weiterführendes Studium an der George Washington University und setzte sich unter Rhee weiterhin aktiv für die Unterstützung und Organisation der koreanischen Unabhängigkeitsbewegung ein, selbst nachdem Rhee 1928 aus der Provisorischen Regierung verdrängt worden war. Schließlich kehrte Yun 1935 allein nach Korea zurück, wo er kurz darauf von den japanischen Behörden verhaftet und gefoltert wurde, bevor er schließlich freigelassen wurde.\n\nNach der Rückkehr der Provisorischen Regierung nach Korea schloss sich Yun Chi-young erneut mit Sin Ik-hui und Ji Cheong-cheon von der Koreanischen Befreiungsarmee zusammen und gründete gemeinsam mit ihnen die von den Tridemisten inspirierte Koreanische Nationalistische Partei. Nach seinem Sieg bei den ersten Wahlen in Korea hat Yun erklärt, dass er unter einer Anpassung der Drei Prinzipien regieren und eine moderne, demokratische koreanische Nation schaffen werde.§!"
KOR_yun_chi_young_advisor_desc: "§YGeboren:§! §L10. Februar 1898 in Hanseong, Provinz Gyeonggi, Kaiserreich Korea§!"

KOR_shin_ik_hui: "Shin Ik-hui"
KOR_shin_ik_hui_sic_desc: "§YGeboren:§! §L9. Juni 1894 in Gwangju, Provinz Gyeonggi, Joseon§!"
KOR_yoon_ki_seop: "Yoon Ki-seop"
KOR_yoon_ki_seop_advisor_desc: "§YGeboren:§! §L4. April 1887 in Hanseong, Provinz Gyeonggi, Joseon§!"

KOR_jo_so_ang: "Jo So-ang"
KOR_jo_so_ang_sic_desc: "§YGeboren:§! §L30. April 1887, in Wollong-myeon, Provinz Gyeonggi, Joseon§!\n§YHintergrund:§! §LJo So-ang, ein ehemaliger Schüler von Sungkyunkwan, wurde von der koreanischen Regierung ausgewählt, sein Land auf einer Bildungsreise nach Japan zu vertreten. Bei seiner Ankunft stieß er auf immense Vorurteile gegenüber seinen Landsleuten, und so begann sein langer Kampf für die Unabhängigkeit seines Landes. Jo schrieb sich an der Meiji-Universität als Jurastudent ein, wurde aber bald von der Nachricht über die Annexion Koreas schockiert. Nach einer langen Zeit, in der er unter Angstzuständen und Depressionen litt, reiste Jo nach Shanghai, um den Spionagetätigkeiten der japanischen Behörden zu entgehen. Dort traf er auf die koreanischen Beamten, die später das Rückgrat der provisorischen Regierung der Republik Korea bilden sollten. Nachdem er seine Ausbildung abgeschlossen hatte, ließ er sich endgültig in China nieder. Als die Bewegung des 30. Mai den Osten Chinas erschütterte, reiste Jo schnell nach Shanghai, wo er sich mit seinen Genossen und Freunden traf, die sich zur Bildung der Provisorischen Regierung zusammenschlossen. Im Jahr 1928 traf Jo zusammen mit seinen beiden Genossen Kim Kyu-sik und Lyuh Woon-hong als Delegierte von Syngman Rhee auf der Konferenz von Shanghai ein. Nach seiner Rückkehr und dem Sturz von Rhee ergriff Jo die Initiative, sich mit der KIP zu treffen und sich an ihr zu beteiligen. Nach der Gründung der KNRP schlug sich Jo erneut auf die Seite von Kim Wonbong. Kim, ein glühender Anhänger der drei Prinzipien des Volkes, begrüßte Jo und seinen Entwurf des Samgyunismus, einer koreanisierten Version der Prinzipien, die Kim zu akzeptieren bereit war, um seine Partei als bloße Marionette der Kuomintang zu distanzieren. Jo steht jetzt unabhängig da, weit weg von reaktionärem Gezänk und sinophilen Sozialisten, und versucht sein Bestes, ein Leuchtfeuer des Liberalismus zu entzünden, damit sein nun endlich unabhängiges Mutterland fest gegen den Strom der Geschichte segeln kann.§!"

KOR_chough_pyung_ok: "Chough Pyung-ok"
KOR_chough_pyung_ok_advisor_desc: "§YGeboren:§! §L21. Mai 1894 in Cheonan, Provinz Chungcheong, Joseon§!"

KOR_song_jin_woo: "Song Jin-woo"
KOR_song_jin_woo_leader_desc: "§YGeboren:§! §L8. Mai 1889 in Damyang, Provinz Süd-Jeolla, Joseon§!\n§YHintergrund:§! §LSong Jin-woo studierte zusammen mit Kim Seong-su in Japan, als die Nachricht bekannt wurde, dass Korea offiziell dem japanischen Kaiserreich angegliedert worden war. Nach einer kurzen Rückkehr in die Heimat setzten sie im folgenden Jahr ihr Studium an der Meiji-Universität fort, wo sie begannen, koreanische Austauschstudenten zu organisieren und eine Studentenzeitung zu gründen. Im Jahr 1916 leiteten die beiden die Choongang-Schule, die 1919 zu einem Dreh- und Angelpunkt der Bewegung des 1. März wurde. Song wurde inhaftiert, aber nach anderthalb Jahren wieder freigelassen. Anschließend wurde er nationalistischer Journalist und setzte sich über verschiedene Zeitungen und Emigrantenverbände weiterhin für die koreanische Unabhängigkeit ein. Er setzte diese Arbeit in den 1920er und 1930er Jahren fort und wurde erneut inhaftiert, was ihn zwang, sich (angeblich aus gesundheitlichen Gründen) zurückzuziehen, da seine Zeitung Dong-a Ilbo von den japanischen Behörden verboten wurde.\n\nNach der Gründung eines freien Koreas trat Song als einer der prominentesten Männer aus seiner Isolation hervor. Da er Lyuh Woon-hyung und der Linken misstraute, wurde er zum Vorsitzenden der konservativen Korea Democratic Party.§!"

KOR_chang_myon: "Chang Myon"
KOR_chang_myon_sic_desc: "§YGeboren:§! §L28. August 1899 in Hanseong, Provinz Gyeonggi, Kaiserreich Korea§!"

KOR_army_reform_department: "Korean Military Council"
KOR_army_reform_department_theorist_desc: "§YGegründet:§! §Lin Korea§!"

#### Traits ####
KOR_korean_exile: "Exil in Korea"
KOR_korean_exile_desc: "§LEin koreanischer Militärführer im Exil, der davon träumt, eines Tages in ein Korea zurückzukehren, das frei vom japanischen Imperialismus ist. Bis dahin hat er sich in den Dienst vielversprechender chinesischer Kriegsherren gestellt, in der Hoffnung, dass die koreanische Unabhängigkeit eines Tages noch zu seinen Lebzeiten erreicht werden kann.§!"

KOR_great_president: "Präsident mit eisener Entschlossenheit"
KOR_great_president_desc: "Die rückgratlosen Feiglinge der koreanischen Provisorischen Regierung dachten, Rhee sei schon vor all den Jahren am Ende und dazu verdammt, in Honolulu vor sich hin zu vegetieren. Seine Rückkehr verkündet nicht nur ihr Scheitern, sondern auch den Anbruch einer neuen Ära für den koreanischen Staat. Hoch lebe der Chef!"

KOR_generalissimo: "Der Ilminist-Generalissimus"
KOR_generalissimo_desc: "§LUnsere Nation ist wahrlich einzigartig auf der Welt. Keine Gesellschaft, kein Volk kann ohne starke Führung Großes erreichen. Nein, stattdessen brauchen sie Führer, die sie zu Wohlstand und Ruhm leiten. Generalissimus Lee steht über allen anderen und verkörpert das Ideal des Großen Mannes der Geschichte, der das Schicksal der Menschheit verändert, und mit ihm an der Spitze wird Korea niemals Schwäche kennen!§!"

KOR_tridemist_marshal: "Der Tridemist-Marschall"
KOR_tridemist_marshal_desc: "§LTrotz seiner Schwächen war Sun Yat-sen ein großer Mann, der von freien Republiken träumte, die sich über ein freies Asien erstrecken sollten. Im Namen von Sun wird Ji Cheong-cheon die drei Prinzipien für die Koreanische Republik verwirklichen. Ehre sei Marschall Ji!§!"

KOR_red_general: "Roter General"
KOR_red_general_desc: "§LEr kämpfte an der Seite der Kuomintang im Nordfeldzug, schloss sich dem Exil in Paris an und kehrte zurück, um die Flamme der Revolution nach Asien zu tragen – Kim Wonbongs revolutionärer Werdegang steht außer Frage. Unter dem Kommando des Roten Generals schreitet Korea seinem revolutionären Schicksal entgegen!§!"

KOR_revolutionary_chairman: "Revolutionärer Vorsitzender"
KOR_revolutionary_chairman_desc: "§LWer war es, der die Koreanische Nationale Revolutionspartei während ihres zehnjährigen Exils vor dem Zerfall bewahrte? Wer war es, der das uneingeschränkte Bekenntnis der Partei zu den Idealen der Sanmin-Doktrin aufrechterhielt? Es war kein anderer als Vorsitzender Kim, und unter seiner Führung wird Korea die Freiheit erlangen.§!"

KOR_supreme_leader: "Oberster Führer"
KOR_supreme_leader_desc: "§LSeine Kritiker bezeichneten ihn oft als tollkühnen Terroristen, seine Rivalen werfen ihm vor, ein Spion der Japaner zu sein. Yeom Dong-jin ist ein Mann mit vielen Feinden und Gegnern, doch da er die uneingeschränkte Kontrolle innehat, kann niemand an seinem eisernen Willen zweifeln.§!"

