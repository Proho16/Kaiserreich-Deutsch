KOR_authknp_tt: "§LKorea wird unter der Kontrolle von §aJi Cheong-cheon§! und der §aKoreanischen Nationalistischen Partei§! konsolidiert.§!"
KOR_lp_lee_tt: "§LKorea steht unter der Kontrolle von §PLee Beom-seok§! und der §PLiberalen Partei§!.§!"
KOR_lp_rhee_tt: "§LKorea wird unter der Kontrolle von §aSyngman Rhee§! und der §PLiberalen Partei§! konsolidiert.§!"
KOR_wpk_tt: "§LKorea steht unter der Kontrolle von §oPak Hon-yong§! und der §oArbeiterpartei Koreas§!.§!"
KOR_npp_tt: "§LKorea steht unter der Kontrolle von §rKim Tu-bong§! und der §rNeuen Volkspartei§!.§!"
KOR_knrp_tt: "§LKorea steht unter der Kontrolle der §RSozialisten§! oder der §agemäßigten Rechten§! der §aKoreanischen Nationalen§! §RRevolutionären Partei§!.§!"
KOR_knrp_left_tt: "§LKorea steht unter der Kontrolle von §RKim Wonbong§! und den §RSozialisten§! der §RKoreanischen Nationalen Revolutionspartei§!.§!"
KOR_knrp_right_tt: "§LKorea wird unter der Kontrolle von §aKim Kyu-sik§! und dem §amoderaten rechten Flügel§! der §aKoreanischen Nationalen Revolutionspartei§! konsolidiert.§!"
KOR_wss_tt: "§LKorea wird unter der Kontrolle von §nYeom Dong-jin§! und der §nGesellschaft der Weißen Hemden§! konsolidiert.§!"
KOR_kip_loss_tt: "§tSollte die Koreanische Unabhängigkeitspartei die Macht verlieren, würde dies zu einer Destabilisierung Koreas führen, und es ist wahrscheinlich, dass ein weniger verlässlicher Partner die Kontrolle übernimmt.§!"
KOR_knrp_coup_tt: "§RIn Korea wird nun eine befreundete sozialistische Regierung die Zügel in die Hand nehmen.§!"
KOR_wss_coup_tt: "§nNun wird in Korea eine wahrhaft revolutionäre Regierung die Zügel in die Hand nehmen.§!"

KOR_kip_stewardship_tt: "§aDie Koreanische Unabhängigkeitspartei wird vorübergehend die Regierungsgeschäfte führen, bis sich die Lage im Land stabilisiert hat und Wahlen abgehalten werden können.§!"
KOR_constitution_rep_tt: "§cDie KIP soll verschiedene Akteure und Politiker an einen Tisch bringen, um eine Verfassung für eine demokratische Republik auszuarbeiten.§!"
KOR_constitution_mon_tt: "§cDie KIP soll verschiedene Parteien und Politiker an einen Tisch bringen, um eine Verfassung für das wiederbelebte Reich auszuarbeiten.§!"
KOR_election_tt: "§LEndlich ist das koreanische Volk bereit dafür, dass die Übergangsregierung den Forderungen der Bevölkerung nachgibt. Möge die beste Partei gewinnen!§!"

KOR_never_another_occupation_tt: "§aNach Jahrzehnten der Unterdrückung ist die Unabhängigkeit Koreas nun endlich erreicht. Nie wieder werden wir uns einer fremden Nation unterwerfen!§!"
KOR_stabilising_the_new_regime_tt: "§LDer Präsident hat unser Land an die Spitze der Macht geführt. Korea steht vor einer großen Zukunft!§!"
