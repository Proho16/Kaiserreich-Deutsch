 ###Decision Cats and Decisions###
 # Mechanik des deutschen Einflusses #
 RSA_german_influence: "Deutscher Einfluss"
 RSA_german_influence_desc: "Eine bedauerliche Realität unseres gerechten Kampfes, das russische Volk erneut von der Tyrannei zu befreien, ist ein Pakt mit dem Teufel. Während wir durch unser eigenes Land marschieren, sind wir mit deutscher Ausrüstung bewaffnet, kämpfen an der Seite deutscher Soldaten, und sogar unser §aBefreiungsrat§! umfasst Vertreter des Heeres. Wenn wir uns als wertvoller Verbündeter erweisen, zumindest vorläufig, könnten sie es sich sogar leisten, uns dabei zu helfen, die Technologie und Ausbildung unserer Armee auf das Niveau deutscher Eliteeinheiten zu bringen – und nach dem Frieden können wir, indem wir in den Reihen des Heeres Blut vergießen, einen Platz an den Friedensverhandlungen erwarten.\n\Zwar ist die deutsche Unterstützung bei der Befreiung Russlands ein unbestreitbarer Vorteil, doch können wir uns unmöglich als Fackel der Demokratie bezeichnen, wenn wir nicht auf den Willen unseres eigenen Volkes hören. Wir müssen auch die Auswirkungen eines übermäßigen §Pdeutschen Einflusses§! bedenken: Zu viel Hilfe von den Deutschen, und unsere Landsleute könnten glauben, sie würden lediglich einen Stiefel aus Moskau gegen einen Stiefel aus Berlin eintauschen.\n\n§PDeutscher Einfluss§! hängt von unserer $paternal_autocrat_coloured$-Beliebtheit ab und liegt derzeit bei: [?RSA.party_popularity@paternal_autocrat|H%0]\n"
 RSA_expand_corps: "Das Korps vergrößern"
 RSA_lootbox: "Militäraufträge finden"
 RSA_lootbox_desc: "Für die deutsche Rüstungsindustrie stehen wir ganz unten auf der Prioritätenliste, und in der Praxis hängt die Beschaffung hochwertiger Waffen davon ab, ob wir Glück haben. Vielleicht finden wir ja, wenn wir Glück haben, ein deutsches Unternehmen, das noch Bestände an Überbeständen aus dem Weltkrieg oder ähnlich veralteten Ausrüstungsgegenständen hat."
 RSA_lootbox_1: "§PMauser WK1 Überschuss§!"
 RSA_lootbox_2: "§NKrupp WK1 Überschuss§!"
 RSA_lootbox_3: "§cGünstige Opel & Hanomag§!"
 RSA_lootbox_4: "§gGebrauchte Lokomotiven§!"
 RSA_lootbox_5: "§nLeicht beschädigte Rüstung§!"
 RSA_prepare_offensive_operation: "Offensivoperation vorbereiten"
 RSA_ruhr_contracts: "Ruhr-Verträge"

 RSA_recruit_pows: "Kriegsgefangene rekrutieren"

 RSA_saving_russia: "Rettung der Russischen Republik"
 RSA_saving_russia_desc: "Warum sind wir hier? Nur um zu leiden? Jeden Tag wird russisches Blut im Dienste der Tyrannen und Lügner des Kremls vergossen. Man kann sich nur fragen, was ein Mensch gegen rücksichtslosen Hass ausrichten kann. Es ist zu viel Blut für die große Russische Republik und ihre Werte der Freiheit und Gleichheit vergossen worden, als dass wir jetzt aufgeben und bis zum bitteren Ende gehen könnten.\n\nSollte dies unser Ende sein, so möge man sich daran erinnern, dass die russische Demokratie nicht kampflos unterging, sondern unter lautem Protest starb. Die Neue Freiwilligenarmee wird, wie General Aleksejew es formulierte, 'eine Fackel entzünden, damit es wenigstens einen Lichtpunkt in der Dunkelheit gibt, die Russland umhüllt hat …'\n"
 RSA_prepare_caucasus_uprising: "Vorbearbeitung des Kaukasus-Aufstands"
 RSA_recruit_soldiers: "Wehrpflicht in [FROM.GetName]"
 RSA_counter_claims: "Ansprüche [FROM.GetAdjective] stellen"
 #RSA_negotiate: "Waffenstillstand aushandeln"
 #RSA_negotiate_desc: "Es ist schon genug Blut vergossen worden."

 RSA_claimed_ukrainian_states: "§Y[260.GetName]§!, §Y[220.GetName]§! und der §YNordkaukasus§! werden am Ende des Krieges in russischer Hand bleiben."
 RSA_claimed_belarusian_state: "§Y[242.GetName]§! wird am Ende des Krieges in russischer Hand bleiben."
 RSA_claimed_finnish_states: ""§Y[216.GetName]§! wird nach Kriegsende in russischer Hand bleiben."

 RSA_postwar: "Russlands früheren Ruhm wiederherstellen"
 RSA_postwar_desc: "Die russische Demokratie hat überlebt, zwar angeschlagen und zerschlagen, aber wir sind noch da. Der Preis war furchtbar, sowohl an Menschenleben als auch an verlorenem Land. Während der deutsche Adler über die Welt schwebt, müssen wir uns mit dieser neuen Welt arrangieren – doch wir müssen sie nicht bedingungslos akzeptieren. Russland ist nach wie vor eine Großmacht und verdient seinen eigenen Platz, selbst in einer von Deutschland dominierten Welt."
 RSA_talks_with: "Gespräche mit [FROM.GetNameDef]"
 RSA_talks_with_desc: "Um unsere Position auf der Weltbühne zurückzugewinnen, brauchen wir Verbündete. Da Europa von Deutschland und seinen Vasallenstaaten dominiert wird, müssen wir unseren Blick weiter nach Übersee richten, auf [FROM.GetNameDef] und deren Block."
 RSA_freedom_tt: "Wir könnten versuchen, uns aus dem deutschen Einflussbereich zu lösen."
 RSA_only_one_tt: "§RDu kannst nur eine Allianz auswählen, wenn mehrere zur Auswahl stehen.§!"

 RSA_take_siberia: "Nimm Sibirien"
 RSA_take_siberia_tt_1: "§CAngesichts unserer derzeitigen Lage im Krieg wird dieser damit enden, dass [FER.GetNameDef] §rganz Sibirien erobert§!. Kämpft weiter!§!"
 RSA_take_siberia_tt_2: "§CAngesichts unserer derzeitigen Lage im Krieg wird dieser mit einem Frieden auf unseren Bedingungen enden. Sollten wir §YBlagoweschtschensk§!, §YChabarowsk§! und §YWladiwostok§! besetzen, werden wir mit Sicherheit §Gsiegreich sein§!.§!"
 RSA_take_siberia_tt_3: "Da wir derzeit §YJablagoweschtschensk§!, §YChabarowsk§! und §YWladiwostok§! besetzt halten, werden wir mit Sicherheit §Gsiegreich sein§!!"

### Schwerpunkte ###
 RSA_civil_war: "Der Zweite Russische Bürgerkrieg"
 RSA_civil_war_desc: "Die Zeit des Exils in Berlin ist vorbei! Die Tyrannen in Moskau, die Russland viel zu lange geplagt und Osteuropa in den Krieg gestürzt haben, bieten nun endlich die Gelegenheit, den Krieg zur Wiederherstellung der Demokratie zu beginnen. Auch wenn manche die Abhängigkeit von unseren deutschen Verbündeten verachten mögen, sind unsere Bemühungen ohne deren Unterstützung vergeblich, und ohne uns läuft Deutschland Gefahr, einem besiegten Russland einen noch schlechteren Frieden aufzuzwingen." #WIP

 RSA_liberated_territories: "Regierung der Befreiten Gebiete"
 RSA_liberated_territories_desc: "Zu lange schon haben die Menschen in Russland Boldyrev als Verräter und Kollaborateur der Deutschen angesehen, doch mit der Befreiung von Teilen des Landes ist nun die Zeit gekommen, eine echte Gegenregierung zu Moskau auszurufen. Eine Botschaft, die im ganzen Land gehört werden muss: Die RSA kämpft für ein Russland, das frei von Tyrannei und Extremismus ist."
 RSA_boldyrevites: "Die Boldyreviten"
 RSA_boldyrevites_desc: "Manche mögen meinen, es sei am besten, mit den politischen Kräften im besetzten Russland zusammenzuarbeiten, die sich nach wie vor die Rückkehr der Demokratie in Russland wünschen, doch wo waren diese Gruppen im Jahr 1929, als Boldyrev versuchte, die Republik zu retten? Die Demokratie wird nach Russland zurückkehren, doch dies kann nicht geschehen, bevor der Krieg beendet ist, und bis dahin muss sich das Volk hinter Boldyrev und jene stellen, die ihm selbst im Exil treu geblieben sind."
 RSA_popular_front: "Die Volksfront"
 RSA_popular_front_desc: "Der Staatsstreich von 1929 gegen die Regierung war ein Versuch, die russische Demokratie vor den Gefahren des wachsenden Extremismus zu bewahren, den die SZRS darstellte. Nun, da radikale Kräfte einen Großteil des Landes kontrollieren und die RSA als letzte Bastion der russischen Demokratie gilt, werden die politischen Kräfte des Landes, die jahrelang unterdrückt wurden, dazu eingeladen, sich dem Kampf für die Freiheit anzuschließen."
 RSA_fight_for_russia: "Kampf um Russland"
 RSA_fight_for_russia_desc: "Dieser Krieg wird nicht um territoriale Zugeständnisse oder wirtschaftlichen Einfluss geführt; dieser Krieg ist ein Kampf um die Seele des Vaterlandes. Ein Kampf, um Russland vor den schlimmsten Seiten seiner selbst zu bewahren. Russland kann noch verhindern, dass die Errungenschaften von 1917 und 1922 zunichte gemacht werden, solange das Volk bereit ist, dafür zu kämpfen."
 RSA_foundations: "Die Grundlagen schaffen"
 RSA_foundations_desc: "Kein Krieg kann ewig dauern, und irgendwann wird der Zeitpunkt kommen, an dem die Streitkräfte von [RUS.GetName] besiegt sind. Sobald dieser Zeitpunkt gekommen ist, besteht kein Grund mehr, länger als nötig zu kämpfen, und es können Gespräche aufgenommen werden, um die Kämpfe zu beenden. Es müssen Vorbereitungen getroffen werden, um die Kämpfe rasch zu beenden, aber auch für das, was danach zu tun sein wird."
 RSA_punish_traitors: "Die Verräter bestrafen"
 RSA_punish_traitors_desc: "Selbst jetzt, da die Menschen im Mutterland weiterhin Boldyrevs Aufrufe zur Befreiung hören, wird die Propaganda der [RUS.GetRulingParty] verbreitet, in der Boldyrev als Verräter Russlands bezeichnet wird, obwohl doch gerade sie es sind, die das russische Volk verraten haben. Diejenigen, die Russland verraten haben, indem sie alles zunichte machten, wofür während des Ersten Bürgerkriegs gekämpft wurde, und den Willen des Volkes unter ihren Stiefeln zermalmten. Diejenigen, die dieses System aufrechterhalten haben oder weiterhin versuchen, unter dessen Banner zu kämpfen, müssen streng bestraft werden."

 RSA_denounce_state_terror: "Staatlichen Terror anprangern"
 RSA_denounce_state_terror_desc: "Wer durch Angst regiert, tut dies nur, weil er beim Volk weder Loyalität noch Liebe weckt. Savinkows Besessenheit von Terrorismus und Gewalt kann nur dazu führen, dass Russland zu einer ausgehöhlten Hülle einer Nation wird. Diese Politik wird auf entschiedene Weise abgelehnt werden. Es darf niemals wieder einen Savinkow geben."
 RSA_enemies_of_vozhd: "Die Feinde unseres Feindes"
 RSA_enemies_of_vozhd_desc: "Es kann schwierig sein, in einem Krieg Verbündete zu finden; glücklicherweise haben die zahlreichen Säuberungsaktionen der Svobodniks dazu geführt, dass es viele Gruppen von Menschen gibt, die zwar untereinander nichts für einander übrig haben, aber mehr als genug Gründe besitzen, Savinkov zu verachten. Erst die internen Machtkämpfe nach Tschernows Tod ermöglichten es der SZRS, die vollständige Kontrolle über das Land zu übernehmen. Jeder Versuch, sie zu stürzen, muss die Einheit der Bewegung gegen sie gewährleisten."
 RSA_VRBO: "Vereint den Widerstand"
 RSA_VRBO_desc: "Die russische rote Untergrundbewegung, die der Allrussischen Kampforganisation untersteht, kämpft schon seit Savinkovs Machtübernahme gegen ihn. Wir haben, offen gesagt, wenig mit vielen dieser fanatischeren Sozialisten gemeinsam, aber wir können dennoch sicherstellen, dass sie nach Kriegsende keinen großen Einfluss auf die Republik ausüben können. Vorerst müssen wir uns mit ihnen verbünden – alles, um die Savinkov-Tyrannei zu stürzen."
 RSA_last_volunteer_army: "Die Letzte Freiwilligenarmee"
 RSA_last_volunteer_army_desc: "Wir können nur zurückkehren, wenn Gottes Gnade da ist. Aber wir müssen eine Fackel entzünden, damit es wenigstens einen Lichtpunkt in der Dunkelheit gibt, die Russland umhüllt hat..."
 RSA_resistance_of_faithful: "Der Widerstand der Gläubigen"
 RSA_resistance_of_faithful_desc: "Die Verachtung und der Hass, den die Sozialisten der Kirche entgegenbringen, sind für jeden offensichtlich, der ihre Äußerungen dazu hört. Der Kontakt zu kirchlichen Gemeinschaften hat es ermöglicht, den Widerstand weiter zu stärken und die Unterstützung für andere antisozialistische Gruppen im ganzen Land zu vertiefen. Die Roten konnten die Kirche im Ersten Bürgerkrieg nicht zerstören; sie werden es auch in diesem nicht schaffen."
 RSA_new_white_movement: "Ein weiterer Weiße Bewegung"
 RSA_new_white_movement_desc: "Es war die Weiße Armee, die die Bolschewiki einst besiegte, und nun schließt sich die weiße Bewegung unter General Boldyrev gegen den zweiten Roten Terror zusammen. Die Geschichte wird uns Recht geben: Wir waren einst siegreich, wir werden wieder siegreich sein. Alle Waffen gegen diejenigen, die unsere russische Flagge entweihen wollen!"
 RSA_contact_semyonov: "Semyonov kontaktieren"
 RSA_contact_semyonov_desc: "Grigory Semyonov ist vieles – vor allem ein Bandit –, aber entscheidend ist, dass er gegen die Truppen von [RUS.GetLeader] kämpft. Wir müssen dafür sorgen, dass er nach Kriegsende sein Herrschaftsgebiet friedlich übergibt, damit es kein weiteres Blutvergießen gibt."

 RSA_recruitment_issue: "Das Rekrutierungsproblem"
 RSA_recruitment_issue_desc: "Tatsache ist, dass die Rekrutierung neuer Soldaten unter den gegenwärtigen Umständen bestenfalls schwierig ist. Wenn die Freie Armee nicht ausbluten soll, sind erhebliche Anstrengungen erforderlich, um die in Osteuropa außerhalb Russlands lebenden Russen anzusprechen und den gefangenen Soldaten klarzumachen, dass der Kampf für unsere Sache der einzige Weg ist, Russland zu retten."
 RSA_rekindle_volunteerism: "Freiwilligendienst wiederbeleben"
 RSA_rekindle_volunteerism_desc: "Als der erste Aufruf zum Kampf erging, damit sich die Nation gegen die [RUS.GetRulingParty] erhebt, meldeten sich viele eifrig freiwillig zum Dienst. Die Wiederbelebung dieses Geistes wird entscheidend sein, um die Freie Armee zu einer Streitmacht zu machen, die in der Lage ist, Russland zu befreien und dies der Nation zu beweisen."
 RSA_underground_cells: "Das Untergrundorchester"
 RSA_underground_cells_desc: "Wir können den Traum von einem freien Russland nicht verwirklichen, wenn wir uns lediglich an die deutschen und alliierten Streitkräfte anschließen. Nein, die Freie Russische Armee muss größer sein. Wir werden alles in unserer Macht Stehende tun, um weit entfernt von den Frontlinien passiven oder aktiven Widerstand gegen den Krieg zu leisten und die Versorgung sowie die Kommunikation zu stören."
 RSA_conscription_desc: "Das wird die Befreiungsbewegung beim Volk nicht beliebt machen, aber eine Armee, die ausschließlich aus Freiwilligen besteht, wird den Mitteln, zu denen die Tyrannen greifen, um zu siegen, nicht gewachsen sein. Es werden Räte zur Mobilisierung der Bewohner der befreiten Gebiete eingerichtet, um sicherzustellen, dass das Befreite nicht wieder in die Hände der Extremisten fällt."
 RSA_radio_free_russia: "Radio 'Freiheit'"
 RSA_radio_free_russia_desc: "Ein zentrales Problem bei der Verbreitung der Botschaft von der Befreiung Russlands ist der Kampf gegen die Propaganda, die die wahren Schrecken der Tyrannen verschleiert und Boldyrevs Anliegen als das eines eigennützigen Speichelleckers darstellt. Die Gründung eines speziellen Radiosenders, der darauf abzielt, die Botschaft der Befreiung von der extremistischen Diktatur tief ins Innere Russlands zu tragen, und warum Boldyrev und alle rechtschaffenen Russen sich entschlossen haben, dagegen zu kämpfen."

 RSA_war_planning_commisariat: "Das Kommissariat der Streitkräfte"
 RSA_war_planning_commisariat_desc: "Die derzeitige Organisation der Armee, die zwar während des Exils in Berlin und in den ersten Kriegstagen funktionierte, ist angesichts der seither erfolgten Vergrößerung nicht mehr angemessen. Es soll ein Kommissariat der Streitkräfte eingerichtet werden, um die ordnungsgemäße Verwaltung der Armee und der wenigen verfügbaren Luftstreitkräfte sicherzustellen."

 RSA_impose_discipline: "Disziplin durchsetzen"
 RSA_impose_discipline_desc: "Opportunisten stellen für unsere Bewegung vielleicht eine größere Bedrohung dar als die Kreml-Truppen selbst – viele einfache Russen sehen keinen Sinn darin, sich den freien Kräften anzuschließen, wenn sie uns lediglich als eine Bande von Kollaborateuren und Banditen wahrnehmen. Wenn wir das ändern wollen, müssen in der gesamten Armee strenge Hierarchien und Disziplin durchgesetzt werden."
 RSA_assault_units: "Schock-Einheiten organisieren"
 RSA_assault_units_desc: "Russland ist ein riesiges Land, doch um die Kontrolle darüber zu erlangen, werden wahrscheinlich kostspielige Kämpfe um die großen Städte und das Durchbrechen von Verteidigungsstellungen erforderlich sein. Natürlich hat Boldyrev eine Lösung für solche Probleme: spezialisierte Einheiten für Stadtangriffe und das Stürmen befestigter Stellungen. Keine noch so große Anzahl von Bunkern wird die Befreiung Russlands aufhalten!"
 RSA_free_cossacks: "Freies Kosakenkorps"
 RSA_free_cossacks_desc: "Die Kosaken sind seit jeher ein Volk, das der russischen Regierung gegenüber Missmut hegt und kriegerisch gesinnt ist. Die Extremisten, die einen Großteil des Landes kontrollieren, haben diese Spannungen nur noch weiter angeheizt. Ein Bündnis mit den Kosakenheeren könnte dringend benötigte zusätzliche Soldaten liefern und potenzielle Überläufer ermutigen." #WIP
 RSA_landsberg_school: "Militärschule Landsberg"
 RSA_landsberg_school_desc: "Da unsere Armee nun von neuen Offizieren geführt wird, benötigen wir neue Einrichtungen, um sie auszubilden. Wir werden in Preußen eine russische Militärschule gründen, die speziell diesem Zweck dient und die die besten Aspekte der deutschen und der russischen militärischen Ausbildung vereint."
 RSA_partisan_central_organisation: "Partisanenzentralkommando"
 RSA_partisan_central_organisation_desc: "Es erfordert erheblichen Aufwand, einen unzufriedenen Mann zu einem Partisanen zu machen, der tief im feindlichen Gebiet operieren kann. Die Organisation der zahlreichen Partisanennetzwerke unter einem übergeordneten Netzwerk ermöglicht einen optimierten Prozess zur Bildung von Partisanentruppen und zur Abstimmung dieser Partisanen mit den Ereignissen an der Front."
 RSA_german_doctrine: "Integrierte Manöverkriegsführung"
 RSA_german_doctrine_desc: "Während der Zeit im Exil in Deutschland und auch jetzt, da die deutsche Armee für die Wiederherstellung der russischen Demokratie kämpft, sind bestimmte Konzepte der deutschen Armee, wonach Panzerverbände feindliche Stellungen durchbrechen und den Gegner manövrieren sollen, in den Fokus gerückt, um eine taktische Überlegenheit gegenüber dem Feind zu sichern."
 RSA_free_russian_spirit: "Freier Russischer Geist"
 RSA_free_russian_spirit_desc: "Die Armee des freien Russlands besteht aus jenen, die bereit waren, mutig gegen den Extremismus Stellung zu beziehen, der Russland korrumpiert hat – eine Armee, die sich unter keinen Umständen brechen lässt. Solange dieser Geist fortbesteht, lebt der Traum von der Befreiung des Vaterlandes weiter."
 RSA_armour_corps: "Erstes Gardekorps"
 RSA_armour_corps_desc: "Angesichts der begrenzten industriellen Kapazitäten und der sich verbreitenden Konzepte der Manöverkriegsführung ist die Schaffung eines Panzerkorps kein Wunschtraum mehr, sondern eine reale Möglichkeit. Vorerst wird dieses Korps den vom Feind erbeuteten Panzern eine Bestimmung geben, bis die eigene Panzerproduktion anlaufen kann."

 RSA_logistics: "Central Logistics Service"
 RSA_logistics_desc: "The need for proper logistics management is unavoidable for any army. Management to ensure proper logistics will be centralised to ensure proper distribution of what resources there are and the creation of new equipment. All the equipment in the world means nothing if only one division has it."
 RSA_emergency_workshops: "Improvised Industry"
 RSA_emergency_workshops_desc: "As a true industrial base is not fully available, a system of workshops will be created from purchased and captured machine tools. Situated just behind our lines, these workshops may not be capable of extensive production, but their makeshift nature means that if properly organised, they can be moved from the streets at short notice."
 RSA_field_recovery_companies: "Mobile Repair Companies"
 RSA_field_recovery_companies_desc: "Often, captured equipment needs to be repaired and takes time before it can be properly used; however, the creation of dedicated groups for repairing this equipment as quickly as possible will allow for more equipment to be used. Some of this equipment that is repaired may not be able to be fully fixed, but one must take what they can get."
 RSA_directorate_of_production: "The Main Directorate of Armaments"
 RSA_directorate_of_production_desc: "Equipment production must be carefully managed to ensure that the soldiers of the army have what they need to fight. The liberation of portions of Russia means that the creation of a directorate for the sole purpose of managing armament production can now be established to do such."

 RSA_expand_german_aid: "Expand German Aid"
 RSA_expand_german_aid_desc: "The dream of valiantly reclaiming the motherland cannot be achieved with only the limited industrial capacity available. Our German allies have an ample supply of resources that could be used to strengthen our forces if persuaded." #WIP
 RSA_german_credit: "German Credit"
 RSA_german_credit_desc: "As distasteful as it is, the need for equipment outweighs it. An offer to purchase even more equipment will be put forward that will plunge the movement into debt to Germany, one that will take years to fully repay. This debt will give Germany a significant weight to make demands of Boldyrev, but the cost may be worth it."
 RSA_aviation_contracts: "Aviation Contracts"
 RSA_aviation_contracts_desc: "Despite how vital it is, producing a sizable amount of aircraft is simply not an option. Fortunately, there exists the ability to reach out to our allies who can produce aircraft to be purchased. There may be complaints that this further drives the cause of liberation deeper into foreign influence, but anything must be considered to keep the army in fighting condition."

 RSA_declare_free_russia: "Declare a Free Russia"
 RSA_declare_free_russia_desc: "Each passing day brings the liberation of more and more of Russia as the soldiers and people of the nation hear the call for freedom. No longer can the Freie Russische Armee be called merely a government with an army holding only small portions of the country. Boldyrev's Russia is Russia - a Free Russia unshackled by tyrants, be they Tsars, Reds, or Svobodniks."

