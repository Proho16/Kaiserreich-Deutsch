 RSA_guide: "§MBoldyrev§! ($social_liberal_coloured$ / $social_democrat_coloured$)\n£white_dot Kämpft den Zweiten Weltkrieg gegen das §nSavinkovistische Russland§! und sorgt dafür, dass Boldyrev die Wahl gewinnt.\n\n§MBoldyrev§! ($market_liberal_coloured$ / $social_conservative_coloured$)\n£white_dot Kämpft den Zweiten Weltkrieg gegen das §SSozialistische Russland§! und sorgt dafür, dass Boldyrev die Wahl gewinnt.\n\nEine Niederlage bei den Wahlen nach dem Krieg führt zu einer Abwandlung der üblichen Inhalte über das Demokratische Russland, ohne dass neue Inhalte hinzukommen."

 ### Events ###
 russia_free_army_events.1.t: "Die Konferenz von Danzig"
 russia_free_army_events.1.d.szrs: "Der Krieg hat die verstreute russische Emigrantengemeinschaft ins Chaos gestürzt. Zwar sind viele wegen der Verfolgung durch die SZRS aus Russland geflohen, doch ist es nicht selbstverständlich, dass sie sich eine Niederlage Russlands wünschen. Erschwerend kommt hinzu, dass viele russische Sozialisten den Krieg unterstützen – nicht aus Sympathie für Sawinkow, sondern weil sie auf den Sieg der Internationale hoffen.\n\nDoch es gibt Menschen, die mit dem Svobodnik-Regime keine Kompromisse eingehen können. Kopien von Wladimir Rikhters trotziger Rede in der letzten freien Sitzung der Duma im Jahr 1936 sind weit verbreitet, und ihr Schlusswort – 'Freies Russland, ewig und unzerstörbar!' – ist zu einem Schlachtruf geworden, zu einem Keim des Widerstands. Es ist nicht bekannt, ob Rikhter selbst tot ist oder sich in einem Lager in Sibirien befindet, aber das Mindeste, was alle Russen tun können, die die Freiheit ihrer Kinder schätzen, ist, sich dem Tyrannen Savinkov und seinem Krieg zu widersetzen.\n\nUnd so kam es zur Danziger Konferenz, einem Treffen russischer Dissidenten in Deutschland. Der berühmte Dichter Ossip Mandelstam, der nach der Verschärfung der antisemitischen Politik aus Russland geflohen war, bezeichnete den Widerstand als moralische Pflicht für jeden Menschen, dem noch ein Funken Menschlichkeit geblieben war. Pawel Miljukow war anwesend, ebenso wie der Kadetten-Anwalt Alexander Kulischer, der Hilfe für aus Russland fliehende Juden organisiert hatte. Es kursierten erschreckende Berichte über ein Netz von Gefangenenlagern von Murmansk bis Kamtschatka.\n\nDie wichtigste Initiative ging jedoch von dem alten General Wassili Georgiwitsch Boldyrev aus. Nachdem er durch seinen Putschversuch im Jahr 1929, mit dem er den wachsenden Einfluss Savinkows eindämmen wollte, in Verruf geraten war, wurde er zum faktischen Anführer des Widerstands gegen die Svobodniks mit umfangreichen Verbindungen zu Widerstandsgruppen in Russland. Boldyrev schlug die Gründung des Komitees für ein freies Russland vor, 'aus jenen, die sich ein freies Russland für ihre Kinder wünschen', und strebte eine uneingeschränkte Zusammenarbeit mit der deutschen Armee an, wobei aus denjenigen, die mit ihm kämpfen wollten, ein 'Freies Russisches Korps' gebildet werden sollte. Dies war relativ umstritten, und es wurden Vorwürfe der Kollaboration laut, doch letztendlich setzte sich Boldyrev durch: Wenn Savinkov gewinnt, verlieren sie. Wenn Deutschland gewinnt, können sie zumindest auf diese Weise die Zukunft Russlands selbst bestimmen."
 russia_free_army_events.1.d.soc: "Der Krieg hat die verstreute russische Emigrantengemeinschaft ins Chaos gestürzt. Zwar sind viele aus Russland geflohen, nachdem sie ihren Besitz verloren hatten oder von der WGS wegen ihres Widerstands gegen die Revolution verfolgt worden waren, doch ist es nicht selbstverständlich, dass sie lieber sehen würden, dass Russland den Krieg verliert. Viele alte Weiße wiederholen seit langem antikommunistische Litaneien, ohne dass dies viel bewirkt hätte, und andere hoffen immer noch, dass sich das Regime irgendwann mäßigen wird – schließlich ist es nicht Lenin.\n\nDoch es gibt Menschen, die mit dem sozialistischen Regime keine Kompromisse eingehen können. Kopien von Wladimir Rikhters trotziger Rede in der letzten freien Sitzung der Duma im Jahr 1936 sind weit verbreitet, und ihr Schlusswort – 'Freies Russland, ewig und unzerstörbar!' – ist zu einem Schlachtruf der russischen Demokraten geworden, die von der Tragödie erschüttert sind, dass der Sturz Sawinkows lediglich dazu geführt hat, an seiner Stelle ein weiteres autoritäres Regime zu errichten.\n\nUnd so kam es zur Danziger Konferenz, einem Treffen russischer Dissidenten in Deutschland. Der berühmte Schriftsteller Roman Gul, der aufgrund der Zensur aus Russland geflohen war, eröffnete die Konferenz mit einem Aufruf an alle gebildeten Menschen, sich der 'revolutionären Tyrannei' zu widersetzen. Pavel Miljukow trat auf, ebenso wie Professor Sergej Tschachotin, dessen Einschätzung des russischen sozialistischen Regimes düster ausfiel: Angesichts der aktuellen Entwicklungen werde es wahrscheinlich noch repressiver werden, da der Staat Krieg gegen die Kirche und das Land führe. Was die Vertreter des rechten Spektrums betraf, so war der Auftritt des Solidaristen Michail Georgijewski bemerkenswert, der über die Verfolgung der Kirche in Russland sprach und darüber, wie selbst friedliche Oppositionelle wie die Solidaristen in den Untergrund getrieben werden.\n\nDie wichtigste Initiative ging jedoch von dem alten General Wassili Georgijewitsch Boldyrev aus. Er war der faktische Anführer des Widerstands gegen die Swobodniks gewesen, verfügte über umfangreiche Verbindungen zu Widerstandsgruppen in Russland und hatte das sozialistische Regime anfangs positiv bewertet. Doch inzwischen hatte er den Glauben an diesen 'zweiten Versuch' verloren und schlug stattdessen die Gründung des Komitees für ein freies Russland vor, 'aus jenen, die für ihre Kinder ein freies Russland sehen wollen', und strebte eine uneingeschränkte Zusammenarbeit mit der deutschen Armee an, wobei aus denjenigen, die mit ihm kämpfen wollten, ein 'Freies Russisches Korps' gebildet werden sollte. Dies war relativ umstritten, und es wurden Vorwürfe der Kollaboration laut, doch letztendlich setzte sich Boldyrev durch: Wenn die Sozialisten gewinnen, verlieren sie. Wenn Deutschland gewinnt, können sie zumindest auf diese Weise die Zukunft Russlands selbst bestimmen."
 russia_free_army_events.1.a: "Ein freies Russland, ewig und unzerstörbar!"
 russia_free_army_events.1.b: "Intrigante Verräter, nichts weiter."
 russia_free_army_events.1.c: "Ihr Anliegen ist gerecht und verdient unsere Unterstützung!"
 russia_free_army_events.1.e: "Mitarbeiter können sehr nützlich sein."
 russia_free_army_events.1.f: "Genau wie die Freiwilligenarmee ziehen sie gegen die Entartung in den Kampf."

 russia_free_army_events.2.t: "Russen im Heer"
 russia_free_army_events.2.d: "Die Freie Russische Armee von Generalleutnant Wassili Boldyrev gilt in den Augen des deutschen Oberkommandos als Kampftruppe von zweifelhafter Qualität. Die aus Russen aus Osteuropa und Deutschland rekrutierten Soldaten zeichnen sich eher durch ihren Eifer als durch Zusammenhalt oder Kampfkraft aus. Boldyrev und einige Mitglieder seines Umfelds sind fähige Offiziere, die nun als Teil der übergeordneten deutschen Kommandostruktur Heer-Ränge tragen, doch der tatsächliche Kampfwert dieser Truppen ist unbewiesen. Kavalleriegeneral Ernst-August Köstring wurde als Boldyrevs Vorgesetzter und Betreuer eingesetzt, und es ist Köstrings Verdienst, dass diese Armee überhaupt erst existiert. Köstring selbst diente Ende der 1920er Jahre als Attaché in Russland, verfügt über fundierte Kenntnisse der russischen Militärangelegenheiten und scheint ein gutes Arbeitsverhältnis zu General Boldyrev zu haben.\n\nTrotz aller idealistischen Töne in den offiziellen Erklärungen der Freien Russischen Armee sieht die OHL in ihr lediglich eine zusätzliche Quelle für Arbeitskräfte, die es zu erschließen gilt, mit möglichem zusätzlichem Propagandapotenzial, falls es ihr tatsächlich gelingt, die Russen zu überzeugen. Aus Sicht des Auswärtigen Amtes ist der Plan ehrgeiziger: Boldyrevs Armee kann als Kernstück beim Wiederaufbau Russlands in der Nachkriegsordnung dienen, indem Männer, die sich im Kampf für deutsche und europäische Werte bewährt haben, in einflussreiche Positionen gebracht werden. Realisten bezweifeln diesen Plan zwar, aber andererseits kostet es wenig, diese Streitkräfte mit älteren Überschüssen zu bewaffnen, und im schlimmsten Fall gewinnt das Heer ein paar mittelmäßige Divisionen hinzu."
 russia_free_army_events.2.a: "Mal sehen, wie es läuft."

 russia_free_army_events.3.t: "Aufnahme der Freiwilligenvereinigung 'Aleksejewiter'"
 russia_free_army_events.3.d: "Der Freiwilligenverband war ursprünglich eine patriotische Veteranenorganisation, die 1922 gegründet wurde, um den Geist des Freiwilligenmarsches am Leben zu erhalten. In der Praxis entwickelte sich der Verband zur größten Veteranenorganisation und zu einer mächtigen 'weißen' Lobby, die oft an vorderster Front gegen die Bedrohung durch den Kommunismus kämpfte. Die Union wurde als konterrevolutionäre Organisation verboten, doch ihr umfangreiches lokales Netzwerk hat sich unter der Führung des ehemaligen Generals Aleksandr Kutepov im Wesentlichen zu einer Widerstandsorganisation gewandelt."
 russia_free_army_events.3.a: "Von nun an sind wir gleichberechtigte Verbündete."
 russia_free_army_events.3.b: "Gib ihnen nicht zu viel Einfluss."

 russia_free_army_events.4.t: "Integration von VRBO"
 russia_free_army_events.4.d: "Die Allrussische Kampforganisation ist unser langjähriger Verbündeter, der sich größtenteils aus Revolutionären aus dem Nordkaukasus und Sibirien zusammensetzt. Der schlagkräftigste Teil dieser losen Widerstandsgruppe ist die maximalistische Fraktion um Michail Lewandowski, doch diese will nichts mit uns zu tun haben. Stattdessen ist es uns gelungen, Verbindungen zum gemäßigteren Flügel der Kampforganisation aufzubauen. Der sozialrevolutionäre Oberst Juri Sablin war bereits 1929 ein Anhänger Boldyrevs und wurde deswegen aus der Armee ausgeschlossen, hat sich jedoch von Boldyrevs deutsch orientierter Politik distanziert. Dennoch macht der Krieg seltsame Bettgenossen."
 russia_free_army_events.4.a: "Lass ihnen nicht zu viel Einfluss."
 russia_free_army_events.4.b: "Alle sind willkommen, auch Sozialisten."

 russia_free_army_events.5.t: "Die erste befreite Stadt!"
 russia_free_army_events.5.d: "Was als bloßer Traum begann, ist nun einen Schritt näher an die Realität gerückt, da die Flagge des Freien Russlands in der Provinzhauptstadt [RSA_new_capital.GetName] weht. Im Rahmen einer Vereinbarung mit der Deutschen Militärverwaltung für die Ostgebiete wurde [RSA_new_capital.GetName] der direkten Verwaltung durch die Freie Russische Armee unterstellt und zur de facto Hauptstadt unserer Bewegung erklärt."
 russia_free_army_events.5.a: "Nächster Halt: Moskau!"

 russia_free_army_events.7.t: "Der Terror"
 russia_free_army_events.7.d.szrs: "Da die Kräfte der Freien Russischen Armee gemeinsam mit den Deutschen vorrücken, wurde ein Großteil der Befriedung des Landes in ihre Hände gelegt. Die neu gegründete Militärgendarmerie der RSA hat sich bereits einen berüchtigten Ruf erworben, doch die schlimmsten Gräueltaten werden in der Regel von lokalen Freiwilligeneinheiten begangen, die oft einen Groll gegen Einheimische hegten, die das Savinkow-Regime unterstützt hatten. Ein besonders schwerwiegender Fall ereignete sich unter Oberst Dmitri Buzin, dessen 11. Freiwilligen-Schützenregiment in einem Dorf 59 Kriegsgefangene erschoss. Buzins Einheit rekrutierte sich größtenteils aus dem lokalen Widerstand, und Buzin selbst war früher Bolschewik. Auch Gewalttaten gegen Zivilisten, denen 'Spionage' vorgeworfen wird, sind keine Seltenheit.\n\n$russia_free_army_events.7.d$"
 russia_free_army_events.7.d.soc: "Da die Kräfte der Freien Russischen Armee gemeinsam mit den Deutschen vorrücken, wurde ein Großteil der Befriedung des Landes in ihre Hände gelegt. Die neu gegründete Militärgendarmerie der RSA hat sich bereits einen berüchtigten Ruf erworben, doch die schlimmsten Gräueltaten werden in der Regel von lokalen Freiwilligeneinheiten begangen, die oft einen Groll gegen Einheimische hegen, die das sozialistische Regime unterstützt hatten. Ein besonders schwerwiegender Fall ereignete sich unter Oberst Sergej Iwanow, dessen 14. Freiwilligen-Schützenregiment in einem Dorf 61 Kriegsgefangene erschoss – die Überreste einer kleinen Garnison, die sich gegen Iwanows Männer verteidigt hatte. Auch Gewalttaten gegen Zivilisten, denen 'Spionage' vorgeworfen wird, sind keine Seltenheit.\n\n$russia_free_army_events.7.d$"
 russia_free_army_events.7.d: "Letztendlich läuft das Problem auf die Qualität unserer Soldaten und lokalen Kommandeure hinaus – wenn wir so gut wie jeden rekrutieren, werden wir sowohl das Schlechteste als auch das Beste von Russland bekommen. Mit strengeren Strafmaßnahmen und Rekrutierungsrichtlinien könnten wir diese Vorfälle reduzieren – allerdings auf Kosten der Personalstärke."
 russia_free_army_events.7.a: "Wir sind eine Armee, keine bolschewistischen Banditen."
 russia_free_army_events.7.b: "Weisen Sie sie zurecht, aber vermeiden Sie es, sie vor den Kopf zu stoßen."

 russia_free_army_events.8.t: "Das Schicksal des Sozialistischen System"
 russia_free_army_events.8.d: "In den Gebieten, die unsere Armee von den Roten befreit, erleben wir, wie das sozialistische System in der Praxis umgesetzt wird. Der größte Teil des Landes wird von Dorfsowjets verwaltet, die es nach Bedarf an die Bauern verteilen. Fabriken werden größtenteils von Fabriksowjets verwaltet. Eine umfassendere Koordination hätte durch übergeordnete Wirtschaftsgremien erfolgen sollen. Doch nun, abgeschnitten vom Rest des sozialistischen Russlands, ist dieses System stark belastet … doch überraschenderweise genießt es immer noch beträchtliche Unterstützung. Verschiedene Sowjets haben bei unserer Regierung beantragt, mehr oder weniger so weiterarbeiten zu dürfen, wie sie es bisher tun, als demokratisches Instrument der lokalen Selbstverwaltung.\n\nEigentlich könnte dies für uns von Vorteil sein: Wir könnten uns ganz darauf konzentrieren, die tatsächlichen radikalen Revolutionäre und andere Verräter auszusortieren, während die einfachen Bauern in ihrem Dorfsowjet als einer modernen Form der bäuerlichen Demokratie mitwirken dürfen. Andererseits gibt es viele, die sich wünschen, dass wir das Privateigentum angemessen schützen und es wieder in private Hände überführen, insbesondere in der Mittelschicht."
 russia_free_army_events.8.a: "Behalte die Arbeiter, solange sie nützlich sind."
 russia_free_army_events.8.b: "Geben Sie Eigentum an diejenigen zurück, denen es gehörte."

 russia_free_army_events.9.t: "Gerüchte über den Frieden"
 russia_free_army_events.9.d: "Es kam zu einem regelrechten Aufruhr, nachdem der Journalist Andrej Sedych ein Dokument an die russische Emigration in Deutschland weitergegeben hatte. In Sedykhs Enthüllungsbericht mit dem Titel 'Verkauf Russlands' behauptet er, dass die höchsten Ebenen der deutschen und ukrainischen Führung bereits die Nachkriegskarte Osteuropas entworfen hätten, die große Gebietsabtretungen Russlands von Rostow über Belgorod bis hin nach Smolensk beinhalten würde. Zunächst als bloße Verleumdung und von Moskau gelenkte Propaganda abgetan, hat eine weitere Untersuchung gezeigt, dass Sedykhs Dokumente echt sein könnten und aus dem deutschen Auswärtigen Amt gestohlen wurden.\n\nSofort geriet die gesamte Sache der Freien Russen in Gefahr. Wenn die Deutschen tatsächlich vorhatten, ein weiteres Brest-Litowsk zu erzwingen, war die Sache der russischen Demokratie das dann überhaupt wert? Die zivilen Politiker des Komitees für ein Freies Russland verlangten Antworten von General Boldyrev, wobei einige ihm sogar vorwarfen, Russland möglicherweise aus eigenem Gewinnstreben zu verraten. Boldyrev, der von diesen Verträgen keine Ahnung hatte, verlangte seinerseits Antworten von General Köstring, der über die deutschen Pläne bezüglich der Freien Russischen Armee Bescheid wissen sollte. Köstrings Vorgesetzte im OHL behaupteten, dies sei keine militärische Angelegenheit und sie hätten keine Kenntnis von den Entscheidungen des Auswärtigen Amtes."
 russia_free_army_events.9.a: "Wir müssen der Sache auf den Grund gehen!"

 russia_free_army_events.10.t: "Aufstand in den Bergen"
 russia_free_army_events.10.d: "Der Nordkaukasus – was für ein Dorn im Auge Moskaus. Die dortigen Bergvölker führen wohl seit der allerersten russischen Invasion in Tscherkessien, Inguschetien und Tschetschenien einen mehr oder weniger aktiven Widerstandskampf, und die Berge haben ihren Bewohnern die Möglichkeit geboten, zu überleben und Widerstand zu leisten. Die Region war in den 1920er Jahren eine Brutstätte von Unruhen und blieb dies auch unter der neuen Herrschaft von [RUS.GetLeader].\n\nBoldyrevs Organisation hatte bereits Verbindungen aufgebaut, insbesondere zu tschetschenischen und tscherkessischen Gruppen, und was als Guerillakrieg begann, hat sich nun zu einem regelrechten Aufstand ausgeweitet. Mehrere Auls, die General Sultan Klych-Girey treu ergeben waren, erhoben sich als Hochburgen des Widerstands und rekrutierten rasch Kämpfer aus den Milizen der Region. Klych-Girey selbst ist ein ehemaliger General der Weißen mit tscherkessischem und krimtatarischem Hintergrund, der 1929 aus der russischen Armee entlassen wurde und sich seitdem für mehr Selbstverwaltung im Nordkaukasus einsetzt, sowohl für die Bergbewohner als auch für die Kosaken.\n\nNatürlich folgt ihm nicht jeder, aber der Kern der Widerstandsbewegung hat sich hinter ihm versammelt, koordiniert von deutschen Agenten."
 russia_free_army_events.10.a: "Wie erwartet – und enttäuschend."
 russia_free_army_events.10.b: "Unsere Feinde werden vor den Bergen zurückschrecken."

 russia_free_army_events.11.t: "Deutsche Hilfe!"
 russia_free_army_events.11.d: "Die deutsche Regierung hat uns weitere Hilfe geschickt, größtenteils in Form von erbeuteter militärischer Ausrüstung und einigen Finanzmitteln. Damit können wir noch ein wenig länger kämpfen."
 russia_free_army_events.11.a: "Na gut."

 russia_free_army_events.13.t: "Freier Russischer Widerstand"
 russia_free_army_events.13.d: "Auch wenn der Krieg unsere Strafen für Widerstand noch drakonischer gemacht hat, ist es ihnen dennoch gelungen, ihre Präsenz zu verstärken. Dies ist vor allem den Operationen der deutschen Luftwaffe und der Freien Russischen Armee zu verdanken, die Nachschub und ausgebildete Spezialisten eingeschleust haben, um Widerstandszellen innerhalb Russlands zu leiten und auszubilden. Wir haben unsere Bemühungen, diese Verräter zu fassen, verdoppelt."
 russia_free_army_events.13.a: "Für sie gibt es nur den Tod."

 russia_free_army_events.14.t: "Zusammenstoß mit den Maximalisten"
 russia_free_army_events.14.d: "Die Verhandlungen mit Michail Karlowitsch Lewandowskis Kampfunion der Sozialrevolutionäre (BSSR) erwiesen sich recht schnell als erfolglos. Boldyrev hat versucht, sich mit allen antisawinkowistischen Widerstandsgruppen in Russland zu verbünden, doch ein Großteil dieser Gruppen ist sozialistischer Prägung und wird oft von Sozialrevolutionären oder ehemaligen Bolschewiki angeführt. Die Eser-Kampfunion ist die größte unter ihnen, und ihre Führung liegt größtenteils in den Händen von SR-Maximalisten, die bereits seit den 1930er Jahren über langjährige Erfahrung mit Terrorismus verfügten. Dutzende kleinerer regionaler Gruppen arbeiten mit der BSSR und ihrem Anführer, General Michail Lewandowski, zusammen, und die Union genießt zudem die Anerkennung der im Exil lebenden Führung der Linken SR.\n\nDoch trotz unseres gemeinsamen Feindes gab Levandovsky nicht nach. Sein Vertreter, Andrej Kolegajew, lehnte eine Zusammenarbeit mit unserer „bürgerlichen Armee“ kategorisch ab und argumentierte, Savinkow sei nur vorübergehend an der Macht. Nach dem Triumph der Weltrevolution über Deutschland werde die Zeit für den Sturz des Woschds gekommen sein – und bis zu diesem Tag sollten sich die Russen, die an die Freiheit glauben, zurückhalten und einfach überleben, um die Flamme der Revolution am Leben zu erhalten. Und angesichts der Zusammenarbeit der 'Freien' Russischen Armee mit Feinden Russlands erklärten die Maximalisten, dass sie auch die Boldyrewisten als Feinde betrachten würden."
 russia_free_army_events.14.a: "Also nichts Besonderes."

 russia_free_army_events.15.t: "Radio Freiheit"
 russia_free_army_events.15.d: "Mithilfe leistungsstarker deutscher Radiosender überschütten die Kollaborateure der Boldyreviten Russland mit ihren Propagandageschichten und Lügen. Das Hören dieser Radiosendungen ist natürlich verboten und führt dazu, dass jeder unter Verdacht des Landesverrats gerät, doch in der Praxis ist es schwierig, dieses Verbot durchzusetzen, insbesondere auf dem Land. Eine besonders einflussreiche Stimme bei Radio Freiheit ist die von Roman Borisovich Gul – einem ehemaligen Veteranen der Freiwilligenarmee und Liberalen, der das Land vor einiger Zeit verlassen hat, nachdem seine Zeitung wegen der Verbreitung von Lügen über [RUS.GetLeader] und der Verleumdung der Regierung von [RUS.GetHerHim] geschlossen wurde.\n\nNun nutzt Gul seinen Ruf als echter russischer Patriot, um die Kreml-Regierung als korrupte Tyrannen und Feinde des russischen Volkes zu bezeichnen. Zudem sendet der Radiosender Nachrichten von der Front – was eine Möglichkeit darstellt, unsere strenge Kriegszensur zu umgehen. In der Praxis schalten viele diesen Sender ein, um sich über die tatsächliche Lage an der Front zu informieren, und werden dabei gleichzeitig der Propaganda der Boldyreviten ausgesetzt."
 russia_free_army_events.15.a: "Entgegnet ihnen mit Geschichten über ihren Verrat und ihre Grausamkeit."
 russia_free_army_events.15.b: "Kein einziger russischer Terrorist wird verschont bleiben."

 russia_free_army_events.16.t: "Boldyrev unter Beschuss"
 russia_free_army_events.16.d: "General Boldyrev hat nach besten Kräften versucht, zwischen russischen und deutschen Interessen zu vermitteln, doch in letzter Zeit gerät er zunehmend unter Beschuss wegen des wachsenden Einflusses von General Köstring und anderen deutschen 'Strippenziehern', die sich in interne russische Angelegenheiten wie Personalentscheidungen einmischen. Dies bringt Boldyrev in eine heikle Lage, da Vorwürfe der Kollaboration mit Deutschland die Hauptargumente gegen die Bewegung Freies Russland sind."
 russia_free_army_events.16.a: "Versteht Berlin denn nicht, dass es seinen Verbündeten untergräbt?!"
 russia_free_army_events.16.a.tt: "Wir haben dieses Event erhalten, weil unsere $paternal_autocrat_coloured$-Beliebtheit über §Y40 %§ liegt!"

 russia_free_army_events.17.t: "General Boldyrev nimmt Kontakt mit uns auf"
 russia_free_army_events.17.d: "Heute erhielten wir überraschenden Besuch aus Europa, als Major Adolf Sigismundovich Chapsky sich mit Ataman Semyonov traf, der General Vasily Boldyrev und die Freie Russische Armee vertrat – berüchtigte deutsche Kollaborateure, die für die „Demokratie“ kämpfen. Chapsky selbst ist Diplomat und Spion und scheint eine wichtige Figur in Boldyrevs Geheimdienst, der RIAG, zu sein.\n\nChapsky ist mit einem Vorschlag von Boldyrev zu uns gekommen, der nur für unsere Ohren bestimmt ist. Sie behaupten, dass die Freie Russische Bewegung bestrebt sei, den deutschen Einfluss so schnell wie möglich zu beseitigen, sobald sie in Russland an der Macht sei – und dass eine Zusammenarbeit unsererseits der russischen Sache zugutekommen würde. Der Deal ist einfach – sie wollen unser Versprechen, dass sich unsere beiden Hälften Russlands nach Kriegsende und nachdem [RUS.GetLeader]s Reich des Chaos in Trümmern liegt, in Frieden und Brüderlichkeit vereinen. Semyonov wurde eine Position in der zukünftigen Regierung oder Armee versprochen, falls er dies wünscht. Chapsky kann nicht lange in Sibirien bleiben, wird aber unsere Botschaft übermitteln oder unseren eigenen Vertreter nach Berlin begleiten, falls wir dies wünschen."
 russia_free_army_events.17.a: "Er ist nur ein deutscher Kollaborateur."
 russia_free_army_events.17.b: "Ja, wir verfolgen ein gemeinsames Ziel."
 FER_game_over_tt: "§RNach dem Krieg werden wir annektiert. SPIEL VORBEI.§!"

 russia_free_army_events.18.t: "Semjonows Gegenangebot"
 russia_free_army_events.18.d: "Semjonows Vertreter und so etwas wie Außenminister, Wassili Nikolajewitsch Strandman, traf nach einer langen und beschwerlichen Reise in Berlin ein, um die Verhandlungen persönlich zu führen – offenbar hat Semjonow unser Bündnisangebot ernst genommen. Strandman überbrachte uns ein Angebot von Semjonow: Er würde Boldyrevs Führung anerkennen, sobald dieser Moskau unter seine Kontrolle gebracht habe, und die von ihm kontrollierten Regionen würden sich bereitwillig der wiederhergestellten Russischen Republik anschließen.\n\nAllerdings gibt es einen Haken: Er fordert Autonomie für Sibirien und für sich selbst als Befehlshaber des Fernöstlichen Militärbezirks, einschließlich der Freiheit, seine eigenen Untergebenen zu ernennen, sowie die Garantie, dass sein Eigentum in Ostsibirien nicht beschlagnahmt wird. Darüber hinaus verlangt er den Rang eines Generalfeldmarschalls und die Anerkennung seiner Verdienste um die Befreiung Russlands als zweitwichtigste nach denen Boldyrevs.\n\nHinter verschlossenen Türen sprach Strandman auch die Frage einer möglichen Wiederherstellung der Monarchie durch Boldyrev an, da er glaubte, dies würde Russland 'Ordnung und ein gutes Leben zurückbringen' und den Respekt Deutschlands gewinnen. Dies wurde natürlich höflich abgetan, und auch die erste Reaktion auf Semjonows Forderungen bestand darin, ihn abzuweisen. Dennoch – seine Zusammenarbeit würde einen möglichen Krieg in Sibirien oder die Eroberung Wladiwostoks durch Japan verhindern, selbst wenn dies bedeutete, Semjonows Erpressung zu akzeptieren."
 russia_free_army_events.18.a: "Völlig unverschämte Forderungen!"
 russia_free_army_events.18.b: "Ich nehme an, Semjonow kann eine Belohnung erhalten."
 RSA_semyonov_ally_tt: "Alle von [FER.GetName] kontrollierten Gebiete werden nach Kriegsende an [ROOT.GetName] angegliedert."

 russia_free_army_events.19.t: "From Siberia with Scorn"
 russia_free_army_events.19.d: "Aus Sibirien mit Verachtung"
 russia_free_army_events.19.d: "Die Antwort aus [FER.Capital.GetCapitalVictoryPointName] war eindeutig: Sie erkennen uns nicht als Vertreter des wahren Russlands an und werden nicht mit deutschen Kollaborateuren und Handlangern verhandeln. In einem langatmigen Kommuniqué des 'Premierministers' von [FER.GetNameDef], [FER.GetSecondInCommand], fordert er stattdessen, dass Boldyrev General [FER.GetLeader] als obersten Herrscher des 'Freien Russlands' anerkennt, der vom sibirischen Volk und nicht von den Deutschen gewählt wurde."
 russia_free_army_events.19.a: "Die Verhandlungen waren kurz."
 russia_free_army_events.19.b: "Dann werden wir es mit Gewalt nehmen."

 russia_free_army_events.20.t: "Vereinigung mit dem freien Russland" #Event wahrscheinlich nur für KI
 russia_free_army_events.20.d: "Wie vereinbart, ist es an der Zeit, dass sich die sibirische Armee zurückzieht und sich wieder mit dem Rest Russlands vereint."
 russia_free_army_events.20.a: "Vereint!"

 russia_free_army_events.21.t: "Helden der Befreiung"
 russia_free_army_events.21.d: "Die Spannungen zwischen den beiden Generälen und ihren Anhängern waren bei den Siegesfeierlichkeiten deutlich zu spüren. Die große Militärparade durch Moskau, die an jene von 1921 erinnerte, mit der die Befreiung Moskaus durch die Weißen gefeiert worden war, war von Anfang an von Kontroversen überschattet. Schon die Reihenfolge der Einheiten im Umzug war umstritten, da die meisten Menschen in Moskau kaum etwas über die Rolle Sibiriens im Krieg wissen. Es ist die Freie Russische Armee mit ihren weiß-blauen Fahnen und deutschen Panzern, die in diesem Teil Russlands bekannt ist – im Guten wie im Schlechten. Die rauen Truppen sibirischer Soldaten und Semjonows Kosaken scheinen nicht in die Moskauer Innenstadt zu passen.\n\nDoch trotzdem stehen die Generäle Boldyrev und Semyonov Seite an Seite und begrüßen ihre beiden Armeen bei einem großen Marsch durch die Hauptstraßen Moskaus. Insgeheim hält Boldyrev dies für verachtenswert und findet, dass Semyonov nicht auf diese Weise belohnt werden sollte – er sollte schon froh sein, seine militärische Herrschaft über den Fernen Osten behalten zu dürfen, doch nun wird er als Befreier Russlands verehrt, fast gleichgestellt mit Boldyrev."
 russia_free_army_events.21.a: "Perhaps finally peace?"

 russia_free_army_events.22.t: "Das Amur-Atamanat"
 russia_free_army_events.22.d: "Grigori Semjonow scheint der größte Gewinner des letzten Krieges zu sein. Als Gegenleistung für seine Unterstützung der Sache der Freien Russen wurde er – nicht ohne Kontroversen – zum Befehlshaber des Fernöstlichen Militärbezirks ernannt, den er als eine Art quasi-feudales Belohnungssystem mit Getreuen besetzt hat. Am meisten Kritik hat jedoch seine Einmischung in die Politik auf sich gezogen.\n\nSemjonow ist dank der Goldminen, die er während seines Aufstands erobert hat, der reichste Mann im russischen Fernen Osten und hat sich zu einem wichtigen Förderer der DNPVS entwickelt, einer sibirischen Partei, die bei den Kommunalwahlen in Sibirien hervorragende Ergebnisse erzielt hat und derzeit die Regionalregierungen von Amur und Irkutsk stellt.\n\nVor kurzem hat der Ausschuss des Staatsrats Ermittlungen wegen Korruptionsvorwürfen gegen die DNPVS aufgenommen und behauptet, dass diese Semjonows finanzielle Unterstützung durch politische Gefälligkeiten 'zurückgezahlt' habe, was es vielen von Semjonows Offizieren ermöglicht habe, sich zu bereichern oder erfolgreiche politische Karrieren zu starten. Die Presse hat dies als 'Amur-Atamanat' bezeichnet, und die öffentlichen Forderungen nach Maßnahmen gegen Semjonows korruptes Verhalten nehmen zu. Dennoch genießt er in seinem eigenen Herrschaftsgebiet nach wie vor große Unterstützung als Mann, der Dinge in Gang bringt und den von Moskau im Stich gelassenen Sibiriern zuhört."
 russia_free_army_events.22.a: "Das geht zu weit, entlassen Sie ihn aus der Armee und stellen Sie ihn vor Gericht, bis er nichts mehr hat."
 russia_free_army_events.22.b: "Lassen wir den Duma-Ausschuss seine Arbeit machen, dafür gibt es ein ordentliches Gerichtsverfahren."
 russia_free_army_events.22.c: "Er hat sich als Boldyrevs treuer Mann erwiesen, also gönnen wir ihm seine Belohnung."

 russia_free_army_events.24.t: "Ein Ultimatum aus Moskau"
 russia_free_army_events.24.d: "Wir haben heute eine unmissverständliche diplomatische Note aus Moskau erhalten. Der Inhalt ist klar: Die sibirischen Separatisten – womit wir gemeint sind – werden aufgefordert, sich zurückzuziehen und der russischen Armee – ihrer eigenen Armee – zu gestatten, die Ordnung in Sibirien wiederherzustellen. Das kam nicht völlig überraschend, da unsere Geheimdienste bereits Berichte über Truppenkonzentrationen an unserer Westgrenze erhalten hatten. Es sieht ganz so aus, als stünde eine Invasion bevor."
 russia_free_army_events.24.a: "Nur über meine Leiche!"
 russia_free_army_events.24.b: "Ich will nicht sterben..."

 russia_free_army_events.30.t: "Unternehmensverträge"
 russia_free_army_events.30.d: "Es ist nicht einfach, erstklassige Ausrüstung zu beschaffen, da die meisten Aufträge natürlich vorrangig an die Bundeswehr selbst vergeben werden. Dennoch ist es uns gelungen, sowohl veraltete Ausrüstung als auch einige neuere Aufträge zu erhalten, wenn auch in geringem Umfang. Glücklicherweise ist der deutsche Rüstungskomplex stark genug, um mehr als nur eine Armee zu versorgen."
 russia_free_army_events.30.a: "Gut."
