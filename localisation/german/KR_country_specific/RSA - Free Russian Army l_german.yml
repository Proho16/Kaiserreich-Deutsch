 RSA_guide: "§MBoldyrev§! ($social_liberal_coloured$ / $social_democrat_coloured$)\n£white_dot Fight the Second Weltkrieg against §nSavinkovist Russia§! and have Boldyrev win the election.\n\n§MBoldyrev§! ($market_liberal_coloured$ / $social_conservative_coloured$)\n£white_dot Fight the Second Weltkrieg against §SSocialist Russia§! and have Boldyrev win the election.\n\nLosing the post-war election leads to a variation of normal Democratic Russia content with no new content."

 ### Events ###
 russia_free_army_events.1.t: "The Danzig Conference"
 russia_free_army_events.1.d.szrs: "The war has put the dispersed Russian émigré community in chaos. While many have fled Russia because of the SZRS' persecution, it is not obvious they wish for Russian defeat. Complicating the matter even more, many Russian socialists are supporting the war - not because of any love towards Savinkov, but because they hope that the International will triumph.\n\nBut there are those who cannot compromise with the Svobodnik regime. Copies of Vladimir Rikhter's defiant speech in the last free session of the Duma in 1936 are widely spread, and its ending - 'Free Russia, eternal and indestructible!' has become a rallying cry, a seed for resistance. It is not known if Rikhter himself is dead or in some camp in Siberia, but the least that all Russians valuing the freedom of their children can do is to oppose the tyrant Savinkov and his war.\n\nAnd so the Danzig Conference came to be, a gathering of Russian dissidents in Germany. Famous poet Osip Mandelstam, who fled Russia after tightening anti-semitic policies, called resistance a moral duty for every man with some humanity left. Pavel Milyukov made an appearance, and so did Kadet lawyer Aleksandr Kulischer, who had been organising help for Jews fleeing Russia. Chilling tales of a network of prison camps from Murmansk to Kamchatka  were being spread.\n\nBut the most important initiative came from the old general, Vasily Georgiyevich Boldyrev. Having gained infamy after his coup attempt in 1929 with the goal of curbing the rising influence of Savinkov, he became a practical leader of anti-Svobodnik resistance with ample connections to resistance groups in Russia. Boldyrev proposed the creation of the Committee for Free Russia, 'out of those who wish to see a Free Russia for their children', and envisioned full cooperation with the German army, with 'Free Russian Corps' organised out of those who wish to fight with him. This was relatively controversial, and accusations of collaborationism were thrown, but ultimately Boldyrev won the day: if Savinkov wins, they lose. If Germany wins, at least this way they can be the ones steering the Russian future."
 russia_free_army_events.1.d.soc: "The war has put the dispersed Russian émigré community in chaos. While many have fled Russia after losing their property or being persecuted by the VGPU for opposing the revolution, it is not obvious they would rather see Russia lose the war. Many old Whites have been repeating anti-communist litanies with little effect, and others are still hopeful that the regime moderates eventually - after all, it is not Lenin.\n\nBut there are those who cannot compromise with the socialist regime. Copies of Vladimir Rikhter's defiant speech in the last free session of the Duma in 1936 are widely spread, and its ending - 'Free Russia, eternal and indestructible!' has become a rallying cry for the Russian democrats, stricken by the tragedy of toppling Savinkov only to create another authoritarian regime in its place.\n\nAnd so the Danzig Conference came to be, a gathering of Russian dissidents in Germany. Famous writer Roman Gul, having fled Russia due to censorship, opened the conference calling for all cultured peoples to resist 'revolutionary tyranny'. Pavel Milyukov made an appearance, and so did Professor Sergey Chakhotin, whose assessment of the Russian socialist regime was grim: based on current trends, it will likely become more oppressive, as the state wages war against the church and the land. As for more right-wing appearances, notable was that of Solidarist Mikhail Georgiyevsky, who spoke of persecution of the church in Russia and how even peaceful opposition like the Solidarists are being driven underground.\n\nBut the most important initiative came from the old general, Vasily Georgiyevich Boldyrev. He had been a practical leader of anti-Svobodnik resistance with ample connections to resistance groups in Russia, and had initially viewed the socialist regime positively. But he had since lost his faith in this 'second attempt', and instead proposed the creation of the Committee for Free Russia, 'out of those who wish to see a Free Russia for their children', and envisioned full cooperation with the German army, with 'Free Russian Corps' organised out of those who wish to fight with him. This was relatively controversial, and accusations of collaborationism were thrown, but ultimately Boldyrev won the day: if the socialists win, they lose. If Germany wins, at least this way they can be the ones steering the Russian future."
 russia_free_army_events.1.a: "Free Russia, eternal and indestructible!"
 russia_free_army_events.1.b: "Scheming traitors, nothing more."
 russia_free_army_events.1.c: "Their cause is just and deserves our support!"
 russia_free_army_events.1.e: "Collaborators can be rather useful."
 russia_free_army_events.1.f: "Like the Volunteer Army, they march against degeneracy."

 russia_free_army_events.2.t: "Russians of the Heer"
 russia_free_army_events.2.d: "Generalleutnant Vasily Boldyrev's Freie Russische Armee is a fighting force of dubious quality in the eyes of the German High Command. Recruited from Russians of Eastern Europe and Germany, they have greater enthusiasm than unit cohesion or skill. Boldyrev and a number of those in his clique are capable officers, now bearing Heer ranks as part of the broader German command structure, but the actual combat value of these troops is untested. General of the Cavalry Ernst-August Köstring has been assigned as Boldyrev's superior officer and handler, and it is Köstring's achievement that this army even exists in the first place. Köstring himself served as attaché in Russia in the late 1920s and has solid knowledge of Russian military matters, and seems to have a good working relationship with General Boldyrev.\n\nDespite all the idealism in the Freie Russische Armee's official declarations, the perspective of the OHL is that they are merely an additional source of manpower to tap into, with possible added propaganda potential if they truly are able to convince the Russians. From the Foreign Office's point of view, the plan is more ambitious: Boldyrev's army can serve as the kernel in rebuilding Russia in the post-war order, as men who have proved themselves fighting for German and European values are put into positions of influence. However, realists do doubt this plan, but then again - it costs little to arm these forces with older surplus, and in the worst case, the Heer gains a couple of mediocre divisions."
 russia_free_army_events.2.a: "We'll see how it works out."

 russia_free_army_events.3.t: "Integration of the Union of Volunteers 'Alekseyevites'"
 russia_free_army_events.3.d: "The Union of Volunteers was originally a patriotic veterans' organisation founded in 1922, intended to keep the spirit of the Volunteer March alive. In practice, the Union became the largest veterans' organisation and a powerful 'White' lobby, often in the first lines in combat against the threat of communism. The Union has been banned as a counter-revolutionary organisation, but its extensive local network has essentially turned into resistance organisation under the leadership of former General Aleksandr Kutepov."
 russia_free_army_events.3.a: "From now on, we are equal allies."
 russia_free_army_events.3.b: "Do not give them too much influence."

 russia_free_army_events.4.t: "Integration of the VRBO"
 russia_free_army_events.4.d: "The All-Russian Combat Organisation is our old ally, having been formed largely out of revolutionaries in the North Caucasus and Siberian region. The most effective part of this loose resistance group is Mikhail Levandovsky's Maximalist group, but they do not wish to have anything to do with us. Instead, we have managed to build ties with the more moderate end of the Combat Organisation. Socialist-Revolutionary Colonel Yury Sablin was already a supporter of Boldyrev in 1929 and was for that expelled from the army, but has kept his distance from Boldyrev's German-aligned politics. Still, war makes odd bedfellows."
 russia_free_army_events.4.a: "Do not allow them too much influence."
 russia_free_army_events.4.b: "All are welcome, even socialists."

 russia_free_army_events.5.t: "The First City Liberated!"
 russia_free_army_events.5.d: "What started as a mere dream has turned one step more real, as the flag of Free Russia flies in the governorate capital of [RSA_new_capital.GetName]. In an agreement with the German Military Administration for the Eastern Territories, [RSA_new_capital.GetName] has been given direct administration by the Freie Russische Armee and made into the de facto capital of our movement."
 russia_free_army_events.5.a: "Next stop, Moscow!"

 russia_free_army_events.7.t: "The Terror"
 russia_free_army_events.7.d.szrs: "As the Free Russian forces have been advancing alongside the Germans, much of the pacification of land has been put in their hands. The newly-founded Military Gendarmerie of the RSA has already started to develop an infamous reputation, but the worst atrocities are generally conducted by local Volunteer Units, who often had grievances against locals who had supported the Savinkov regime. A particularly damning case happened under Colonel Dmitry Buzin, whose 11th Volunteer Rifle Regiment shot 59 prisoners of war in a local village. Buzin's unit was largely recruited from the local resistance, and Buzin himself was formerly a Bolshevik. Acts of violence against civilians accused of 'espionage' are not rare either.\n\n$russia_free_army_events.7.d$"
 russia_free_army_events.7.d.soc: "As the Free Russian forces have been advancing alongside the Germans, much of the pacification of land has been put in their hands. The newly-founded Military Gendarmerie of the RSA has already started to develop an infamous reputation, but the worst atrocities are generally conducted by local Volunteer Units, who often had grievances against locals who had supported the socialist regime. A particularly damning case happened under Colonel Sergey Ivanov, whose 14th Volunteer Rifle Regiment shot 61 prisoners of war in a local village - what remained of a small garrison that had been defending against Ivanov's men. Acts of violence against civilians accused of 'espionage' are not rare either.\n\n$russia_free_army_events.7.d$"
 russia_free_army_events.7.d: "Ultimately the problem boils down to the quality of our soldiers and local commanders - if we recruit just about anyone, then we will get both the worst and the best of Russia. With stricter punitive measures and recruitment policies, we could reduce these incidents - at the expense of manpower."
 russia_free_army_events.7.a: "We are an army, not some Bolshevik bandits."
 russia_free_army_events.7.b: "Reprimand them, but avoid alienating them."

 russia_free_army_events.8.t: "The Fate of the Socialist System"
 russia_free_army_events.8.d: "In regions our army is liberating from the Reds, we have been witnessing an attempt at the socialist system in practice. Most land is managed by village soviets, which distribute it to farmers based on need. Factories are largely managed by factory soviets. Broader coordination would have been done by higher-level economic bodies. But now, severed from the rest of Socialist Russia, this system is strained greatly... but surprisingly, still has a fair amount of support. Various Soviets have petitioned our government to be allowed to more or less function as they are, as a democratic tool of local self-rule.\n\nIn truth, this could be beneficial to us: we could only focus on rooting out the actual radical revolutionaries and other traitors, while common peasants are allowed to play in their Village Soviet as a modern version of peasant democracy. But then again, there are many who wish us to properly protect private property, and restore it to individual hands, especially in the middle class."
 russia_free_army_events.8.a: "Keep worker management, as long as they are useful."
 russia_free_army_events.8.b: "Restore properties to those who owned them."

 russia_free_army_events.9.t: "Rumours of the Peace"
 russia_free_army_events.9.d: "Quite a storm was raised after a document was leaked to the Russian emigration in Germany by journalist Andrey Sedykh. In Sedykh's exposé titled 'Sale of Russia', he claims that the highest levels of German and Ukrainian leadership have already drawn the post-war map of Eastern Europe, which would include great territorial concessions from Russia, from Rostov, Belgorod to even Smolensk. Initially declared to be mere slander and propaganda directed from Moscow, further examination has shown that Sedykh's documents could be official, stolen from the German Foreign Office.\n\nImmediately, the whole Free Russian cause was jeopardised. If Germans truly were planning to inflict another Brest-Litovsk, was the cause of Russian democracy worth it? The civilian politicians of the Committee for Free Russia demanded answers from General Boldyrev, as some even accused him of possibly selling out Russia for his own gain. Boldyrev, who had no idea about these treaties, in turn demanded answers from General Köstring, who was supposed to know German plans regarding the Freie Russische Armee. Köstring's superiors at the OHL claimed that it was not a military matter and that they had no knowledge of the decisions of the Foreign Office."
 russia_free_army_events.9.a: "We must get to the bottom of this!"

 russia_free_army_events.10.t: "Uprising in the Mountains"
 russia_free_army_events.10.d: "The North Caucasus, what a thorn in the side of Moscow. The mountain peoples there have been waging more or less an active campaign of resistance arguably from the very first Russian invasion of Circassia, Ingushetia and Chechnya, and the mountains have offered their people means to survive and resist. The region was a hotbed of unrest in the 1920s, and remained so even under the new rule by [RUS.GetLeader].\n\nBoldyrev's organisation already built up connections, particularly with the Chechen and Circassian groups, and what began as a guerrilla war has now culminated into a full-scale uprising. Multiple auls loyal to General Sultan Klych-Girey rose up as hotbeds of resistance, and rapidly drew manpower from the militias of the region. Klych-Girey himself is a former White general of Circassian and Crimean Tatar background, who was purged from the Russian army in 1929 and who has since become a champion of greater self-rule for North Caucasus, both the Mountaineers and the Cossacks.\n\nOf course not everyone is following him, but the core of the resistance movement has rallied behind him, coordinated by German agents."
 russia_free_army_events.10.a: "Expected and disappointing."
 russia_free_army_events.10.b: "Our enemies will falter against the mountains."

 russia_free_army_events.11.t: "German Aid!"
 russia_free_army_events.11.d: "The German Government has sent us further aid, largely in form of captured military equipment and some funding. With this, we can fight a little bit longer."
 russia_free_army_events.11.a: "Alright."

 russia_free_army_events.13.t: "Free Russian Resistance"
 russia_free_army_events.13.d: "Even if the war has made our punishments for resistance even more draconian, they have still been able to increase their presence. This is largely thanks to operations conducted by the German Air Force and the Freie Russische Armee, who have been infiltrating supplies and trained specialists to direct and train resistance cells within Russia. We have redoubled our efforts to catch these traitors."
 russia_free_army_events.13.a: "Only death for them."

 russia_free_army_events.14.t: "Clash with the Maximalists"
 russia_free_army_events.14.d: "The negotiations with Mikhail Karlovich Levandovsky's Combat Union of Socialist-Revolutionaries (BSSR) proved to be fruitless rather quickly. Boldyrev has sought to ally with all anti-Savinkovite resistance groups in Russia, but a large portion of them are socialist in nature, often led by Socialist-Revolutionaries or former Bolsheviks. The Eser Combat Union is the largest of these, and its leadership is largely in the hands of SR-Maximalists, who already had a long experience of terrorism from the 1930s. Dozens of smaller regional groups work together with the BSSR and its leader, General Mikhail Levandovsky, and the union also enjoys the recognition of the exiled Left-SR leadership.\n\nBut despite our shared enemy, Levandovsky would not budge. His representative, Andrey Kolegayev, categorically refused cooperation with our 'bourgeois army' and argued that Savinkov is only in power temporarily. After the World Revolution's triumph against Germany, it will be time for the Vozhd to fall - and for that day, Russians who believe in freedom should lay low and simply survive, keeping the flame of revolution alive. And given the 'Free' Russian Army's cooperation with enemies of Russia, Maximalists declared that they would also consider Boldyrevites enemies."
 russia_free_army_events.14.a: "Nothing out of that, then."

 russia_free_army_events.15.t: "Radio Liberty"
 russia_free_army_events.15.d: "Utilising high-power German radio stations, the Boldyrevite collaborators have been blasting Russia with their tales of propaganda and lies. Listening to these radio broadcasts is obviously forbidden and will put anyone under suspicion of treason, but in practice, it is hard to enforce the ban, especially in the countryside. A particularly influential voice in this Radio Liberty is that of Roman Borisovich Gul - a former Volunteer Army veteran and a liberal who fled the country earlier as his newspaper was closed down for spreading lies concerning [RUS.GetLeader] and slandering [RUS.GetHerHim] government.\n\nNow Gul, riding on his fame as a proper Russian patriot, is calling the Kremlin government corrupt tyrants and enemies of the Russian people. In addition, the radio broadcasts news from the frontlines - which are a way to circumvent our tight wartime censorship. In practice, many come to listen to this channel to learn the reality of the frontline situation, and at the same time they are exposed to Boldyrevite propaganda."
 russia_free_army_events.15.a: "Counter it with tales of their treason and savagery."
 russia_free_army_events.15.b: "No Free Russian terrorist shall be spared."

 russia_free_army_events.16.t: "Boldyrev Undermined"
 russia_free_army_events.16.d: "General Boldyrev has been balancing between Russian and German interests to his best ability, but lately he has come increasingly under fire for the growing influence of General Köstring and other German 'handlers', who have been interfering with internal Russian matters such as appointments. It has put Boldyrev into an awkward position, as accusations of German collaborationism are the chief arguments against the Free Russian movement."
 russia_free_army_events.16.a: "Doesn't Berlin understand they are undermining their ally?!"
 russia_free_army_events.16.a.tt: "We received this event because our $paternal_autocrat_coloured$ popularity is higher than §Y40%§!."

 russia_free_army_events.17.t: "General Boldyrev Contacts Us"
 russia_free_army_events.17.d: "We received a surprise visit from Europe today, as Major Adolf Sigismundovich Chapsky met with Ataman Semyonov, representing General Vasily Boldyrev and the Freie Russische Armee, infamous German collaborators fighting for 'democracy'. Chapsky himself is a diplomat and spy and seems to be a major figure in Boldyrev's intelligence agency, RIAG.\n\nChapsky has come to us with a proposal from Boldyrev, only for our ears. They claim that the Free Russian Movement seeks to get rid of German influence as soon as possible, once they are in power in Russia - and it would be beneficial for the Russian Cause for us to cooperate. The deal is simple - they want our promise that after this war is over, and [RUS.GetLeader]'s kingdom of chaos is in ruins, our two halves of Russia shall unite in peace and brotherhood. Semyonov was promised a position in the future government or army, if he so wishes. Chapsky is unable to remain in Siberia for long, but will relay our message or escort our own representative to Berlin, if we so wish."
 russia_free_army_events.17.a: "He is just a German collaborator."
 russia_free_army_events.17.b: "Yes, our cause is a shared one."
 FER_game_over_tt: "§RWe will be annexed after the war. GAME OVER.§!"

 russia_free_army_events.18.t: "Semyonov's Counter-Offer"
 russia_free_army_events.18.d: "Semyonov's representative and foreign minister of sorts, Vasily Nikolayevich Strandman, arrived in Berlin after a long and perilous journey to handle negotiations in person - it seems that Semyonov did take our offer of alliance seriously. Strandman brought us an offer from Semyonov: he would recognise Boldyrev's leadership after Boldyrev controls Moscow, and regions controlled by him would willingly join the restored Russische Republik.\n\nHowever, there is a catch - he demands autonomy for Siberia and himself as Commander of the Far Eastern Military District, with freedom to appoint his own subordinates and for no seizures over his properties in East Siberia. Additionally, he asks for the rank of General-Fieldmarshal and recognition of his efforts to liberate Russia as second only to Boldyrev's.\n\nIn private, Strandman also brought up the question of a potential monarchical restoration by Boldyrev, as he believed it would 'restore order and good life' to Russia and win German respect. This was of course politely shrugged off, and the first reaction to Semyonov's demands was also to brush him off. But still - his cooperation would avoid a potential war in Siberia, or Japan seizing Vladivostok, even if it meant accepting Semyonov's extortion."
 russia_free_army_events.18.a: "Completely outrageous demands!"
 russia_free_army_events.18.b: "I suppose Semyonov can receive some reward."
 RSA_semyonov_ally_tt: "All territory controlled by [FER.GetName] will be annexed into [ROOT.GetName] after the war ends."

 russia_free_army_events.19.t: "From Siberia with Scorn"
 russia_free_army_events.19.d: "The response from [FER.Capital.GetCapitalVictoryPointName] was clear: they do not recognise us as representing the true Russia and will not negotiate with German collaborators and lapdogs. In a long-winded communiqué from the 'prime minister' of [FER.GetNameDef], [FER.GetSecondInCommand], he instead demands for Boldyrev to recognise General [FER.GetLeader] as the supreme ruler of 'Free Russia', chosen by the Siberian people rather than the Germans."
 russia_free_army_events.19.a: "The negotiations were short."
 russia_free_army_events.19.b: "We shall take it by force, then."

 russia_free_army_events.20.t: "Union with Free Russia" #Event for likely AI only
 russia_free_army_events.20.d: "As agreed, it is time for the Siberian army to stand down, and unify once again with the rest of Russia."
 russia_free_army_events.20.a: "United!"

 russia_free_army_events.21.t: "Heroes of the Liberation"
 russia_free_army_events.21.d: "The tension between the two generals and their supporters was palpable in the victory celebrations. The great military parade through Moscow, reminiscent of that of 1921 that celebrated the White liberation of Moscow, was mired in controversy from the start. The order of units within the march was already debated, as most people in Moscow hardly know anything about the Siberian role in the war. It is the Freie Russische Armee, with its white-and-blue flags and German armoured vehicles, that is known to this part of Russia, for better or worse. Rugged bands of Siberian soldiers and Semyonov's Cossacks do not seem like they belong in the centre of Moscow.\n\nBut despite that, Generals Boldyrev and Semyonov stand side by side, welcoming both of their armies in a great march through the main streets of Moscow. In private, Boldyrev has considered this despicable, and doesn't feel like Semyonov should be rewarded like this - he should be happy to even keep his military rule over the Far East, but now he is being respected as Liberator of Russia, almost equal to Boldyrev."
 russia_free_army_events.21.a: "Perhaps finally peace?"

 russia_free_army_events.22.t: "The Amur Atamanate"
 russia_free_army_events.22.d: "Grigory Semyonov seems like the greatest winner of the last war. In exchange for his support of the Free Russian cause, he was controversially appointed as the Commander of the Far Eastern Military District, which he has stacked with loyalists as a quasi-feudal reward system. But what has drawn the most critique is his meddling in politics.\n\nSemyonov is the richest man in the Russian Far East, thanks to the gold mines seized during his uprising, and he has become a major patron of the DNPVS, a Siberian party that has excelled in Siberian local elections and currently forms the gubernial governments of Amur and Irkutsk.\n\nRecently, the State Council committee started investigations on corruption charges in the DNPVS, claiming that they have been 'paying back' Semyonov's funding through political favours, which has enabled many of Semyonov's officers to enrich themselves or start successful political careers. The press has dubbed this as the 'the Amur Atamanate', and public calls for action have been rising against Semyonov's corrupt behaviour. Still, he enjoys popular support in his own realm as a man who makes things work and listens to the local Siberians abandoned by Moscow."
 russia_free_army_events.22.a: "This is too much, dismiss him from the army and put him on trial until he has nothing."
 russia_free_army_events.22.b: "Let the Duma committee work, we have a normal judicial process for this."
 russia_free_army_events.22.c: "He has proven to be Boldyrev's loyal man, let him have his treat."

 russia_free_army_events.24.t: "An Ultimatum from Moscow"
 russia_free_army_events.24.d: "We received a stark diplomatic note from Moscow today. It is simple: the Siberian separatist forces - referring to us - are demanded to stand down and allow the Russian Army - their own army - to restore order in Siberia. This did not come as a full surprise, as our intelligence has already received reports of troop concentrations on our western border. It does seem like an invasion is upon us."
 russia_free_army_events.24.a: "Over my dead body!"
 russia_free_army_events.24.b: "I don't want to die..."

 russia_free_army_events.30.t: "Company Contracts"
 russia_free_army_events.30.d: "There are considerable challenges in finding first-rate equipment, as most contracts are obviously prioritised for the German Army itself. Still, we have been able to get both outdated equipment and even some newer contracts, albeit small in scale. Fortunately, the German military-industrial complex is powerful enough to supply more than just one army."
 russia_free_army_events.30.a: "Good."
