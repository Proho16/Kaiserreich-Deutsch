 RSA_recruit_EE_desc: "Es gibt viele Russen, die vor dem derzeitigen russischen Regime in die Ukraine, nach Weißrussland oder in die baltischen Staaten geflohen sind. Sie sollten motiviert sein, sich unserer Sache anzuschließen!"
 RSA_stavka: "Freie Russische Armee"
